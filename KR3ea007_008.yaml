body:
  text: 卷之八至真要大論第七十四篇天元紀大論鬼臾區曰謹奉天道請言真要此篇論六氣司天六氣在泉有正化有勝復有標本寒熱有調治逆從五味陰陽制方奇偶謹奉天道合於人身故曰至真要大論黃帝問曰五氣交合盈虛更作余知之矣六氣分治司天地者其至何如更平聲下同盈虛即太少也五運與六氣交合甲丙戊庚壬為太主盈乙丁己辛癸為少主虛子寅辰午申戌為太主盈醜卯巳未酉亥為少主虛五氣交合盈虛更作六元正紀詳論之故曰余知之矣其六氣不與五運交合分治以司天地者其至何如此承上篇六十歲之紀而問一歲之六氣也岐伯再拜對曰明乎哉問也天地之大紀人神之通應也六氣分治以司天地此天地之大紀至神之理通於人身乃人神之通應也帝曰願聞上合昭昭下合冥冥奈何天地大紀人神通應故願聞人之上合天之昭昭下合地之冥冥岐伯曰此道之所主工之所疑也天地之理備於人身此道之所主而為工之所疑也帝曰願聞其道也願聞上下相合之道岐伯曰厥陰司天其化以風少陰司天其化以熱太陰司天其化以濕少陽司天其化以火陽明司天其化以燥太陽司天其化以寒以所臨藏位命其病者也三陰三陽六氣司天各有風熱濕火燥寒之化也以所臨藏位者天氣之所臨合於人之形藏各有其位也如厥陰合肝少陰合心腎太陰合肺脾少陽合三焦膽陽明合大腸胃太陽合小腸膀胱各有上下形藏之位以所臨藏位命其病者天氣所臨合於形藏而有風熱濕火燥寒之病也帝曰地化奈何六氣本化上臨乃司天之化故問地化奈何岐伯曰司天同候間氣皆然間去聲下同地化與司天同候其左右之間氣亦同候也帝曰間氣何謂間氣同候何謂岐伯曰司左右者是謂間氣也五運行大論云隨氣所在期於左右故司上下之左右者是謂間氣也間氣司上下之左右當與司天在泉同候矣帝曰何以異之間氣與司天在泉之氣何以異之岐伯曰主歲者紀歲間氣者紀步也主歲者司天在泉之氣也司天在泉主一歲之氣故主歲者紀歲間氣者上下左右之氣也上下左右分主六十日之一氣故間氣者紀步也六微旨大論云步者六十度而有奇六十度即六十日也帝曰善歲主奈何主歲者紀歲故問歲主奈何岐伯曰厥陰司天為風化在泉為酸化司氣為蒼化間氣為動化司天在泉司氣間氣皆為歲主伯故類舉以對陽為氣司天為陽故厥陰司天為風化厥陰司天巳亥歲也陰為味在泉為陰故厥陰在泉為酸化厥陰在泉寅申歲也司氣司歲之運氣也丁壬木運本於天之蒼氣故司氣為蒼化間氣上下左右之氣也五運行大論云上見太陽則左厥陰上見少陰則右厥陰太陽在下左厥陰少陰在下右厥陰辰戌子午厥陰居司天之左右丑未卯酉厥陰居在泉之左右故間氣為動化動風之搖動也少陰司天為熱化在泉為苦化不司氣化居氣為灼化子午之歲少陰司天為熱化卯酉之歲少陰在泉為苦化戊癸化火少陽司氣少陰君火不司氣化所以然者六氣之中有二火少陽相火合司氣之化而君火之尊不與也少陰不司氣化而間氣則居故居氣為灼化灼火之灼燔也蓋上見厥陰左少陰上見太陰右少陰厥陰在下左少陰太陰在下右少陰巳亥丑未少陰居司天之左右寅申辰戌少陰居在泉之左右也太陰司天為濕化在泉為甘化司氣為黅化間氣為柔化丑未之歲太陰司天為濕化辰戌之歲太陰在泉為甘化甲己化土本於天之黅化故司氣為黅化蓋上見少陰左太陰上見少陽右太陰少陰在下左太陰少陽在下右太陰子午寅申太陰居司天之左右卯酉巳亥太陰居在泉之左右故間氣為柔化柔土之濡弱也少陽司天為火化在泉為苦化司氣為丹化間氣為明化寅申之歲少陽司天為火化巳亥之歲少陽在泉為苦化戊癸化火本於天之丹氣故司氣為丹化上見太陰左少陽上見陽明右少陽太陰在下左少陽陽明在下右少陽丑未卯酉少陽居司天之左右辰戌子午少陽居在泉之左右故間氣為明化明火之光明也陽明司天為燥化在泉為辛化司氣為素化間氣為清化卯酉之歲陽明司天為燥化子午之歲陽明在泉為辛化乙庚化金本於天之素氣故司氣為素化上見少陽左陽明上見太陽右陽明少陽在下左陽明太陽在下右陽明寅申辰戌陽明居司天之左右巳亥丑未陽明居在泉之左右故間氣為清化清金之清肅也太陽司天為寒化在泉為咸化司氣為玄化間氣為藏化藏如字辰戌之歲太陽司天為寒化丑未之歲太陽在泉為咸化丙辛化水本於天之玄氣故司氣為玄化上見陽明左太陽上見厥陰右太陽陽明在下左太陽厥陰在下右太陽卯酉巳亥太陽居司天之左右子午寅申太陽居在泉之左右故間氣為藏化藏寒之凝斂也故治病者必明六化分治五味五色所生五臟所宜乃可以言盈虛病生之緒也六氣各有所化故治病者必明六化之分治其中復有酸苦甘辛鹹五味蒼黅丹素玄五色故必明五味五色所生而合於五臟之所宜然後乃可以言六氣化之盈虛病生之端緒也帝曰厥陰在泉而酸化先余知之矣同化之行也何如上文岐伯云地化與司天同候是厥陰司天其化以風厥陰在泉其化亦以風也帝故舉而問之岐伯曰風行於地所謂本也餘氣同法本乎天者天之氣也本乎地者地之氣也天地合氣六節分而萬物化生矣故曰謹候氣宜無失病機此之謂也厥陰在泉故風行於地六氣為本故所謂本也不但風氣為然其熱濕火燥寒之氣皆然故餘氣同法六氣司天而本乎天者即天之氣也六氣在泉而本乎地者即地之氣也司天在泉皆本六氣故天地合氣一歲六分之故六節分而萬物化生矣六節之氣各有所宜不宜則病故曰謹候氣宜無失病機即此六節分而萬物化生之謂也帝曰其主病何如謹候氣宜無失病機是六氣為萬物之主不宜則病故問主病何如岐伯曰司歲備物則無遺主矣司歲五運五行主歲也備物隨五行所主之運備五行所屬之物也隨司歲之氣以備物則謹候氣宜無失病機故無遺主矣帝曰先歲物何也五運五行六歲始復先備其物以候其用故問先歲物何也岐伯曰天地之專精也萬物之性不外五行五行之氣各主一歲隨五行所主之氣備五行所屬之物乃得天地之專精也帝曰司氣者何如五運五行六氣亦五行故問司氣者何如岐伯曰司氣者主歲同然有餘不足也六氣合五運司氣者必與主歲同謂之專精然司氣者多不能盡與主歲同而有有餘不足也六十年中惟乙卯乙酉丙辰丙戌丁巳丁亥戊子戊午戊寅戊申己丑己未十二年司氣與主歲同帝曰非司歲物何謂也非司歲所備之物何以不專精故又問之岐伯曰散也故質同而異等也氣味有薄厚性用有躁靜治保有多少力化有淺深此之謂也非司歲所備之物其氣散也故秉質同而等級異也所謂異等者氣味有薄厚薄則不足厚則有餘性用有躁靜躁則劣靜則優自氣味薄厚性用躁靜推之則治保有多少力化有淺深即此質同異等之謂也帝曰歲主藏害何謂害猶病也五運五行謂之歲主五運五行合於五臟不和則病故問歲主藏害何謂岐伯曰以所不勝命之則其要也水火金土木相為勝制受制則不勝不勝則病故以所不勝命之則其藏害之大要也帝曰治之奈何藏害而治之奈何岐伯曰上淫於下所勝平之外淫於內所勝治之司天在泉之理備於人身故舉上下外內以明藏害之治上淫於下謂司天之氣淫勝其在下之運氣當以所勝平之如少商金運火熱司天平以鹹寒之類外淫於內謂在泉之氣淫勝其在內之運氣當以所勝治之如少宮土運風木在泉治以辛涼之類曰平曰治言治之而得其平平之而得其治也帝曰善平氣如何無上下外內之勝制謂之平氣平氣何如岐伯曰謹察陰陽所在而調之以平為期正者正治反者反治人身之氣合於天地故當謹察陰陽所在而調和之大要以平為期正者正治言陽盛治陽陰盛治陰正治而得其平也反者反治言陽虛而陽反盛陰虛而陰反盛無容正治當反治而得其平也帝曰夫子言察陰陽所在而調之論言人迎與寸口相應若引繩小大齊等命曰平陰之所在寸口何如上文岐伯云察陰陽所在而調之以平為期靈樞禁服論云人迎主中寸口主外兩者相應若引繩小大齊等如是者名曰平人帝並舉其言謂寸口乃脈之大會而陰之所在寸口何如陰少陰也岐伯曰視歲南北可知之矣五運之中戊癸化火以戊癸之歲為南政甲乙丙丁己庚辛壬之歲為北政故視歲之南北可知其政矣帝曰願卒聞之岐伯曰北政之歲少陰在泉則寸口不應厥陰在泉則右不應太陰在泉則左不應南政之歲少陰司天則寸口不應厥陰司天則右不應太陰司天則左不應諸不應者反其診則見矣甲乙丙丁己庚辛壬北政之歲如卯酉陽明司天而少陰在泉少陰君火不司氣化則不與歲運相通故寸口之脈不應君火之氣也少陰不司氣化而左右之間氣則居如當厥陰在泉則少陰居厥陰之右故右不應言右位之少陰不應於寸口當太陰在泉則少陰居太陰之左故左不應言左位之少陰不應於寸口也戊癸配地支南政之歲如子午少陰司天少陰君火不司氣化故寸口之脈不應於君火之氣也如居左右之間氣而厥陰司天則右位之少陰不應於寸口太陰司天則左位之少陰不應於寸口六微旨大論云厥陰之右少陰治之少陰之右太陰治之是少陰居厥陰之右太陰之左故厥陰則右不應太陰則左不應也不應者少陽相火應在中之運而少陰君火之尊不司氣化不司氣化故不見於寸口也五運行大論云脈法曰天地之變無以脈診故申明諸不應者不當求之於診若反其診而求之則可見矣反猶離也由此觀之則陰之所在寸口當明其義而不診其脈也帝曰尺候何如因寸而問及於尺也岐伯曰北政之歲三陰在下則寸不應三陰在上則尺不應南政之歲三陰在天則寸不應三陰在泉則尺不應左右同故曰知其要者一言而終不知其要流散無窮此之謂也上文北政之歲三陰在泉則寸不應故曰北政之歲三陰在下則寸不應也以寸推尺如三陰在上則尺不應一如其寸也上文南政之歲三陰司天則寸不應故曰南政之歲三陰在天則寸不應也以寸推尺如三陰在泉則尺不應一如其寸也凡此不應但論少陰今曰三陰以少陰居厥陰之右少陰居太陰之左是左右同左右同者以太厥之左右而論少陰也故引六元正紀大論之言謂知其要者舉一可以類推故一言而終不知其要則流散無窮即此尺候之謂也帝曰善天地之氣內淫而病何如上天下地之氣勝其運氣內淫而發為民病何如承岐伯上淫於下外淫於內之意而復問也岐伯曰歲厥陰在泉風淫所勝則地氣不明平野昧草乃早秀民病灑灑振寒善申數缺心痛支滿兩脅裡急飲食不下膈咽不通食則嘔腹脹善噫得後與氣則快然如衰身體皆重數音朔下同厥陰在泉寅申歲也厥陰主風風淫所勝則塵土飛揚故地氣不明地氣不明則平野昏昧風動發陳故草乃早秀靈樞經脈論云胃是動則病灑灑振寒善申數缺脾脈上膈挾咽病則食不下食則嘔腹脹善噫得後與氣則快然如衰身體皆重乎厥陰之脈循胸出脅病則胸脅支滿心痛此厥陰風勝而胃土脾土受病也歲少陰在泉熱淫所勝則焰浮川澤陰處反明民病腹中常鳴氣上衝胸喘不能久立寒熱皮膚痛目瞑齒痛䪼腫惡寒發熱如瘧少腹中痛腹大蟄蟲不藏處去聲下命處之處同䪼音拙惡去聲下同藏如字少陰在泉卯酉歲也少陰主熱熱淫所勝則焰浮川澤焰浮川澤則陰處反明靈樞四時氣論云腹中常鳴氣上衝胸喘不能久立邪在大腸寒熱皮膚痛者肺病也目瞑齒痛䪼腫惡寒發熱如瘧者陽明病也少腹中痛腹大蟄蟲不藏者少陰火熱之氣也民病如是火淫金病也歲太陰在泉草乃早榮濕所勝則埃昏岩谷黃反見黑至陰之交民病飲積心痛耳聾渾渾焞焞嗌腫喉痹陰病見血少腹痛腫不得小便病沖頭痛目似脫項似拔腰似折髀不可以回膕如結腨如別焞音純折音舌見音現下見同回猶曲也太陰在泉辰戌歲也太陰土也土生萬物故草乃早榮太陰主濕濕淫所勝則埃昏岩谷謂塵埃岩谷皆昏昧也濕淫水溢故土色之黃反見其黑水土皆為至陰黃反見黑乃至陰之交民病飲積心痛土濕而火寒也經脈論云三焦是動則病耳聾渾渾焞焞咽腫喉痹此三焦火氣虛也陰病見血脾絡虛也少腹痛腫不得小便水道不行也又云膀胱是動則病沖頭痛目似脫項如拔腰似折髀不可以曲膕如結腨如裂此太陽水寒病也民病如是乃土濕火寒土勝水病也歲少陽在泉火淫所勝則焰明郊野寒熱更至民病注泄赤白少腹痛溺赤甚則血便少陰同候溺鳥去聲下同少陽在泉巳亥歲也少陽主火火淫所勝則焰明郊野火勝則熱熱極生寒故寒熱更至民病注泄赤白少腹痛溺赤甚則血液皆少陽三焦火熱病也少陽少陰皆屬於火火淫金病與少陰同候歲陽明在泉燥淫所勝則霿霧清瞑民病喜嘔嘔有苦善太息心脅痛不能反側甚則嗌乾面塵身無膏澤足外反熱陽明在泉子午歲也陽明主燥燥淫所勝則霿霧清瞑霿霧清瞑秋金之氣也膽病者嘔宿汁經脈論云膽是動則病口苦善太息心脅痛不能轉側甚者面微有塵體無膏澤足外反熱民病如是乃金淫木病膽屬木也歲太陽在泉寒淫所勝則凝肅慘栗民病少腹控睪引腰脊上衝心痛血見嗌痛頷腫睪音高下同見如字太陽在泉丑未歲也太陽主寒寒淫所勝則凝肅慘栗邪氣臟腑病形論云小腸病者小腹痛腰脊控睪而痛經脈論云小腸是動則病嗌痛頷腫小腸者心之腑故上腫心痛血見民病如是水淫火病也帝曰善治之奈何六氣淫勝發為民病治之奈何岐伯曰諸氣在泉風淫於內治以辛涼佐以苦甘以甘緩之以辛散之上文諸氣在泉如風淫於內木氣勝也金能平之故治以辛涼辛涼太過則佐以苦辛涼不及則佐以甘蓋苦勝金而甘生金也木氣急而虛則以甘緩之風邪勝而實則以辛散之熱淫於內治以鹹寒佐以甘苦以酸收之以苦發之熱淫於內火氣勝也水能平之故治以鹹寒鹹寒太過則以甘苦鹹寒不及則佐以苦蓋甘勝水而苦助寒也火氣急而虛則以酸收之火生於木補其母也火邪勝而實則以苦發之苦性雖寒本於火味故曰發發猶散也濕淫於內治以苦熱佐以酸淡以苦燥之以淡泄之濕淫於內土氣勝也濕為陰故治以火味之苦熱苦熱不及則佐以酸苦熱太過則佐以淡蓋酸生火而淡泄火也土氣虛而陰濕則以苦燥之土氣滯而不行則以淡泄之火淫於內治以鹹冷佐以苦辛以酸收之以苦發之火淫於內熱氣勝也水能平之故治以鹹冷冷猶寒也鹹冷太過則佐以苦鹹冷不及則佐以辛蓋苦味生土能制其水而辛能生水也以酸收之以苦發之與上文熱淫於內同一義也燥淫於內治以苦溫佐以甘辛以苦下之燥淫於內金氣勝也火能平之故治以苦溫苦溫太過金氣不足則佐以甘辛蓋甘生金而辛助金也苦溫不及金氣猶盛更以苦下之下猶制也寒淫於內治以甘熱佐以苦辛以咸瀉之以辛潤之以苦堅之寒淫於內水氣勝也土能平之火能溫之故治以甘熱甘熱太過水氣不足則佐以苦辛蓋苦性寒而助水辛屬金而生水也甘熱不及水氣猶盛則以咸瀉之申明佐以苦辛辛為金味以生水乃以辛潤之苦為寒性以助水乃以苦堅之凡此佐治之法義各不同學者當隨其所宜以為佐治可也帝曰善天氣之變何如上文論在泉之氣此復問天氣之變何如岐伯曰厥陰司天風淫所勝則太虛埃昏雲物以擾寒生春氣流水不冰民病胃脘當心而痛上支兩脅膈咽不通飲食不下舌本強食則嘔冷泄腹脹溏泄瘕水閉蟄蟲不去病本於脾衝陽絶死不治強去聲下同厥陰司天巳亥歲也風淫所勝則太虛如塵埃之昏昧雲物以擾而不寧冬寒春風寒生春氣本於寒而生春氣之風也風性撓動故流水不冰經脈論云脾脈屬脾絡胃上膈挾咽其支者別上膈注心中是動則病舌本強食則嘔胃脘痛腹脹食不下心下急痛溏泄瘕水閉民病如是乃風淫木勝脾土病也蟄蟲不去者蟄蟲藏於中土土氣不舒故不去也去猶出也凡此皆病本於脾若陽明胃脈之衝陽絶則死不治衝陽在足跗上動脈應手者是也少陰司天熱淫所勝怫熱至火行其政民病胸中煩熱嗌乾右胠滿皮膚痛寒熱咳喘大雨且至唾血血泄鼽衄嚏嘔溺色變甚則瘡瘍胕腫肩背臂臑及缺盆中痛心痛肺䐜腹大滿膨脹而咳喘病本於肺尺澤絶死不治少陰司天子午歲也熱淫所勝則怫熱至而火行其政怫猶郁也民病胸中煩熱嗌乾右胠滿皮膚痛寒熱咳喘火盛而肺金病也大雨且至言怫熱之時且有大雨之至雨雖至而火氣盛故唾血血泄鼽衄火淫其血液也嚏嘔溺色變火淫其水津也甚則瘡瘍胕腫火淫其肌肉也經脈論云肺脈起於中焦循臑臂內是動則病肺脹滿膨膨而喘咳缺盆中痛氣盛則肩背痛風寒汗出氣虛則肩背痛寒溺色變也凡此民病皆本於肺若肺脈之尺澤絶則死不治尺澤在時內廉大紋中肺之合穴也太陰司天濕淫所勝則沉陰且布雨變枯槁胕腫骨痛陰痹陰痹者按之不得腰脊頭項痛時眩大便難陰氣不用飢不欲食咳唾則有血心如懸病本於腎太溪絶死不治太陰司天丑未歲也濕淫所勝則沉陰且布沉陰布而雨降則雨變枯槁言草之枯槁因雨濕而滋潤也靈樞五邪篇云邪在腎則病骨痛陰痹陰痹者按之不得腹脹腰痛大便難肩背頸項痛時眩又經脈篇云腎是動則病飢不飲食咳唾則有血心如懸也凡此胕腫骨痛諸病皆本於腎若腎之太溪脈絶則死不治太溪在足內踝後跟骨上陷中之動脈也少陽司天火淫所勝則溫氣流行金政不平民病頭痛發熱惡寒而瘧熱上皮膚痛色變黃赤傳而為水身面胕腫腹滿仰息泄注赤白瘡瘍咳唾血煩心胸中熱甚則鼽衄病本於肺天府絶死不治惡去聲少陽司天寅申歲也火淫所勝則溫氣流行金受火淫故金政不平民病頭痛發熱惡寒而瘧熱上皮膚痛火淫肺金也五邪篇云邪在肺則病皮膚痛寒熱者是也色變黃赤即上文溺色變也傳而為水言色變黃赤乃火淫水熱傳為水病也身面胕腫腹滿喘息泄注赤白瘡瘍咳唾血煩心胸中熱甚則鼽衄即上文瘡瘍胕腫咳喘唾血血泄鼽衄胸中熱煩之病故病亦本於肺火淫金病也若肺脈之天府絶則死不治天府在腋下三寸動脈應手者是也陽明司天燥淫所勝則木乃晚榮草乃晚生筋骨內變民病左胠脅痛寒清於中感而瘧大涼革候咳腹中鳴注泄鶩溏名木斂生菀於下草焦上首心脅暴痛不可反側嗌乾面塵腰痛丈夫㿗疝婦人少腹痛目昧眥瘍瘡痤癰蟄蟲未見病本於肺太衝絶死不治未舊本訛來今改陽明司天卯酉歲也燥淫所勝金勝木虛則木乃晚榮草乃晚生肝血不榮養其筋骨而筋骨內變則民病左胠脅痛寒清之金氣客於中則感而為瘧春行秋令則大涼革候革候則病咳腹中鳴注泄鶩溏矣木乃晚榮則名木斂而生氣鬱於下草乃晚生則草焦上首而瘁於上經脈論云膽是動則病心脅痛不能轉側肝是動則病嗌乾面塵腰痛丈夫㿉疝婦人少腹腫也目為肝竅故目昧膽脈起於目鋭眥故眥瘍瘡疵癰者肝血虛也蟄蟲未見者蟄蟲見於春今草木晚發故蟄蟲未見而病本於肝若肝脈之太衝絶則死不治太衝在足大趾本節後二寸肝經之俞穴也太陽司天寒淫所勝則寒氣反至水且冰血變於中發為癰瘍民病厥心痛嘔血血泄鼽衄善悲時眩僕運火炎烈雨暴乃雹胸腹滿手熱時攣腋腫心憺憺大動胸脅胃脘不安面赤目黃善噫嗌乾甚則色炲渴而欲飲病本於心神門絶死不治太陽司天辰戊歲也寒淫所勝則寒氣反至反至者非其時也水且冰者凍已解而水冰也寒氣凝斂則血變於中而發為癰瘍民病厥心痛善悲時眩僕者五邪篇云邪在心則病心痛喜悲時眩僕也血變於中外不發為癰瘍則內嘔血而血泄鼽衄此寒勝火鬱之病也若運火炎烈而寒氣上淫則雨暴乃雹火受水制則胸腹滿經脈論云心主包絡是動則病手心熱臂時攣急腋腫甚則胸脅支滿心中憺憺大動面赤目黃又云心是動則病嗌乾心痛渴而欲飲甚則色炲火從水色也凡此諸病乃水淫火鬱皆本於心若心脈之神門絶死不治神門在掌後鋭骨端心之俞穴也所謂動氣知其臟也總結上文而言脾之衝陽肺之尺澤天府腎之太溪肝之太衝心之神門皆動脈應手所謂動氣診其動氣而知其五臟之死生也帝曰善治之奈何司天氣勝發為民病治之奈何岐伯曰司天之氣風淫所勝平以辛涼佐以苦甘以甘緩之以酸瀉之外淫於內所勝治之故上文在泉曰治上淫於下所勝平之故此司天曰平平猶治也風淫所勝木氣勝也金能治之故平以辛涼辛涼太過則佐以苦辛涼不及則佐以甘蓋苦勝金而甘生金也木氣急而虛則以甘緩之風邪勝而實則以酸瀉之以明不但金味能瀉而木之本味亦能瀉也瀉猶達也達之所以散之也熱淫所勝平以鹹寒佐以苦甘以酸收之熱淫所勝火氣勝也水能治之故平以鹹寒鹹寒太過則佐以苦甘甘為土味以勝水苦為火味以平寒也鹹寒不及則以酸收之收之而助其鹹寒也濕淫所勝平以苦熱佐以酸辛以苦燥之以淡泄之濕上甚而熱治以苦溫佐以甘辛以汗為故而止濕淫所勝土氣勝也濕氣為陰火能治之故平以火味之苦熱苦熱不及則佐以酸苦熱太過則佐以辛蓋酸為木味以生火辛為全味以生水也土氣寒濕以苦燥之土氣炎燥以淡泄之泄滲泄也寒類於濕燥類於熱濕上甚而熱是寒熱相兼既濕且燥宜從外解故治以苦溫苦溫所以散寒濕也佐以甘辛甘辛所以滋燥熱也必以汗為復其故而病可止此土淫所勝而有寒濕燥熱之氣也火淫所勝平以鹹冷佐以苦甘以酸收之以苦發之以酸復之熱淫同鹹冷舊本訛酸冷今改火淫所勝熱氣勝也水能治之故平以鹹冷鹹冷太過則佐以苦甘苦為火味以平冷甘為土味以勝水也鹹冷不及則以酸收之收之而助其鹹冷也火淫而熱氣過盛以苦發之發之而熱氣內減仍以酸復之此以苦發之以酸復之上文熱淫所勝未之言也故復言熱淫同燥淫所勝平以苦溫佐以酸辛以苦下之燥淫所勝金氣勝也火能治之故平以苦溫苦溫不及則佐以酸苦溫太過則佐以辛蓋酸生火而辛生水也燥淫而全氣過盛則以苦下之寒淫所勝平以辛熱佐以甘苦以咸瀉之寒淫所勝水氣勝也燥火能治之故平以燥氣之辛火氣之熱辛熱不及則佐以甘苦甘生金而苦助火也辛熱太過則以咸瀉之凡此佐平之法味各不同理無不合學者當隨其所宜以為佐平可也帝曰善邪氣反勝治之奈何上文治之平之是以所勝氣味治平淫勝倘氣味太過則邪氣反勝故承上文之意而復問之岐伯曰風司於地清反勝之治以酸溫佐以苦甘以辛平之先舉在泉之勝氣以明之上文云風淫於內治以辛涼是風司於地清反勝之清氣反勝今當治以酸溫酸生火溫勝清也酸溫不及清氣猶勝則佐以苦苦助溫也酸溫太過金氣過虛則佐以甘甘生金也凡此治佐以金之清氣反勝味屬於辛乃以辛而如是以平之上文在泉氣勝則曰治司天氣勝則曰平今論在泉亦曰平以明治之即所以平之平之即所以治之故於此復言平之下文司天邪勝並不言平也熱司於地寒反勝之治以甘熱佐以苦辛以鹹平之上文云熱淫於內治以鹹寒是熱司於地反勝之寒氣反勝今當治以甘熱甘勝水熱勝寒也甘熱不及寒氣猶勝則佐以苦苦生甘也甘熱太過水氣過虛則佐以辛辛生水也凡此治佐以水之寒氣反勝味屬於咸乃以咸而如是以平之濕司於地熱反勝之治以苦冷佐以鹹甘以苦平之上文云濕淫於內治以苦熱是濕司於地熱反勝之熱氣反勝今當治以苦冷苦性寒而冷勝熱也苦冷不及熱氣猶勝則佐以咸咸助冷也苦冷不過熱氣過虛則佐以甘甘勝水也凡此治佐以火之熱氣反勝味屬於苦乃以苦而如是以平之火司於地寒反勝之治以甘熱佐以苦辛以鹹平之上文云火淫於內治以鹹冷是火司於地寒反勝之寒氣反勝今當治以甘熱甘勝水而熱溫寒也甘熱不及寒氣猶勝則佐以苦苦助熱也甘熱太過寒氣過虛則佐以辛辛生水也凡此治佐以水之寒氣反勝味屬於咸乃以咸而如是以平之燥司於地熱反勝之治以辛寒佐以苦甘以辛平之以和為利辛寒舊本訛平寒辛平舊本訛酸平今改上文云燥淫於內治以苦寒是燥司於地熱反勝之熱氣反勝今當治以辛寒辛生水而寒勝熱也熱反勝而金氣猶盛則佐以苦苦勝金也熱反勝而金氣過虛則佐以甘甘生金也凡此治佐以燥司於地味屬於辛乃以辛而如是以平之上文所佐之味皆因反勝之味有太過不及而佐之此所佐之味不因辛寒之太過不及仍因燥金之太過不及是佐司地之味不佐所勝之味也至以辛平之亦言司地之味不言所勝之味是佐雖不同大要以和為利爾蓋治所勝之味未得其平佐之得宜則司地之氣自和司地之氣未得其平佐之得宜則所勝之氣亦和凡此乃以和為利貴學者之能善悟也寒司於地熱反勝之治以鹹冷佐以甘辛以苦平之上文云寒淫於內治以甘熱是寒司於地熱反勝之熱氣反勝今當治以鹹冷咸助水而冷勝熱也鹹冷太過則佐以甘甘勝水也鹹冷不及則佐以辛辛生水也凡此治佐以火之熱氣反勝味屬於苦乃以苦而如是以平之帝曰其司天邪勝何如其司天邪勝治之何如岐伯曰風化於天清反勝之治以酸溫佐以甘苦上文云風淫所勝平以辛涼是風化於天清反勝之清氣反勝今當治以酸溫佐以甘苦與司地邪勝同一義也熱化於天寒反勝之治以甘溫佐以苦酸辛上文云熱淫所勝平以鹹寒是熱化於天寒反勝之寒氣反勝今當治以甘溫甘溫不及則佐以苦酸苦生甘而酸生熱也甘溫太過則佐以辛辛生水也濕化於天熱反勝之治以苦寒佐以苦酸上文云濕淫所勝平以苦熱是濕化於天熱反勝之熱氣反勝今當治以苦寒苦寒不及則佐以苦助其寒也苦寒太過則佐以酸酸生火也火化於天寒反勝之治以甘熱佐以苦辛上文云火淫所勝平以鹹冷是火化於天寒反勝之寒氣反勝今當治以甘熱佐以苦辛與司地邪勝同一義也燥化於天熱反勝之治以辛寒佐以苦甘上文云燥淫所勝平以苦溫是燥化於天熱反勝之熱氣反勝今當治以辛寒佐以苦甘與司地邪勝同一義也寒化於天熱反勝之治以鹹冷佐以苦辛上文云寒淫所勝平以辛熱是寒化於天熱反勝之熱氣反勝今當治以鹹冷佐以苦辛上文司地佐以甘辛蓋苦能生甘其義一也帝曰六氣相勝奈何上文邪勝乃氣味太過故復有六氣相勝之問岐伯曰厥陰之勝耳鳴頭眩憒憒欲吐胃膈如寒大風數舉倮蟲不滋胠脅氣並化而為熱小便黃赤胃脘當心而痛上支兩脅腸鳴飧泄少腹痛注下赤白甚則嘔吐膈咽不通厥陰之勝風氣勝也風勝則耳鳴頭眩鳴眩無定則憒憒欲吐欲吐不吐則胃膈如寒凡此鳴眩欲吐如寒皆火風數舉之所致也風者木也木克其土則倮蟲不滋不滋燥而不潤也木氣內逆不能樞轉從外則胠脅氣並化而為熱熱鬱於下則小便黃赤熱鬱於上則胃脘當心而痛上支兩脅熱滋於下不和於中則腸鳴飧泄少腹痛注下赤白熱鬱於上不和於中甚則嘔吐膈咽不通少陰之勝心下熱善飢齊下反動氣遊三焦炎暑至木乃津草乃萎嘔逆躁煩腹滿痛溏泄傳為赤沃齊臍同少陰之勝熱氣勝也熱勝則心下熱而善飢熱勝於上不足於下則臍下反動臍下相火之所居也臍下反動則氣遊三焦三焦少陽也少陰少陽兩火相合氣如炎暑故炎暑至至極也炎暑已極則木乃流津草乃焦萎少陽三焦不和則嘔逆少陽心腎不交則躁煩君相二火逆於中土不能外出則腹滿痛溏泄甚則傳為赤沃赤沃血液也太陰之勝火氣內郁瘡瘍於中流散於外病在胠脅甚則心痛熱格頭痛喉痹項強獨勝則濕氣內郁寒迫下焦痛留頂互引眉間胃滿雨數至燥化乃息少腹滿腰脽重強內不便善注泄足下溫頭重足脛胕腫飲發於中胕腫於上息舊本訛見今改太陰之勝濕氣勝也濕勝則火鬱故火氣內郁火鬱則瘡瘍於中從中而流散於皮膚之外其瘡瘍在胠脅之皮膚故曰病在胠脅若瘡瘍於中不能流散於外甚則心痛而熱格矣熱格於上則頭痛喉痹項強此火氣內鬱而有如是之病也若非火氣內郁而太陰之氣獨勝則濕氣內郁濕氣為寒故寒迫下焦太陰主濕太陽主寒寒迫下焦則太陽之氣不能從經脈而開於外故痛留巔頂而互引眉間蓋太陽之脈起於目內眥從眉間而上額交巔也濕氣內郁則太陰之氣不能從經脈而開於內故胃滿雨濕之氣數至而燥化乃息蓋太陰之脈屬脾絡胃此脾胃不和燥濕之氣不相交濟而然也少腹滿腰脽重強內不小便善注泄此太陽寒水之為病也足下溫頭重足脛與胕皆腫飲發於中而胕腫於上此太陰濕土之為病也少陽之勝熱客於胃煩心心痛目赤欲嘔嘔酸善飢耳痛溺赤善驚譫妄暴熱消爍草萎水涸介蟲乃屈少腹痛下沃赤白少陽之勝火氣勝也火勝故熱客於胃胃絡通心故煩心痛火熱上炎則目赤火熱在中則欲嘔嘔酸善飢水陰不濡空竅則耳痛火熱之氣下行水府則溺赤水火陰陽不相交濟則善驚譫妄暴熱而消爍萬物則草萎水涸金類之介蟲乃屈火熱之氣傷其血液則少腹痛下沃赤白陽明之勝清發於中左胠脅痛溏泄內為嗌塞外發㿗疝大涼肅殺華英改容毛蟲乃殃胸中不便嗌塞而咳便平聲下同陽明之勝金氣勝也金勝故清發於中金勝木虛故左胠脅痛清發於中故大便溏泄塞干塞也㿗疝猶㿉疝也經脈論云肝是動病丈夫㿗疝甚則嗌乾此肝木受病故內為嗌塞外發㿗疝金氣勝故大涼肅殺則草之華英改容木類之毛蟲乃殃經脈不能從肝貫膈上注於肺故胸中不便嗌塞而咳太陽之勝凝栗且至非時水冰羽乃後化痔瘧發寒厥入胃則內生心痛陰中乃瘍隱曲不利互引陰股筋肉拘苛血脈凝泣絡滿色變或為血泄皮膚痞腫腹滿食減熱反上行頭項囟頂腦戶中痛目如脫寒入下焦傳為濡瀉泣音澀痞批上聲下同囟囟同音信太陽之勝寒氣勝也寒勝則凝栗且至有非時之水冰水寒氣勝火熱受制故火類之羽蟲後時生化寒勝火鬱則痔瘧乃發痔與瘧皆寒勝火鬱之病也寒勝厥逆而入於胃則內生心痛心痛胃脘當心聲痛也寒入陰中則陰中乃瘍陰中乃瘍則隱曲不利從陰中而互引陰股則筋肉拘苛筋攣急曰拘肉暴痛曰苛內則血脈凝泣外則絡滿色變通評虛實論帝有經虛絡滿之問或為血泄血脈凝澀而下泄也皮膚痞腫絡脈色變而外浮也皮膚痞腫則腹滿食減或為血泄則熱反上行則頭頂囟頂腦戶中皆痛甚則目如脫經脈論云足太陽之脈病沖頭痛目似脫痔瘧頭囟項痛若寒入下焦決瀆有乖則傳為濡瀉帝曰治之奈何六氣相勝治之奈何岐伯曰厥陰之勝治以甘清佐以苦辛以酸瀉之甘者土之味清者金之氣土金相生以治厥陰風本之勝佐以苦辛者苦為火味以生土辛為金味以制木所以助其甘清也木性條達酸主收斂反其性而斂之則瀉故以酸瀉之少陰之勝治以辛寒佐以苦鹹以甘瀉之辛者金之味寒者水之氣金水相生以治少陰火熱之勝佐以苦鹹者苦雖火味其氣則寒咸為水味所以助其辛寒也火性急速反其性而緩之則瀉故以甘瀉之太陰之勝治以咸熱佐以辛甘以苦瀉之咸者水之味熱者火之氣太陰土燥咸以治之太陰土濕熱以治之佐以辛甘者土氣有餘辛以散之土氣不足甘以資之土性喜溫反其性而寒之則瀉土性喜潤反其性而燥之則瀉苦為火味性燥而寒故以苦瀉之土位中央灌溉四旁氣貴和平故其治佐如此下文陽明之勝亦言以苦瀉之其義一也少陽之勝治以辛寒佐以甘鹹以甘瀉之少陽之治與少陰同苦為火味故不曰佐以苦鹹而曰佐以甘鹹甘為土味以生金所以助其辛寒也陽明之勝治以酸溫佐以辛甘以苦泄之酸為木味溫為火氣木火相生以治陽明金氣之勝陽明有燥金之氣有清金之氣燥氣有餘故佐辛以散之清氣不足故佐甘以滋之以苦泄之而同於太陰也不曰瀉而曰泄者以明瀉之乃所以泄也太陽之勝治以甘熱佐以苦酸以咸瀉之苦舊本訛辛今改甘為土味熱為火氣火土相生以治太陽寒水之勝佐以苦酸者木火相生所以助其甘熱也水性善下反其性而凝之則瀉故以咸瀉之帝曰六氣之復何如有六氣之勝即為六氣之復故復問之岐伯曰悉乎哉問也厥陰之復少腹堅滿裡急暴痛偃木飛沙倮蟲不榮厥心痛汗發嘔吐飲食不入入而復出筋骨掉眩清厥甚則入脾食痹而吐衝陽絶死不治始焉受制既乃復也其氣雖復經脈未和故厥陰之復少腹堅滿裡急暴痛風氣盛故偃木飛沙木盛土衰故倮蟲不榮厥心痛者靈樞厥論篇云厥心痛色蒼如死狀終日不得太息肝心痛也汗發風傷肌腠也嘔吐肝氣逆也肝氣逆故飲食不入入而復出也筋骨掉眩風氣盛也清厥手足清冷厥逆也甚則木克其土病入於脾故食痹而吐痹閉也上閉不達故吐也若木盛土衰至胃脈之衝陽絶則死不治少陰之復懊熱內作煩躁鼽嚏少腹絞痛火見燔焫嗌燥分注時止氣動於左上行於右咳皮膚痛暴喑心痛鬱冒不知人乃灑淅惡寒振栗詀妄寒已而熱渴而欲飲少氣骨痿膈腸不便外為浮腫噦噫赤氣後化流水不冰熱氣大行介蟲不復病痱疹瘡瘍癰疽痤痔甚則入肺咳而鼻淵天府絶死不治便如字受制而復經脈未和故少陰之復懊熱內作煩躁鼽嚏少陰從下而上故少腹絞痛上合君火故火見燔焫嗌燥熱氣下逆則分注分小便之水津從大便而如注也時止者時注時止止而復注也氣動於左少陰之腎氣也上行於右上乘於肺也上乘於肺故咳皮膚痛肺主聲肺病故暴喑心屬少陰熱氣有餘故心痛痛極則鬱冒不知人熱氣內郁則生外寒故外乃灑淅惡寒內則振栗譫妄若寒已而熱則渴而欲飲若詀妄已則少氣振栗已則骨痿陰陽水火不交會於中土則膈腸不便外則發為浮腫土氣並虛故或噦或噫少陰之氣先郁後復先鬱則赤氣後化後復則流水不冰而熱氣大行金類之介蟲不復熱行於外則病痱疹瘡瘍癰疽痤痔熱甚入肺則咳而鼻淵若火盛金衰至肺脈之天府絶則死不治太陰之復濕變乃舉體重中滿食飲不化陰氣上厥胸中不便飲發於中咳喘有聲大雨時行鱗見於陸頭頂痛重而掉瘛尤甚嘔而密默唾吐清液甚則入腎竅瀉無度太溪絶死不治太陰受制則濕氣不變不舉今太陰之復濕變乃舉受制而復經脈未和故體重中滿食飲不化濕為陰氣陰氣上厥則胸中不便便猶利也胸中不便則飲發於中而咳喘有聲矣大雨時行土之濕也鱗見於陸土濕水訊也濕傷太陽之經脈則頭頂痛重而掉瘛尤甚濕傷陽明之經脈則嘔而密默唾吐清液甚則濕邪入腎而竅瀉無度前後二陰者腎之竅前陰水竅俱從大便而出故曰竅瀉若土盛水衰至腎脈之太溪絶則死不治少陽之復大熱將至枯燥燔爇介蟲乃耗驚瘛咳衄心熱煩躁便數憎風厥氣上行面如浮埃目乃瞤瘛火氣內發上為口糜嘔逆血溢血泄發而為瘧惡寒鼓栗寒極反熱嗌絡焦槁渴飲水漿色變黃赤少氣脈萎化而為水傳為胕腫甚則入肺咳而血泄尺澤絶死不治便如字少陽受制則熱氣不行今少陽之復大熱將至熱將至則枯燥燔焫金受火刑則介蟲乃耗民病驚瘛咳衄火刑肺金之病也心熱煩躁火氣乘心之病也少陽三焦之氣不和則小便數而外憎風便數憎風則厥氣上行厥氣上行則面如浮埃目乃瞤瘛此少陽厥氣上行而生陽之氣不榮於面目也若火氣內發則上為口糜中為嘔逆下為血溢血泄此少陽火氣內發而三焦之氣不和於上中下也少陽之氣發為瘧病則惡寒鼓栗寒極反熱熱則嗌絡焦槁渴飲水漿溺色變為黃赤此少陽瘧發之病也少氣脈萎化而為水傳為胕腫此少陽元真之氣內虛也甚則邪火入肺咳而血泄致火盛金衰而肺脈之尺澤絶則死不治陽明之復清氣乃舉森木蒼干毛蟲乃厲病生胠脅氣歸於左善太息甚則心痛痞滿腹脹而泄嘔苦咳噦煩心病在膈中頭痛甚則入肝驚駭筋攣太衝絶死不治陽明受制則清氣不舉今陽明之復則清氣大舉木受金刑則森木蒼干毛蟲乃厲厲猶病也病生胠脅氣歸於左肝木病也善太息膽木病也甚則清氣太過而心痛以及痞滿腹脹而泄陽明氣逆則嘔苦肺胃不和則咳胸有固寒則噦胃絡不通於心則煩心而病在膈中厥陰肝脈上出額與督脈會於巔肝脈病故頭痛甚則金氣入肝而驚駭筋攣若金盛木衰至肝脈之太衝絶則死不治太陽之復厥氣上行水凝雨冰羽蟲乃死心胃生寒胸膈不利心痛痞滿頭痛善悲時眩僕食減腰脽反痛屈伸不便地裂冰堅陽光不治少腹控睪引腰脊上衝心唾出清水及為噦噫甚則入心善忘善悲神門絶死不治厥氣寒氣也太陽受制則寒氣不行今太陽之復寒氣上行寒氣上行則水凝雨冰水勝火滅故火類之羽蟲乃死寒氣盛故心胃生寒心胃生寒故胸膈不利胸膈不利故心痛痞滿太陽經脈上行於頭故頭痛陰氣盛故善悲頭痛則時眩僕中土虛寒則食減太陽經脈不和則腰脽反痛而屈伸不便寒氣已極則地裂冰堅而陽光不治寒氣在下則少腹控睪由下而中則引腰脊由中而上則上衝心寒氣上衝則唾出清水及為噦為噫噦噫者火土不相生也甚則寒氣入心故善忘善悲若水盛火衰至心脈之神門絶則死不治帝曰善治之奈何六氣之復治之奈何岐伯曰厥陰之復治以酸寒佐以甘辛以酸瀉之以甘緩之治復之法但當助其本氣惟熱燥之氣有餘或當折之或當助之也酸者木之味寒者水之氣治以酸寒助木氣也恐寒氣之過甚則佐以甘恐酸味之過甚則佐以辛夫治以酸寒者乃以酸瀉之瀉舒也下瀉仿此佐以甘辛者乃以甘緩之酸寒而但曰酸甘辛而但曰甘省文也此治厥陰之復助之而不折之也少陰之復治以鹹寒佐以苦辛以甘瀉之以酸收之辛苦發之以咸耎之咸者水之味寒者水之氣治以鹹寒折火氣也火氣過虛則佐以苦苦為火味以助火也火氣過盛則佐以辛辛為金味以生水也或以甘瀉之而平其水或以酸收之而生其火夫佐以苦辛者辛苦乃所以發之治以鹹寒者乃以咸折之此治少陰熱氣之復或助之而或折之也太陰之復治以苦熱佐以酸辛以苦瀉之燥之泄之苦為火味熱為火氣治及苦熱助土氣也火氣不足則佐以酸木生火也火氣過甚則佐以辛金生水也夫治以苦熱者乃以苦瀉之以熱燥之土濕則燥之土燥則泄之此治太陰之復助之而不折之也少陽之復治以鹹冷佐以苦辛以咸耎之以酸收之辛苦發之發不遠熱無犯溫涼少陰同法治以鹹冷折火氣也火氣過虛則佐以苦火氣過盛則佐以辛或以咸耎之而泄其火或以酸收之而生其火夫佐以苦辛者辛苦乃所以發之辛金味也苦火味也申明辛苦發之乃發不遠熱也發不遠熱則用其熱以助火無犯溫以涼治之法少陽少陰皆屬於火故此治佐之法與少陰同陽明之復治以辛溫佐以苦甘以苦泄之以苦下之以甘補之甘補之甘舊本訛酸今改辛為金味以助金溫為火氣以折金治以辛溫金氣平矣苦為火味以折金甘為土味以生金佐以苦甘金氣平矣或金氣有餘則但以苦泄之以苦下之金氣不足則但以甘補之此治陽明燥氣之復或折之而或助之也太陽之復治以咸熱佐以甘辛以苦堅之咸為水味以助水熱為火氣以溫寒治以咸熱助水氣也水氣盛則佐以甘水氣虛則佐以辛水得其平無容補瀉則但以苦堅之水寒而濟以火味水火既濟則堅固也此治太陽之復助之而不折之也治諸勝復寒者熱之熱者寒之溫者清之清者溫之散者收之抑者散之燥者潤之急者緩之堅者軟之脆者堅之衰者補之強者瀉之各安其氣必清必靜則病氣衰去歸其所宗此治之大體也強如字總結上文諸勝復之治而言治之大體如是也帝曰善氣之上下何謂也承上文勝復而問勝氣居上復氣居下氣之上下在於人身發為民病何謂也岐伯曰身半以上其氣三矣天之分也天氣主之身半以下其氣三矣地之分也地氣主之以名命氣以氣命處而言其病半所謂天樞也故上勝而下俱病者以地名之下勝而上俱病者以天名之所謂勝至報氣屈伏而未發也復至則不以天地異名皆如復氣為法也分去聲陰陽系日月論云腰以上為天腰以下為地天為陽地為陰正月六月主足之少陽二月五月主足之太陽三月四月主足之陽明是人身三陽之氣主歲半以上故曰身半以上其氣三矣天為陽乃天之分也天分則天氣主之又云七月十二月主足之少陰八月十一月主足之太陰九月十月主足之厥陰是人身三陰之氣主歲半以下故曰身半以下其氣三矣地為陰乃地之分也地分則地氣主之身半以上之三氣名曰少陽太陽陽明身半以下之三氣名曰少陰太陰厥陰是以三陽三陰之名而命身半以上身半以下之氣也足少陽之脈起於目鋭眥足太陽之脈起於目內眥足陽明之脈起於鼻頞中是三陽者天之分也其經脈之氣皆起於上足少陰之脈起於足小趾之下足太陰之脈起於足大趾之端足厥陰之脈起於足大趾叢毛之際是三陰者地之分也其經脈之氣皆起於下是以在上在下之氣而命經脈循引之處也以名命氣以氣命處而後可言其內外上下之病人身天樞之穴居臍之上對腰之中故申明身半以上身半以下之半者所謂天樞也故身半以上之陽氣勝而身半以下俱病者其病在地以地名之身半以下之陰氣勝而身半以上俱病者其病在天以天名之夫氣勝之時復氣屈而不伸故所謂勝至其報復之氣尚屈伏而未發也如復氣既至則無分上下故不以天地異名皆如復氣為法也下文云有勝則復無勝則痞是復有一定之成法也帝曰勝復之動時有常乎氣有必乎承復氣為法之意問勝復之動一歲六時有常數乎所勝之氣有可必乎岐伯曰時有常位而氣無必也一歲六時始於厥陰終於太陽時有常位而氣之勝復則因勝以復無可必也帝曰願聞其道也時有常位則氣有常勝有常勝則有常復故願聞勝復之常道也岐伯曰初氣終三氣天氣主之勝之常也四氣盡終氣地氣主之復之常也有勝則復無勝則痞春夏為陽陽者天氣也故初氣終三氣天氣主之先勝後復勝氣常在歲半之上故為勝之常也秋冬為陰陰者地氣也故四氣盡終氣地氣主之復氣常在歲半之下故為復之常也有勝則有復無勝則無復此為勝復之常而勝復之變不可為期帝曰善復已而勝何如有勝則復理之常也復已而又有所勝則何如岐伯曰勝至則復無常數也衰乃止耳復已而勝不復則害此傷生也數如字下無問其數之數同至猶極也其復也勝極則復復無常數也復氣自衰方乃止耳衰乃止則復已復已而又有所勝若復已而所勝不復則害不復則害此傷生也如水勝火屈火復則傷金火氣已金氣又當復勝如不復勝則金受火害不能相生餘氣仿此帝曰復而反病何也不復則害復而反病則又何也岐伯曰居非其位不相得也大復其勝則主勝之故反病也所謂火燥熱也勝氣在歲半之上復氣在歲半之下如燥氣之復當少陽相火之四氣風氣之復當陽明燥金之五氣火氣熱氣之復當太陽寒水之終氣皆居非其位居非其位不相得也始勝終復雖大復其勝則主時之氣勝之故反病也居非其位者火氣熱氣居太陽寒水之位燥氣居少陽相火之位所謂火燥熱也例而推之風木之氣居陽明燥金之位亦在其中土濕之氣主於四時故不與也帝曰治之何如復而反病治之何如岐伯曰夫氣之勝也微者隨之甚者制之氣之復也和者平之暴者奪之皆隨勝氣安其屈伏無問其數以平為期此其道也六氣之勝有微甚六氣之復有和暴夫氣之勝也勝氣微者隨順以治之勝氣甚者制伏以治之氣之復也復氣和者平以治之復氣暴者奪以治之勝氣固勝而復氣猶勝治之之法皆隨其勝氣以安其屈伏無問氣味多寡之數大要以平為期此其治之之道也帝曰善客主之勝復奈何一歲之中有加臨之客氣有六位之主氣或主氣勝客氣或客氣勝主氣有勝則復帝故問之岐伯曰客主之氣勝而無復也合六氣而論之有勝則有復而客主之氣同時同位主氣一定客氣變遷故但有勝而無復也帝曰其逆從何如主氣客氣彼此相勝有勝之而逆有勝之而從故問逆從何如岐伯曰主勝逆客勝從天之道也六氣主歲每歲皆同氣之常也加臨客氣隨司天在泉而遷轉氣之暫也常可屈而暫不可屈故主氣勝客氣則為逆而客氣勝主氣則為從此因司天而有客氣之勝故曰天之道也帝曰其生病何如主客之氣有勝無復然皆發為民病故問其生病何如岐伯曰厥陰司天客勝則耳鳴掉眩甚則咳主勝則胸脅痛舌難以言客勝主勝勝氣雖有不同而人身經脈之病皆應司天之氣下文在泉亦有主客勝氣之不同而下身經脈之病皆應在泉之氣也厥陰司天初之客氣陽明燥金二之客氣太陽寒水三之客氣厥陰風木客勝者凡此三氣皆可勝也耳鳴掉眩風動之病也甚則肝氣上逆而咳主勝者初之氣厥陰風木二之氣少陰君火三之氣太陰濕土凡此三氣皆可勝也三氣主時每歲皆然下俱仿此胸脅痛肝木之病也舌難以言嗌乾而舌難言也少陰司天客勝則鼽嚏頸項強肩背瞀熱頭痛少氣發熱耳聾目瞑甚則胕腫血溢瘡瘍咳喘主勝則心熱煩躁甚則脅痛支滿少陰司天初之客氣太陽寒水二之客氣厥陰風木三之客氣少陰火熱凡此客氣皆可勝也少陰腎氣虛於上則鼽嚏頸項強肩背瞀熱頭痛少陰心氣虛於內則少氣發熱耳聾目瞑甚則胕腫少陰熱氣傷其血分不充膚腠則血溢瘡瘍咳喘若主時之氣勝則少陰心腎不交故心熱煩躁甚則病及心包而脅痛支滿太陰司天客勝則首面胕腫呼吸氣喘主勝則胸腹滿食已而瞀太陰司天初之客氣厥陰風木二之客氣少陰君火三之客氣太陰濕土凡此客氣皆可勝也首面胕腫濕淫病也呼吸氣喘太陰病也若主時之氣勝則脾胃之氣不和而胸腹滿瞀目垂貌食已而瞀轉輸不捷也少陽司天客勝則丹疹外發及為丹熛瘡瘍厄逆喉痹頭痛嗌腫耳聾血溢內為瘛瘲主勝則胸滿咳仰息甚而有血手熱疹疹同熛音飄少陽司天初之客氣少陰君火二之客氣太陰濕土三之客氣少陽相火凡此客氣皆可勝也丹疹外發及為丹熛瘡瘍火氣外淫也嘔逆喉痹頭痛嗌腫耳聾火氣內逆也熱傷血分則血溢血不榮筋則內為瘛瘲若主時之氣勝則少陽三焦之氣不和故胸滿咳仰息始則火熱傷氣既則傷其血分故甚而有血不但病足之經脈兼病手之經脈故手熱蓋手之三陽從手走頭也陽明司天清復內余則咳衄嗌塞心膈中熱咳不止而白血出者死陽明者清氣也清復內余言陽明司天受客氣主氣之勝則陽明清氣鬱而不舒故司天於上而復有餘於內也清復內郁則金氣不伸故咳衄嗌塞心膈中熱白血肺臟之血也若咳不止而白血出則肺氣並傷故死不言客勝主勝但言清復內余以明六氣雖有客主之勝而皆病司天之氣乃舉一以例其餘下文太陽在泉亦然太陽司天客勝則胸中不利出清涕感寒則咳主勝則喉嗌中鳴太陽司天初之客氣少陰相火二之客氣陽明燥金三之客氣太陽寒水凡此客氣皆可勝也胸中不利寒氣內隔也出清氣皮毛不利也感寒則咳寒氣外感於皮毛則肺受之而病咳也若主時之氣勝則太陽寒水上逆故喉嗌中鳴鳴水聲也厥陰在泉客勝則大關節不利內為痙強拘瘛外為不便主勝則筋骨繇並腰腹時痛繇搖同四氣盡終氣地氣主之厥陰在泉四之客氣陽明燥金五之客氣太陽寒水終之客氣厥陰風木凡此客氣皆可勝也大關節不利大筋拘急也痙強拘瘛筋不和於內也不便乃舉止不快筋不和於外也主勝者四之氣少陽相火五之氣陽明燥金終之氣太陽定水凡此三氣皆可勝也三氣之勝下文皆同筋骨搖並猶之內為痙強拘瘛也腰腹時痛猶之外為不便也少陰在泉客勝則腰痛尻股膝髀腨胕足病瞀熱以酸胕腫不能久立溲便變主勝則厥氣上行心痛發熱膈中衆痹皆作發於胠脅魄汗不藏四逆而起便如字下便具同酸痠同藏如字少陰在泉四之客氣太陽寒水五之客氣厥陰風木終之客氣少陰君火凡此客氣皆可勝也腰者腎之外候腰痛腎虛也少陰之脈從足而上腰痛則尻股膝髀腨䯒足皆病矣垂目曰瞀瞀熱以酸言火氣上淫目熱以酸則垂目也心膂曰胕心氣虛寒故胕腫不能久立骨虛也溲便變腎虛也若主時之氣勝則少陰厥氣上行厥氣上行內外不合則心痛發熱心痛發熱陰陽不和則膈中衆痹皆作夫厥氣上行則不能樞轉故病發於胠脅心痛發熱則陽氣外浮故皮毛之魄汗不藏膈中衆痹皆作則氣機盡郁故四逆而起太陽在泉客勝則足痿下重便溲不時濕客下焦發而濡瀉及為腫隱曲之疾主勝則寒氣逆滿食飲不下甚則為疝瀉泄通下便瀉之瀉仿此太陰在泉四之客氣厥陰風木五之客氣少陰君火終之客氣太陽濕土凡此客氣皆可勝也足痿下重足太陰之脈不能循經而上也便溲不時小便頻數而短少也若太陽濕氣客於下焦則發為大便之濡瀉濡瀉溏泄也及為腫隱曲之疾言隱曲之處發為腫疾亦濕客下焦之所致也主勝則寒濕之氣內逆中滿脾不轉輸而食飲不下甚則土受木刑而為疝少陽在泉客勝則腰痛而反惡寒甚則下白溺白主勝則熱反上行而客於心心痛發熱格中而嘔少陰同候少陽在泉四之客氣少陰君火五之客氣太陽濕土終之客氣少陽相火凡此客氣皆可勝也少陽初陽之氣不能自下而上則腰腹痛不能自內而外則反惡寒甚則下焦虛寒而下白溺白下白大便白也溺白小便白也主勝則君相二火交熾故熱反上行而少陽火氣上客於心故心痛發熱心痛發熱則火氣格中而嘔相火君火而上行則君火亦可合相火而下盛故少陰同候陽明在泉客勝則清氣動下少腹堅滿而數便瀉主勝則腰重腹痛少腹生寒下為鶩溏則寒厥於腸上衝胸中甚則喘不能久立數音朔鶩音務陽明在泉四之客氣太陰濕土五之客氣少陽相火終之客氣陽明燥金凡此客氣皆可勝也客勝則陽明清肅之氣動於下清氣下動則少腹堅滿始雖堅滿繼而數便瀉便瀉大便溏泄也主勝則腰重腹痛少腹生寒亦清氣之下動也始則少腹生寒而下為鶩溏則寒厥於腸而上衝胸中上衝胸中甚則為喘不能久立太陽在泉寒復內余則腰尻痛屈伸不利股脛足膝中痛太陽者寒氣也寒腹內余言太陽在泉受客氣主氣之勝則太陽寒氣屈而不舒故寒氣在泉於下而復有餘於內也寒腹內余則太陽經脈不舒故腰尻痛屈伸不利而股脛足膝中痛不言客勝主勝但言寒復內余乃舉一以例其餘以明六氣雖有客主勝而皆病在泉之經脈也帝曰善治之奈何客勝主勝經氣受病治之奈何岐伯曰高者抑之下者舉之有餘折之不足補之佐以所利和以所宜必安其主客適其寒溫同者逆之異者從之高者抑之下者舉之得其中矣有餘折之不足補之得其平矣佐以所利和以所宜順其性也然必安其主客適其寒溫調其味也同者主氣清寒加以清寒之客氣主氣溫熱加以溫熱之客氣此為過盛故當逆之逆之者抑之折之也異者主氣清寒加以溫熱之客氣主氣溫熱加以清寒之客氣此非過盛故當從之從之者舉之補之也帝曰治寒以熱治熱以寒氣相得者逆之不相得者從之余已知之矣其於正味何如承上文寒熱逆從之治而問主客之正味也治寒以熱治熱以寒氣同而相得者逆之氣異而不相得者從之上文言之故已知之然非氣運本位之正味故問其正味何如岐伯曰木位之主其瀉以酸其補以辛六氣主時之位不外木火土金水之五行主位者氣之常故先瀉後補加臨者氣之客故先補後瀉初之氣厥陰風木木位之主木氣勝也木勝曰發生酸則反其性而收之故其瀉以酸辛則助其上達故其補以辛火位之主其瀉以甘其補以咸二之氣少陰君火火位之主火氣勝也火勝曰赫曦甘則反其性而緩之故其瀉以甘咸能耎堅助其暢達故其補以咸少陰少陽皆火位之主少陰如是則少陽亦如是也土位之主其瀉以苦其補以甘三之氣太陰濕土土位之主土氣勝也土勝曰敦阜苦則反其性而泄之故其瀉以苦甘則助其和緩故其補以甘金位之主其瀉以辛其補以酸五之氣陽明燥金金位之主金氣勝也金勝曰堅成辛則反其性而散之故其瀉以辛酸則助其凝斂故其補以酸水位之主其瀉以咸其補以苦終之氣太陽寒水水位之主水氣勝也水勝曰流衍咸則反其性而凝之故其瀉以咸苦則氣寒助其寒水故其補以苦厥陰之客以辛補之以酸瀉之以甘緩之此六氣客勝其補瀉之味一如上文之主勝也上文木位之主其補以辛其瀉以酸此厥陰之客補瀉相同以甘緩之者藏氣法時論云肝苦急急食甘以緩之少陽之客以咸補之以甘瀉之以咸收之上文火位之主其補以咸其瀉以甘此少陰之客補瀉相同以咸收之者藏氣法時論云心欲耎急食鹹以耎之耎之即所收之故此言收下文少陽則言耎也太陽之客以甘補之以苦瀉之以甘緩之上文土位之主其補以甘其瀉以苦此太陰之客補瀉相同以甘緩之者藏氣法時論云脾欲緩急食甘的緩之少陽之客以咸補之以甘瀉之以咸耎之少陽少陰皆屬於火同一義也陽明之客以酸補之以辛瀉之以苦泄之上文金位之主其補以酸其瀉以辛此陽明之客補瀉相同以苦泄之者藏氣法時論云肺苦氣上逆急食苦以泄之太陽之客以苦補之以咸瀉之以苦堅之以辛潤之開發腠理致津液通氣也上文水位之主其補以苦其瀉以咸此太陽之客補泄相同藏氣法時論云腎欲堅急食苦以堅之腎苦燥急食辛以潤之開腠理致津液通氣也此以苦堅之云云其義一也凡此皆主氣客氣之正味也帝曰善願聞陰陽之三也何謂上文岐伯云身半以上其氣三矣身半以下其氣三矣帝舉以問謂陰陽止有少太何以有三岐伯曰氣有多少異用也陰陽之氣由少而太太多也少少也陰陽之氣有多少之異用也帝曰陽明何謂也太多少少則陽明何謂岐伯曰兩陽合明也有少陽之陽有太陽之陽兩陽相合而明則中有陽明也帝曰厥陰何也太少之中有陽明何以厥陰不居二陰之中故問厥陰何也岐伯曰兩陰交盡也從少而太則中有陽明由太而少則終有厥陰有太陰之陰有少陰之陰兩陰交盡而有厥陰也帝曰氣有多少病有盛衰治有緩急方有大小願聞其約奈何兩陽合明陽之多也兩陰交盡陰之少也陰陽之三仍屬氣之多少故舉氣有多少而探病之盛衰以及治之緩急方之大小期於約言不繁故願聞其約岐伯曰氣有高下病有遠近證有中外治有輕重適其至所為故也氣有多少者氣有高下也謂陽氣多而居高陰氣少而居下病有盛衰者病有遠近證有中外也謂病久遠而在中則盛病新近而在外則衰治有緩急者治有輕重也謂緩病之治宜輕急病之治宜重更當適其病至之所為復其故也大要曰君一臣二奇之制也君二臣四偶之制也君二臣三奇之制也君二臣六偶之制也故曰近者奇之遠者偶之汗者不以奇下者不以偶補上治上制以緩補下治下制以急急則氣味厚緩則氣味薄適其至所此之謂也奇音箕下同方有大小者大要君一臣二合而為三乃陽奇之制也君二臣四合而為六乃陰偶之制也奇數之大則君二臣三亦奇之制也偶數之大則君二臣六亦偶之制也品數少而分兩多故曰君品數多而分兩少故曰臣方之奇偶因病之遠近以為用故曰近者奇之遠者偶之謂近病為陽宜用奇方以治之遠病為陰宜用偶方以治之發汗為陽攻下為陰汗則從陰出陽地氣升而為云為雨故汗者以偶不以奇下則從陽入陰天氣降而能瀉能輸故下者以奇不以偶治之緩急因病之上下以為用病在上而補上治上則制方以緩病在下而補下治下則制方以急制以急則氣味宜厚氣味厚則能下行也制以緩則氣味宜薄氣味薄則能上行也上文云治有輕重適其病至之所故曰適其至所即此緩急厚薄之謂也病所遠而中道氣味之者食而過之無越其制度也是故平氣之道近而奇偶制小其服也遠而奇偶制大其服也大則數少小則數多多則九之少則二之奇之不去則偶之是謂重方偶之不去則反佐以取之所謂寒熱溫涼反從其病也重平聲下同藥味入口先歸中道然後行於上下故服藥先後制方大小皆以病之上下遠近為法也病所遠者在上在下之病而遠於中道也而中道氣味之者氣味先歸中道也食而過之者以食之先後使藥之過於上下也如病在上而遠於中則先食後藥使過於上病在下而遠於中則先藥後食使過於下此服藥先後之法無越其制度可也服藥先後以病之上下遠近為法則制方用藥正氣自平是故平氣之道其病在上而近而用奇偶之方則制小其服也其病在下而遠而用奇偶之方則制大其服也大則分兩多而品數少氣味專而能遠也小則分兩少而品數多氣味薄而易散也奇數終於九故數多則九之無以加矣偶數始於二故數少則二之無以減矣奇偶雖殊合而並用故奇之而病不去則偶之先奇後偶是謂重方若偶之而病仍不去則反佐以取之反佐以取者以寒治寒以熱治熱以溫治溫以涼治涼所謂寒熱溫涼反從其病而取治之也此制方大小以病之上下遠近為法者如此帝曰善病生於本余知之矣生於標者治之奈何風熱濕火燥寒六氣所謂本也上文詳言之故曰病生於本余知之矣三陰三陽之氣為標故問生於標者治之奈何岐伯曰病反其本得標之病治反其本得標之方如太陽以寒為本以熱為標病反其本寒得標陽之熱病則不治其寒而治其熱故治反其本得標之方六氣標本之治仿此類推然從本從標復有不同有如下文所云也帝曰善六氣之勝何以候之六氣者五行也五行者五臟也氣勝則臟病故問六氣之勝何以候之岐伯曰乘其至也清氣大來燥之勝也風木受邪肝病生焉熱氣大來火之勝也金燥受邪肺病生焉寒氣大來水之勝也火熱受邪心病生焉濕氣大來土之勝也寒水受邪腎病生焉風氣大來木之勝也土濕受邪脾病生焉所謂感邪而生病也乘年之虛則邪甚也失時之和亦邪甚也遇月之空亦邪甚也重感於邪則病危矣有勝之氣其必來復也候之之法當乘其氣至之時而候之也如清氣大來燥金之勝也金刑其木風木受邪而肝病生焉矣熱氣大來火刑其金則肺病生焉矣寒氣大來而心病生濕氣大來而腎病生風氣大來而脾病生皆受制生病所謂感邪而生病也邪之感也如主歲之氣不及而乘年之虛則邪甚也主時之氣不及而失時之和亦邪甚也主日之氣不及而遇月之空亦邪甚也年之虛時之失月之空有一於此則病若重感於邪則病危矣此皆有勝之氣而為病須知有勝之氣其必來復也帝曰其脈至何如六氣之勝必形於脈故問其脈至何如岐伯曰厥陰之至其脈弦少陰之至其脈鉤太陰之至其脈沉少陽之至大而浮陽陰之至短而澀太陽之至大而長厥陰屬木故其脈弦少陰屬火故其脈鉤太陰屬土故其脈沉少陽屬火故大而浮陽明屬金故短而澀太陽屬水為諸陽主氣故大而長至而和則平至而甚則病至而反者病至而不至者病未至而至者病陰陽易者危和調和也六脈之至至而調和則為平脈甚過盛也六脈之至至而過盛則為病脈春弦夏鉤秋浮冬沉春得秋脈夏得冬脈秋得夏脈冬得長夏脈至而反時者病時至而脈不至者病時未至而脈先至者病春夏為陽秋冬為陰春夏見陰脈秋冬見陽脈是為陰陽易陰陽易者危帝曰六氣標本所從不同奈何三陰三陽六氣之標也風火濕熱燥寒六氣之本也標本陰陽不同則所從亦不同帝故問之岐伯曰氣有從本者有從標本者有不從標本者也從本者從風熱濕火燥寒之氣也從標本者或從三陰三陽之氣或從風熱濕火燥寒之氣也不從標本者從中見之氣也帝曰願卒聞之從本從標本不從標本願卒聞之岐伯曰少陽太陰從本少陰太陽從本從標陽明厥陰不從標本從乎中也故從本者化生於本從標本者有標本之化從中者以中氣為化也氣有從本者少陽太陰是也少陽之氣惟火熱太陰之氣惟陰濕皆從本氣以為生化也氣有從標本者少陰太陽是也少陰本熱標陰太陽本寒標熱有寒熱陰陽之氣故從本從標以為生化也氣有不從標本者陽明厥陰是也兩陽合明陽之極矣無取乎燥從中見太陰之氣以為生化兩陰交盡陰之極矣無取乎風從中見少陽之氣以為生化也帝曰脈從而病反者其診何如承上文三陰三陽之脈而復問也上文云厥陰之至其脈弦少陰之至其脈鉤太陰之至其脈沉少陽之至大而浮陽明之至短而澀太陽之至大而長脈從陰陽而病相反則診之不易故舉以問岐伯曰脈至而從按之不鼓諸陽皆然三陽之脈脈至而從脈雖見陽必按之不鼓按之不鼓病必相反諸陽脈而病反者皆然也帝曰諸陰之反其脈何如陽脈按之不鼓諸陰之反其脈何如岐伯曰脈至而從按之鼓甚而盛也脈至而從三陰脈也脈雖見陰按之必鼓甚而盛所以諸陰之脈而病反也是故百病之起有生於本者有生於標者有生於中氣者有取本而得者有取標而得者有取中氣而得者有取標本而得者有逆取而得者有從取而得者逆正順也若順逆也故曰知標與本用之不殆明知逆順正行無間此之謂也不知是者不足以言診足以亂經故大要曰粗工嘻嘻以為可知言熱未已寒病復始同氣異形迷診亂經此之謂也承脈從病反之義而推言百病之起有生於本氣者有生於標氣者有生於中見之氣者因其所生取而治之始得其真然取治之法又有逆取而得者有從取而得者逆取而得則逆取正為順也若不逆取而順反為逆也故曰知標與本用之不殆明知逆順正行無間即此脈從病反之謂也苟不知此以診是為迷診亂經大要云云其粗工之龜鑑歟夫標本之道要而博小而大可以言一而知百病之害言標與本易而弗損察本與標氣可令調明知勝復為萬民式天之道畢矣易去聲承上文而言標本之道至精至微所該者廣故要而能博小而能大可以言一而知百病之害也故一言標與本則施治平易而弗之損察一本與標則六氣雖病而可令調知標本則知勝復可為萬民之式而上天之道畢矣帝曰勝復之變早晏何如承明知勝復之言而探勝復早晏之變岐伯曰夫所勝者勝至已病病已慍慍而復已萌也夫所復者勝盡而起得位而甚勝有微甚復有少多勝和而和勝虛而虛天之常也勝者復之基夫所勝者勝氣至則已病病方已中猶慍慍之時而復氣已萌也故夫所復者必勝氣盡而復始起得位而復方甚然所勝之氣有微甚則所復之氣有少多故勝和而復亦和勝虛而復亦虛此天之常數為然也帝曰勝復之作動不當位或後時而至其故何也當去聲帝必欲詳明勝復早晏之變故復問之動不當位氣之早也後時而至氣之晏也岐伯曰夫氣之生與其化衰盛異也寒暑溫涼盛衰之用其在四維故陽之動始於溫盛於暑陰之動始於清盛於寒春夏秋冬各差其分故大要曰彼春之暖為夏之暑彼秋之忿為冬之怒謹按四維斥候皆歸其終可見其始可知此之謂也差音雌下同一歲四時春溫夏暑秋涼冬寒萬物生化有盛有衰故夫氣之生物與其化物有衰盛之異也氣之寒暑溫涼為生化盛衰之用生化盛衰其在氣交之四維四維者冬春之交春冬之交夏秋之交秋冬之交也氣交先期而甚則勝復早而盛氣交後期而微則勝復晏而衰故陽之動始於春氣之溫盛於夏氣之暑陰之動始於秋氣之清盛於冬氣之寒春夏秋冬四維之交或先或後各差其分分猶度也差其分而勝復有早晏也故舉脈要精微論之言大要曰彼春之暖而為夏之暑彼秋之忿而為冬之怒由此言之則當謹按氣交之四維氣交之候猶斥候也謹按四維則斥候皆歸其終可見其始可知即此勝復早晏之謂也帝曰差有數乎春夏秋冬各差其分則差有數乎岐伯曰又凡三十度也三十度一月也十二月而得春氣三月而得夏氣六月而得秋氣九月而得冬氣其氣至早所差凡三十度正月未溫猶得冬氣四月未夏猶得春氣七月未秋猶得夏氣十月未秋猶得秋氣其氣晏至所差亦三十度故曰又凡三十度也帝曰其脈應皆何如春夏秋冬有四時之氣則有四時之脈今差其分則其脈應皆何如岐伯曰差同正法待時而去也脈要曰春不沉夏不弦冬不澀秋不數是謂四塞沉甚曰病弦甚曰病澀甚曰病數甚曰病參見曰病復見曰病未去而去曰病去而不去曰病反者死故曰氣之相守司也如權衡之不得相失也夫陰陽之氣清靜則生化治動則苛疾起此之謂也蓋以四時正氣之法揆之則知其差故曰差同正法也待時而去者四維之交待主時之氣至而後去也如春受冬氣夏受春氣秋受夏氣冬受秋氣氣相通也故脈之大要曰春不沉夏不弦冬不澀秋不數前氣不交於本位是謂四塞夫氣不相通四塞者病若其氣之交交而太過者亦病故春脈沉甚曰病夏脈弦甚曰病冬脈澀甚曰病秋脈數甚曰病參見者春初之脈沉弦並見夏初之脈弦數並見之類復見者主時之脈已去非其王時而復見也未去而去者後氣未交未當去而先去也去而不去者後氣已交應去而猶不去也脈氣如是皆謂之病反者春得秋脈夏得冬脈長夏得春脈秋得夏脈冬得長夏脈脈非其時反受克賊已病而見此脈者死故曰氣之相守而司於脈也如權與衡之不得相失也故夫陰陽之氣清靜則生化治不清靜而動亂則苛疾起即此相守司而不得相失謂也帝曰幽明何如一歲四時有陰有陽秋冬為陰幽也春夏為陽明也故問幽明何如岐伯曰兩陰交盡故曰幽兩陽合明故曰明幽明之配寒暑之異也秋清冬寒兩陰交盡而始春故曰幽春溫夏暑兩陽合明而始秋故曰明日月運行一寒一暑故幽明之配乃寒暑之異也知寒暑之往來則知一歲之幽明矣帝曰分至何如承寒暑之意問一歲之中二分二至何如岐伯曰氣至之謂至氣分之謂分至則氣同分則氣異所謂天地之正紀也夏至則夏氣已至冬至則冬氣已至故氣至之謂至春分則與冬氣分秋分則與夏氣分故氣分之謂分夏至氣同於夏冬至氣同於冬故至則氣同春分與冬氣分秋分與夏氣分故分則氣異二分在仲春仲秋二至在仲夏仲冬非若四維之季孟相交此所謂天地之正紀也帝曰夫子言春秋氣始於前冬夏氣始於後余已知之矣然六氣往復主歲不常也其補瀉奈何上文岐伯云陽之動始於溫陰之動始於清是春秋之氣始於前也陽盛於暑陰盛於寒是冬夏之氣始於後也然春夏秋冬六氣往復以主歲是主歲之氣不常也其補瀉之味奈何岐伯曰上下所主隨其攸利正其味則其要也左右同法大要曰少陽之主先甘後咸陽明之主先辛後酸太陽之主先咸後苦厥陰之主先酸后辛少陰之主先甘後咸太陰之主先苦後甘佐以所利資以所生是謂得氣一歲之中司天在泉上下所主自有常氣當隨其所利而正其味則其補瀉之火要也上下止二氣合上下之左右而六氣周故曰左右同法六氣補瀉正味上文言之詳矣上文云火位之主其瀉以甘其補以咸故少陽主治之味大要先甘後咸金位之主其瀉以辛其補以酸故陽明主治之味大要先辛後酸水位之主其瀉以咸其補以苦故太陽主治之味大要先咸後苦木位之主其瀉以酸其補以辛故厥陰主治之味大要先酸后辛少陰之主與少陽同土位之主其瀉以苦其補以甘故太陰主治之味大要先苦後甘六氣補瀉之正味如此尤必佐以所利資以所生是謂得氣帝曰善夫百病之生也皆生於風寒暑濕燥火以之化之變也經言盛者瀉之虛者補之余錫以方士而方士用之尚未能十全余欲令要道必行桴鼓相應猶拔刺雪汙工巧神聖可得聞乎汙汙同百病之生不越風寒暑濕燥火六氣之變化補瀉施治未能十全必治之十全而要道可行桴鼓相應猶刺雖久而可拔汙雖久而可雪工巧臻於神聖不同方士帝故問之岐伯曰審察病機無失氣宜此之謂也一歲六氣各有所宜變化為病各有其機故當審察病機無失氣宜此即神聖之謂也帝曰願聞病機何如病機無窮審察不易故願聞之岐伯曰諸風掉眩皆屬於肝諸寒收引皆屬於腎諸氣膹郁皆屬於肺諸濕腫滿皆屬於脾諸熱瞀瘛皆屬於心心舊本訛火今改有病無形之氣而內屬於形藏者有病有形之本而內屬於氣化者皆病機也如諸風而頭目掉眩病皆屬於肝風氣通於肝也諸寒而經脈收引病皆屬於腎寒氣通於腎也諸氣而胸膈忿鬱病皆屬於肺諸氣通於肺也諸濕而身體腫滿病皆屬於脾濕氣通於脾也諸熱而目瞀經瘛病皆屬於心熱氣通於心也此病無形之六氣而內屬於有形之形藏也諸痛癢瘡皆屬於火諸厥固泄皆屬於下諸痿喘嘔皆屬於上火舊本訛心今改諸痛癢瘡皆屬於手少陽三焦之火諸寒厥而固泄皆屬於下下下焦也諸痿痹而喘嘔皆屬於上上上焦也是三焦火熱之氣有餘則諸瘡痛癢而病於外三焦火熱之氣不足則諸厥固泄諸痿喘嘔而病於內以明三焦之氣遊行於上下出入於內外也諸禁鼓栗如喪神守皆矚於火禁作噤喪去聲諸口噤無言而身鼓栗如喪神明失其內守乃手少陰心經之病心者火也故皆屬於火諸痙項強皆屬於濕痙手足搐搦也諸痙急而項背強乃足太陽膀胱之病膀胱者水濕之府故皆屬於濕諸逆衝上皆屬於火諸氣逆而衝於胸膈之上乃手厥陰心包之病心包者火也故皆屬於火諸脹腹大皆屬於熱諸脹滿而腹大乃足太陰脾經之病熱濕相蒸脾土受病故皆屬於熱諸躁狂越皆屬於火諸躁擾不寧狂煩越度乃足陽明胃經之病陽明者燥熱之氣也故皆屬於火諸暴強直皆屬於風諸一時卒暴筋強而直屈伸不能乃足厥陰肝經之病厥陰主風故皆屬於風諸病有聲鼓之如鼓皆屬於熱諸病而鼻息有聲氣上行而鼓動之如鼓聲者然乃手太陰肺經之病肺主氣氣為陽故皆屬於熱諸病胕腫疼酸驚駭皆屬於火酸同痠胕腫肉腫也肉腫則疼酸氣機不順則驚駭乃手陽明大腸之病陽明者燥熱之氣也故皆屬於火諸轉反戾水液渾濁皆屬於熱戾了戾也諸轉反戾則溲便不利溲便不利則水液渾濁乃手太陽小腸之病太陽者陽熱之氣也故皆屬於熱諸病水液澄徹清冷皆屬於寒水液澄徹清冷則下焦虛寒乃足少陰腎經之病腎主水寒故皆屬於寒諸嘔吐酸暴注下迫皆屬於熱嘔吐酸水暴注下迫乃膽足少陽之病少陽者火也故皆屬於熱此病有形之形藏而內屬於無形之六氣也故大要曰謹守病機各司其屬有者求之無者求之盛者責之虛者責之必先五勝疏其血氣令其調達而致和平此之謂也承上文而總結之以明審察之法也上文諸病有屬於肝心脾肺腎者有屬於風火熱濕寒者故大要曰謹守病機各司其屬有屬形藏之有形者當求之而得其真有屬氣化之無形者亦當求之而得其真有餘而盛者不得其平故當責之不及而虛者不得其平亦當責之必先知五行之勝若勝則當疏其血氣令其調達而致和平即此有無求之盛虛責之之謂也帝曰善五味陰陽之用何如疏其血氣令其調達必有五味陰陽之用故相繼而問之岐伯曰辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽六者或收或散或緩或急或燥或潤或耎或堅以所利而行之調其氣使其平也五味陰陽之用彼此相濟以成如辛主發散從內而外必濟以甘故辛甘之味為能發散而屬乎陽苦主湧泄從中上湧從中下泄必濟以酸故酸苦之味為能湧泄而屬於陰鹹味潤下主能下泄能下泄即能上湧故鹹味湧泄為陰五味之外復有淡味淡主漬滲能漬滲即能行泄故淡味滲泄為陽此辛甘酸苦鹹淡六者氣味雖殊功用相濟或收或散者收而能散散而能收也或緩或急者緩而能急急而能緩也或燥或潤者燥而能潤潤而能燥也或耎或堅者耎而能堅堅而能耎也此五味陰陽相濟以為功也各以所利而行之疏其血氣也調其氣令其調達也疏其血氣令其調達而致和平故曰使其平也帝曰非調氣而得者治之奈何有毒無毒何先何後願聞其道承調氣使平之言而復問也謂非調氣而得則當以藥治之藥之有毒無毒調治何先何後必有其道故願聞之岐伯曰有毒無毒所治為主適大小為制也治病各有其主藥之有毒無毒以所治之病為主更適方之大小以為制此其道也帝曰請言其制請言大小之制岐伯曰君一臣二制之小也君一臣三佐五制之中也君一臣三佐九制之大也寒者熱之熱者寒之微者逆之甚者從之堅者削之客者除之勞者溫之結者散之留者攻之燥者濡之急者緩之散者收之損者益之逸者行之驚者平之上之下之摩之浴之薄之劫之開之發之適事為故制方之道君一臣二無庸佐使制濟之小也君一臣三佐五製劑之中也君一臣三佐九製劑之大也制小制中制大大要病寒者熱治之病熱者寒治之病微者逆治之病甚者從治之病堅者消削之邪客者除去之勞虛者溫以治之結聚者散以治之留著者攻以治之燥熱者濡以治之急疾者緩以治之耗散者收以治之損傷者益以治之逸置者行之驚駭者平之或舉而上之或推而下之或膏以摩之或湯以浴之或緩治以薄之或急治以劫之或開導之或發散之凡此皆各適其事之所宜為復其故帝曰何謂逆從微者逆之甚者從之何謂岐伯曰逆者正治從者反治從小從多觀其事也逆者以寒治熱以熱治寒是為正治從者以熱治熱以寒治寒是為反治制方小大從小從多則觀其事之所宜也帝曰反治何謂正治者治之正反治者治之反故問反治何謂岐伯曰熱因寒用寒因熱用塞因塞用通因通用必伏其所主而先其所因其始則同其終則異可使破積可使潰堅可使氣和可使必已反治之道必以熱治熱服藥宜涼是熱因寒用也以寒治寒服藥宜溫是寒因熱用也補藥治中滿是塞因塞用也攻藥治下利是通因通用也此寒熱通塞之治後必伏其所主之病而先其所因以投之熱治熱寒治寒塞用塞通用通是其始則同熱者寒寒者熱塞者通通者塞是其終則異塞因塞用則正氣自強故可使破積可使潰堅通因通用則邪不能容故可使氣和可使必已此反治之道也帝曰善氣調而得者何如上文論反治帝欲詳明正治故問氣調而得何如岐伯曰逆之從之逆而從之從而逆之疏氣令調則其道也氣調而得正治之法也上文云逆者正治故逆之乃所以從之逆治而從之若從治而反為逆之矣逆治之道即上文疏其血氣令其調達之義故曰疏氣令調則其道也帝曰善病之中外何如中猶內也病有從內而外者有從外而內者故復問病之中外以悉其機岐伯曰從內之外者調其內從外之內者治其外從內之外而盛於外者先調其內而後治其外從外之內而盛於內者先治其外而後調其內中外不相及則治主病治病必求於本故從內之外者當調其內從外之內者當治其外從內之外而盛於外者亦先調其內而後治其外從外之內而盛於內者亦先治其外而後調其內內病於臟腑故曰調外病於肌腠故曰治內病在內外病在外中外不相及則但治其主病帝曰善火熱復惡寒發熱有如瘧狀或一日發或間數日發其故何也承上文內外之病而問寒熱似瘧或一日發或間數日發其在中在外何如岐伯曰勝復之氣會遇之時有多少也陰氣多而陽氣少則其發日遠陽氣多而陰氣少則其發日近此勝復相薄盛衰之節瘧亦同法火熱而復惡寒惡寒而復發熱此為勝復之氣或一日發或數日發此為會遇之時寒熱有盛衰發日有遠近此勝復之氣會遇之時而有多少也間數日發者病氣在陰陰氣多而陽氣少則其發間數日而遠一日發者病氣在陽陽氣多而陰氣少則其發一日而近此即勝復之氣相薄而有盛衰之節也雖寒熱有如瘧狀究之瘧亦同法帝曰論言治寒以熱治熱以寒而方士不能廢繩墨而更其道也有病熱者寒之而熱有病寒者熱之而寒二者皆在新病復起奈何治此復舉寒熱而探其治也上文岐伯云寒者熱之熱者寒之故問論言治寒以熱治熱以寒而方士不能廢繩墨而更其道然寒熱相兼有病熱者先寒之而熱有病寒者先熱之而寒寒之熱之二者皆在寒之而熱熱之而寒則新病復起何如以治岐伯曰諸寒之而熱者取之陰熱之而寒者取之陽所謂求其屬也諸寒之而熱者以寒為本故取之陰當以熱藥治之諸熱之而寒者以熱為本故取之陽當以寒藥治之夫寒之而熱治之以熱熱之而寒治之以寒所謂求其屬以治之也帝曰善服寒而反熱服熱而反寒其故何也承上文之意而復問也服寒治熱而反熱服熱治寒而反寒新病復起其故何也岐伯曰治其王氣是以反也王去聲下同春溫夏熱秋清冬寒四時之王氣也王氣當順之若以寒治熱以熱治寒治其王氣是以反熱反寒也帝曰不治王而然者何也有不治王氣而反熱反寒者何岐伯曰悉乎哉問也不治五味屬也夫五味入胃各歸所喜故酸先入肝苦先入心甘先入脾辛先入肺咸先入腎久而增氣物化之常也氣增而久夭之由也故舊本誤攻今改不治王氣而五味之屬有以治之也夫五味入胃從胃而各歸其所喜故酸味先入肝苦味先入心甘味先入脾辛味先入肺鹹味先入腎味久而增其藏氣乃物化之常也藏氣增而日久則此勝彼衰乃夭之由也所以反熱反寒而病不愈也帝曰善方制君臣何謂也五味不可偏勝故方制君臣帝相因而問之岐伯曰主病之謂君佐君之謂臣應臣之謂使非上中下三品之謂也使去聲主病之藥多其分兩謂之君佐君之藥少其分兩謂之臣應臣之藥分兩更少謂之使非神農所取上中下三品之謂也帝曰三品何謂神農三品何謂岐伯曰所以明善惡之殊貫也惡如字神農本經三百六十五種以應周天之數上品一百二十五種為君中品一百二十種為臣下品一百二十種為佐使上品無毒主養命延年益氣輕身中品或有毒或無毒主流通經脈祛邪治病下品有毒或大毒主破堅積除痼疾三者之中氣味善惡補瀉雖殊理復通貫所以明善惡之殊貫也帝曰善病之中外何如以三品之藥治中外之病何如岐伯曰調氣之方必別陰陽定其中外各守其鄉內者內治外者外治微者調之其次平之盛者奪之汗之下之寒熱溫涼衰之以屬隨其攸利謹道如法萬舉萬全氣血正平長有天命別音逼以藥治病乃調氣之方故必別其在陰在陽定其在中在外各守其所在之鄉而內者治內外者治外正氣微者調補之其次平定之邪氣盛者闢奪之或汗之或下之或寒熱溫涼衰之以屬逆治從治各隨其所利而行之謹道如法萬舉萬全使氣血中正和平而長有其天命矣帝曰善詳明天道合於人身反復言之誠為至真要論帝故善之不復問也
