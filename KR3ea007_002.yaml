body:
  text: 卷之二六節藏象大論第九篇大論二字舊本誤傳四氣調神下今各改正六節者天以六為節天氣始於甲地氣始於子子甲相合六十日而甲子周六六三百六十日以成一歲天有六六之節地則以九九制會也藏象者神藏五形藏四合為九藏神藏五開竅於耳目鼻口形藏四開竅於前後二陰竅雖有九其位惟六又神藏形藏合於三陽三陰之六氣猶之以六為節以九制會故曰藏象此篇為六微旨大論提綱故曰六節藏象大論黃帝問曰余聞天以六六之節以成一歲人以九九制會計人亦有三百六十五節以為天地久矣不知其所謂也陰陽之理一奇二偶合而為三三而兩之為六三而三之為九故天以六六之節以成一歲而人則以九九制會周天三百六十五度計人亦有三百六十五節以為人身之天地久矣帝舉以問意欲詳明天人相應之道也岐伯對曰昭乎哉問也請遂言之夫六六之節九九制會者所以正天之度氣之數也天度者所以制日月之行也氣數者所以紀化生之用也天度周天三百六十五度也氣數二十四氣之常數也六六之節九九制會所以正天之度正氣之數也故申明天度者所以制日月之行而有遲速也氣數者所以紀化生之用而有生殺也天為陽地為陰日為陽月為陰行有分紀周有道理日行一度月行十三度而有奇焉故大小月三百六十五日而成歲積氣余而盈閏矣奇音箕日月陰陽之行於天地也行有分野之紀日月陰陽之周於天地也周有南北道之理日行遲月行疾故日行一度月行十三度而有奇焉日一歲周天月一月周天故大小月三百六十五日而成歲今止三百六十日復有小月是以積氣之餘而有盈閏矣立端於始表正於中推余於終而天度畢矣上古樹八尺之臬度日影以正東西是立端於始也參日中之影與極星以正南北是表正於中也周天三百六十五度四分度之一推日之行度氣盈五日有餘朔虛五日有餘以終一歲之數是推余於始也始中終合氣數以推之而天度畢矣帝曰余已聞天度矣願聞氣數何以合之天度積氣余而盈閏氣數則十五日為一氣一歲二十四氣無有所餘故問何以合之而成閏岐伯曰天以六六為節地以九九制會天度者天之道氣數者地之理故天以六六為節地以九九制會制會者二九合三六四九合六六以成一歲又四九合六六又成一歲其一九則合六而餘三故兩歲有餘以成閏此氣數之合於天度九九之制會於六六也天有十日日六竟而周甲甲六復而終歲三百六十日法也天有十干之十日日六竟而周甲甲六復而終歲此六六三百六十日之大法也夫自古通天者生之本本於陰陽其氣九州九竅皆通乎天氣故其生五其氣三地之九州人之九竅皆通乎天氣者三才合一之道也陰陽之理不外五行故其生五五行之理通貫三才故其氣三生五氣三上下相通自古為然此引生氣通天論之言以明三才合一九九之制會於六六也三而成天三而成地三而成人三而三之合則為九九分為九野九野為九藏故形藏四神藏五合為九藏以應之也由生三氣五而推論之三才各具五行故三而成天三而成地三而成人三而三之合則為九以九而分應乎地則為九野九野即九州也以九野而復應乎人則為九藏九藏即九州也形藏四謂膀胱小腸胃大腸所以藏有形之物故曰形神藏五謂肝心脾肺腎所以藏無形之氣故曰神合為九藏以應之謂膀胱小腸前陰主之胃大腸後陰主之是形藏四而歸竅於前後二陰也心腎主耳肝主目肺主鼻脾主口是神藏五而歸竅於耳目口鼻也藏雖有九其位惟六是九九制會於六六以明六節藏象之意帝曰余已聞六六九九之會也夫子言積氣盈閏願聞何謂氣請夫子發蒙解惑焉承氣余盈閏之言而復問也岐伯曰此上帝所祕先師傳之也天無言而四時成此上帝所祕惟古聖能闡明之先師傳之也帝曰請遂言之遂猶直也岐伯曰五日謂之候三候謂之氣六氣謂之時四時謂之歲而各從其主治焉五日謂之候如立春五日東風解凍次五日蟄蟲始振後五日魚涉負冰者是也三候謂之氣一月凡二氣三候十五日為一氣也六氣謂之時一月二氣三月則六氣而成時也四時謂之歲春夏秋冬四時以成一歲也一歲有一歲之主氣一時有一時之主氣而各從其主治焉五運相襲而皆治之終期之日周而復始時立氣布如環無端候亦同法甲乙之歲土運治之乙庚之歲金運治之丙辛之歲水運治之丁壬之歲木運治之戊癸之歲火運治之五運以次相襲而一歲之中各主時而皆治之期一歲也至終一歲之日則周而復始時立氣布言一歲之中四時立節氣布更加環之無端也候亦同法者四時之歲積候而成與終期復始同一法也故曰不知年之所加氣之盛衰虛實之所起不可以為工矣此靈樞官針篇之言引之以明六氣加臨而有盛衰虛實也年之所加隨在泉之位六氣各有客氣之相加也氣之盛衰司天之氣有太過而盛不及而衰也虛實所起因氣之盛衰而民病虛實所由起也必知此始為良工如不知之不可以為工矣帝曰五運之始如環無端其太過不及何如承上文而問五運之周而復始即如環無端其運氣有太過不及則何如岐伯曰五氣更立各有所勝盛虛之變此其常也更平聲五運化氣更立其歲甲己土勝乙庚金勝丙辛水勝丁壬木勝戊癸火勝故各有所勝其中有盛衰虛實之變此歲氣之常理也帝曰平氣何如無太過無不及謂之平氣岐伯曰無過者也無過不愆常候也無過亦無不及矣帝曰太過不及奈何以盛虛之變為常則太過不及奈何岐伯曰在經有也太過不及為運氣之常故在經有也此篇乃歲運六氣之提綱下經歲運諸大論皆論太過不及淫勝郁復之氣帝曰何謂所勝上文五氣更立各有所勝乃五運化氣土金水木火相生各主一歲非勝克也故復問之岐伯曰春勝長夏長夏勝冬冬勝夏夏勝秋秋勝春所謂得五行時之勝各以氣命其臟金匱真言論曰春勝長夏長夏勝冬冬勝夏夏勝秋秋勝春所謂四時之勝蓋四時者五行也故曰得五行時之勝由此言之各以五行四時之氣而命其臟蓋一歲之中木火土金水五行相生以主四時之氣各以四時五行相生之氣而命其臟其中即有相勝矣命臟者如春勝長夏是肝木勝脾土也餘臟仿此帝曰何以知其勝五行四時之勝何以知之岐伯曰求其至也皆歸始春五運主歲六氣主時求其主時之氣至也皆歸於始春之初氣六元正紀大論云六氣者常以正月朔日平旦視之睹其位而知其所在也未至而至此謂太過則薄所不勝而乘所勝也命曰氣淫不分邪僻內生工不能禁未至而至氣候未至主時之氣先至也故此謂太過太過則薄所不勝而乘所勝也薄所不勝則制我者而我薄之寡於畏矣乘所勝則我制者而我乘之亢則害矣命曰氣淫不分言主氣淫縱太過正氣混淆不分別也五臟應四時氣淫不分則邪僻內生發為民病工不能禁至而不至此謂不及則所勝妄行而所生受病所不勝薄之也命曰氣迫至而不至氣候已至主時之氣未至也故此謂不及不及則所勝妄行如木氣不及則我勝之土氣妄行矣所生受病則生我之水氣受病矣所不勝薄之則我不勝之金氣薄而侮之矣命曰氣迫言主氣不及則所勝所生所不勝之氣交相逼迫而為病也所謂求其至者氣至之時也謹候其時氣可與期失時反候五治不分邪僻內生工不能禁也申明所謂求其至者乃四時氣至之時不但始春為然謹候其春夏秋冬之時則主時之六氣可與相期若未至而至至而不至皆失時反候則五行之主治不分致邪僻內生發為民病工不能禁也此復申明四時氣候各有主氣不必始春為然所以補上文未盡之意帝曰有不襲乎四時六氣始於厥陰終於太陽相為承襲即五運相襲而皆治之之義故復問有不襲乎岐伯曰蒼天之氣不得無常也氣之不襲是謂非常非常則變矣蒼天之氣不得無常若主時之氣不相承襲是謂非常非常則變異而災怪矣帝曰非常而變奈何非常則變其變無窮故復問之岐伯曰變至則病所勝則微所不勝則甚因而重感於邪則死矣故非其時則微當其時則甚也重平聲變至則病病有微甚如風木之氣變為驟注則有土濕之病木能勝土為病則微如風木之氣變為肅殺則有燥金之病土不勝金為病則甚斯時而重感於邪則死矣故變氣之至非其克我之時則病微當其克我之時則病甚也帝曰善余聞氣合而有形因變以正名天地之運陰陽之化其於萬物孰少孰多可得聞乎非常而變即以勝相加之義帝故善之氣合而有形有形之體本於無形之氣也因變以正名命名之正因於物極之變也天地之氣運陰陽之變化其於草木昆蟲之萬物有稟四時五行之一二氣者有稟四時五行之二三氣者有稟四時五行之全氣者其氣孰少孰多可得聞乎岐伯曰悉乎哉問也天至廣不可度地至大不可量大神靈問請陳其方度入聲量平聲天體至廣不可以度度之地裡至大不可以量量之天地陰陽萬物誠大哉神靈之問請陳其方方略也草生五色五色之變不可勝視草生五味五味之美不可勝極嗜欲不同各有所通勝平聲竹類甚繁有色有味竹生五色而萬物莫不有色故五色之變不可勝視竹生五味而萬物莫不有味故五味之美不可勝極人之嗜欲不同色味各有所通蓋五色通於神氣五味通於形藏也天食人以五氣地食人以五味食音飼氣為陽主天故天食人以五氣味為陰陰主地故地食人以五味五氣入鼻藏於心肺上使五色修明音聲能彰五味入口藏於腸胃味有所藏以養五氣氣和而生津液相成神乃自生藏如字下封藏同氣無形故五氣入鼻氣為陽故藏於心肺心榮色華於面故上使五色修明肺主氣出音聲故音聲能彰此氣為陽而上通於神氣也味有形故五味入口味為陰故藏於腸胃味有所藏以養五臟之氣氣和而生則有形之津液相成津液相成則神乃自生此味為陰通於形藏而復為神氣之所資生也帝曰藏象何如形藏四神藏五其象何如岐伯曰心者生之本神之變也其華在面其充在血脈為陽中之太陽通於夏氣心者身之主故為生之本心藏神以應萬事故為神之變也心合脈其榮色故其華在面其充在血脈心屬夏火故為陽中之太陽通於夏氣肺者氣之本魄之處也其華在毛其充在皮為陽中之太陰通於秋氣肺者臟之蓋受朝百脈故為氣之本肺主氣而藏魄故為魄之處也肺合皮其榮毛故其華在毛其充在皮肺屬秋金故為陽中之太陰通於秋氣腎者主蟄封藏之本精之處也其華在發其充在骨為陰中之少陰通於冬氣腎者受藏五臟六腑之精如蟄蟲周密故主蟄封藏之本而為精之處也腎合骨其榮發故其華在發其充在骨腎屬冬水故為陰中之少陰通於冬氣肝者罷極之本魂之居也其華在爪其充在筋以生血氣其味酸其色蒼此為陰中之少陽通於春氣罷作羆陰中舊本訛陽中今改正肝者將軍之官如熊羆之任勞故為羆極之本肝藏魂故魂之居也肝合筋其榮爪故其華在爪其充在筋華爪充筋血氣乃行故以生血氣酸肝味蒼肝色也肝屬春木故為陰中之少陽通於春氣脾者倉廩之本榮之居也其華在唇四白其充在肌其味甘其色黃此至陰之類通於土氣舊本混入下段今改正唇音純即口唇餘篇仿此靈蘭祕典論云脾胃者倉廩之官故脾者倉廩之本消化水穀谷消則脈道乃行水化則其血乃成故榮之居也脾合肉其榮唇故其華在唇四白四白口四際之白肉也肌亦肉也故其充在肌甘脾味黃脾色也脾乃陰中之至陰故為至陰之類通於土氣此申明藏象而為神藏五者如此胃大腸小腸三焦膀胱名曰器能化糟粕轉味而入出者也形藏四胃大腸小腸膀胱也四者皆藏有形之物故名曰器又言三焦者腸胃膀胱皆三焦之所主也靈樞榮衛生會論云上焦出於胃上口中焦亦並胃中下焦別回腸注於膀胱而滲入焉故水穀者常並居於胃中成糟粕而俱下於大腸而成下焦是上中下三焦之氣能化腸胃之糟粕轉味而入於腸胃出於前後二陰者也此申明形藏四而稟氣三焦者如此凡十一臟取決於膽也腑能藏物亦謂之藏膽為中正之官決斷所出膽氣升則臟腑之氣皆升故凡十一臟取決於膽也上文五臟五腑今云十一臟包絡與心相合也故人迎一盛病在少陽二盛病在太陽三盛病在陽明四盛以上為格陽有形之臟腑經脈合無形之三陽三陰三陽主六腑六腑以胃為本故人迎之脈以候三陽人迎結喉兩旁之胃脈也經脈論云胃足陽明之脈下人迎故人迎一盛病在少陽少陽膽與三焦也二盛病在太陽太陽膀胱小腸也三盛病在陽明陽明胃與大腸也四盛以上為格陽格陽者終始篇所謂溢陽為外格也此以人迎胃脈而候三陽之六腑也寸口一盛病在厥陰二盛病在少陰三盛病在太陰四盛以上為關陰三陰主五臟五臟以肺為先故寸口之脈以候三陰寸口兩手寸部之肺脈也經脈論云肺手太陰之脈入寸口蓋寸口謂之脈口又謂之氣口脈口氣口皆屬太陰終始篇云人迎與太陰脈口俱盛五臟別論云氣口亦太陰也故寸口一盛病在厥陰厥陰肝與心包也二盛病在少陰少陰心腎也三盛病在太陰太陰脾肺也四盛以上為關陰關陰者終始篇所謂溢陰為內關也此以寸口肺脈而候三陰之五臟也人迎與寸口俱盛四倍以上為關格關格之脈贏不能極於天地之精氣則死矣贏盈同上文一盛二盛三盛猶言一倍二倍三倍也故人迎與寸口俱盛至四倍以上為內關外格內關外格則亢盛盈滿無以復加不能極於上天下地之精氣則死矣此神藏形藏合於六氣六氣貴得其平經脈不宜亢盛也五臟生成篇第十篇岐伯録上篇藏象之義復論五臟之生成也天主生地主成五臟之色徵於外天氣之所主也五臟之脈行於內地氣之所主也色者氣所附脈者味所歸合色脈氣味而五臟之生成備矣心之合脈也其榮色也其主腎也岐伯録上篇藏象之義復論五臟之生成五臟各有外合脈者心之外合故心之合脈也五臟各有外榮色者心之外榮故其榮色也五臟各有所主腎者心之主故其主腎也外合外榮者臟之成主者臟之生五行之理制而後生主者生之謂也火受水制則水有餘而木氣旺木旺則生火制之乃所以生之心肺肝脾腎之次序亦制生之意也肺之合皮也其榮毛也其主心也皮者肺之外合故肺之合皮也毛者肺之外榮故其榮毛也心者肺之主故其主心也金受火制則火有餘而土氣旺土旺則生金矣肝之合筋也其榮爪也其主肺也筋者肝之外合故肝之合筋也爪者肝之外榮故其榮爪也肺者肝之主故其主肺也木受金制則金有餘而水氣旺水旺則生木矣脾之合肉也其榮唇也其主肝也肉者脾之外合故脾之合肉也唇者脾之外榮故其榮唇也肝者脾之主故其主肝也土受木製則木有餘而火氣旺火旺則生土矣腎之合骨也其榮發也其主脾也骨者腎之外合故腎之合骨也發者腎之外榮故其榮發也脾者腎之主故其主脾也木受土製則土有餘而金氣旺金旺則生水矣是故多食鹹則脈凝泣而色變多食苦則皮槁而毛拔多食辛則筋急而爪枯多食酸則肉胝䐢而唇揭多食甘則骨痛而發落此五味之所傷也泣作澀下同胝音支制之乃所以生之然未生之先則有所傷是故多食鹹則腎氣太過太過則心合之脈凝澀而心榮之色變矣多食苦則心氣太過太過則肺合之皮槁而肺榮之毛拔矣多食辛則肺氣太過太過則肝合之筋急而肝榮之爪枯矣多食酸則肝氣太過太過則脾合之肉胝䐢而脾榮之唇揭矣多食甘則脾氣太過太過則腎合之骨痛而腎榮之發落矣此五行相制制而未生乃五味之所傷也故心欲苦肺欲辛肝欲酸脾欲甘腎欲咸此五味之所合也多食則傷適可則合故心欲苦肺欲辛肝欲酸脾欲甘腎欲咸此五味之所以合於五臟也由此觀之五臟不但合脈皮筋肉骨而且合於五味也五臟之氣故色見青如草茲者死黃如枳實者死黑如炲者死赤如衃血者死白如枯骨者死此五色之見死也炲音臺餘篇同衃音胚有五臟之味則有五臟之色相生則生榮見克則敗死五臟之色即五臟之氣也五臟之氣以色驗之草茲死草之色青兼白也故色見青如草茲者死肝氣敗也枳實黃色兼青故黃如枳實者死脾氣敗也炲煙塵也塵色黑兼黃故黑如炲者死腎氣敗也衃血凝聚之血赤兼黑也故赤如衃血者死心氣敗也枯骨枯朽之骨白兼青也故白如枯骨者死肺氣敗也此五色之見克而死也青如翠羽者生赤如雞冠者生黃如蟹腹者生白如豕膏者生黑如烏羽者生此五色之見生也此舉五色之正光潤華採故生生於心如以縞裹朱生於肺如以縞裹紅生於肝如以縞裹紺生於脾如以縞裹栝蔞實生於腎加以縞裹紫此五臟所生之外榮也縞素白也五色之生精華內臟更有含蓄皆如縞裹則內光華外潤澤故曰此五臟之所生之外榮也由此觀之五臟不但榮於色毛爪唇發而且榮於面之五色也色味當五臟白當肺辛赤當心苦青當肝酸黃當脾甘黑當腎咸故白當皮赤當脈青當筋黃當肉黑當骨合五色五味而總論之則色味當五臟白色當肺臟其味辛赤色當心臟其味苦青色當肝臟其味酸黃色當脾臟其味甘黑色當腎臟其味鹹夫五臟藏於內外合合於外五色當五臟必於外合當之故白當皮皮者肺之合赤當脈脈者心之合青當筋筋者肝之合黃當肉肉者脾之合黑當骨骨者腎之合此一節論五臟之生成而推廣五臟之外合外榮也諸脈者皆屬於目五臟在內氣行周身諸脈者周身血氣循行之脈道也五臟精華上注於目故諸脈者皆屬於目諸髓者皆屬於腦諸髓者周身血氣凝聚之精髓也腦為髓海故諸髓者皆屬於腦諸筋者皆屬於節諸筋者周身血氣貫通之筋路也筋連於節能屈能伸故諸筋者皆屬於節諸血者皆屬於心諸血者周身經絡內外之血也心為君主奉心化赤故諸血者皆屬於心諸氣者皆屬於肺諸氣者周身榮衛外內之氣也肺為臟長受朝百脈故諸氣者皆屬於肺此四肢八溪之朝夕也四肢者兩手兩足八溪者兩肘兩臂兩膕兩髀凡此血氣周時環轉朝夕出入故為四肢八溪之朝夕也故人臥血歸於肝人之朝夕即天之晝夜天晝明夜晦人朝精夕暝朝則血外行夕則血內藏故人臥則血歸於肝蓋衝任之血外行則淡滲皮膚內入則歸肝臟也肝受血而能視足受血而能步掌受血而能握指受血而能攝臥出而風吹之血凝於膚者為痹凝於脈者為泣凝於足者為厥此三者血行而不得反其空故為痹厥也衝任之血上行頭目偏達四肢故肝受血而目能視足受血而足能步掌受血而掌能握指受血而指能攝其血不但上行頭目遍達四肢且外充皮膚內榮經脈下行足之三陰故舉邪風凝之於膚凝於脈凝於足以明之人之臥也必居戶內若臥出而風吹之其衝任之血外凝於膚表則為痹痹轉動不利也內凝於經脈則為澀澀澀滯不通也下凝於足之三明則為厥厥陰陽不相順接而逆冷也此凝於膚凝於脈凝於足三者乃血外行而不得內反其骨空故為痹以及於厥也人有大谷十二分小溪三百五十四名少十二俞此皆衛氣之所留止邪氣之所客也針石緣而去之氣穴論曰肉之大會為谷肉之小會為溪蓋會之所在即分之所在故人有大谷十二分凡會之處各有穴名故小溪三百五十四名氣穴論凡三百六十六穴今三百五十四名尚少十二俞少十二俞即大谷十二分是也凡此皆血氣之循行今血行而不得反其空此皆衛氣之所留止衛氣留止即邪氣之所客也邪氣所客必籍針石緣而去之緣因也因此針石去其病也此一節承上文外合外榮言血氣遍行通體留止不行則為病也診病之始五決為紀欲知其始先建其母所謂五決者五脈也五臟之病貴乎能診診病之始當有五決以為之紀所謂診病之始者乃欲知其始當先建其母母病本也所謂五決為紀者即以五臟之經脈而決之也是以頭痛巔疾下虛上實過在足少陰巨陽甚則入腎巨陽太陽也足太陽之脈上額交巔下屬膀胱絡腎臟是以頭痛巔疾足巨陽經脈病也下虛者膀胱之氣虛於下上實者頭痛巔疾實於上也巨陽主表少陰主裡故受病之過在足少陰巨陽病不能愈必從經脈而入臟故甚則入腎徇蒙招尤目冥耳聾下實上虛過在足少陽厥陰甚則入肝徇作眴冥瞑同眴瞬視也蒙不明也招掉搖也尤甚也足少陽之脈起於目鋭眥從耳後入耳中出走耳前眴蒙而掉搖且甚經脈虛而風氣勝也目瞑耳聾者起於目入於耳也上文頭痛為上實此蒙招為上虛故曰下實上虛言膽木之邪實於下少陽經脈虛於上也少陽為表厥陰為里故受病之過在足少陽厥陰設病不愈必從經脈而入臟故甚則入肝腹滿䐜脹支膈胠脅下厥上冒過在足太陰陽明腹者脾之部也腹滿䐜脹脾土病也支膈胠脅者靈樞經脈論云脾足太陰之脈其支其復從胃別上膈謂䐜脹上連支膈旁連胠脅也下厥上冒者太陰脾氣不升則下厥陽明胃氣不降則上冒陽明太陰相為表裡故過在足太陰陽明脾臟先病故不言甚則入脾咳嗽上氣厥在胸中過在手陽明太陰咳嗽上氣肺病也厥在胸中者經脈論云肺手太陰之脈起於中焦下絡大腸臟腑不和故厥在胸其受病之過在手陽明太陰肺臟先病故不言甚則入肺心煩頭痛病在膈中過在手巨陽少陰心煩頭痛心病也病在膈中者經脈論云心手少陰之脈下膈絡小腸臟腑不和故病在膈中其受病之過在手巨陽少陰心臟先病故不言甚則入心此論診病之始五決為紀而及於五臟五腑故不言手少陽厥陰也夫脈之大小滑澀浮沉可以指別五臟之象可以類推五臟相音可以音識五色微診可以目察能合色脈可以萬全別音逼脈有陰陽大為陽小為陰滑為陽澀為陰浮為陽沉為陰夫脈之大小滑澀浮沉可以指按而別之脈之陰陽內合五臟五臟陰陽之脈象亦可以大小滑澀浮沉而類推之如浮大為心肺沉澀為肝腎滑為脾脈者是也五臟合五行五音五色亦可以微診可以目察能合色脈而共診之可以萬全色脈共診有如下文所云也赤脈之至也喘而堅診曰有積氣在中時害於食名曰心痹得之外疾思慮而心虛故邪從之赤心色也赤脈合色脈以為診也喘而堅脈體急疾而牢實也診其色脈如是則曰有積氣在中時害於食而不能食病名曰心痹心痹心氣閉而不舒也蓋積氣非心臟之本病故得之外疾乃思慮而心虛故邪從之而致心痹也白脈之至也喘而浮上虛下實驚有積氣在胸中喘而虛名曰肺痹寒熱得之醉而使內也白肺色也白脈合色脈以為診也喘而浮脈體急疾而上浮也上虛下實言脈喘而浮則有上虛下實之病驚上虛病也有積氣在胸中下實病也又曰喘而虛者言脈喘而浮則喘而虛也此病名曰肺痹而有皮毛之寒熱蓋驚積非肺臟之本病故得之醉而使邪氣之內入也青脈之至也長而左右彈有積氣在心下支胠名曰肝痹得之寒濕與疝同法腰疼足清頭痛彈平聲青肝色也青脈合色脈以為診也長而左右彈脈體有餘左右兩手之脈如弦之彈指也此有積氣在心下支胠心下膈也支胠左右脅肋乃肝脈之循行也故病名曰肝痹蓋積氣非肝臟之本病故得之外感寒濕疝病本於寒濕故與疝同法寒濕為病則腰痛足清頭痛而致肝臟之病也黃脈之至也大而虛有積氣在腹中有厥氣名曰厥疝女子同法得之疾使四肢汗出當風黃脾色也黃脈合色脈以為診也大而虛脈體張大而空虛也此有積氣在腹中腹中脾部也有厥氣乃土受木克土氣厥逆而不達也土受木克故不名曰脾痹名曰厥疝疝肝病也女子同法者女子無疝肝木乘脾之法則同也夫厥疝非脾臟之本病故得之疾猶言得之外疾使四肢汗出當風以致脾臟之病也黑脈之至也上堅而大有積氣在小腹與陰名曰腎痹得之沐浴清水而臥黑腎色也黑脈合色脈以為診也上堅而大堅大之脈上浮而不沉也此有積氣在小腹與陰小腹者腎之部前陰者腎之竅故病名曰腎痹夫積氣非腎臟之本病故得之沐浴於清水中水氣未散而即臥之所致也此以五臟色脈診五臟之病如是以診可以萬全矣凡相五色之奇脈面黃目青面黃目赤面黃目白面黃目黑者皆不死也相去聲奇音箕奇陽也以色為脈故曰奇脈凡相五色之奇脈但以目視不必手診目青目赤目白目黑皆有面黃中土之色是有胃氣故皆不死面青目赤面赤目白面青目黑面黑目白面赤目青皆死也面無中土之黃色若面青面赤面黑而兼目赤目白目黑目青皆死也既曰面青目赤又曰面青目黑者言面青目赤為不宜面青目黑亦不宜引而伸之青白皆不宜也既曰面赤目白又曰面赤目青者言面赤目白為不宜面赤目青亦不宜引而伸之赤黑皆不宜也夫面青面赤如是則面白麵黑皆如是此書不盡言言不盡意所以申明面無中土之黃色則死是以色脈而知其死生也此一節言診色脈而知五臟之病及於死生以終五臟生成之義五臟別論第十一篇此承上篇五臟生成而復論五臟之別也肝心脾肺腎五臟之正也腦髓骨脈膽女子胞五臟之別也方術之士五臟安和更從事於腦髓腸胃之間因腦髓而及於骨脈膽女子胞六者為臟因腸胃而及於三焦膀胱五者為腑臟本有五今舉其六腑本有六今舉其五五臟藏精氣而腦髓為精氣之主六腑化水穀而腸胃為水穀之主因方士之所尚而推論之以為五臟之別也黃帝問曰余聞方士或以腦髓為臟或以腸胃為臟或以為腑敢問更相反皆自謂是不知其道願聞其說更平聲方士方術之士也腦頭腦髓周身骨髓也方術之士修煉形身運行精氣五臟無病復蒸養腦髓清徹腸胃故問方士或有以腦髓為臟者或有以腸胃為臟者或有以腦髓腸胃為腑者方士之中更易其說彼此相反皆自謂是余不知方士之道願聞其說岐伯對曰腦髓骨脈膽女子胞此六者地氣之所生也皆藏於陰而象於地故藏而不瀉名曰奇恆之府藏如字下除五臟余藏俱如字方術之士上通泥丸薰灌腦髓下養精血以成胎息故腦髓骨脈膽女子胞此六者藏精藏血胎息孕育猶之地氣之所生也六者皆藏於陰而象於地故藏而不瀉此腦髓骨脈膽女子胞六者所以名臟也或以為腑亦不如六腑之傳化是名曰奇恆之府奇異也恆常也言異於常腑也此方士以腦髓為臟而或以為腑也夫胃大腸小腸三焦膀胱此五者天氣之所生也其氣象天故瀉而不藏此受五臟濁氣名曰傳化之府此不能久留輸瀉者也方術之士煉液漱津洗滌腸胃又以腸胃為臟夫胃大腸小腸以及三焦膀胱此五者傳導水穀變化而出猶之天氣之所生也從上而下故其氣象天從上而下故瀉而不藏若以為藏此受五臟濁氣受而不藏者也若以為腑則名曰傳化之府此雖受濁不能久留傳化之府則輸瀉者也此方士以腸胃為臟而或以為腑也魄門亦為五臟使水穀不得久藏所謂五臟者藏精氣而不瀉也故滿而不能實六腑者傳化物而不藏故實而不能滿也所以然者水穀入口則胃實而腸虛食下則腸實而胃虛故曰實而不滿滿而不實也使去聲魄門大腸之肛門也大腸為肺腑故名魄門六腑為五臟之輸瀉而魄門亦為五臟使既為五臟使則腸胃之水穀不得久藏是魄門合臟腑而總為之傳使也申明所謂五臟者藏精氣之凝結而不輸瀉也但藏精氣無有糟粕故滿而不能實若六腑者傳化食物輸瀉不藏故實而不能滿也蓋凝結之精氣充足則曰滿飲食之糟粕充足則曰實又申明六腑之所以實而不滿五臟之所以滿而不實者水穀入口則胃實而腸虛食已而下則腸實而胃虛故曰六腑實而不滿五臟滿而不實也此一節言腦髓腸胃之所以為臟為腑五臟精氣之滿六腑水穀之實皆腦髓腸胃之所主也帝曰氣口何以獨為五臟主氣口兩手寸口之肺脈也魄門為五臟使氣口為五臟主帝欲彰明其義故以為問岐伯曰胃者水穀之海六腑之大源也五味入口藏於胃以養五臟氣氣口亦太陰也是以五臟六腑之氣味皆出於胃變見於氣口故五氣入鼻藏於心肺心肺有病而鼻為之不利也見音現為去聲水穀入胃脈道乃行故胃者水穀之海乃六腑之大源也凡五味入口皆藏於胃籍足太陰脾氣之轉輸以養五臟氣今氣口為五臟主以氣口肺脈亦太陰也是以五臟六腑之氣味始則五味入口藏於胃繼則脾氣轉輸氣味皆出於胃循經脈而變見於氣口脈道之行本於胃之氣味由下而上故五臟之氣入鼻從心而肺故曰藏於心肺如心肺有病而鼻竅為之不利也所以申明足太陰主五臟之味手太陰主五臟之氣氣口所以為五臟主也凡治病必察其下適其脈觀其志意與其病也拘於鬼神者不可與言至德惡於針石者不可與言至巧病不許治者病必不治治之無功矣惡去聲此結上文之義魄門為五臟使故凡治病必察其下察其大便之通閉也氣口為五臟主故凡治病必適其脈調適其氣口之脈象也更當觀其志意之尚方術與不尚方術與其病可治與不可治也若尚方術而拘於鬼神者神道設教不可與言天人之至德尚方術而惡於針石者自以為是不可與言砭刺之至巧凡此拘鬼神惡針石是有病而不許治也病不許治者其病必歸不治雖治之亦無功矣此一節承上文魄門為五臟使因論氣口為五臟主故當察其下適其脈而方士不可與有為也異法方宜論第十二篇異法者一病而治各不同有砭石毒藥灸爇微針導引諸法也方宜者東方砭石西方毒藥北方灸爇南方微針中央導引也聖人雜合以治用各不同五方之病皆得其宜故曰異法方宜黃帝問曰醫之治病也一病而治各不同皆愈何也即異法方宜之義岐伯對曰地勢使然也故東方之域天地之所始生也魚鹽之地海濱傍水其民食魚而嗜咸皆安其處美其食魚者使人熱中鹽者勝血故其民皆黑色疏理其病皆為癰瘍其治宜砭石故砭石者亦從東方來砭音邊餘篇同五方地勢不同致使為病各異故東方之域天地之所始生也東方有魚鹽之利故曰魚鹽之地鹽出海濱魚生水中故曰海濱傍水魚鹽之地故其民食魚而嗜咸地雖傍水而皆安其處食魚嗜咸而皆美其食魚性善動不為水寒故多食魚者使人熱中鹽性味鹹物著堅凝故多食鹽者鹹味勝血傍水嗜咸故其民皆黑色熱中勝血故其民皆疏理疏理血弱而腠理空疏也其病皆為癰瘍疏理之所致也其治宜砭石以石為針所以治癰瘍也夫用砭石之治是從東方而遍及於宇內故砭石者亦從東方來西方者金玉之域沙石之處天地之所收引也其民陵居而多風水土剛強其民不衣而禍薦其民華實而脂肥故邪不能傷其形體其病生於內其治宜毒藥故毒藥者亦從西方來處去聲下南方盛處同西方金體堅徑故西方者金玉之域沙藏金石藏玉故為沙石之處西方主秋乃天地之所收引也地勢高故其民陵居陵高阜之岡陵也陵居地高故多風西方金也故水土剛強剛強於外其民不衣而褐薦剛強於內其民華實而脂肥內外剛強故邪不能傷其形體其病皆生於內七情水土剛強借毒藥以宣通故其治宜毒藥毒藥者中品下品有毒之藥也是毒藥之治始於西方故毒藥者亦從西方來北方者天地所閉藏之域也其地高陵居風寒冰冽其民樂野處而乳食藏寒生滿病其治宜灸焫故灸焫者亦從北方來閉藏之藏如字焫音熱餘篇同北方冬令陰寒故天地所閉藏之域也地余西北故其地高亦如西方之陵居也風寒冰冽者其地多風而寒如冰之凜冽也居常居也處暫處也其民樂野處有時不欲居高也曠野獸多故樂野處而乳食北方寒水氣勝內藏陰寒多生脹滿之病其治宜艾火灸焫以溫藏寒是灸焫之治始於北方故灸焫者亦從北方來南方者天地所長養陽之所盛處也其地下水土弱霧露之所聚也其民嗜酸而食胕故其民皆致理而赤色其病攣痹其治宜微針故九針者亦從南方來長上聲胕作腐南方火也故為天地之所長養陽氣所盛之處也地陷東南故其地下地高則剛地下則柔故水土弱地土卑下水濕從之故霧露之所聚也霧露所聚其民故嗜酸而食腐東南地弱則嗜生我之味其民嗜酸木生火也上文東方嗜咸水生木也西北地上有餘則不言所嗜矣酸味收斂故其民皆致理致理腠理致密也嗜酸則木生火故致理而赤色水土弱霧露聚故其病攣痹拘攣痿痹也其治宜微針按靈樞九針論黃帝欲以微針通其經脈微針小針也岐伯論小針而及於九針故曰九針者亦從南方來中央者其地平以濕天地所以生萬物也衆其民食雜而不勞故其病多痿厥寒熱其治宜導引按蹺故導引按蹺者亦從中央出也中央土之正位也故其地平以濕平者不高不陷濕者滋潤也平正滋潤萬物乃生故天地所以生萬物也衆萬物會聚故其民食雜四方來歸故其民不勞不勞則四肢不強故其病多痿厥痿厥痿痹厥逆也食雜則陰陽乖錯故其病多寒熱寒熱陰陽偏勝也其治宜導引以和陽陰按蹺以和四肢是導引按蹺之治始於中央故導引按蹺者亦從中央出也四方會聚故曰來中央四布故曰出故聖人雜合以治各得其所宜故治所以異而病皆愈者得病之情知治大體也聖人不拘五方之病不泥五方之宜如東方砭石而西北南中皆用之西方毒藥而東北南中皆用之北方灸焫南方微針中央導引按蹺而諸方皆用之故雜合以治各得其宜治各不同故治所以異而病皆愈者得病之情知治之大體也異法方宜此之謂也移精變氣論第十三篇承上篇異法方宜之治復論上古有移精變氣之治也精氣者人身之主宰病則精氣有虧惟上古祝由治病能移精變氣理色脈而通神明以我之神合彼之神兩神相合精氣相通故可祝由而已今時之人不能也精氣以神為主故曰得神者昌失神者亡黃帝問曰余聞古之治病惟其移精變氣可祝由而已今世治病毒藥治其內針石治其外或愈或不愈何也導引謂之移振作謂之變祝由者祝其病所由來以告於神也上古毒藥未興針石未起惟其移精變氣可祝由而已其病今世治病祝由無禪用毒藥以治其內針石以治其外其病或愈或不愈其故何也岐伯對曰往古人居禽獸之間動作以避寒陰居以避暑內無眷慕之纍外無伸官之形此恬惔之世邪不能深入也故毒藥不能治其內針石不能治其外故可移精祝由而已往古穴居野處人居禽獸之間天寒則動作以避寒天暑則陰居以避暑避猶闢也內無眷慕之纍眷慕眷戀思慕也外無伸官之形伸官伸引五官以為恭敬也內外安和此恬惔之世而外邪不能深入也內無病故毒藥不能治其內外無病故針石不能治其外氣機微有不和故可移精變氣祝由以告於神而病即已當今之世不然憂患緣其內苦形傷其外又失四時之從逆寒暑之宜賊風數至虛邪朝夕內至五臟骨髓外傷空竅肌膚所以小病必甚大病必死故祝由不能已也數音朔下同空上聲當今之世不但內有眷慕之纍且憂患緣其內不但外有伸官之形且苦形傷其外又失四時之從逆寒暑之宜以致賊風數至於身虛邪朝夕相乘內至五臟骨髓為其精虛於內也外傷空竅肌膚為其三虛於外也所以小病必甚大病必死故祝由不能已也此今世之所以不同於往古也帝曰善余欲臨病人觀死生決嫌疑欲知其要如日月光可得聞乎病人死生嫌疑未決若欲決之必有要道欲知其要如日月光始無遁情故以為問岐伯曰色脈者上帝之所貴也先師之所傳也上古使僦貸季理色脈而通神明合之金木水火土四時八風六合不離其常變化相移以觀其妙以知其要欲知其要則色脈是矣色以應日脈以應月常求其要則其要也僦音就上帝上古之帝也僦貨季上古之師也死生之要在於色脈故色脈者上帝之所貴也其理至微幸先師之所傳也上古之世曾使僦貸季理人身色脈之道而通日月之神明以色脈而合五行之金木水火土春夏秋冬之四時四方四隅之八風上下前後左右之六合此五行四時八風六合乃天人相應之常故曰不離其常夫色脈之道不離其常而常中有變變中有化變化相移可以觀其神妙即可以知其要道欲知其要則色脈常變是矣色主氣為陽故色以應日脈主血為陰故脈以應月以陰陽之常求其色脈之要則得其大要也夫色之變化以應四時之脈此上帝之所貴以合於神明也所以遠死而近生生道以長命曰聖王色為陽氣脈為陰血陰血隨陽氣以運行故夫色之變化以應四時之脈色脈相應此上帝之所貴以合於天地日月之神明也上古之世所以遠死而近生生道以長命曰聖王非今時所能及也中古之治病至而治之湯液十日以去八風五痹之病十日不已治以草蘇草荄之枝本末為助標本已得邪氣乃服荄音該湯液五穀精汁為湯成液也蘇葉也荄根也中古之世病至而後治之故湯液十日以去八風五痹之病八風八方之邪風五痹皮肌筋脈骨之痹也若湯液十日其病不已則治以草蘇草荄之枝草蘇草荄毒藥之類也荄枝為本蘇枝為末本末為助者用以散荄而助正也標本已得邪氣乃服者湯液醪醴論曰病為本工為標標本不得邪氣不服今治病得宜故標本已得邪氣乃服此中古之世為然而今時亦不能也暮世之病也則不然治不本四時不知日月不審逆從病形已成乃欲微針治其外湯液治其內粗工凶凶以為可攻故病未已新病復起凶上聲今暮世之治病也則不然治不本四時之五行不知日月之色脈不審逆從之標本病形已成乃欲微針治其外湯液治其內粗工凶凶以為可攻或攻以針石或攻以毒藥本有之故病未已妄攻之新病復起此暮世不得同於中古而大遠於上古也帝曰願聞要道必願聞要道如日月光岐伯曰治之要極無失色脈用之不惑治之大則逆從到行標本不得亡神失國去故就新乃得真人到作倒極盡也無以加也治之要極仍無失色脈惟用之不惑即治之大則若逆從倒行則工與病違故標本不得神不守形故亡神失國必去其逆從倒行之故疾就色脈神變之日新乃得同於上古而稱為真人所以勉暮世之治不但同於中古而必同於上古也帝曰余聞其要於夫子矣夫子言不離色脈此余之所知也帝始問欲知其要如日月光伯言色脈者上帝之所貴復問願聞要道又言治之要極無失色脈岐伯之言始終不離色脈帝舉以問所以探其始終不離之義岐伯曰治之極於一治之大要研求其極只有色脈一端故治之極於一帝曰何謂一求一之名岐伯曰一者因得之因病人之情意而得之下文所謂得神者是也帝曰奈何何以得其因岐伯曰閉戶塞牖系之病者數問其情以從其意得神者昌失神者亡臨病人觀死生視聽不妄言動不苟一似閉戶塞牖其心專系之病者然數問其病情以從其志意情意之中神所居也有病而得神則生失神則死故得神者昌失神者亡審察其神則得其因得其因則得其要矣帝曰善祝由之移精變氣惟在得神帝故善之湯液醪醴論第十四篇湯液醪醴作自上古備而弗服中古之世服之萬全當今之世雖有湯醪不能已病故有病起於極微而即不可治者有病於五臟而疏滌以愈者時世不同治病亦異所以追維上古而重上古之全神也黃帝問曰為五穀湯液及醪醴奈何上篇移精變氣論曰湯液十日以去八風五痹之病帝承上篇之意問上古為五穀湯液以及醪醴其義奈何岐伯對曰必以稻米炊之稻薪稻米者完稻薪者堅湯液醪醴黍稷稻麥豆皆可為之而秋成之稻殼尤佳故必以稻米炊之即以稻薪蓋稻米者其質完備稻薪者其質堅徑也帝曰何以然稻米何以完稻薪何以堅岐伯曰此得天地之和高下之宜故能至完伐取得時故能至堅也六元正紀大論云歲半之前天氣主之歲半之後地氣主之稻米夏長秋成此得天地之和天體至高地體至下得天地之和便得高下之宜故稻米之質能至完也稻薪深秋而刈色白似金其時天氣收地氣肅伐取得時故稻薪之質能至堅也帝曰上古聖人作湯液醪醴為而不用何也湯液醪醴古聖作之為而不用其故何也岐伯曰自古聖人之作湯液醪醴者以為備耳夫上古作湯液故為而弗服也中古之世道德稍衰邪氣時至服之萬全古聖作湯液醪醴以備不虞夫上古之世恬憺虛無真氣從之故為而弗服也中古之世道德稍衰真氣不從邪氣時至故湯液醪醴有病服之可以萬全帝曰今之世不必已何也服之萬全其病必已當今之世服湯液醪醴病不必已其故何也岐伯曰當今之世必齊毒藥攻其中鑱石針艾治其外也當今之世憂患緣其內苦形傷其外故必齊毒藥攻其中鑱石針艾治其外但用湯液醪醴無裨也帝曰形敝血盡而功不立者何湯液醪醴毒藥針艾並用而病不愈直至形敝血盡而功不立者何岐伯曰神不使也使去聲下同人之一身神氣遊行內外傳使功不立者神不使也帝曰何謂神不使神氣在內何謂不使岐伯曰針石道也精神不進志意不治故病不可愈針石之為道也工之精神與病之精神工之志意與病之志意兩相合也今工之精神不進志意不治工與病違故病不可愈此工失其神不相使也今精壞神去榮衛不可復收何者嗜欲無窮而憂患不止精氣弛壞榮泣衛除故神去之而病不愈也泣作澀今時之人精壞神去則榮衛不可復收何以精壞神去蓋嗜欲無窮而憂患不止也夫嗜欲無窮則精氣弛壞憂患不止則榮澀衛除精氣弛壞榮澀衛除故神去之而病不愈也此病失其神不相使也此一節言湯液醪醴不能治病者神去而不相使也所以今時不得同於中古而大遠於上古也帝曰夫病之始生也極微極精必先入結於皮膚今良工皆稱曰病成名曰逆則針石不能治良藥不能及也今良工皆得其法守其數親戚兄弟遠近音聲日聞於耳五色日見於目而病不愈者亦何暇不早乎病至不愈病形已成若夫病之始生也起於極微極精微猶輕也精猶細也必先入結於皮膚之毫毛今良工治之皆稱曰病成名之曰逆則雖針石不能為治則雖良藥不能相及也且今之良工皆得其治病之法守其常變之數病者非親戚則兄弟親戚兄弟或相疏而遠或相親而近其音聲可以日聞於耳五色可以日見於目而病至不愈者亦何其閒暇之甚而不早為之計以至病成而逆乎岐伯曰病為本工為標標本不得邪氣不服此之謂也病之始生雖起於微然有可治者有不可治者人身有病則病為本醫工治之則工為標標本相得則病可愈標本不得邪氣則不服邪氣不服是以不愈即此始結皮膚而病不愈之謂也所以申明病雖始生治之而不愈也帝曰其有不從毫毛而生五臟陽已竭也津液充郭其魄獨居精孤於內氣耗於外形不可與衣相保此四極急而動中是氣拒於內而形弛於外治之奈何郭廓同廓空廓四極即四肢急脹急也病生皮膚即不能治其有不從毫毛而生則五臟之陽已竭也津液充塞於空廓之間為凝聚脹滿之病肺藏魄為五臟之長通調水道下輸四布其魄獨居不能下輸四布矣肺主氣腎藏精精氣相交今精孤於內氣耗於外水天上下不相通矣形不可與衣相保者形體浮腫不可與衣相為保合也形不保衣此四肢所以脹急而喘動於中是水氣拒格於內形體廢弛於外內外相失陰陽不和治之奈何岐伯曰平治於權衡去宛陳莝微動器極溫衣繆刺其處以復其形開鬼門潔淨府精以時服五陽已布疏滌五臟故精自生形自盛骨肉相保巨氣乃平繆平聲餘篇仿此權稱錘也衡平也腐穢充塞五臟不和故當平治於權衡如稱物而得其平也宛積也陳久也莝腐也去宛陳莝謂津液充廓則去其積久之腐穢以平之也微動四極乃助其陽熱之氣使四肢溫和而微動也謂四極急而動中則微動四極以和之也溫衣繆刺其處以復其形乃溫厚其衣左右交刺以復其自然之形體也謂形不與衣相保則溫衣繆刺以復其形也開鬼門乃開發毛腠而汗出也潔淨府乃小便利而中瀆之府清潔也謂其魄獨居則開鬼門潔淨府使肺魄外達於皮毛下通於淨府也精以時服五陽已布乃肺氣通調則腎臟之精亦以時服不致孤精於內氣耗於外矣肺氣通調則五臟之陽亦已輸布不致五臟之陽已竭矣凡此施治所以疏滌五臟也五臟疏滌則正氣來復故精自生形自盛骨肉相保而巨氣乃平始之氣拒於內而形弛於外者至此則內外安和形氣調攝矣所以申明病干五臟治之而可愈也帝曰善病生皮膚標本不得即不能治病干五臟平其權衡猶為可治輕重死生神變莫測故帝曰善此一節言暮世之病與古不同精神志意無所施也玉版論要論第十五篇玉版著之玉版也論要論色脈之大要也色脈大要以神為主故首言神次言色言脈而論要畢矣黃帝問曰余聞揆度奇恆所指不同用之奈何度入聲下同奇異也恆常也奇恆異於恆常之病也帝問揆度奇恆所指不同於十二經脈之循行余欲用之以為治奈何岐伯對曰揆度者度病之淺深也奇恆者言奇病也請言道之至數度病之淺深而為揆度奇病而為奇恆所指雖有不同然道之至數請得言之五色脈變揆度奇恆道在於一神轉不回回則不轉乃失其機道之聖數有色有脈五色與脈其變無常以五色脈變而揆度於奇恆則用之之道惟在於一一者神也色脈本神氣以運行左旋右轉而不回若回則不能旋轉乃失其運行之機至數之要迫近以微著之玉版命曰合玉機請言道之至數其至數之要迫近而在於色脈以微而在於神機色脈神機可以著之玉版合玉衡旋轉之機故命曰合玉機著之玉版則為玉版論要合玉機則為玉機真臟帝聞岐伯之言其後復有玉機真臟之論此言色脈以神為主神機合玉機所以著之玉版也容色見上下左右各在其要在察也所謂色變者面容之色見於上下左右當各察其淺深順逆之要其色見淺者湯液主治十日已色淺乃微青微黃微赤微白微黑也色淺則病亦淺故以湯液主治湯液者五穀之湯液十日已者十干之天氣周而病可已即移精變氣論所謂湯液十日以去八風五痹之病者是也其見深者必齊主治二十一日已色深則病亦深故其見深者必齊毒藥主治齊合也即湯液醪醴論所謂必齊毒藥攻其中者是也二十日則十干再周二十一日再周環復其病可已其見大深者醪酒主治百日已色大深則病亦大深故其見大深者醪酒主治醪酒乃熟谷之液其性慓悍滑疾運行榮衛通調經脈故百日病已百日則十干十周氣機大復也色夭面脫不治百日盡已脈短氣絶死病溫虛甚死顏色夭而面容脫其病不治至百日盡已盡已氣血皆終也若兼脈短氣絶即死病溫虛甚亦死不能期之百日矣色見上下左右各在其要上為逆下為從色容色也申明容色見上下左右各在其要者靈樞五色論云其色上行者病益甚故上為逆其色下行如雲徹散者病方已故下為從女子右為逆左為從男子左為逆右為從女子為陰經脈之氣右旋左轉故病色見於右為逆見於左則從而散故為從男子為陽經脈之氣左旋右轉故病色見於左為逆見於右則從右而散故為從易重陽死重陰死重平聲易交易也女子左為從男子右為從者女為陰而從陽男為陽而從陰乃陰陽交易之道也女子右為逆男子左為逆者女為陰右亦為陰男為陽左亦為陽乃重陽死重陰死之義也陰陽反他治在權衡相奪奇恆事也揆度事也陰陽相得則順反他則逆若陰陽反他則治之之法在於權衡相奪權衡者得其平也相奪者奪其逆於右者從左逆於左者從右如湯液主治必齊主治醪酒主治皆權衡相奪之義夫陰陽反他乃奇恆事也治在權衡相奪乃揆度事也此舉色之大要而有死生也搏脈痹躄寒熱之交所謂脈變者正氣與邪氣相持則為搏脈病干形體則為痹為躄病干氣機則為寒熱之交脈孤為消氣虛泄為奪血孤為逆虛為從脈者氣血之先脈孤則陽氣內損故為消氣孤謂弦鉤毛石少胃氣也脈虛泄則陰血內虧故為奪血虛泄謂脈氣內虛不鼓動也脈孤而無胃氣則真元內脫故為逆虛泄而少血液則血可漸生故為從行奇恆之法以太陰始人有奇恆之病而揆度其脈是行奇恆之法也行奇恆之法不離人身經脈之常故以太陰始肺手太陰之脈為十二經脈之首始於寅肺終於醜肝故當以之為始行所不勝曰逆逆則死行所勝曰從從則活克我者為所不勝行所不勝則有病之經脈受克故曰逆逆則死我克者為所勝行所勝則有病之經脈氣盛故曰從從則活八風四時之勝終而復始逆行一過不復可數數上聲八方之風主於四時各有所勝如東風主春木而勝土南風主夏火而勝金西風主秋金而勝木北風主冬水而勝火四隅應中土而勝水八風四時之勝各主其時循環無端故終而復始一歲之中木火土金水以次相生若逆行一過則相生不次故不復可數而生氣或幾乎息矣此舉脈之大要而有死生也論要畢矣總結上文合神機色脈論要畢矣診要經終論第十六篇診視之要在於經脈春夏秋冬各有所刺所以治其經脈也不知者反之所以傷其經脈也十二經脈之敗乃經脈之終也故曰診要經終也黃帝問曰診要何如此問診要下問經終故以名篇岐伯對曰正月二月天氣始方地氣始發人氣在肝方猶位也正月二月天氣從陰而陽故天氣始位地氣從下而上故地氣始發肝主春木故人氣在肝三月四月天氣正方地氣定發人氣在脾三月四月天氣由東而南始正其位故天氣正方地氣由生而長發無餘蘊故地氣定發土生萬物於人為脾故人氣在脾五月六月天氣盛地氣高人氣在頭五月六月天暑地炎天暑故天氣盛地炎故地氣高謂氣機上而不下也人氣在頭亦上而不下之謂也七月八月陰氣始殺人氣在肺春夏為陽秋冬為陰七月八月天地之氣自陽而始陰故陰氣始有肅殺之意肺主秋金故人氣在肺九月十月陰氣始冰地氣始閉人氣在心九月十日自秋而冬陰氣凝聚始有作冰之意地氣收斂始有閉藏之機人氣在心合於手少陰也十一月十二月冰復地氣合人氣在腎復猶伏也十一月十二月水冰氣狀故冰伏地氣歸藏故地氣合腎水之氣主於冬故人氣在腎合於足少陰也故春刺散俞及與分理血出而止甚者傳氣間者環也散上聲間去聲下俱同散俞絡脈之俞也分理分肉之腠理也春氣始生故春刺絡脈之散俞及與分肉之腠理間血出則經絡通而止針如病甚者當深取而傳導其氣若虛實相間者以針傳氣而即環轉也夏刺絡俞見血而止盡氣閉環痛病必下終俞孫絡之俞也夏氣開張故淺刺絡俞微見其血而止針若盡傳其氣反閉其環轉之機而痛病必下人矣秋刺皮膚循理上下同法神變而止秋時人氣在肺肺主皮膚故秋刺皮膚氣機始收故循皮膚之紋理而刺之或刺上或刺下皆同於皮膚循理之法故上下同法若氣機環轉則神氣內變而止針冬刺俞竅於分理甚者直下間者散下俞竅乃俞穴之竅冬氣閉藏其刺宜深故冬刺俞穴之竅在於竅之分理病甚者循俞直下虛實相間者循經散下春夏秋冬各有所刺法其所在總結上文之意上文春夏秋冬人氣各有所在春夏秋冬淺深各有所刺此言春夏秋冬各有所刺即法其人氣之所在以為刺也春刺夏分脈亂氣微入淫骨髓病不能愈令人不嗜食又且少氣分去聲下同春夏秋冬各有所刺若春刺夏分必氣妄傷心合脈故脈亂脈亂則氣無所附故氣微脈亂氣微邪反內入故入淫骨髓而春病不能愈夫脈亂必令人不嗜食蓋食氣入胃濁氣歸心淫精於脈也不但氣微又且少氣春刺秋分筋攣逆氣環為咳嗽病不愈令人時驚又且哭春到秋分肺氣妄傷筋攣肝病也筋攣逆氣肝病而逆於肺也肝病逆肺故轉為咳嗽環猶轉也春刺秋分故夏病不愈東方肝木其病發驚駭故令人時驚肝藏魂肺藏魄魂魄不安故又且邪哭春刺冬分邪氣著藏令人脹病不愈又且欲言語著舊本訛著今改下繳著同藏如字春刺冬分腎氣妄傷腎主冬藏故邪氣著藏水寒為病故令人脹刺失其宜故春病不愈言為心聲又且欲言語不但病足少陰兼病手少陰也凡此皆春刺之失也夏刺春分病不愈令人懈惰夏刺春分則夏病不愈長夏屬土故令人懈惰夏刺秋分病不愈令人心中欲無言惕惕如人將捕之夏刺秋分則夏病不愈夏火屬心心虛故令人心中欲無言不但無言且惕惕如人將捕之夏刺冬分病不愈令人少氣時欲怒夏刺冬分則夏病不愈夏月陽氣外張故令人少氣氣虛則肝血無所附故時欲怒凡此皆夏刺之失也秋刺春分病不已令人惕然欲有所為起而忘之秋刺春分則秋病不已秋主收刺春分反導其氣血上行故令人惕然肺位居高治節出焉故欲有所為收氣反散故起而忘之秋刺夏分病不已令人益嗜臥又且善夢秋刺夏分則秋病不已夏日人倦嗜臥秋刺夏分則令人益嗜臥嗜臥陰也夢為陰中之陰既嗜臥矣又且善夢秋刺冬分病不已令人灑灑時寒秋刺冬分則秋病不已冬時水旺氣寒冬脈虛故令人灑灑時寒凡此皆秋刺之失也冬刺春分病不已令人欲臥不能眠眠而有見冬刺春分則冬病不已臥眠者閉藏之象冬刺春分故欲臥而不能眠氣機外泄故眠而有見有見以無為有也冬刺夏分病不愈氣上發為諸痹冬刺夏分則冬病不愈氣上者陽因而上開泄之意也發為諸痹者冬氣應藏而反開泄留連時日發為風寒濕諸痹之證也冬刺秋分病不已令人善渴冬刺秋分則冬病不已冬時水精內藏刺秋分則水精外泄於皮毛故令人善渴凡此皆冬刺之失也凡刺胸腹者必避五臟春夏秋冬刺失其分則傷五臟之氣故凡刺胸腹之皮部者必避五臟真元之氣當從之使出不可逆之使入也中心者環死中去聲下中脾腎肺膈皆同若逆之使入中傷心氣者周時環轉而死蓋陽中之太陽心也如天之日一日一周今不能周故環死中脾者五日死脾者土也五乃土之生數故中傷脾氣者五日死中腎者七日死腎者水也天一生水地六成之合而為七故中傷腎氣者七日傷中肺者五日死肺者金也乾為金為天易系曰天數五地數五故中脾者五日死此中肺氣者亦五日死言五臟不及肝者或簡脫也中膈者皆為傷中其病雖愈不過一歲必死五臟之氣皆以胸膈以出入故中傷膈氣者皆為傷中其外病雖愈亦不過一歲必死一歲盡四時五行之氣也刺避五臟者知逆從也所謂從者膈與脾腎之處不知者反之處去聲上文云凡刺胸膜者必避五臟此申明刺避五臟者知逆從之道也所謂從者乃膈與脾腎之處蓋膈為陽居上脾屬土居中腎為陰居下知膈與脾腎之處則知上下出入之度故為從若不知膈與脾腎之處宜上反下宜出反入不知者反之則為逆矣刺胸腹者必以布繳著之乃從單布上刺刺之不愈復刺刺針必肅刺腫搖針經刺勿搖此刺之道也又申明凡刺胸腹者必以布繳著之乃從單布上刺是刺之至淺也刺之不愈復刺者言刺布不愈當去布覆刺也刺針必肅者復刺之針必宜端肅不若刺布之放縱也刺腫搖針者肌肉壅腫則宜搖針以瀉之若肌肉不腫而為經脈之刺仍宜端肅而勿搖此刺胸腹必避五臟之要道也此一節言四時各有所刺刺失其宜則病不愈刺傷五臟則死有期而為診視之要也帝曰願聞十二經脈之終奈何上文刺傷五臟乃無形之氣機非有形之經脈故帝復願聞十二經脈之終岐伯曰太陽之脈其終也戴眼反折瘛瘲其色白絶汗乃出出則死矣太陽之脈手足太陽之經脈也終絶也戴眼目上視也反折背反張也瘛瘲手足抽掣也手太陽之脈止於目內眥足太陽之脈起於目內眥故其終也戴眼太陽行身之背故其終也反折手太陽之脈循臂上肩足太陽之脈貫臀入膕故其終也瘛瘲手太陽主液液脫血亡故其色白經脈終而汗出則為絶汗絶汗出則死矣少陽終者耳聾百節皆縱目寰絶系絶系一日半死其死也色先青白乃死矣寰舊本訛睘今改手足少陽之脈從耳後入耳中出走耳前故其終也耳聾靈樞經脈論云膽足少陽之脈主骨所生病節者骨之交故其終也百節皆縱手少陽之脈止於目鋭眥足少陽之脈起於目鋭眥故其終也目寰絶系謂目之寰宇與眼系相絶不相維繫也系絶經終故一日半死刺禁論云刺中膽者一日半死色先青白者日半之前先見木受金刑之色乃死矣陽明終者口目動作善驚妄言色黃其上下經盛不仁則終矣足陽明經脈起於鼻頞中上連於目下連於口故口目動作動作牽引歪斜也善驚所謂聞木音則惕然而驚也妄言所謂甚則上高而歌也色黃土氣外呈也上下經盛謂口目動作善驚妄言色黃皆足陽明經脈之病從足而手從下而上則其上下經盛手經足經皆病也不仁者身冷膚硬陽明之經脈皆終矣少陰終者面黑齒長而垢腹脹閉上下不通而終矣面黑水氣上泄也齒長骨屬外浮也垢面齒不榮也腹脹閉少陰神機不從中土而轉輸也手經足經不相通貫則上下不通而少陰之經脈皆終矣太陰終者腹脹閉不得息善噫善嘔嘔則逆逆則面赤不逆則上下不通不通則面黑皮毛焦而終矣腹脹閉足太陰脾氣不升也不得息手太陰肺氣不降也善噫脾病也善嘔土虛也嘔則逆不能四布也逆則面赤火色外呈土無生源也若不上逆則地氣不升故上下不通不通則土不制水故面黑土不生金故皮毛焦而太陰之經脈皆終矣厥陰終者中熱嗌乾善溺心煩甚則舌卷卵上縮而終矣溺鳥去聲卷上聲餘篇卷同手厥陰心包之脈起於胸中故中熱足厥陰肝脈為病則嗌乾善溺手厥陰心包為病則心煩此厥陰經脈之病非經脈之絶甚則舌卷厥陰之脈絶於上也卵上縮厥陰之脈絶於下也如是則厥陰之經脈皆終矣此十二經之所敗也手足六經之終乃十二經脈之終故曰此十二經之所敗也此一節承上文五臟氣機內逆而論十二經脈之終所以為診要經終也脈要精微論第十七篇脈之大要至精至微切脈動靜視精明察五色觀五臟有餘不足六腑強弱形之盛衰參伍以決死生此脈要之精微也脈其四時動知病之所在知病之所變知病乍在內乍在外亦脈要之精微也反復詳明而脈要精微庶可知矣黃帝問曰診法何如欲悉脈之精微先問診法何如岐伯對曰診法常以平旦陰氣未動陽氣未散飲食未進經脈未盛絡脈調勻氣血未亂故乃可診有過之脈平旦之時陰靜而未動陽氣聚而未散斯時飲食未進則經脈之氣血未盛絡脈之氣血調勻未盛調勻則氣血未亂因而診之有過畢呈故乃可診有過之脈切脈動靜而視精明察五色觀五臟有餘不足六腑強弱形之盛衰以此參伍決死生之分診脈之法其一在於切脈動靜或陽動陰靜或陰動陽靜也其一在於視精明視其人能審情辨物與不能審情辨物也其一在於察五色察人面容之色藏而不露與露而不藏也其一在於觀五藏有餘不足有餘則得其守不足則失其守其一在於觀六腑強弱形之盛衰形盛則腑強形衰則腑弱以此五者參伍揆度可以決其死生之分此診脈之法也夫脈者血之府也長則氣治短則氣病數則煩心大則病進上盛則氣高下盛則氣脹代則氣衰細則氣少澀則心痛渾渾革至如湧泉病進而色弊綿綿其去如弦絶死數音朔下同所謂切脈動靜者以脈主氣而為血之府也脈長則陽氣有餘故氣治脈短則陽氣不足故氣病脈數則火熱內乘故煩心脈大則邪氣有餘故病進上盛寸口脈盛也寸口脈盛主氣上升故氣高下盛尺中脈盛也尺中脈盛主氣下逆故氣脹脈代乃動而中止不能自還此陽氣之衰也脈細乃縈縈如蜘蛛絲此陽氣之少也脈澀乃來去不知此血竭心虛故心痛渾渾濁亂不次之意革至如湧泉應指雜遝之意脈去如是則知氣血內敗而將死矣此切脈動靜之要也夫精明者所以視萬物別白黑審短長以長為短以白為黑如是則精衰矣舊本在其壽不久也下今改正於此所謂視精明者所以視萬物之衆其間之白黑能別短長能審此人之精明者也若不能審而以衰為短不能別而以白為黑此人之不精明者也故曰如是則精衰此視精明之法也夫精明五色者氣之華也赤欲如白裹朱不欲如赭白欲如鵝羽不欲如鹽青欲如蒼璧之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如重漆色不欲如地蒼五色精微象見矣其壽不久也重平聲所謂察五色者面容之色亦貴精明故曰夫精明五色者乃神氣之華於外也色有赤白青黃黑赤欲如白之裹朱不欲如赭之純赤白欲如鵝羽之光潤不欲如鹽之呆白青欲如蒼壁之滑澤不欲如藍之乾枯黃欲如絲羅之裹雄黃不欲如黃土之槁燥黑欲如重漆之光亮不欲如地蒼之黑黯蓋五色外呈精微內藏如五色精微之象俱見於外是露而不藏故其壽不久也此察五色之法也五臟者中之守也中盛藏滿氣勝傷恐者聲如從室中言是中氣之濕也言而微終日乃復言者此奪氣也衣被不斂言語善惡不避親疏者此神明之亂也倉廩不藏者是門戶不要也水泉不止者是膀胱不藏也得守者生失守者死夫五臟者身之強也不藏之臟如字所謂觀五臟有餘不足者以五臟神氣在中乃中之內守也邪實則中盛臟滿正虛則氣勝傷恐人之音聲起於腎出於肺會於中土若中盛臟滿氣勝傷恐者則聲如從室中言此中土壅滯致肺腎不交故曰是中氣之濕也若言而微終日乃復言者此生氣不能上出於肺故曰此奪氣也此五臟神氣不和於上下也若五臟神氣不和於外內致衣被不斂言語善惡不避親疏者此神明外脫而昏亂也若倉廩不藏而洞泄者是魄門幽戶之不要也水泉不止而遺溺者是膀胱水泄之不藏也此神機內殞而泄注也五臟者中之守得守則神氣保固而生失守則神氣離脫而死由此言之夫五臟者不但為中之內守亦為身之外強也此觀五臟有餘不足之法也頭者精明之府頭傾視深精神將奪矣背者胸中之府背曲肩隨府將壞矣腰者腎之府轉搖不能腎將憊矣膝者筋之府屈伸不能行則僂府筋將憊矣骨者髓之府不能久立行則振掉骨將憊矣得強則生失強則死所謂觀六腑強弱形之盛衰者以在外之形身論之則頭背腰膝骨皆謂之府人身精氣上會於頭神明上出於目故頭者精明之府若頭傾視深則精氣神明不上行於頭而精神將奪矣胸在內背在外故背者胸中之府若背曲肩隨則胸中之氣不行於背而府將壞矣腎居腰內故腰者腎之府若轉搖不能則腰骨空虛而腎將憊矣大筋聯屬於膝故膝者筋之府若屈伸不能行則傴僂依附膝軟而不堅而筋將憊矣髓藏骨內故骨者髓之府若不能久立行則振掉則精髓內枯而骨將憊矣此六腑強弱屬於形之盛衰故以頭背腰膝骨為府得強則形身之府氣盛故生失強則形身之府氣衰故死此觀六腑強弱形之盛衰之法也岐伯曰反四時者有餘為精不足為消應太過不足為精應不足有餘為消陰陽不相應病名曰關格上二應平聲精精強也消消弱也上文切脈動靜五者岐伯皆申明之而參伍以決死生未有申明故岐伯復言以告帝脈之大體有餘則為精不足則為消若反四時者為精為消失其常度故春夏之時脈應太過太過當以有餘為精今應太過而以不足為精秋冬之時脈應不足不足當以不足為消今應不足而以有餘為消此脈與四時之陰陽不相應病名曰關格關不得小便也格吐逆也脈反四時得其病情更當以此參伍決其死生故復言之此一節論診脈之大綱而為脈要之精微也帝曰脈其四時動奈何知病之所在奈何知病之所變奈何知病之乍在內奈何知病乍在外奈何請問此五者可得聞乎帝承岐伯之論復舉五者以問以此五者亦脈要之精微也岐伯曰請言其與天運轉大也萬物之外六合之內天地之變陰陽之應彼春之暖為夏之暑彼秋之忿為冬之怒四變之動脈與之上下人之陰陽升降如天運之環轉廣大故曰請言其與天運轉大也天運轉大包乎萬物之外行於六合之內天施地生則有天地之變人之陰陽應乎天地則有陰陽之應天地有四時之氣故彼春之暖為夏之暑彼秋之忿為冬之怒夫春暖夏暑秋忿冬怒乃四變也有是變則有是氣乃四變之動也人之脈象與四變之動氣相為上下也以春應中規夏應中矩秋應中衡冬應中權應平聲中去聲所以與之上下者春時天氣始生脈應軟弱浮滑則圓轉而中規之度矣夏時天氣正方脈應洪大周遍則充滿而中矩之度矣秋時天氣始降脈應平靜輕虛則平準而中衡之度矣冬時天氣閉藏脈應沉石深重則下沉而中權之度矣此四變之動而脈與之上下也是故冬至四十五日陽氣微上陰氣微下夏至四十五日陰氣微上陽氣微下陰陽有時與脈為期期而相失知脈所分分之有期故知死期脈與四時陰陽相為上下不可相失是故冬至四十五日冬至一陽初生從冬至至立春陽氣微上陽氣微上則陰氣微下矣夏至四十五日夏至一陰初生從夏至至立秋陰氣微上陰氣微上則陽氣微下矣陰陽上下有時即與人身之脈為期至期而不上下是期而相失也分別其陽氣不上陰氣不上是知脈之所分也陽氣不上死於春陰氣不上死於秋是分之有期故知死時也微妙在脈不可不察察之有紀從陰陽始始之有經從五行生生之有度四時為宜補瀉勿失與天地如一得一之情以知死生人身之脈一如天地至微至妙故微妙在脈不可不察也察之有紀從陰陽始即冬至陽氣微上夏至陰氣微上也始之有經從五行生謂冬至至立春水生木也夏至至立秋火生土土生金也生之有度四時為宜言木火土金水五行相生有其常度與春夏秋冬四時相合而為宜也四時之氣有太過有不及不及補之太過瀉之補瀉勿失則人身陰陽與天地如一之情可以知其死生矣是故聲合五音色合五行脈合陰陽是知陰盛則夢涉大水恐懼陽盛則夢大火燔灼陰陽俱盛則夢相殺毀傷上盛則夢飛下盛則夢墮甚飽則夢豫甚飢則夢取肝氣盛則夢怒肺氣盛則夢哭短蟲多則夢聚衆長蟲多則夢相擊毀傷人身動靜皆有陰陽是故聲合五音聲有陰陽也色合五行色有陰陽也脈合陰陽脈有陰陽也得其相合之義不但日之聲色合於陰陽即夜之夢象亦合陰陽是知陰盛則夢涉大水恐懼水陰象也恐懼腎病也陽盛則夢大火燔灼火陽象也燔灼心病也陰陽俱盛則水火亢害故夢相殺毀傷相殺爭戰也毀傷俱敗也上盛則氣並於上故夢飛飛者肝藏魂而上升也下盛則氣並於下故夢墮墮者肺藏魄而下降也此水陰火陽木浮金沉之義若飽若飢脾土主之甚飽則土氣有餘故夢豫甚飢則土氣不足故夢取肝氣盛則夢怒怒則氣上也肺氣盛則夢哭哭則氣下也蟲生於胃短蟲多則相聚成群故夢聚衆長蟲多則彼此參商故夢相擊毀傷此五臟陰陽而形諸夢亦聲合五音色合五行脈合陰陽之義是故持脈有道虛靜為保春日浮如魚之遊在波夏日在膚泛泛乎萬物有餘秋日下膚蟄蟲將去冬日在骨蟄蟲周密君子居室四時之脈各不同形是故持脈有道虛靜為保虛清虛靜寧靜保保守勿失也春日氣機從下而上故春日脈浮其形如魚之遊在波夏日氣機充滿於外故夏日之脈在膚其形泛泛乎如萬物之有餘秋日氣機從外而內故秋日之脈下膚其形如蟄蟲之將去冬日氣機內藏而伏故冬日之脈在骨其形如蟄蟲之周密復如君子之居室故曰知內者按而紀之知外者終而始之此六者持脈之大法春夏脈浮其形在外秋冬脈沉其形在內重手按脈紀其至數則知在內之脈故曰知內者按而紀之輕按為始重按為終由重而輕則知在外之脈故知外者終而始之此內外按紀終始六者乃持脈之大法以上答帝脈其四時動之問者如此心脈搏堅而長當病舌卷不能言其軟而散者當消環自已散上聲下同搏堅邪正相持之脈也長脈體有餘也要散脈體不及也心脈搏堅而長則心氣受邪而壅滯故當病舌卷不能言其軟而散者此為不及之脈心液內虛故當消渴心藏神神機環轉消渴自愈故環自已肺脈搏堅而長當病唾血其軟而散者當病灌汗至令不復散發也散發之散如字肺脈搏堅而長則邪實於肺金受火刑故當病唾血其脈軟而散者肺氣不能通調故當病灌汗灌汗脾土灌溉之汗也脾津外泄至令肺氣不復散發也散四散發宣發也肝脈搏堅而長色不青當病墜若搏因血在脅下令人喘逆其軟而散色澤者當病溢飲溢飲者渴暴多飲而易入肌皮腸胃之外也易去聲肝脈搏堅而長則邪實於肝肝病色青今色不青是傷其形體不涉氣分故當病墜若搏墜墮傷也搏擊傷也墜若搏因而血在脅下血在脅下則樞機不利升降不和故令人喘逆其脈軟而散其色不但不青反潤澤者當病溢飲溢飲乃肝血不能熱肉充膚致有水泛之病故申明溢飲者乃渴暴多飲其飲不能疏泄於下而易入肌皮腸胃之外也胃脈搏堅而長其色赤當病折髀其軟而散者當病食痹折音舌下同胃脈搏堅而長則邪實於胃陽明多氣多血故色赤不能下絡於脾故當病折髀其脈軟而散則中焦不能腐化故當病食痹脾脈搏堅而長其色黃當病少氣其耍而散色不澤者當病足䯒腫若水狀也脾脈軟堅而長則邪實於脾土氣外浮故其色黃太陰地氣不交於肺故當痛少氣其脈耍而散則氣不外榮其色但黃不華澤者乃火不生土火土皆虛故當病足䯒腫若水狀也腎脈搏堅而長其色黃而赤者當病折腰其軟而散者當病少血至令不復也腎脈搏堅而長則邪實於腎其色黃而赤者土製其水水不勝火也脈體實而正氣虛故當病折腰腰乃腎之外候也其脈軟而散則心腎不交故當病少血水火皆虛至令人血而不復也帝曰診得心脈而急此為何病病形何如病發於內形見於外復舉心脈之急以探病形岐伯曰病名心疝少腹當有形也心脈急故名心疝心疝之病少腹當有形也帝曰何以言之心疝何以多腹有形岐伯曰心為牡臟小腸為之使故曰少腹當有形也為使皆去聲陽中之陽心也故心為牡臟心絡小腸故小腸為之使心疝則小腸不為之使故曰少腹當有形也舉心與小腸則凡臟與腑合之脈可類推其因臟病腑矣帝曰診得胃脈病形何如五臟心為主六腑胃為主診得胃脈有病病形何如岐伯曰胃脈實則脹虛則泄胃脈有餘而實則脹脹腹脹脾實之病也胃脈不足而虛則泄泄溏泄脾虛之病也舉胃與脾則凡腑與臟合之脈可類推其因腑病臟矣以上答帝知病所在之間者如此帝曰病成而變何謂以次言之當論病之所變故因問之岐伯曰風成為寒熱疸成為消中厥成為巔疾久風為飧泄脈風成為癘病之變化不可勝數勝平聲數上聲風者百病之長善行數變故風成則或為寒變或為熱變疸火熱病也疸成則津液內竭故為消中之變厥手足逆冷也厥成則陰陽不和氣上不下故為頭痛巔疾之變春傷於風至夏變為飧泄故久風為飧泄風傷經脈變為癩疾之癘瘍故脈風成為癘凡此皆為病變究之病之變化不可勝數帝曰諸癰腫筋攣骨痛此皆安全風成諸變乃成於內而變於外若諸癰腫以及筋攣骨痛則病已變於外故問此皆安生岐伯曰此寒氣之腫八風之變也此寒氣之腫言癰腫之生於寒也八風之變言筋攣骨痛之生於風也以明病之所生即病之所變也帝曰治之奈何治寒風之法奈何岐伯曰此四時之病以其勝治之愈也寒風者四時不正之邪治之之法當求其勝以治之則愈也如寒淫於內治以甘熱風淫於內治以辛涼之義帝曰有故病五臟發動因傷脈色各何以知其久暴至之病乎人身之病久暴不同有五臟故病發動於外因傷脈色非一時生變之暴病各何以知其久至與暴至之病乎岐伯曰悉乎哉問也徵其脈小色不奪者新病也徵其脈不奪其色奪者此久病也徵其脈與五色俱奪者此久病也徵其脈與五色俱不奪者新病也論病變而及於久暴病無遁情是悉乎哉問也病之發也脈小色不奪為新病之徵脈不奪其色奪為久病之徵脈色俱奪亦久病之徵脈色俱不奪亦新病之徵此病之見色脈而有久暴也肝與腎脈並至其色蒼赤當病毀傷不見血已見血濕若中水也當中俱去聲此舉毀傷暴病以足上文之義肝與腎脈並至肝主筋腎主骨也其色蒼赤肝色蒼心色赤也當病暴病也毀傷毀傷其筋骨也毀傷筋骨應不見血若已見血則心氣並傷如汗出身濕若中於水水從汗孔而傷其心氣也當病毀傷肝與腎脈所以並至也已見血其色所以蒼赤也以上答帝知病所變之問者如此尺內兩旁則季脅也尺外以候腎尺裡以候腹病之內外隨乎經脈故舉脈體以明之尺內猶言尺中兩旁猶言左右謂尺中左右兩手之脈則主人身之季脅也季脅脅之盡處也腰居季脅之外故兩手尺外以候腎腹居季脅之內故兩季尺裡以候腹脈氣自下而上故先論尺部之左右外內也中附上左外以候肝內以候膈右外以候胃內以候脾中附上者自左右兩尺中而致於關上也左外以候肝內以候膈者左手關部之外以候肝脈關部之內以候膈中脈也右外以候胃內以候脾者右手關部之外以候胃脈關部之內以候脾脈也脈氣自下而中故次論關部之左右外內也上附上右外以候肺內以候胸中左外以候心內以候膻中上附上者自左右兩關上而至於寸上也右外以候肺內以候胸中者右手寸外以候肺脈寸內以候胸中脈也左外以候心內以候膻中者左手寸脈以候心脈寸內以候心包之膻中脈也脈氣自中而上故終論寸部之左右外內也前以候前後以候後脈有外內復有前後前以候前尺前關前寸前以候形身之前也後以候後寸後關後尺後以候形身之後也上竟上者胸喉中事也下竟下者少腹腰股膝脛足中事也脈有外內前後復有上下是脈體之六合也上竟上者自寸上而竟上於魚際也喉主天氣位居胸上故為胸喉中事乃上以候上也下竟下者自尺下而竟下於肘中也足履乎地股膝脛足居腰與少腹之下故為少腹腰股膝脛足中事乃下以候下也粗大者陰不足陽有餘為熱中也來疾去徐上實下虛為厥巔疾來徐去疾上虛下實為惡風也上文以脈體而候臟腑形身之位此以脈象而候陰陽上下之病也脈粗大者乃陰氣不足陽氣有餘故為熱中病也熱中陽盛於內也脈來疾去徐來盛而去微也來疾故主上實去徐故主下虛上實下虛則氣惟上逆陰陽不和故為厥厥手足逆冷也氣惟上逆上而不下故為巔疾猶言厥成為巔疾也脈來徐去疾來微而去盛也來徐故主上虛去疾故主下實上虛下實則經脈不和故為惡風也惡風癘風也故中惡風者陽氣受也有脈俱沉細數者少陰厥也沉細數散者寒熱也浮而散者為眴僕中去聲眴瞬同餘篇仿此此復舉惡風厥熱巔疾脈證各有不同以足上文未盡之義惡厲之風傷其經脈必從表入故申明中惡風者始於陽氣之受邪也厥有陰陽申明有脈俱軟細而數者非陽氣上逆之厥為少陰厥也熱有陰陽申明有脈軟細而數散者非粗大有餘之陽熱為陰盛陽虛之寒熱也巔疾亦有陰陽實則有餘虛則不足申明有脈浮而散者非上實有餘之巔疾為裡虛不足之眴僕也諸浮不躁者皆在陽則為熱其有躁者在手諸細而沉者皆在陰則為骨痛其有靜者在足數動一代者病在陽之脈也泄及便膿血諸過者切之澀者陽氣有餘也滑者陰氣有餘也陽氣有餘為身熱無汗陰氣有餘為多汗身寒陰陽有餘則無汗而寒此復以浮沉代澀滑之脈而明陰陽內外之病也左右三部諸脈俱浮而不躁疾者皆病在陽陽病則為外熱其有浮而躁疾者亦在手之經脈手陽也左右三部諸脈細而沉者皆病在陰陰病則內為骨痛其有沉細而靜者亦在足之經脈足陰也諸脈數動一代者數動為陽故病在陽之脈也數動一代則陽中有陰故當病泄及便膿血諸有過之脈必須切之乃得其真諸脈澀者內之陰血不足陰血不足則外之陽氣有餘也諸脈滑者陽氣從陽入陰陽氣入陰則內之陰氣有餘也陽氣有餘則病在陽不得陰氣以和之故身熱無汗陰氣有餘則病在陰不得陽熱以相濟故多汗身寒若陰陽皆有餘陽盛則無汗陰盛則身寒故無汗而寒推而外之內而不外有心腹積也推而內之外而不內身有熱也推而上之上而不下腰足清也推而下之下而不上頭項痛也按之至骨脈氣少者腰脊痛而身有痹也推退平聲承上文上下外內之病而言診脈亦有外內上下之法也推而外之者醫之手指向外以按之脈偏盛於內而不外此有心腹之積病也推而內之者醫之手指向內以按之脈偏盛於外而不內此身形有邪熱也推而上之者醫之手指向寸關尺之上以按之脈隨應指上而不下此上盛下虛故腰足當清冷也推而下之者醫之手指向寸關尺之下以按之脈隨應指下而不上此下盛上虛故頭項當強痛也若按之至骨不應於指脈氣少者此陰盛陽虛生陽之氣不能上行當腰脊痛而身有痹病也承上文上下外內之病而言診脈亦有外內上下之法也以上答帝知病乍在內乍在外之問者如此此一節承上文五者之問而一一以對亦為脈要之精微也平人氣象論第十八篇平人氣象者無病人之脈氣與脈象也欲識平人之脈當以病脈死脈參之欲識病脈死脈當以胃脈准之五臟四時之脈皆以胃氣為本蓋五臟之氣生於胃而胃腑之氣生於水穀也黃帝問曰平人何如承上篇脈要精微而問平人之脈也岐伯對曰人一呼脈再動一吸脈再動呼吸定息脈五動閏以太息命曰平人平人者不病也一呼一吸為一息平人之脈一呼再動一吸再動合呼吸定息之時亦當一動故脈五動所以為五動者乃閏以太息如積余成閏在於息之太過也命曰不病之平人常以不病調病人醫不病故為病人平息以調之為法上為去聲不病則呼吸均調病則短長乖錯故常以醫之不病而平息以調病人之脈是為診候之法人一呼脈一動一吸脈一動曰少氣一呼脈一動一吸脈一動減於平人過半故曰少氣謂正氣衰微也人一呼脈三動一吸脈三動而躁尺熱曰病溫尺不熱脈滑曰病風脈澀曰痹躁猶疾也滑流利也澀凝滯也人一呼脈三動一吸脈三動而為躁疾之脈也脈躁疾而尺膚熱則曰病溫尺膚不熱脈不躁疾其脈流利而滑則曰病風其脈不滑凝滯而澀則曰痹病也人一呼脈四動以上曰死脈絶不至曰死乍疏乍數曰死數音朔下同人一呼脈四動以上則太過之極脈絶不至則不及之極乍疏乍數則錯亂之極故皆曰死平人之常氣稟於胃胃者平人之常氣也人無胃氣曰逆逆者死平人受谷以生故平人之常氣稟於胃胃者即平人之常氣也谷入於胃五臟六腑皆以受氣故人無胃氣而絶食則曰逆逆者死春胃微弦曰平弦多胃少曰肝病但弦無胃曰死胃而有毛曰秋病毛甚曰今病臟真散於肝肝藏筋膜之氣也肝之藏如字下心脾腎之藏同胃者中土柔和之氣五臟四時之所需也春得胃脈其脈微弦則曰平脈弦多胃少則曰肝病但弦無胃則曰死脈胃而有毛者其脈微弦兼得輕浮之毛脈也毛乃秋脈見於春時金虛其位故至秋當病若毛脈過甚木受金刑不必至秋今當病也夫肝之所以為弦脈者乃臟真之神氣散於肝而肝復藏筋膜之氣也夏胃微鉤曰平鉤多胃少曰心病但鉤無胃曰死胃而有石曰冬病石甚曰今病臟真通於心心藏血脈之氣也夏得胃脈其脈微鉤則曰平脈鉤多胃少則曰心病但鉤無胃則曰死脈胃而有石者其脈微鉤兼得下沉之石脈也夏得冬脈水虛其位故曰冬病石甚則火受水刑故今病也夫心之所以為鉤脈者乃臟真之神氣通於心而心復藏血脈之氣也長夏胃微軟弱曰平弱多胃少曰脾病但代無胃曰死軟弱有石曰冬病弱甚曰今病臟真濡於脾脾藏肌肉之氣也長夏得胃脈而微軟弱則曰平脈弱多胃少則曰脾病代軟弱之極也軟弱極而無胃氣則曰死脈軟弱有石者以明水氣乘土至冬水氣內虛故曰冬病弱甚則脾脈大虛故今病也夫脾脈之所以為軟弱者乃臟真之神氣濡於脾而脾復藏肌肉之氣也秋胃微毛曰平毛多胃少曰肺病但毛無胃曰死毛而有弦曰春病弦甚曰今病臟真高於肺以行榮衛陰陽也秋得胃脈其脈微毛則曰平脈毛多胃少則曰肺病但毛無胃則曰死脈毛而有弦者木氣乘金至春木氣內虛故曰春病若弦甚則木氣虛而乘侮至故今病也夫肺之所以為毛脈者乃臟真之神氣高於肺肺朝百脈以行榮衛陰陽也冬胃微石曰平石多胃少曰腎病但石無胃曰死石而有鉤曰夏病鉤甚曰今病臟真下於腎腎藏骨髓之氣也冬得胃脈其脈微石則曰平脈石多胃少則曰腎病但石無胃則曰死脈石而有鉤者火氣乘水至夏火氣內虛故曰夏病若鉤甚亦本氣虛而乘侮至故今病也夫腎之所以為石脈者乃臟真之神氣下於腎而腎復藏骨髓之氣也蓋肝主疏泄故曰散心主血脈故曰通脾主灌溉故曰濡肺位居上故曰高腎為水臟故曰下也春言胃而有毛金刑木也夏言胃而有石水刑火也長夏秋冬一言軟弱有石一言毛而有弦一言石而有鉤皆我勝者而反乘之蓋勝我者刑之由於本氣之虛我勝者乘之亦由本氣之虛也又春夏今病皆言受克長夏今病則言本虛秋冬今病則言乘侮以明受克乘侮皆因本氣之虛錯綜其意欲人彼此互推知其由也胃之大絡名曰虛里貫膈絡肺出於左乳下其動應衣脈宗氣也五臟之脈資生於胃胃為中土氣通四旁故胃之大絡名曰虛里大絡胃外之絡脈也虛里四通之義也其絡中貫膈上絡肺橫出於左乳之下其動則外應於衣是經脈之宗氣也是知胃絡不但通四旁貫膈絡肺而且合於宗氣此言胃絡之平氣也盛喘數絶者則病在中結而橫有積矣盛喘而數其氣欲絶者是宗氣不上出於肺以司呼吸則其病在膈中也病在膈中故宗氣內結而橫逆結而橫則膈中有積矣此言胃絡之病氣也絶不至曰死乳之下其動應衣宗氣泄也宗氣脫而絶不至則曰死所以然者以宗氣出於乳之下其動應衣今絶不至是宗氣泄也泄猶脫也此言胃絡之死氣也是不但五臟之脈有平脈病脈死脈而宗氣之脈亦有平氣病氣死氣也欲知寸口太過與不及寸口之脈中手短者曰頭痛寸口脈中手長者曰足脛痛寸口脈中手促促上擊者曰肩背痛寸口脈沉而堅者曰病在中寸口脈浮而盛者曰病在外寸口脈沉而弱曰寒熱及疝瘕少腹痛寸口脈沉而橫曰脅下有積腹中有橫積痛寸口脈沉而喘曰寒熱上三中去聲橫去聲胃脈屬土位居關部上寸下尺亦以胃氣為本故舉寸口尺中之脈以明之欲知寸口太過與不及之脈病須以長短浮沉之脈而知之寸口之脈中於手指之下脈氣短者短則氣虛不及於上故頭痛頭痛正虛於上也寸口脈中於手指之下脈氣長者長則氣盛太過於下故足脛痛足脛痛邪實於下也寸口脈中於手指之下脈氣促而上擊者促則內虛不及於內上擊則外實太過於外故肩背痛肩背痛內虛外實也寸口脈沉而堅者太過於內也故病在中寸口脈浮而盛者太過於外也故病在外寸口脈沉而弱者不及於內也故為寒熱及疝瘕而少腹痛寸口脈沉而橫者太過於內也故脅下有積而腹中亦有橫積痛寸口脈沉而喘者或太過或不及故但為寒熱寒熱之證有有餘有不足也橫橫逆喘喘急橫與喘言脈之形象非謂病也脈盛滑堅者曰病在外脈小實而堅者曰病在內脈小弱以澀謂之久病脈滑浮而疾者謂之新病脈急者曰疝瘕少腹痛脈滑者曰風脈澀者曰痹緩而滑曰熱中盛而緊曰脹此復言太過不及之脈病以足上文未盡之意脈盛滑堅則陽氣太過故曰病在外脈小實而堅則陰氣太過故曰病在內脈小弱以澀則氣血不及故謂久病脈滑浮而疾則氣血太過故謂新病疝瘕少腹痛有虛有實上文寸口脈沉弱病疝瘕少腹痛乃正氣不足也此脈急而曰疝瘕少腹痛乃邪氣有餘也脈滑為風者風為陽邪善行數變故脈滑也脈澀為痹者痹主閉拒血氣凝滯故脈澀也脈緩而滑者土氣內虛陽熱過盛故曰熱中脈盛而緊者土氣有餘邪氣內實故曰脹也此論太過不及之脈而知有餘不足之病不但寸口為然所以足上文未盡之意者如此脈從陰陽病易已脈逆陰陽病難已脈得四時之順曰病無它脈反四時及不間臟曰難已易間皆去聲太過不及之脈而有有餘不足之病尤貴陰陽之相從故脈從陰陽其病易已脈逆陰陽其病難已所謂脈從陰陽者脈得四時之順也順者春弦夏鉤秋毛冬石也得順則雖病無他無他無他變也所謂脈逆陰陽者脈反四時也反者胃而有毛胃而有石毛而有弦石而有鉤也間臟者外淫之邪始傷皮毛肺先受之肺欲傳肝而腎間之腎欲傳心而肝間之肝欲傳脾而心間之心欲傳肺而脾間之脾欲傳腎而肺間之乃子母相生臟不受刑今不間臟則臟受刑故病難已臂多青脈曰脫血尺脈緩澀謂之解㑊安臥脈盛謂之脫血尺澀脈滑謂之多汗尺寒脈細謂之後泄脈尺粗常熱者謂之熱中解懈同㑊音亦餘篇解㑊同上文診寸口而知病之所在此診尺脈而知病之所在也自此至婦人妊子其辭意與靈樞論疾診尺論大略相同臂多青脈者自尺脈而至於臂臂內絡脈之色多青也肝色青肝藏血臂多青脈則知肝血不能熱肉充膚淡滲皮毛故曰脫血若尺脈緩澀則氣血內虛故謂之解㑊安臥解㑊猶懈怠安臥猶嗜臥也不但臂多青脈曰脫血若尺脈強盛則陰氣不和亦謂之脫血尺澀尺膚澀也脈滑尺脈滑也膚澀脈滑則氣機從陰出陽故謂之多汗尺寒尺膚寒也脈細尺脈細也膚寒脈細則生陽之氣不能外達故謂之後泄粗猶大也尺粗尺脈大也常熱膚常熱也脈粗膚熱則陽氣有餘故謂之熱中此診尺脈尺膚而知病之所在也頸脈動喘疾咳曰水目內微腫如臥蠶起之狀曰水溺黃赤安臥者黃疸已食如飢者胃疸面腫曰風足脛腫曰水目黃者曰黃疸溺鳥去聲更有不待診尺但論疾而知其病之所在者如頸脈動喘疾咳則知水氣內動故曰水目內微腫如臥蠶起之狀則知水氣外呈故亦曰水若溺黃赤安臥則知濕熱在中而為黃疸已食如飢則知邪熱在中而成胃疸論其面腫則知風動於上故曰風論其足脛腫則知水動於下故曰水所謂黃疸者不但溺黃赤安臥必目黃者始曰黃疸上文未言目黃故重言以申明之此論疾而知其病之所在也婦人手少陰動甚者妊子也少陰尺脈也診尺之法即知病之所在亦可知婦人之有妊婦人兩手少陰脈動甚者則知腎氣有餘感天一所生之氣故妊子也脈有逆從四時未有藏形春夏而脈瘦秋冬而脈浮大命曰逆四時也脈有逆從即上文脈從陰陽脈逆陰陽之謂也四時未有藏形至春夏而脈未弦鉤至秋冬而脈未毛石也春生夏長其氣外盛而脈反瘦秋收冬藏其氣內斂而脈反浮大與時不順命曰逆四時也風熱而脈靜泄而脫血脈實病在中脈虛病在外脈澀堅者皆難治命曰反四時也有病之脈亦貴陰陽外內之相應如風熱之病陽氣盛也脈應洪大而反靜泄而脫血陰虛病也脈應內虛而反實病在中則邪實於內脈應沉實而反虛病在外則邪盛於外脈應浮大而反澀堅此脈不應病病不應脈皆為難治亦命曰反四時也人以水穀為本故人絶水穀則死脈無胃氣亦死所謂無胃氣者但得真臟脈不得胃氣也所謂脈不得胃氣者肝不弦腎不石也人籍水穀以生是人以水穀為本人非水穀不生故人絶水穀則死人絶水穀則死而脈無胃氣亦死所謂無胃氣者但得真臟脈不得柔和之胃氣也所謂脈不得胃氣者至春而肝不微弦至冬而腎不微石也此脈本於胃而胃本於水谷也太陽脈至洪大以長少陽脈至乍數乍疏乍短乍長陽明脈至浮大而短此舉三陽之脈象以明胃氣合於三陽之六腑下文平脈病脈死脈以明胃氣合於三陰之五臟也太陽巨陽也太陽脈至則洪大以長此陽氣有餘而主開之象也少陽初陽也少陽脈至則乍數乍疏乍短乍長此初陽漸生而主樞之象也陽明二陽也陽明脈至則浮大而短浮大陽也浮大而短陽明主闔之象也三陽主六腑胃氣合於六腑故舉三陽之脈以明之夫平心脈來纍纍如連珠如循琅玕曰心平夏以胃氣為本病心脈來喘喘連屬其中微曲曰心病死心脈來前曲後居如操帶鉤曰心死五臟有平脈病脈死脈皆以胃氣為本夫平心脈來其脈來纍纍然如連珠之滑利復如循琅玕之平和心脈如是則心氣通調如曰心平心主夏火故夏以胃氣為本若病心脈來其脈喘喘急疾而連屬不若纍纍之連珠也其中微曲不若循琅玕之平和也心脈如是則心氣不和故曰心病若死心脈來前診則脈曲如鉤後則居而不動其曲也如操帶鉤無柔合之胃氣故曰心死平肺脈來厭厭聶聶如落榆英曰肺平秋以胃氣為本病肺脈來不上不下如循雞羽曰肺病死肺脈來如物之浮如風吹毛曰肺死厭平聲厭厭聶聶安靜而輕小也如落榆策輕薄而不虛也此乃肺之平脈肺主秋金故秋以胃氣為本不上不下似浮非浮似沉非沉而非厭厭聶聶也如循雞羽極輕極虛不若榆策之落也故曰肺病如物之浮虛而無根也如風吹毛散而不收也脈無胃氣故曰肺死平肝脈來耎弱招招如揭長竿末梢曰肝平春以胃氣為本病肝脈來盈實而滑如循長竿曰肝病死肝脈來急益徑如新張弓弦曰肝死耎弱招招柔和而起伏也如揭長竿末梢應指而上下也此乃肝之平脈肝主春木故春以胃氣為本盈實而滑不耎弱矣如循長竿其體堅硬不若末梢之上下矣故曰肝病急益徑者較之滑脈而且急較之長竿而益徑其徑急也如新張之弓弦無柔和之胃氣故曰肝死平脾脈來和柔相離如雞踐地曰脾平長夏以胃氣為本病脾脈來實而盈數如雞舉足曰脾病死脾脈來鋭堅如烏之喙如烏之距如屋之漏如水之流曰脾死喙音誨餘篇同和柔相離本中土和柔之氣而離散於四旁也如雞踐地雞足四爪踐地猶脾土和柔而濡潤也此脾之平脈合於季土故長夏以胃氣為本實而盈數其脈牢固有餘不和柔而四散也如雞舉足其脈拳而收斂不如踐地之舒布也故曰脾病鋭堅鋭利堅固不柔和也其鋭也如烏之喙尖而不和其堅也如烏之距著實而強此脾土之不行也其行則如屋之漏點滴稀疏如水之流去而不返夫脾土中和剛勢之極散漫之極皆為死脈故曰脾死平腎脈來喘喘纍纍如鉤按之而堅曰腎平冬以胃氣為本病腎脈來如引葛按之益堅曰腎病死腎脈來發如奪索辟辟如彈石曰腎死喘喘纍纍如鉤乃水中之生陽上升其氣喘喘其象纍纍其生長如鉤從下而上故按之而堅此腎之平脈合於冬水故冬以胃氣為本如引葛如引葛藤之上延散而且蔓不若如鉤之有本矣按之益堅乃石多胃少沉實太過不若按之而堅矣發如奪索脈氣之至彼此牽引如奪索然也辟辟來去不倫也如彈石園硬不軟也此但石無胃故曰腎死肝見庚辛死心見壬癸死脾見甲乙死肺見丙丁死腎見戊己死是謂真臟見者死舊本在臂多青脈段之下今改正於此計其五臟死期逢十干相剋而死死肝脈見則逢庚辛死金剋木也死心脈見則逢壬癸死水剋火也死脾脈見則逢甲乙死木剋土也死肺脈見則逢丙丁死火剋金也死腎脈見則逢戊己死土剋水也是謂真臟見者死猶云是即所謂但得真臟不得胃氣者則死也且明五見而屬於真臟之見也五臟四時之脈皆以胃氣為本是知平人氣象亦以胃氣為本也玉機真臟論第十九篇帝與岐伯論脈之大要著之玉版藏之臟腑每旦讀之名曰玉機故名玉機真臟論玉機者心之神機真臟者藏之元真神機轉而不回藏真臟而不見若回則不轉真臟脈見則死帝反復申詳以明玉機真臟之義黃帝問曰春脈如弦何如而弦承上篇弦鉤毛石而問所以致弦之故岐伯對曰春脈者肝也東方木也萬物之所以始生也故其氣來軟弱輕唐而滑端直以長故曰弦反此者病帝曰何如而反春時反脈何如岐伯曰其氣來突而強此謂太過病在外其氣來不實而微此謂不及病在中氣脈氣也太過則外強故病在外不及則內虛故病在中帝曰春脈太過與不及其病皆何如太過在外不及在中皆為何病岐伯曰太過則令人善忘忽忽眩冒而巔疾其不及則令人胸痛引背下則兩脅胠滿肝脈太過則令人善忘傷寒論云本有久瘀血故令喜忘忽忽眩冒者風木上乘也巔疾者肝合督脈會於巔頂也其肝脈不及不能貫膈注肺則令人胸痛引背不能合少腸而樞轉下則兩脅胠滿帝曰善夏脈如鉤何如而鉤岐伯曰夏脈者心也南方火也萬物之所以盛長也故其氣來盛去衰故曰鉤反此者病長上聲下同來盛者夏火之有餘也去衰者如鉤環轉稍末輕微也此胃而有鉤故名曰鉤若夏時而反此脈者病帝曰何如而反岐伯曰其氣來盛去亦盛此謂太過病在外其氣來不盛去反盛此謂不及病對中來盛去亦盛則脈氣太過故病在外來不盛則裡氣內虛去反盛則胃氣不諧此脈氣不及故病在中帝曰夏脈太過與不及其病皆如何岐伯曰太過則令人身熱而膚痛為浸淫其不及則令人煩心上見咳唾下為氣泄心脈太過則火氣外浮故令人身熱而膚痛熱傷膚表故為浸涇而成瘡其心脈不及則心氣內虛故令人煩心虛於上則見咳唾咳唾咳唾涎沫也虛於下則為氣泄氣泄者後氣下泄也帝曰善秋脈如浮何如而浮岐伯曰秋脈者肺也西方金也萬物之所以收成也故其氣來輕虛以浮來急去散故曰浮反此者病輕虛以浮毛而浮也來急去散則從內而毛浮於外胃而有毛故名曰浮若秋時而反此脈者病帝曰何如而反岐伯曰其氣來毛而中央堅兩旁虛此謂太過病在外其氣來毛而微此謂不及病在中毛脈而中央堅兩旁虛則脈氣太過故病在外毛脈而復微此脈氣不及故病在中帝曰秋脈太過與不及其病皆何如岐伯曰太過剛令人逆氣而背痛慍慍然其不及則令人喘呼吸少氣而咳上氣見血下聞病音肺俞在背肺脈太過故令人逆氣而背痛肺氣內郁故慍慍然肺脈不及則內虛故令人喘其呼出吸入皆少氣而咳咳傷肺絡則上氣見血氣上不下則下聞病音病音呻吟聲也呻吟者下虛也帝曰善冬脈如營何如而營岐伯曰冬脈者腎也北方水也萬物之所以合藏也故其氣來沉以轉故曰營反此者病藏如字營猶石也深藏之義也轉轉聚也沉以轉此胃而有營故名曰營若冬時而反此脈者病帝曰何如而反岐伯曰其氣來如彈石者此謂太過病在外其去如數者此謂不及病在中數音朔來如彈石者上下有力而強硬也此脈氣太過故病在外其去如數者彈石一至而即去去之疾也此脈氣不及故病在中帝曰冬脈太過與不及其病皆何如岐伯曰太過則令人解㑊春脈痛而少氣不欲言其不及則令人心懸如病飢眇中清春中痛少腹滿小便變帝曰善眇抄同音渺餘篇仿此解㑊猶懈怠也眇中脅骨之未助稍處也清微冷也腎脈太過則水寒之氣外盛故令人解㑊春脈痛水寒有餘火氣不足故少氣不欲言其腎脈不及則水不濟火故令人心懸如病飢火不濟水故眇中清春中痛少腹滿小便變帝曰四時之序逆從之變異也然脾脈獨何主總承上文而言春夏秋冬四時之序逆其所從而有脈病之變異也然四時之脈止合四臟而脾脈獨何至岐伯曰脾脈者土也孤臟以灌四旁者也土至四時各十八日脾脈屬土位居中央不得獨主於時故為孤臟以灌四旁者也帝曰然則脾善惡可得見之乎岐伯曰善者不可得見惡者可見脾脈之善在於各臟故善者不可得見脾脈不濡則諸臟有太過不及故惡者可見帝曰惡者如何可見岐伯曰其來如水之流者此謂太過病在外如鳥之喙者此謂不及病在中灌溉太過脾氣之來如水之流者則濕氣浸淫此謂土濕太過病當在外灌溉不及脾氣不舒如鳥之喙者則堅徑自止此謂土氣不及病當在中凡其皆可見也帝曰夫子言脾為孤臟中央土以灌四旁其太過與不及其病皆何如上文岐伯云脾脈者土也孤臟以灌四旁帝舉其言問太過不及之病其病在脾者皆何如岐伯曰太過則令人四肢不舉其不及則令人九竅不通名曰重強重平聲強去聲脾脈太過濕氣浸淫流於四末則令人四肢不舉脾脈不及堅徑自止不能灌溉則令人九竅不通脾脈不和而四肢不舉脾脈不和而九竅不通是脾病而上下四旁皆病故名曰重強強不和也帝瞿然而起再拜而稽首曰善吾得脈之大要天下至數五色脈變揆度奇恆道在於一神轉不回回則不轉乃失其機至數之要迫近以微著之玉版藏之臟腑每旦讀之名曰玉機度入聲上藏如字瞿然驚顧貌臟腑密室也帝聞岐伯之言瞿然驚顧而起再拜稽首而善其說謂吾今乃得脈之大要因舉玉版論要之言以發明之天下至數道之廣也五色脈變理之微也揆度奇恆治之善也道在於一神相守也神機運行左旋右起是神轉不回若右旋左起是回則不轉不轉乃失其運行不息之機而有下文之病死也然此至數無容外求故曰至數之要迫近以微迫近色脈也以微神機也史臣復記黃帝以脈之大要而著之玉版藏之臟腑每旦讀之名曰玉機機神機也著之玉版故曰玉機此一節言以脈之大要著之玉版所以名為玉機也黃帝曰五臟受氣於其所生傳之於其所勝氣舍於其所生死於其所不勝病之且死必先傳行至其所不勝病乃死此言氣之逆行也故死黃帝曰三字舊本在五臟相通上今改正於此受當作授下同脈之大要有正脈病脈死脈五臟之氣有正氣病氣死氣故帝舉五臟而復論之五臟授氣於其所生者五臟正氣授於所生之子也傳之於其所勝者五臟病氣傳於己所勝之臟也我生生我皆為所生氣舍於其所生者五臟正氣舍於所生之母也死於其所不勝者五臟死氣死於受克乃己所不勝之臟也凡此四者下文復申詳之而病之且死不遽死也必先傳行於諸臟後至其所不勝之臟則病乃死又申明此之傳行乃言氣之逆行也故死肝受氣於心傳之於脾氣舍於腎至肺而死心受氣於脾傳之於肺氣舍於肝至腎而死脾受氣於肺傳之於腎氣舍於心至肝而死肺受氣於腎傳之於肝氣舍於脾至心而死腎受氣於肝傳之於心氣舍於肺至脾而死此皆逆死也一日一夜五分之此所以占死生之早暮也此承上文而申言之五臟授氣於其所生者如肝授氣於心是授氣於我生之子也傳之於其所勝者肝傳之於脾是傳於己所勝之土也氣舍於其所生者肝氣舍於腎舍於生我之母也死於其所不勝者肝至肺而死死於己所受克之臟也心授氣於脾授氣於我生之子也心傳之於肺傳之於其所勝也心氣舍於肝舍於生我之母也心至腎而死死於其所不勝也脾授氣於肺授氣於所生之子也傳之於腎傳之於其所勝也氣舍於心舍於所生之母也至肝而死死於其所不勝也肺授氣於腎授氣於所生之子也傳之於肝傳之於其所勝也氣舍於脾舍於所生之母也至心而死死於其所不勝也腎授氣於肝授氣於所生之子也傳之於心傳之於其所勝也氣舍於肺舍於所生之母也至脾而死死於其所不勝也上文云此言氣之逆行也故死故曰此皆逆死也一日一夜氣合四時以五行而五分之可以占死生之早暮也五分者寅卯主木巳午主火申酉主金亥子主水辰戌丑未主土肝至肺而死死於申酉心至腎而死死於亥子脾至肝而死死於寅卯肺至心而死死於巳午腎至脾而死死於辰戌丑未也五臟相通移皆有次五臟有病則各傳其所勝不治法三月若六月若三日若六日傳五臟而當死是順傳所勝之次此亦申明上文之義言順傳所勝亦死也上文五臟授氣其所生氣舍於其所生者乃五臟相通而移皆有次也肝心脾肺腎以次相通相通而授氣之所在即氣舍之所在也上文傳之於其所勝者乃五臟有病則各傳其所勝也木土水火金相勝而傳傳之為所勝則受傳即為所不勝也上文病之且死必先傳行是當治之若不治則法三月若六月若三日若六日傳五臟而當死法三月者病在於肝越夏三月至秋則金剋木而死若六月者病在於肝劇於孟春越春夏六月至秋則金剋木而死五臟仿此可以類推若三日者肝病土虛劇於戊巳從戊至庚三日也至辛則肺金克脾故三日乃死若六日者肝病木虛劇於甲乙從甲至己六日也至庚則木受金刑故六日乃死五臟仿此亦可類推夫四時之五行十干之五行皆木火土金水以次相生此三月六月三日六日傳五臟而死是順傳而有所勝之次不若上文氣之逆行而死也故曰別於陽者知病從來別於陰者知死生之期言知至其所困乃死引陰陽別論之言以明上文病死言當知至其所困乃死困受克也是故風者百病之長也今風寒客於人使人毫毛畢直皮膚閉而為熱當是之時可汗而發也病之從來由外而內是故風者百病之長也今風寒客於人從毫毛而入於皮膚故使人毫毛畢直然後皮膚閉拒而為熱當是之時知病從來可汗而發散其風寒也或痹不仁腫痛當是之時可湯尉及火灸刺而去之痹痿痹不仁強急腫痛腫也或痹不仁邪入於經脈也腫痛邪傷其肌肉也當是之時知病從來可湯尉及火灸刺而散去之弗治病入舍於肺名曰肺痹發咳上氣病腑弗治則入於臟故病入舍於肺名曰肺痹言邪入於肺而為痹也肺痹則發咳上氣弗治肺即傳而行之肝病名曰肝痹一名曰厥脅痛出食當是之時可按若刺耳病肺弗治肺即傳所勝而行之肝病名曰肝痹肝脈布脅肋肝氣厥逆故一名曰厥脅痛食氣入胃散精於肝肝氣逆故出食當病肝之時氣血不和則可按摩若針刺耳弗治肝傳之脾病名曰脾風發疸腹中熱煩心出黃當此之時可按可藥可浴病肝弗治肝即傳所勝而行之脾風木傷脾火氣乃生故病名曰脾風發疸腹中熱熱邪上蒸則煩心熱邪下泄則溺出黃當病脾之時脾絡不通可按摩以通之脾氣內虛可甘藥以補之脾濕不行可湯浴以散之弗治脾傳之腎病名曰疝瘕少腹冤熱而痛出白一名曰蠱當此之時可按可藥病脾弗治脾即傳所勝而行之腎水濕下凝故病名曰疝瘕疝瘕在少腹之處故少腹冤熱而痛冤熱熱極無伸也少腹熱痛內則虛寒故溺出白此疝瘕之病外實內虛故一名曰蠱當脾病傳腎之時亦可按而可藥弗治腎傳之心病筋脈相引而急病名日瘈當此之時可灸可藥弗治滿十日法當死瘈音熾餘篇同病腎弗治腎即傳所勝而行之心心主血脈血不榮筋故病筋脈相引而急引急者拘牽之意故病名曰瘈瘈搐搦也當腎病傳心之時亦可灸可藥若失而弗治滿十日法當死十日則十干盡而五臟周故死腎因傳之心心即復反感而行之肺發寒熱法當三歲死此病之次也心主神明多不受邪故腎傳之心心即復反傳而行之肺肺病故發寒熱病從內發故法當三歲死三歲死者此病傳所勝之次也腎因傳心水勝火也心復傳肺火勝金也一歲則金勝木二歲則木勝土三歲則土勝水傳五臟而當死上文五臟相通移皆有次者相生之次也此病之次乃相勝之次也然其卒發者不必治其傳或其傳化有不以次不以次入者憂恐悲喜怒令不得以其次故令人有大病矣因而喜大虛則腎氣乘矣怒則肝氣乘矣悲則肺氣乘矣恐則脾氣乘矣憂則心氣乘矣此其道也故病有五五五二十五變及其傳化傳乘之名也卒音促下同肺病發寒熱然其寒熱卒發者乃外邪暴至不必治其傳言不必以心臟傳肺之法而治之也上文腎因傳心心復傳肺此病之次也或其傳化有不以次所以不必次入者乃憂恐悲喜怒五志內傷令不得以其次故令人有大病矣或因而喜大心氣內虛則腎氣乘心矣或因而怒大肝氣內逆則肝氣乘脾矣或因而悲大肺氣內郁則肺氣乘肝矣或因而恐大腎氣內虛則脾氣乘腎矣或因而憂大肺氣內虛則心氣乘肺矣此五志內動傳化之道也五志層五臟故病有五一臟有五臟之傳故五五二十五變及其傳化所謂傳者即腎氣乘肝氣乘肺氣乘脾氣乘心氣乘故曰傳乘之名也不言脾情也脾土寄王於四臟也悲言肺情者言不但肝怒有餘本氣乘於他臟即肺悲不足本氣亦乘於他臟也大骨枯槁大肉陷下胸中氣滿喘息不變其氣動形期六月死真臟脈見乃豫之期日便平聲見音現豫與同下俱仿此大骨大肉兩臂兩股之骨肉也大骨枯槁腎病也大肉陷下脾病也胸中氣滿喘息不便肺病也便猶利也下文重言義俱仿此其氣動形言喘息不便則氣之出入不利身形為之振動也期六月死者能冬不能夏能夏不能冬半歲而死也真臟脈見者即下文真臟至如循刀刃責責然等是也乃豫之期日者即平人氣象論肝見庚辛死等是也五臟真氣轉而不回真臟脈見則回而不轉故死也大骨枯槁大肉陷下胸中氣滿喘息不便內痛引肩項期一月死真臟見乃豫之期日承上文腎病脾病肺病而言內痛引於肩之項則循經而病於風府故期一月死蓋衛氣之行循於經脈一日一夜大會於風府日下一節二十一日至於伏衡三十日出於缺盆不能復會於風府則死若真臟脈見乃豫之期日大骨枯槁大肉陷下胸中氣滿喘息不便內痛引肩項身熱脫肉破䐃真臟見十月之內死肌腠曰肉脂膏曰䐃承上文腎病脾病肺病風府病言兼身熱脫肉破䐃則陰血虛而中土敗若真臟脈見則十日之內死土之生數五成數十十日之內不逾土數也大骨枯槁大肉陷下肩髓內消動作益衰真臟未見期一歲死見其真臟乃豫之期日未舊本誤來今改肩髓內消動作益衰言始則痛引肩項今則肩髓內消始則脫肉破䐃動作已衰今則動作益衰承上文而更進也真臟未見期一歲周環則死若見其真臟乃豫之期日大骨枯槁大肉陷下胸中氣滿腹內痛心中不便肩項身熱破䐃脫肉目眶陷真臟見目不見人立死其見人者至其所不勝之時則死見人之見如字腎病骨枯脾病肉陷肺病氣滿肝木乘脾則腹內痛神氣內虛則心中不便此承上文之意而言五臟皆病也肩項所痛引肩項也肩項身熱破䐃脫肉亦承上文而言也目眶陷則陽明胃氣並絶若真臟脈見目不見人神氣先亡故立死其見人者神氣未亡至其所不勝之時則死時一日十二時也急虛身中卒至五臟絶閉脈道不通氣不往來譬於墮溺不可為期其脈絶不來若人一息五六至其形肉不脫真臟雖不見猶死也中去聲承上文之意而言人有急病刻時射死難以脈診不可與之期日也急虛正氣一時暴虛也身中外邪陡中於身也卒至客邪卒至於臟也此病臟真之神機不病經脈之有形故五臟之氣一時絶閉周身脈道一時不通氣機環轉一時不相往來庫卒之病死於傾刻譬於墮溺不可為期急虛之病其脈內脫則絶不來其脈外脫則平人一息脈五六至其形肉雖不脫其真臟雖不見而猶之死也此舉一時暴死不可為期不必真臟脈見所以補上文未盡之義真肝脈至中外急如循刀刃責責然如按琴瑟弦色青白不澤毛折乃死真心脈至堅而搏如循薏苡子纍纍然色赤黑不澤毛折乃死真肺脈至大而虛如以毛羽中人膚色白赤不澤毛折乃死真腎脈至搏而絶如指彈石辟辟然色黑黃不澤毛折乃死真脾脈至弱而乍數乍疏色黃青不澤毛折乃死諸真臟脈見者皆死不治也折音舌中人之中去聲彈平聲數音朔所謂真臟脈見者如真肝臟之脈至則中外徑急其徑急也如循刀刃責責然責責不流通也如按琴瑟弦按之一線不柔和也有絶脈必有絶色故色青白不澤青者肝之色白者金刑木也夫脈自內以達外故真臟脈見必皆毛折乃死所以然者本末皆盡也如真心臟之脈至則堅而搏堅者牢實搏者搏擊復如循薏苡子纍纍然者堅急而無根也色赤黑不澤水刑火也亦必毛折乃死如真肺臟之脈至則大而虛謂無本也如以毛羽中人膚謂無末也色白赤不澤火刑金也亦必毛折乃死若真腎臟之脈至則搏而絶搏者轉索之狀搏而絶者轉索而若斷也如指彈石辟辟然者硬而呆實無胃氣也色黑黃不澤土刑水也亦必毛折乃死如真脾臟之脈至臟氣虛故脈弱不能達於四臟故乍數乍疏色青黃不澤木刑土也亦必毛折乃死此明真臟之脈象必本末皆盡而後死亦補上文未盡之義黃帝曰見真臟曰死何也真臟之脈藏而不見見則必死帝既反復詳明更欲推其所以死之故故探諸岐伯以發明之岐伯曰五臟者皆稟氣於胃胃者五臟之本也臟氣者不能自致於手太陰必因於胃氣乃至於手太陰也故五臟各以其時自為而至於手太陰也故邪氣勝者精氣衰也故病甚者胃氣不能與之俱至於手太陰故真臟之氣獨見獨見者病勝臟也故曰死帝曰善真臟者脈無胃氣也夫五臟者皆稟氣於胃是胃者乃五臟之本也肺朝百脈手太陰主之然臟氣者不能自致於手太陰必因於胃氣乃至於手太陰也故肝心脾肺腎五臟各以其時自為弦鉤毛石之脈而至於手太陰也故邪氣勝者由於五臟之精氣衰也故病甚者胃氣不能與之俱至於手太陰脈無胃氣故真臟之氣獨見於脈獨見者病氣勝於臟也病氣勝臟故曰死此亦回則不轉乃失其機之義故帝曰善此一節帝承玉機之義而申明真臟也黃帝曰凡治病察其形氣色澤脈之盛衰病之新故乃治之無復其時帝既明玉機真臟之義而形氣色脈皆有神機故復言之凡治病者必察其形之與氣及色之潤澤脈之盛衰與病之新故乃立法以治之更須無後其時形氣相得謂之可治色澤以浮謂之易已脈從四時謂之可治肺弱以滑是有謂氣命曰易治取之以時易去聲試以形氣色脈之順者言之形氣和諧而相得病可治也面色潤澤外浮病易已也春弦夏鉤秋浮冬營脈從四時病可治也脈弱以滑是有胃氣病易治也形氣色脈皆順雖久病亦為可治治之無後其時故曰取之以時形氣相失謂之難治色夭不清謂之難已脈實以堅謂之益甚脈逆四時為不可治必察四難而明告之四難形氣色脈也試以形氣色脈之逆者言之形弱氣強形強氣弱是相失也病必難治面色火折無有潤澤病必難已脈實以堅是無胃氣病必益甚脈逆四時臟氣受刑病不可治形氣色脈皆逆雖新病亦不可治告之無後其時故必察四難而明告之無容緩也所謂逆四時者春得肺脈夏得腎脈秋得心脈冬得脾脈其至皆懸絶沉澀者命曰逆四時未有臟形於春夏而脈沉澀秋冬而脈浮大名曰逆四時也申明上文所謂脈逆四時者春得肺脈金刑木也夏得腎脈水刑火也秋得心脈火刑金也冬得脾脈土刑水也其脈之至皆懸絶無根或沉澀不起者是無胃氣命曰逆四時也未有臟形者至春夏而脈未弦鉤至秋冬而脈未浮營也春生夏長於春夏而脈沉澀秋收冬藏於秋冬而脈浮大亦名曰逆四時也病熱脈靜泄而脈大脫血而脈實病在中脈堅實病在外脈不堅實者皆難治脈病相反亦謂之逆病熱則氣血不和今病熱而脈靜下泄則土氣內虛今泄而脈大脫血則陰津下泄今脫血而脈實病在中則正氣虛今病在中脈實堅病在外則邪氣實今病在外脈不實堅此脈病相反即逆四時故皆難治黃帝曰余聞虛實以決死生願聞其情帝既明形氣色脈之要而形氣色脈有虛有實有死有生故探諸岐伯以明之岐伯曰五實死五虛死五實五臟之邪氣實也五虛五臟之正氣虛也病干臟氣虛實皆能死也帝曰息聞五實五虛岐伯曰脈盛皮熱腹脹腹脹前後不通悶瞀此謂五實脈細皮寒氣少泄利前後飲食不入此謂五虛督音茂餘篇同脈者心之主也心受邪故脈盛皮者肺之主也肺受邪故皮熱腹者脾之主也脾受邪故腹脹腎開竅於前後二陰腎受邪故前後不通肝開竅於目肝受邪故悶瞀悶郁也瞀目不明也此謂五實心氣虛則脈細肺氣虛則皮寒肝氣虛則氣少腎氣虛則泄利前後脾氣虛則飲食不入此謂五虛帝曰其時有生者何也岐伯曰漿粥入胃泄注止則虛者活身汗得後利則實者活此其候也五臟之氣生於胃土主於三焦胃土調和則漿粥入胃泄注止如是則虛者活三焦通暢於外則身汗通暢於內則得後利如是則實者活此其虛實死生之候也此一節論形氣色脈虛實死生以終玉機真臟之義
