body:
  text: 凡例九條一素問內經乃軒岐明道之書開物成務醫道始昌雖秦煽毒而醫書獨全後之注者或割裂全文或刪改字句剽竊詭道實開罪於先聖如靈素合刻篡集類經是已惟王太僕馬元臺張隱菴注釋俱屬全文然字句文義有重復而不作衍文者有倒置而未經改正者有以訛傳訛而弗加詳察者余細為考校確參訂正庶幾補聖經下禪後學二六經文史歷代有卿大儒互參考訂奕世宗仰至醫門經論未得名儒碩士翻閲鋟梓故茫無徵信即素問一經各家雖有注釋余詳觀之非苟簡隙漏即敷淺不經隱菴集注義意艱深其失也晦余不得已而更注之顏曰直解世之識者尚其鑑諸三隱菴先生有集注之刻不便雷同故曰直解注釋直捷明白可合正文誦讀非如張太嶽四書直解其訓詁有不可讀者四素問八十一篇原遺闕二篇今已搜補矣每篇名目俱當詮解茲刻不第詮解篇名即篇中大旨亦逐為指出一篇之中分為數節蓋以詞論冗繁略分節旨使觀者易於領會耳五軒岐素問謂之聖經不容假借無奈後人著作方書偏剿襲其義摘取其文而經脈針刺之理三才運氣之道茫乎若迷鳴呼世如斯醫如斯學道者又如斯則經幾晦於方技將見素問內經徒寄空名於天壤耳後之業是道者當知篇章字句皆屬珠璣毋容稍為去取者也六是注體會先聖微意言言中的字字見解而一針一血尤必深入淺出俾千百世後永為畫定不易之說庶軒岐問答之神躍躍紙上而至精至微之理炳若日星然道非淺近故本注云非其人勿授非其真傳不傳余之勞心神歷寒暑以成此解亦第藏之名山傳之其人而已此復何計哉七素問注解不下十餘家余多方購覽而明顯入彀者十不得一然世之學者便知諸刻紛壇其中是非莫辨真僞難分余豈能執余注而告諸人曰余解是真也非僞也噫必不能矣所以雖付剞劂要亦信諸吾心質之軒岐不冀人之知也雖然人同此心心同此理倘後之君子或嗣而續之倡而明之又余之深幸也夫八素問論人身陰陽血氣臟腑經脈而無治病之法是以數千年來醫家咸置不問蓋意理精深無從控討是解則理明義達不冗不漏然必誠切研求潛心會悟始能得其旨趣昔者余著傷寒集注梓以問世亦可謂理明義達不冗不漏矣而研求會悟似鮮其人因思素問之書亦猶是也言念及此良可悲已九素問直解外更有本草崇原靈樞直解金匱集注聖經賢論剞劂告竣尤有醫學真傳之梓蓋本神農黃帝仲景諸書而詳明識證施治品方用藥之法也余嘗謂聖賢經論猶布帛菽粟布帛禦寒而必為之衣菽粟救飢而必為之食醫學真傳亦為衣而使人可衣為食而令人可食也然必經論俱成而後梓也姑有待也
