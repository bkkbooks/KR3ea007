front:
  text: 序著書家書成必序序者序著述之由約以數語明此書之有裨於世也余於黃帝素問一書殫注十載告竣名曰直解自謂有是經宜有是解有是解宜付剞劂會於吾心質之古人吾事畢矣又何序焉孔安國序尚書云伏羲神農黃帝書謂之三墳皆言道也素問以陰陽之理闡天人之道天地陰陽俱於人身人身陰陽同於天地苟非其人此道不明今以軒岐論而問之儒儒必不知諉諸醫復以軒岐所論而問之醫醫且茫然無以對嗚呼素問之傳數千百年矣數千百年之不明何日明之儒與醫之不知何人知之且夫軒岐開醫道之原而軒岐經論不彰方技為旁門之術而方技僞書日盛醫安苟簡畏其所難必以軒岐內經教醫天下其無醫哉嗟嗟是猶楊墨之言充塞兩間一旦語以孔孟之學必譏其迂遠而不切於用矣誠如是則余以是解解軒岐亦即以是解質軒岐不必質天下也已又何序焉雖然序之而不欲序傷之也心焉傷之無可語者然豈竟無可語者聊存數言以俟後之君子時康熙乙亥之春錢塘高世栻士宗題於侶山講堂
  hash: sha256:6000d14e1946f1e8bb2336e8813f56e98995d31587ee41f35d4d764a760aa780
