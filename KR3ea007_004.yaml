body:
  text: 卷之四瘧論第三十五篇風雨寒暑皆為瘧病日作之瘧衛氣應乃作邪客脊背循風府而日下一節則發日晏出於風府注伏膂而上出缺盆則發日早邪薄五臟橫連募原則間日乃作邪與衛氣客於六腑循行失度則間二日或休數日乃作夏傷水寒秋傷於風則為先寒後熱之寒瘧冬中風寒藏於骨髓夏暑乃發則為先熱後寒之溫瘧肺素有熱用力勞形氣不歸陰內藏於心舍於分肉則為但熱不寒之癉瘧黃帝問曰夫痎瘧皆生於風其蓄作有時者何也痎瘧陰瘧也生氣通天論云夏傷於暑秋為痎瘧帝問痎瘧皆生於風謂痎瘧不必盡生於暑而有生於風者痎陰瘧也瘧陽瘧也故曰皆也蓄猶藏也作猶發也有時或日發或間日發也岐伯對曰瘧之始發也先起於毫毛伸欠乃作寒慄鼓頜腰脊俱痛寒去則內外皆熱頭痛如破渴欲冷飲伸欠欲伸而欠不自如也凡瘧之始發也先起於毫毛之伸欠乃作寒慄鼓頜而腰脊俱痛始則寒慄鼓頜繼則寒去內外皆熱始渴腰脊俱痛繼則頭痛如破內外皆熱則渴欲冷飲帝曰何氣使然願聞其道道猶路也寒熱之作何氣使然而願聞其出入之道岐伯曰陰陽上下交爭虛實更作陰陽相移也更平聲下同瘧之發也陰氣不和於陽陽氣不和於陰故陰陽上下交爭陽爭於上則陽實陰虛陰爭於下則陰實陽虛上下交爭則虛實更作交爭更作則陰陽相移也陽並於陰則陰實而陽虛相移者相併之義如陽氣相移而並於陰則陰實而陽虛須知陰氣相移而並於陽則陽實而陰虛不言者省文也陽明虛則寒慄鼓頜也巨陽虛則腰背頭項痛三陽俱虛則陰氣勝陰氣勝則骨寒而痛寒生於內故中外皆寒所謂陰實陽虛者如陽明虛則寒慄鼓頜也陽明經脈行身之前頜面下也巨陽虛則腰背頭項痛巨陽經脈行身之背從頭至腰皆在背也陽明太陽既虛而少陽亦虛則三陽俱虛俱虛則陰氣勝陰氣勝則骨寒而痛少陽屬腎主骨此寒生於內故中外皆寒少陽經脈行身之側樞轉陰陽司中外也此申明陽並於陰則陰實陽虛也陽盛則外熱陰虛則內熱外內皆熱則喘而渴故欲冷飲也申明陽實陰虛者陽主外陽盛則外熱陰主內陰虛則內熱外內皆熱陽氣過盛則喘而渴故欲冷飲也此申明陰並於陽則陽實陰虛也由此推之則上文之寒慄鼓頜腰背俱痛內外皆熱頭痛如破渴欲冷飲皆病三陽之氣亦陰實陽虛陽實陰虛之所致也此皆得之夏傷於暑熱氣盛藏於皮膚之內腸胃之外此榮氣之所舍也此令人汗空疏腠理開因得秋氣汗出遇風及得之以浴水氣舍於皮膚之內與衛氣並居衛氣者晝日行於陽夜行於陰此氣得陽而外出得陰而內薄內外相薄是以日作藏如字空孔通通承上文之意而言此三陽瘧病皆得之夏傷於暑暑熱氣盛藏於皮膚之內腸胃之外夫皮膚之內腸胃之外此榮氣之所舍也暑熱傷榮則肌表不和此令人汗孔疏而腠理開也汗孔疏腠理開暑月之時因得秋涼之氣是汗出遇風及得之以浴水氣風水之氣舍於皮膚之內則於衛氣並居也夫衛氣者晝日行於陽二十五周夜行於陰二十五周瘧之發也必衛氣應乃作此衛氣得日陽而外出得夜陰而內薄內外相薄遇邪則發是以日作此言暑風寒水之氣而有三陽之瘧病也帝曰其間日而作者何也間去聲下間日之間同承上文日作而問間日之作也岐伯曰其間日發者由邪氣內薄於五臟橫連募原也其道遠其氣深其行遲不能與衛氣俱行不得皆出故間日乃作也此段舊本在故作日益早也之下今改正於此其瘧間日發者由邪氣內薄於五臟之陰橫連膏膜之募原也其道遠其氣深道遠氣深其行於皮膚也遲衛氣夜行於陰日行於陽一日乃出五臟之氣三日乃出不能與衛氣俱行一日不得皆出故間日乃作而交於三日之首也其氣之舍深內薄於陰陽氣獨發陰邪內著陰與陽爭不得出是以間日而作也此復申明上文之意橫連募原則其氣之舍深薄於五臟則內薄於陰道遠氣深行遲則陽氣獨發陰邪內著矣不能與衛氣俱行不得皆出則陰與陽爭不得出矣是以交三日之首間日而作也帝曰善其作日晏與其日早者何氣使然間日之瘧其氣舍深日作之瘧氣舍不深帝故善之其瘧日作而早晏不同則何氣使然岐伯曰邪氣客於風府循膂而下衛氣一日一夜大會於風府其明日日下一節故其作也晏此先客於脊背也瘧邪隨經經氣不足病氣下入則瘧作日晏經氣有餘病氣上出則瘧作日早故假邪氣之入於風府出於風府者以明之邪氣客於風府經氣不足則循膂而下衛氣一日一夜常大會於風府衛氣之行其明日日下一節周時至於風府不與邪遇必循膂而下乃遇故其作也晏此從風府而下乃邪氣之先客於脊背也每至於風府則腠理開腠理開則邪氣入邪氣入則病作以此日作稍益晏也申明邪氣之所以客於風府者以衛氣每至於風府則腠理開腠理開則邪氣入邪氣入則瘧病作邪氣循膂而下以此日作稍益晏也益者漸次之謂其出於風府日下一節二十一日下至骶骨二十二日入於脊內注於伏膂之脈其氣上行九日出於缺盆之中其氣日高故作日益早也若其氣不循膂而下則出於風府夫衛氣之行日下一節二十一日下至骶骨二十二日入於脊內注於伏膂之脈今病氣不循膂而下則其氣上行衛氣循經一月一周故九日出於缺盆之中其氣上行則其氣日高故作日益早也此假病氣之入於風府則從上而下出於風府則從下而上以明日作之瘧而有早晏之不同也帝曰夫子言衛氣每至於風府腠理乃發發則邪氣入入則病作今衛氣日下一節其氣之發也不當風府其日作者奈何復舉岐伯之言而問衛氣日下一節其氣之發不當風府其日作而不早晏者奈何岐伯曰此邪氣客於頭項循膂而下者也故虛實不同邪中異所則不得當其風府也故邪中於頭項者氣至頭項而病中於背者氣至背而病中於腰脊者氣至腰脊而病中於手足者氣至於足而病衛氣之所在與邪氣相合則病作故風無常府衛氣之所發必開其腠理邪氣之所合則其府也中去聲此言衛氣與邪相合之處即為風府邪中異所無常府也衛氣日下一節不當風府者此邪氣客於頭項循膂而下者也經氣虛則循膂而下經氣實則其氣上行故虛實不同有從風府而入有不從風府而入是邪中異所不得定當其風府也故邪中於頭項者衛氣至頭項而病中於背者衛氣至背而病中於腰脊者衛氣至腰脊而病中於手足者衛氣至手足而病此衛氣循行之所在與邪氣相合則病乃作故風無常府衛氣之所發必開其腠理與邪氣之所合則其府也愚按上文風邪客於頭項行身之背太陽經氣之瘧也其氣上行出於缺盆之中行身之前陽明經氣之瘧也此邪中於頭項背腰手足無有定處少陽經氣之瘧也帝曰善夫風之與瘧也相似同類而風獨常在瘧得有時而休者何也風邪合而為府不必定當風府帝故善之復問風之與瘧風則善行數變瘧則寒熱更移相似同類而風傷經脈風獨常在瘧之發也得有時而休其故何也岐伯曰風氣留其處故常在瘧氣隨經絡沉以內薄故衛氣應乃作處去聲下同風傷經脈則風氣留其處故常在瘧氣外發隨經絡而沉以內薄則有時而休故明日衛氣應乃復作此一節論陰陽寒熱之瘧有日髮間日之淺深早晏經絡之虛實也帝曰瘧先寒而後熱者何也岐伯曰夏傷於大暑其汗大出腠理開發因遇夏氣淒滄之水寒藏於腠理皮膚之中秋傷於風則病成矣夫寒者陰氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱也病以時作名曰寒瘧藏如字先寒後熱名曰寒瘧夏暑無寒有淒滄之水寒至秋復傷於風先傷寒後傷風故先寒後熱病以時作者發作有時無早晏也帝曰先熱而後寒者何也岐伯曰此先傷於風而後傷於寒故先熱而後寒也亦以時作名曰溫瘧先熱後寒名曰溫瘧乃先傷於風後傷於寒故先熱後寒亦以時作無早晏也其但熱而不寒者陰氣先絕陽氣獨發則少氣煩冤手足熱而欲嘔名曰癉瘧承上文溫瘧而言其但熱不寒者名曰癉瘧絕無陰寒之氣是陰氣先絕陰氣先絕故不寒獨有陽氣之發是陽氣獨發陽氣獨發故但熱陰氣先絕水不濟火則少氣煩冤陽氣獨發火熱上炎故手足熱而欲嘔癉症之外更有牝瘧見金匱要賂中帝曰夫經言有餘者瀉之不足者補之今熱為有餘寒為不足夫瘧者之寒湯火不能溫也及其熱冰水不能寒也此皆有餘不足之類當此之時良工不能止必須其自衰乃刺之其故何也願聞其說瘧必自衰乃刺故引靈樞根結論之言而言當寒熱之時雖良工不能止其故何也岐伯曰經言無刺熇熇之熱無刺渾渾之脈無刺漉漉之汗故為其病逆未可治也為去聲下同靈樞逆順論云刺法曰無刺熇熇之熱無刺漉漉之汗無刺渾渾之脈無刺病與脈相逆者故為其病逆猶言其病與脈相逆也此皆未可刺治也引經言而對帝之經言也夫瘧之始發也陽氣並於陰當是之時陽虛而陰盛外無氣故先寒慄也瘧發有先寒慄者故夫瘧之始發也陽氣內並於陰當陽氣並陰之時則陽虛而陰盛陽主外主氣陽虛故外無氣外無氣而陰盛故先寒慄也陰氣逆極則復出之陽陽與陰復並於外則陰虛而陽實故先熱而渴瘧發有先熱渴者陰氣虛而內逆極則陰氣復出之陽是陽與陰復並於外並於外則陰虛而陽實陰虛則熱陽實則渴故先熱而渴也夫瘧氣者並於陽則陽勝並於陰則陰勝陰勝則寒陽勝則熱瘧者風寒之氣不常也病極則復至瘧發先寒則後熱先熱則後寒故夫瘧氣者並於陽則陽勝而熱並於陰則陰勝而寒風氣為陽陽勝則熱寒氣為陰陰勝則寒是症者風寒之氣不常也寒極則熱熱極則寒故病極則復至病之發也如火之熱如風雨不可當也故經言曰方其盛時必毀因其衰也事必大昌此之謂也經言靈樞逆順論之言也毀傷也瘧病之發也熱如火之熱寒如風雨不可當故經言曰方其盛時而治之正氣必毀因其衰也而治之事必大昌即此火熱風雨不可當之謂也夫瘧之未發也陰未並陽陽未並陰因而調之真氣得安邪氣乃亡故工不能治其已發為其氣逆也自衰乃刺不若因其未發而調治之故夫瘧之未發也陰未並陽陽未並陰因而調之真氣得安邪氣乃亡瘧之已發雖良工不能治為其氣之逆亂也帝曰善攻之奈何早晏何如攻治也早謂治其未發晏謂治其已衰承上文治其未發刺其已衰之意而復問也岐伯曰瘧之且發也陰陽之且移也必從四末始也陽已傷陰從之故先其時堅束其處令邪氣不得入陰氣不得出審候見之在孫絡盛堅而血者皆取之此真往而未得並者也刺其已衰上文已詳言之故此但言治其未發且者未定之辭瘧之將發未發也陰陽之將移未移也必從手足之四末始也蓋三陰三陽之氣從手足之井滎而出入更移如病在陽而陽已傷則陰從之而亦傷故當先其未發之時堅束其四末之處令邪氣之在此經者不得入於彼經彼經之陰氣不得出而並於此經審候其脈而見其證見其在孫絡盛堅而血者皆取刺之此真氣自往而未得交併之時也此治未發之也道帝曰瘧不發其應何如承上文治未發之意問瘧病不發之時其脈候證候何如而應岐伯曰瘧氣者必更盛更虛當氣之所在與病在陽則熱而脈躁在陰則寒而脈靜極則陰陽俱衰衛氣相離故病得休衛氣集則復病也瘧氣者寒熱相勝陰陽交極故必更盛更虛無有定也由此言之則瘧不發無所應矣惟當瘧氣之所在也如病在陽則身熱而脈躁病在陰則身寒而脈靜此其應也病極則陰陽之氣俱衰陰陽俱衰則衛氣與邪氣相離故病得休此其所以不發也如明日衛氣集與邪相遇則復病也帝曰時有間二日或至數日發或渴或不渴其故何也帝承相離則休之意問瘧發時有間二日或至數日當其發也有熱甚而渴有熱不甚而不渴其故何也岐伯曰其間日者邪氣與衛氣客於六腑而有時相失不能相得故休數日乃作也其間二日或數日者邪氣與衛氣並寒於六腑衛氣入腑周時不能外出而有時相失矣有時相失不能與病氣相湯故間二日或休數日乃作也瘧者陰陽更勝或甚或不甚故或渴或不渴常有或渴或不渴之問故日症者乃陰陽之氣更相勝也或陽熱之氣過甚則渴或陽熱之氣不甚則不渴也帝曰論言夏傷於暑秋必病瘧今瘧不必應者何也生氣通天論云夏傷於暑秋為痎瘧帝舉以問今瘧有不必為是者何也岐伯曰此應四時者也其病異形者反四時也其以秋病者寒甚以冬病者寒不甚以春病者惡風以夏病者多汗惡去聲邪氣伏藏而病瘧此應四時之升降出入者也其病異形者感一時之氣而為瘧此反四時也其以秋時病瘧者冬傷於寒陽氣內藏故寒不甚以春時病瘧者春傷於風氣機始發故惡風以夏時病瘧者夏傷於暑腠理開故多汗此春夏秋冬皆能病瘧所以明其不必應也帝曰夫病溫瘧與寒瘧而皆安舍舍於何臟上文夏受水寒秋傷於風藏於腠理皮膚之中發則先寒後熱名曰寒瘧溫瘧只言先傷於風後傷於寒未言所受之時未明所藏之處帝欲詳明溫瘧之由故問溫瘧與寒瘧而皆安舍舍於何臟上文因寒瘧而及溫瘧故寒瘧詳而溫瘧略此問溫瘧而兼寒瘧故下文但論溫瘧而不復言寒瘧也岐伯曰溫瘧者得之冬中於風寒氣藏於骨髓之中至春則陽氣大發邪氣不能自出因遇大暑腦髓爍肌肉消腠理發泄或有所用力邪氣與汗皆出此病藏於腎其氣先從內出之於外也如是者陰虛而陽盛陽盛則熱矣衰則氣復反入入則陽虛陽虛則寒矣故先熱而後寒名曰溫瘧上中去聲藏如字下同溫瘧者得之冬中於風寒邪氣藏於骨髓之中至春則陽氣大發邪在骨髓氣行經脈故邪氣不能自出至夏因遇大暑暑熱上炎則腦髓爍暑行肌肉則肌肉消暑開腠理則腠理發泄或有所用力勞其形體則骨髓之邪氣與汗皆出而為瘧此病邪藏於腎其氣先從內之骨髓而出於肌肉腠理之外也如是者大暑消爍陰虛而陽盛陽盛則熱矣陽熱衰則氣復反入既衰反入則陽虛陽虛則寒矣故先熱後寒名曰溫瘧寒瘧已悉於前故不復論帝曰癉瘧何如因溫瘧而復問但熱不寒之癉瘧也岐伯曰癉瘧者肺素有熱氣盛於身厥逆上衝中氣實而不外泄因有所用力腠理開風寒舍於皮膚之內分肉之間而發發則陽氣盛陽氣盛而不衰則病矣其氣不反於陰故但熱而不寒氣內藏於心而外舍於分肉之間令人消爍脫肉故命曰癉瘧反舊本誤及今改癉瘧者其人肺素有熱肺主氣肺熱則氣盛於身肺氣不能外出於皮毛則厥逆上衝上衝者中氣實而不能外泄也肺熱而實因有所用力勞其形體則腠理開腠理在皮膚之內分肉之間因其開也風寒復舍於皮膚之內分肉之間而發為瘧病發則陽氣盛故先熱陽氣盛而不衰故但熱不寒則病癉瘧矣上文溫瘧氣復反入故先熱後寒癉瘧其氣不反於陰故但熱而不寒申明氣不反陰但熱不寒者邪熱之氣內藏於心而外舍於分肉之間令人消爍脫肉是以氣不反陰但熱不寒故命曰癉瘧所以詳明癉瘧之所藏者如此帝曰善由癉瘧而推之則上文少氣煩冤手足熱而欲嘔亦火熱之氣內藏於心帝故善之此一節論寒瘧溫瘧癉瘧之所由來及治瘧早晏之法也刺瘧篇第三十六篇帝承上篇瘧論而申明刺瘧之法舉三陽三陰五臟胃腑之瘧以及風瘧溫瘧各有刺治因名刺瘧足太陽之瘧令人腰痛頭重寒從背起先寒後熱熇熇暍暍然熱止汗出難已刺郄中出血足太陽之脈從頭下背挾脊抵腰故足太陽之瘧令人腰痛頭重寒從背起病太陽之本氣故先寒病太陽之標氣故後熱其熱也如火之熇熇暑之暍暍然熱止則汗出多而難已郄中膕中央委中也刺郄中出血以治太陽之瘧足少陽之瘧令人身體解㑊寒不甚熱不甚惡見人見人心惕惕然熱多汗出甚刺足少陽惡去聲下同解㑊猶懈惰樞轉不力也足少陽之脈行身之側樞轉運行瘧病則樞轉不力故令人身體解㑊樞轉在中以司開合開出為陽合入為陰陰陽皆虛故寒不甚熱不甚少陰陽氣不足故惡見人見人則心惕惕然既見而心惕惕則熱多汗出甚當刺足少陽以治少陽之瘧足陽明之瘧令人先寒灑淅灑淅寒甚久乃熱熱去汗出喜見日月光火氣乃快然刺足陽明跗上經脈論云足陽明是動則病洒洒振寒故足陽明之瘧令人先寒灑淅灑淅寒甚寒久則乃熱熱去則陰陽和故汗出陽明虛故喜見日月光火氣喜見者得之乃快然也當刺足陽明跗上之衝陽以治陽明之瘧足太陽之瘧令人不樂好太息不嗜食多寒熱汗出病至則善嘔嘔已乃衰即收之好去聲足太陰瘧病脾脈不上注於心故令人不樂脾氣不上交於肺故好太息脾胃不和故不嗜食脾氣不充於肌腠故多寒熱脾土內虛水津外泄故汗出瘧病方至正氣不能上行外達則善嘔嘔則太陰之氣從下而上故嘔已乃衰病衰當即取太陰之經而刺治之足少陰之瘧令人嘔吐甚多寒熱熱多寒少欲閉戶牖而處其病難已足少陰瘧病陰寒上逆故令人嘔吐甚從陰出陽水火主氣故多寒熱氣越於外陽盛陰虛故熱多寒少少陰神氣熱甚而虛故欲閉戶牖而處陰陽水火皆病神氣復虛故其病難已病難已故不言刺也足厥陰之瘧令人腰痛少腹滿小便不利如癃狀非癃也數便意恐懼氣不足腹中悒悒刺足厥陰數音朔足厥陰之脈合督脈而上行故足厥陰之瘧令人腰痛其脈過陰器抵小腹故少腹滿少腹滿則小便不利小便不利則如癃狀如癃狀究之非癃也數便則小便少而不利爾生陽之氣根於厥陰陰極而陽不生故意恐懼意恐懼則氣不足氣不足不能上出於陽故腹中悒悒悒悒鬱而不舒也當刺足厥陰以治厥陰之瘧肺瘧者令人心寒寒甚熱熱間善驚如有所見者刺手太陰陽明間去聲下間日之間同肺天也心日也肺瘧者令人心寒天日虛寒也天日為陽故寒已而甚熱熱間則氣血皆虛故善驚其驚也如有所見者當刺手太陽兼及手陽明而治其肺瘧焉心瘧者令人煩心甚欲得清水反寒多不甚熱刺手少陽心火也火熱則煩故心瘧者令人煩心甚心煩既甚欲得清水以濟其熱得水則真火被卻故反寒多而不甚然當刺手少陰而治其心瘧焉肝瘧者令人色蒼蒼然太息其狀若死者刺足厥陰見血蒼青色肝木色青故肝瘧者令人色蒼蒼然肝脈上注於肺肝氣不上故太息色蒼蒼而太息其狀若死者當刺足厥陰見血而治其肝瘧焉脾瘧者令人寒腹中痛熱則腸中鳴鳴已汗出刺足太陰脾主寒濕故脾瘧者令人寒腹為脾部脾寒故腹中痛脾土有濕寒之氣有濕熱之氣故熱則腸中鳴鳴已則濕熱外行故汗出當刺足太陰而治其脾瘧焉腎瘧者令人洒洒寒腰脊痛宛轉大便難目眴眴然手足寒刺足太陽少陰腎為寒水之臟故腎瘧者令人洒洒寒腰者腎之府腎病故腰脊痛腰脊痛則轉輸不利故宛轉靈樞五邪篇云邪在腎則骨痛陰痹大便難至真要大論云大便難陰氣不用故腎瘧而大便難骨之精為瞳子腎主骨故目眴眴然眴眴搖動不明也下焦生陽之氣不充於四肢故手足寒當刺足少陰兼足太陽而治其腎瘧焉胃瘧者令人且病也善飢而不能食食而支滿腹大刺足陽明太陰橫脈出血且姑且也且病病而將愈之意橫脈絡脈也經直絡橫之意五臟瘧病至於胃腑則從陰出陽其病將愈故胃瘧者令人且病也將愈未愈故善飢而不能食脾胃之絡脈不和故食而支滿腹大當刺足陽明兼足太陰之橫脈而刺出其血焉瘧發身方熱刺跗上動脈開其空出其血立寒瘧方欲寒刺手陽明太陰足陽明太陰空孔同此復申明胃瘧之義跗上動脈足陽明衝陽之脈也胃瘧之發其身方熱當刺足跗上陽明衝陽之動脈搖針以開其穴孔瀉出其血則身立寒胃瘧之發身方欲寒此陽明之氣內合太陰故當刺手陽明兼手太陰足陽明兼足太陰也瘧脈滿大急刺背俞用中針旁五胠俞各一適肥瘦出其血也瘧脈小實急灸脛少陰刺指井此言經脈之瘧而有五俞之刺法也中針不大不小之針也胠脅旁連背處也瘧脈滿大急經脈之氣有餘也五臟之俞皆在於背故刺背俞五臟之俞在背兩行兩行之外復有兩行所謂胠也肺曰魄戶心曰神堂肝曰魂門脾曰意舍腎曰志室故用中針旁五胠俞各刺其一肥者深刺之瘦者淺刺之適肥瘦以為刺而出其血以瀉經脈之有餘也瘧脈小實急經脈之氣不足也有餘瀉之不足補之脈小正氣虛也故當灸脛少陰之太谿以啟生陽之氣實急邪氣實也又當刺足小趾至陰之井穴先灸後刺助正散邪之法也瘧脈滿大急刺背俞用五胠俞背俞各一適行至於血也瘧脈緩大虛便宜用藥不宜用針上文刺背俞旁五胠俞各一乃合背俞胠俞而皆刺之故於此復明之所謂瘧脈滿大急刺背俞者乃用中針五胠俞與背俞各刺其一適肥瘦以行針而至於出血也瘧脈緩大虛承瘧脈小實急而言瘧脈不急而緩不小而大不實而虛也如是便當補之不當瀉之故曰便宜用藥不宜用針又不但先灸後針也此承上文而申明之也凡治瘧先發如食頃乃可以治過之則失時也凡治瘧者統承上文刺法而言也先發如食頃乃可治者治之宜先也過之者過其食頃之時則為失時失時而治治無益也諸瘧而脈不見刺十指間出血血去必已先視身之赤如小豆者盡取之諸瘧者統承上文瘧病而言也脈不見者不見滿大急小實急緩大虛之脈也病不在脈但當刺手十指間井穴出血血去心已更當先其未發之時視身之皮膚赤點如小豆者盡取而刺之夫所出為井皮膚主表病不在脈故如是以刺之十二瘧者其發各不同時察其病形以知其何脈之病也先其發時如食頃而刺之一刺則衰二刺則知三刺則已不已刺舌下兩脈出血不已刺郄中盛經出血又刺項以下俠脊者必已舌下兩脈者廉泉也刺瘧者必先問其病之所先發者先刺之先頭痛及重者先刺頭上及兩額兩眉間出血先項背痛者先刺之先腰脊痛者先刺郄中出血先手臂痛者先刺手少陰陽明十指間先足脛痠痛者先刺足陽明十指間出血上文三陽三陰五臟胃腑合十二經脈故曰十二瘧者其發各不同時當先其時而察其病形以知其何脈之病也知其病之所在更當先其發時如食頃而刺之刺之得宜一刺則衰衰邪氣少去也二刺則知知小便利腹中和也三刺則已已病邪皆去正將復也設三刺不已更刺舌下之兩脈出血刺兩脈不已更刺郄中盛經出血又刺項以下俠脊者其病必已申明舌下兩脈者廉泉也夫一刺二刺三刺之刺瘧者必先問其病之所先發者先刺之如先頭痛及頭重者先刺頭上以治其痛及兩額兩眉間出血以治其重先項背痛者先取項背而刺之先腰脊痛者先刺太陽之郄中出血先手臂痛者先刺手少陰陽明在手十指間之少衝商陽先足脛痠痛者先刺足陽明在足十指間之厲兌出血此統承三陽三陰五臟胃腑十二經脈之瘧而言刺治之宜先也風瘧瘧發則汗出惡風刺三陽經背俞之血者風瘧因風病瘧也瘧發則汗出惡風風傷太陽之肌腠也太陽三陽也刺三陽經背俞之血者所以治太陽之風瘧也䯒痠痛甚按之不可名曰附髓病以鑱針針絕骨出血立已附舊本訛附今改髓痠痛甚因風而痠痛也按之不可痛在骨也髓藏於骨故名曰附髓病經脈論云膽足少陽之脈直下抵絕骨之端是主骨所生病者故以鑱針針少陽之絕骨出血立已身體小痛刺至陰諸陰之井無出血間日一刺身體小痛不若䯒痠病甚也痛不在骨在太陽之通體故刺太陽經之至陰不言出血者以諸陰之井無出血至陰之穴交於湧泉陰可知矣且當間日一刺瘧不渴間日而作刺足太陽渴而間日作刺足少陽間日一刺其瘧亦必間日而作太陽之上寒氣主之故瘧不渴間日而作者刺足太陽少陽之上火氣主之故渴而間日作者刺足少陽溫瘧汗不出為五十九刺五十九刺見水熱穴論溫瘧汗不出是邪氣藏於腎不能外出之陽故為五十九刺以瀉少陰腎臟之熱而發越於外凡此皆刺瘧之法所以承上篇而申明之氣厥論第三十七篇五臟六腑主十二經脈一氣運行環轉不息臟腑不和則氣厥氣厥則寒熱相移寒熱相移此皆得之氣厥故帝問寒熱相移伯舉而論之終言得之氣厥也黃帝問曰五臟六腑寒熱相移者何五臟六腑一氣運行寒熱相移由於氣厥帝故問之岐伯對曰腎移寒於脾癰腫少氣脾舊本誤肝今改五臟之氣以腎為本如腎藏受寒轉移於脾脾主肌肉故癰腫癰腫則腠理的能外通皮毛內合三焦故少氣脾移寒於肝癰腫筋攣脾臟受寒轉移於肝肝血凝聚則癰腫癰腫則筋不柔和故筋攣肝移寒於心狂膈中肝臟受寒轉移於心心者火也寒逆於心則狂申明狂者由寒氣之隔於中故曰隔中心移寒於肺肺消肺消者飲一溲二死不治心臟受寒轉移於肺則為肺消申明肺消者消渴欲飲飲一溲二也水精不布下而不上故死不治肺移寒於腎為湧水湧水者按腹不堅水氣寒於大腸疾行則鳴濯濯如囊裹漿水之病也肺臟受寒轉移於腎則為湧水申明湧水者土虛水泛土虛則按腹不堅水泛則水氣寒於大腸疾行則腸鳴而濯濯有而如囊之裹漿此為湧水之病也脾移熱於肝則為驚衄承上文移寒而復論移熱也脾臟受熱轉移於肝肝氣熱則驚肝血熱則衄故為驚衄肝移熱於心則死肝臟受熱轉移於心心者火也火烈自焚故死心移熱於肺傳為膈消心臟受熱轉移於肺膈之上心肺也故傳為膈消消消渴也肺移熱於腎傳為柔痓肺臟受熱轉移於腎腎主骨骨屬屈伸故傳為柔痓腎移熱於脾傳為虛腸澼死不可治腎臟受熱轉移於脾脾者土也虛則清濁不分故傳為虛腸澼虛而腸澼死不可治按陰陽別論云心之肺謂之死陰死陰之屬不過三日而死肝之心謂之生陽生陽之屬不過四日而死腎之脾謂之闢陰死不治故心移寒於肺肝移熱於心腎移熱於脾皆言其死此之謂也胞移熱於膀胱則癃溺血溺鳥去聲承上文五臟寒熱相移而論六腑之移熱也胞者血海也膀胱者胞中之室如胞移熱於膀胱熱入膀胱則癃血入膀胱則溺血膀胱移熱於小腸膈腸不便上為口糜小腸居大腸之上小腸受膀胱之熱不能化物而傳於大腸則膈腸不便熱氣上蒸則為口糜糜腐爛也小腸移熱於大腸為虙瘕為沉痔虙音伏義同痔字簡脫今補小腸清濁兼收小腸受熱移於大腸則精汁凝聚而為伏瘕火熱下行而為沉痔大腸移熱於胃善食而瘦又謂之食亦亦作㑊下同大腸與胃皆屬陽明燥氣大腸移熱於胃上熱而燥故善食而瘦㑊者懈㑊土氣不濡灌溉不力善食而瘦又謂之食㑊胃移熱於膽亦曰食亦胃者五穀之府膽者中精之府胃移熱於膽膽受火熱精汁不布亦善食而瘦亦曰食㑊膽移熱於腦則辛頞鼻淵鼻淵者濁涕下不止也傳為衄衊瞑目衊音滅餘篇仿此鼻兩旁曰頞鼻血曰衄血汙曰衊膽藏精汁腦為髓海膽移熱於腦腦受火熱則兩頞辛痠而鼻淵申明鼻淵者濁涕下不止也鼻淵不止則傳為衄衊衄衊則三陽經脈皆虛故瞑目蓋陽明之脈起於鼻頞中太陽少陽之脈起於兩目眥也故得之氣厥也五臟寒熱相移及六腑移熱皆由氣厥所致故曰得之氣厥也咳論第三十八篇咳肺病也形寒飲冷則為肺咳而五臟六腑皆能為咳五臟則關於肺六腑則聚於胃而治各有法黃帝問曰肺之令人咳何也凡咳皆出於肺故為此問岐伯對曰五臟六腑皆令人咳非獨肺也肺朝百脈五臟六腑之氣皆出於肺故五臟六腑皆令人咳非獨肺也帝曰願聞其狀願聞五臟六腑之咳狀岐伯曰皮毛者肺之合也皮毛先受邪氣邪氣以從其合也其寒飲食入胃從肺脈上至於肺則肺寒肺寒則外內合邪因而客之則為肺咳皮毛先受邪氣則外寒飲食寒氣則入肺則內寒外內合邪因而客之於肺是為肺咳此言形寒飲冷而為肺咳也五臟各以其時受病非其時各傳以與之五臟之氣合於四時其受病也各以其時當其主氣之時而受至非其主氣之時各傳以與之而為咳人與天地相參故五臟各以治時感於寒則受病微則為咳甚則為泄為痛治猶主也人與天地相參故五臟各以主時主時而感於寒則受病微則手太陰受寒而為咳甚則足太陰受寒而為泄為痛乘秋則肺先受邪乘春則肝先受之乘夏則心先受之乘至陰則脾先受之乘冬則腎先受之申明五臟各以其時受病之意咳病屬肺故先舉其秋肝心脾腎雖先受之皆傳於肺而為咳脾為陰中之至陰寄王四時乘至陰即其王時也帝曰何以異之五臟皆傳於肺而為咳諸臟未悉其狀故問何以異之岐伯曰肺咳之狀咳而喘息有音甚則唾血肺出音聲以司呼吸故肺咳之狀咳而喘息有音甚則喘久而唾血心咳之狀咳則心痛喉中介介如梗狀甚咽腫喉痹心脈起於心中上挾咽復從心系上肺氣通於喉故心咳之狀咳則心病喉中介介如梗狀甚則咽腫而喉痹肝咳之狀咳則兩脅下痛甚則不可以轉轉則兩胠下滿肝脈布脅肋上注肺故肝咳之狀咳則兩脅下痛痛甚則不可以轉轉則兩胠下滿脾咳之狀咳則右胠下痛陰陰引肩背甚則不可以動動則咳劇脾者地氣也肺者天氣也天氣左旋下交於地地氣右旋上騰於天故脾咳之狀咳則右胠下痛陰陰引肩背甚則右胠肩背不可以動動則咳劇腎咳之狀咳則腰背相引而痛甚則咳涎腰者腎之外候故腎咳之狀咳則腰背相引而痛甚則水氣上逆而咳涎凡此申明五臟咳狀之各異也帝曰六腑之咳奈何安所受病因五臟而問六腑之咳從何受病岐伯曰五臟之久咳乃移於六腑脾咳不已則胃受之胃咳之狀咳而嘔嘔甚則長蟲出長蟲蛔蟲也諸病由腑及臟咳病由臟及腑故五臟久咳乃移於六腑也五臟咳病皆歸於肺故五臟先舉其肺六腑咳病皆歸於胃故六腑先舉其胃胃者脾之腑故脾咳不已則胃受之咳而嘔胃氣逆也嘔甚則長蟲出胃中冷則吐蛔也肝咳不已則膽受之膽咳之狀咳嘔膽汁膽者肝之臟故肝咳不已則膽受之咳嘔膽汁膽氣上逆嘔出苦涎也肺咳不已則大腸受之大腸咳狀咳而遺矢矢屎通舊本誤失今改大腸者肺之臟故肺咳不已則大腸受之咳而遺矢大腸失職也心咳不已則小腸受之小腸咳狀咳而先氣氣與咳俱失小腸者心之腑故心咳不已則小腸受之咳而失氣下氣泄也下氣泄則咳平故氣與咳俱失失猶散也腎咳不已則膀胱受之膀胱咳狀咳而遺溺溺鳥去聲膀胱者腎之腑故腎咳不已則膀胱受之咳而遺溺膀胱不約水氣泄也久咳不已則三焦受之三焦咳狀咳而腹滿不欲食飲靈樞本俞論云三焦者中瀆之府也屬膀胱故腎咳不已始則膀胱受之久咳不已則三焦受之三焦之氣不能自下而中故咳而腹滿不能從中而上故不欲食飲也凡此皆五臟久咳移於六腑其狀如此此皆聚於胃關於肺使人多涕唾而面浮腫氣逆也此結上文之意六腑以胃為本五臟以肺為先故承上文五臟六腑之咳而言此皆聚於胃關於肺聚於胃則使人多涕唾而面浮腫關於肺則氣逆也帝曰治之奈何聚胃關肺治之奈何岐伯曰治臟者治其俞治腑者治其合浮腫者治其經帝曰善關肺而治臟者治其俞五臟之俞皆在於背如肺俞心俞肝俞脾俞腎俞是也聚胃而治俞者治其合六腑之合皆在於肘膕之中如胃合於三里膽合於陽陵泉大腸合於曲池小腸合於小海膀胱合於委中三焦合於天井是也若臟腑兼病治浮腫者治其經經者臟腑相通之經脈也舉浮腫則涕唾氣逆皆在其中得其治俞治合治經之意而推廣之治咳不難矣帝故善之舉痛論第三十九篇人身經脈流行氣機環轉上下內外無有已時寒氣客之稽遲不行則痛諸痛各不同形百病皆生於氣帝舉以問伯一一以對是為舉痛論也黃帝問曰余聞善言天者必有驗於人善言古者必有合於今善言人者必有厭於己如此則道不惑而要數極所謂明也今余問於夫子令言而可知視而可見捫而可得令驗於己如發蒙解惑可得而聞乎厭棄也棄其非而從其是也言天必驗於人言古必合於今言人必棄於己不惑於道而知要數之極所謂至明也今人不能故以為問言而可知問而知之也視而可見望而知之也捫而可得脈而知之也或言或視或捫皆今有驗於己如矇昧未明者發之疑惑未決者解之其道可得而聞乎岐伯再拜稽首對曰何道之問也言而可知視而可見捫而可得是何道之問也帝曰願聞人之五臟卒痛何氣使然卒音促下同痛者臟腑之氣不通也故願聞五臟卒痛何氣使然岐伯對曰經脈流行不止環周不休寒氣入經而稽遲泣而不行客於脈外則血少客於脈中則氣不通故卒然而痛泣作澀下同人身十二經脈乃血氣出入之道流行不止環周不休若寒氣入經而正氣稽遲則血凝澀而不行氣行脈外血亦隨之今寒客於脈外則血少血行脈中氣亦隨之今寒客於脈中則氣不通寒客經脈氣血不能流行環轉故卒然而痛帝曰其痛或卒然而止者或痛甚不休者痛有止不止之不同或痛甚不可按者或按之而痛止者或按之無益者痛者宜按不宜按之不同或喘動應乎者或心與背相引而痛者或脅肋與少腹相引而痛者或腹痛引陰股者痛有上下相應相引之不同或痛宿昔而成積者或卒然痛死不知人少間復生者間去聲痛有久暫之不同或痛而嘔者或腹痛而後泄者或痛而閉不通者痛有通閉之不同凡此諸痛各不同形別之奈何別音逼諸痛不同其形亦異故舉以問岐伯曰寒氣客於脈外則脈寒脈寒則縮蜷縮蜷則脈絀急絀急則外引小絡故卒然而痛得炅則痛立止因重中於寒則痛久矣絀音屈炅烱同音景下炅及餘篇皆仿此重平聲中去聲絀猶屈也炅猶熱也其痛或卒然而止或痛甚不休者始因寒氣客於脈外則脈寒脈寒則凝澀而縮蜷縮蜷則脈絀而急脈絀急則外引小絡小絡孫絡也脈與孫絡寒氣客之故卒然而痛得陽熱之氣復於絡脈則痛立止所以其痛或卒然而止也始因寒空客於脈外繼因重中於寒則痛久矣所以或痛甚不休也寒氣客於經脈之中與炅氣相薄則脈滿滿則痛而不可按也寒氣稽留炅氣從上則脈充大而血氣亂故痛甚不可按也寒氣客於腸胃之間膜原之下血不得散小絡急引故痛按之則血氣散故按之痛止按之則熱氣至熱氣至則痛止矣寒氣客於俠背之脈則深按之不能及故按之無益也舊本按之則熱氣至十三字在下段故相引而痛之下今改正於此或痛甚不可按者乃寒氣客於經脈之中與陽熱之炅氣相薄陰陽寒熱相薄則脈滿脈滿則壅滯而痛壅滯而痛故不可按也所以然者寒氣客於經脈之中則寒氣稽留與炅氣相薄則炅氣從上脈滿則脈充大致血氣亂而為痛血氣既亂故痛甚不可按也或按之痛止者乃寒氣客於腸胃之間膜原之下膜原內通脾土外化肌腠寒氣客之則脾絡之血不得從經隧而散於肌腠之小絡致小絡急引急引故痛按之則血氣得以散於小絡故按之痛止所以然者按之則血氣散散則熱氣至熱氣甚故痛止矣或按之無益者乃寒氣客於俠脊之脈俠脊之脈五臟之俞也故客之則深按之不能及於內臟故按之無益也寒氣客於衝脈衝脈起於關元隨腹直上寒氣容則脈不通脈不通則氣因之故喘動應乎矣寒氣客於背俞之脈則脈泣脈泣則血虛血虛則痛其俞注於心故相引而痛寒氣客於厥陰之脈厥陰之脈者絡陰器繫於肝寒氣客於脈中則血泣脈急故脅肋與少腹相引痛矣厥氣客於陰股寒氣上及少腹血泣在下相引故腹痛引陰股或喘動應乎者乃寒氣客於衝脈夫衝脈起於關元隨腹直上會於咽喉散於通體寒氣客則衝脈不能直上故脈不通脈不通則氣因之而逆衝脈不通而痛故喘動應乎矣或心與背相引而痛者乃寒氣客於背俞之脈則脈澀脈澀則血虛血虛則痛心主血脈其俞在背是其背俞注於心注於心故優與背相引而痛也或脅肋與少腹相引而痛者乃寒氣客於厥陰之脈夫厥陰之脈者絡陰器繫於肝寒氣客於厥陰之脈中則肝血澀而陰器脈急故脅肋與少腹相引痛矣或腹痛引陰股者亦寒氣客於厥陰之脈也厥陰之脈循陰股抵小腹厥陰受寒則厥氣客於陰股寒氣上及少腹肝血凝澀不能循脈而上則在下相引在下相引故少腹痛而引陰股也寒氣客於小腸膜原之間絡血之中血泣不得注於大經血氣稽留不得行故宿昔而成積矣寒氣客於五臟厥逆上泄陰氣竭陽氣未入故卒然痛死不知人氣復反則生矣或痛宿昔而成積者乃寒氣客於小腸小腸受寒則內而膜原之間外而絡血之中血氣不相通貫故血澀不得注於大經而成有形之血積血澀則氣稽留血氣稽留不得行則積之成也匪朝伊夕故痛於宿昔久而成積矣或卒然痛死不知人少間復生者乃寒氣客於五臟客於五臟則臟寒臟寒則厥逆之氣上泄陰氣竭於內陽氣虛於外不能即入於陰陰氣竭陽氣未入故卒然痛死不知人少間則陰氣竭而得復陽氣未入而得反乍刻乍蘇則生矣寒氣客於腸胃厥逆上出故痛而嘔也寒氣客於小腸小腸不得成聚故後泄腹痛矣熱氣留於小腸腸中痛癉熱焦渴則堅幹不得出故痛而閉不通矣或痛而嘔者乃寒氣客於腸胃厥逆之氣欲從上出故痛而嘔也或腹痛而後泄者乃寒氣客於小腸小腸不得成聚而傳化故後泄而腹痛矣或痛而閉不通者乃小腸之邪不得後泄閉而則熱熱氣留於小腸則腸中痛熱氣留則癉熱焦渴癉熱焦渴則小腸受盛之物堅幹不得出故痛而閉不通矣以上皆言寒氣至終則言熱氣以明始因於寒後乃化熱而寒熱之氣皆能致痛也帝曰所謂言而可知者也視而可見奈何諸痛各不同形必言其痛之所在而後知之此所謂言而可知者也醫者不問病者不言視而可見奈何岐伯曰五臟六腑固盡有部視其五色黃赤為熱白為寒青黑為痛此所謂視而可見者也五臟為陰六腑為陽固盡有所屬之部視其面之五色而知病之所在如面色紅赤則知臟腑之有熱面色白則知臟腑之有寒面色青黑則知臟腑之有痛望面色而知其病所謂視而可見者此也帝曰捫而可得奈何上文云言而可知視而可見捫而可得故復問捫而可得岐伯曰視其主病之脈堅而血及陷下者皆可捫而得也視其主病之脈如寸脈主心肺之病關脈主肝脾之病者是也堅而血是知脈體有餘邪氣實也及陷下者是知脈體不足正氣虛也邪實正虛皆可捫而得也此一節言諸痛各不同形皆言而可知視而可見捫而可得也帝曰善余知百病生於氣也怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收炅則氣泄驚則氣亂勞則氣耗思則氣結九氣不同何病之生經脈流行不止環周不休氣有所述則病生焉故知百病之生於氣也七情動於內寒炅發於外則氣因之而痛然九氣不同何病之生岐伯曰怒則氣逆甚則嘔血及飧泄故氣上矣怒則肝氣內逆肝主衝任之血故逆甚則嘔血木王土衰故及為飧泄怒則氣上以此故也喜則氣和志達榮衛通利故氣緩矣喜則心氣和而心志達和於內而達於外則榮衛通利喜則氣緩以此故也悲則心系急肺布葉舉而上焦不通榮衛不散熱氣在中則氣消矣悲則心氣並於肺故心系急心系上連於肺故肺布葉舉肺位房上主行榮衛陰陽之氣今肺布葉舉而致上焦不通榮衛不散上焦不通榮衛不散則氣鬱於中而致熱氣在中悲則氣消以此故也恐則精卻卻則上焦閉閉則氣還還則下焦脹故氣不行矣恐則腎傷而精卻卻退卻也精卻則生陽之氣不能上升故卻則上焦閉閉則在上之氣還歸於下故閉則氣還上而復還不能環轉故還則下焦脹恐傷腎而上下不交故氣不行不行者不行於上也恐則氣下以此故也寒則腠理閉氣不行故氣收矣寒則肌腠之文理閉而不開閉則三焦之氣不能通會於肌腠故氣不行寒則氣收以此故也炅則腠理開榮衛通汗大泄故氣泄矣炅則陽熱氣盛故腠理開開則榮衛通腠理開而榮衛通則汗大泄炅則氣泄以此故也驚則心無所倚神無所歸慮無所定故氣亂矣驚則心氣動而無所倚神氣越而無所歸思慮惑而無所定驚則氣亂以此故也勞則喘息汗出外內皆越故氣耗矣勞則氣血皆傷氣虛而喘息於內血虛而汗出於外外內皆越氣血耗竭勞則氣耗以此故也思則心有所存神有所歸正氣留而不行故氣結矣思則心有所存不能肆應神有所歸不能周遍心存神歸則正氣壽而不行思則氣結以此故也此一節因諸痛各不同形之意而言百病皆生於氣以明九氣之不同也腹中論第四十篇腹中之氣不能從臍腹而行於胸膈達於四肢則為鼓脹腫痛之病腹中之血不能從臍腹而內通於胞中外通於經絡則為血枯膿血之病前節論腹中氣血不和則有腹中之病後節論土氣不和而厥逆經血不和而熱甚亦有腹中之病故曰腹中論也黃帝問曰有病心腹滿旦食則不能暮食此為何病心腹心之下腹之上也滿脹滿也心腹脹滿而不能食外滿內虛此為何病岐伯對曰名為鼓脹外脹滿而內不食外勁內空如按鼓革故名為鼓脹帝曰治之奈何鼓脹之病何以治之岐伯曰治之以雞矢醴一劑知二劑已矢屎通雞矢醴以雞屎和醴酒同服也雞屬酉金又主巽木陽明燥金濟土之濕東方風木伐土之頑雞無前陰屎溺同竅鼓脹則水氣不行治以雞屎使水濕從大便出也醴者熟谷之液見行皮毛先充絡脈後谷而入先谷而出治之以醴使足太陰脾土之氣合乎太陰肺主之皮毛從皮毛而行絡脈從絡脈而通水道使水濕從小便出也一劑知一劑則腹中和二劑已二劑則腹膨潛消也帝曰其時有復發者何也治以雞屎醴使水濕下行則地土之氣陷而不升一周環轉土氣虛而水復聚故有復發之問岐伯曰此飲食不節故時有病也雖然其病且已時故當病氣聚於腹也此脾土氣先虛而飲食不節故時有復發之病也病雖復發其腹滿之病且有已時病已而土虛土虛而飲食不節故當病氣聚於腹而復發也是知病已之後飲食當慎擇而有節也帝曰有病胸脅支滿者妨於食病至則先聞腥臊臭出清液先唾血四肢清目眩時時前後血病名為何何以得之為去聲下為何病之為俱同承上文心腹滿不能暮食而問有病胸脅支滿亦妨於食胸者肺之部脅者肝之部故病至則先聞肺臭之腥肝臭之臊肺病則出清液肝病則先唾血肺脈從胸而行於手肝脈從足而行於脅肺肝皆病故四肢清肺主氣肝主血氣血皆虛故目眩肝主衝任之血不能熱肉充膚故時時前後血病名為何正其名也何以得之探其原也岐伯曰病名血枯此得之年少時有所大脫血若醉入房中氣竭肝傷故月事衰少不來也首少去聲唾血便血病名血枯正其名也此得之年少時有所大脫血探其原也男子脫血若醉入房中而陽氣竭氣竭不能攝血矣女子脫血若肝傷肝傷故月事衰少不來也此氣竭肝傷更為脫血之原也帝曰治之奈何復以何術問治而求其術欲多方以治也岐伯曰以四烏鰂骨一茹藘二物併合之丸以雀卵大如小豆以五丸為後飯欲以鮑魚汁利腸中及傷肝也茹藘舊本誤藘茹今改以猶用也烏鰂骨烏賊魚之骨也魚水中生動之物鰂魚狀若包囊腹中有墨脊生一骨輕脆空通用四烏鰂骨取水中生動之氣上通於肺而四布也茹藘名茜草又名地血色紫有汁上通肝血用一茹藘取月事所生之血本於天一之癸水也雀乃羽蟲主陽主氣入水為蛤主陰主血又卵白主氣卵黃主血二物併合丸以雀卵因氣竭肝傷補氣補血也小豆形園象土五者土之數氣血由中土而化生故大如小豆每用五丸也後飯者先藥後飯使藥下行而以飯壓之也鮑魚醃魚也味酸氣臭以鮑魚之汁為飲送藥取其利腸中而下行及傷肝而月事不來也此論腹中血病而明其治術也帝曰病有少腹盛上下左右皆有根此為何病可治不不作否盛猶滿也承上文心腹滿胸脅肢滿而問有少腹盛滿致上下左右皆有根此為何病正其名也可治否求其治也岐伯曰病名曰伏梁如梁之橫伏於下故病名伏梁帝曰伏梁何因而得之何因得之探其原也岐伯曰裹大膿血居腸胃之外不可治治之每切按之致死伏梁裹大膿血而居空廓之間腸胃之外病形已成故不可治治之每急切而按摩之必真氣受傷故致死帝曰何以然何以不可治治之致死岐伯曰此下則因陰必下膿血上則迫胃脘生膈俠胃脘內癰此久病也難治居齊上為逆居齊下為從勿動亟奪論在刺法中齊臍通下同因猶依也動猶用也此腸胃之下則依於陰每切按之而使下必下膿血每切按之而使上則迫近胃脘當生膈俠胃脘之內癰所謂不可治者以此伏梁為久病而難治也伏梁者如梁之橫伏於下故居臍上為逆若居臍下為從勿動亟奪猶言勿用急切按摩以奪之不當亟奪而妄奪必真氣受傷而致死論在本經刺法中論其理也帝曰人有身體髀股䯒皆腫環齊而痛是為何病承上文心腹滿胸脅支滿少腹盛滿而問人有身體髀股䯒皆腫環臍而痛腫於外而痛於內是為何病岐伯曰病名伏梁此風根也其氣溢於大腸而著於盲盲之原在齊下故環齊而痛也不可動之動之為水溺澀之病溺鳥去聲腹中之氣從臍腹而上行外達今身體髀股䯒皆腫真氣不行於外關環臍而痛真氣不行於上關為腫為痛真氣不行病名伏梁申明非裹大膿血之伏梁此風動水渙中土內虛因風而成乃風根也其風根之氣溢於大腸之外而著於少腹之盲九針十二原論云盲之原出於脖胦是盲之原在臍下故環臍而痛也此病無形之氣亦不可妄攻以動之若動之則氣不化而水不行當為水溺澀之病此伏梁之在氣分不同於裹大膿血之伏梁也此一節言腹中氣血不和而為腹中之病也帝曰夫子數言熱中消中不可服高梁芳草石藥石藥發癲芳草發狂夫熱中消中者皆富貴人也今禁膏梁是不合其心禁芳草石藥是病不愈願聞其說數音朔數屢也熱中消中不可服膏梁芳草石藥石藥發癲芳草發狂岐伯乃屢言之帝引以問而言夫熱中消中者精血內竭火熱消爍皆富貴人之病也富貴之人厚味自養今禁膏梁是不合其心富貴之人土氣壅滯宜升散其上鎮重其下今禁芳草石藥是病不愈願聞所以禁之之說岐伯曰夫芳草之氣美石藥之氣焊二者其氣急疾堅勁故非緩心和人不可以服此二者芳草之氣香美而上散石藥之氣慓悍而下沉是芳草之氣急疾石藥之氣堅勁故二者其氣急疾堅勁惟和緩之氣可以化之故非緩心和人不可以服此二者帝曰不可以服此二者何以然必欲詳明不可服之義故復問之岐伯曰夫熱氣慓悍藥氣亦然二者相遇恐內傷脾脾者土也而惡木服此藥者至甲乙日更論惡去聲脾土之氣貴得其平夫病熱中消中乃熱氣慓悍而然今芳草石藥其氣亦熱而慓悍以熱氣慓悍之病而遇熱氣慓悍之藥二者相遇亢害已極恐內傷脾蓋脾者土也而惡木克服此芳草石藥之藥者恐有克賊之變故至甲乙日更論是脾土之氣貴乎和緩芳草石藥不宜服也帝曰善有病膺腫頸痛胸滿腹脹此為何痛何以得之芳草石藥恐內傷脾不但熱中消中不可服脾土內虛亦不可服帝故善之復承身體髀股䯒皆腫環臍而痛之意問有病膺腫頸痛胸滿腹脹者此為何病正其名也何以得之探其原也岐伯曰名厥逆膺腫頸痛胸滿腹脹則表裡陰陽之氣不相順接故名厥逆帝曰治之奈何治厥逆奈何岐伯曰灸之則喑石之則狂須其氣並乃可治之厥逆則陰陽之氣不相交併若火灸以治之則無聲而喑砭石以治之則煩熱而狂是厥逆之時不可以治須其氣並乃可治也帝曰何以然何以灸則喑石則狂岐伯曰陽氣重上有餘於上灸之則陽氣入陰入則喑石之則陽氣虛虛則狂須其氣並而治之可使全也要平聲膺腫頸痛胸滿腹脹是陽氣重上有餘於上而致厥逆也其厥逆之時取少腹之陰穴灸之則陽氣不入於陰入而不出則厥厥逆之時用砭石刺之外泄其血血不充膚則陽氣外虛虛則狂故須其氣並而治之可使十全也帝曰善何以知懷子之且生也申明灸則喑石則狂而言陽氣重上有餘於上則厥逆之原亦明帝故善之復承胸滿腹脹之意而問婦人懷子亦胸滿腹脹何以主懷子之且生知猶主也岐伯曰身有病而無邪脈也婦人懷子胸腹滿脹經脈循行不失常度是身有病而無邪脈則主懷子之且生也帝曰病熱而有所痛者何也病熱而有所痛在婦人則不能懷子故復問之岐伯曰病熱者陽脈也以三陽之動也熱為陽病熱則三陽經脈不和故病熱者陽脈也以三陽之動而不和也人迎一盛少陽二盛太陽三盛陽明少陽太陽陽明三陽也人迎動脈主三陽之六腑故人迎一盛熱在少陽之膽與三焦人迎二盛熱在太陽之膀胱小腸人迎三盛熱在陽明之胃與大腸所謂病熱者陽脈也以三陽之動此之謂也入陰也夫陽入於陰故病在頭與腹乃腹脹而頭痛也病熱為陽病熱而有所痛者陽病入陰也夫陽入於陰故當病在頭與腹申明在腹乃為腹脹在頭而頭痛也帝曰善病熱而痛兼有腹中䐜脹之病帝故善之此一節言土氣不和而厥逆經脈不和而熱盛亦為腹中之病也刺腰痛篇第四十一篇帝承上篇腹中滿痛之義而及於腰痛則有取刺之法也腹者太陰經脈之所主腰者足三陽三陰之脈及奇經八脈皆從腰而上故舉足太陽少陽陽明少陰厥陰及奇經八脈並解脈肉理皆繫於腰而為痛各隨其脈以刺之太陰主腹故不復論然太陰之絡亦令腰痛故終舉太陰之痛以結之足太陽脈令人腰痛引項脊尻背為重狀刺其郄中太陽正經出血春無見血郄中委中也足太陽之脈從頭下項循脊背抵腰中下至於尻故足太陽脈令人腰痛則上引項脊而尻背各如狀當刺其委中委中者太陽正經之脈也刺委中更當出血若春時木王借水氣以生太陽主寒水之氣故春刺委中無見其血少陽令人腰痛如以針刺其皮中循循然不可以俯仰不可以顧刺少陽成骨之端出血成骨在膝外廉之骨獨起者夏無見血循循漸次貌顧回顧也腰者身半上下之交少陽主樞居乎上下之間故少陽令人腰痛如以針刺其腰之皮中其痛漸次而上故循循然痛在於背則不可以俯仰痛在於項則不可以顧當刺少陽成骨之端而出其血申明成骨之端在膝外廉之骨而獨起者是也夏時火王少陽主相火之氣故夏刺成骨無見其血陽明令人腰痛不可以顧顧為有見者善悲刺陽明於䯒前三痏上下和之出血秋無見血陽明之脈起於鼻頞中行身之前故陽明令人腰痛不可以顧顧猶視也申明不可顧者非不可回顧乃顧則目中為有見者然顧而有見則善悲當刺陽明於䯒前三痏䯒前三痏三里上廉下廉也故曰上下和之乃三里合上廉下廉以和之而出其血也秋時金王陽明主燥金之氣故秋刺䯒前三痏無見其血足少陰令人腰痛痛引脊內廉刺少陰於內踝上二痏春無見血出血太多不可復也足少陰之脈上股內後廉貫脊屬腎故足少陰令人腰痛其痛上引脊下引內廉當刺少陰於內踝上左右太谿二痏少陰之氣藏於冬發於春故春刺內踝無見其血若春時出血太多至冬不可復藏也按春夏秋皆言無見血而冬時不言意謂冬藏之時陰血充滿三時皆不足也厥陰之脈令人腰痛腰中為張弓弩弦刺厥陰之脈在腨踵魚腹之外循之累累然乃刺之其病令人善言默默然不慧刺之三痏厥陰之脈循足而上與腎脈相合行於腰脊故厥陰之脈令人腰痛腰中為張弓弩弦痛而強硬不柔和也當刺厥陰之脈在腨踵魚腹之外腨足肚也踵足跟也魚腹足肚上也腨踵魚腹之外側但循結絡之累累然乃刺之其厥陰腰痛之病當令人善言靈樞九針論云肝主語本經宣明五氣篇云肝病為語言即語也病當令人善言則默默然不慧默默不慧肝氣虛矣刺治之法仍在腨在踵在魚腹之三痏肝虛故淺刺累累之路不言出血也此一節言足三陽三陰之脈令人腰痛而有取刺之法也解脈令人腰痛痛引肩目䀮䀮然時遺溲刺解脈在膝筋肉分間郄外廉之橫脈出血血變而止解音蟹下同解散也解脈周身橫紋之脈散於皮膚間太陽之所主也解脈令人腰痛不能從腰而散於上故痛引肩不能從肩而散於頭故目䀮䀮然膀胱水府之氣不出於皮毛故時遺溲刺解脈在膝後筋肉相分之間乃郄中外廉之橫脈當刺出其血血紫黑而變赤即當止之不可多出也解脈令人腰痛為引帶常為折腰狀善恐刺解脈在郄中結絡為黍米刺之血射以黑見赤血而已折音舌解脈散於皮膚不但行於上下且迥繞周身故解脈令人腰痛為腰引帶痛則常為折腰狀腰者腎之外候腎氣不充於腰故善恐刺解脈在太陽正經之郄中視其結絡為黍米乃刺之結絡則絡脈結而不榮故血射以黑見赤血而已即上言血變而止之謂也此言解脈腰痛常循太陽郄中之絡脈以刺之而出其血也同陰之脈令人腰痛痛如小錘居其中怫然腫刺同陰之脈在外踝上絕骨之端為三痏陽蹺之脈起於跟中循外踝上風府從陰出陽故曰同陰同陰之脈令人腰痛則痛如小錘居其腰中外則怫然而腫刺同陰之脈當在外踝上並絕骨之端為三痏也陽維之脈令人腰痛痛上怫然腫刺陽維之脈脈與太陽合腨下間去地一尺所陽維維於陽今陽維腰痛不能維於陽故痛上怫然腫刺陽維之脈其脈與太陽相合在腨下間去地一尺所乃陽維之郄太陽承山穴也夫陽維與太陽合則陰維與少陰合關衡絡之脈令人腰痛不可以俯仰仰則恐僕得之舉重傷腰衡絡絕噁心歸之刺之在郄陽筋之間上郄數寸橫居為二痏出血衡與橫同郄浮郄也陽會陽也帶脈橫絡於腰故曰橫絡之脈腰痛不可以俯仰言不可以俯而復仰也如俯而仰則恐僕矣此得之舉重傷腰橫絡脈絕周迥無所束惡血聚而歸之故痛也刺之在浮郄會陽大筋之間申明會陽之穴上浮郄數寸橫居臀下也刺浮郄會陽為二痏而出血會陰之脈令人腰痛痛上漯漯然汗出汗乾令人慾飲飲已欲走刺直陽之脈上三痏在蹺上郄下五寸橫居視其盛者出血漯音沓會陰在大便之前小便之後任督二脈相會於前後二陰間故曰會陰任脈統任一身之陰督脈總督一身之陽會陰腰痛陰陽皆虛痛上漯漯然汗出陰氣虛而陰液外注也汗乾令人慾飲飲已欲走陽氣虛而陽熱外馳也任督腰痛當從陽以瀉陰故刺直陽之脈直陽太陽與督相合之脈也從蹺從上刺其三痏三痏者刺陽蹺之申脈太陽之郄中又蹺上郄下當相去五寸之承山皆有血絡橫居視其盛者刺出其血由此言之則蹺與郄及蹺上郄下但刺橫居之血絡不必拘於穴也飛陽之脈令人腰痛痛上怫怫然甚則悲以恐刺正陽之脈在內踝上五寸少陰之前與陰維之會飛陽陰維之脈也陰維之脈起於足少陰之築賓今日飛陽者經脈論云足太陽之別名曰飛陽去踝七寸別走少陰是飛陽乃別出於太陽而仍走少陽也怫怫怒貌痛上怫怫而腫如怒起狀陽維腰痛痛上怫然腫此陰維腰痛痛上亦怫怫然甚則少陰心虛而恐少陰腎虛而恐刺式陽之脈在內踝上五寸乃陰維之郄築賓穴也與少陰相合故曰少陰之前與陰維之會昌陽之脈令人腰痛痛引膺目䀮䀮然甚則反折舌卷不能言刺內筋為二痏在內踝上大筋前太陰後上踝二寸所陰蹺之脈亦起於跟中循內踝而上上循胸裡出人迎交目內眥起於足少陰之別合於足太陽故曰昌陽腰痛則不能上循胸裡故痛引膺不能上交於目故目䀮䀮然甚則少陰左陽不相交接致病太陽之反折少陰之舌卷不能言當刺足內廉之筋左右為二痏申明內筋在足內踝上大筋之前太陽所過之後上踝二寸所乃陰蹺之郄交信穴也散脈令人腰痛而熱熱甚生煩腰下如有橫木居其中甚則遺溲刺散脈在膝前骨肉分間絡外廉束脈為三痏散上聲散脈衝脈也衝脈起於胞中秉陰血而澹滲皮膚一為太陽通體之解脈故曰散脈血不充於皮膚故腰痛而身熱脈不散於胸中故熱甚生煩不能右循背裡故腰下如有橫木居其中不能從胞中而四散故甚則遺溲刺散脈當在膝前之骨犢鼻穴也及肉分間三里穴也絡外廉上廉穴也三里在肉分間乃足陽明之合穴故曰束脈刺前骨刺肉分刺外廉是為三痏此一節言奇經八脈從腰而上令人腰痛各有取刺之法也肉裡之脈令人腰痛不可以咳咳則筋縮急刺肉裡之脈為二痏在太陽之外少陽絕骨之後里理通肉理肌肉之文理也肉理之脈外通於皮內通於筋腰痛不可以咳不能外通於皮也咳則筋縮急不能內通於筋也太陽主皮毛主筋病故刺肉理之脈為二痏在太陽之外少陽絕骨之後太陽行身之首而向外故曰太陽之外少陽絕骨在足之側故曰絕骨之後乃太陽附陽穴也左右為二痏腰痛俠脊而痛至頭𠘧𠘧然目䀮䀮欲僵仆刺足太陽郄中出血𠘧音殊腰痛俠脊而痛從腰上及於脊也至頭𠘧𠘧然從脊上至於頭也太陽經脈起於目內眥從頭下項俠脊抵腰經脈不舒故目䀮䀮欲僵仆當刺足太陽之郄中出血此言肌肉文理脊背頭項腰痛當刺足太陽不但解脈腰痛刺足太陽也腰痛上寒刺足太陽陽明上熱刺足厥陰不可以俯仰刺足少陽中熱而喘刺足少陰刺郄中出血此言腰痛寒熱亦刺三陽三陰不但三陽三陰之脈令人腰痛而始刺也腰痛上寒乃陽氣不升故刺足太陽陽明所以升其陽氣也腰痛上熱乃陰氣不升故刺足厥陰所以升其陰氣也不可以俯仰乃陰陽樞轉不和故刺足少陽所以和其樞而使陰陽旋轉也中熱而喘乃陽熱內乘陰寒外閉故刺足少陰所以調其陰陽水火而內外安和也太陽陽明厥陰少陽少陰未知所刺之處故申明刺郄中出血言刺太陽則如上文之刺郄中出血則知陽明之刺在䯒前厥陰之刺在腨踵少陽之刺在成骨少陰之刺在內踝此舉一以例其餘上文言穴氣而不及太陰故此亦不言太陰也腰痛上寒不可以顧刺足陽明上熱刺足太陰中熱而喘刺足少陰大便難刺足少陰少腹滿刺足厥陰如折不可以俯仰不可舉刺足太陽引脊內廉刺足少陰衍文舊本注云古本並無王氏所添也腰痛引少腹控䏚不可以仰刺腰尻交者兩髁胂上以月生死為痏數髮針立已左取右右取左髁窠同音科餘篇仿此此舉太陰腰痛為繆刺之法言太陰之脈行於腹中而其孫絡亦在於外也本經繆刺論云邪客於足太陰之絡令人腰痛引少腹控䏚不可以仰息今腰痛引少腹控䏚不可以仰是邪客於足太陰之絡也又云刺腰尻之解兩胂之上是腰俞以月生死為痏數髮針在已左刺右右刺左今刺腰尻交者兩髁胂上以月生死為痏數髮針立已左取右右取左是亦繆刺之法不同於上文諸經之刺也蓋繆刺者有痛而經不病者也病在孫絡之間毫毛之氣不相通貫故以毫針通其孫絡左取右右取左刺數宜多不循俞穴故但以月生死為痏數一日一痏二日二痏漸多之十五日十五痏十六日十四痏漸少之與解脈腰痛刺太陽之郄中者又不同也風論第四十二篇四時首春五行首木六氣首厥陰厥陰之上風氣主之故風為百病長金匱真言論云天有八風經有五風人與天地相參天有此風氣人亦有此風氣人身經脈內虛則生風因風傳變則其病各異內病五臟則形狀不同舉而論之故曰風論黃帝問曰風之傷人也或為寒熱或為熱中或為寒中或為癘風或為偏枯或為風也其疾各異其名不同或內至五臟六腑不如其解願聞其說因風而有寒熱之病因風而有熱中寒中之病或為癘風或為偏枯或為風病之無常或內至五臟六腑同是風也而病名不同故以為問岐伯對曰風氣藏於皮膚之間內不得通外不得泄風者善行而數變腠理開則灑然寒閉則熱而悶其寒也則衰食飲其熱也則消肌肉故使人怢慄而不能食名曰寒熱藏為字數音朔怢音突風之傷人或為寒熱者乃風氣藏於皮膚之間內不得通於經脈外不得泄於毫毛風者其性鼓動善行而數變風氣藏於皮膚則腠理開開則灑然寒腠理開而復閉閉則熱而悶其寒也陽氣虛微則衰食飲其熱也火氣過盛則消肌肉邪之所湊其正必虛正氣虛故使人外怢慄而內不能食申明風之傷人或為寒熱者如此風氣與陽明入胃循脈而上至目內眥其人肥則風氣不得外泄則為熱中而目黃人瘦則外泄而寒則為寒中而泣出風之傷人或為熱中或為寒中者乃風氣與陽明之經脈而入於胃循陽明胃脈而上旁約太陽之脈至目內眥肌肉豐厚則其人肥肥則風氣不得外泄不得外泄則為熱中而目色黃肌肉消減則其人瘦瘦則風氣外泄而寒則為寒中而泣出申明風之傷人或為熱中或為寒中者如此風氣與太陽俱入行諸脈俞散於分肉之間與衛氣相干其道不利故使肌肉憤䐜而有瘍衛氣有所凝而不行故其肉有不仁也癘者有榮氣熱胕其氣不清故使其鼻柱壞而色敗皮膚瘍潰風寒客於脈而不者名曰癘風或名曰寒熱風之傷人或為癘風者乃風氣與太陽俱入行諸太陽之脈俞脈經脈也俞俞穴也太陽之氣主通體今行諸脈俞而散於通體分肉之間分肉分腠之肌肉也散於分肉更與周身之衛氣相干風氣行於脈俞散於分肉干於衛氣則正氣不能通貫其道不利其道不利故使肌肉憤然䐜脹而有瘍瘍癘瘍也此肌肉有瘍因脈外之衛氣有所凝而不行故其肌肉癘瘍而亦有不仁也申明癘者經脈之氣不和於榮風氣相搏搏而為熱致有榮氣之熱在於胕肉之間其經脈之氣不清故使面王之鼻柱壞而周身之毛色敗以致皮膚瘍㿉而為癘風由此觀之是風寒客於太陽三經脈而不者皮膚瘍潰而名曰癘風也夫風為陽邪而主熱寒為陰邪而主寒今風寒客於脈中不但名癘風而或名曰寒熱也此申明風之傷人或為癘風者如此以春甲乙傷於風者為肝風以夏丙丁傷於風者為心風以季夏戊己傷於邪者為脾風以秋庚辛中於邪者為肺風以冬壬癸中於邪者為腎風風中五臟六腑之俞亦為臟腑之風中去聲下同風之傷人也或內至五臟六腑者五臟合四時四時合五行春夏秋冬四時之五行也甲乙丙丁戊己庚辛壬癸十日之五行也肝心脾肺腎五臟之五行也各以五行之時日受邪而五臟之氣應之則為五臟之風若風中五臟六腑之俞穴傷其經脈亦為臟腑之風既曰傷於風復曰傷於邪以明風者邪氣也既曰傷於邪復曰中於邪以明傷者中之謂也此申明或內至五臟六腑而為臟腑之風者如此各入其門戶所中則為偏風風氣循風府而上則為腦風風入系頭則為目風眼寒飲酒中風則為漏風入房汗出中風則為內風新沐中風則為首風久風入中則為腸風飧泄外在腠理則為泄風系舊本訛系今改末中為字風之傷人或為偏枯者或上或下或外或內各入其門戶所中則為偏枯之風為風氣循風府而上則入腦之門戶而為腦風風入目系而至於頭則入目之門戶而為目風眼寒酒氣充於絡脈飲酒中風則入絡脈之門戶而為漏風入房汗出則腎精竭而腠理疏復中於風則入腎臟之門戶而為內風以水灌頂曰沐沐則發竅開新沐中風則入頂之門戶而為首風久風入中內傷中土則入腸之門戶而為腸風飧泄久風外在腠理則入腠理之門戶而為隱疹之泄風此申明風之傷人或為偏枯之偏風者如此故風者百病之長也至其變化乃為他病也無常方然致有風氣也長上聲承上文而總結之申明風之為病其病各異其名不同也六氣主時厥陰為首厥陰之上風氣主之故風者百病之長也風無定體至其變化乃為他病也在氣在經或上或下或外或內無常方然致有上文諸風氣之病也此申明或為風也其病各異其名不同者如此此一節言風之傷人有經氣上下內外之病承帝問而一一以對也帝曰五臟風之形狀不同者何願聞其診及其病能風病五臟則有五臟之形狀病能何以診其不同岐伯曰肺風之狀多汗惡風色皏然白時咳短氣晝日則差暮則甚診在眉上其色白惡去聲下同駢音駢差瘥同狀形狀也風性鼓動開發毛竅故多汗正邪不合故惡風不特肺風為然下文心風肝風脾風腎風胃風皆多汗惡風血不充於皮毛故色駢然白肺受風邪故時咳肺氣不足故短氣晝則陽氣盛故晝日則差暮則陽氣衰故暮夜則甚此肺風之形狀病能其診視之部在眉上闕庭之間其色駢然白者是也心風之狀多汗惡風焦絕善怒嚇赤色病甚則言不可快診在舌其色赤舌舊本訛口今改心者火也風動火炎故唇舌焦而津絕風者木也木火相生故善以怒而嚇人火氣有餘故面色赤病甚則舌本強而言不可快此心風之形狀病能其診視之部在舌其色赤而並見於舌也肝風之狀多汗惡風善悲色微蒼嗌乾善怒時憎女子診在目下其色青悲悲泣也肝開竅於目故善悲蒼者肝之色故色微蒼風木合而火熱盛故嗌於經脈論云肝是動病甚則嗌乾肝主怒故善怒善怒則時見憎於女子此肝風之形狀病能其診視之部在目下之承泣其色青即微蒼而見於目下也脾風之狀多汗惡風身體怠惰四肢不欲動色薄微黃不嗜食診在鼻上其色黃脾主身體脾屬四肢風氣傷脾故身體怠惰四肢不欲動土主肌肉脾受風而土虛故麵皮色薄微黃脾不消穀故不嗜食此脾風之形狀病能其診視之部在鼻上之明堂其色微黃而見於鼻也腎風之狀多汗惡風面龐然浮腫脊痛不能正立其色炲隱曲不利診在𦠄上其色黑𦠄舊本訛肌今改腎者水也風動水渙故面龐然浮腫腎藏精上貫脊故脊痛不能正立炲黑也其色面如煙塵之黑色也腎虛不能為隱曲之事故隱曲不利此腎風之形狀病能其診視之部在𦠄上之顴𦠄兩頰肉也𦠄上顴也顴腎所主也其色黑者即炲色而見於𦠄上也胃風之狀頸多汗惡風食飲不下膈塞不通腹善滿失衣則䐜脹食寒則泄診形瘦而腹大此舉胃風所以該六腑也頸多汗者汗出於頭而聚於頸以明五臟之脈不至於頭故但言多汗惡風六腑之脈皆循頸至頭或從頭至頸故曰頸多汗惡風胃氣不和於上不能納穀故食飲不下胃氣不和於下大便不利故膈塞不通胃氣不和於中脾胃不相運故腹善滿外失衣則胃氣不充於外而䐜脹里食寒則胃氣不溫於內而飧泄此胃風之形狀病能其診視之色在形而診視之部在腹故診形瘦而腹大猶言診其形色則瘦診其腹上則大以明五臟診色六腑診形之義首風之狀頭面多汗惡風當先風一日則病甚頭痛不可以出內至其風日則病少愈上文新沐中風則為首風首風之狀其頭面多汗惡風風入於頭傷其骨空一日之中經脈之氣未行於頭謂之當先風一日正氣未至風邪猖獗故病甚病甚者頭痛不可以出戶內也即此一日之中經脈之氣上行於頭謂之至其風日正氣已至則痛病少愈漏風之狀或多汗常不可單衣食則汗出甚則自汗喘息惡風衣常濡口乾善渴不能勞事自汗舊本訛身汗今改上文飲酒中風則為漏風漏風之狀酒氣外充則身無汗酒行風動或多汗矣多汗表虛欲著復衣故常不可單衣也食則汗出者言身若無汗食入則汗出也甚則自汗者言身或多汗甚則自汗也甚猶多也飲酒中風絡脈空疏故喘息惡風汗出而衣常濡濡濡濕也津液泄故口乾善渴氣血皆虛故不能勞事泄風之狀多汗汗出泄衣上口中乾上漬其風不能勞事身體盡痛則寒上文腠理久風則為泄風泄風之狀腠理虛故多汗也汗出泄衣上猶言身濕沾衣也汗出故口中乾泄衣上則身濕既濕且冷一如水漬而有風故曰上漬其風也腠理久風氣血皆虛故不能勞事血虛故身體盡痛氣虛則身寒凡此承上文各入門戶之風而明其狀帝曰善上文各入門戶之偏風有腦風目風言首風而腦風目風在其中有內風腸風內風屬臟腸風屬胃故不復言帝默會其意而善之此一節因五臟而並論各入門戶之風形狀不同病能各異也痹論第四十三篇痹閉也血氣凝澀不行也有風寒濕三氣之痹有皮肌脈筋骨五臟外合之痹六腑有俞五臟亦有俞五臟有合六腑亦有合故有五臟六腑之痹榮衛流行則不為痹痹之為病或痛或不痛或不仁或寒或熱或燥或濕舉而論之故曰痹論黃帝問曰痹之安生周身經脈不和拘攣閉痹從何而生岐伯對曰風寒濕三氣雜至合而為痹也其風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹也痹之生也生於風寒濕三氣雜至於身合於經脈而為痹也三邪之中復有偏勝其風氣勝者風無定體故為行痹寒氣勝者陰盛陽虛故為痛痹濕氣勝者留滯不行故為著痹也帝曰其有五者何也四時合五行其因時受邪而有五痹者何也岐伯曰以冬遇此者為骨痹以春遇此者為筋痹以夏遇此者為脈痹以至陰遇此者為肌痹以秋遇此者為皮痹痹閉也閉主冬故論痹始於冬以冬時遇此風寒濕三氣者則為骨痹以春時遇此風寒濕三氣者則為筋痹以夏時遇此風寒濕三氣者則為脈痹以長夏至陰遇此風寒濕三氣者則為肌痹以秋時遇此風寒濕三氣者則為皮痹須知五痹雖有在骨在筋在脈在肌在皮深淺之不同亦以風寒濕三邪之偏勝者而有行痹痛痹著痹之各異也帝曰內舍五臟六腑何氣使然皮肌脈筋骨既合四時之氣若內舍五臟六腑則何氣使然岐伯曰五臟皆有合病久而不去者內舍於其合也合外內相合也腎合骨肝合筋心合脈脾合肌肺合皮五臟皆有合也痹病久而不去者內舍於其所合而為臟痹也故骨痹不已復感於邪內舍於腎筋痹不已復感於邪內舍於肝脈痹不已復感於邪內舍於心肌痹不已復感於邪內舍於脾皮痹不已復感於邪內舍於肺所謂痹者各以其時重感於風寒濕氣也重平聲病久不去則逾年矣故骨痹不已至冬復感於邪則內舍於腎筋痹不已至春復感於邪則入舍於肝脈痹不已至夏復感於邪則內舍於心肌痹不已至至陰復感於邪則內舍於脾皮痹不已至秋復感於邪則內舍於肺所謂內舍五臟之痹者乃病久不去亦多以其時重感於風寒濕之氣也凡痹之客五臟者肺痹者煩滿喘而嘔重感於邪則入於臟故申言凡痹之客五臟者肺脈起於中焦為心之蓋故肺痹者煩滿肺主呼吸脈循胃口肺痹故喘而嘔心痹者脈不通煩則心下鼓暴上氣而喘嗌乾善噫厥氣上則恐心主脈故心痹者脈不通心虛則煩故煩則心下鼓鼓猶動也心脈上肺故暴上氣而喘經脈論云心是動則病嗌乾宣明五氣篇云病心為噫故嗌乾善噫心氣下交於腎心厥氣上不交於腎則恐肝痹者夜臥則驚多飲數小便上為引如懷數音朔下同人臥血歸於肝故肝痹者夜臥則驚木鬱則熱故多飲鬱而不升故數小便經脈論云肝病丈夫㿉疝婦人少腹腫故上為引於下有如懷物之狀腎痹者善脹尻以代踵脊以代頭人之生氣發原於腎生氣不升故善脹尻尾骨也尾骨下蹲以代踵足骨痿也脊骨高聳以代頭天柱傾也脾痹者四肢解墮發咳嘔汁上為大塞脾主四肢故脾痹者四肢懈惰土灌四旁痹則上氣不灌氣惟上逆故發咳入胃之飲借脾氣以散精痹則不能散精故嘔汁脾氣不能轉輸則肺不能通調故上為大塞凡此皆痹之客於五臟也腸痹者數飲而出不得中氣喘爭時發飧泄腸小腸大腸也小腸為心之腑靈樞經水論云手太陽外合淮水內合於小腸而水道出焉小腸痹則熱鬱於上故數飲氣滯於下故小便出不得大腸為肺之腑大腸痹則中氣逆於上故喘爭清濁混於下故時發飧泄胞痹者少腹膀胱按之內痛若沃以湯澀於小便上為清涕胞痹即膀胱痹也膀胱居於胞中胞中位於少腹故胞痹者少腹膀胱按之內痛其痛也若沃以沸湯之熱膀胱之氣不出於皮毛則澀於小便胞中之血不滲於膚腠則上為清涕言六腑之痹不及胃膽三焦者腸胃皆受糟粕言腸不必更言胃矣胞為經血之海膽為中精之府言胞不必更言膽矣三焦者中瀆之府水道出焉屬膀胱言膀胱不必更言三焦矣凡此言痹之客於六腑也陰氣者靜則神藏躁則消亡藏如字結上文藏痹之意五臟為陰以靜為本故陰氣者寧靜則神氣內藏躁擾不寧則神氣消亡神氣亡致有五臟之痹矣飲食自倍腸胃乃傷結上文腑痹之意六腑為陽傳化飲食若飲食自倍則傳化有愆而腸胃乃傷腸胃傷致有六腑之痹矣淫氣喘息痹聚在肺淫氣憂思痹聚在心淫氣遺溺痹聚在腎淫氣乏竭痹聚在肝淫氣肌絕痹聚在脾溺鳥去聲申明躁則消亡者如淫亂之氣使人喘息而躁則痹聚在肺而肺氣消亡矣淫亂之氣動人憂思而躁則痹聚在心而心氣消亡矣淫亂之氣令人遺溺而躁則痹聚在腎而腎氣消亡矣淫亂之氣使氣血乏竭而躁則痹聚在肝而肝氣消亡矣淫亂之氣使肌肉斷絕而躁則痹聚在脾而脾氣消亡矣此淫氣內亂致有五臟之痹以明靜則神藏躁則消亡之意諸痹不已亦益內也其風氣勝者其人易已也易去聲下同益增也申明腸胃乃傷者諸腑痹不已亦增內臟之病也其腑痹而風氣勝者風以散之不但不增內病而其人之痹且易已也以明腸胃乃傷之腑痹重則益內輕則易己之意帝曰痹其時有死者或疼久者或易已者其故何也其病且有死者有疼久者今有易已者其故何也並舉以問殆欲詳明易已之痹岐伯曰其入臟者死其留連筋骨間者疼久其留皮膚間者易已痹時有死者乃入藏者死或疼久者其留連筋骨間者疼久若其易已者乃留於皮膚間者易已帝曰其客於六腑者何也帝欲詳明六腑之易已故為是問岐伯曰此亦其食飲居處為其病本也飲食自倍腸胃乃傷是為六腑之痹故申言此亦其食飲居處猶言食飲自倍居處失宜以為腑痹之病本也六腑亦各有俞風寒濕氣中其俞而食飲應之循俞而入各舍其腑也中去聲五臟皆有合而六腑亦各有俞風寒濕三氣中其俞而食飲無節以應之則風寒濕之邪循俞穴而入各舍其腑也與五臟之病久不去復感於邪內舍於其合者同一義也帝曰以針治之奈何以針治六腑之痹奈何岐伯曰五臟有俞六腑有合循脈之分各有所發各隨其過則病瘳也不但六腑有俞而五臟有俞不但五臟有合而六腑有合循其六腑經脈之分行各有所發之部各隨其所過之路因而針之病可瘳也此腑痹之所以易已也帝曰榮衛之氣亦令人痹乎承上文五臟六腑之痹復問榮衛之氣亦令人痹乎岐伯曰榮者水穀之精氣也和調於五臟灑陳於六腑乃能入於脈也故循脈上下貫五臟絡六腑也靈樞榮氣篇云榮氣之道內谷為實谷入於胃乃傳之肺流溢於中布散於外精專者行於經隧是榮氣者乃水穀之精氣以相資益也其氣先和調於五臟次灑陳於六腑乃能資益其榮而入行於脈中也榮行脈中故榮氣循脈上下從內出外內則貫五臟外則絡六腑也衛者水穀之悍氣也其氣慓疾滑利不能入於脈也故循皮膚之中分肉之間熏於盲膜散於胸腹靈樞衛氣論云其精氣之行於經者為榮氣其浮氣之不循經者為衛氣是衛者乃水穀之悍氣以相輔助也其氣慓疾滑利不能化精氣而入行於脈中也不入於脈故但循於皮膚之中以及分肉之間內則氣熏於盲膜外則氣散於胸腹逆其氣則病從其氣則愈不與風寒濕氣合故不為痹承上文榮行脈中衛行脈外之意而言逆其榮衛之氣則病從其榮衛之氣則愈榮衛之氣循行不息不與風寒濕三氣相合是以不為痹也承五臟六腑之痹而申明榮衛之不為痹者如此帝曰善痹或痛或不痛或不仁或寒或熱或燥或濕其故何也榮行脈中衛行脈外運行不息故不為痹所以風氣勝而痹易已帝故善之復問痹或有身痛者或有身不痛者或有不知痛癢而不仁者或有身寒者或有身熱者或有無汗而燥者或有有汗而濕者其故何也岐伯曰痛者寒氣多也有寒故痛也痹之痛者寒邪之氣多也身有寒故痛也寒氣勝者為痛痹此之謂也其不痛不仁者病久入深榮衛之行澀經絡時疏故不痛皮膚不營故為不仁次痛舊本訛通今改其痹之不痛與不仁者痹病久而邪入深病久則榮衛之行失其常度而澀矣入深則經脈絡脈時疏於外矣榮衛行澀經絡時疏血氣外而不內故不痛其不仁者皮膚之血氣不營運於通體皮膚不營血氣內而不外故不知痛癢而為不仁其寒者陽氣少陰氣多與病相益故寒也其痹之有寒者以人身陽氣少陰氣多陰氣多而與病相益故寒也其熱者陽氣多陰氣少病氣勝陽遭陰故為痹熱其痹之有熱者以人身陽氣多陰氣少陽氣多則病陽氣勝陽氣勝而遭陰氣之不勝故為痹熱其多汗而濡者此其逢濕甚也陽氣少陰氣盛兩氣相感故汗出而濡也其痹之多汗而濡者此其逢濕氣之甚也其人身亦陽氣少陰氣盛濕陰類也陰氣盛而逢濕是兩氣相感故汗出而濡濕也知陰氣盛而主濕則知陽氣盛而主燥矣此申明痛癢寒熱燥濕之痹者如此帝曰夫痹之為病不痛何也凡痹必痛今夫痹之為病有不痛者何也岐伯曰痹在於骨則重在於脈則血凝而不流在於筋則屈不伸在於肉則不仁在於皮則寒故具此五者則不痛也外內之氣不相交合則痛病有形之皮肉筋脈骨而氣機得以相交則不痛如痹但在於骨而筋脈皮肉之氣自和則身重而不痛痹但在於脈而皮肉筋骨之氣自和則血凝不流而不痛痹但在於筋而皮肉骨脈之氣自和則屈不伸而不痛痹但在於肉而皮骨筋脈之氣自和則不仁而不痛痹但在於皮而骨肉筋脈之氣自和則寒而不痛故不痛者具此在骨在脈在筋在肉在皮五者餘氣得以相通則不痛也凡痹之類逢寒則蟲逢熱則縱承上文痛癢寒熱燥濕之痹而曰凡痹之類類猶合也謂寒合於濕熱合於燥也如濕痹逢寒則寒濕相薄故生蟲蟲生則癢矣燥痹逢熱則筋骨不濡故縱縱弛縱也弛縱則痛矣帝曰善上文未言燥痹於此明之帝故曰善痿論第四十四篇承上篇痹證而論痿證也痿者四肢痿弱舉動不能如痿棄不用之意肺為臟之長故五臟因肺熱葉焦發為痿躄陽明為五臟六腑之海主潤宗筋為諸脈之長故治痿獨取陽明黃帝問曰五臟使人痿何也痿證發於臟故問五臟使人痿岐伯對曰肺主身之皮毛心主身之血脈肝主身之筋膜脾主身之肌肉腎主身之骨髓五臟在內各有所主皮毛血脈筋膜肌肉骨髓肺心肝脾腎之所主也故肺熱葉焦則皮毛虛弱急薄著則生痿躄也舉動自如皆臟氣和於內而主於外故肺熱葉焦是肺臟病於內矣病於內則肺主皮毛虛弱急薄應於外若更留著不行則生痿躄躄兩足廢弛也心氣熱則下脈厥而上上則下脈虛虛則生脈痿樞折挈脛縱而不任地也折音舌心氣熱是心臟病於內矣病於內則心主之血脈應於外下脈厥而上言血脈在下者厥逆而上也上則下脈虛言厥逆而上則在下之血脈虛也下脈虛則生脈痿灸經脈血脈不能升降開合為樞斷折而收挈斷折挈是以脛骨縱緩而不任地也肝氣熱則膽泄口苦筋膜乾筋膜乾則筋急而攣發為筋痿肝氣熱是肝臟病於內矣肝熱則膽亦熱故膽氣上泄而口苦肝病於內則肝主之筋膜應於外故血液竭而筋膜乾筋膜乾則筋急而拘攣故發為筋痿脾氣熱則胃干而渴肌肉不仁發為肉痿脾氣熱是脾臟病於內矣脾熱則胃亦熱故胃干而渴脾病於內則脾主之肌肉應於外故肌肉不仁不仁不知痛癢也由是則發為肉痿腎氣熱則腰脊不舉骨枯而髓減發為骨痿腎氣熱是腎臟病於內矣病於內則腎主之骨髓應於外其腰脊不能舉動因於骨枯而髓減由是則發為骨痿此五臟之所以使人痿也帝曰何以得之五臟之熱何以得之岐伯曰肺者臟之長也為心之蓋也有所失亡所求不得則發肺鳴鳴則肺熱葉焦故曰五臟因肺熱葉焦發為痿躄此之謂也長上聲下同肺朝百脈故肺者臟之長也肺位居高故為心之蓋也有所失亡所求不得致心氣內郁火刑肺金則發肺鳴肺鳴如火熔金而有聲也故鳴則肺熱葉焦上文言肺熱葉焦著則生痿躄此言肺為臟之長故曰五臟因肺熱葉焦發為痿躄即此肺為臟長之謂也五臟因肺熱葉焦而發為痿躄是五臟皆受氣於肺而痿躄之證不但由於肺熱且由五臟之熱矣此明上文肺熱成痿之意悲哀太甚則包絡絕包絡絕則陽氣內動發則心下崩數溲血也故本病曰大經空虛發為肌痹傳為脈痿包舊本訛胞今改數音朔悲哀太甚則心氣內傷故包路絕包絡心包之絡也包絡絕則血外溢而陽熱之氣內動其發病也則心氣下崩下崩則數溲血也故本經本病論曰大經空虛發為肌痹傳為脈痿大經空虛猶之包絡絕也包絡絕而血下溲則不能外充肌肉故發為肌痹更不能內榮經脈故傳為脈痿此明上文心熱成痿之意按本經有本病論原遺闕今搜捕並無此言思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫故下經曰筋痿者生於肝使內也下經不可考矣余俱仿此思想無窮所願不得則怫鬱於內肝氣傷矣意淫於外者其意淫縱於外不靜存也入房太甚宗筋弛縱者房勞過度陰器衰弱也夫入房太甚宗筋弛縱則發為筋痿意淫於外相火不寧則為白淫故下經曰筋痿者生於肝使內也此明上文肝熱成痿之意有漸於濕以水為事若有所留居處相濕肌肉濡漬痹而不仁發為肉痿故下經曰肉痿者得之濕地也漸進也有進於濕則以水為事其水若有所留其濕則居處相濕為是則肌肉濡漬痹而不仁發為肉痿故下經曰肉痿者得之濕地也以明上文脾熱成痿之意有所運行勞倦逢大熱而渴渴則陽氣內伐內伐則熱舍於腎腎者水藏也今水不勝火則骨枯而髓虛故足不任身發為骨痿故下經曰骨痿者生於大熱也有所遠行則身體勞倦復逢大熱則津竭而渴渴而陽氣內伐伐功伐也陽氣內伐則熱舍於腎夫腎者水臟也今水不勝火則骨枯而髓虛是以足不任身發為骨痿故下經曰骨痿者生於大熱也以明上文腎熱成痿之意帝曰何以別之別音逼伯論五臟之痿皆從內起帝欲徵之於外故問何以別之岐伯曰肺熱者色白而毛敗欲別其外當驗其色故肺熱者面色白麵毛敗白者肺之色皮毛者肺之合也心熱者色赤而絡脈溢赤者心之色絡脈者心之合也肝熱者色蒼而爪枯蒼者肝之色爪者筋之餘也脾熱者色黃而肉蠕動黃者脾之色肉者脾之合也腎熱者色黑而齒槁黑者腎之色齒者骨之餘也帝曰如夫子言可矣論言治痿者獨取陽明何也論疑即本病論五臟之熱徵於外合固可見矣夫子既各舉本病論證五臟之痿而論文言治痿者獨取陽明則何也岐伯曰陽明者五臟六腑之海主閏宗筋宗筋主束骨而利機關也閏潤同陽明者胃也受盛水穀故為五臟六腑之海皮肉筋脈骨皆資於水谷之精故陽明主潤宗筋宗筋前陰之總筋故主束骨而利機關也痿則機關不利筋骨不和皆由陽明不能濡潤所以治痿獨取陽明也衝脈者經脈之海也主滲灌谿谷與陽明合於宗筋陽明不但為五臟六腑之海又為奇經八脈之長靈樞海論云衝脈者為十二經之海故日衝脈者經脈之海也衝脈之血主滲灌谿谷與陽明合於宗筋靈樞五音五味篇云宦者去其宗筋傷其衝脈故須不生是知衝脈會於宗筋又云天宦者其任沖不盛宗筋不成故須不生是知衝脈為是任脈亦如是陰陽總宗筋之合會於氣街而陽明為之長陰陽陰蹺陽蹺陰維陽維也其脈皆從下而上至於臍腹故陰陽總宗筋之會會於氣街氣街者腹氣有街臍左右之動脈而陽明為之長經脈論云陽明之脈起於胃口下挾臍循腹裡至氣街中而合皆屬於帶脈而絡於督脈氣街者皆屬於帶脈之循行是陽明又為帶脈之長帶脈如束帶然前終臍腹後環腰脊圍身一周而終於督脈是陽明又從帶脈而主於督脈也故陽明虛則宗筋縱帶脈不引故足痿不用也陽明主潤宗筋故陽明虛則宗筋縱縱者不能束骨而利機關也宗筋縱則帶脈不引不引者不能延引而環約也夫宗筋縱帶脈不引故足痿不用致成痿躄所以治痿獨取陽明帝曰治之奈何治痿獨取陽明而陽明虛則何以治之岐伯曰各補其榮而通其俞調其虛實和其逆順筋脈骨肉各以其時受月則病已矣各補其在內之榮血而通其在外之俞穴正虛則補以調之邪實則瀉以調之逆者和之使順順者和之不使逆由是而肝主之筋心主之脈腎主之骨脾主之肉各以其四時受氣之月而施治之則病已矣受氣者筋受氣於春脈受氣於夏骨受氣於冬肉受於長夏也帝曰善但言筋脈骨肉不言肺主之皮以肺為五臟長五臟因肺熱葉焦發為痿躄帝故默會其義而善之厥論第四十五篇承痹證痿證而論厥證也經脈陰陽之氣不可偏勝陽氣損陰氣獨在則手足寒厥或令人腹滿陰氣衰陽氣獨勝則手足熱厥或令人暴不知人經脈厥而形諸病則有厥狀氣機逆而形諸病則有病能故終舉手足六經之厥狀病能以明之黃帝問曰厥之寒熱者何也厥猶逆也經脈之血皮毛之氣不相順接而厥逆也蓋經脈之血出於手足之指井合皮毛之氣而溜於榮注於俞過於原行於經入於合若經氣不相通貫致有寒熱之厥故以為問岐伯對曰陽氣衰於下則為寒厥陰氣衰於下則為熱厥厥有寒熱其根皆起於下故陽氣衰於下則為寒厥陰氣衰於下則為熱厥下足下也帝曰熱厥之為熱也必起於足下者何也熱為陽足為陰熱厥之為熱也何以必起於足下岐伯曰陽氣起於足五指之表陰脈者集於足下而聚於足心故陽氣勝則足下熱也陽氣之熱本於陰氣之虛故陽氣陰氣皆起於足而有表裡之分太陽根起於足小趾外側陽明根起於足大次趾之端少陽根起於足小次趾之端是陽氣起於足五指之表太陰根起於隱白少陰根起於湧泉厥陰根起於大敦是陰脈者集於足下而聚於足心三陽三陰皆起於足今陰氣衰故陽氣勝陽氣勝則足下熱也此熱厥所以起於足下也帝曰寒厥之為寒也必從五指而上於膝者何也寒為陰膝為陽寒厥之為寒也何以必從五指而上於膝岐伯曰陰氣起於五指之裡集於膝下而聚於膝上故陰氣勝則從五指至膝上寒其寒也不從外皆從內也陽氣起於足五指之表則陰氣當起於五指之裡三陰經氣集於膝下而聚於膝上今陽氣衰故陰氣勝陰氣勝則從五指至膝上寒膝外為陽膝內為陰故其寒也不從外皆從內也此寒厥所以從五指而上於膝也帝曰寒厥何失而然也失其所用之陽氣則為寒厥故問寒厥何失而然岐伯曰前陰者宗筋之所聚太陰陽明之所合也春夏則陽氣多而陰氣少秋冬則陰氣盛而陽氣衰此人者質壯以秋冬奪於所用下氣上爭不能復精氣溢下邪氣因從之而上也氣因於中陽氣衰不能滲營其經絡陽氣日損陰氣獨在故手足為之寒也痿論云入房太甚宗筋弛縱故前陰者乃宗筋之所聚陽明主潤宗筋而陽明胃腑水穀之精又借太陰脾土以運行故宗筋乃太陰陽明之所合也時當春夏則人身陽氣多而陰氣少陰氣雖少陽之守也時當秋冬則人身陰氣盛而陽氣衰陽氣雖衰陰之使也此人寒厥者秉質壯盛以秋冬用陽之時而奪於所用則在下之陰氣上爭於陽致陽氣不能復復內藏也陽氣不復不和於陰則精氣散溢於下正虛邪生故邪氣因從之而上也陰寒之邪氣因於中而陽氣日衰不能滲營其經絡陽氣日損陰氣獨在故手足為之寒也是失其所用之陽氣而為寒厥也帝曰熱厥何如而然也失其所藏之陰精則為熱厥故問熱厥何如而然岐伯曰酒入於胃則絡脈滿而經脈虛脾主為胃行其津液者也陰氣虛則陽氣入陽氣入則胃不和胃不和則精氣竭精氣竭則不營其四肢也此人必數醉若飽以入房氣聚於脾中不得散酒氣與穀氣相薄熱盛於中故熱偏於身內熱而溺赤也夫酒氣盛而慓悍腎氣日衰陽氣獨勝故手足為之熱也數音朔溺鳥去聲下同陰虛陽勝則為熱厥故假飲酒以明之酒入於胃先行皮膚先充絡脈則絡脈滿而經脈虛不由脾氣之運行故曰脾主為胃行其津液者也今不由脾運是陰氣虛酒氣先行皮毛絡脈而後入則陽氣入入者絡脈之熱復入於胃也故陽氣入則胃不和胃不和則經隧之精氣竭精氣竭則不營灌其四肢也此人熱厥者必數飲酒而醉若既醉且飽以入房其穀氣聚於脾中不得散酒氣復與穀氣相薄酒性熱故熱盛於中盛於中故熱遍於身內外皆熱故內熱而溺赤也夫酒氣盛而性慓悍致腎精之氣日衰而陽氣獨勝陽氣獨勝故手足為之熱也是失其所藏之陰精而為熱厥也帝曰厥或令人腹滿或令人暴不知人或至半日運至一日乃知人者何也上文寒厥熱厥其厥在於經脈故復問厥或令人腹滿則脾土內虛或令人暴不知人或至半日一日乃知則心神失守不在經脈其故何也岐伯曰陰氣盛於上則下虛下虛則腹脹滿陰寒之氣盛於上則上下皆陰而陽氣虛於下下虛則腹脹滿以明腹滿而為寒厥之意陽氣盛於上則下氣重上而邪氣逆逆則陽氣亂陽氣亂則不知人也重平聲陽熱之氣盛於上則下氣重上而邪氣逆逆則陽氣亂亂則心神不寧故暴不知人或至半日遠至一日乃知也以明暴不知人而為熱厥之意此一節論厥證之寒熱陰陽陽虛則為寒厥陰虛則為熱厥也帝曰善願聞六經脈之厥狀病能也腹滿不知人仍不外陰陽寒熱之義帝故善之而三陽三陰之六經脈皆有厥狀病能故舉以問岐伯曰巨陽之厥則腫首頭重足不能行發為眴僕厥狀屬經病能屬氣巨陽太陽也其脈上額交巔下出足外踝之後故巨陽之厥其狀則上為腫首頭重下為足不能行病經而轉於氣則發為眴僕此明巨陽經脈之厥狀而兼及病能也陽明之厥則癲疾欲走呼腹滿不得臥面赤而熱妄見而妄言陽明之厥則陽明經脈不和故巔疾欲走呼其脈下循腹裡故腹滿狀為巔疾故不得臥陽明之脈起面頞故面赤而熱狀欲走呼故妄見而妄言此明陽明之厥狀也少陽之厥則暴聾頰腫而熱脅痛䯒不可以運少陽之厥則少陽經脈不和其脈從耳後入耳中出走耳前故暴聾其脈加頰車循脅裡行身之側故頰腫而熱脅痛出膝外廉下輔骨故䯒不可以遠此明少陽之厥狀也太陰之厥則腹滿䐜脹後不利不欲食食則嘔不得臥太陰之厥則太陰經脈不和其脈入腹屬脾絡胃故腹滿䐜脹腹滿則脾土不和䐜脹則胃土不和其狀腹滿故後便不利其狀䐜脹故不欲食不欲食而強食則嘔脾胃不和故不得臥此明太陰之厥狀也少陰之厥則口乾溺赤腹滿心痛少陰之厥則少陰經脈不和少陰腎脈也腎為水臟厥則水竭火盛故口乾溺赤溺赤則水道不利而腹滿口乾則火熱上炎而心痛此明少陰之厥狀也厥陰之厥則少腹腫痛腹脹涇溲不利好臥屈膝陰縮腫䯒內熱好去聲厥陰之厥則厥陰經脈不和其脈過陰器抵小腹故少腹腫痛少腹不但腫痛而且脹腫痛而脹故徑溲不利肝木不舒故好臥筋不柔和故屈膝屈膝蜷臥也陰縮腫前陰萎縮而囊腫也厥陰之脈上膕內廉故䯒內熱此明厥陰之厥狀也盛則瀉之虛則補之不盛不虛以經取之結上文而言三陽三陰之厥當以針刺治之故經脈有餘而盛則針刺以瀉之經脈不足而虛則針刺以補之經脈不盛不虛則各隨其經脈取而調和之太陰厥逆䯒急攣心痛引腹治主病者上文申明厥狀故但言厥此下兼論病能故言厥逆太陰厥逆經厥而氣亦逆也䯒急攣太陰之氣不和於髀膕也心痛引腹太陽之氣不能從腹上交於心故心痛復引於腹也此太陰厥逆之病能乃太陰所主之病故曰治主病者少陰厥逆虛滿嘔變下泄清治主病者少陰經厥氣逆少陰火氣虛於上故虛滿而有欲嘔之變證少陰水氣虛於下故下泄而其便復清此少陰厥逆之病能故當治其主病者厥陰厥逆攣腰痛虛滿前閉詀言治主病者厥陰經厥氣逆則筋攣腰痛肝氣鬱則虛滿而前陰閉結肝木不生心火故詀言此厥陰厥逆之病能故當治其主病者三陰俱逆不得前後使人手足寒三日死結上文而言三陰厥者病在經三陰逆者病在氣故三陰俱逆不得陽氣以和之致不得前後使人手足寒三日三陰不和於陽故三日死太陽厥逆僵仆嘔血善衄治主病者太陽經厥氣逆則陽氣不能周遍故僵仆僵仆即上文發為眴僕之義陽熱之氣不行皮毛內傷絡脈陽絡傷則血外溢故嘔血善衄此太陽厥逆之病能故當治主病者少陽厥逆機關不利機關不利者腰不可以行項不可以顧發腸癰不可治驚者死少陽經厥氣逆則樞轉有乖故機關不利申明機關不利者病於下則腰不可以行病於上則項不可以顧不能樞轉從外則發腸癰發腸癰則內郁之氣從癰而泄不可治少陽之主病當治陽明之腸癰若治少陽虛其旋轉之氣神機內亂而發驚樞將折也故死此少陽厥逆病能發於陽明當治陽明故不言治主病者陽明厥逆喘咳身熱善驚衄嘔血陽明經厥氣逆則陽明燥金之氣不和於肺故喘咳陽明氣逆故身熱聞木音則善驚熱迫於經則衄嘔血上文發腸癰不可治少陽當治陽明是治陽明之意已寓於上故此不言治主病者手太陰厥逆虛滿而咳善嘔沫治主病者上文論六經之厥狀復論六經之病能而經脈之中又有手之六經故復舉手六經之厥逆以終經脈病能之義手太陰經厥氣逆則肺氣虛滿而咳肺氣滿咳不能四布其水津故善嘔沫此手太陰厥逆之病能故當治主病者手心主少陰厥逆心痛引喉身熱死不可治手心主厥陰包絡手少陰心經經厥氣逆皆有心痛之病喉者肺氣也心痛引喉則兩火上炎而爍金又兼身熱為焚為焰則死不可治由是而知心包與心不可皆病也手太陽厥逆耳聾泣出項不可以顧腰不可以俯仰治主病者經脈論云小腸手太陽之脈是主液所生病者耳聾目黃故手太陽經厥氣逆則耳聾泣出耳聾泣出者液虛也液虛則骨屬屈伸不利故項不可以顧腰不可以俯仰此手太陽厥之病能故當治主病者手陽明少陽厥逆發喉痹嗌腫痓治主病者經脈論云三焦手少陽之脈則病嗌腫喉痹今手少陽經氣厥逆不能外通腠理故上逆而喉痹嗌腫當治手少陽之三焦痓者頭面搖卒口噤背反張也經脈論云大腸手陽明之脈是主津液所生病者今手陽明經氣厥逆津液不榮於經脈故痓當資手陽明之津液故治主病者此一節言厥狀在經病能在氣舉手足六經之主病以終厥論之義病能論第四十六篇上篇論六經脈之厥狀病能而病能未暢其旨故復論之十二經脈秉氣於胃故首論胃脘癰其次有病厥者有病頸癰者有病怒狂者有病酒風者舉病氣之合於四時者而論之皆病能也黃帝問曰人病胃脘癰者診應何如十二經脈秉氣於胃人病胃脘癰則經脈之診當何如岐伯對曰診此者當候胃脈其脈當沉細沉細者氣逆逆者人迎甚盛甚盛則熱人迎者胃脈也逆而盛則熱聚於胃口而不行故胃脘為癰也胃脘有癰故診此者當候胃脈病在於胃其脈當沉細沉細者由於正氣之逆氣逆則經脈不和故逆者人迎甚盛甚盛則胃熱也申明人迎者乃結候兩旁之胃脈也今氣逆而熱盛則熱聚於胃口而不行不行故胃脘為癰也所謂深之細者其中手如針也摩之切之聚者堅也搏者大也舊本在為後飯之下今改正於此中去聲深沉也博散也上文云其脈當沉細所謂沉之細者其中手如針之微細深沉也胃脘有癰其外則當摩之切之摩之切之而有所凝聚者癰之堅也若不凝聚而博散者癰之大也帝曰善人有臥而有所不安者何也候人迎而知胃癰帝故善之胃不和則臥不安故舉以問岐伯曰臟有所傷及精有所之寄則安故人不能懸其病也諸臟之氣歸於胃土臥不安者乃臟氣有所傷及陰精有所之之去也臟傷精去臥不安也夫諸臟之氣皆歸於胃而胃土之氣寄於諸臟是胃氣相寄則安今不寄則不安故人不能懸絕其病也帝曰人之不得偃臥者何也偃臥正臥也評熱論云不能正偃者胃中不和也故舉而復問岐伯曰肺者臟之蓋也肺氣盛則脈大脈大則不得偃臥論在奇恆陰陽中肺位居高是肺者臟之蓋也蓋者如天覆於上其氣下行今肺氣盛則氣上不下氣上不下則肺部之脈大脈大則不得偃臥矣此失陰陽之常度故論在奇恆陰陽中奇恆陰陽如下文所云是也上經者言氣之通天也下經者言病之變化也金匱者決死生也揆度者切度之也奇恆者言奇病也所謂奇者使奇病不得以四時死也恆者得以四時死也所謂揆者方切求之也言切求其脈理也度者得其病處以四時度之也舊本在篇末今列於此度入聲處去聲示從容論云請誦脈經上下篇脈經疑即靈樞經此上經下經即脈經上下經也上經言氣化之道故上經者言人氣之通天也下經言疾病之生故下經者言民病之變化也靈樞論篇有著之玉版藏之蘭室者即藏之金匱也金匱者所以通決死生也疏五過論云上經下經揆度陰陽奇恆五中決以明堂故申言揆度者切其脈而度之也奇恆者言非常之奇病也復申言所謂奇者使奇病不得以四時死也恆者得以四時死也又申言所謂揆者方切求之言切求其脈理也度者得其病處而以四時之陰陽度之也如是則知氣之通天病之變化可以決人之死生矣帝曰有病厥者診右脈沉而緊左脈浮而遲不然病主安在承上文切求脈理得其病處之意而問有病厥者陽氣不上故診右脈沉而緊陰氣不下故左脈浮而遲病厥則陰陽之氣不相順接脈故如是設病厥而脈不然則病主安在岐伯曰各診之右脈固當沉緊此應四時左脈浮而遲此逆四時在左當主病在腎頗關在肺當腰痛也切求脈理得其病處當以四時陰陽之理度之春生夏長秋收冬藏如冬診之右脈固當沉緊此冬脈之應四時也今左脈浮而遲此冬脈之逆四時也浮遲在左當主病在腎所以然者腎脈居於左尺也腎上連肺故頗關在肺在腎關肺當腰痛也帝曰何以言之在腎何以關肺關肺何以腰痛岐伯曰少陰脈貫腎絡肺今得肺脈腎為之病故腎為腰痛之病也少陰者腎脈也少陰之脈貫腎絡肺故在腎關肺也浮遲者肺脈也今得浮遲之肺脈而腎為之病腰者腎之府故腎為腰痛之病也帝曰善有病頸癰者或石治之或針灸治之而皆已其真安在論病厥而診冬脈診冬脈而應四時帝故善之病厥為冬則頸癰為春怒狂為夏酒風為秋故相繼以問岐伯曰此同名異等者也等類也頸癰之名雖同而在氣在血則異類也夫癰氣之息者宜以針開除去之夫氣盛血聚者宜石而瀉之此所謂同病異治也息止息也頸癰而氣之止末者其病在氣宜以針開通其氣而除去之此氣息成癰而有針刺之真法也頸癰而氣盛血聚者其病在血宜石刺出血而瀉之此血聚成癰而有石刺之真法也此所以同病異治而皆已也帝曰有病怒狂者此病安生頸癰為春怒狂為夏故舉怒狂以向岐伯曰生於陽也陽氣過盛則狂此之怒狂生於陽也帝曰陽何以使人狂陽者正氣也何以使人狂岐伯曰陽氣者因暴折而難決故善怒也病名曰陽厥陽氣直遂不可屈抑今陽氣者因暴折而難決決猶散也暴折難決故善怒而狂也此因陽氣厥逆而成故病名曰陽厥帝曰何以知之陽厥何以知之岐伯曰陽明者常動巨陽少陽不動不動而動大疾此其候也太少合併而有陽明是陽明有少陽之陽復有太陽之陽故陽明者常動巨陽者陽之極也陽極而其氣反微少陽者陽之初也陽初而其氣安靜故巨陽少陽不動本當不動而今也乃動之大疾此其為陽厥之候也帝曰治之奈何未悉治法故復問之岐伯曰奪其食即已夫食入於陰長氣於陽故奪其食即已使之服以生鐵洛為飲夫生鐵洛者下氣疾也長上聲洛烙同陽明者胃也胃者陽氣之所歸也陽氣有餘須奪其食即已夫食入於胃生其陰精故食入於陰陰精足則陽氣盛故長氣於陽奪其食則陽明土氣少虛故奪其食即已奪猶損也更使之服以生鐵烙為飲鐵者金也金能平木可治少陽之氣烙飲者轉赤為烏也赤而烏可以平巨陽之氣故曰下氣疾也帝曰善有病身熱解墮汗出如浴惡風少氣此為何病惡去聲陽厥有治則陰厥亦有治帝默會其意而善之復舉身熱汗出惡風少氣之病以問岐伯曰病名曰酒風酒氣先行皮膚先充絡脈故身熱汗出惡風不從中土而散精故懈惰少氣岐伯曰酒風蓋秋病也帝曰治之奈何岐伯曰以澤瀉術各十分糜銜五分合以三指撮為後飯分去聲酒風之病中土內虛當以澤瀉術二種十分為君助其脾土糜銜五分為臣散其風邪合以三指而撮此藥先服其藥補中土而散邪風為之後飯以益其胃氣焉合胃癰病厥頸癰怒狂酒風以論病能而揆度奇恆未暢其旨故下即有奇病大奇之論奇病論第四十七篇上篇揆度奇恆未暢其旨故相繼而有奇病之論奇病者形居母腹胎失其養既生之後經脈臟氣不足當天癸未至之時病從內生卒然而起病久且死故曰奇也如九月而喑則胞胎內虛既生之後天癸未至致有息積伏梁疹筋厥逆以及脾甘膽苦癃厥癲疾腎風之病類而舉之皆先天受病卒然而發故曰奇病黃帝問曰人有重身九月而喑此為何也重平聲為去聲下俱同惟為水為主轉為發為之為如字婦人懷孕謂之重身喑聲不出也懷孕九月卒然無聲此何病也岐伯對曰胞之絡脈絕也胞之絡脈系母腰腎絕不相維繫也九月而喑以此故也帝曰何以言之何以絡脈絕而當喑岐伯曰胞絡者繫於腎少陰之脈貫腎系舌本故不能言胞絡者繫於母之腰者腎者少陰也少陰之脈下貫腎上系舌本腎不繫胎則少陰脈虛虛則上下不交故不能言而喑也帝曰治之奈何治喑奈何岐伯曰無治也當十月復九月而喑無可治也當十月則非少陰主胎斯時則復舊能言刺法曰無損不足益有餘以成其疹然後調之所以無治者如刺法有曰無損不足益有餘以成其疹然後調之之也疹猶病也刺法針刺之法也所謂無損不足者身羸瘦無用鑱石也無益其有餘者腹中有形而泄之泄之則精出而病獨擅中故曰疹成也鑱猶針也益猶治也刺法所謂無損不足者如身羸瘦無用針石也所謂無益其有餘者重身則腹中有形如腹中有形而泄之泄之則精出而病獨擅中精出正虛擅中邪實故曰疹成也疹成而後調之不若無損其不足無治其有餘矣此胞絡脈絕先天不足為奇病之先基無客治也帝曰病脅下滿氣逆二三歲不已是為何病脅滿氣逆病之常也二三歲不已則為奇病故舉以問岐伯曰病名曰息積此不妨於食不可灸刺積為導引服藥藥不能獨治也脅滿氣逆病名曰息積二三歲不已故此不妨於食先天經脈受虧病久不愈故不可灸刺積漸次也須漸次為之導引而服藥導引運行也運行則經脈之虧者可復若但服藥則藥不能獨治也此息積為先天奇病而藥不能治也帝曰人有身體髀股䯒皆腫環齊而痛是如何病齊臍通下同身體髀股䯒皆腫則氣越於外環臍而痛則氣凝於內病機各異是為奇病故復問之岐伯曰病名曰伏梁此風根也其氣溢於大腸而著於盲盲之原在齊下故環齊而痛也不可動之動之為水溺澀之病也溺鳥去聲邪積於內致環臍而痛故病名曰伏梁風動水渙致身體髀股䯒皆腫故曰此風根也風根而為伏梁者其風根之氣溢於大腸之外而內著於盲盲之原出了脖胦脖胦臍下也故盲之原在臍下溢大腸而著盲故環臍而痛也外則身體腫內則環臍痛亦屬先天奇病故不可妄攻以動之動之則土氣益虛身腫不消而為水溺澀之病此風根伏梁為先天奇病而不可動也帝曰人有尺脈動甚筋急而見此為何病數音朔尺脈數甚陰血虛也筋急而見肌肉脫也脈數筋急亦為奇病故舉以問岐伯曰此所謂疹筋是人腹必急白色黑色見則病甚疹猶病也筋急而見其病在筋此所謂疹筋肌肉雖脫是人腹必急其面白色黑色見腹主地面主天腹急地氣虛也白色黑色見天氣虛也則病當甚難以治也此疹筋腹急為先天奇病而病必甚也帝曰人有病頭痛以數歲不已此安得之名為何病頭者諸陽之會頭痛而數歲不已亦奇病也岐伯曰當有所犯大寒內至骨髓髓者以腦為主腦逆故會頭痛齒亦痛病名曰厥逆頭者陽也頭痛者當有所犯大寒其室內至骨髓腦為髓海故髓者以腦為主寒入於髓則腦逆腦逆故令人頭痛齒者骨之餘寒入骨髓故齒亦痛病名曰厥逆言陰陽之氣不相順接為厥為逆也此大寒犯髓頭痛不已之奇病而名為厥逆也帝曰善三字衍文帝曰有病口甘者病名為何何以得之承上文頭痛齒痛之意而問口甘乃觸類引伸以問也岐伯曰此五氣之溢也名曰脾癉五氣土氣也溢泛溢也癉熱也土氣泛溢名曰脾癉言土虛脾熱而口甘也夫五味入口藏於胃脾為之行其精氣津液在脾故令人口甘也此肥類之所發也此人必數食甘美而多肥也肥者令人內熱甘者令人中滿故其氣上溢轉為消渴治之以蘭除陳氣也藏如字數音朔胃者土也夫五味入口皆藏於胃而脾則為之行其精氣今津液在脾不能四布故令人口甘也此口甘者乃肥美之味所發也肥美者此人必數食甘美而多肥也肥者性厚故令人內熱甘者性緩故令人中滿內熱中滿故其氣上溢上溢而熱轉為消渴蘭香草也治之以蘭可以除陳氣也除陳者推陳致新之意帝曰有病口苦取陽陵泉口苦者病名為何何以得之承上文口甘中滿治之以蘭之意復問有病口苦取陽陵泉刺之而口苦不愈何也岐伯曰病名曰膽癉夫肝者中之將也取決於膽咽為之使此人者數謀慮不決故膽虛氣上溢而口為之苦治之以膽募俞治在陰陽十二官相使中將使俱去聲數音朔口苦膽熱也故病名曰膽癉膽附於肝肝者將軍之官故夫肝者中之將也膽居肝內肝主謀慮故取決於膽肝脈上循喉嚨故咽為之使此人所以口苦者必數謀慮不決致膽氣不和於肝故膽虛膽氣上溢而口為之苦但治膽合穴之陽陵泉無裨也當治之以膽募俞膽募者胸之分膽俞者背之分膽募俞者膽俞在脊背第十椎下兩旁以背之俞而合於胸之募則當期門之處膽附於肝故當取募俞而合治之靈蘭秘典論曰肝者將軍之官謀慮出焉膽者中正之官決斷出焉十二官者相使而不得相失也夫肝謀慮膽決斷是肝膽之氣相使而不得相失治以膽募俞者乃膽病治肝其施治之義在陰陽十二官相使中此承上文大寒入髓之奇病而論脾癉膽癉之熱病先聖立教之大法也帝曰有癃者一日數十溲此不足也身熱如炭頸膺如格人迎躁盛喘息氣逆此有餘也太陰脈微細如髮者此不足也其病安在各為何病小便不利日癃病癃一日數溲此不足也不足而復有諸有餘之病有餘而復有不足之脈不足而有餘有餘而不足病之奇也故舉以問岐伯曰病在太陰其盛在胃頗在肺病名曰厥死不治此所謂得五有餘二不足也病癃數十溲太陰脈微細如髮則病在太陰身熱如炭頸膺如格人迎躁盛喘息氣逆則其盛在胃太陰者肺也病在太陰故頗在肺陰陽之氣不相交合病名曰厥是為癃厥死不治此所謂得五有餘二不足也有餘不足詳見下文帝曰何謂五有餘二不足岐伯曰所謂五有未者五病之氣有未也二不足者亦病氣之不足也所謂五有餘者一身熱如炭二頸膺如格三人迎躁盛四喘息五氣逆此五病之氣為有餘也所謂二不足者一病癃數十溲二太陰脈微細如髮病有有餘即有不足此二者亦病氣之不足也今外得五有餘內得二不足此其身不表不里亦正死明矣陽明者陽也主外主表太陰者陰也主內主裡今外得五有餘則陽明真氣不行於表內得二不足則太陰真氣不行於里此其身不表不里亦正死明矣所以癃厥之病死不治也帝曰人生而有病巔疾者病名曰何安所得之巔作癲下同癲癲癇也生而病癲亦先天奇病故舉以問岐伯曰病為名胎病此得之在母腹中時其母有所大驚氣上而不下精氣並居故令子發為巔疾也生而病癲先天所受之病也故名為胎病此得之在母腹中時其母有所大驚其氣上而不下精以養胎氣上不下則精與驚氣並居既生以後故令子發為巔疾也此癲疾為先天奇病而屬於不治也帝曰有病龐然如有水狀切其脈大緊身無痛者形不瘦不能食食少名為何病龐然如水狀病之深也脈大緊身無痛形不瘦病之淺也不能食食少病之深也病似深復似淺似淺復似深病之奇也故舉以問岐伯曰病生在腎名為腎風腎風而不能食善驚驚已心氣痿者死腎為水臟今龐然浮腫如有水狀故病生於腎水因風動故名為腎風腎者水也水寒之氣籍陽火以運行今腎風而不能食火氣虛也火虛則善驚驚已而心氣痿者神機化滅也故死此腎風為先天奇病而必死也帝曰善重身九月而喑胞絡脈絕先天受虧發為奇病病不能治且至於死帝通承上文而善之大奇篇第四十八篇大推廣也帝承上篇奇病而推廣之故曰大奇上篇胞絡脈絕乃先天受病其病發於天癸未至之時此篇首言肝滿腎滿肺滿則天癸已至形氣充足而為後天之病病臟腑經脈甚則死不可治所以大奇病之說也肝滿腎滿肺滿皆實即為腫帝承上篇胞絡脈絕先天受病之意而言肝滿腎滿肺滿則天癸已至形氣充盛而為後天之病女子天癸肝所主也男子天癸腎所主也通體形氣肺所主也今肝腎肺滿滿則為實故曰皆實實則壅滯故曰即為腫肺之壅喘而兩胠滿壅壅通下同壅壅滯也以明即為肺者壅滯之意也肺主呼吸其脈橫出腋下肺之壅則呼吸不利其脈不能出腋故喘而兩胠滿肝壅兩胠滿臥則驚不得小便肝脈上貫於膈布脅肋肝壅故兩胠滿人臥則血歸於肝肝壅故臥則驚肝主疏泄肝病則閉癃故不得小便腎壅腳下至少腹滿脛有大小髀䯒大跛易偏枯腎脈起於足心上至少腹腎壅故腳下至少腹滿左右脛骨有大小之不同其髀䯒則腫大而跛易跛易行步不正易其常度也脛有大小髀䯒跛易乃精髓不周於身故偏枯偏枯不周之意此一節言肝滿腎滿肺滿為腫為壅而發為後天之奇病也心脈滿大癇瘛筋攣脈者心之所主心者神之所居心脈滿大則神機不利故癇瘛驚攣神氣不通於心包則癇神氣不行於骨節則瘛癇則筋攣於內瘛則筋攣於外也肝脈小急癇瘛筋攣肝者血之所藏肝脈小急則血不充身故亦癇瘛筋攣是知癇瘛筋攣之病有因神氣之內虛有因肝血之不足矣肝脈騖暴有所驚駭騖音務餘篇同騖猶疾也暴猶促也肝脈疾促陰血虛而陽熱盛也血虛熱盛故有所驚駭上文肝脈小急血虛陰盛則癇瘛筋攣此肝脈騖暴血虛陽盛則驚駭也脈不至若瘛不治自已承上文癇喑驚駭而言當癇驚之時其三部之脈一時不至口無言而苦喑有屬不治者有屬自己者二陰急為癇厥二陽急為驚舊本在三陰急為疝下今改正於此急不和也承上文不治自已之意而言二陰心腎不交經脈不和而為癇厥之喑則不治二陰少陰也陽明胃絡不通於心經脈不和而為驚駭之喑則自已二陽陽明也此臟脈陰陽經氣不和發為癇驚之奇病也腎脈小急肝脈小急心脈小急不鼓皆為瘕腎脈小急腎臟虛寒也肝脈小急肝臟虛塞也心脈小急心臟虛寒也臟氣虛寒小急而脈不鼓則皆為瘕言腎肝與心皆可為瘕瘕假也假寒氣而成形也腎肝並沉為石水並浮為風水並虛為死並小弦欲驚腎肝並沉則肝氣下沉於腎故為石水石水腎水也腎肝並浮則腎氣上浮於肝故為風水風水肝水也腎肝並虛則水不生木故為死腎肝並小弦則虛而受邪故欲驚欲驚正虛邪擾之意腎脈大急沉肝脈大急沉皆為疝心脈搏滑急為心疝肺脈沉搏為肺疝腎脈大急沉腎氣受邪而下入也肝脈大急沉肝氣受邪而下入也邪氣下入故皆為疝或為腎之水疝或為肝之筋疝也心脈搏滑急則心氣受邪故為心疝脈要精微論曰診得心脈而急病名心疝少腹當有形也肺脈沉搏則肺氣受邪故為肺疝肺疝氣疝也三陽急為瘕三陰急為疝承上文瘕疝之意而言三陽脈急陽不和陰則為瘕三陽太陽也三陰脈急陰不和陽則為疝三陰太陰也此臟脈陰陽經氣不和發為瘕疝之奇病也脾脈外鼓沉為腸澼久自已腸澼泄瀉也脾脈外鼓沉言脾土之氣鼓動於外不能四布覆下也如是則津液不行由經隧故為腸澼土氣內逆腐穢當下故日久自已肝脈小緩為腸澼易治易去聲肝脈小緩肝臟虛而氣機和緩也故為腸澼則當易治腎脈小搏沉為腸澼下血血溫身熱者死腎脈小搏沉腎臟虛而熱邪下搏也故為腸澼當主下血血溫於內身熱於外火炎血竭故死心肝澼亦下血二臟同病者可治心肝澼言心脈肝脈不和而病腸澼也亦下血亦為腎脈之腸澼下血也心肝二臟同病而為腸澼者主木火相生故為可治其脈小沉澀為腸澼其身熱者死熱見七日死肺朝百脈其脈小沉澀肺氣虛也肺氣虛而腸澼其身復熱乃陰津泄於下陽熱浮於外泄於下則下而不上浮於外則外而不內陰陽離脫故死熱見七日不能環復故七日死胃脈沉鼓澀胃外鼓大心脈小堅急背膈偏枯男子發左女子發右不喑舌轉可治三十日起背舊本訛皆今改此舉胃腑之脈以足上文五臟之意心主脈而五臟之中皆有胃脈會胃脈沉鼓而澀胃氣不行於外矣胃脈外鼓而大胃氣不行於內矣沉鼓澀外鼓大皆非胃土柔和之脈胃脈如是也心脈復小堅急不能合胃脈而行於前後則背膈偏枯不能合胃脈而行於左右則男子偏枯發左女子偏枯發右胃絡上通於心而舌為心之竅故不喑舌轉則胃絡通於心心氣通於胃故其病不可治三十日則榮衛血氣一周故病當起其從者喑三歲起年不滿二十者三歲死玉版論要云男子右為從女子左為從其從者謂男子發於右女子發於左不同於上文之發也上文男子發左女子發右則不喑此男子發右女子發左故喑喑則胃絡不通於心心氣不通於胃其偏枯之病必三歲方起若年不滿二十者天癸之精血始通方來未艾不能固密故三歲死此言五臟經脈內虛發為腸澼胃腑經脈不和發為偏枯之奇病也此一節舉癇驚瘕疝腸澼偏枯臟腑經脈不和而為後天之奇病也脈至而搏血衄身熱者死脈來懸鉤浮為常脈上節論脈病之死生此下但論脈之死生也搏搏擊也脈至而搏脈無胃氣故血衄身熱者死若血衄身熱脈來懸鉤而浮乃為血衄身熱之常脈則不死矣脈至如喘名曰暴厥暴厥者不知與人言喘疾促不倫也脈至為喘失其常度故名曰暴厥申明暴厥者一時昏憒不知與人言脈至如數使人暴驚三四日自已數音朔下同數一息六至也脈至如數陽熱有餘故使人暴驚暴驚則三四日自已脈至浮合浮合如數一息十至以上是經氣予不足也微見九十日死予即與下同脈至浮合浮合於皮膚之上如湯沸也故申言浮合如數一息十至以上沉脈候臟浮脈候經是經氣予不足而脈浮數也微見者微於皮膚之上見此數極之脈中按求之則不見也故至九十日而死經脈應月一月一周九十日者三周也若舉按皆然不逾時日矣脈至如火薪然是心精之予奪也草乾而死火薪然如火然薪浮焰無根也心為火臟脈至如是是心精之予奪而見此脈也冬時草乾而死水刑火也脈至如散葉是肝氣予虛也木葉落而死散葉木葉飄散之義肝為木臟脈至如是是肝氣予虛而見此脈也秋時木葉落而死金刑木也脈至如省客省客者脈塞而鼓是腎氣予不足也懸去棗華而死華即花下同省客猶主省客至而即去也故申言省客者脈塞而鼓謂脈充塞於指即鼓動而去如省客之象也腎為水臟脈至如是是腎氣不足而見此脈也懸去猶言虛度虛度棗華之初夏而死於土令之長夏土刑水也脈至如丸泥是胃精予不足也榆莢落而死丸泥彈丸之泥不柔和也胃為上腑脈至如是是胃精予不足而見此脈也春時榆莢落而死木刑土也脈至如橫格是膽氣予不足也禾熟而死格拒也橫格橫拒於中上下不貫也膽氣屬木生陽上升脈至如是是膽氣予不足而見此脈也秋時禾熟而死金刑木也脈至如弦縷是胞精予不足也病善言下霜而死不言可治弦縷其急如弦其細如縷胸中為血海衝任之脈皆起於胞中並足少陰之經至胸中而散脈至如是精血內虛是胞精予不足而見此脈也至胸中而不能散故病善言下霜之時水氣生王胞精不足不能生王故死至胸中而能散則不善言故不言可治上文皆言四時之氣克我而死此言人身之氣不能王時而死也脈至如交漆交漆者左右旁至也微見三十日死交作絞此復申明胞精不足之意絞漆之脈左右旁流按之無根故申言絞漆者左右旁至也微於皮膚之上見此旁至之脈經脈內虛至一月而死三十日者經脈一周也脈至如湧泉浮鼓肌中太陽氣予不足也少氣味韭英而死湧泉泉水之湧浮鼓不返故曰脈至如湧泉浮鼓肌中太陽秉容水之氣以運行脈至如是是太陽氣予不足而見此脈也氣為陽味為陰太陽有寒熱陰陽之氣太陽虛故少氣味英盛也韭英乃季春土王之時韭英而死土剋水也脈至如頹土之狀按之不得是肌氣予不足也五色先見黑白壘發死壘藟同頹土傾頹之上猶頑土也狀如頹土止而不行故按之不得脾主肌屬土脈至如是是肌氣予不足而見此脈也土主五色先見宜黃今五色先見黑土虛水溢也藟葛屬其色白白藟發於春春時木王土襄故白藟發死脈至如懸雍懸雍者浮揣切之益大是十二俞之予不足也不凝而死雍作𧣴懸𧣴虛腫之𧣴上浮本大也上浮故當浮揣本大故切之益大十二經俞流行環轉壅滯則病脈至如是是十二俞之予不足而見此脈也水凝則天寒地凍經脈凝澀故水凝而死凝不生動也脈至如偃刀偃刀者浮之小急按之堅大急五臟菀熱寒熱獨並於腎也如此其人不得坐立春而死偃息也刀金器也偃刀堅剛內伏也故申言偃刀者輕指浮之則脈小急重指按之則脈堅大而急腎臟五臟之精脈至如是是五臟菀熱寒熱獨並於腎而沉匿也經脈論云腎是動病坐而欲起故如此其人不得坐五臟之病獨並於腎冬失其藏春無以生故立春而死脈至如丸滑不直手不直手者按之不可得也是大腸氣予不足也棗葉生而死丸園轉也不直手滑利也故申言不直手者按之即無不可得也大腸之腑居於胃下合土氣以運行脈至如是是大腸氣予不足而見此脈也春時棗葉生而死木剋土也脈至如華者令人善恐不欲坐臥行立常聽是小腸氣予不足也季秋而死華輕浮之意脈至如華者腎精不升故令人善恐坐而欲起故不欲坐臥耳為腎竅故行立常若有聽精虛則液先虛腎藏精小腸主液是小腸氣予不足而有如是之脈證也季秋土氣坐王之時季秋而死土剋水也此一節論脈象而知臟腑經俞之病四同身死之期不死於病而死於脈所以大奇病之說也脈解篇第四十九篇帝復承上篇脈病之意錯舉靈樞經脈論之言及本經所已言者而申解之故曰脈解六氣主時始於厥陰終於太陽此舉三陽三陰經脈之病則太陽主春正月為春之首太陽為陽之首也少陽主秋九月為秋之終少陽為陽之終也陽明主夏五月為夏之中陽明居陽之中也三陰經脈外合三陽雌雄相應太陰合陽明故主十一月十一月冬之中也少陰合太陽故主十月十月冬之首也厥陰合少陽故主三月三月春之經也太陰為陰中之至陰故又主十二月十二月陰中之至陰也錯舉六經之病復以三陽三陰主四時之月而錯綜解之所以為脈解也太陽所謂腫腰脽痛者正月太陽寅寅太陽也正月陽氣出在上而陰氣盛陽未得自次也故腫腰脽痛也脽音誰餘篇仿此脽尻也靈樞經脈論云手太陽所生病頜腫頰腫六元正紀大論云太陽終之氣則病腰脽痛故申明太陽所謂腫以及腰脽痛者太陽居三陽之首正月建寅為一歲之首故正月太陽寅寅太陽也正月之時其氣始春故陽氣出在上寒氣未散而陰氣猶盛則陽氣未得自次而出也故太陽經脈之病有腫以及腰脽痛也所謂病偏虛為跛者正月陽氣凍解地氣而出也偏虛者冬寒頗有不足者故偏虛為跛也舊本所謂二字誤傳出也下今改正偏虛猶偏枯本經大奇篇云腎壅則髀䯒大跛易偏枯故申明所謂病偏虛為跛者正月陽氣始生地凍始解地氣從下而上出也其病偏虛者腎主冬令之寒冬寒頗有不足者故偏虛而為跛也此言冬失其藏至春有偏枯之跛病也所謂強上引背者陽氣大上而爭故強上也強去聲本經熱論云傷寒一日巨陽受之頭項痛腰脊強是腰脊之強上引於背而至頭項也故申明所謂強上引背者乃太陽陽氣大上而爭故腰脊強而上引背也所謂耳鳴者陽氣萬物盛上而躍故耳鳴也靈樞經脈篇云手太陽之筋其病應耳中鳴故申明所謂耳鳴者乃陽氣萬物盛上而躍躍則振動故耳鳴也所謂甚則狂巔疾者陽盡在上而陰氣從下下虛上實故狂巔疾也巔癲同經脈論云足太陽所生病者狂巔疾故申明所謂甚則狂癲疾者乃陽盡在上而陰氣以下陰氣從下則下寒而虛陽盡在上則上熱而實下虛上實故有太陽經脈之狂癲疾也所謂浮為聾者皆在氣也經脈論云手太陽之脈入耳中所生病者耳聾故申明所謂浮為聾者是逆氣上浮而為聾皆在氣也所謂入中為喑者陽氣已衰故為喑也內奪而厥則為喑俳此腎虛也少陰不至者厥也俳痱同音肥本經腹中論云陽氣入陰入則喑故申明所謂入中為喑者陽氣盛時則不喑陽盛已衰故為喑也若陽氣內奪而厥逆不充於外則為喑痱喑痱者口無言而四肢不收故曰此腎虛也腎虛則少陰之脈不出於陽故少陰不至者則內奪而厥也太陽少陰表裡相應故解太陽經脈之病而兼言少陰也此解太陽經脈之病也少陽所謂心協痛者言少陽盛也盛者心之所表也九月陽氣盡而陰氣盛故心協痛也經脈論云足少陽則病心協痛故申明少陽所謂心協痛者言少陽火氣當盛也心為君火少陽為相火故盛者心之所表也若九月之時陽氣已盡而陰氣方盛少陽火氣不盛不能為心之表故有心協痛之病也少陽言九月者九月為秋之終少陽居陽之終也所謂不可反側者陰氣藏物也物藏則不動故不可反側也藏如字反側猶轉側經脈論云足少陽病不能轉側故申明所謂不可反側者九月陰氣方盛陰氣所以藏物也物藏則不動故少陽經脈有不可反側之病也所謂甚則躍者九月萬物盡衰草木畢落而墮則氣去陽而之陰氣盛而陽之下長故謂躍長上聲上文云陽氣萬物盛上而躍躍者少陽樞轉之象故申明所謂甚則躍者九月之時萬物盡衰草木畢落而墮人身之氣則去陽而之陰去陽之陰則陰之盛陰氣居陽之下故氣盛而陽之下長陽之下長故謂躍也此解少陽經脈之病也陽明所謂洒洒振寒者陽明者午也五月盛陽之陰也陽盛而陰氣加之故洒洒振寒也經脈論云足陽明之脈則病洒洒振寒故申陰陽明所謂洒洒振寒者陽明者午也午主五月一陰始生故五月盛陽之陰也盛陽之陰則陽盛而陰氣加之故陽明經脈有洒洒振寒之病也陽明言五月者五月為夏之中陽明居陽之中也所謂脛腫而股不收者是五月盛陽之陰也陽者衰於五月而一陰氣上與陽始爭故脛腫而股不收也經筋篇云足陽明之筋其病支脛轉筋髀前腫筋弛縱緩不勝收故申明所謂脛腫而股不收者是五月之時盛陽之陰也陽者衰於五月而一陰之氣上與陽明始爭故陽明經脈有脛腫而股不收之病也所謂上喘而為水者陰氣下而復上上則邪客於臟腑間故為水也本經逆調論云臥則喘者是水氣之客也故申明所謂上喘而為水者冬至一陽初生陰氣下降五月之時一陰始生陰氣下而復上上則水邪客於臟腑之間故為水也所謂胸痛少氣者水氣在臟腑也水者陰氣也陰氣在中故胸痛少氣也此舉胸痛少氣以明水氣在臟腑之意上文云邪客於臟腑間故為水也此申明水氣在臟腑者所謂胸痛少氣者即水氣在臟腑也夫水者陰氣也陰氣在陽明中土故胸痛少氣而病陽明之經脈也胸痛少氣經中多各言之此則合舉之也所謂甚則厥惡人與火聞木音則惕然而驚者陽氣與陰氣相薄水火相惡故惕然而驚也惡去聲下同經脈論云陽明病至則惡人與火聞木音則惕然而驚甚則骭厥故申明所謂甚則厥惡人與火聞木音則惕然而驚者乃陽明之陽氣與陰氣相薄故甚則厥而惡人也惡火者厥為陰為水乃水火相惡又木能生火故聞木音則惕然而驚也所謂欲獨閉戶牖而處者陰陽相薄也陽盡而陰盛故欲獨閉戶牖而居經脈論云陽明病至獨閉戶塞牖而處故申明所謂欲獨閉戶牖而處者乃陰加於陽陰陽相薄也陽明者陽也陽盡而陰盛故欲獨閉戶牖而居居猶處也所謂病至則欲乘高而歌棄衣而走者陰陽復爭而外並於陽故使之棄衣而走也經脈論云陽明病至甚則欲上高而歌棄衣而走故申明所謂病至則欲乘高而歌棄衣而走者始則陽盡陰盛繼則陰陽復爭而外並於陽故使之乘高而歌棄衣而走也所謂客孫脈則頭痛鼻鼽腹腫者陽明並於上上者則其孫絡太陰也故頭痛鼻鼽腹腫也出處未詳大抵皆陽明之病孫脈孫絡脈也所謂客孫脈則頭痛鼻鼽腹腫者乃陽明之脈不從下行而並於上並於上者則其孫絡之脈合脾之大絡而為太陰也陽明並於上故頭痛鼻鼽孫絡太陰故腹腫也此解陽明之脈病也太陰所謂病脹者太陰子也十一月萬物氣皆藏於中故曰病脹藏如字經脈論云太陰病腹脹故申明太陰所謂病脹者太陰陽明雌雄相合陽明主夏之中則太陰主冬之中故太陰子也子十一月也十一月萬物之氣皆藏於中藏於中故太陰經脈則曰病脹也所謂上走心為噫者陰盛而上走於陽明陽明絡屬心故曰上走心為噫也經脈論云太陰病善噫本經宣明五氣篇云心為噫故申明所謂上走心為噫者太陰陰盛而上走於陽明陽明胃絡連屬心包之絡故太陰經脈而曰上走心為噫也所謂食則嘔者物盛滿而上溢故嘔也經脈論云太陰病食則嘔故申明所謂食則嘔者物盛充滿脾不消磨而反上溢故嘔也所謂得後與氣則快然如衰者十二月陰氣下衰而陽氣且出故曰得後與氣則快然如衰也經脈論云腹脹善噫得後與氣則快然如衰故申明所謂得後與氣則快然如衰者太陰為陰中之至陰十二月至陰也至陰則陰氣下衰而陽氣且將出故太陰經脈腹脹善噫而曰得後與氣則快然如衰也此太陰外合陽明又為陰中之至陰也少陰所謂腰痛者少陰者腎也十月萬物陽氣皆傷故腰痛也經脈論云足少陰之別虛則腰痛故申明少陰所謂腰痛者腰乃腎府少陰者腎也少陰太陽雌雄相合太陽主春之首則少陰主冬之首十月之時萬物陽氣皆傷所以然者承秋之肅殺也故少陰經脈而病腰痛也所謂嘔咳上氣喘者陰氣在下陽氣在上諸陽氣浮無所依從故嘔咳上氣喘也經脈論云足少陰脈病則咳唾喝喝而喘咽腫上氣故申明所謂嘔咳上氣喘者少陰陰氣在下君火陽氣在上水火之氣貴乎相交諸陽氣浮腎水不上則陽氣無所依從故少陰經脈內虛而病嘔咳上氣喘也所謂色色不能久立久坐起則目䀮䀮無所見者萬物陰陽不定未有主也秋氣始至微霜始下而方殺萬物陰陽內奪故目䀮䀮無所見也色色二字衍文不能久立久坐乃坐而欲起之意經脈論云坐而欲起目䀮䀮如無所見故申明不能久立久坐起則目䀮䀮無所見者十月之時萬物陰陽不定未有主也所以然者秋氣已過冬氣未盛故陰陽不定未有主也其時秋氣始至於冬微霜始下而方殺萬物萬物方殺則陰陽內奪不榮於外故少陰經脈之病而目䀮䀮無所見也所謂少氣善怒者陽氣不治陽氣不治則陽氣不得出肝氣常治而未得故善怒善怒者名曰煎厥少氣者氣並於下也本經調經論云血並於上氣並於下心煩惋善怒故申明所謂少氣善怒者乃君火之陽氣不治陽氣不治則陽氣不得上出並於下而少氣矣氣並於下則血並於上肝主血肝氣當治而未得治故善怒申明善怒者如火之烈名曰煎厥此少陰有少氣善怒之病也所謂恐如人將捕之者秋氣萬物未有畢去陰氣少陽氣入陰陽相薄故恐也經脈論云腎病則善恐心惕惕如人將捕之故申明所謂恐如人將捕之者秋氣萬物凋謝十月始冬未能盡藏故萬物未有畢去畢盡也未能盡去陽入陰也十月始冬故陰氣少萬物凋謝故陽氣入陽入於陰則陰陽相薄故少陰經脈而有內恐之病也所謂惡聞食臭者胃無氣故惡聞食臭也惡聞食臭者不欲食也經脈論云腎病飢不欲食故申明所謂惡聞食臭者三焦出氣於胃腐化水穀令胃無三焦火熱之氣故少陰脈病飢不欲食而惡聞食臭也三焦少陽也本俞論云少陽屬腎此之謂也所謂面黑如地色者秋氣內奪故變於色也地色地蒼之色如漆柴也經脈論云腎病面如漆柴故申明所謂面黑如地色者因秋時肅殺之氣內奪其精華故至冬則變於色而黑如地色也所謂咳則有血者陽脈傷也陽氣未盛於上而脈滿滿則咳故血見於鼻也經脈論云腎病咳唾則有血故申明所謂咳則有血者乃陰血乘於陽位陽脈不歸於陰故曰陽脈份也陰血乘陽脈不歸陰則陽脈滿十月之時陽氣未盛於上未當盛時而脈滿則陽氣內逆故滿則咳咳則有血而且見於鼻也此少陰外合太陽而為冬之首也厥陰所謂㿗疝婦人少腹腫者厥陰者辰也三月陽中之陰邪在中故曰㿗疝少腹腫也㿗疝猶㿉疝言高腫也經脈論云厥陰病丈夫㿉疝婦人少腹腫故申明厥陰所謂㿗疝婦人少腹腫者厥陰少陽雌雄相合少陽主秋之終則厥陰主春之終故厥陰者辰也辰三月也三月之時其氣將陽陽中之陰言陽未盡陽陽中有陰也陽中之陰則陰邪在厥陰經脈中故厥陰而曰㿗疝少腹腫也所謂腰脊痛不可以俯仰者三月一振榮華萬物一俯而不仰也經脈論云厥陰病腰痛不可以俯仰故申明所謂腰脊痛不可以俯仰者三月之時振動發生草木向榮而華秀故三月一振榮華生機雖盛猶未暢達故萬物一皆俯而不仰也厥陰主三月故厥陰經脈之病腰脊痛不可以俯而復仰也所謂㿗癃疝膚脹者日陰亦盛而脈脹不通故曰㿗癃疝也出處未詳大抵皆厥陰之病㿗㿗疝也癃溺閉也㿗癃疝膚脹者陰器腫不得小便則膚脹也故申明所謂㿗癃疝膚脹者猶曰陰氣亦盛而經脈脹不通故曰㿗癃疝而膚脹也所謂甚則嗌乾熱中者陰陽相薄而熱故嗌乾也經脈論云足厥陰病甚則嗌乾手厥陰病心中熱故申明所謂甚則嗌乾熱中者陰陽相薄而熱熱盛於中故嗌乾也此厥陰外合少陽而為春之終也
