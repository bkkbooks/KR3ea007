body:
  text: 卷之九著至教論第七十五篇下凡七篇皆黃帝語於雷公著至教者雷公請帝著為至教開示諸臣傳於後世也黃帝繼神農而立極故曰上通神農黃帝上通神農神農上通伏羲故曰擬於二皇蓋伏羲知天神農知地黃帝知人三才之道一脈相傳故曰而道上知天文下知地理中知人事且以知天下何難別陰陽應四時合之五行帝從雷公之請著為至教備言三陽如天陰陽偏害之理公未悉知誠切研求是以此下復有示從容疏五過徵四失陰陽類方盛衰解精微開示雷公皆至教也黃帝坐明堂召雷公而問之曰子知醫之道乎黃帝素問九卷計八十一篇上凡七十四篇皆訪諸岐伯闡明醫道此下七篇則召雷公而證明其道也雷公對曰誦而頗能解解而未能別別而未能明明而未能彰足以治群僚不足至侯王別音逼下俱同誦而能解知其義矣由解而別別而明明而彰可以互為闡明今也未能但足以治群僚之平等為之講論不足以至侯王之尊貴為之彰明也願得受樹天之度四時陰陽合之別星辰與日月光以彰經術後世益明上通神農著至教擬於二皇上古樹八尺之臬參日影之斜正長短以定四時故願得受樹天之度以定四時之陰陽即以四時陰陽合之星辰日月分別明辨以彰璣衡之經術使後世益明四時陰陽日月星辰之理此上天之道自古為然故曰上通神農願得著為至教不但上通神農且擬於二皇二皇伏羲神農也此伏羲神農黃帝之書謂之三墳一脈相傳言大道也帝曰善無失之此皆陰陽表裡上下雌雄相輸應也而道上知天文下知地理中知人事可以長久以教眾庶亦不疑殆醫道論篇可傳後世可以為寶帝善其請著為至教因以名篇故曰無失之雌雄者陰陽之謂也陽在表陰在裡陽在上陰在下此皆陰陽表裡上下猶之雌雄之相為輸應也而陰陽之道可以上知天文下知地理中知人事天文地理人事其道相通故可以長久以此三才相合之道教於眾庶亦不疑殆故著醫道之論以成篇可傳後世可以為寶當守之而弗失也雷公曰請受道諷誦用解請受天文地理人事之道口諷誦而心用解終身弗失帝曰子不聞陰陽傳乎傳去聲陰陽傳上古書也著之篇什豈不聞乎知陰陽傳則知天文地理人事之道矣曰不知公欲受教於帝故曰不知曰夫三陽天為業上下無常合而病至偏害陰陽陰陽之道由陰而至於陽從一而至於三三陽者太陽也太陽為陽之極極則無以加故夫三陽以天為業業功業也三陽功業如天也天氣在上時行乎下故上下無常上下之氣合而病至則偏害陰陽謂獨陽無陰不得其平陰陽偏害也雷公曰三陽莫當請聞其解偏害陰陽則三陽之氣莫可以當故曰三陽莫當請聞其解帝曰三陽獨至者是三陽並至並至如風雨上為巔疾下為漏病外無期內無正不中經紀診無上下以書別中去聲諸陽之氣歸於三陽故三陽為病而三陽獨至者是三陽合諸陽之氣而並至也並至如風雨之莫當故並於上則為巔疾而陽亢無陰並於下則為漏病而陰盛無陽不但上下莫當其內外亦莫可當並於外則外無期譬於墮溺不可為期並於內則內無正神轉不回回則不轉乃失其正內無期外無正則不中經脈之紀上巔疾下漏病則診無上下書猶志也別不同也所以志別而不同於尋常之病也雷公曰臣治疏愈說意而已說作悅治理也疏遠也謂理治其言疏遠愈甚不過悅其大意而已公為此言欲帝彰明較著以為至教也帝曰三陽者至陽也積並則為驚病起疾風至如霹靂九竅皆塞陽氣滂溢干嗌喉塞並於陰則上下無常薄為腸澼陽至於三極無以加故三陽者至陽也諸陽之氣歸於三陽故積並則為驚其病之起有如疾風其病之至一如霹靂疾風霹靂則九竅皆塞陽氣滂溢九竅皆塞而病於上其嗌則干其喉則塞陽氣滂溢而病於下則陽並於陰陽在上並於陰則上下無常而薄為腸澼此謂三陽直心坐不得起臥者便身全三陽之病且以知天下何以別陰陽應四時合之五行三陽之氣如天心為君主如日此三陽積併為病謂之三陽直心三陽直心亢害已極故坐不得起臥不得起臥者不能開闔也不能開闔便身全三陽之病蓋太陽主開陽明主闔少陽主樞而司開闔是知直心之三陽太陽也不得起臥之三陽太陽陽明少陽也天下之大陽氣主之知直心之三陽開闔樞之三陽且以知天下何難以別陰陽應四時而合之五行帝為此言著至教也雷公曰陽言不別陰言不理請起受解以為至道至教之傳非語言文字可盡故言此以深求之陽猶明也陰猶隱也明言之不能如黑白之別隱言之不能如經論之理其中更有精微請起受解以為至道焉帝曰子若受傳不知合至道以惑師教語子至道之要病傷五臟筋骨以消子言不明不別是世主學盡矣語去聲帝之著教言淺旨深皆至道也故曰子若受傳不知以余言而合至道心有所疑以惑師教此外欲更語子至道之要必至病傷五臟而筋骨以消身且不保何以授教公雲陽言不別陰言不理故曰子言不明不別是斯世主教之學盡矣何以傳為謂至教已著無庸復言也腎且絕惋惋日暮從容不出人事不殷從音聰餘篇從容俱同史臣記雷公殫心帝教而深思弗釋也公聞帝教既竭心思求之不得中心如焚一似腎且絕而不上濟其心者惋惋驚歎貌驚歎至教之深至於日暮猶居明堂從容不出一切人事不殷殷猶勤也此雷公殫心至教而誠切研求也示從容論第七十六篇聖人治病循法守度援物比類從容中道帝以此理示諸雷公故曰示從容黃帝燕坐召雷公而問之曰汝受術誦書者若能覽觀雜學及於比類通合道理為余言子所長五臟六腑膽胃大小腸脾胞膀胱腦髓涕唾哭泣悲哀水所從行此皆人之所生治之過失子務明之可以十全即不能知為世所怨上為去聲上篇雷公曰請受道諷誦用解故帝燕坐召雷公而問謂汝受術誦書者若能於誦書之外覽觀雜學觸類引伸而及於比類貫通會悟而通合道理能如是為余言子所長凡五臟六腑膽胃大小腸脾胞膀胱六腑秉氣於坤土故言六腑而及於脾腎主腦髓肺主涕唾肝主哭泣心主悲哀腦髓涕唾哭泣悲哀而合於脾是為五臟五臟主藏精者也故曰水所從行此五臟六腑皆人之所以生治不合道則治之過失務明其道可以十全即不能知為世所怨是受術誦書尤貴比類而通合也雷公曰臣請誦脈經上下篇甚眾多矣別異比類猶未能以十全又安足以明之別音逼下同脈經即靈樞經誦脈經上下篇其言甚眾多矣異者別之類者比之別異比類猶未能以十全又安足以明之明言不知欲帝言之帝曰子別試通五臟之過六腑之所不和針石之敗毒藥所宜湯液滋味具言其狀悉言以對請問不知既誦脈經當於脈經辨別而試通之脈經具言五臟之過六腑之所不和針石之敗亂及治以毒藥之所宜治以湯液之滋味皆必辨別試通具言其狀悉言以對其中或有不知然後請問不知可也雷公曰肝虛腎虛脾虛皆令人體重煩冤當投毒藥刺灸砭石湯液或已或不已願聞其解此承帝言而復問也肝虛腎虛脾虛乃五臟之過皆令人體重煩冤乃六腑之不和毒藥所宜則當投毒藥針石之敗湯液滋味則有刺灸砭石湯液之治舉帝言而復問如是以治或已或不已願聞其解帝曰公何年之長而問之少余真問以自謬也吾問子窈冥子言上下篇以對何也夫脾虛浮似肺腎小浮似脾肝急沉散似腎此皆工之所時亂也然從容得之若夫三臟土木水參居此童子之所知問之何也長上聲少去聲下年長少同帝問公公復問帝故曰公何年之長而問之少問而無答余真問以自謬也吾問子雜學比類通合道理可以十全者乃問子窈冥之道子言誦脈經上下篇以對則何也繼問五臟之過六腑之所不和子則言肝虛腎虛脾虛夫脾臟之脈虛而浮則似肺病腎臟之脈小而浮則似脾病肝臟之脈急而沉散則似腎病此皆工之所時亂而治之過失也然比類相似必別其真欲別其真從容得之若夫肝腎脾三臟之虛皆令人體重煩冤是脾土肝木腎水三陰參居此童子之所知子問之何也雷公曰於此有人頭痛筋攣骨重怯然少氣噦噫腹滿時驚不嗜臥此何臟之發也脈浮而弦切之石堅不知其解復問所以三臟者以知其比類也頭痛筋攣肝病也骨重怯然少氣腎病也噦噫腹滿脾病也時驚不嗜臥胃病也於此有人諸病齊作此何臟之發也浮開脈也弦樞脈也石堅闔脈也於此有人脈浮而弦切之石堅如是之脈不知其解初承帝問復問肝虛腎虛脾虛所以問此三臟者正以欲知其比類也帝曰夫從容之謂也比類者同類相比辨別其真必從容而得之故曰夫從容之謂也夫年長則求之於腑年少則求之於經年壯則求之於臟今子所言皆失八風菀熱五臟消爍傳邪相受夫浮而弦者是腎不足也沉而石者是腎氣內著也怯然少氣者是水道不行形氣消索也咳嗽煩冤者是腎氣之逆也一人之氣病在一臟也若言三臟俱行不在法也長猶老也年老則臟衰於此有病則求之於腑而從容比類可也少猶幼也年幼則腑臟未充於此有病則求之於經而從容比類可也年壯則經脈有餘臟腑皆盛於此有病則求之於臟而從容比類可也八風四方四偶之風也八風合於五行通於五臟八風菀熱則五臟消爍傳為邪病而相受於人身今子所言何臟之發但求其臟皆失其八風菀熱致五臟消爍及傳邪相受之理凡病在臟論其脈證當約歸一臟不可多求子言脈浮而弦切之石堅夫浮而弦者是腎氣之不足也沉而石者是腎氣之內著也子然怯然少氣者是腎之水道不行而形氣消索也若怯然少氣不能上交於心肺肺咳嗽而心煩冤者亦是腎氣之下逆也凡生陽之氣起於腎臟故一人之氣病在一臟也若言三臟俱行而比類之不在從容之法也雷公曰於此有人四肢解墮喘咳血泄而愚診之以為傷肺切脈浮大而緊愚不敢治粗工用砭石病愈多出血血止身輕此何物也承病在一臟之義而復問也四懈墮脾病也喘咳肺病也血泄肝病也診之而以為傷肺亦以一人之氣病在一臟也切脈浮大傷肺無疑浮大而緊則陰陽內亂故不敢治粗工不知經脈妄治出血而愈此何故也帝曰子所能治知亦眾多與此病失矣譬以鴻飛亦衝於天夫聖人之治病循法守度援物比類化之冥冥循上及下何必守經治病固有經常之道而神化無方不必守經也子所能治之病亦眾且多要知與此病不相合而相失矣粗工妄治而愈是千慮一得譬以鴻飛亦衝於天若夫聖人之治病必循法守度更援物比類然其中神化之冥冥循上可以及下不拘常度又何必守經而不知權變耶今夫脈浮大虛者是脾氣之外絕去胃外歸陽明也夫二火不勝三水是以脈亂而無常也四肢懈墮此脾精之不行也喘咳者是水氣並陽明也血泄者脈急血無所行也若夫以為傷肺者由失以狂也不引比類是知不明也夫傷肺者脾氣不守胃氣不清經氣不為使真臟壞決經脈旁絕五臟漏泄不衄則嘔此二者不相類也譬如天之無形地之無里白與黑相去遠矣是失吾過矣以子知之故不告子明引比類從容是以名曰診輕是謂至道也使去聲脈浮大為虛脈緊為亂而無常子言脈浮大而緊故不敢治今夫脈浮大而虛者是太陰脾氣之外絕太陰主開內合胃土今脈浮大不合於胃是去胃土之有形而外歸陽明之熱氣也陽明為二陽二陽猶二火也太陰為三陰三陰猶三水也脾氣外歸陽明是二火不勝三水是以脈浮大而緊緊則亂而無常也子言四肢懈墮喘咳血泄診之以為傷肺夫四肢懈墮者此脾精之不行於四肢也喘咳者是膀胱之水氣上並於陽明土虛水汛而喘咳也血泄者心包主脈脈急則血無所行而下泄也凡此皆非肺病若夫以為傷肺者由於審證未確忽略從事失以狂也失以狂則不能引伸比類是知子之不明也夫傷肺者土不生金必脾氣不守脾氣不守則胃氣不清矣傷肺者氣不榮經必經氣不為使經氣不為使則真臟壞絕矣經氣不使必至經脈旁絕脾氣不守必至五臟漏泄經脈旁絕五臟漏泄其病不衄則嘔由此言之則絕脾傷肺二者不相類也不相類而妄類之譬如天之無形而求以形地之無里而求以里無形求形無里求里不相類而妄類之是白與黑相去遠矣相去既遠非子之過是失吾過矣以子知化之冥冥循上及下之道故不告子明乎引伸比類從容則神化無方不拘拘於診是以名曰診輕猶言從容中道至於神化則診可輕必如是始謂從容之至道也疏五過論第七十七篇疏陳也醫工診脈治病其過有五未診不問診而不知其過一也不知補瀉病情其過二也不知比類奇恆其過三也不知診有三常其過四也不知終始不問所發其過五也此皆受術不通人事不明不知天地陰陽四時經紀臟腑雌雄表裡八正九候之道是以五過不免帝召雷公而語之曰事有五過四德汝知之乎故此篇疏五過下篇懲四失蓋知之為德不知為失也黃帝曰嗚呼遠哉閔閔乎若視深淵若迎浮雲視深淵尚可測迎浮雲莫知其際聖人之術為萬民式論裁志意必有法則循經守數按循醫事為萬民副故事有五過四德汝知之乎閔閔憂之至也帝嘆道之遠大幽深而聖人之術循經守數事有五過四德醫工不可不知故語雷公以發明之雷公避席再拜曰臣年幼小蒙愚以惑不聞五過與四德比類形名虛引其經心無所對五過四德公未之聞若比類形名虛引其經而心實無所對心無所對言不知也帝曰凡未診病者必問嘗貴後賤雖不中邪病從內生名曰脫營嘗富後貧名曰失精五氣留連病有所並醫工診之不在臟腑不變軀形診之而疑不知病名身體日減氣虛無精病深無氣洒洒然時驚病深者以其外耗於衛內奪於榮良工所失不知病情此亦治之一過也中去聲下同營音榮義通在察也變通也此言醫工未診不問診而不知治之過也大凡未診病者當知其貴賤貧富必問嘗貴後賤嘗貴後賤志意內傷雖不中邪病從內生名曰脫營營猶榮也又必問嘗富後貧嘗富後貧則肥甘不足名曰失精五臟之氣本於陰精今失精則五臟之氣留連不及五氣留連則病有所並醫工診之但診不問故不察臟腑不通軀形診之而疑不知病名嘗富後貧名曰失精者至此則身體日減而氣虛無精矣五氣留連病有所並者至此則病深無氣但洒洒然而時驚矣此嘗富後貧工失其診而有如是之病也病從內生不得其治則病深病深者以其外耗於衛內奪於榮病生於內名曰脫榮者至此則並榮衛而耗奪矣此嘗貴後賤工失其診而有如是之病也此醫工未診不問診而不知亦治之一過也凡欲診病者必問飲食居處暴樂暴苦始樂後苦皆傷精氣精氣竭絕形體毀沮暴怒傷陰暴喜傷陽厥氣上行滿脈去形愚醫治之不知補瀉不知病情精華日脫邪氣乃並此治之二過也沮音殂義通此言愚醫不知補瀉病情治之過也大凡欲診病者必問人之飲食居處或暴樂暴苦或始樂後苦凡暴樂暴苦始樂後苦皆內傷精氣精氣竭絕則形體毀沮毀沮猶死亡也凡人卒暴而怒則傷陰卒暴而喜則傷陽真氣有傷則厥氣上行厥氣上行滿於經脈則神絕而去形去形亦死亡也形體毀沮滿脈去形皆由治之不早乃愚醫治之不知補瀉不知病情致使精華日脫而邪氣乃並此愚醫不知補瀉病情治之二過也善為脈者必以比類奇恆從容知之為工而不知道此診之不足貴此治之三過也此言醫工不知比類奇恆治之過也凡善為脈者貴知常變必以比類奇恆奇異也恆常也異與恆常之病必比類相參從容知之為工而不知比類奇恆之道此雖診之不足為貴此醫工不知比類奇恆治之三過也診有三常必問貴賤封君敗傷及欲候王故貴脫勢雖不中邪精神內傷身必敗亡始富後貧雖不傷邪皮焦筋屈痿躄為攣醫不能嚴不能動神外為柔弱亂至失常病不能移則醫事不行此治之四過也此言不知診有三常治之過也醫工診治常理有三其一必問其貴賤始封君而既敗傷先貴後賤也及欲候王已貴而益求其貴不可得也故猶昔也故貴脫勢謂昔者身貴今則脫勢也如是之人雖不中邪而精神內傷若身有病身必敗亡其一必問其貧富始富後貧失其肥甘雖不傷邪其身有病必至皮焦筋屈而痿躄為攣其一醫必嚴厲整飭移易其病若醫之心志不能嚴厲內不能鼓動其神明外為柔弱而不振禍亂已至失其常度醫工診治病不能移則醫事不行此不知三常之診治之四過也凡診者必知終始有知餘緒切脈問名當合男女離絕菀結憂恐喜怒五臟空虛主氣離守工不能知何術之語嘗富大傷斬筋絕脈身體復行令澤不息故傷敗結留薄歸陽膿積寒炅粗工治之亟刺陰陽身體解散四肢轉筋死日有期醫不能明不問所發惟言死日亦為粗工此治之五過也此言醫工不知終始不問所發治之過也凡診脈者心知經脈之終始如肺脈終於手次指大腸之脈即始於手次指十二經脈終始相繼者是也知終始更有以知其餘緒餘緒者經脈虛實之病也知終始知餘緒然後切脈審問而名其病切脈問名當合男女而並論之男女者陰陽血氣也應象大論云陰陽者血氣之男女此其義也或陰陽血氣之離絕或陰陽血氣之鬱結以及憂恐喜怒而五臟空虛以至血氣離守工不能知則不能切脈問名又何術之足語如人嘗富一旦失之則大傷其神魂是以肝主之筋心主之脈有若斬絕也脾臟未傷故身體復行肺腎無病故令澤不息澤不息者水氣上通於天而運行不息也斬筋絕脈則陰血故傷而敗結始傷陰血後傷陽氣則留薄歸陽陰陽血氣皆傷則膿積而寒熱並陳炅猶熱也粗工治之但亟刺其陰陽始之身體復行者至此則身體解散矣始之令澤不息者至此則四肢轉筋而水津不布矣病至於是則死日有期醫不能明不問經脈之所發而惟言死日之病亦為粗工此不知終始不問所發治之五過也凡此五者皆受術不通人事不明也故曰聖人之治病也必知天地陰陽四時經紀五臟六腑雌雄表裡刺灸砭石毒藥所主從容人事以明經道貴賤貧富各異品理問年少長勇怯之理審於部分知病本始八正九候診必副矣治病之道氣內為寶循求其理求之不得過在表裡守數據治無失俞理能行此術終身不殆不知俞理五臟菀熱癰發六腑診病不審是謂失常謹守此治與經相明上經下經揆度陰陽奇恆五中決以明堂審於終始可以橫行分去聲內度皆入聲總結上文而言凡此五過者皆由受術不通人事不明之所致也故曰聖人之治病也必知天地之陰陽四時之經紀而合於人之五臟六腑雌雄表裡然後施以刺灸砭石以及毒藥所主能從容於人事以明經脈之道凡貴賤貧富各異其治而品之理之問年之少長及人之勇怯之理審於三陰三陽之部分而知病之本始更明天地之八正三才之九候天人合一診必副矣此聖人之治為然也凡治病之道必以氣內為寶氣之內也必循求其理理即俞理也若求之不得則雌雄表裡不明故過在表裡必守三陰三陽之數據經脈之道以施治始能無失俞理若人能行此術則終身不殆苟不知俞理之道病在五臟則五臟菀熱病在六腑則癰發六腑診病而不審表裡俞理之部是謂失常若能謹守此理以為治自能與經相明則靈樞之上經下經凡揆度陰陽以及奇恆之異五中之常皆可決以面王之明堂而審於經脈之終始能如是也受術通而人事明可以橫行又何五過之有哉徵四失論第七十八篇上篇帝云事有五過四德汝知之乎公曰不聞五過與四德故上篇疏五過此篇徵四失蓋德者行道而有德於心今不知四德是為四失四失之徵所當謹也黃帝在明堂雷公侍坐黃帝曰夫子所通書受事眾多矣試言得失之意所以得之所以失之夫音扶雷公不聞五過與四德故帝曰夫子所通之書所受之事眾多矣今猶有未聞試自言得失之意所以得之所以失之者何在雷公對曰循經受業皆言十全其時有過失者願聞其事解也公不明四德是為四失故言通書受事乃循經受業也循經受業皆言十全其中復有未聞而時有過失者願請聞其事而解之也帝曰子年少智未及耶將言以雜合耶夫經脈十二絡脈三百六十五此皆人之所明知工之所循用也所以不十全者精神不專志意不理外內相失故時疑殆示從容論云公何年之長而問之少今日子年少猶言子豈年少而智未及耶抑所得所失子將言之得失並陳以其雜合而難言耶夫人身經脈十二絡脈三百六十五此皆人之所明知工之所循用也所以不能十全者精神不專一志意不治理不能內得於心外應於手外內相失故時疑殆而未明帝將語以四失而先為懲戒之診不知陰陽逆從之理此治之一失也試舉四失而明言之診有陰陽逆從之理醫不知之治之一失也受師不卒妄作雜術謬言為道更名自動妄用砭石後遺身咎此治之二失也更平聲師傳者道自能者術妄術為道必遺身咎治之二失也不適貧富貴賤之居土之薄厚形之寒溫不適飲食之宜不別人之勇怯不知比類足以自亂不足以自明此治之三失也土舊本訛坐今改別音逼貧與富貴與賤薄與厚寒與溫勇與怯皆有比類之道醫不知此自亂不明治之三失也診病不問其始憂患飲食之失節起居之過度或傷於毒不先言此卒持寸口何病能中妄言作名為粗所窮此治之四失也卒音促中去聲下中同凡飲食起居憂患所傷當未診先問不先言此而卒持寸口妄言病名治之四失也是以世人之語者馳千里之外不明尺寸之論診無人事治數之道從容之葆坐持寸口診不中五脈百病所起始以自怨遺師其咎是故治不能循理棄術於市妄治時愈愚心自得嗚乎窈窈冥冥孰知其道道之大者擬於天地配於四海汝不知道之諭受以明為晦葆保同嘆世人不明大道之難知所以懲創其心志也世人之語妄自誇張是馳騖於千里之外而不明於尺寸之論診無人事謂昧昧以診不知人之病情也無治數之道不知救治之法也無從容之葆不知比類從容而保全其身命也坐猶定也持即診也寸口之脈一定診之雖診而不中五臟之脈以及百病之所起人孰無良故始以自怨咎有所歸故遺師其咎是故治不能循理猶之棄術於市妄行其志病或時愈而愚醫之心即自得也嗚呼如是之醫深可嘆也精微之道窈窈冥冥而工孰知其道道之大者高深可擬於天地遠大可配於四海今汝不知道之諭受是猶以明為晦汝其勉之陰陽類論第七十九篇陰陽類者陰陽類聚而交合也三陽二陽一陽三陰二陰一陰其中交屬相併繆通五臟陽與陰和陰與陽和首論五臟陰陽之至貴末論四時陰陽之短期中論三陽三陰之交合皆為陰陽類也孟春始至黃帝燕坐臨觀八極正八風之氣而問雷公曰陰陽之類經脈之道五中所主何臟最貴四時之氣始於孟春黃帝燕坐臨觀八極而正八風之氣得陰陽互用之妙內外交通之理而問雷公曰陰陽之類即人身經脈之道五行在中主於五臟今五中所主何臟最貴此帝臨觀八極以正八風之氣而有是問也雷公對曰春甲乙青中主肝治七十二日是脈之主時臣以其臟最貴五行之木在時為春在干為甲乙在色為青在中主肝孟春始至肝木之氣治七十二日是肝脈之主時則肝臟最貴也帝曰卻念上下經陰陽從容子所言貴最其下也疏五過論云上經下經揆度陽陰卻念上下經即上經下經也陰陽從容即揆度陰陽也從容揆度則子所言貴最其下也而有至貴者在焉雷公致齋七日旦復侍坐公聞帝教未明其貴故致齋七日旦復侍坐求教於帝帝曰三陽為經二陽為維一陽為遊部此知五臟終始三陽為表二陰為里一陰至絕作朔晦卻具合以正其理三陽為經者太陽為開循身之背猶大經之經於外也二陽為維者陽明為闔循身之面猶維絡之維於內也一陽為遊部者少陽為樞循身之側開闔憑之猶遊行之部署而旋轉出入也此為經為維為遊部可知五臟之終始終猶下也始猶貴也欲知臟之貴下在於三陰不在三陽故曰三陽為表言太陽秉膀胱寒水之氣而主周身之表陽也二陰為里言少陰秉心腎水火之氣而主神志之內臟也一陰至絕作朔晦言厥陰為陰之盡絕而後生猶月晦而朔故一陰至絕可作朔之晦也由此推之則心神腎志之內臟者至貴而厥陰肝臟之至絕者最下也貴下之理具合不爽故曰卻具合以正其理雷公曰受業未能明上文為經為維為遊部及為表為里至絕之說未明故復問之帝曰所謂三陽者太陽為經三陽脈至手太陰弦浮而不沉決以度察以心合之陰陽之論所謂三陽為經者乃太陽為經也三陽為表者太陽之氣在手太陰肺主之皮毛乃三陽脈至手太陰也太陽從樞轉而外開故其脈弦浮而不沉弦樞脈也浮開脈也不沉開而不闔也此三陽為經三陽為表之義經脈循行自有常度故可決以度心誠求之其理自明故可察以心決之察之可以合之陰陽之論即上文上下經陰陽從容之論也所謂二陽者陽明也至手太陰弦而沉急不鼓炅至以病皆死所謂二陽為維者陽明也陽明之氣亦合肺金之皮毛故陽明之脈至手太陰陽明從樞轉而內闔故其脈弦而沉急不鼓弦樞脈也沉急闔脈也不鼓闔而不開也火熱曰炅炅至以病乃金受火刑陽明金也太陰亦金也無論陽明太陰受火之克皆死一陽者少陽也至手太陰上連人迎弦急懸不絕此少陽之病也專陰則死所謂一陽為遊部者少陽也少陽主樞能開能闔少陽之脈至手太陰則從太陽之開太陽之在皮毛也上連人迎則從陽明之合陽明之脈合人迎也其脈弦少陽之脈也脈急為實脈懸為虛急懸則外實內虛急懸而樞轉不絕此少陽之病也若少陽之氣不出乎陽專在於陰則死專陰者惟陰無陽不樞轉也所以申明三陽為經三陽為表二陽為維一陽為遊部者如此三陰者六經之所主也交於太陰伏鼓不浮上空志心上文三陽二陽一陽其脈皆至手太陰太陰為三陰三陰屬肺受朝百脈故三陰者六經之所主也手太陰主天天氣下降故交於太陰交於太陰交於足太陰也足太陰主地靜順承天故其脈伏而鼓鼓而不浮此天地氣交即陰陽既濟之道凡水火之類一切可該故曰上空志心蓋志屬水心屬火也所以申明太陽陽明少陽之氣外合手太陰所主之皮毛而內歸於足太陰之坤土者如此二陰至肺其氣歸膀胱外連脾胃所謂二陰為里者二陰秉水火陰陽之氣合太陽之水火陰陽故二陰至肺至肺者太陽陽熱之氣在肺主之皮毛也氣歸膀胱者太陽水寒之氣合水府之膀胱也二陰之氣合於太陽必從中土而內入故外連脾胃脾胃者中土也一陰獨至經絕氣浮不鼓鉤而滑所謂一陰至絕作朔晦者乃一陰獨至經絕而氣浮也經絕猶之一陰至絕也經絕氣浮所以作晦朔也無生長之機故其脈不鼓鉤陰極而有微陽故不鼓鉤而滑所以申明二陰為里一陰至絕作朔晦者如此此六脈者乍陰乍陽交屬相併繆通五臟合於陰陽先至為主後至為客繆平聲結上文而言此三陽三陰之六脈者氣機環復故乍屬於陰乍屬於陽乍陰乍陽則陰陽交屬相併三陽三陰皆合五行交屬相併故繆通五臟言三陰通五臟三陽亦通五臟也陰陽皆通五臟故合於陰陽太陽具水火之氣少陰亦具水火之氣陽明具金土之氣太陰亦具金土之氣少陽具木氣厥陰亦具木氣如病發於陽而陽氣先至則陽氣為主陰氣為客病發於陰而陰氣先至則陰氣為主陽氣為客主客者本標之謂也至者氣至於臟發為病也雷公曰臣悉盡意受傳經脈頌得從容之道以合從容不知陰陽不知雌雄示從容論雷公曰復問所以三臟者以知其比類也帝曰夫從容之謂也此篇帝云卻念上下經陰陽從容公故曰臣悉盡意將以受傳經脈頌得昔日所言從容之道以合此日之從容則陰陽交會之理可知今也不知陰陽不知陰陽之雌雄復詳請於帝欲明陰陽之相類也帝曰三陽為父二陽為衛一陽為紀三陰為母二陰為雌一陰為獨使使去聲乾為天為父太陽之氣如天故三陽為父陽明秉金氣而堅勁故二陽為衛少陽為初陽而煦濡故一陽為紀太陽既如天則太陰當如地故三陰為母二陽既為衛而御外則二陰當為榮而居內故二陰為雌一陽即為紀而聯屬則一陰主陰盡而無陽故一陰為獨使上文雷公云不知陰陽不知雌雄觀此則可知陰陽之雌雄矣一陰一陽代絕此陰氣至心上下無常出入不知喉咽乾燥病在土脾舊本在四肢別離下今改正於此此以一陰而兼論一陽次以一陰而兼論二陽又次以一陰而兼論三陽也一陰厥陰也一陽少陽也少陽之氣生於厥陰厥陰之氣合於少陽今一陰一陽不相為類故其脈代絕代絕者此厥陰之氣不合少陽而上至心包也合少陽則上下有常出入有知今厥陰之氣至於心包以厥陰而合厥陰惟陰無陽故上下無常出入不知少陽火氣上炎不得厥陰之陰氣以相濟故喉咽乾燥宣明五氣篇云脾脈代代者脾之本脈也今脈代絕致厥陰少陽不相交合故病在土脾二陽一陰陽明主病不勝一陰脈耎而動九竅皆沉二陽陽明胃土也一陰厥陰肝木也二陽一陰相合則木製其土故當陽明主病陽明主病則陽明胃土不勝一陰肝木土不勝木故其脈耎而動耎動於下木製其土故九竅皆沉三陽一陰太陰脈勝一陰不能止內亂五臟外為驚駭太陰之陰舊本訛陽今改三陽太陽也一陰厥陰也太陽合手太陰肺氣於皮毛故三陽一陰相合而太陽脈勝也太陰之脈屬肺金故一陰肝木不能止謂不能止太陰之勝也金勝於上木鬱於下故內亂五臟木鬱肝虛故外為驚駭二陰三陽病在肺少陰脈沉勝肺傷脾外傷四肢三陽之三舊本訛二今改此以二陰而類三陽次以二陰而類二陽又次以二陰而類一陽也二陰少陰也三陽解見上文太陽之氣主皮毛皮毛者肺之合故二陰三陽相合病在肺也二陰合三陽而病肺則三陽有餘二陰不足故少陰脈沉也勝肺猶言肺氣勝也其勝在肺則傷脾申明傷脾者非傷太陰之脾臟乃外傷四肢也蓋皮毛之氣過盛則內傷肌腠而病及四肢先曰傷脾以脾主四肢究之所傷不在脾也二陰二陽皆交至病在腎罵詈妄行癲疾為狂二陰二陽相合皆交至者少陰陽明交相病也少陰屬腎故病在腎罵詈妄行癲疾為狂病在陽明也此少陰陽明皆交至而為病也二陰一陽病出於腎陰氣客遊於心脘下空竅堤閉塞不通四肢別離空作孔空竅汗孔之竅也堤猶路也少陰少陽相合陰勝其陽故病出於少陰之腎少陽三焦之脈散絡心包出於胃脘今少陰之氣客遊於心脘下是陰客於陽水勝其火致三焦不能出氣以溫肌腠一似空竅之路閉塞不通故曰空竅堤閉塞不通也三焦者火熱之氣四肢者諸陽之本今三焦之氣閉塞不通則不和於陽故曰四肢別離謂火熱之氣不與陽和也二陽三陰至陰皆在陰不過陽陽氣不能止陰陰陽並絕浮為血瘕沉為膿胕此舉三陰兼論二陽而三陽一陽皆在其中也二陽三陰陽明太陰相合也不但二陽合三陰而三陽一陽皆合三陰三陰至陰也至陰皆在者言二陽在至陰而三陽一陽皆在也以至陰而合諸陽則陽氣有餘故陰不能過陽以諸陽而合至陰則陽歸於陰故陽氣不能止陰陰不過陽則陽盛陽不止陰則陰勝始則陰陽並勝繼則陰陽並絕如陽勝脈浮則浮為血瘕陰勝脈沉則沉為膿胕血而瘕則陰不濟陽而陽勝陽勝則陰絕矣胕而膿則陽不濟陰而陰勝陰勝則陽絕矣陰陽皆壯下至陰陽上合昭昭下合冥冥診決死生之期遂合歲首結上文陰陽相類之義上文陰陽相合乃陰氣陽氣皆屬有餘是陰陽皆壯也交合而病氣歸於臟是下至陰陽也下至陰陽復有升降故上合昭昭之天下合冥冥之地以上天下地之理即可診決死生之期五臟五行始於木而終於水猶四時始於春而終於冬遂合今曰孟春之歲首此陰陽從容比類類聚無方而五臟最貴最下之理從可識矣雷公曰請問短期承診決死生之期而復問短期黃帝不應死生之期可以理決帝故不應雷公復問黃帝曰在經論中雷公曰請問短期短期之理在上經下經八十一論之中而公必欲請聞於帝也黃帝曰冬三月之病病合於陽者至春正月脈有死徵皆歸出春冬三月之病在理已盡草與柳葉皆殺春陰陽皆絕期在孟春理里通此下論上合昭昭下合冥冥以決死生之期遂合歲首之理冬三月之病水病也病合於陽者合於太陽寒水之氣也冬失其藏春無以生故至春正月其病不愈則脈有死徵雖不即死皆歸出春謂出春交夏決死也若冬三月之病在裡之精氣已盡則不能出春仲春草發季春柳葉發草與柳葉時皆殺殺猶死也若冬三月之病至春陰陽皆絕期在孟春當死不能至仲春之草與季春之柳葉矣此冬三月之病而有短期也春三月之病曰陽殺陰陽皆絕期在草乾此春三月之病而有短期也春夏為陽秋冬為陰春三月之病陽氣不生故曰陽殺殺猶絕也越春夏而至於秋則陰陽皆絕期在深秋之草乾而死夏三月之疾至陰不過十日陰陽交期在溓水溓濂同此夏三月之病而有短期也六月長夏屬於至陰時當至陰陽氣盡浮於外夏三月而病不愈交於至陰不過十日死若越長夏而至於秋則為陰陽交夏三月之病而交於秋期在溓水而死溓猶清也中秋水天一色之時也秋三月之病三陽俱起不治自已陰陽交合者立不能坐坐不能起三陽獨至期在石水二陰獨至期在盛水此秋三月之病而有短期也前三陽謂太陽陽明少陽故曰俱後三陽謂太陽二陰謂少陰故曰獨也秋之三月肺金主氣若秋三月之病合太陽陽明少陽而俱起者此陽病合肺當不治自已若陰陽交合至秋三月而病者主陰陽不和當立不能坐坐不能起若有陽無陰而太陽之氣獨至當秋時而病者期在冬令之石水而死若有陰無陽而少陰之氣獨至當秋時而病者期在春令之盛水而死太陽為水府少陰為水藏死於冬之石水金不生水也死於春之盛水水不生木也此決死生之期而陰陽相類之理更可識矣方盛衰論第八十篇盛者陰陽形氣之盛衰者陰陽形氣之衰方度也診也五度十度視息視意皆持診之道所以方其盛衰也若失經絕理亡言妄期是謂失道雷公請問氣之多少何者為逆何者為從氣陰陽之氣也多猶盛也少猶衰也人身陰陽之氣有多而盛有少而衰盛衰之道有逆有從何者為逆何者為從所以方氣之盛衰也黃帝答曰陽從左陰從右老從上少從下是以春夏歸陽為生歸秋冬為死反之則歸秋冬為生是以氣多少逆皆為厥上少去聲響明而治左陽右陰故陽從左陰從右四時之氣秋冬為陰從上而下春夏為陽從下而上故老從上少從下蓋老為秋冬之陰少為春夏之陽也是以人身春夏之時其氣歸陽為生歸秋冬之陰為死若反之則歸秋冬為死者歸秋冬反為生反之而生氣之逆也是以陰陽之氣無論多少若逆之則皆為厥矣問曰有餘者厥耶逆皆為厥生氣將竭故舉有餘以問答曰一上不下寒厥到膝少者秋冬死老者秋冬生氣上不下頭痛巔疾求陽不得求陰不審五部隔無徵若居曠野若伏空室綿綿乎屬不滿日是以少氣之厥令人妄夢其極至迷三陽絕三陰微是為少氣陰陽之氣不相順接便為厥如陰氣一上陽氣不下則陰盛陽虛故寒厥到膝少者陰陽血氣方盛寒厥到膝而行秋冬之氣則死老者陰陽血氣方衰寒厥到膝而行秋冬之氣猶生此陰盛陽虛致有寒厥到膝之病也若陽氣上陰氣不下則陽盛陰虛致有頭痛巔疾之病矣此寒厥到膝頭痛巔疾其病極危其理至微但求陽以治之而不得其真止求陰以治之而不審其全在膝在頭五臟之部隔遠無徵人病此者若居曠野而形不存若伏空室而神不守綿綿乎一息之微屬望其生若不能滿此一日矣是以少氣之厥猶之令人妄夢推其極而至於昏迷此三陽之氣不能下交是三陽絕也三陰之氣不能環復是三陰微也陽絕陰微是為少氣之厥非有餘之謂也是以肺氣虛則使人夢見白物見人斬血籍籍得其時則夢見兵戰腎氣虛則使人夢見舟船溺人得其時則夢伏水中若有畏恐肝氣虛則夢見菌香生草得其時則夢伏樹下不敢起心氣虛則夢救火陽物得其時則夢燔灼脾氣虛則夢飲食不足得其時則夢築垣蓋屋此皆五臟氣虛陽氣有餘陰氣不足合之五診調之陰陽以在經脈籍音習承上文妄夢至迷之意伸言五臟氣虛則有五臟之夢也夢見白物斬血籍籍肺氣虛矣得其時者氣將復也兵戰則肺氣將伸矣舟船溺人腎虛夢也伏水中若有畏恐腎氣將伸矣菌香生草肝虛夢也伏樹下不敢起肝氣將伸矣救火陽物心虛夢也燔灼心氣將伸矣飲食不足脾虛夢也築垣蓋屋脾氣將升矣此皆五臟氣虛而形諸夢乃陽氣有餘陰氣不足可以合之五診調之陰陽以察周身之經脈在察也診有十度度人脈度臟度肉度筋度俞度陰陽氣盡度民君卿度入聲下同度民君卿舊本在診必上下之下今改正於此上文五臟氣虛合之五診此言五診之中有十度也度量也十度者一曰度人人之貧富性之緩急也二曰度脈脈之大小至之遲數也三曰度臟臟之虛實氣之從逆也四曰度肉肉之肥瘠體之盛衰也五曰度筋筋之強弱力之多寡也六曰度俞腑俞臟俞上下出入也七曰度陰陽氣盡陰盡而初陽生陽盡而一陰始也八曰度民九曰度君十曰度卿民君卿皆人也民不得同於卿卿不得同於君就其心志而揆度之此五診之有十度也人病自具脈動無常散陰頗陽脈脫不具診無常行診必上下上文診有十度此言診無常行難於度也診脈者診病也今人病自具脈動無常有是病則有是脈理之常也病具而不見於脈是謂無常無常者病散於陰而脈頗陽脈虛於內而病不具脫猶虛也是診無常行診必因上以知下不但十度為然也受師不卒使術不明不察逆從是為妄行持雌失雄棄陰附陽不知併合診故不明傳之後世反論自章此下論陰陽持診之道所以方其盛衰也受師不卒則謬言為道使術不明則妄作雜術不卒不明不能察陰陽之逆從是為妄行妄行者但持其雌而失去雄偏棄其陰而附其陽不知陰陽之併合診故不明不明而診道無可傳理無可通故傳之後世反論自章診不合理自以為章至陰虛天氣絕至陽盛地氣不足陰陽並交至人之所行陰陽並交者陽氣先至陰氣後至至陰太陰也至陰虛則人之地氣不升地氣不升故天氣絕至陽太陽也至陽盛則人之天氣有餘天氣有餘故地氣不足必陰陽並交無有虛盛乃至人之所行陰陽並交者是陽氣先至陰氣後至蓋人身之氣合於四時始於一陽之初動也是以聖人持診之道先後陰陽而持之奇恆之勢乃六十首診合微之事追陰陽之變章五中之情其中之論取虛實之要定五度之事知此乃足以診是以切陰不得陽診消亡得陽不得陰守學不湛知左不知右知右不知左知上不知下知先不知後故治不久知醜知善知病知不病知高知下知坐知起知行知止用之有紀診道乃具萬世不殆起所有餘知所不足持診之道必以聖人為法是以聖人從陰度陽從陽度陰先後陰陽而持診之奇異也恆常也凡奇恆之脈勢合於六氣六氣六十日為一氣也奇脈恆脈脈勢不同六十日而更一氣乃以六十為首也診合微之事者脈合五行時合六氣診至微也追陰陽之變者散陰頗陽診無常行理至變也章五中之情者五運在中合於五臟診合微之事追陰陽之變始能章五中之情也即合微陰陽五中而論之其中之論必取虛實之要以定五度之事五度即上文之五診也必知此乃足以診苟不知此以診是以切陰而不得陽雖曰診之人必消亡得陽而不得陰曰守所學不能自湛湛信也左右上下先後不能盡知故曰治其病而人不久醜與善病與不病高與下坐與起行與止必盡知之然後用之有紀診道乃具雖萬世不殆更必起所有餘知所不足診道乃備度事上下脈事因格是以形弱氣虛死形氣有餘脈氣不足死脈氣有餘形氣不足生是以診有大方坐起有常出入有行以轉神明必清必靜上觀下觀司八正邪別五中部按脈動靜循尺滑澀寒溫之意視其大小合之病能逆從以得復知病名診可十全不失人情故診之或視息視意故不失條理道甚明察故能長久不知此道失經絕理亡言妄期此謂失道別音逼度即上文五度十度也脈即上文持診之道也度事上下通天徹地也脈事因格有常有變也是以度其形弱脈其氣虛形氣皆虧故死度其形氣有餘脈其脈氣不足外余內損亦死脈其脈氣有餘度其形氣不足內余外損故生是以診有大方方猶法也其法不外度事脈事度其坐起有常出入有行可以專心主之神明更當必清必靜上觀下觀司主也主八正之邪以別五中之部此度事上下之法也按其脈之動靜循其尺膚之滑澀寒溫視其脈之大小而合之病能此脈事因格之法也能度能脈則逆從以得復知病名診可十全而不失人情矣故診之之道或視息視息脈之也或視意視意度之也脈之度之故不失條理道甚明察如是故能長久而不敝若不知此道則失經絕理亡言妄期亡言無徵之言也妄期妄與死生之期也誠如是也是謂失道解精微論第八十一篇純粹之至曰精幽渺之極曰微闡明陰陽水火神志悲泣以及水所從生涕所從出神志水火之原非尋常問答所及故曰解精微黃帝在明堂雷公請曰臣受業傳之行教以經論從容形法陰陽刺灸湯藥所滋行治有賢不肖未必能十全若先言悲哀喜怒燥濕寒暑陰陽婦女請問其所以然者卑賤富貴人之形體所從群下通使臨事以適道術謹聞命矣請聞有毚愚僕漏之問不在經者欲聞其狀毚音鑱雷公受傳於帝而帝教以經論故曰臣受業傳之行教以經論其中有從容之形法陰陽之刺灸湯藥之所滋但行治有賢不肖未必能十全若先言悲哀喜怒之內傷燥濕寒暑之外感以及陰陽婦女之道請問其所以然者曾以卑賤富貴論人之形體所從群下卑賤人也通使臨事富貴人也論人形體以適道術已於經論之中謹聞命矣今請問者有毚愚僕漏之問毚愚則心不靈僕漏則體不具與昔日在經之問不同故曰不在經者欲聞其狀帝曰大矣不在經者欲聞其狀則於尋常形體之外窮究靡遺帝故大之公請問哭泣而淚不出者若出而少涕其故何也哭泣則淚出淚出則多涕有哭泣而淚不出者有淚出而少涕者與尋常之形氣不同公故問之帝曰在經有也哀而泣出在靈樞口問論有以明之復問不知水所從生涕所從出也淚水類也涕液類也必知水所從生涕所從生故復問之帝曰若問此者無益於治也工之所知道之所在也水所從生涕所從出非毚愚僕漏之比故無益於治也雖工之所欲知而實道之所在也道之所在有如下文所云也夫心者五臟之專精也目者其竅也華色者其榮也是以人有德也則氣和於目有亡憂知於色是以悲哀則泣下泣下水所由生此言精水之氣從心氣而外出也五臟之精心為之主故夫心者五臟之專精也五臟之精隨心氣而注於目故目者其竅也五臟之精隨心氣而榮於色故華色者其榮也德猶得也是以人心有得也則氣和於目目者其竅此其驗矣亡猶失也人心有失則憂知於色華色者其榮此其驗矣五臟之精隨心外出是以心有悲哀則泣下泣下則水所由生以明淚水從目泣而生目泣從心悲而出也水宗者積水也積水者至陰也至陰者腎之精也宗精之水所以不出者是精持之也輔之裹之故水不行也此言腎精為水之主腎精持之而水不出也宗猶聚也水之聚者漸積而成故曰水宗者積水也水積於下其性陰柔故曰積水者至陰也腎精為水之本故曰至陰者腎之精也流行之水則外出宗精之水則不出故曰宗精之水所以不出者是精持之而不出也持之者乃輔之裹之故水藏而不行也夫水之精為志火之精為神水火相感神志俱悲是以目之水生也故諺有曰心悲名曰志悲志與心精共湊於目也承上文心動水行腎持水藏之意而言水火相感神志俱悲而後淚出也故曰夫水之精為志志腎所主也火之精為神神心所主也若水火相感神志俱悲是以目之水生而為淚也故諺有曰心悲名曰志悲由此觀之則心志相通而志與心精共湊於目也是以俱悲則神氣傳於心精上不傳於志而志獨悲故泣出也上文心志相通心悲名曰志悲此言心不傳志而志獨悲也是以俱悲則神氣傳於心精上即上文心悲名曰志悲志與心精共湊於目之謂也然有心氣不傳於志而志獨悲者志悲於內故泣出也以明目之生水則泣出於外腎志獨悲則泣出於內由是可以知水所從生矣泣涕者腦也腦者陰也髓者骨之充也故腦滲為涕志者骨之主也是以水流而涕從之者其行類也此言心悲水流而涕從之以明涕所從出也凡人泣必有涕而涕所從來不同於泣故曰泣而涕者腦也腦為精髓之海故腦者陰也腦為髓海髓居骨內故髓者骨之充也泣涕者腦也故腦滲而為涕髓者骨之充而志者又骨之主也是以水流而涕必從之者其行類也夫涕之與泣者譬如人之兄弟急則俱死生則俱生其志以早悲是以涕泣俱出而橫行也夫人涕泣俱出而相從者所屬之類也橫去聲此言志悲泣出而涕從之類相感也泣出必有涕故夫涕之與泣者譬如人之兄弟急則俱死生則俱生是知涕與泣同氣並行矣上文云而志獨悲故泣出也由此言之其志以早悲是以涕泣俱出而橫行也夫人涕泣俱出相從者亦所屬之類也雷公曰大矣請問人哭泣而淚不出者若出而少涕不從之何也公聞水所從生涕所從出神志悲泣之理至精至微實道之所在非工之所知故曰大矣其始有哭泣而淚不出出而少涕之問帝曰在經有也至此復請問人哭泣而淚不出者若出而少涕哭泣而淚涕不從之何也帝曰夫泣不出者哭不悲也不泣者神不慈也神不慈則志不悲陰陽相持泣安能獨來此言哭而悲則淚出哭而不悲則淚不出也目潤曰泣水下曰淚夫人但目泣而淚不出者由於哭之不悲也但聲哀哭而並不泣者由於神之不慈也慈者心慈悲者志悲故神不慈則志不悲心神持於上腎志持於下陰陽相持則泣安能獨來由是而知哭泣與淚不出者由於哭之不悲也夫志悲者惋惋則沖陰沖陰則志去目志去則神不守精精神去目涕泣出也此言出而少涕者由於志不沖陰也上文云腦者陰也故曰夫志悲者其內惋惋惋惋哀慼也故惋惋則志上衝於陰沖陰沖腦也故沖陰則腎志去目去猶出也志出於目則心藏之神亦不守精精心精也神不守精則精神去目而涕泣出也由是而知志悲則上衝於陰而為涕不悲則不沖陰而少涕矣且子獨不誦不念夫經言乎厥則目無所見靈樞口問論云液竭則精不灌精不灌則目無所見故曰且子獨不誦唸夫經言乎厥則目無所見厥猶極也帝先云在經有也故於此引經言以明之夫人厥則陽氣並於上陰氣並於下陽並於上則火獨光也陰並於下則足寒足寒則脹也夫一水不勝五火故目眥盲是以衝風泣下而不止承上文而言夫人厥則陽氣獨並於上陰氣獨並於下所謂陽並於上乃惟陽無陰則火獨光也所謂陰並於下乃惟陰無陽則足寒足寒不已則腹脹也以明陰陽不和而為厥也若夫厥則目無所見者陽並於上而火獨光則三焦君相之火皆上炎矣陰並於下而足寒脹則少陰腎臟之精太陰脾臟之濕皆逆於下惟太陽膀胱之水因陽氣之並而上行是太陽一水不能勝三焦君相之五火故目眥盲盲目無見也今曰眥盲是以衝風則泣下而不止所以然者膀胱足太陽之脈起於目內眥泣下不止必至液竭而目無所見也此言衝風泣下泣從外生而非志悲之泣也夫風之中目也陽氣內守於精是火氣燔目故見風則泣下也有以比之夫火疾風生乃能雨此之類也中去聲此復申明衝風泣下之義言衝風泣下猶之火疾風生而為雨也夫風之中目也目為陰精兼有陽氣精守於內陽充於外是陽氣內守於精一水不勝五火是火氣燔目目燔故見風則泣下也有以比之比夫火疾風生乃能雨即此火氣燔目見風泣下之類也愚觀上論七篇詞古義深難於詮解然久久玩索得其精微則奧旨自顯曩歲偶於友人齋頭見新刊素問一部紙板甚精潔名人為之序其中篇什倒置刪削全文末卷七篇置之不錄謂詞義不經似屬後人添贅而非黃帝之文噫如是之人妄論聖經貽誤後昆良足悲已不意今歲之秋亦於友人齋頭見新刊素問一部卷帙無多似非全文愚草草視之但見彙集諸注述其唾餘間增己意評論諸家愚俱忘卻惟論張隱菴集註云大半出於同人之筆愚觀此言不無嘆惜隱菴註釋有靈樞素問傷寒金匱諸書皆以經解經不杜撰不剿襲可謂著述超群非常人思慮所能及今為此言蓋因註解精深不能探討第見開卷有諸同學之姓氏注中有某人某人之語句遂乘此隙而云大半出於同人之筆也愚鑑於此是以同學高賢及門諸弟概不借光庶免後人之口實耳
