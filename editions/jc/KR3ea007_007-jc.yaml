駒言水汛土濘如土駒之牧于田間牧猶養也土駒土塊如駒也鬱氣既發其後則化氣乃敷而善為時雨善為時雨則始生始長始化始成此郁發之氣亦主歲氣而生成萬物也土鬱發則濕氣勝故民病心腹脹腸鳴數後數後大便頻也甚則心痛脅䐜嘔吐霍亂飲發注下胕腫身重皆土濕之病也土氣欲發則云奔雨府霞擁朝陽山澤埃昏其乃欲發之候也三之氣太陰濕土鬱而始發發必愆期故以其四氣土氣先郁故云橫天山雲氣浮游而生滅靡常此土氣怫鬱之先兆惟其鬱之是以發之金鬱之發天潔地明風清氣切大涼乃舉草樹浮煙燥氣以行霿霧數起殺氣來至草木蒼干金乃有聲故民病咳逆心脅滿引少腹善暴痛不可反側嗌乾面塵色惡山澤焦枯土凝霜滷怫乃發也其氣五夜零白露林莽聲淒怫之兆也滷音魯下同金氣堅白而勁故金鬱之發天潔地明風清氣切於時為秋故大涼乃舉大涼乃舉則草樹浮煙在地為金在天為燥故燥氣以行燥氣以行則鬱霧數起郁霧數起則殺氣來至殺氣來至則草木蒼干草木蒼干則金乃有聲有聲即下文林莽聲淒也金鬱發則燥氣勝故民有咳逆之病心脅滿引少腹氣機上下不和也善暴痛不可反側氣機內外不利也嗌乾面塵色惡燥氣勝也凡此皆燥金之病也金氣欲發則山澤焦枯而燥氣萌上凝霜滷而白露降此金怫乃發之候也五之氣陽明燥金故其氣五金氣先郁則夜零白露林莽聲淒此金氣怫鬱之先兆惟其鬱之是以發之水鬱之發陽氣乃闢陰氣暴舉大寒乃至川澤嚴凝寒霧結為霜雪甚則黃黑昏翳流行氣交乃為霜殺水乃見祥故民病寒客心痛腰脽痛大關節不利屈伸不便善厥逆痞堅腹滿陽光不治空積沉陰白埃昏瞑而乃發也其氣二火前後太虛深玄氣猶麻散微見而隱色黑微黃怫之先兆也闢作避便平聲水氣陰寒而濕故水鬱之發陽氣乃避陽氣避則陰氣暴舉陰氣暴舉則大寒乃至而川澤嚴凝寒雰白氣也寒雰潔為霜雪甚則水濕過甚而黃黑昏翳且流行氣交氣交冬春之交也流行氣交寒氣乘之乃為霜殺時惟春也冰雪化為雨水故水乃見祥水鬱發而寒氣勝故民病寒客心痛腰脽痛腰脽痛則大關節不利屈伸不便心痛則善厥逆水寒氣盛則痞堅腹滿水氣欲發則陽光不治空積沉陰白埃昏瞑此水鬱而乃發之候也二火君火相火也太陽水氣之郁鬱於秋之末冬之時秋末乃陽明主氣陽明居少陽相火之後也太陽水氣之發流行氣交氣交乃春時厥陰主氣厥陰居少陰君火之前也故其氣在二火前後水氣鬱則太虛深邃而玄黯其氣凝聚而欲散猶麻散也言猶麻繩之緊將有散意也氣猶麻散乃微見而復隱之象太虛深玄乃色黑而微黃之象此水氣怫鬱之先兆惟其鬱之是以發之木鬱之發太虛埃昏雲物以擾大風乃至屋發折木木有變故民病胃脘當心而痛上支兩脅膈咽不通食飲不下甚則耳鳴眩轉目不識人善暴僵仆太虛蒼埃天山一色或氣濁色黃黑郁若橫云不起雨而乃發也其氣無常長川草偃柔葉呈陰松吟高山虎嘯岩岫怫之先兆也當如字橫去聲風木動搖故木鬱之發郁埃昏冒太虛而云物以援大風乃至大風至則屋發折木而木有變異之象木氣變故民病胃脘當心而痛上支兩脅膈咽不通食飲不下此木淫土虛病也甚則耳鳴眩轉目不識人善暴僵仆此風淫木虛病也木氣鬱發則太虛蒼埃夫太虛蒼埃乃天心一色或氣濁色也氣濁色者乃黃黑郁若也天山一色黃黑郁若則上下塵蒙故橫云上騰而不起雨此木鬱而乃發之候也木動風生四時皆有故其氣無常偃僕也呈陰背向面也風生則長川草僕柔葉呈陰甚則松吟高山而虎嘯岩岫是木氣鬱怫之先兆惟其鬱之是以發之火鬱之發太虛曛翳大明不彰炎火行大暑至山澤燔燎材木流津廣廈騰煙土浮霜滷止水乃減蔓草焦黃風行惑言濕化乃後故民病少氣瘡瘍癰腫脅腹胸背面首四肢䐜憤臚脹瘍痱嘔逆瘛瘲骨痛節乃有動注下溫瘧腹中暴痛血溢流注精液乃少目赤心熱甚則瞀悶懊憹善暴死刻終大溫汗濡玄府其乃發也其氣四動復剛靜陽極反陰濕令乃化乃成華髮水凝山川冰雪焰陽午澤怫之先兆也火氣炎灼而熱故火鬱之發太虛如火曛而翳日月之大明不彰其時炎火行大暑至山澤之間如燔如燎山澤燔燎則材木之在山澤者津汁外流上天下地猶廣廈也火發煙騰故廣廈騰煙而土塊之在廣廈者如霜滷之外浮矣止水乃減水因熱涸也蔓草焦黃火烈如焚也惑眩亂也火亢地赤民心不寧眩亂之言見於風俗故風行惑言而濕化乃後後愆期也火熱傷氣故民病少氣火氣外越故瘡瘍癰腫濕化乃後則濕氣內逆濕氣內逆濕氣內逆則脅腹胸背面首四肢䐜憤臚脹火濕之氣鬱於內外則瘍痱嘔逆火風之氣淫於內外則瘛瘲骨痛節乃有動火氣下行則注下火氣流經則溫瘧火流中土則腹中暴痛火動也血則血溢流注火耗其精則精液乃少精血皆胸則目赤心熱甚則心氣自病鬱悶懊憹則善暴死此火亢濕逆風火併行而有如是之病也火氣欲發則刻終大溫一氣主六十日八十七刻半如火欲發於四氣則三氣之刻數將終即有大溫之氣敷布於外若汗濡玄府此其火鬱乃發之候也四之氣少陽相火故其氣四原其火鬱之時火性至動歸復則靜復猶伏也動復則靜乃陽極反陰之義陽極反陰則濕令乃化乃成濕令化成則光華欲發而水凝之山川呈色而冰雪之焰陽之火歸於午澤此火氣怫鬱之先兆惟其鬱之是以發之有怫之應而後報也皆觀其報而乃發也木發無時水隨火也謹候其時病可與期失時反歲五氣不行生化收藏政無恆也總結上文郁發之意言當謹候其時也報猶發也上文云怫之先兆乃有怫之應而後發也皆觀其鬱之極而乃發也上文火鬱發於四氣金鬱發於五氣適當其時木氣無常則木發無時也又土濕發於四氣之火水之郁復發於二火前後是水隨火也故當謹候其鬱發之時則民病可與相期若失時反歲五氣不行則生化收藏之政無有恆也是必謹候其時庶民病可期而生化收藏有恆政矣帝曰水發而雹雪土發而飄驟木發而毀折金髮而清明火發而曛昧何氣使然舉上文郁發太過之氣問何氣使然岐伯曰氣有多少發有微甚微者當其氣甚者兼其下微其下氣而見可知也見如字多太過也少不及也五運之氣有太過不及則其發也有微有甚微者當其氣得其本位之氣也甚者兼其下兼得下時之氣也兼下者時未至而氣先至也故微其下氣而見於氣交之先則微甚可知也帝曰善五氣之發不當位者何也土金水木火五氣之發有愆期而不當位者何也岐伯曰命其差差不及也運氣失郁後復故令其差命命也先郁故令其差也帝曰差有數乎數如字不及而差有度數乎岐伯曰後皆三十度而有奇也奇音箕後不及也一歲三百六十五度三十度而有奇約一月也帝曰氣至而先後者何非郁復之氣氣至而先後者何帝伯曰運太過則其至先運不及則其至後此候之常也運氣太過其至先運氣不及其至後上文六十歲中言之詳矣此乃候之常也帝曰當時而至者何也不先不後謂之當時岐伯曰非太遇非不及則至當時非是者眚也至當其時謂之平氣非是者眚也亦候之常也帝曰善氣有非時而化者何也非時而化非其時而化其氣也上文論運氣之太遇不及此舉時氣之非時以問岐伯曰太遇者當其時不及者歸其已勝也太過者當其時如春溫夏熱秋涼冬寒至不愆期也不及者歸其已勝如春時雨濕木勝土也冬時溫熱水勝火也皆歸其已勝之氣也帝曰四時之氣至有蚤晏高下左右其候何如春夏秋冬四時之氣積候而成而氣至有早晚如西北地高氣至晏東南地下氣至早東南居左氣至早西北居右氣至晏早晏高下左右其候何知岐伯曰行有逆順至有遲速故太過者化先天不及者化後天遲猶晏也速猶早也氣行有逆順則至因有遲速順行則速速主太過故太過者氣化先天時而至逆行則遲遲主不及故不及者氣化後天時而至知行之逆順至之遲速則知高下左右之早晏矣帝曰願聞其行何謂也其行有逆順何謂也岐伯曰春氣西行夏氣北行秋氣東行冬氣南行故春氣始於下秋氣始於上夏氣始於中冬氣始於標春氣始於左秋氣始於右冬氣始於後夏氣始於前此四時正化之常故至高之地冬氣常在至下之地春氣常在必謹察之春氣發於冬故春氣從東西行夏氣發於南故夏氣從南北行秋氣發於西故秋氣從西東行冬氣發於北故冬氣從北南行此四時之應於四方也春氣自下而升故春氣始於下秋氣從上而降故秋氣始於上夏火之氣從中而布於外故夏氣始於中冬藏之氣從表而歸於內故冬氣始於標標猶表也此四時之應於上下內外也又四方之位左東右西前南後北故春氣始於左秋氣始於右冬氣始於後夏氣始於前此四時之應於左右前後也凡此皆四時正化之常如是而行則順不如是則逆故西北至高之地冬氣常在而多寒東南至下之地春氣常在而多溫必謹察之而四方之高下左右逆順遲速從可知矣帝曰善五運六氣之應見六化之正六變之紀何如帝曰善下舊本誤有黃帝問曰四字今刪去運氣相應微見於外其中更有化變之正紀帝故問之岐伯曰夫六氣正紀有化有變有勝有復有用有病不同其候帝欲何乎舊本岐伯下誤有對字今刪去五運合六氣有化有變有勝有復有用有病不同其候皆六氣之正紀帝欲何問帝曰願盡聞之岐伯曰請遂言之夫氣之所至也厥陰所至為和平少陰所至為暄太陰所至為埃少陰所至為炎暑陽明所至為清勁太陽所至為寒霧時化之常也夫六氣之所也厥陰為風主初之氣故厥陰所至為和平和平舒遲也少陰為熱主二之氣故少陰所至為暄暄溫熱也太陰為濕主三之氣故太陰所至為埃溽埃猶土也溽濕熱也少陽為火主四之氣故少陽所至為炎暑炎暑火氣也陽明為清主五之氣故陽明所至為清勁秋末冬初清且勁也太陽為寒主終之氣故太陽所至為寒雰寒雰結為霜雪也比六時氣化之常也厥陰所至為風府為璺啟少陰所至為火府為舒榮太陰所至為雨府為員盈少陽所至為熱府為行出陽明所至為司殺府為庚蒼太陽所至為寒府為歸藏司化之常也璺音向藏如字余同上文言時化化之徵於時也此言司化化之主乎內也厥陰主風故厥明所至為風府為璺啟璺剖也啟開也少陰主火故少陰所至為火府為舒榮舒舒展也榮榮華也太陰主濕故太陰所至為雨府為員盈員周也盈滿也少陽主熱故少陽所至為熱府為行出行出見於外也陽明主收故陽明所至為司殺府為庚蒼庚更也蒼老也太陽主寒故太陽所至為寒府為歸藏歸藏內歸藏密也此六氣司化之常也厥陰所至為生為風搖少陰所至為榮為形見太陰所至為化為雲雨少陽所至為長為蕃鮮陽明所至為收為霧露太陽所至為藏為周密氣化之常也此言氣化化之有其氣也厥陰為春故厥陰所至為生為風搖風搖風之搖動也少陰主初春故少陰所至為榮為形見形見形之現於外也太陰主長夏故太陰所至為化為雲雨雲雨濕化也少陽主初秋故少陽所至為長為蕃鮮蕃盛也鮮豔也陽明主深秋故陽明所至為收為霧露霧露清寒也太陽主冬故太陽所至為藏為周密周密周致深密也此六氣氣化之常也厥陰所至為風生終為肅少陰所至為熱生中為寒太陰所至為濕生終為注雨少陽所至為火生終為蒸溽陽明所至為燥生終為涼太陽所致為寒生中為溫德化之常也此言德化化之有其德也生猶本也終猶極也厥陰之氣本於風故所至為風生終則為肅肅清肅也少陰之氣本於熱故所至為熱生中則為寒寒少陰之標陰也太陰之氣本於濕故所至為濕生終為注雨注雨濕之淫溢也少陽之氣本於火故所至為火生終為蒸溽蒸溽熱極汗流也陽明之氣本於燥故所至為燥生終為涼涼金之清切也太陽之氣本於寒故所至為寒生中為溫溫太陽之標陽也少陰太陽兼稟水火陰陽之氣故不曰終而曰中此六氣始終為六氣德化之常也厥陰所至為毛化少陰所至為羽化太陰所至為保化少陽所至為羽化陽明所至為介化太陽所至為鱗化德化之常也此亦言德化之常而有萬物生成之德也毛蟲屬木故厥陰所至為毛化羽蟲屬火故少陰少陽所至皆為羽化倮蟲屬土故太陰所至為倮化介蟲屬金故陽明所至為介化鱗蟲屬水故太陽所至為鱗化此諸蟲孕育為六氣德化之常也厥陰所至為生化少陰所至為榮化太陰所至為濡化少陽所至為茂化陽明所至為堅化太陽所至為藏化布政之常也此言六氣之化而為布政之常也上文云厥陰所至為生故厥陰所至為生化少陰所至為榮故少陰為榮化太陰所至為雲雨故太陰為濡化少陽所至為蕃鮮故少陽為茂化陽明所至為收故陽明為堅化太陽所至為藏故太陽為藏化此六氣之化而為布政之常承上文已悉之意而復言之以明時化司化氣化德化皆為布政之常而六氣之應見以為六化之正者有如此厥陰所至為飄怒大涼少陰所至為大暄寒太陰所至為雷霆驟注烈風少陽所至為飄風燔燎霜凝陽明所至為散落溫太陽所至為寒雪冰雹白埃氣變之常也上文皆言六氣之正此下言六氣之變首言氣變之常次言令行之常又次皆言病之常意謂氣變令行發為民病以為六變之紀也飄怒者風之變大涼則金氣乘之故厥陰所至為飄怒大涼大暄者火之甚寒則水氣乘之故少陰所至為大暄寒雷霆驟注者十之變烈風則木氣乘之故太陰所至為雷霆驟注烈風飄風燔燎者風火交熾霜凝則金水之氣乘之故少陽所至為飄風燔燎霜凝散落者金之肅殺溫則火氣乘之故陽明所至為散落溫寒雪冰雹者水之變白埃則土氣乘之故太陽所至為寒雪冰雹白埃此六氣不得其平制勝相加為氣變也厥陰所至為撓動為迎隨少陰所至為高明焰為曛太陰所至為沉陰為白埃為晦暝少陽所至為光顯為彤雲為曛陽明所至為煙埃為霜為勁切為淒鳴太陽所至為剛固為堅芒為立令行之常也此舉六氣令行之常以證上文氣變之意撓動迎隨風之性也故厥陰為撓動為迎隨高明焰曛火之發也故少陰為高明焰為曛沉陰白埃晦暝土之濕也太陰為沉陰為白埃為晦暝光顯彤雲曛火之色也故少陽為光顯為彤雲為曛煙埃金之燥也霜金之寒也勁切金之堅也淒鳴金之肅也故陽明為煙埃為霜為勁切為淒鳴剛固寒之操也堅芒水之貞也剛固堅芒所以立也故太陽為剛固為堅芒為立此六氣之立行於四時而為令行之常不同於上文之氣變也厥陰所至為裡急少陰所至為瘍疹身熱太陰所至為積飲痞隔少陽所至為嚏嘔為瘡瘍陽明所至為浮虛太陽所至為屈伸不利病之常也裡急厥陰肝氣內逆也瘍疹身熱少陰火氣有餘也積飲痞隔太陰土氣不輸也嚏嘔瘡瘍少陽初陽不升風火交熾也浮虛陽明金氣不固外浮內虛也屈伸不利太陽寒氣內逆不得標陽之化也此六氣發病之常也厥陰所至為支痛少陰所至為驚惑惡寒戰慄詀妄太陰所至為稸滿少陽能至為驚躁瞀昧暴病陽明所至為鼽尻陰股膝髀腨足病太陽所至為腰病病之常也惡去聲下同昧昧之昧舊本訛味今改厥陰包絡之脈不能從胸走手則支痛少陰心氣內虛則驚惑惡寒戰慄譫妄太陰肺天之氣不能四布其水津則稸滿少陽三焦之氣不能遊行出入則驚躁瞀昧而暴病陽明大腸主津液所生病津液虛寒則為鼻鼽陽明胃脈下髀關抵伏兔下膝臏中下循脛外廉下足跗故尻陰股膝髀腨䯒足皆病太陽之脈挾脊抵腰病則腰痛此亦六氣發病之常也厥陰所至為緛戾少陰所至為悲妄衄衊太陰所至為中滿霍亂吐下少陽所至為喉痹耳鳴嘔湧陽明所至為胸痛皴揭太陽所至為寢汗痙病之常也胸舊本訛脅今改皴音逡痙音勁戾了戾小便所注之關戾也緛縮也厥陰之脈入毛中過陰器病則癃閉故厥陰所至為緛戾悲悲哀心氣虛也妄狂妄心氣實也脈虛而熱則衄脈虛而寒則衊少陰屬心主脈故少陰所至為悲妄衄衊中滿則上下不交霍亂吐下則上湧下泄手太陰主上足太陰主下故太陰所至為中滿霍亂吐下一陰一陽結謂之喉痹一陰厥陰也一陽少陽也手足少陽之脈皆從耳後入耳中出走耳前經脈虛則耳鳴少陽樞轉不利則乾嘔上湧故少陽所至為喉痹耳鳴嘔湧胸痛者手足陽明之脈不能入缺盆而下膈也皮皺曰皴掀起曰揭皴揭者陽明燥勝皮皴而掀揭也故陽明所至為胸痛皴揭手太陽之脈主液所生病寢汗液虛也足太陽之脈主筋所生病痙筋攣也故太陽所至為寢汗痙此亦六氣發病之常也厥陰所至為脅痛嘔泄少陰所至為語笑太陰所至為重胕腫少陽所至為暴注瞤瘛暴死陽明所至為鼽嚏太陽所至為流泄禁止病之常也初陽之氣起於厥陰陰極而初陽不升則脅痛上嘔下泄故厥陰所至為脅痛嘔泄語言喜笑心所主也心氣實則語笑多故少陰所至為語笑土虛濕勝則身重胕腫故太陰所至為重的胕腫注洞泄也暴注卒然洞泄也暴泄如注則生陽之氣不充於身故肉瞤筋瘛表裡上下不交則一時暴死故少陽所至為暴注瞤瘛暴死水津不藏則鼽以木擊金則嚏故陽明所至為鼽衄流泄者汗流外泄禁止者小便不行流泄則津液虛禁止則小便閉故太陽所至為流泄禁止此亦六氣發病之常也凡此亦皆六氣應見以為六變之紀者有如此凡此十二變者報德以德報化以化報政以政報令以令氣高則高氣下則下氣後則後氣前則前氣中則中氣外則外位之常也故風勝則動熱勝則腫燥勝則乾寒勝則浮濕勝則濡泄甚則水閉胕腫隨氣所在以言其變耳總結上文六正六變之意正變皆六氣之常故曰凡此十二變者上文兩言德化之常故曰報德以德言報復之德以其先施之德也一言司化之常一言氣化之常故曰報化以化言報復之化以其先施之化也一言布政之常故曰報政以政言報復之政以其先布之政也此結上文六化之正也上文六氣之變變而為病言病之常者四言氣變之常者一言令行之常者一故曰報令以令言報復之令以其先行之令也其氣變之常發病之常乃火水金木土火之六氣變而為病火位居高故曰氣高則高謂火變則火病也水位居下故曰氣下則下謂水變則水位也金位居後故曰氣後則後謂金變則金病也木位居前故曰氣前則前謂木變則木病也土位居中故曰氣中則中謂土變則土病也火居高而位外故曰氣外則外亦火變則火病也火水木金土火六氣有高下前後中外之位乃位之常也此結上文六氣之變也陰陽應象大論云風勝則動熱勝則腫燥勝則乾寒勝則浮濕勝則濡泄引之以明風熱燥寒濕之氣勝於上則人身經脈為動為腫為干為浮為濡泄而病於下甚則土氣不行水閉浮腫此隨六氣之所在以言其變而為病耳帝曰願聞其用也上文岐伯云有化有變有勝有復有用有病不同其候今六氣之化六氣之變六氣之勝六氣之復六氣之病皆明言之而六氣之用未悉其旨帝故問之岐伯曰夫六氣之用各歸不勝而為化故太陰雨化施於太陽太陽寒化施於少陰少陰熱化施於陽明陽明燥化施於厥陰厥陰風化施於太陰名命其所在以徵之也不勝受其制也不勝而為化猶言制則生化也夫六氣之用制化為先是以各歸不勝而為化故太陰雨化土也施於太陽則土製其水而土之金德生其水是不勝而為化也太陽寒化水也施於少陰則水制其火而水之子木復生其火少陰熱化火也施於陽明則火制其金而火之子土復生其金陽明燥化金也施於厥陰則金制其木而金之子水復生其木厥陰風化木也施於太陰則木製其土而木之子火復生其土是皆不勝而為化也六氣合五行不言少陽者同於少陰也此不勝為化乃六氣之用欲徵其用名命其所在之氣以徵之也如太陰之氣在長夏太陽之氣在於冬少陰之氣在於夏陽明之氣在於秋厥陰之氣在於春者是也帝曰自得其位何如命其所在乃自得其位故問自得其位何如岐伯曰自得其位常化也自得其位者得其四時六氣之常化也帝曰願聞其所在也帝欲詳明所在之位故復問之岐伯曰命其位而方月可知也命其位者命其六氣之位也方月者厥陰之位東北方也正月二月少陰之位東南方也三月四月太陰之位西南方也五月六月少陽之位正南方也七月八月陽明之位西北方也九月十月太陽之位正北方也十一月十二月命其位而知其方月則六氣之用益可知矣帝曰六位之氣盈虛何如六位之氣有盛衰故問盈虛何如岐伯曰太少異也太者之至徐而常少者暴而亡歲運陽年為太太則六位之氣盈陰年為少少則六位之氣虛此太少之異而有盈虛也太主氣盈故太者之至其氣徐而常言氣舒徐而有常度也少主氣虛故少者之至其氣暴而亡言氣促疾而無常度也此明位氣之盈虛也帝曰天地之氣盈虛何如六位之氣主十二月而天地一歲之氣盈虛何如岐伯曰天氣不足地氣隨之地氣不足天氣從之運居其中而常先也惡所不勝歸所同和隨運歸從而生其病也故上勝則天氣降而下下勝則地氣遷而上多少而差其分微者小差甚者大差甚則位易氣交易則大變生而病作矣大要曰甚紀五分微紀七分其差可見此之謂也分去聲天干乙丁己辛癸主不足地支醜卯巳未酉亥主不足干支配合有餘則皆有餘不足則皆不足故天干之氣不足則地支之地氣亦隨之地支之地氣不足則天干之天氣亦從之地支主六氣天干化五運五運在中故運居其中而常為六氣之先也不足之歲先郁後復先鬱則惡所不勝後復則歸所同和五運在中隨運歸從而生其民病也此言天氣地氣之不足而為虛也歲半之前司天之氣主之上勝者司天之氣有餘也故上勝則有餘之天氣降而大降而下者流於歲半之復也歲半之後在泉之氣主之下勝者在泉之氣有餘也故下勝則有餘之地氣遷而上遷而上者移於歲半之前也其上下所勝之氣有多少而差其分勝之微者小差勝之甚者大差甚則位易氣交如上勝則易四之氣而歸於上下勝則易三之氣而歸於下易則大變生而民病作矣揆其微甚之大要則曰甚紀五分謂五分在於本位而五分降遷也微紀七分謂七分在於本位而三分降遷也五分七分則其差可見即此多少而差其分之謂也此言上勝下勝有餘而為盈也如此推之則天地之盈虛從可知矣帝曰善論言熱無犯熱寒無犯寒余欲不遠寒不遠熱奈何天地盈虛之理既明帝故善之上文岐伯之用熱遠熱用寒遠寒者無犯之謂帝引其言而言余欲用寒用熱實用其力而不遠奈何岐伯曰悉乎哉問也發表不遠熱攻裡不遠寒時令當熱寒邪在表用辛熱之藥以發之是發表而不遠熱也時令當寒熱邪在裡用寒泄之藥以攻之是攻裡而不遠寒也帝曰不發不攻而犯寒犯熱何如發表犯熱攻裡犯寒不發不攻而犯寒犯熱何如岐伯曰寒熱內賊其病益甚不當攻發而用寒熱是為內賊賊害也害則其病益甚帝曰願聞無病者何如其人有病故病益甚願聞無病而用寒熱何如岐伯曰無者生之有者甚之無病而犯寒熱則病生故無者生之有病而犯寒熱則病甚故有者甚之帝曰生者何如所生之病何如岐伯曰不遠熱則熱至不遠寒則寒至熱至寒至病所以生也寒至則堅痞腹滿痛急下利之病生矣凡此皆不遠寒而生寒病也熱至則生熱吐下霍亂癰疽瘡瘍瞀郁注下瞤瘛腫脹嘔鼽衄頭痛骨節變肉痛血溢血泄淋閟之病生矣凡此皆不遠熱而生熱病也帝曰治之奈何岐伯曰時必順之犯者治以勝也治病之法時必順之若違時而犯寒犯熱者仍治以勝也勝者犯寒以熱治犯熱以寒治也帝曰婦人重身毒之何如婦人懷孕重身當犯寒熱以毒之則何如岐伯曰有故無殞亦無殞也有寒熱之病用寒熱之毒謂之有故有故而用則無殞減之患然亦無過用而致殞滅也帝曰願聞其故何謂也有故無殞何謂故也岐伯曰大積大聚其可犯也衰其大半而止過者死有故內有積聚也大積大聚其毒藥之可犯也不過衰其大半而止若攻之過者則死矣帝曰善郁之甚者治之奈何承無過用之意謂病之過者或可過用故謂郁之甚者治之奈何岐伯曰木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之然調其氣過者折之以其畏也所謂瀉之水鬱折之舊本誤析今改五行之氣貴得其平故木鬱則達之達通達也火鬱則發之發開發也土鬱則奪之奪裁奪也金鬱則泄之泄疏泄也水鬱則析之析分析也雖曰達之發之奪之泄之析之然必調其正氣若郁之過者則逆其氣而析之析析抑也析之以其有所畏也析之而畏所謂實則瀉之也帝曰假者何如真實則瀉若假者何如岐伯曰有假其氣則無禁也所謂主氣不足客氣勝也實者邪氣實原非正氣之實也有假其氣即當瀉之則無禁也所謂主氣不足客氣勝也客氣勝瀉之可也帝曰至哉聖人之道天地大化運行之節臨御之紀陰陽之政寒暑之令非夫子孰能通之請藏之靈蘭之室署曰六元正紀非齋戒不敢示慎傳也聖人之道惟聖人能通之故當藏密其旨不敢輕示此天地之運行陰陽之臨御寒暑之往來千百世而無傳人也運氣之理不綦至微而難測歟
