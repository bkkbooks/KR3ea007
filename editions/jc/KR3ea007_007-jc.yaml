水味之咸調其下其少陽相火之氣無妄犯之不可犯以火味也用藥治病亦當用溫遠溫用熱遠熱而得其平帝曰善夫子言可謂悉矣然何以明其應乎應徵驗也六氣主時客氣加臨何以明其徵驗乎岐伯曰昭乎哉問也夫六氣者行有次止有位故常以正月朔日平旦視之觀其位而知其所在矣運有餘其至先運不及其至後此天之道氣之常也運非有餘非不足是謂正歲其至當其時也當去聲下同行有次者六氣主時始於厥陰終於太陽也止有位者六氣加臨始於在泉之右位終於在泉之本位也欲明其應故常以正月朔日平旦為歲首而視察之觀其位而知其氣之所在可以明其應矣凡歲運有餘其至先天歲運不及其至後天若歲運非有餘非不足當諸歲會之年是謂正歲其至當其時也以此察之可以明其應矣帝曰勝復之氣其常在也災眚時至候也奈何勝復者氣之常災眚者氣之變常固可候變則何以候之岐伯曰非氣化者是謂災也氣之變化歲有常候非其氣化而有此氣化者是謂災也此即候之之法也帝曰天地之數終始奈何數如字下同天地之數六十歲為一周終而復始無有窮盡帝故問之岐伯曰悉乎哉問也是明道也數之始起於上而終於下歲半之前天氣主之歲半之後地氣主之上下交互氣交主之歲紀畢矣故曰位時氣月可知乎所謂氣也時舊本訛明今改終始之數乃道之所在是明道也原數之始起於天之十干終於地之十二支是起於上而終於下故歲半之前天干之天氣主之歲半之後地支之地氣主之天地上下交互之理合於人身則氣交主之氣交者人之居也六微旨大論云上下之位氣交之中人之居也自一歲至六十歲終始皆然故曰歲紀畢矣一歲之中四時凡六位十二月凡二十四氣故曰位時氣月可知乎申明位時氣月者乃六氣之二十四氣所謂氣也知四時之位每月之氣以明其應則天地終始之數可知矣帝曰余司其事則而行之不合其數何也事歲事也數氣數也帝首創干支治歷明時故曰余司其事則而行之歲中之事不合氣數其故何也岐伯曰氣用有多少化洽有盛衰衰盛多少同其化也一歲之中風熱濕火燥寒六氣之用有太過不及多太過也少不及也五運之化洽於萬物有有餘不足盛有餘也衰不足也化洽之衰盛氣用之多少同其四時之化令如下文所云也帝曰願聞同化何為伯云衰盛多少同其化故問同化何如岐伯曰風溫春化同熱曛昏火夏化同勝與復同燥清煙露秋化同雲雨昏瞑埃長夏化同寒氣霜雪冰冬化同此天地五運六氣之化更用盛衰之常也同化者六氣之氣五運之氣同一四時五行之化也故厥陰木氣之風溫與角木之春化同少陰少陽之熱曛昏火與徵火之夏化同六氣之勝六氣之復亦合四時五行故勝與復同如風勝同春木熱勝同夏火風復同春木熱復同夏火之義陽明金氣之燥清煙露與商金之秋化同太陰土氣之雲雨昏瞑埃與宮土之長夏化同太陽水氣之寒氣霜雪冰與羽水之冬化同此天地五運之氣之化其化相同一歲之中恆非其時而有其氣此更用盛衰之常所以氣數有不合也帝曰五運行同天化者命曰天符余知之矣願聞同地化者何謂也土運而太陰司天金運而陽明司天等是五運五行同於司天之化氣命曰天符余知之矣五運五行同地化者何謂也岐伯曰太過而同天化者三不及而同天化者亦三太過而同地化者三不及而同地化者亦三此凡二十四歲也甲丙戊庚壬化運主太過乙丁己辛癸化運主不及子寅辰午申戌氣主太過醜卯巳未酉亥氣主不及六十歲中太過不及同天地之化者凡二十四歲此總括其目下文詳言之也帝曰願聞其所謂也願聞太過不及之歲岐伯曰甲辰甲戌太宮下加太陰壬寅壬申太角下加厥陰庚子庚午太商下加陽明如是者三帝願聞同地化故先言五運之同地化者甲辰甲戌二歲甲為土運太過故曰太宮辰戌太陽司天則太陰濕土在泉故下加太陰壬寅壬申二歲壬為木運太過故曰太角壬申少陽司天則厥陰風木在泉故下加厥陰庚子庚午二歲庚為金運太過故曰太商子午少陰司天則陽明燥金在泉故下加陽明一則太宮土運而司太陰之地化一則太角木運而同厥陰之地化一則太商金運而同陽明之地化此太過而同地化者三有如是也癸巳癸亥少徵下加少陽辛丑辛未少羽下加太陽癸卯癸酉少徵下加少陰如是者三癸巳癸亥二歲癸為火運不及故曰少徵巳亥厥陰司天則少陽相火在泉故下加少陽辛丑辛未二歲辛為水運不及故曰少羽丑未太陰司天則太陽寒水在泉故下加太陽癸卯癸酉二歲癸為火運不及故曰少徵癸酉陽明司天則少陰君火在泉故下加少陰一則少徵火運而同少陽之地化一則少羽水運而同太陽之地化一則少徵火運而同少陰之地化此不及而同地化者亦三有如是也戌子戌午太徵上臨少陰戌寅戌申太徵上臨少陽丙辰丙戌太羽上臨太陽如是者三戌子戌午之歲戌為火運太過故曰太徵子午少陰司天故上臨少陰戌寅戌申二歲戌為火運太過故曰太徵寅申少陽司天故上臨少陽丙辰丙戌二歲丙為水運太過故曰太羽辰戌太陽司天故上臨太陽一則太徵火運而同少陰之天化一則太徵火運而同少陽之天化一則太羽水運而同太陽之天化此太過而同天化者三有如是也丁巳丁亥少角上臨太陰乙卯乙酉少商上臨陽明己丑己未少宮上臨太陰如是者三丁巳丁亥二歲丁為木運不及故曰少角巳亥厥陰司天故上臨厥陰乙卯乙酉二歲乙為金運不及故曰少商卯酉陽明司天故上臨陽明己丑己未二歲己為土運不及故曰少宮丑未太陰司天故上臨太陰一則少角木運而同厥陰之天化一則少商金運而同陽明之天化一則少宮土運而同太陰之天化此不及而同天化者亦三有如是也除此二十四歲則不加不臨也上凡二十四歲同地化則下加同天化則上臨此二十四歲有加有臨除此二十四歲餘三十六歲則不加不臨也帝曰加者何謂同地化者皆云下加故問加者何謂岐伯曰太過而加同天符不及而加同歲會也運同司天謂之天符運同歲支謂之歲會天氣為陽陽主有餘故凡太過之歲而下加即同天符地氣為陰陰主不及故凡不及之歲而下加即同歲會也帝曰臨者何謂因下加而問上臨岐伯曰太過不及皆曰天符而變行有多少病形有微甚生死有早晏耳運同天化謂之上臨天氣為陽陽主有餘故無論太過不及之歲凡天氣上臨皆曰天符而一歲之中變行有多少病形有微甚生死亦有早晏耳帝曰夫子言用寒遠寒用熱遠熱余未知其然也願聞何謂遠夫既用之何以遠之故問何謂遠岐伯曰熱無犯熱寒無犯寒從者和逆者病不可不敬畏而遠之所謂時興六位也遠者無犯之謂如用藥宜熱寒病當之是無犯熱無犯其熱即為遠矣用藥宜寒熱病當之是無犯寒無犯其寒即為遠矣無犯為從犯之為逆故從者和逆者病從之始和逆之則病是食宜同法也此寒熱溫涼之用不可不敬畏而遠之夫寒熱溫涼四時之氣也四時之氣即六位之氣也敬畏而遠之所謂時興六位也帝曰溫涼何如但言寒熱未言溫涼溫涼減於寒熱故復問之岐伯曰司氣以熱用熱無犯司氣以寒用寒無犯司氣以涼用涼無犯司氣以溫用溫無犯間氣同其主無犯異其主則小犯之是謂四畏必謹察之一歲六位各司其氣所謂熱無犯熱寒無犯寒者乃司氣以熱用熱勿太過而無犯其熱也司氣以寒用寒勿太過而無犯其寒也寒熱如是溫涼亦如是故司氣以涼用涼勿太過而無犯其涼司氣以溫用溫勿太過而無犯其溫一歲之中有主時之正氣有加臨之間氣間氣同其主氣其氣過盛故無犯之間氣異其主氣其氣弗盛則小犯之小犯者用寒熱溫涼而弗過也是寒熱溫涼謂之四畏必謹察之不可過也帝曰善其犯者何如異其主則小犯何如岐伯曰天氣反時則可依時及勝其主則可犯以平為期而不可過是謂邪氣反勝者故曰無失天信無逆氣宜無翼其勝無贊其復是謂至治天氣主時之正氣也反時當熱而寒當寒而熱也則可依時言當熱而寒則以熱治寒當寒而熱則以寒治熱也及勝其主言加臨之間氣勝其主時之正氣如主氣寒而間氣則以熱勝主氣熱而間氣則以寒勝如是則可犯可犯主氣之寒以清熱可犯主氣之熱以溫寒然皆以平為期而不可過也申明反勝其主是謂邪氣反勝者邪氣即間氣也反勝勝其主也故大要曰無失天信四時之信不可失也無逆氣宜六氣之宜不過逆也無翼其勝以勝相加無復輔翼也無贊其復先郁後復無庸贊助也能如是也是謂平和之至治帝曰善五運氣行主歲之紀其有常數乎五運六氣之行以主六十歲之紀其有常數乎岐伯曰臣請次之此下論五運六氣之六十歲之紀乃常數也甲子甲午歲上少陰火中太宮土運下陽明金熱化二雨化五燥化四所謂正化日也其化上鹹寒中苦熱下酸熱所謂藥食宜也子與午合醜與未合寅與申合卯與酉合辰與戌合巳與亥合子午少陰司天故甲子甲午歲上少陰火甲為土運太過故中太宮土運少陰在上則陽明在下故下陽明金火氣在上故熱化二土運在中故而化五五土之生數也土常以生後俱仿此金氣在下故燥化四一二三四五五行之生數也六七八九十五行之成數也下文云太過者其數成不及者其數生蓋甲丙戊庚壬太過之運則舉五行之成數乙丁己辛癸不及之運則舉五行之生數土則無分太過不及常常舉其生然此惟在中之化運為然其司天在泉之化氣則不然土常以生上下皆然此熱化雨化燥化及上中下之氣所謂正化日也其化上熱則宜水味之鹹寒以治之其化中濕則宜火味之苦熱以治之其化下燥則宜木味之酸熱以治之金氣清涼而主收故宜酸熱所謂藥食之相宜也乙丑乙未歲上太陰土中少商金運下太陽水熱化寒化勝復同所謂邪氣化日也災七宮濕化五清化四寒化六所謂正化日也其化上苦熱中酸和下甘熱所謂藥食宜也丑未太陰司天故乙丑乙未歲上太陰土乙為金運不及故中少商金運太陰在上則太陽在下故下太陽水凡太過之運則無勝復不及之運則有勝復後皆仿此金運不及始則火之熱化勝繼則水之寒化復勝與復同主一歲之氣非上中下正氣之化所謂勝復之邪氣化日也凡正化則無災邪氣化則有災後俱仿此災七宮西方兌宮金位也土氣在上故濕化五金運在中而不及故清化四四金之生數也水氣在下故寒化六此濕化清化寒化乃上中下之氣所謂正化日也其化上濕則宜火味之苦熱以治之其化中燥則宜木味之酸和以治之其化下寒則宜土味之甘熱以治之甘熱乃土勝其水轉寒為熱也所謂藥食之相宜也丙寅丙申歲上少陽相火中太羽水運下厥陰木火化二寒化六風化三所謂正化日也其化上鹹寒中鹹溫下辛溫所謂藥食宜也寅申少陽司天故丙寅丙申歲上少相火丙為水運太過故中太羽水運少陽在上則厥陰在下故下厥陰木火氣在上故火化二水運在中而太過故寒化六六水之成數也木氣在下故風化三此火化寒化風化乃上中下之氣所謂正化日也其化上火則宜水味之鹹寒以治之其化中水則宜水味之鹹溫以治之既曰鹹寒復曰鹹溫以明鹹味亦有性溫者也其化下木則宜金味之辛溫以治之所謂藥食之相宜也藥食之宜在上者多制之中下者或制之或助之制之折其鬱氣也助之資其化源也丁卯丁酉歲上陽明金中少角木運下少陰火清化熱化勝復同所謂邪氣化日也災三宮燥化九風化三熱化七所謂正化日也其化上苦小溫中辛和下鹹寒所謂藥食宜也卯酉陽明司天故丁卯丁酉歲上陽明金丁為木運不及故中少角木運陽明在上則少陰在下故下少陰火木運不及始則金之清化勝繼則火之熱化復勝與復同主一歲之氣非上中下正氣之化所謂邪氣化日也災三宮東方震宮木位也金氣在上故燥化九木運在中而不及故風化三三木之生數也火氣在下故熱化七此燥化風化熱化乃上中下之氣所謂正化日也其化上燥則宜火味之苦小溫以治之其化中風則宜金味之辛和以治之其化下熱則宜水味之鹹寒以治之所謂藥食之相宜也戊辰戊戌歲上太陽水中太徵火運下太陰土寒化六熱化七濕化五所謂正化日也其化上苦溫中甘和下甘溫所謂藥食宜也辰戌太陽司天故戊辰戊戌歲上太陽水戊為火運太過故中太徵火運太陽在上則太陰在下故下太陰土水氣在上故寒化六火運在中而太過故熱化七七火之成數也土氣在下故濕化五此寒化熱化濕化乃上中下之氣所謂正化日也其化上寒則宜火味之苦溫以治之其化中熱則宜土味之甘和以治之其化下濕則宜土味之甘溫以治之所謂藥食之相宜也己巳己亥歲上厥陰木中少宮土運下少陽相火風化清化勝復同所謂邪氣化日也災五宮風化三濕化五火化七所謂正化日也其化上辛涼中甘和下鹹寒所謂藥食宜也巳亥之歲厥陰司天故己巳己亥歲上厥陰木己為土運不及故中少宮土運厥陰在上則少陽在下故下少陽相火土運不及始則木之風化勝繼則金之清化復勝與復非上中下正氣之化可謂邪氣化日也災五宮中央土位也木氣在上故風化三土運在中而不及故濕化五火氣在下故火化七此風化濕化火化乃上中下之氣所謂正化日也其化上風故宜金味之辛涼以治之其化中濕故宜土味之甘和以治之其化下火故宜水味之鹹寒以治之所謂藥食之相宜也庚午庚子歲上少陰火中太商金運下陽明金熱化七清化九燥化九所謂正化日也其化上鹹寒中辛溫下酸溫所謂藥食宜也庚為金運太過故庚午庚子歲上少陰火中太商金運下陽明金火氣在上故熱化七金運在中而太過故清化九九金之成數也金氣在下故燥化九清涼之氣燥烈之氣皆金氣也此熱化清化燥化乃上中下之氣所謂正化日也其化上熱則宜水味之鹹寒以治之其化中清則宜金味之辛溫以治之其化下燥則宜木味之酸溫以治之所謂藥食之相宜也辛未辛丑歲上太陰土中少羽水運下太陽水雨化風化勝復同所謂邪氣化日也災一宮雨化五寒化一所謂正化日也其化上苦熱中苦和下苦熱所謂藥食宜也辛為水運不及故辛未辛丑歲上太陰土中少羽水運下太陽水水運不及始則土之雨化勝繼則木之風化復勝與復同主一歲之氣非上中下正氣之化所謂邪氣化日也災一宮北方坎宮水位也土氣在上故而化五水運在中而不及故寒化一一水之生數也水氣在下同於寒化故不復言下不復言義俱仿此此乃上中下之氣所謂正化日也其化上濕則宜火味之苦熱以治之其化中寒則宜火味之苦和以治之其化下寒亦宜火味之苦熱以治之所謂藥食之相宜也壬申壬寅歲上少陽相火中太角木運下厥陰木火化二風化八所謂正化日也其化上鹹寒中酸和下辛涼所謂藥食宜也壬為木運太過故壬申壬寅歲上少陽相火中太角木運下厥陰木火氣在上故火化二木運在中而太過又木氣在下故皆風化八八木之成數也此火化風化乃上中下之氣所謂正化日也其化上火則宜水味之鹹寒以治之其化中風則宜木味之酸和以治之其化下風則宜金味之辛涼以治之所謂藥食之相宜也癸酉癸卯歲上陽明金中少徵火運下少陰火寒化雨化勝復同所謂邪氣化日也災九宮燥化九熱化二所謂正化日也其化上苦小溫中鹹溫下鹹寒所謂藥食宜也癸為火運不及故癸酉癸卯歲上陽明金中少徵火運下少陰火火運不及始則水之寒化勝繼則土之雨化復勝與復同主一歲之氣非上中下正氣之化所謂邪氣化日也災九宮南方離宮火位也金氣在上故燥化九火運在中而不及又火氣在下故熱化二二火之生數也此上中下之氣所謂正化日也其化上燥則宜火味之苦小溫以治之其化中熱則宜水味之鹹溫以治之其化下熱則宜水味之鹹寒以治之所謂藥食之相宜也甲戌甲辰歲上太陽水中太宮土運下太陰土寒化六濕化五正化日也其化上苦熱中苦溫下苦溫藥食宜也甲為土運太過故甲戌甲辰歲上太陽水中太宮土運下太陰土水氣在上故寒化六土氣在中土氣在下故濕化五此上中下之氣乃正化日也其化上寒則宜火味之苦熱以治其之化可濕下濕則宜火味之苦溫以治之此藥食之相宜也乙亥乙巳歲上厥陰木中少商金運下少陽相火熱化寒化勝復同邪氣化日也災七宮風化八清化四火化二正化度也其化上辛涼中酸和下鹹寒藥食宜也乙為金運不及故乙亥乙巳歲上厥陰木中少商金運下少陽相火金運不及始則火之熱化勝繼則水之寒化復勝與復同主一歲之氣非上中下正氣之化乃邪氣化日也災七宮凡乙年金運不及皆熱也木氣在上故風化八金運在中而不及故清化四火氣在下故火化二此上中下之氣乃正化之度度時度也余仿此其化上風故宜金味之辛涼以治之其化中清故宜木味之酸和以治之其化下熱故宜水味之咸以治之此藥食之相宜也丙子丙午歲上少陰火中太羽水運下陽明金熱化二寒化六清化四正化度也其化上鹹寒中苦熱下酸溫藥食宜也苦熱舊本訛咸熱今改丙為水運太過故丙子丙午歲上少陰火中太羽水運下陽明金火氣在上故熱化二水運在中而太過故寒化六金氣在下故清化四此上中下之氣乃正化度也其化上熱故宜水味之鹹寒以治之其化中寒故宜火