body:
  text: 卷之七五常政大論第七十二篇木火土金水有平氣有不及之氣有太過之氣皆其常也天氣制於上運氣主於中萬物生化五蟲孕育有盛有衰是其政也五運根中六氣根外化不可代時不可違皆為五常之政故以名篇黃帝問曰太虛寥廓五運回薄衰盛不同損益相從願聞平氣何如而名何如而紀也太虛寥廓天之幽遠廣大也五運回薄五行迴繞依薄於太虛之中也五運回薄其中有衰盛不同因有損益相從衰損則不及盛益則太過平氣則不衰不盛無損無益故願聞平氣何如而立其名何如而定其紀立名定紀下文岐伯所言者是也岐伯對曰昭乎哉問也木曰敷和火曰升明土曰備化金曰審平水曰靜順敷布陽和木之性也上升明顯火之性也化物周備土之性也審束平定金之性也沉靜柔順水之性也此五運平氣而有如是之名也帝曰其不及奈何岐伯曰木曰委和火曰伏明土曰卑監金曰從革水曰涸流委和陽和不敷而委弱也伏明明顯不升而下伏也卑監化成不備卑以自監也從革平定不審從而變革也涸流靜順有愆其流乾涸也此五運不及而有如是之名也帝曰太過何謂岐伯曰木曰發生火曰赫曦土曰敦阜金曰堅成水曰流行發生生育峻發也赫曦曦耀顯赫也阜阜高敦厚也堅成成物堅剛也流衍其流衍溢也此五運太過而有如是之名也帝曰三氣之紀願聞其候三氣謂平氣太過不及之氣也紀年數也候五運之紀各有時候也岐伯曰悉乎哉問也敷和之紀木德周行陽舒陰布五化宣平其氣端其性隨其用曲直其化生榮其類草木其政發散其候溫和其令風其藏肝肝其畏清其主目其谷麻其果李其實核其應春其蟲毛其畜犬其色蒼其養筋其病裡急支滿其味酸其音角其物中堅其數八木之平氣曰敷和故敷和之紀木德周布宣行陽氣以舒陰氣以布五行各有所化一氣平則五氣皆平故五化宣平其氣端木之正直也其性隨木之柔順也其用曲直木之枝幹也其化生榮木之茂密也其類草木凡有形草木皆其類也其政發散木之條達也其候溫和春時之氣也其令風風為木之號令也其藏肝肝屬木也肝其畏清木畏金也其主目目為肝竅也麻體直而色蒼為五穀之首故其谷麻李色青而味酸故其果李核內有仁木生之本故其實核春氣溫和故其應春毛蟲通體皆毛猶木之森叢故其蟲毛犬性勇往直前猶春之迅發故其畜犬蒼者木之色故其色蒼筋者肝所主故其養筋其病裡急支滿肝氣不達也酸者木之味角者木之音凡具木體之物其中必堅八者木之成數也升明之紀正陽而治德施周普五化均衡其氣高其性速其用燔灼其化蕃茂其類火其歐明曜其候炎暑其令熱其藏心心其畏寒其主舌其穀麥其果杏其實絡其應夏其蟲羽其畜馬其色赤其養血其病瞤瘈其味苦其音徵其物脈其數七火之平氣曰升明火位南方故升明之紀正陽而治陽氣四布故德施周普火氣平則五行之化氣皆平故五化均衡其氣高火之上炎也其性速火之急烈也其用燔灼火之焚熱也其他蕃茂火之廣大也其類火凡有形之火皆其類也其政明曜火之光焰也其候炎暑夏時之氣也其令熱熱為火之號含也其藏心心屬火也心其畏寒火畏水也其主舌舌為心竅也麥春生夏熟故其穀麥杏色赤味苦故其果杏絡脈橫逼火散之象故其實絡夏氣炎暑故其應夏羽蟲飛翔戾天猶火之炎上故其蟲羽馬乾象主天天以日光明故其畜馬赤者火之色故其色赤血者心所主故其養血其病瞤瘈火氣不周也苦者火之味微者火之音凡具火體之物必有絡脈七者火之成數也備化之紀氣協天休德流四政五化齊修其氣平其性順其用高下其化豐滿其類土其政安靜其候溽蒸其令濕其藏脾脾其畏風其變口其谷稷其果棗其實肉其應長夏其蟲保其畜牛其色黃其養肉其病否其味甘其音宮其物膚其數五否批上聲下同土之平氣曰備化天生地成故備化之紀氣協天休土王四時故德流四政土氣平則五行之化氣皆平故五化齊修其氣平土之中正也其性順土之柔和也其用高下土之山澤也其化豐滿土之敦厚也其類土凡有形之土皆其類也其政安靜土之鎮重也其候溽蒸長夏之氣也其令濕濕為土之號令也其藏脾脾屬土也脾其畏風土畏木也其主口口為脾竅也稷似黍而色黅故其谷稷棗味甘而肉黃故其果棗肉形豐厚而敦阜故其實肉長夏之氣溽蒸故其應長夏保蟲肉體無毛猶上之柔潤故其蟲保牛坤象屬地地主生物故其畜牛黃者土之色故其色黃肉者脾所主故其養肉其病痞塞土氣不升也甘者土之味宮者土之音凡具土體之物必有膚肉五者土之生數也六元正紀大論云土常以生故不舉成數而舉生數也審平之紀收而不爭殺而無犯五化宣明其氣潔其性剛其用散落其化堅斂其類金其政勁肅其候清切其令燥其臟肺肺其畏熱其主鼻其谷稻其果桃其實谷其應秋其蟲介其畜雞其色白其養皮毛其病咳其味辛其音商其物外堅其數九金之平氣曰審平秋時收殺金氣主之故審平之紀收而不爭殺而無犯金氣平則五行之化氣皆平故五化宣明其氣潔金之淨白也其性剛金之堅銳也其用散落金之肅殺也其化堅斂金之凝束也其類金凡有形之金皆其類也其政勁肅金之健利也其候清切秋時之氣也其令燥燥為金之號令也其臟肺肺屬金也肺其畏熱金畏火也其主鼻鼻為肺竅也稻米完而稻薪堅故其谷稻桃外殼而內肉白故其果桃桃胡桃也殼包乎外金之介甲故其實殼秋風清切故其應秋介蟲負甲而外堅猶金之甲胃故其蟲介雞支酉屬金而喜鬥猶金之攻伐故其畜雞白者金之色故其色的皮毛者肺所主故其養皮毛其病欲肺氣不和也率者余之味商者金之音凡具金體之物其外必堅九者金之成數也靜順之紀藏而勿害治而善下五化咸整其氣明其性下下其用沃衍其化凝堅其類水其政流演其候凝肅其令寒其臟腎腎其畏濕其主二陰其谷豆其果慄其實濡其應冬其蟲鱗其畜彘其色黑其養骨髓其病厥其味鹹其音羽其物濡其數穴首藏如字水之平氣曰靜順冬時水氣下藏故靜順之紀藏而勿害治而善下水氣平則五行之化氣皆平故五化咸整其氣明水之清也其性下水之流也其用沃衍水之充灌也其化凝堅水之作冰也其類水凡有形之水皆其類也其政流演水泉不竭也其候凝肅冬時之氣也其令寒寒為水之號會也其臟腎腎屬水也腎其畏濕水畏土也其主二陰二陰為腎竅也豆下沉而性寒故其谷豆慄殼紫而形象腎故其果慄濡潤而滋水之液也故其實濡冬氣凝肅故其應冬鱗蟲生於水而長於水故其蟲鱗彘支亥而質寒故其畜彘黑者水之色故其色黑骨髓者腎所主故其養骨髓其病厥冷腎氣不和也咸者水之味羽者水之音凡具水體之物其質必濡六者水之成數也故生而勿殺長而勿罰化而勿制收而勿害藏而勿抑是謂平氣長上聲藏如字下長同總結上文而言敷和之紀故生而勿殺新明之紀長而勿罰備化之紀化而勿制審平之紀收而勿害靜順之紀藏而勿抑是謂五運之平氣委和之紀是謂勝生生氣不政化氣乃揚長氣自平收令乃蚤涼雨時降風雲並興草木晚榮蒼干凋落物秀而實膚肉內充其氣斂其用聚其動緩戾拘緩其發驚駭其藏肝其果春季其實核殼其谷稷稻其味酸辛其色白蒼其畜犬雞其蟲毛介其主霧露悽愴其聲角商其病搖動注恐從金化也少角與判商同上角與正角同上商與正商同其病支廢癰腫瘡瘍其甘蟲邪傷肝也上宮與正宮同肖瑟肅殺則炎赫沸騰青於三所謂復也其主飛蟲蛆雉乃為雷霆少去聲下俱同木主春生不及則金勝木運不及曰委和故委和之紀是謂勝生生氣不政木氣虛也化氣乃揚土不畏木也長氣自平木不生火也收令乃早金勝木也木不及則金勝而土無畏故三氣並行蓋涼為金氣雲雨為土氣風為木氣故涼雨時降風雲並興木不及故早木晚榮金氣勝故蒼干凋落化氣與秋成之氣專令故物秀而實土主膚肉故膚肉內充金主收斂故其氣斂木主生聚故其用聚筋不柔和故其動緛戾拘緩東方肝木其病發驚駭故其發驚駭其藏肝土無畏而金氣勝則木土金並主其事其果棗李土與木也其實核殼木與金也其谷稷稻土與金也其味酸辛木與金也其色白蒼金與木也其畜犬雞其蟲毛介木與金也其主霧露悽愴金氣勝也其聲角商木與金也其病搖動注恐搖動者風木之象也搖動注恐水不生木也凡此木土金並主其事乃木氣不及從金化而然也木運不及故曰少角判猶半也金勝用事半屬金運故少角與判商同木氣司天謂之上角木之平氣謂之正角木運不及得司天之助則木氣敷和故上角與正角同金氣司天謂之上商金之平氣謂之正商金勝其木又值金氣司天金全用事故上商與正商同其病不但搖動注恐且筋不和而支廢血不和而癰腫瘡瘍猶木杇蟲生故曰其甘蟲凡此搖動注恐支廢癰腫瘡瘍乃邪傷肝也土氣司天謂之上宮土之平氣謂之正宮木運不及土無所畏又值土氣司天則土氣備化故上宮與正宮同肅瑟肅殺金刑木也炎赫沸騰子火氣復也肅瑟肅殺則木受金刑故曰青於三蓋東方居三宮震位木也南方居九宮離位火也中央居五宮土位四維也西方居七宮兌位金也北方居一宮坎位水也下文眚數皆由此也則炎赫沸騰乃木之子火復勝其金故曰所謂復也復則火氣勝故其主飛蟲蠹蟲蛆蟲雉鳥乃為雷霆蓋飛者火蟲也蠹者木所生木生火也蛆者蠅之子火蟲所生也雉為離禽亦火蟲也震為雷雷迅曰霆雷霆木鬱而火發也復則火氣勝而如是也伏明之紀是謂勝長長氣不室藏氣反布收氣自政化令乃衡寒清數舉暑令乃薄承化物生生而不長成實而稚遇化已老陽氣屈伏蟄蟲蚤藏其氣鬱其用暴其動彰伏變易其發痛其髒心其果慄桃其實絡濡其谷豆稻其味苦鹹其色玄丹其畜馬彘其蟲羽鱗其主冰雪霜寒其聲徵羽其病昏惑悲忘從水化也少徵與少羽同上商與正商同邪傷心也凝慘溧冽則暴雨霖霪眚於九其主驟注雷霆震驚沉霒淫雨上二臟如字數音朔下同霒音陰火運不及曰伏明火主夏長不及則水勝故伏明之紀是謂勝長長氣不宣火氣虛也藏氣反布水勝火也收氣自政金無畏也衡平也言不盛也化氣乃衡火不生土也寒為水氣清為金氣水氣勝而金無畏故寒清數舉暑為火氣火不及故暑令乃薄六微旨大論云物之生從於化故承化物生承化物生而火氣虛故生而不長不長故雖成實而猶稚小遇長夏之化氣則物已老火不及故陽氣屈伏水用事故蟄蟲早藏火氣不充故其氣鬱鬱而不和故其用暴心氣不舒故其動彰明內伏變易為寒火氣虛寒其病則痛故其發痛其髒心水氣勝而金無畏則火水金之氣並主其事其果慄桃水與金也其實絡濡火與水也其谷豆稻水與金也其味苦鹹火與水也其色玄丹水與火也其畜馬彘其蟲羽鱗火水也其主水雪霜寒水氣勝也其聲徵羽火與水也其病神虛則昏惑心虛則悲忘凡此火水金並主其事乃火氣不及從水化而然也火運不及故曰少徵水兼用事故少徵與少羽同金氣司天謂之上商歲火不及金無所畏又得司天之助是火運之紀行審平之政故上商與正商同其病昏惑悲忘乃邪傷心也凝慘溧冽水刑火也暴雨霖霪土氣復也凝慘溧冽則火受水刑故曰眚於九南方離位居於九宮也火之子土氣盛覆水地氣騰雲則雨降故其主驟注雷霆震驚火鬱發也沉霒淫雨土濕勝也此火發土勝所謂復也卑監之紀是謂減化化氣不金生政獨彰長氣整雨乃愆收氣平風寒並興草木榮美秀而不實成而粃也其氣散其用靜定其動瘍湧分潰痛腫其發濡滯其臟脾其果李慄其實濡核其谷豆麻其味酸甘其色蒼黃其畜牛犬其蟲保毛其主飄怒振發其聲宮角其病留滿痞塞從木化也少宮與少角同上宮與正宮同上角與正角同其病飧泄邪傷脾也振拉飄揚則蒼干散落其眚四維其主敗折虎狼清氣乃用生政乃辱折音舌下暴折之折同化土氣也減減少也土運不及曰卑監故卑監之紀是謂減化化氣不令土氣胸也生政獨彰木勝土也生政獨彰則木生其火故長氣整化氣不令則地氣不升故雨乃愆期土不生金故收氣平風木氣也寒水氣也土受木刑水無所畏故風寒並興長氣整則草木榮美收氣平則秀而不實秀而不實乃成而粃也木刑其土故其氣散散發散木之氣也土氣不充故其用靜定土主肌肉肌肉不和則瘡爛膿流而癰腫故其動瘍湧分潰癰腫脾土不和則水氣不行故其發濡滯其臟脾木氣勝而水無畏則土木水三氣並主其事其果李慄木與水也其實濡核其谷豆麻水與木也其味酸甘其色蒼黃木與土也其畜牛犬其蟲保毛土與木也其主飄怒振發木氣勝也其聲宮角土與木也其病留滿痞塞土氣不達也留滿痞塞以及飄怒振發乃土氣不及從木化而然也土運不及故曰少宮木兼用事故少宮與少角同土氣司天謂之上宮土運不及上得司天之助故上宮與不正宮同木氣司天謂之上角木兼用事又得司天之氣則木氣敷和故上角與正角同風木之氣傷其中土故其病飧泄留滿痞塞以及飧泄乃邪傷脾也木氣勝故振拉飄揚金氣復則蒼干散落土受木刑土居五宮通於四維故其眚四維土之子金氣盛復木故其主敗折虎狼敗折金能斷物也虎狼西方金獸也金氣勝故清氣乃用辱猶屈也金能平木故生政乃辱其主如是所謂復也從革之紀是謂折收收氣乃後生氣乃揚長化合德火政乃宣庶類以蓄其氣揚其用躁切其動鏗禁瞀厥其發咳喘其臟肺其果李杏其實殼絡其谷麻麥其味苦辛其色白丹其畜雞羊其蟲介羽其主明曜炎鑠其聲商徵其病嚏咳鼽衄從火化也少商與少徵同上商與正商同上角與正角同邪傷肺也炎光赫烈則冰雪霜雹眚於七其主鱗伏彘鼠歲氣早至乃生大寒折猶短也收金氣也金運不及曰從革故從革之紀是謂折收收氣乃後金氣虛也生氣乃揚木無畏也長火氣也化土氣也金不及則大勝生土故長化合德火氣有餘故火政乃宣火政宣則庶類以蕃火主發揚故其氣揚金主鋒利故其用躁切躁切猶鋒利也音聲固閉關竅不通故其動鏗禁瞀厥鏗禁音不出也瞀厥竅不利也肺病發咳喘故其發咳喘其臟肺火氣勝而木無畏則金火木三氣並主其事其果李杏木與火也其實殼絡金與火也其谷麻麥木與火也其味苦辛火與金也其色白丹金與火也其畜雞羊其蟲介羽金與火也其主明曜炎鑠火氣勝也其聲商徵金與火也其病嚏咳鼽衄肺金虛也肺病則金受火刑從火化而然也金運不及故曰少商火兼用事故少商與少徵同金氣司天謂之上商金運不及上得司天之助則上商與正商同木氣司天謂之上角木不畏金又得司天之助故上角與正角同其病嚏咳鼽衄是金從火化邪傷肺也火氣勝故炎光赫烈水氣復則冰雪霜雹金受火刑金主西方兌位居於七宮故眚於七金之子水氣盛復火故其主鱗伏彘鼠鱗水蟲也伏猶復也彘鼠水屬也歲寒之氣早至乃生大寒是小勝其火所謂復也涸流之紀是謂反陽藏令不舉化氣乃昌長氣宣布蟄蟲不藏土潤水泉減草木條茂榮秀滿盛其氣滯其用滲泄其動堅止其發燥槁其臟腎其果棗杏其實濡肉其谷黍稷其味甘鹹其色黅玄其畜彘牛其蟲鱗倮其主埃郁昏翳其聲羽宮上宮與正宮同其病癃閉邪傷腎電埃昏驟雨則振拉摧拔眚於一其主毛顯狐貉變化不藏首二藏末一藏如字貉音芮伐反陽火不畏水也水運不及曰涸流故涸流之紀是謂反陽藏令不舉水不及也化氣乃昌土氣勝也長氣宣布火無畏也蟄蟲不藏水失令也土勝水屈故土潤水泉減土氣專令故草木條茂榮秀滿盛土主濡潤故其氣滯水不上濟故其用滲泄水氣不及則堅上不行故其動堅止腎為水藏燥槁則竭故其發燥槁其藏腎土氣勝而火無畏則水土火三氣並主其事其果棗杏土與火也其實濡肉水與土也其谷黍稷火與土也其味甘鹹其色黅玄土與水也其畜彘牛其蟲鱗倮水與土也其主埃郁昏翳土氣勝也其聲羽宮火與土也其病痿厥堅下水氣不濡也蓋津液不和於四肢則痿厥水氣不注於二陰則堅下痿厥堅下並埃郁昏翳乃水氣不及從土化而然也水運不及故曰少羽土兼用事故少羽與少宮同土氣司天謂之上宮土兼用事上得司天之助則上宮與正宮同小便不利曰癃大便不利曰閉其病癃閉乃邪傷腎也土氣勝故埃昏驟雨水氣復則振拉摧拔水受土刑故眚於一水主北方坎位居於一宮也水之子木氣盛復土故其主毛顯狐貉變化不藏狐貉毛蟲也毛蟲以毛為顯狐貉多疑善變化變化則不藏此水之子木氣盛復土所謂復也故乘危而行不速而至暴虐無德災反及之微者復微甚者復甚氣之常也總結上文勝復之意歲運不及勝氣侮之故勝氣之行乘危而行勝氣之至不速而至始則暴虐無德即則災反及之勝微者受復亦微勝甚者受復亦甚此先勝後復而為運氣之常數也發生之紀是謂啟陳土疏泄蒼氣達陽和布化陰氣乃隨生氣淳化萬物以榮其化生其氣美其政散其令條舒其動掉眩巔疾其德鳴靡啟坼其變振拉摧拔其谷麻稻其畜雞犬其果李桃其色青黃白其味酸甘辛其象春其經足厥陰少陽其藏肝脾其蟲毛介其物中堅外堅其病怒太角與上商同上徵則其氣逆其病吐利不務其德則收氣復秋氣勁切甚則肅殺清氣大至草木凋零邪乃傷肝木運太過曰發生發生者推陳致新故是謂啟陳木盛土衰故土疏泄疏泄虛薄也蒼氣木氣也木盛故蒼氣達木主春生故陽和布化厥陰主木故陰氣乃隨陽和布化則生氣淳化陽主生物也陰氣乃隨則萬物以榮陰主成物也其化生春生之氣也其氣美春日之和也其政散木之暢達也其令條舒木之生髮也其動掉眩巔疾風氣淫於上也風聲曰鳴其德鳴靡啟坼物從風而靡靡而啟坼也其變振拉摧拔風淫太過撓萬物也木雖太過太過而往不及隨之故木金土三氣並主其事其谷麻稻木與金也其畜雞犬金與木也其果李桃木與金也其色青黃白其味酸甘辛木土金三氣也其象春春屬木也其經足厥陰少陽足厥陰肝木也足少陽膽木也其藏肝脾木與土也其蟲毛介其物中堅外堅木與金也其病怒肝病也木運太過故曰太角丁壬運木六丁主不及六壬主太過六壬無卯酉燥金之司天今曰與上商同者如丁卯丁酉之歲金勝其木而金氣司天之太過也木運太過木生其火而金氣司天之太過也木運太過木生其火又值火氣司天謂之上徵子居母上則其氣逆氣逆則其病吐利木氣太過故曰不務其德始則木盛土屈繼則土伸金復故收氣復復則秋氣勁切甚則肅殺金刑木也清氣大至草木凋零而邪乃傷肝赫曦之紀是謂蕃茂陰氣內化陽氣外榮炎暑施化物得以昌其化長其氣高其政動其令鳴顯其動炎灼妄擾其德喧暑鬱蒸其變炎烈沸騰其穀麥豆其畜羊彘其果杏慄其色赤白玄其味苦辛鹹其象夏其經手少陰太陽手厥陰少陽其藏心肺其蟲羽鱗其物脈濡其病笑瘧瘡瘍血流狂妄目赤上羽與正徵同其收齊其病痓上徵而收氣後也暴烈其政藏氣乃復時見徵慘甚則雨水霜雹切寒邪傷心也藏如字見音現下見同火運太過曰赫曦火主夏長故是謂蕃茂少陰之上君火主之少陰在下故陰氣內化君火在上故陽氣外榮火司夏令故炎暑施化萬物充盛故物得以昌其化長夏長之氣也其氣高炎熱之氣也其政動火之飛揚也其令鳴顯火之光焰也其動炎灼妄擾火淫於外也其德喧暑鬱蒸火之溫熱而不平也其變炎烈沸騰火淫而銷鑠毀傷也火雖太過太過而往不及隨之故火水金三氣並主其事其穀麥豆其畜羊彘其果杏慄火與水也其色赤白玄其味苦辛鹹火金水也其象夏夏屬火也其經手少陰太陽手厥陰少陽蓋手少陰主心火而手太陽小腸為之府手厥陰主心色而手少陽三焦為之府其藏心肺火與金也其蟲羽鱗其物脈濡火與水也其病笑瘧瘡瘍血流狂妄目赤皆心藏火熱之病也戊辰戊戌歲太陽寒水司天謂之上羽火運太過上臨寒水則火氣以平故與升明之正徵同火氣既平金不受傷故其收齊齊足也火主經脈寒水上臨火氣受傷故其病痓痓經脈病也戊子戊午戊寅戊申君相二火司天謂之上徵火運太過司天助之則金氣受傷而收氣後也後退伏也火氣太過故暴烈其政始則火淫繼則水勝故藏氣乃復時見凝慘甚則水盛火滅故雨水霜雹切寒而邪乃傷心敦阜之紀是謂廣化厚德清靜順長以盈至陰內實物化充成煙埃朦郁見於厚土大雨時行濕氣乃用燥政乃避其化園其氣豐其政靜其令周備其動濡積並稸其德柔潤重淖其變震驚飄驟崩潰其谷稷麻其畜牛犬其果棗李其色黅玄黃其味鹹酸其象長夏其經足太陰陽明其藏脾腎其蟲倮毛其物肌核其病腹滿四肢不舉大風迅至邪傷脾也重平聲長夏之長平聲長命及生氣以長之長俱同土運太過曰敦阜土氣廣厚萬物化成故是謂廣化土氣有餘則厚德清淨順夏長之氣以充盈土太陰也太陰至陰也故至陰內實而物化充成也煙埃朦郁謂塵埃煙冒如雲霧之朦郁見於厚土見於山陵高阜之上也雲霧上升則大雨時行而濕氣乃用濕氣用事故慘政退闢其化園土之周遍也其氣豐土之敦厚也其政靜土之安靜也其令周備土之四應也其動濡積並稸濕氣積稸土濡滯也其德柔潤重淖土氣濡順重複灌溉也其變震驚飄驟土淫太過動而不靜也崩潰土幾墮矣土雖太過太過而往不及隨之故土木水三氣並主其事其谷稷麻其畜牛犬其果棗李土與木也其色黅玄蒼其味甘鹹酸土水木也其象長夏長夏屬土也其經足太陰陽明蓋足太陰主脾土而陽明胃為之府其藏脾腎土與水也其蟲倮毛其物肌核土與木也其病腹滿四肢不舉皆脾病也始則土淫繼則木勝故大風迅至木盛上衰而邪乃傷脾堅成之紀是謂收引天氣潔地氣明陽氣隨陰治化燥行其政物以司成收氣繁布化洽不終其化成其氣削其政肅其令銳切其動暴折瘍疰其德霧露蕭瑟其變肅殺凋零其谷稻黍其畜雞馬其果桃杏其色白青丹其味辛酸苦其象秋其經手太陰陽明其藏肺肝其蟲介羽其物殼絡其病喘喝胸憑仰息上徵與正商同其生齊其病咳政暴變則名木不榮柔脆焦首長氣斯救大火流炎爍且至蔓將槁邪傷脾也金運太過曰堅成金主秋收故是謂收引秋時天氣清潔天氣清潔則地氣光明夏為陽秋為陰至秋則陽熱之氣隨陰治化金在天為燥故燥行其政夏長秋成故物以司成金氣太過故秋收之氣繁盛舒布至夏長之氣化洽不終化洽者化氣洽於萬物秋氣早至故化洽不終其化成秋之收成也其氣削金之削物也其政肅金之清肅也其令銳切金之剛勁也其動暴折瘍疰金之刑辟也其德霧露蕭瑟金之柔潤也其變肅殺凋零金之清銳也金雖太過太過而往不及隨之故金火木三氣並主其事其谷稻黍其畜雞馬其果桃杏金與火也其色白青丹其味辛酸苦金木火也其象秋秋屬金也其經手太陰陽明蓋手太陰主肺金而手陽明大腸為之府也其臟肺肝金與木也其蟲介羽其物殼絡金與火也其病喘喝胸憑仰息皆肺病也金氣太過當庚子庚午庚寅庚申之歲上見少陰少陽司天謂之上徵金太過而火司天則金氣自平故與正商同木主生金氣已平故其生齊齊者逐其生也其病咳肺病也金氣太過暴變其政則堅剛之名木不榮柔脆之草類焦首始則金淫繼則火勝火主夏長故長氣斯救救猶復也長氣斯救則大火以流大火流則炎爍且至藤蔓將槁金受火刑邪傷肺也流衍之紀是謂封藏寒司物化天地嚴凝藏政以布長令不揚其化凜其氣堅其政謐其令流注其動漂泄沃湧其德凝慘寒雰其變冰雪霜雹其谷豆稷其畜彘牛其果慄棗其色黑丹黅其味鹹苦甘其象冬其經足少陰太陽其藏腎心其蟲鱗倮其物濡滿其病脹上羽而長氣不化也政過則化氣大舉而埃昏氣交大雨時降邪傷腎也首二藏如字水運太過曰流衍水主冬令氣機閉密故是謂封藏水在天為寒故寒司物化而天地嚴凝冬令之藏政以布則水勝其火故長令不揚其化凜水之凜冽也其氣堅水之堅凝也其政謐水之安靜也其令流注水之滋灌也其動漂泄沃湧水之泛溢也其德凝慘寒雰水之聚而能散也雰雪飛貌其變冰雪霜雹水淫太過轉柔為剛也水雖太過太過而往不及隨之故水土火三氣並主其事其畜彘牛其果慄棗水與土也其色黑丹黅其味鹹苦甘水火土也其象冬冬屬水也其經足少陰太陽蓋足少陰主腎水而足太陽膀胱為之府其臟腎心水與火也其蟲鱗倮其物濡滿水與土也其病脹脾土之病也水運太過當丙辰丙戌之歲太陽寒水上臨謂之上羽水太過而水上臨則長氣不能施化長氣火氣也水政太過始則水淫繼則土勝故化氣大舉而埃昏氣交埃昏氣交地氣上升也地氣上升故大雨時降土氣有餘則邪傷腎也故曰不恆其德則所勝來復政恆其理則所勝同化此之謂也暴烈其政不務其德是不恆其德也化氣政令是政恆其理也承上文意而總結之言不恆其德則所勝來復如木之收氣復火之藏氣乃復土之大風至金之大火流水之化氣大舉者是也政恆其理則所勝同化如谷畜果蟲皆勝氣同化五色五味則兼三氣者是也即此歲運太過不及而有淫復之謂也此一節論五行平氣並不及太過之政也帝曰天不足西北左寒而右涼地不滿東南右熱而左溫其故何也承上文五運太過不及之意問天地四方亦有太過不及也天為陽陽氣溫熱地為陰陰氣寒涼天不足西北則西北方之陽氣少故左右寒涼地不滿東南則東南方之陰氣少故左右溫熱所以不足不滿者其故何也岐伯曰陰陽之氣高下之理太少之異也東南方陽也陽者其精降於下故右熱而左溫西北方陰也陰者其精奉於上故左寒而右涼是以地有高下氣有溫涼高者氣寒下者氣熱故適寒涼者脹之溫熱者瘡下之則脹已汗之則瘡已此腠理開閉之常太少之異耳太有餘也少不足也天不足西北地不滿東南乃陰陽之天氣高下之地理其中有太少之異也東南為陽故東南方陽也陽者陽氣有餘其陰精之氣則降於下陰精下降陽氣有餘故右熱而左溫西北為陰故西北方陰也陰者陰氣有餘陰精之氣奉於上陰精上奉陽氣不足故左寒而右涼又西北地高東南地下西北地涼東南地溫是以地有高下氣有溫涼溫猶熱也涼猶寒也故高者氣寒下者氣熱適往也故往西北寒涼之方者陰氣有餘則病脹之亦往也往東南溫熱之方者陽氣有餘則生瘡下之者天氣下降之意陰寒而得陽熱則脹已汗之者地氣上升之意陽熱而得陰液則瘡已西北寒涼腠理多閉少開東南溫熱腠理多開少閉故曰此腠理開閉之常其中有太少之異耳帝曰其於壽夭何如陰陽高下其中有太少之異則太為有餘有餘則壽少為不足不足夭則故問其於壽夭何如岐伯曰陰精所奉其人壽陽精所降其人夭西北方陰也其精奉於上東南方陽也其精降於下故陰精所奉之方其人壽陽精所降之方其人夭是西北壽而東南夭也帝曰善其病也治之奈何陰精所奉之方其人壽陽精所降之方其人夭是以西北病少東南病多帝故善之而探治病之法也岐伯曰西北之氣散而寒之東南之氣收而溫之所謂同病異治也故曰氣寒氣涼治以寒涼行水漬之氣溫氣熱治之溫熱強其內守必同其氣可使平也假者反之西北腠理常閉其氣有餘故治西北之病氣當散而寒之東南腠理常開其氣不足故治東南之病氣當收而溫之一散一收一寒一溫所謂同病異治也西北之人外雖寒閉內則有餘而熱東南之人外雖溫開內則不足而寒故曰西北氣寒氣涼復當治以寒涼行水漬之以開其閉此散而寒之之法也東南氣溫氣熱復當治以溫熱強其內守必內外和同其氣然後可使平也此收而溫之之法也如西北之人外寒涼而內不熱亦當治以溫熱東南之人外溫熱而內不寒亦當治以寒涼故曰假者反之帝曰善一州之氣生化壽夭不同其故何也西北之氣外寒涼而內有餘東南之氣外溫熱而內不足假者反之則西北寒涼其內亦有不足東南溫熱其內亦有有餘帝故善之復問一州之氣亦有生化壽夭之不同不必東南西北之殊其故何也岐伯曰高下之理地勢使然也崇高則陰氣治之汙下則陽氣治之陽勝者先天陰勝者後天此地理之常生化之道也一州之中亦有四方高下之理乃地勢使然也地勢崇高則陰氣治之地勢汙下則陽氣治之陽氣治之而陽勝者四時之氣常先天陰氣治之而陰勝者四時之氣常後天先天則生化早後天則生化遲此地理陰陽高下之常而有生化遲早之道也帝曰其有壽夭乎帝問生化壽夭故復問生化之中其有壽夭乎岐伯曰高者其氣壽下者其氣夭地之小大異也小者小異大者大異故治病者必明天道地理陰陽更勝氣之先後人之壽夭生化之期乃可以知人之形氣矣更平聲地高者陰氣治之陰精所奉其人壽故高者其氣壽地下者陽氣治之陽精所降其人夭故下者其氣夭高則氣大下則氣小高者下者乃地之小大異也略高略下高下之小者其壽夭小異極高極下高下之大者其壽夭大異故治病者必明上天之道下地之理其中有陰陽之更勝有時氣之先後以此決人之壽夭及生化之期乃可以知人之形氣矣靈樞壽夭篇云形與氣相任則壽不相任則夭立形定氣而視壽夭者是也帝曰善其歲有不病而藏氣不應不用者何也生化壽夭之理既明帝故善之謂西北東南同病異治其終歲有不病而人身臟氣不應陰陽之氣不用高下之理則無有太少之異者其故何也岐伯曰天氣制之氣有所從也制猶御也歲有不病而臟氣不應不用者乃司天之氣御於上天氣合於人身氣有所從故不病也帝曰願卒聞之天氣制之氣有所從之道願盡聞之岐伯曰少陽司天火氣下臨肺氣上從白起金用草木眚火見燔焫革金且耗大暑以行咳嚏鼽衄鼻窒口瘍寒熱胕腫風行於地塵沙飛揚心痛胃脘痛厥逆膈不通其主暴速凡寅申之歲少陽司天少陽相火也故火氣下臨司天之氣制於人身人受其制故肺氣上從肺色白而屬金故白起金用白起金用則草木乃眚金刑木也火見燔焫少陽之氣也革金且耗金受火刑則金變革而虛耗也火氣盛故大暑以行咳嚏鼽衄鼻窒肺病也口瘍寒熱胕腫火病也少陽司天則厥陰在泉厥陰風氣也故風行於地風行於地則塵沙飛揚厥陰經脈屬心包故心痛胃絡上通心包故胃脘痛心痛胃脘痛則陰陽之氣不相順接故厥逆而膈不通風氣急疾故其主暴速有司天則有在泉故並論之陽明司天燥氣下臨肝氣上從蒼起木用而立土乃眚淒滄數至木伐草萎脅痛目赤掉振鼓慄筋痿不能久立暴熱至土乃暑陽氣鬱發小便變寒熱如瘧甚則心痛火行於槁流水不冰蟄乃見數音朔下同凡卯酉之歲陽明司天陽明燥金也故燥氣下臨司天之氣制於人身人受其制故肝氣上從肝色蒼而屬木故蒼起木用而立蒼起木用則土乃眚木刑土也淒滄數至金氣勝也木伐草萎金刑木也脅痛目赤肝木病也掉振鼓慄肝虛病也筋痿不能久立肝主筋也陽明司天則少陰在泉少陰熱氣也故暴熱至暴熱至則土乃暑而陽氣鬱發熱入於內則小便變熱行於外則寒熱如瘧甚則熱氣自傷而心痛客氣加臨則君火加於六氣故火氣行於草木枯槁之時致冬令流水不冰蟄蟲乃見而不藏太陽司天寒氣下臨心氣上從而火且明丹起金乃眚寒清時舉勝則水冰火氣高明心熱煩嗌乾善渴鼽嚏喜悲數欠熱氣妄行寒乃復霜不時降善忘甚則心痛土乃潤水豐衍寒客至沉陰化濕氣變物水飲內稸中滿不食皮𤸷肉苛筋脈不利甚則胕腫身後癰𤸷音群凡辰戌之歲太陽司天太陽寒水也故寒氣下臨司天之氣制於人身人受其制故心氣上從心屬火其色丹而今火且明丹起火明丹起則金乃眚火刑金也寒清時舉勝則水冰司天之氣也火氣高明上從之氣也心熱煩嗌乾善渴火病也鼽嚏喜悲火刑金也數欠陰陽相引也始病熱氣妄行既則寒乃復復則寒氣盛故霜不時降心火虛故善忘甚則心痛太陽司天則太陰在泉太陰濕氣也故土乃潤濕者水之類故水豐衍水濕則寒故寒客至寒濕為陰其性下沉而屬土故沉陰化而濕氣變物濕氣變物則水飲內搐致民病中滿不食𤸷痹也苛不安也皮痹而肉不安則筋脈亦不利甚則胕腫上文少陽司天寒熱胕腫因於熱也此太陰胕腫因於寒也身後癰謂癰發於背不能上承太陽蓋太陽分部於背也厥陰司天風氣下臨脾氣上從而土且隆黃起水乃眚土用革體重肌肉萎食減口爽風行太虛雲物搖動目轉耳鳴火縱其暴地乃暑大熱消爍赤沃下蟄蟲數見流水不冰其發機速凡巳亥之歲厥陰司天厥陰風氣也故風氣下臨司天之氣制於人身人受其制故脾氣上從脾屬土其色黃而今土且隆黃起上隆黃起則水乃眚土刑水也風木氣盛故土用革革變革也體重肌肉萎脾病也食減口爽言所食減少則口中乃爽以明飽食則口中不和亦脾病也風氣在上則風行太虛雲物搖動其在於人則目轉耳鳴厥陰司天則少陽在泉少陽火氣也故火縱其暴而地乃暑暑猶熱也地暑則大熱消爍津液受熱則赤沃下火氣主開故蟄蟲數見火性溫熱故流水不冰火體急暴故其發機速少陰司天熱氣下臨肺氣上從白起金用草木眚喘嘔寒熱嚏鼽衄鼻窒大暑流行甚則瘡瘍燔灼金爍石流地乃燥清淒滄數至脅痛善太息肅殺行草木變凡子午之歲少陰司天少陰君火也故熱氣下臨司天之氣制於人身人受其制故肺氣上從白起金用草木眚與少陽司天之氣同亦金氣從火金刑木也喘嘔寒熱嚏鼽衄鼻窒亦肺病也大暑流行熱氣盛也甚則瘡瘍燔灼金爍石流如焚如焰也少陰司天則陽明在泉陽明者金也其氣燥而清故地乃燥清燥清則淒滄數至金刑其木故脅痛而肝病善太息而膽病且肅殺行而草木變太陰司天濕氣下臨腎氣上從黑起水變埃冒雲雨胸中不利陰痿氣大衰而不起不用當其時反腰脽痛動轉不便也厥逆地乃藏陰大寒且至蟄蟲早附心下痞痛地縫冰堅少腹痛時害於食乘金則止水增味乃咸行水減也便平聲藏如字痞批上聲凡丑未之歲太陰司天太陰濕氣也故濕氣下臨司天之氣制於人身人受其制故腎氣上從腎色黑屬水故黑起水變黑起則塵埃如冒水變則雲雨水制其火則胸中不利陰痿陰前陰也陰痿則氣大衰而生陽之氣不起不用當黑起水變時不但水受其眚反腰脽痛動轉不便也腰脽痛則腎精虛腎精虛則動轉不便此陰陽之氣不相交接故曰厥逆太陰司天則太陽在泉太陽寒水也故地乃藏陰大寒且至寒氣早故蟄蟲早附火氣虛故心下痞痛寒水凝結則地裂冰堅寒水之氣逆於下則少腹痛寒水之氣留於中則時害於食寒水之氣上乘肺金則水天一氣旋轉運行故乘金則痛止乘金則金生其水故水增味乃咸水增味鹹當行其水則水減而寒氣乃平也凡此司天在泉三陽三陰皆天氣制於上氣有所從而如是也帝曰歲有胎孕不育治之不全何氣使然司天之氣制於上則氣有所從其歲有胎孕不育治之不全則何氣制之而使然岐伯曰六氣五類有相勝制也同者盛之異者衰之此天地之道生化之常也六氣司天不外五行故六氣五類有相勝制也如司天之氣則生物蕃盛故同者盛之如司天之氣異於運氣有所勝制則生物衰微故異者衰之此天地盛衰之道而為生化之常也故厥陰司天毛蟲靜羽蟲育介蟲不成在泉毛蟲育倮蟲耗羽蟲不育凡厥陰司天則少陽在泉厥陰木也故厥陰司天主毛蟲靜毛蟲木蟲也靜安靜也少陽相火也故主羽蟲育羽蟲火蟲也育生育也巳亥之歲厥陰司天歲當癸巳癸亥受火運之勝制則金類之介蟲不成介蟲金蟲也凡厥陰在泉則少陽司天厥陰木也故厥陰在泉主木類之毛蟲育木製其土故倮蟲耗倮蟲土蟲也耗虛耗也寅申之歲少陽司天歲當丙寅丙申受水運之勝制則火類之羽蟲不育少陰司天羽蟲靜介蟲育毛蟲不成在泉羽蟲育介蟲耗不育凡少陰君火司天則陽明燥金在泉故少陰司天主火類之羽蟲靜而金類之介蟲育子午之歲少陰司天歲當庚子庚午受金運之勝制則本類之毛蟲不成凡少陰在泉則陽明司天少陰火也故羽蟲育卯酉之歲陽明司天歲當癸卯癸酉受火運之勝制則金類之介蟲耗而且不育太陰司天倮蟲靜鱗蟲育羽蟲不成在泉倮蟲育鱗蟲不成凡太陰濕土司天則太陽寒水在泉故太陰司天主土類之倮蟲靜而水類之鱗蟲育丑未之歲太陰司天歲當辛丑辛未受水運之勝制則火類之羽蟲不成凡太陰在泉則太陽司天太陰土也故倮蟲育辰戌之歲太陽司天歲當甲辰甲戌受土運之勝制則水類之鱗蟲不成少陽司天羽蟲靜毛蟲育倮蟲不成在泉羽蟲育介蟲耗毛蟲不育凡少陽相火司天則厥陰風木在泉故主火類之羽蟲靜而木類之毛蟲育當壬寅壬申之歲受木運之勝制則土類之倮蟲不成凡少陽在泉則厥陰司天少陽火也故羽蟲育火盛金衰故介蟲耗當乙巳乙亥之歲受金運之勝制則木類之毛蟲不育陽明司天介蟲靜羽蟲育介蟲不成在泉介蟲育毛蟲耗羽蟲不成凡陽明爆金司天則少陰君火在泉故主金類之介蟲靜而火類之羽蟲育當癸卯癸酉之歲受火運之勝制則金類之介蟲不成凡陽明在泉則少陰司天陽明金也故介蟲育金盛木衰故毛蟲耗當丙子丙午之歲受木運之勝制則火類之羽蟲不成太陽司天鱗蟲靜倮蟲育在泉鱗蟲耗倮蟲不育凡太陽寒水司天則太陰濕土在泉故太陽司天主水類之鱗蟲靜而土類之倮蟲育太陽在泉則太陰司天當己丑己未之歲受土運之勝制則水類之鱗蟲耗當丁丑丁未之歲受土運之勝制則土類之倮蟲不育按上文厥陰少陰等凡司天而此蟲靜者則在泉必此蟲育蓋靜者育之基太陽司天而鱗蟲靜在泉當云鱗蟲育今不云育而云耗以明生育有常有變終舉太陽如是可以例推於厥陰少陰等亦有靜而不育者矣諸乘所不成之運則甚也故氣主有所制歲立有所生總結上文而言六氣司天六氣在泉受五運之勝制則諸蟲耗不育不成故曰諸乘所不成之運則受制之甚也然五行之理制而後生故氣主有所制則歲立有所生謂六氣主乎上下而有所制則五行在中以立歲運而有所生也地氣制己勝天氣制勝己天制色地制形地氣在泉之氣也地制己勝如上文厥陰在泉倮蟲耗少陰在泉介蟲耗不育太陰在泉鱗蟲不成少陽在泉介蟲耗陽明在泉毛蟲耗者是也天氣司天之氣也天氣制勝己如上文少陽少陰司天火熱下臨則白起金用陽明司天燥氣下臨則蒼起木用太陽司天寒氣下臨則火明丹起厥陰司天風氣下臨則土隆黃起太陰司天濕氣下臨則黑起水變者是也天氣制於上而白蒼丹黃黑色起而應之是天制色也地氣制於下而諸蟲耗及不育不成是地制形也五類衰盛各隨其氣之所宜也上文云六氣五類有相勝制同者盛之異者變之此復承上文形色制勝之意而言五類盛衰各隨天氣地氣之所宜以為衰盛也故有胎孕不肓治之不全此氣之常也所謂中根也根於外者亦五故生化之別有五氣五味五色五類五宜也五類衰盛則生化不全故歲有胎孕不育治之不全此氣運之常也五運在中萬物生化所謂中根也六氣在外合於五行是根於外者亦五故萬物生化之別其中各有五氣五味五色五類五宜以為生化之別也帝曰何謂也生化之別何謂也岐伯曰根於中者命曰神機神去則機息根於外者命曰氣立氣止則化絕故各有制各有勝各有生各有成故曰不知年之所加氣之同異不足以言生化此之謂也五運在中故根於中者命曰神機若神去則機息六氣在外故根於外者命曰氣立若氣止則化絕根中根外故運氣各有所制各有所勝各有所生各有所成必知年之所加氣之同異乃可以言生化之道苟不知此不足以言生化引六節藏象之言而言即此神機氣立之謂也帝曰氣始而生化氣散而有形氣布而蕃育氣終而象變其致一也然而五味所資生化有薄厚成熟有少多終始不同其故何也承上文五類衰盛之意而言一歲四時萬物同受其氣始而生化散而有形布而蕃育終而象變萬物盡然其致一也然而五味所資何以生化有薄厚成熟有少多終始不同故舉以問岐伯曰地氣制之也非天不生地不長也生化薄厚成熟少多乃地氣制之而然也此非天氣之不生實地氣有以制之而不長也帝曰願聞其道願聞制之之道岐伯曰寒熱燥濕不同其化也制之之道乃寒則不熱熱則不寒燥則不濕濕則不燥寒熱燥濕不同其化有以制之如下文所云也故少陽在泉寒毒不生其味辛其治苦酸其谷蒼丹地氣制之故但論在泉之氣在泉者地氣也少陽火也故少陽在泉熱而不寒則寒毒不生毒猶獨也陰陽不和偏勝則毒也火制其金不但寒毒不生其味辛者亦不生也苦火味也酸木味也蒼木色也丹火色也少陽火氣在泉上承厥陰之木氣故其治苦酸其谷蒼丹陽明在泉濕毒不生其味酸其氣濕其治辛苦甘其谷丹素陽明在泉燥而不濕故濕毒不生金制其木其味酸者亦不生也又曰其氣濕者申明其味之酸一如其氣之濕猶之濕毒之不生也辛金味也苦火味也甘土味也陽明在泉秉金土之氣而上承少陰之火熱故其治辛苦甘丹火色也素金色也故其谷丹素太陽在泉熱毒不生其味苦其治淡咸其谷黅秬太陽在泉寒而不熱故熱毒不生水制其火其味苦者亦不生也淡味附於甘淡土味也咸水味也黅土色也秬乃黑黍水之谷也太陽在泉上承太陰太陰者土也故其治淡咸其谷黅秬厥陰在泉清毒不生其味甘其治酸苦其谷蒼赤其氣專其味正厥陰在泉風氣屬陽故清毒不生木製其土其味甘者亦不生也厥陰在泉上承少陽故其治酸苦其谷蒼赤上承少陽則在泉者厥陰中見者亦厥陰在泉中見無有二氣故其氣專在泉中見無有二味故其味正專不二也正不偏也少陰在泉寒毒不生其味辛其治辛苦甘其谷白丹少陰少陽皆屬於火故寒毒不生其味辛與少陽相同解亦同之少陰在泉上承陽明陽明秉金土之氣故其治辛苦甘其谷白丹太陰在泉燥毒不生其味鹹其氣熱其治甘鹹其谷黅秬化淳則咸守氣專則辛化而俱治太陰在泉濕而不燥故燥不毒生土製其水其味鹹者亦不生也又曰其氣熱者謂燥同於熱燥毒不生則熱毒亦不生以燥熱之同而類推之則寒於同濕風氣同於燥清氣同於寒亦舉一以例其餘也甘土味也咸水味也黅土色也秬黑黍也太陰在泉上承太陽故其治甘鹹其谷黅秬淳柔和也化淳上承太陽柔和之水化也化淳則咸守言太陰在泉土製其水鹹味不生上承太陽水化之淳則咸守氣專則辛化而俱治言辛屬燥金之味太陰在泉燥毒不生若太陰之氣專一則土生其金辛味生化而與太陰俱治太陰如是余可類推舉一以例其餘聖人立言之法也故曰補上下者從之治上下者逆之以所在寒熱盛衰而調之故曰上取下取內取外取以求其過能毒者以厚藥不勝毒者以薄藥此之謂也上下司天在泉也上下之氣不足則補有餘則治故曰補上下者從之從順也如木火不足則用酸苦之味以補之金水不足則用辛鹹之味以補之補猶助也治上下者逆之逆反也如風淫所勝治以辛涼熱淫所勝治以鹹寒寒淫所勝治以甘溫之類治猶平也所謂從之逆之者乃以所在之寒熱或盛或衰而調之使和也司天在泉則有上下五運在中則有內外取其有過者而熱治之故曰上取下取內取外取以求其過其氣有餘能勝毒者投以厚味之藥其氣不足不勝毒者投以薄味之藥即以求其過而訊之謂也氣反者病在上取之下病在下取之上病在中旁取之申明上下內外病氣有相反者則病在上當取之下謂氣壅於上而宜降之也病在下當取之上謂氣滯於下而宜升之也病在中當取之外而左右旁取之謂氣逆於中通其經脈而旁達之也治熱以寒溫而行之治寒以熱涼而行之治溫以清冷而行之治清以溫熱而行之申明寒熱盛衰有從治之法有逆治之法治熱以寒以寒藥而治熱病也溫而行之服藥宜溫溫則寒性之藥始行於熱分而治之治寒以熱以熱藥而治寒病也涼而行之服藥宜涼涼則熱性之藥始行於寒分而治之此以寒治熱以熱治寒而有從治之法也治溫以清冷而行之以清藥而治溫病且冷服以行其溫治清以溫熱而行之以溫藥而治清病且熱服以行其清此以清治溫而且冷以溫治清而且熱為逆治之法也故消之削之吐之下之補之瀉之久新同法申明上下內外病氣相反者則有正取之法故內取而消之外取而削之上取而吐之下取而下之從而補之逆而瀉之久病新病同一正取之法也帝曰病在中而不實不堅且聚且散奈何因消削吐下之言復為此問岐伯曰悉乎哉問也無積者求其藏虛則補之藥以祛之食以隨之引水漬之和其中外可使畢已內外之病求之於經上下之病求之於府若病在中不實不堅且聚且散而無積者當求之藏藏虛則補之或先用藥以祛其邪隨用食以養其正或行水漬之以取其汗則中外皆和虛中有邪可畢已帝曰有毒無毒服有約乎約規則也上文云能毒以厚藥不勝毒以薄藥是厚藥有毒薄藥無毒因問有毒無毒之藥服之其有規則乎岐伯曰病有久新方有大小有毒無毒固宜常制矣大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九穀肉果菜食養盡之無使過之傷其正也不盡行復如法必先歲氣無伐天和無盛盛無虛虛而遇人夭殃無致邪無失正絕人長命食音嗣凡病有久新處方有大小因病處方用有毒無毒之藥固宜有經常之制矣是以大毒治病十去其六而止常毒治病十去其七而止小毒治病十去其八而止無毒治病十去其九而止服藥之外更兼穀肉果菜為之谷養使病盡除去之毒藥攻邪中病即止無使過之傷其正也穀肉果菜食養之而病不盡復欲治之其行復如前法然必先知歲氣之太過不及無過用毒藥伐其天和太過而補是盛盛也不以而消是虛虛也故無盛盛無虛虛而遺人夭殃盛盛則致邪虛虛則失正故無致邪無失正而絕人長命斯可矣帝曰其久病者有氣從不康病去而瘠奈何氣從而順此身宜康其病已去此形宜強其有久病者氣從而身反不康病已去而身反瘠其故何也岐伯曰昭乎昭聖人之問也化不可代時不可違夫經絡以通血氣以從復其不足與眾齊同養之和之靜以待謹守其氣無使傾移其形丹彰生氣以長命曰聖王故大要曰無代化無違時必養必和待其來復此之謂也帝曰善天之氣化即人之氣化也故化不可代天之四時即人之四時也故時不可違病則經絡不通血氣不從病去則經絡以通血氣以從病則正氣不足不與眾同病去則復其不足與眾齊同然病雖去尤必養之和之靜以待時謹守其氣無使傾移然後其形乃彰生氣以長命曰壽世之聖王化不可代時不可違養之和之靜以待時故大要曰無代化無違時必養必和待其來復此即帝問之謂也帝故善之此一節言陰陽太少之異五類盛衰之理五運六氣根中根外皆為五常之政也六元正紀大論第七十三篇天無紀大論引太始天元玉冊之言曰厥陰之上風氣主之少陰之上熱氣主之太陰之上濕氣主之少陽之上相火主之陽明之上燥氣主之太陽之上寒氣主之所謂本也是謂六元此篇以六元而正六十歲之紀司天在上在泉在下化運在中陽年主太陰年主少太主太過少主不及其中有化有變有勝有復有用有病不同其候帝以岐伯之言藏靈蘭之室署曰六元正紀故以名篇黃帝問曰六化六變勝復淫治甘苦辛鹹酸淡先後余知之矣夫五運之化或從天氣或逆天氣或從天氣而逆地氣或從地氣而逆天氣或相得或不相得余未能明其事欲通天之紀從地之理和其運調其化使上下合德無相奪倫天地升降不失其宜五運宣行勿乖其政調之正味從逆奈何上篇六氣司天六氣在泉有化有變始焉淫勝既則復治舉甘苦辛鹹酸淡之味先後主治帝承上篇之意而言六氣之化六氣之變有勝有復有淫有治以及甘苦辛鹹酸淡之味先後用之余已知之矣若夫五運之化或從司天之氣或逆司天之氣或從司天之天氣而逆在泉之地氣或從在泉之地氣而逆司天之天氣從猶同也逆猶異也五運上下或相得而同或不相得而異未能盡明其事今余欲通上天之紀從下地之理和其在中之運調其上下之化使上下合德無相奪倫而天地升降不失其四時之宜五運宣行勿乖其五常之政更欲調之正味之從逆以為民病之治所以承上篇之意而問五運六氣相合之道也岐伯稽首再拜對曰昭乎哉問也此天地之綱紀變化之淵源非聖帝孰能窮其至理歟臣雖不敏請陳其道令終不滅久而不易天地之綱紀有條不紊變化之淵源神妙莫測至理所在萬古不沒惟聖人能問而窮之帝曰願夫子推而次之從其類序分其部主別其宗司昭其氣數明其正化可得聞乎別音必從其類序如子與午合醜與未合等從五行之類而序之也分其部主如厥陰主初之氣少陰主二之氣等藏分六部各主一氣也別其宗司如少陰司歲熱氣宗之太陽司歲寒氣宗之等別其六氣之宗以為三陰三陽之司歲也昭其氣數如子寅辰午申戌主太過合五行之成數丑未巳未酉亥主不及合五行之生數昭其陰陽之六氣以合五行生成之數也明其正化如甲己化土乙庚化金等厥陰風化少陰熱化等明五運六氣之正化以候客邪之氣也帝欲推而次之以明六元正紀之義岐伯曰先立其年以明其氣金木水火土運行之數寒暑燥濕風火臨御之化則天道可見民氣可調陰陽卷舒近而無惑數之可數者請遂言之末數上聲先立其年者立其五運在中之年也以明其氣者明其司天在泉上下之氣也立年明氣如金木水火土運行之數寒暑燥濕風火臨御之化皆可得而明矣能如是也則天道可見民氣可調陰陽卷舒近而無惑至數之可數者請得而遂言之也帝曰太陽之政奈何先天之氣始於厥陰終於太陽後天之氣始於太陽終於厥陰以六氣而正歲數乃後天之氣故首問太陽之政岐伯曰辰戌之歲也太陽太角太陰壬辰壬戌其運風其化鳴紊啟坼其變振拉摧拔其病眩掉目瞑太角少徵太宮少商太羽辰戌屬太陽故太陽之政辰戌之歲也辰戌之歲太陽司天在上辰戌為陽主太故太角木運在中而太陰在泉在下申明太角木運在中乃壬辰壬戌之歲也蓋甲丙戊康壬為太乙丁己辛癸為少子寅辰午申戌為太醜卯巳未酉亥為少下文五運太少義皆仿此其運風角木之運也其化鳴紊啟坼風動之化也其變振拉摧拔風淫之變也其病眩掉目瞑風邪之病也木運主歲而一歲之中復有五運故太角為春木少徵為夏火太宮為長夏土少商為秋金太羽為冬水此角徵宮商羽為一歲之五運太而少少而太亦如運氣之次序也太陽太徵太陰戊辰戊戌同正徵其運熱其化暄暑鬱燠其變炎烈沸騰其病熱鬱太徵少宮太商少徵少角木運之後火運繼之辰戌太陽之政故太陽司天在上辰戌為太故太徵火運在中而太陰在泉在下申明太徵火運在中乃戊辰戊戌之歲也太徵火運太過太陽寒水上臨水制於土火得其平故同正徵其運熱徵火之運也其化暄暑鬱燠火熱之化也其變炎烈沸騰火焚之變也其病熱鬱火逆之病也一歲之氣以木為始今太徵火運主歲故先言太徵太徵為夏火少宮為長夏土太商為秋金少羽為冬水少角為春木一歲之中少角為先承上文太羽而次之故曰少角太陽太宮太陰甲戌歲會其運陰埃其化柔潤重澤其變震驚飄驟其病濕下重太宮少商太羽太角少徵重澤之重平聲下重澤重身俱同火運之後土運繼之辰戌太陽之政故太陽司天在上辰戌為太故太宮土運在中而太陰在泉在下由明太宮土運在中乃甲辰戌甲辰戌之歲也甲為土運辰戌屬土故曰歲會其運陰埃宮土之運也其化柔潤重澤土濕之化也其變震驚飄驟土動之變也其病濕下重土滯之病也太宮土運主歲故先言太宮太宮為長夏土少商為秋金太羽為冬水太角為春木少徵為夏火承上文少羽而次之故曰太角一歲之中太角為先太陽太商太陰庚辰辰戌其運涼其化霧露蕭瑟其病肅殺凋零其病燥背瞀胸滿太商少羽少角太徵少宮土運之後金運繼之辰戌太陽之政故太陽司天在上辰戌為太故太商金運在中而太陰在泉在下申明太商金運在中乃庚辰庚戌之歲也其運涼商金之運也其化霧露蕭瑟金寒之化也其變肅殺凋零金刑之變也其病燥背瞀胸滿肺金之病也太商金運主歲故先言秋金之太商四時之氣少角為先承上文太羽而次之故曰少角太陽太羽太陰丙辰天符丙戌天符其運寒其化凝慘溧冽其變冰雪霜雹其病大寒留於溪谷太羽太角少徵太宮少商金運之後水運繼之太陽司天在上太羽水運在中太陰在泉在下太羽水運在中乃丙辰丙戌之歲也丙為水運辰戌太陽寒水司天故丙辰丙戌皆為天符其運寒羽水之運也其化凝慘溧冽水冷之化也其變冰雪霜雹水堅之變也其病大寒留於溪谷水凝之病也太羽主歲故先言太羽四時之氣太角為先承上文少羽而次之故曰太角凡此太陽司天之政氣化運行先天天氣肅地氣靜寒臨太虛陽氣不令水土合德上應辰星鎮星其谷玄黅其政肅其令徐寒府大舉澤無陽焰則火發待時少陽中治時雨乃涯止極雨散還於太陰云朝北極濕化乃有澤流萬物寒敷於上雷動於下寒濕之氣持於氣交民病寒濕發肌肉萎足痿不收濡瀉血溢辰戊太陽司天之政凡此壬辰壬戊戊辰戊戌甲辰甲戌庚辰庚戊丙辰丙戌皆主太過之歲氣化運行先天時而至太陽寒水司天故天氣肅太陰濕土在泉故地氣靜寒水司天故寒臨太虛而陽氣不令濕土在泉故水土合德而上應水之辰星土之鎮星其谷玄黅者成熟也天氣肅故其政肅地氣靜故其令徐寒水司天故寒政大舉寒政大舉則澤無陽焰澤無陽焰則火發待時待時者待少陽中治之四氣也濕土在泉故時雨乃涯時雨乃涯水土合德也至少陽中治之時則止極雨散還於在泉之太陰太陰氣盛故云朝北極云朝北極則濕化乃布而澤流萬物合而言之太陽司天則寒敷於上太陰在泉少陽中治則雷動於下寒敷則寒雷動則濕寒濕之氣持於三氣四氣之交發為民病民病寒濕之氣而發病也肌肉萎足萎不收濡瀉血溢此寒濕而兼火鬱之病也初之氣地氣遷氣乃大溫草乃早榮民乃厲溫病乃作耳熱頭痛嘔吐肌腠瘡瘍加臨客氣以在泉之右氣為始如太陰在泉則右位之少陽加於初之氣陽明加於二之氣太陽加於三之氣厥陰加於四之氣少陰加於五之氣太陰加於終之氣凡司天之氣加於三之氣在歲半之上在泉之氣加於終之氣在歲半之下此一定法也初之氣少陽客氣加臨因太陰在泉之位以相加故曰地氣遷言隨地氣遷移以為加臨之始少陽相火也故氣乃大溫而草乃早榮火氣流行故民乃厲厲亢厲也溫病熱病也溫病乃作如身熱頭痛嘔吐肌膚瘡瘍者是也二之氣大涼反至民乃慘草乃遇寒火氣遂抑民病氣鬱中滿寒乃始二之氣陽明客氣加臨陽明清金也故大涼反至大涼反至則民乃悽慘而草乃遇寒慘而寒則火氣遂抑外慘寒內火抑故民病氣鬱中滿鬱滿之病始於寒故曰寒乃始三之氣天政布寒氣行雨乃降民病寒反熱中癰疽注下心熱瞀悶不治者死三之氣太陽客氣加臨太陽司天故天政布太陽寒水也故寒氣行而雨乃降民病加臨之客氣故寒外病寒而中反熱癰疽注下寒制之而熱氣不上也心熱瞀悶寒折之而熱氣不達也不急治之將陷溺矣故不治者死四之氣風濕交爭風化為雨乃長乃化乃成民病大熱少氣肌肉萎足痿注下赤白長上聲下同四之氣厥陰客氣加臨厥陰風也太陰在泉太陰濕也故風濕交爭風濕交爭故風化為雨風化為雨則萬物乃長乃化乃成風木生火故民病大熱木製其土故少氣病太陰脾土故肌肉痿足痿病厥陰肝木則注下赤白五之氣陽復化草乃長乃化乃成民乃舒五之氣少陰客氣加臨少陰主二之氣上文二之氣草乃遇寒火氣遂抑至此客氣加臨則火氣遂抑者而陽復化草乃遇寒者而草乃長乃化乃成先郁後伸故民乃舒而無病終之氣地與正濕令行陰凝太虛埃昏郊野民乃慘淒寒風以至反者孕乃死終之氣太陰客氣加臨合其在泉之氣故地氣正濕令行陰凝太虛濕令行也埃昏郊野地氣正也太陽寒水主終之氣故民乃慘淒而寒風以至此加臨之氣合在泉之氣主時之氣合司天之氣無有偏勝民當無病若無寒濕之化而有火熱之氣是為反者反則胎孕不育不成故孕乃死故歲宜苦以燥之溫之折其鬱氣先資其化源抑其運氣扶其不勝無使暴過而生其疾食歲谷以全其真避虛邪以安其正適氣同異多少制之同寒濕者燥熱化異寒濕者寒濕化故同者多之異者少之用寒遠寒用涼遠涼用溫遠溫用熱遠熱食宜同法有假者反常反是者病所謂時也舊本寒濕化之寒訛燥今改太陽寒水也太陰濕土也故辰戌之歲宜食火味之苦以燥之而治其濕宜食火味之苦以溫之而治其寒鬱氣者水勝則火鬱土勝則水鬱故必折其鬱氣郁者復之基若欲折之當先資其化源如欲折其火先資其木欲折其水先資其金以為生化之源辰戌之歲運氣暴過而生其疾當食玄黅之歲谷以全其真避客氣之虛邪以安其正一歲之中有司天之氣在泉之氣化運之氣適酌也酌其氣之同異而言氣味之多少以制之如水土主運同寒濕之氣者宜用燥熱之氣味以制化燥以化濕熱以化寒如木金火主運異寒濕之氣者宜用寒濕之氣味以制化木火為熱寒以化之金氣為燥濕以化之同則氣盛故同者用燥熱之氣味宜多之異則氣孤故異者用寒濕之氣味宜少之寒熱溫涼用以治病乃有故無殞如用寒品以治熱則人身熱氣當之不增寒氣是用寒遠寒也用涼品以治溫則人身溫氣當之不增涼氣是用涼遠涼也用溫品以治涼則人身涼氣當之不增溫氣是用溫遠溫也用熱品以治寒則人身寒氣當之不增熱氣是用熱遠熱也服食之宜亦同此法其有假者似寒而實熱似熱而實寒似涼而實溫似溫而實涼也如是則反於常理又當從其反以治之反是者不以反常之法治之也不以反常治之則病以上施治所謂時也猶言隨時制宜也帝曰陽明之政何如岐伯曰卯酉之紀也陽明少角少陰清熱勝復同同正商丁卯歲會丁酉其運風清熱少角太徵少宮太商少羽卯酉屬陽明帝問陽明之政故曰卯酉之紀也陽明司天在上少角化運在中少陰在泉在下卯酉主不及乙丁己辛癸與之相合皆主不及故化運皆屬乎少清熱勝復同言少角木運不及始則金之清氣勝既則火之熱氣復勝與復同主一歲之氣陽明上臨金氣勝矣火熱復而金氣平故曰同正商丁為木運臨於卯木是為歲會故曰丁卯歲會陽明司天少角木運乃丁卯丁酉之歲故又曰丁酉其運風角木之運也清者金之勝熱者火之復此一歲之氣也若四時之氣則少角為春太徵為夏少宮為長夏太商為秋少羽為冬陽明少徵少陰寒雨勝復同同正商癸卯癸酉其運熱寒雨少徵太宮少商太羽太角木運之次火運繼之火運不及故陽明在上少徵火運在中少陰在下寒雨勝復同言少徵火運不及始則水之寒氣勝既則土之雨氣復勝與復同主一歲之氣陽明上臨金氣勝矣火運在中金得其平故同正商少徵火運乃癸卯癸酉之歲其運熱徵火之運也寒者水之勝雨者土之復此一歲之氣也歲運少徵故先言少徵少徵夏火也太宮長夏土也少商秋金也太羽冬水也太角春木也此四時之氣也四時之氣太角為先陽明少宮少陰風涼勝復同己卯己酉其運雨風涼少宮太商少羽少角太徵火運之次土運繼之己為土運不及故陽明在上少宮土運在中少陰在下風涼勝復同言少宮土運不及始則木之風氣勝既則金之涼氣復勝與復同主一歲之氣少宮土運乃己卯己酉之歲其運雨宮土之運也風者木之勝涼者金之復此一歲之氣也歲運少宮故先言少宮少宮長夏土也太商秋金也少羽冬水也少角春木也太徵夏火也四時之氣少角為先陽明少商少陰熱寒勝復同同正商乙卯天符乙酉歲會太乙天符其運涼熱寒少商太羽太角少徵太宮土運之次金運繼之乙為金運不及故陽明在上少商金運在中少陰在下熱寒勝復同言少商金運不及始則火之熱氣勝既則水寒之氣復勝與復同主一歲之氣陽明上臨金氣勝矣始則熱勝金得其平故同正商少商金運乃乙卯乙酉之歲乙為金運卯為陽明燥金運氣與司天之氣相合故曰乙卯天符乙為金運酉支屬金運氣與歲支之氣相合故曰乙酉歲會乙酉既為歲會亦為天符天符兼歲會則為太乙天符其運涼商金之氣也熱者火之勝寒者水之復少商歲運故先言秋金之少商而四時之氣角木為先陽明少羽少陰雨風勝復同辛卯少宮同辛酉辛卯其運寒雨風少羽少角太徵少宮太商金運之次水運繼之辛為水運不及故陽明在上少羽水運在中少陰在下雨風勝復同言少羽水運不及始則土之雨氣勝既則木之風氣復勝與復同主一歲之氣水運不及則土氣勝當辛卯之歲卯木製土故辛卯少宮同上文皆同正商此但舉一歲而少宮同蓋舉一以補上文之未盡欲人仿此類推不可執一之意少羽水運乃辛酉辛卯之歲其運寒羽水之運也雨者土之勝風者木之復少羽水運故先言少羽之冬四時之氣始於角而終於羽凡此陽明司天之政氣化運行後天天氣急地氣明陽專其令炎暑大行物燥以堅淳風乃治風燥橫運流於氣交多陽少陰云趨雨府濕化乃敷燥極而澤其谷白丹間谷命太者其耗白甲品羽金火合德上應太白熒惑其政切其令暴蟄蟲乃見流水不冰民病咳嗌塞寒熱發暴振慄癃閉清先而勁毛蟲乃死熱後而暴介蟲乃殃其發躁勝復之作擾而大亂清熱之氣持於氣交間去聲見音現下俱同卯酉為陽明司天之政凡此丁卯丁酉癸卯癸酉己卯己酉乙卯乙酉辛卯辛酉皆主不及之歲氣化運行後天時而至陽明燥金司天故天氣急急勁急也少陰君火在泉故地氣明明光明也陽明在上君火在下故陽專其令炎暑大行而物燥以堅主時之初氣厥陰風木故淳風乃治燥金司天風木主時故風燥橫於運氣之中橫橫偏也從三氣而及於四氣故流於氣交四之氣少陽相火故多陽少陰少陽受三氣之交三之氣太陰濕土故云趨雨府濕化乃敷五之氣陽明燥金終之氣太陽寒水故燥極而復澤其谷白丹者感司天之金氣則白感在泉之火氣則丹所謂歲谷也左右二氣謂之間氣間谷者感左右間氣成熟之谷也太者子午少陰寅申少陽辰戌太陽皆謂之太今陽明司天則左太陽右少陽命太者之間谷亦早成熟也天氣主生故命太者但言司天之左右而在泉不與也不及之歲間谷命太則太過之歲間谷當命少矣耗虛散也甲介蟲也卯酉陽明司天金氣不及故白色之羽毛甲金之品類皆耗散而不蕃聚也司天者金在泉者火故金火合德上應金之太白火之熒惑二星其政勁切金之政也其令急暴火之令也君火在泉故蟄蟲乃見而流水不冰民病咳嗌塞肺金之病也寒熱發暴振慄癃閉水火不交之病也金氣司天故清先而勁清先而勁則毛蟲乃死金刑木也火氣在泉故熱後而暴熱後而暴則介蟲乃殃火刑金也金勁火暴其發甚躁始焉金勝既則火復故勝復之作擾而大亂清金熱火之氣上下相繼故曰持於氣交初之氣地氣遷陰始凝氣始肅水乃冰寒雨化其病中熱脹面目浮腫善眠鼽衄嚏欠嘔小便黃赤甚則淋初之氣初之客氣加臨也地氣遷初之客氣從在泉之地氣而右遷也少陰在泉則右位之太陰為初之客氣濕氣方勝故陰始凝燥金司天故氣始肅陰凝而清肅則水乃冰水冰而凍解則寒雨化其病中熱而脹濕氣不能外達也面目浮腫濕氣不能下行也善眠內外上下氣機不利也凡此皆太陰脾濕之病也鼽衄嚏欠太陰肺燥之病也土氣不和於上則嘔土氣不和於下則小便黃赤甚則淋二之氣陽乃有民乃有物乃生榮厲大至民善暴死二之客氣少陽相火加臨少陽為初陽之氣故陽氣乃有民乃舒而物乃生榮相火之氣厲而暴故厲大至民善暴死三之氣天政布涼乃行燥熱交合燥極而澤民病寒熱三之客氣陽明燥金加臨乾金為天故天政布清金為秋故涼乃行陽明氣燥而熱故燥熱交合燥極而澤金生水也燥金主熱水澤主寒故民病寒熱四之氣寒雨降病暴僕振慄譫妄少氣嗌乾引飲及為心痛癰腫瘡瘍瘧寒之疾骨痿血便四之客氣太陽寒水加臨故寒雨降民病暴僕太陽之氣厥逆也振慄譫妄少氣太陽陽熱之氣不足也嗌乾引飲及為心痛太陽寒水之氣不足也寒水不足而火氣盛則為癰腫瘡瘍陽熱不足而陰氣盛則為瘧寒之疾陽虛則骨痿陰虛則便血上文暴振慄乃身發寒熱而振慄也此振慄乃陽氣內虛而振慄也是振慄之有別也五之氣春令反行草乃生榮民氣和五之客氣厥陰風木加臨故春令反行草乃生榮民氣和而無病終之氣陽氣有候反溫蟄蟲來見流水不冰民乃康平其病溫終之客氣少陰君火加臨故陽氣有候反溫冬寒反溫故蟄蟲來見而流水不冰加臨之客氣即在泉之地氣故民乃康平候反溫故其病溫故食歲谷以安其氣食間谷以去其邪歲宜以咸以苦以辛汗之清之散之安其運氣無使受邪折其鬱氣資其化源以寒熱輕重少多其制同熱者多天化同清者多地化用涼遠涼用熱遠熱用寒遠寒用溫遠溫食宜同法有假者反之此其道也反是者亂天地之經擾陰陽之紀也陽明燥金司天少陰君火在泉之歲故食白丹之歲谷以安其正氣食間氣之間谷以去其外邪上燥下火其氣燥熱故宜水味之咸以治之更以苦濟火以辛益燥或汗之或清之或散之去其外邪而安其運氣也折其鬱氣必先資其化源更以寒熱之輕重而制氣味之少多如同熱氣者多金寒之天氣以制化同清氣者多火熱之地氣以制化用涼遠涼至假者反之解同上文此其道也言此乃治得其平之道反是者言不有其道以治之也亂天地之經則上下不和擾陰陽之紀則傳次失宜上文太陽寒氣司天故先言用寒遠寒此陽明金氣司天故先言用涼遠涼下文少陽相火少陽君火司天則先言用熱遠熱太陰濕氣司天並先言用涼遠涼厥陰風氣司天則先言用溫遠溫皆從其類而首言之毋以其近而忽之帝曰善少陽之政奈何岐伯曰寅申之紀也少陽太角厥陰壬寅壬申其運風鼓其化鳴紊啟坼其變振拉摧拔其病掉眩支脅驚駭太角少徵太宮少商太羽寅申屬少陽帝問少陽之政故曰寅申之紀也少陽司天在上太角化運在中厥陰在泉在下少陽司天太角木運乃壬寅坤之歲上文太陽司天太角木運言其運風其化鳴紊啟坼其變振拉摧拔其病掉眩目瞑此亦太角木運故大義相同支脅驚駭掉眩之劇也太角少徵太宮少商太羽序同太陽解之並同少陽太徵厥陰戊寅天符戊申天符其運暑其化暄囂鬱燠其變炎烈沸騰其病上熱鬱血溢血泄心痛太徵少宮太商少羽少角木運之次火運繼之故少陽司天太徵火運在中厥陰在泉少陽司天太徵火運在中乃戊寅戊申之歲戊為火運寅申少陽相火司天故曰戊寅天符戊寅天符謂主運之氣與司天之氣相符也其運暑徵火之運也其化暄囂鬱燠火熱之化也其變炎烈沸騰火焚之變也其病上熱鬱血溢血泄心痛火逆之病也太徵少宮等解同太陽少陽太宮厥陰甲寅甲申其運陰雨其化柔潤重澤其變震驚飄驟其病體重胕腫痞飲太宮少商太羽太角少徵火運之次土運繼之上少陽中太宮土運下厥陰少陽司天太宮土運在中乃甲寅甲申之歲其運陰雨宮土之運也其化柔潤重澤土濕之化也其變震驚飄驟土動之變也其病體重胕腫痞飲土滯之病也太宮少商等解同太陽少陽太商厥陰庚寅庚申同正商其運涼其化霧露清切其變肅殺凋零其病肩背胸中太商少羽少角太徵少宮土運之次金運繼之上少陽中太商金運下厥陰少陽司天太商金運在中乃庚寅庚申之歲金運太過司天之火氣制之則金氣平故同正商其運涼商金之運也其化霧露清切金涼之化也其變肅殺凋零金刑之變也其病肩背胸中肺金之病也太商少羽等解同太陽少陽太羽厥陰丙寅丙申其運寒肅其化凝慘慄冽其變冰雪霜雹其病寒浮腫太羽太角少徵太宮少商金運之次水運繼之少陽在上太羽水運在中厥陰在下乃丙寅丙申之歲其運寒肅羽水之運也其化凝慘慄冽水冷之化也其變冰雪霜雹水堅之變也其病寒浮腫水凝之病也太羽太角等解同太陽凡此少陽司天之政氣化運行先天天氣正地氣擾風乃暴革木偃沙飛炎火乃流陰行陽化雨乃時應火木同德上應熒惑歲星其谷丹蒼其政嚴其令擾故風熱參布雲物沸騰太陰橫流寒乃時至涼雨並起民病寒中外發瘡瘍內為泄滿故聖人遇之和而不爭往復之作民病寒熱瘧泄聾瞑嘔吐上怫腫色變寅申為少陽司天之政凡此壬寅壬申戊寅戊申甲寅甲申庚寅庚申丙寅丙申皆主太過之歲故氣化運行先天時而至少陽司天故天氣正正中正猶陽和也厥陰在泉故地氣擾擾攘擾猶鼓動也厥陰風也故風乃暴革則木偃沙飛少陽火也故炎火乃流炎火流則陰行陽化木生火而火生土故雨乃時應而火木同德上應火之惑惑木之歲星其谷丹蒼者成熟也其政嚴火之威也其令擾風之動也令擾政嚴故風熱參有木火之氣也雲物沸騰太陰橫流土氣之散達也寒乃時至水之氣也涼雨並起金之氣也一歲之中木火主氣兼五氣也民病寒中外發瘡瘍內為泄滿乃外熱內寒表裡不和也惟聖人遇之能使熱以內寒內寒以清外熱故和而不爭苟非聖人則寒往熱復熱往寒復往復之作民病為寒為熱瘧寒熱病也泄正氣虛也聾瞑竅不利也嘔吐中土虛也上怫腫色變氣血皆虛也此寒熱不愈而有如是之病也初之氣地氣遷風勝乃搖寒乃去候乃火溫草木早榮寒來不殺溫病乃起其病氣怫於上血溢目赤咳逆頭痛血崩脅滿膚腠中瘡殺去聲初之客氣加臨始於在泉之地氣故地氣遷乃厥陰之右少陰之氣也初之主氣厥陰風木故風勝乃搖寒乃去少陰客氣加臨故候乃大溫而草木早榮雖有寒氣之來不能殺君火之熱非時而熱故溫病乃起其病氣怫於上也血溢目赤咳逆頭痛血崩脅滿膚腠中瘡皆為溫病二之氣火反郁白埃四起云趨雨府風不勝濕雨乃零民乃康其病熱鬱於上咳逆嘔吐瘡發於中胸脅不利頭痛身熱昏憒膿瘡二之客氣加臨乃太陰濕土故主氣之君火反郁也白埃四起土之氣也云趨雨府濕之氣也風木之氣所以勝濕今埃起云趨風不勝濕而雨乃零始則火反郁至此雨霖則民乃康當火鬱之時其病熱鬱於上則咳逆嘔吐瘡發於中則胸脅不利鬱於上則頭痛發於中則身熱頭痛則昏憒身熱則膿瘡三之氣天政布炎暑至少陽上臨雨乃涯民乃熱中聾瞑血溢膿瘡咳嘔鼽衄渴嚏欠喉痹目赤善暴死三之客氣加臨乃少陽相火少陽司天故天政布少陽加臨故炎暑至三氣乃太陰主時而少陽客氣加臨則火土相生故雨乃涯民乃熱中火氣盛也聾瞑火亢水極也血溢膿瘡火氣盛也咳嘔鼽衄渴嚏欠火刑金也喉痹目赤厥陰少陽之氣不和也水不濟火金受火刑陰陽不和故善暴死四之氣涼乃至炎暑間化白露降民氣和平其病滿身重四之客氣加臨乃陽明燥金金氣清涼故涼乃至少陽相火主氣故炎暑間化於時為秋故白露降炎暑間化而白露降故民氣和平若感涼露之濕氣則其病中滿而身重五之氣陽乃去寒乃來雨乃降氣門乃閉剛木早凋民避寒邪君子周密五之客氣加臨乃太陽寒水故陽氣去寒乃來雨乃降寒主凝斂故氣門乃閉其時剛木早凋民避寒邪君子周密可以無病終之氣地氣正風乃至萬物反生霜霧以行其病關閉不禁心痛陽氣不藏而咳終之客氣加臨乃厥陰風木與在泉地氣相符故地氣正正和平也厥陰風也故風乃至地氣正而風至故萬物反生於時為冬故霜霧以行太陽寒水主終之氣其病關閉不禁禁猶止也心痛寒氣盛也陽氣不藏而咳言太陽陽氣不藏於水府則膀胱水氣不濡毛竅而為咳抑其運氣贊所不勝必折其鬱氣先取化源暴過不生苛疾不起故歲宜鹹辛宜酸滲之泄之漬之發之觀氣寒溫以調其過同風熱者多寒化異風熱者少寒化用熱遠熱用溫遠溫用寒遠寒用涼遠涼食宜同法此其道也有假者反之反是者病之階也運之太過當抑其運氣此強彼弱當贊所不勝郁者復之基故必折其鬱氣欲折鬱氣先取化源而資之上文先資化源所以益之此先取化源亦取而益之也如是庶暴過不生苛疾不起火氣在上木氣在下故歲宜鹹辛謂鹹味以瀉火辛味以平木少陽司天中見者厥陰在泉者亦厥陰厥陰木也其味酸故復宜酸味或滲之泄之以平其內或漬之發之以清其外更當觀氣之寒溫以調其過同在泉司天風熱之氣者則多寒涼之氣味以制化之異風熱之氣者則少寒涼之氣味以制化之少陽火熱也故先言用熱遠熱同上文帝曰善太陰之政奈何岐伯曰丑未之紀也太陰少角太陽清熱勝復同同正宮丁丑丁未其運風清熱少角太徵少宮太商少羽丑未屬太陰帝問太陰之政故曰丑未之紀也太陰在上少角木運在中太陽在下清熱勝復同言少角木運不及始則金之清氣勝既則火之熱氣復勝與復同主一歲之氣太陰土氣司天木運不及土不受制故同正宮太陰司天少角木運在中乃丁丑丁未之歲其運風角木之運也清者金之勝熱者火之復少角主運故先言少角終言少羽解同上文之陽明太陰少徵太陽寒雨勝復同癸丑癸未其運熱寒雨少徵太宮少商太羽太角上文言少角此言少徵癸為火運不及故上太陰中少徵下太陽寒雨勝復同謂火運不及始則水寒之氣勝既則土之雨氣復勝與復同主一歲之氣太陰司天火運在中乃癸丑癸未之歲其運熱徵火之運也寒者水之勝雨者土之復少徵主運故先言少徵解同陽明太陰少宮太陽風清勝復同同正宮己丑太乙天符己未太乙天符其運雨風清少宮太商少羽少角太徵少徵之次因言少宮己為土運不及故上太陰中少宮下太陽風清勝復同謂土運不及始則木之風氣勝既則金之清氣復勝與復同主一歲之氣少宮土運不及上臨太陰故同正宮己土運也土運臨丑未是為歲會土運之歲上見太陰是為天符天符合歲會是為太乙天符故己丑己未皆為太乙天符其運雨宮土之運也風者木之勝清者金之復首言少宮終言太徵解同陽明太陰少商太陽熱寒勝復同乙丑乙未其運涼熱寒少商太羽太角少徵少宮少宮之次因言少商乙為金運不及故上太陰中少商下太陽熱寒勝復同謂金運不及始則火之熱氣勝既則水之寒氣復勝與復同主一歲之氣少商金運上臨太陰乃乙丑乙未之歲其運涼金之運也熱者火之勝寒者水之復少商主運故先言少商解同陽明太陰少羽太陽雨風勝復同同正宮辛丑戊未其運寒雨風少羽少角太徵少宮太商少商之次因言少羽辛為水運不及故上太陰中少羽下太陽雨風勝復同謂水運不及始則土之雨氣勝既則木之風氣復勝與復同主一歲之氣上臨太陰土勝木復故同正宮少羽水運太陰司天乃辛丑辛未之歲其運寒羽水之運也雨者土之勝風者木之復少羽主運故先言少羽解同陽明凡此太陰司天之政氣化運行後天陰專其政陽氣退避大風時起天氣下降地氣上騰原野昏霿白埃四起云奔南極寒雨數至物成於差夏民病溫濕腹滿身䐜憤胕腫痞逆寒厥拘急濕寒合德黃黑埃昏流行氣交上應鎮星辰星其政肅其令寂其谷黅玄故陰凝於上寒積於下寒水勝火則為冰雹陽光不治殺氣乃行故有餘宜高不及宜下有餘宜晚不及宜早土之利氣之化也民病亦從之間谷命其太也昏與瞀同音茂數音朔差音雌下俱同丑未為太陰司天之政凡此丁丑丁未癸丑癸未己丑己未乙丑乙未辛丑辛未皆主不及之歲故氣化運行後天時而至太陰司天故陰專其政則陽氣退避土不及而木勝故大風時起天氣下降司天之氣也地氣上騰在泉之氣也原野昏霿白埃四起土濕之氣也云奔南極寒雨數至水寒之氣也差夏夏之終秋之交也物當成於夏者至差夏而乃成也若民病寒濕則有腹滿身䐜氣憤胕腫痞逆之病若但寒無濕則為寒厥之病寒厥拘急也故又曰拘急司天在泉之氣兩相交合則濕容合德濕寒合德則黃黑埃昏合德之候在於氣交故流行氣交上應土之鎮星水之辰星陰專其政故其政肅陽氣退避故其令寂民食歲谷故其谷黅玄太陰司天故陰凝於上太陽在泉則寒積於下寒水之氣制勝其火則惟陰無陽而為冰雹寒水勝火則陽光不治為冰為雹則殺氣乃行地高者氣寒生物遲地下者氣溫生物早歲氣有餘則先時故有餘之歲宜於地高生物遲而氣先至不過遲矣歲氣不及則後時故不及之歲宜於地下生物早而氣後至不過早矣凡有餘之歲其氣早至物之生也宜晚不及之歲其氣後至物之生也宜早夫有餘宜高不及宜下乃地土之利也有餘宜晚不及宜早則氣機之化也人為萬物之長體同天地故民氣亦從之感司天左右之間氣而生成謂之間谷太陰司天寅申少陽居右子午少陰居左子午寅申皆陽年主太故間谷成熟命其太也初之氣地氣遷寒乃去春氣正風乃來生布萬物以榮民氣條舒風濕相薄雨乃後民病血溢筋路拘強關節不利身重筋痿強上聲初之寒氣加臨乃左陽之右厥陰之氣也初之氣始於春故寒乃去春氣正厥陰風氣也故風乃來春氣生而風氣布故曰生布春生風布故萬物以榮而民氣條舒風濕相薄者加臨之氣屬於風與司天之濕氣相薄也濕不勝風故雨乃後民病血溢筋絡拘強風病也關節不利身重筋痿濕病也二之氣大火正物承化民乃和其病溫厲大行遠近鹹苦濕蒸薄雨乃時降二之寒氣主氣皆少陰君火故大火正火生其土故物承化而民乃和溫厲大行火熱病也遠近鹹苦氣之盛也蒸熱也濕蒸相薄司天濕氣與加臨熱氣相薄也濕熱相薄則火土相生故雨乃時降三之氣天政布濕氣降地氣騰雨乃時降寒乃隨之感於寒濕則民病身重胕腫胸腹滿三之寒氣乃左陰濕土氣合司天故天政布而濕氣降在泉之地氣上騰則雨乃時降地氣者太陽寒水之氣也故氣騰雨降寒乃隨之斯時感於寒濕則民病身重胕腫胸腹滿四之氣畏火臨溽蒸化地氣騰天氣痞隔寒風曉暮蒸熱相薄草木凝煙濕化不流則白露陰布以成秋令民病腠理熱血暴溢瘧心腹滿熱臚脹甚則胕腫痞批上聲下同畏火相火也四之寒氣少陽相火故曰畏火臨太陰濕氣司天少陽相火加臨故溽蒸化猶言濕熱相蒸濕化為熱也濕熱蒸化而寒水之地氣上騰則天氣亦痞隔矣痞隔閉塞不通之意寒風曉暮秋之氣也蒸熱相薄火加臨也寒風曉暮則草木凝煙蒸熱相薄則濕化不流當此之時則白露陰布以成秋令民病腠理熱血暴溢火病也瘧心腹滿熱臚脹濕熱病也甚則胕腫寒濕病也此濕氣司天寒氣在泉火氣加臨而有如是之病也五之氣慘令已行寒露下霜乃早降草木黃落寒氣及體君子周密民病及腠五之寒氣陽明燥金金氣肅殺故慘令已行慘令行則寒露下霜乃早降草木黃薄而寒氣及體斯時也君子周密則無病民不周密則病皮腠終之氣寒大舉濕大化霜乃積陰乃凝水堅冰陽光不治感於寒則病人關節禁固腰脽痛寒濕推於氣交而為疾也終之寒氣太陽寒水寒氣盛故寒大舉水氣盛故濕大化猶言濕化為水也寒極而水不行則霜乃積陰乃凝霜積則水堅冰陰凝則陽光不治其時感於寒則病人關節禁固腰脽痛脽脊尻也關節禁固而腰脽痛乃寒濕之病故曰寒濕終之主氣寒氣皆太陽之寒未始有濕惟三之主氣寒氣有太陰之濕故此寒濕之病推於氣交之時而為疾也必折其鬱氣而取化源益其歲氣無使邪勝食歲谷以全其真食間谷以保其精故歲宜以苦燥之溫之甚者發之泄之不發不泄則濕氣外溢肉潰皮折而水血交流必贊其陽火令御甚寒從氣異同少多其制也同寒者以熱化同濕者以燥化異者少之同者多之用涼遠涼用寒遠寒用溫遠溫用熱遠熱食宜同法假者反之此其道也反是者病也郁者復之基故必折其鬱氣而先取化源以資之歲運不及則益其歲氣無使邪勝食黅玄之歲谷以全其真食左右之間谷以保其精寒濕之歲宜以火味之苦以燥濕火味之苦以溫寒寒之甚者更當發之濕之甚者更當泄之苦寒濕甚而不發不泄則濕氣外溢致肉潰皮折肉潰皮折而水血交流矣贊助也是必助其陽火令防禦其寒從氣之異同而氣味之少多可制也同太陽之寒者以氣味之熱而制化之同太陰之濕者以氣味之燥而制化之異乎寒濕而宜寒濕之氣味者宜少用之同乎寒濕而宜熱燥之氣味者宜多用之寒熱溫涼不可太過故用涼遠涼有如上文所云也帝曰善少陰之政奈何岐伯曰子午之紀也少陰太角陽明壬子壬午其遠鼓其化鳴紊啟圻其變振拉摧拔其病支滿太角少徵太宮少商太羽子午屬少陰帝問少陰之政故曰子午之紀也少陰在上太角木運在中陽明在下當壬子壬午之歲其遠其化其變與太陽少陽之太角同其病支滿木剋土也太角少徵太宮少商太羽序同太陽解亦同之少陰太徵陽明戊子天符戊午太乙天符其遠炎暑其化暄曜鬱燠其變炎烈沸騰其病上熱血溢太徵少宮太商少羽少角太角之次因言太徵少陰在上太徵在中陽明在下當戊子戊午之歲戊為火運子為少陰君火運合司天故曰戊子天符戊為火運午為少陰君火而午支又屬於火運與歲會又合天符故曰戊午太乙天符其運其化其變其病與太陽少陽之太徵同太徵少宮太商少羽少角亦與太陽少陽之太徵同少陰太宮陽明甲子甲午其遠陰雨其化柔順時雨其變震驚飄驟其病中滿身重太宮少商太羽太角少徵太徵之次因言太宮少陰在上太宮在中陽明在下當甲子甲午之歲其運其化其變其病與太陽少陽之太宮同太宮少商太羽太角少徵亦與太陽之太宮同少陰太商陽明庚子庚午同正商其運涼勁其化霧露蕭飋其變肅殺凋零其病下清太商少羽太角太徵少宮太宮之次因言太商少陰在上太商在中陽明在下當庚子庚午之歲太商主運金氣勝矣上臨君火金不過勝故同正商其運其化其變與太陽少陽之太商同其病下清金寒之病也太商少羽少角太徵少宮亦與太陽少陽之太商同少陰太羽陽明丙子歲會丙午其運寒其化凝慘慄冽其變冰雪霜雹其病寒下太羽太角少徵太宮少商太商之次因言太羽少陰在上太羽在中陽明在下當丙子丙午之歲丙為水運水運臨子是為歲會其運其化其變其病與太陽少陽之太羽同太羽太角少徵太宮少商亦與太陽少陽之太羽同凡此少陰司天之政氣化運行先天地氣肅天氣明寒交暑熱加燥云馳雨府濕化乃行時雨乃降金火合德上應螢惑太白其政明其令切其谷丹白水火寒熱持於氣交而為病始也熱病生於上清病生於下寒熱凌犯而爭於中民病咳喘血溢血泄鼽嚏目赤眥瘍寒厥入胃心痛腰痛腹大嗌乾腫上子午為少陰司天之政凡此壬子壬午戊子戊午甲子甲午庚子庚午丙子丙午皆主過之歲故氣化運行先天時而至金氣在泉故地氣肅火氣司天故天氣明少陰火熱在上初之寒氣太陽寒水是寒交暑者也陽明燥金在下五之寒氣少陽相火是熱加燥也四之寒氣太陰濕土故又曰云馳雨府濕化乃行時雨乃降在泉者金司天者火故金火合德上應熒惑太白二星天氣明故其政明地氣肅故其令切其谷丹白火金之谷也少陰火熱司天初之寒氣太陽寒水三之寒氣少陰君火是水火寒熱持於氣交之候而為受病之始也火氣司天故熱病生於上金氣在泉故清病生於下寒交暑熱加燥故寒熱凌犯而爭於中民病咳喘血溢血泄鼽嚏目赤眥瘍燥熱病也寒厥入胃心痛腰痛腹大嗌乾腫上寒濕病也初之氣地氣遷燥將去寒乃始蟄復藏水乃冰霜復降風乃至陽氣鬱民反周密關節禁固腰脽痛炎暑將起中外瘡瘍初之寒氣太陽寒水地氣遷者從陽明而遷於太陽也去陽明之燥始太陽之寒故燥將去寒乃始蟄藏蟲也冬時蟲已蟄藏至此寒氣加臨則蟄復藏而水乃冰霜復降初之主氣厥陰風木故風乃至風乃至而有太陽之寒則陽氣鬱陽氣鬱則民反周密病關節禁固腰脽痛寒濕之病也二之主氣少陰君火氣合司天故始則寒乃始繼則炎暑將起炎暑將起則中外瘡瘍二之氣陽氣布風乃行春氣以正萬物應榮寒氣時至民乃和其病淋目瞑目赤氣鬱於上而熱二之寒氣厥陰風木風為陽氣故陽氣布而風乃行陽布風行則春氣以正春氣以正則萬物應榮春氣雖正萬物雖榮天氣猶寒故寒氣時至則民乃和若寒氣不能時至主時之熱氣相交則其病淋目瞑目赤氣鬱於上而熱凡此皆少陰火熱之病也三之氣天政布大火行庶類蕃鮮寒氣時至民病氣厥心痛寒熱更作咳喘目赤更平聲下同三之寒氣少陰君火氣合司天故天政布大火行火氣長萬物而光明故庶類蕃鮮三氣應熱若寒氣時至則民病氣厥心痛因於寒也且寒熱更作咳喘目赤寒熱交爭也四之氣溽暑至大雨時行寒熱互至民病寒熱嗌乾黃癉鼽衄飲發四之寒氣太陰濕土四之主氣少陽相火故溽暑至濕氣勝故大雨時行大雨時行氣兼溽暑故寒熱互至民病寒熱嗌乾黃癉鼽衄飲發濕熱病也五之氣畏火臨暑反至陽乃化萬物乃生乃長榮民乃康其病溫五之寒氣少陽相火故畏火臨畏火臨故暑反至暑反至則陽化熱故陽乃化陽乃化則萬物乃生乃長乃榮五之氣當九月十月少陽寒氣加臨故天氣溫和而萬物生榮如是則民乃康若溫熱太過則其病溫終之氣燥令行餘火內格腫於上咳喘甚則血溢寒氣數舉則霿霧翳病生皮腠內合於脅下連少腹而作寒中地將易也腫當作沖終之寒氣陽明燥金故燥令行上承五之寒氣屬於少陽故餘火內格而衝於上則為咳為喘甚則血溢也終之主氣太陽寒水故寒氣數舉寒氣數舉則天氣昏霿如霧之翳太陽之氣行於通體故病生皮腠從樞脅而下挾膀胱故內合於脅下連少腹而作寒中之病陽明寒氣加臨不病陽明之燥而病太陽之寒以陽明之氣又主司地司地之氣至終氣而將易也必抑其運氣資其歲勝折其鬱發先取化源無使暴過而生其病也食歲谷以全真氣食間谷以闢虛邪歲宜咸以耎之而調其上甚則以苦發之以酸收之而安其下甚則以苦泄之適氣同異而多少之同天氣者以寒清化同地氣者以溫熱化用熱遠熱用涼遠涼用溫遠溫用寒遠寒食宜同法有假則反此其道也反是者病作矣太過則抑之運氣太過故之抑其運氣不及則資之故必資其歲勝歲勝歲所當勝也當勝不勝故必資之郁者發之基故折其鬱發當先取化源而資之無使暴瘧太過而生其病也食丹白之歲谷以全其真食左右之間谷以闢虛邪歲當君火在上宜食鹹味以耎之而調其上火氣過甚則食火味之苦以發之金氣在下其氣主收宜食酸味以收之而安其下燥氣過甚則食苦味之寒以泄