body:
  text: 卷之五刺要論第五十篇此篇首論刺法之要各有淺深淺深不得致有五臟四時之病雖欲無之然不去矣刺要不綦重歟黃帝問曰願聞刺要上古以針治病帝舉刺法之要以教天下後世故特問之岐伯對曰病有浮沉刺有淺深各至其理無過其道過平聲下同浮沉即淺深病有浮沉刺有淺深猶言病有淺深而刺因有淺深也各至其理各至皮肉脈筋骨之文理刺所當至毋容淺也無過其道無過其皮肉脈筋骨之道刺中其道毋容過也過之則內傷不及則生外壅壅則邪從之所謂無過其道者過之則內傷是太過而反傷其內也所謂各至其理者若不及則外生壅腫壅則邪從之是不及而徒傷其外也淺深不得反為大賊內動五臟後生大病賊害也所謂病有浮沉刺有淺深者若淺深不得反為大害內動五臟後生四時之大病如下文所云也故曰病有在毫毛腠理者有在皮膚者有在肌肉者有在脈者有在筋者有在骨者有在髓者毫毛腠理毫毛中之腠理也皮膚肺之主也肌肉脾之主也脈心之主也筋肝之主也骨腎之主也髓骨中精髓也肺主皮膚其外更有毫毛之淺腎主骨其內更有髓之深此病各有在當分別淺深以為刺也是故刺毫毛腠理無傷皮皮傷則內動肺肺動則秋病溫瘧溯溯然寒慄溯音素餘篇仿此此下申明內動五臟後生大病之意毫毛腠理在皮之外是故刺毫毛腠理無傷皮皮傷則內動肺臟之氣肺主秋動肺則秋病溫瘧溫瘧先熱後寒故溯溯然而寒慄刺皮無傷肉肉傷則內動脾脾動則七十二日四季之月病腹脹煩不嗜食皮在肉之外故刺皮無傷肉肉傷則內動脾臟之氣脾主四季每季各十八日共七十二日動脾則七十二日四季之月有腹脹之病腹脹則心煩而不嗜食刺肉無傷脈脈傷則內動心心動則夏病心痛肉在脈之外故刺肉無傷脈脈傷則內動心臟之氣心主夏心動則夏有心痛之病刺脈無傷筋筋傷則內動肝肝動則春病熱而筋弛脈在筋之外故刺脈無傷筋筋傷則內動肝臟之氣肝主春肝動則春病熱而筋弛刺筋無傷骨骨傷則內動腎腎動則冬病脹腰痛筋在骨之外故刺筋無傷骨骨傷則內動腎臟之氣腎主冬腎動則冬病脹而腰痛刺骨無傷髓髓傷則消爍䯒酸體解㑊酸作痠骨在髓之外故刺骨無傷髓髓傷則動腎臟之精故精氣消爍而䯒痠精氣消爍而體解㑊然不去矣總結上文而言刺傷內臟則有四時之病其病必生雖欲無之然不去矣刺法之要所當審也刺齊論第五十一篇齊猶一也刺齊刺淺刺深無過不及有一定之分也如病在皮中針入皮中勿淺勿深斯為刺齊以皮分而推之脈肉筋骨無太過無不及皆為刺齊承上篇刺要之意而復論刺齊也黃帝問曰原聞刺淺深之分分去聲帝承上篇刺有淺深之意謂刺淺刺深各有部分故願聞刺淺深之分岐伯對曰刺骨者無傷筋刺筋者無傷肉刺肉者無傷脈刺脈者無傷皮欲知其分必先知其非分如刺骨者刺入骨分無傷其筋刺筋者刺入筋分無傷其肉刺肉者刺入肉分無傷其脈脈有絡脈有經脈上篇脈居肉後經脈也此篇脈居肉先絡脈也刺脈者刺入脈分無傷其皮此言刺宜深者勿淺淺則非分矣刺皮者無傷肉刺肉者無傷筋刺筋者無傷骨以上文層次言之當云刺皮者無傷脈今不言脈者以脈不止絡脈復有經脈絡脈居肉前經脈居肉後言肉而脈在其中故曰刺皮者刺入皮分無傷其肉刺肉者刺入肉分無傷其筋刺筋者刺入筋分無傷其骨此言刺宜淺勿深深則非分矣帝曰余未知其所謂願聞其解刺宜深者勿淺宜淺者勿深是淺深有一定之分帝欲詳明其說以昭後世故曰未知所謂願聞其解岐伯曰刺骨無傷筋者針至筋而去不及骨也刺筋無傷肉者至肉而去不及筋也刺肉無傷脈者至脈而去不及肉也刺脈無傷皮者至皮而去不及脈也所云刺骨無傷筋者言針至筋而去不及骨分則傷筋也所云刺筋無傷肉者言針至肉而去不及筋分則傷肉也所云刺肉無傷脈者言針至脈而去不及肉分則傷脈也所云刺脈無傷皮者言針至皮而去不及脈分則傷皮也此解上文其刺宜深不及則傷之意所謂刺皮無傷肉者病在皮中針入皮中無傷肉也刺肉無傷筋者過肉中筋也刺筋無傷骨者過筋中骨也過平聲中筋中骨之中去聲上文所謂刺皮無傷肉者如病在肉中則針入皮中無過分而傷肉也所謂刺肉無傷筋者病在肉中針入肉中如過肉則中傷其筋也所謂刺筋無傷骨者病在筋中針入筋中如過筋則中傷其骨也此解上文其刺宜淺過分則傷之意此之謂反也通承上文之意而言刺非其分淺深不得此之謂反也知其反則知其正矣刺禁論第五十二篇承刺要刺齊而復申明刺禁也禁者臟有要害不可不察也中傷臟氣則死中傷經脈或病或死刺之所禁不可不知蓋從之則有福逆之則有咎也黃帝問曰願聞禁數數條目也帝承上二篇之意謂刺要刺齊其中必有所禁故願聞禁數岐伯對曰臟有要害不可不察五臟之氣從內達外由經隧而出於孫絡皮膚有緊要為害之處不可不察也肝生於左肺藏於右心部於表腎治於裡脾為之使胃為之市藏如字為使皆去聲人身面南左東右西肝主春生之氣位居東方故肝生於左肺主秋收之氣位居西方故肺藏於右心為陽中之太陽故心部於表腎為陰中之少陰故腎治於裡脾主為胃行其津液以灌四旁故脾為之使胃為水穀之海眾物所聚故胃為之市膈肓之上中有父母七節之旁中有小心從之有福逆之有咎膈胸膈也肓臍旁肓俞穴也膈之上肺也天也肓之上脾也地也天為父地為母故膈肓之上中有父母七節之旁乃自上而下第七節之兩旁膈俞穴也小微細也中有小心言心氣出於膈俞之穴極微極細也從順也從之者刺得其宜順其上父下母以及心氣之所出則神轉不回故有福逆之者刺失其宜逆其上父下母以及心氣之所出乃回則不轉故有咎刺中心一日死其動為噫中去聲下同診要經終論云中心者環死故刺失其宜中傷心氣周時一日而死宣明五氣篇云心為噫故其動為噫噫心氣虛也刺中肝三日死其動為語三舊本訛五今改刺失其宜中傷肝氣則三日死三者水之生數也宣明五氣篇云肝為語故其動為語語肝氣虛也刺中腎六日死其動為嚏刺失其宜中傷腎氣則六日死六者水之成數也宣明五氣篇云腎為欠為嚏嚏腎氣虛也刺中肺五日死其動為咳五舊本訛三今改診要經終論云中肺者五日死故刺失其宜中傷肺氣則五日死宣明五氣篇云肺為咳故其動為咳咳肺氣虛也刺中脾十日死其動為吞刺失其宜中傷脾氣則十日死十者土之成數也宣明五氣篇云脾為吞故其動為吞吞脾氣虛也刺中膽一日半死其動為嘔刺失其宜中傷膽氣則一日半死六節臟象論云十一臟取決於膽膽主生陽上升今一日之間生陽不升復逾半日生氣並絕故死靈樞邪氣臟腑論云膽病者嘔宿汁故其動為嘔嘔膽氣虛也刺跗上中大脈血出不止死胃足陽明之脈下足跗其支者別跗上入足大趾交於足太陰刺跗上刺胃脈也中大脈中傷大指之經脈也中大脈而血出不止則太陰之脈不能循大指而上故死刺面中溜脈不幸為盲溜脈陰陽相過之脈也盲目不明也手少陰之脈系目系手太陽之脈上頞抵鼻至目內眥刺面中溜脈刺面上目鼻之間中傷陰陽相過之溜脈也中傷溜脈有不病者今也目盲則不幸矣故曰不幸為盲刺頭中腦戶入腦至死腎脈上額交巔入絡於腦刺頭中腦產刺頭額之間中傷腦戶也中傷腦戶邪入於腦真陽不下故玄死刺舌下中脹太過血出不止為喑舌下廉泉穴也靈樞根結論云少陰根於廉泉結於廉泉刺舌下刺舌下之廉泉也刺舌下而中傷經脈太過血出不止則少陰之氣不交於陽故為喑刺足下布絡中脈血不出為腫凡刺絡脈則宜出血凡刺經脈不宜出血刺足下布絡言刺足下之病當從絡脈以布散若布絡而中其經脈致血不出則經脈有傷故為腫刺郄中大脈令人僕脫色郄浮郄穴也刺浮郄穴者宜淺若刺深而中傷大脈大脈足太陽貫臀入膕之脈也中大脈則太陽之氣不能為外故令人僕當僕之時陽氣不充故脫色刺氣街中脈血不出為腫鼠僕氣街脛氣之街靈樞衛氣論云氣在脛者止之於氣街與承山踝上以下刺氣街中脈刺脛中之氣街中傷足太陽陽明之經脈也中傷其脈致血不出則為腫鼠僕者傷陽明之脈則腫在鼠鼷傷太陽之脈則腫在僕參也刺脊間中髓為傴刺要論云刺骨無傷髓刺脊間中髓刺脊骨而中傷其精髓也脊髓內傷則背屈肩隨故為傴傴傴僂也刺乳上中乳房為腫根蝕乳上之穴名曰乳中內為乳房下為乳根穴刺乳上中乳房言刺乳中穴而中傷其乳房也中傷乳房則為腫其下乳根則如月蝕蝕缺傷也刺缺盆中內陷氣泄令人喘咳逆刺之過深則為內陷下俱仿此缺盆之穴其缺如盆若刺缺盆刺之過深中傷內陷則肺氣虛泄且令人喘咳而氣機內逆刺手魚腹內陷為腫魚腹在手大指下如魚之腹手太陰魚際穴也刺手魚腹中傷內陷內陷傷徑故為腫無刺大醉令人氣亂無刺大怒令人氣逆無刺大勞人無刺新飽人無刺大飢人無刺大渴人無刺大驚人不但身形有禁刺而人亦有禁刺酒性慓悍行皮膚充絡脈故無刺大醉刺之則令人之氣亂怒則乘戾色不和氣不平故無刺大怒刺之則令人氣逆大勞之人陽氣外張故無刺新飽之人穀氣盛滿故無刺大飢之人經脈空虛故無刺大渴之人津液燥竭故無刺大驚之人氣血未和故無刺凡此禁刺而刺之則有害矣刺陰股中大脈血出不止死厥陰之脈起於足大趾循陰股而上刺陰股中傷大趾之徑股致血出不止則厥陰之脈不能上行故死刺客主人內陷中脈為內漏為聾客主人之穴在耳前開口陷中刺客主人若刺之過深則內陷中脈中脈中傷手足少陽所過之脈也中脈傷腦則為內漏中脈傷耳則為耳聾刺膝髕出液為跛膝髕膝上筋骨交會處也刺膝髕出液則筋骨無以濡養屈伸不利故為跛刺臂太陰脈出血多立死臂太陰脈手太陰肺脈也肺主行營衛陰陽之氣刺臂太陰脈若出血多致血氣不相交接一息相離穹壤分判故立死刺足少陰脈重虛出血為舌難以言重平聲足少陰脈腎脈也腎主藏精刺足少陰脈出血則精血皆虛故曰重虛重虛出血猶言出血而重虛也少陰之脈循喉嚨挾舌本精血皆虛故為舌難以言刺膺中陷中肺為喘逆仰息膺胸前膺窗穴也刺膺窗之穴刺之過深中傷內陷則中傷肺氣中陷中肺則膺胸之氣不和於肺故為喘逆仰息刺肘中內陷氣歸之為不屈伸肺脈下肘循臂刺肘過深中傷內陷邪氣歸之則機關不利故為不屈伸刺陰股下三寸內陷令人遺溺溺鳥去聲下同陰股下三寸乃下含膕中足太陽循行之經脈也刺陰股下三寸刺之過深中傷內陷則太陽之脈不能循經外出故令人遺溺遺溺膀胱不約也刺腋下脅間內陷令人咳腋舊本訛掖今改手厥陰心包之脈循胸出脅上抵腋下刺腋下脅間刺心包之脈也刺之過深中傷內陷脈不循經上迫於肺故令人咳刺少腹中膀胱溺出令人少腹滿膀胱居少腹之中刺少腹而中傷其膀胱致膀胱之氣下泄故溺出令人少腹滿少腹滿膀胱之氣不行於膚表也刺腨腸內陷為腫腨腸足肚也刺腨腸而內陷傷其經脈故為腫與上文刺平魚腹內陷為腫其義一也刺匡上陷骨中脈為漏為盲匡上目匡之上眉間也陷骨絲竹空穴眉後陷骨也刺匡上陷骨中傷其脈則淚流不止故為漏視無所見故為盲刺關節中液出不得屈伸關節骨節交會之機關液淖澤注於骨骨屬屈伸若刺關節中死其液致液出而不能淖澤注骨故不得屈伸此舉刺之要害皆為刺禁者如此刺志論第五十三篇本經有血氣形志篇血氣之立乎外者為形血氣之存乎內者為志刺志者得其內之所存以為刺也如形本乎氣氣本乎谷血本乎脈而形氣穀氣血脈有虛實常反之道得其虛實常反而刺治之斯為刺志也黃帝問曰願聞虛實之要虛實之形見於外虛實之原根乎內故願聞虛實之要認為刺志之道岐伯對曰氣實形實氣虛形虛此其常也反此者病谷盛氣盛谷虛氣虛此其常也反此者病脈實血實脈虛血虛此其常也反此者病虛實之要有常有反人之形身氣為之主故氣實則形實氣虛則形虛此虛實之常也若反常也氣實而形反虛氣虛而形反實則病人身之氣谷為之主故谷盛則氣盛谷虛則氣虛此其常也若谷盛而氣反虛谷虛而氣反盛則病人身之血脈為之主故脈實則血實脈虛則血虛此其常也若脈實而血反虛脈虛而血反實則病帝曰如何而反岐伯三言反此者病故問如何而反岐伯曰氣盛身寒此謂反也氣虛身熱此謂反也谷入多而氣少此謂反也谷不入而氣多此謂反也脈盛血少此謂反也脈少血多此謂反也氣盛身寒此謂反也八字古本簡脫今補夫氣實則形實若氣盛身寒則氣實形虛此謂反也氣虛則形虛若氣虛身熱則氣虛形實此謂反也谷盛則氣盛若谷入多而氣少則谷盛氣虛此謂反也谷虛則氣虛若谷不入而氣多則谷虛氣盛此謂反也脈實則血實若脈盛血少則脈實血虛此謂反也脈虛則血虛若脈少血多則脈虛血實此謂反也氣盛身寒得之傷寒氣虛身熱得之傷暑谷入多而氣少者得之有所脫血濕居下也谷入少而氣多者邪在胃及與肺也脈小血多者飲中熱也脈大血少者脈有風氣水漿不入此之謂也中去聲承上文諸反而言其病小猶少也大猶盛也上文雲氣盛身寒夫氣盛身反寒其內則得之傷寒之病上文雲氣虛身熱夫氣虛身反熱其內則得之傷暑之病上文云谷入多而氣少夫谷入多而氣反少者其內則得之有所脫血或濕邪居下之病脫血濕居下故氣少病不在上故谷入多上文云谷不入而氣多夫谷入少而氣反多者其內必邪在胃及於肺之病肺胃有邪故谷入少病不在下故氣多上文云脈少血多夫脈小血反多者其內必飲酒中熱之病酒行絡脈故血多行於外而虛於內故脈小上文云脈盛血少夫脈大血反少者其內必脈有風氣致水漿不入之病風氣乘於脈故脈大水漿不入故血少所謂反此者病即此諸病之謂也夫實者氣入也虛者氣出也氣實者熱也氣虛者寒也入實者右手開針空也入虛者左手閉針空也空作孔此言氣之虛實即為刺之虛實也夫實者乃氣之內入也虛者乃氣之外出也氣實者有餘而熱也氣虛者不足而寒也入針刺其實者右手開針孔以瀉之也入針刺其虛者左手閉針孔以補之也此氣之虛實即為刺之虛實也合常反虛實刺得其宜斯為刺志也針解論第五十四篇針解解靈樞素問所言之針法也針法始於一終於九上應天地合於人身故虛實之要九針最妙此帝首問九針之解虛實之道以為針解也黃帝問曰願聞九針之解虛實之道刺法不外九針九針必因虛實故願聞九針之解虛實之道岐伯對曰刺虛則實之者針下熱也氣實乃熱也九針十二原論云凡用針者虛則實之故申明刺虛則實之者候其氣聚針下熱也必氣聚而實針乃熱也滿而泄之者針下寒也氣虛乃寒也又云滿則泄之故申明滿而泄之者候其氣聚而散針下寒也必氣散而虛乃寒也菀陳則除之者出惡血也又云菀陳則除之故申明菀陳則除之者出其瘀積之惡血也邪勝則虛之者出針勿按又云邪勝則虛之故申明邪勝則虛之者出針之時隨針外泄勿按針孔也徐而疾則實者徐出針而疾按之大要曰徐而疾則實故申明徐而疾則實者針已得氣徐出其針針方出穴而疾按之此徐而疾則補虛而實之之法也疾而除則虛者疾出針而徐按之又云疾而徐則虛故申明疾而徐則虛者針已得氣疾出其針針既出穴而徐按之此疾而徐則瀉實而虛之之法也言實與虛者寒溫氣多少也若有若無者疾不可知也舊本若無若有今改又云言實與虛若有若無故申明言實與虛者針下寒而氣少為虛針下溫而氣多為實是寒溫之氣有多少也若有若無者當寧靜以俟之若躁疾則不可知也察後與先者知病先後也又云察後與先若存若亡故申明察後與先者治病有先後知之則能治之當知病之先後也為虛為實者工勿失其法若得若失者離其法也又云為虛為實若得若失故申明為虛為實者虛則補之實則瀉之工當勿失其補瀉之法也若得若失者衷無定見離其補瀉之法也虛實之要九針最妙者為其各有所宜也為去聲又云虛實之要九針最妙故申明虛實之要九針最妙者鑱針瀉陽氣員針瀉分肉間氣鍉針按脈致氣鋒針主發錮疾鈹針主取大膿員針主取暴氣毫針主取痛痹長針主取遠痹大針瀉機關之水為其九針各有所宜也補瀉之時者與氣開闔相合也又云補瀉之時以針為之故申明補瀉之時者氣開則瀉氣闔則補針之補瀉與氣之開闔相合也九針之名各不同形者針窮其所當補瀉也又云九針之名各不同形故申明九針之名各不同形者鑱針員針鍉針鋒針鈹針員利針毫針長針大針針形不同各窮盡其能當補瀉之用而制之也凡此解九針十二原之說也刺實須其虛者留針陰氣隆至乃去針也刺虛須其實者陽氣隆至針下熱乃去針也寶命全形論云刺虛者須其實刺實者須其虛故申明刺實須其虛者留針候氣俟陰氣隆至而針下寒乃去針陰氣隆至而去針所以虛之也刺虛須其實者當陽氣隆至而針下熱乃去針陽氣隆至而去針所以補之也經氣已至慎寧勿失者勿變更也更平聲又云經氣已至慎守勿失故申明經氣已至慎守勿失者守此經氣勿使變更也深淺在志者知病之內外也近遠如一者深淺其候等也又云深淺在志遠近若一故申明深淺在志者病在內則刺深病在外則刺淺知病之內外認為深淺也近遠如一者深則遠淺則近其候氣之法與深淺等故曰深淺其候等也如臨深淵者不敢墮也手如握虎者欲其壯也神無營於眾物者靜志觀病人無左右視也又云如臨深淵手如握虎神無營於眾物申明如臨深淵者兢兢業業不敢墮也手如握虎者堅貞不怯欲其壯也神無營於眾物者清靜其志以觀病人專一其心無左右視也凡此解寶命全形之說也義無邪下者欲端以正也必正其神者欲瞻病人目制其神令氣易行也邪斜通易去聲下同九針十二原論云正指直刺無針左右神在秋毫屬意者病夫正指直刺無針左右是義無斜下也申明義無邪下者針法欲端以正也神在秋毫屬意病者是必正其神也申明必正其神者以我之神正病人之神故欲瞻病人目以制其神神制則令氣易行也所謂三里者下膝三寸也本俞論云下三里三寸為巨虛上廉故曰所謂三里者乃下膝三寸即巨虛上廉也所謂跗上者舉膝分易見也上舊本訛之今改分去聲本俞論云中陽足跗上五寸陷中為原故曰所謂跗上者乃衝陽之動脈舉膝分則其脈易見也巨虛者蹺足䯒獨陷者本俞論云膝下三里䯒骨外三里也故曰巨虛者蹺足䯒之間其脈獨陷者是也下廉者陷下者也本俞論云復下三里三寸為巨虛下廉故曰下廉者乃下巨虛陷下者也凡此解本俞胃脈之說也帝曰余聞九針上應天地四時陰陽願聞其方今可傳於後世以為常也伯解九針之言故常復言九針上應天地之四時陰陽願聞其相應之方令可傳於後世以為針法之常也岐伯曰夫一天二地三人四時五音六律七星八風九野身形亦應之針各有所宜故曰九針靈樞九針論岐伯有一以法天二以法地三以法人四以法時五以法音六以法律七以法星八以法風九以法野之說故此言之而言人之身形亦應之至用針之法各有所宜故曰九針此九針可傳於後世認為常也人皮應天所謂身形亦應之者人皮包乎通體一如天包地外故人皮應天人肉應地人肉敦厚一如地之廣厚故人肉應地人脈應人人脈上法天時下則地理一如人之戴天履地故人脈應人人筋應時人筋十二足筋起於足指手筋起於手指手足為四肢一如十二月分四時故人筋應時人聲應音人聲清濁高下不同一如五音分五行故人聲應音人陰陽合氣應律人手足三陰三陽陰陽合氣相為表裡一如陰律陽律之調和故人陰陽合氣應律人齒面目應星人齒排列面目光明一如星之明朗排列故人齒面目應星人出入氣應風人氣出入編行周身一如風之偏行六合故人出入氣應風人九竅三百六十五絡應野人有九竅周身三百六十五絡一如地有分野復有山河道路故人九竅三百六十五絡應野凡此申明一天二地三人四時五音六律七星八風九野而人之身形亦應之也故一針皮所謂針各有所宜者一曰鑱針針皮二針肉二曰員針針肉三針脈三曰鍉針針脈四針筋四曰鋒針針筋五針骨五曰鈹針針骨六針調陰陽六曰員利針主調陰陽七針益精七曰毫針主益精八針除風八曰長針主除風九針通九竅除三百六十五節氣九曰大針主通九竅併除三百六十五節壅滯之氣此之謂各有所主也承上文而言此之謂針各有所宜主也凡此申明九針之各有所宜也人心意應八風三才相應通變無窮故以所應而推廣言之人之心意一如風之變動無常故人心意應八風人氣應天人身之氣一如天之運行不息故人氣應天人發齒耳目五聲應五音六律人上發下齒兩耳兩目位同六合以應六律其五聲高下以應五音人陰陽脈血氣應地人身陰陽之脈血氣循行一如地裡散殊而會通故人陰陽脈血氣應地人肝目應之舊本贅一九字今移下作爛文人之五臟外合九竅故人肝則兩目應之此處疑有缺文此人身針刺之道通貫三才而合於天地之陰陽也九九竅三百六十五人一以觀動靜天二以候五色七星應之以候發母澤五音一以候宮商角徵羽六律有餘不足應之二地一以候高下有餘九野一節愈應之以候閉節三人變一分人候齒泄多血少十分角之變五分以候緩急六分不足三分寒關節第九分四時人寒溫燥濕四時一應之以候相反一四方各作解王冰曰此一百二十四字蠹簡爛文義理殘缺莫可尋究而上古書故且載之以佇後之具本也愚按素問一書論天人運氣之理經脈俞穴之會飲食輸瀉血氣循行惟生知之聖開天立極始能道之今觀蠹簡爛文存而不去則素問傳自軒歧確乎不爽奈後儒不能探索妄疑此書非上古之文乃戰國時人所而戰國時人未聞有如黃帝之聖者也有如黃帝之聖何難自名成倫豈必假問答於軒歧而故為隱晦若是耶西晉王叔和編次張仲景傷寒論毫無所得猶以己之序例附於論中稱第二卷伊何人而甘自沒耶若謂戰國時人能作是論則此人亦聖人矣若謂書傳上古後人增飾則爛文必刪去矣孔安國序尚書云伏羲神農黃帝書謂之三墳言大道也宋林億序素問云至精至微之道傳之至下至淺之人其不廢絕為已幸矣由此觀之則後儒不諳三墳淺下妄疑不亦宜乎長刺節篇第五十五篇靈樞官針篇云刺有十二節刺節真邪論云刺有五節長猶廣也長刺節者即以病之所在而為刺之之節如頭痛寒熱腐腫積疝痹病狂癲諸風皆以病之所在而取刺之所以廣五節十二節之刺故曰長刺節刺家不診聽病者言岐伯承上篇針解而廣刺節之意九針十二原論云凡將用針必先診脈今曰刺家不診但聽病者言是施刺之法有憑脈者有憑證者所以廣刺法之未盡也在頭頭疾痛為藏針之刺至骨病已上無傷骨肉及皮皮者道也藏如字此刺頭痛之法也在頭病在頭也頭疾痛因病在頭卒然而痛也藏猶深也藏針深刺也為藏針之故刺至骨其病始已刺雖在骨其上則無傷骨外之肉以及於皮刺法由皮至骨乃行針之道故曰皮者道也道猶路也陽刺入一旁四處治寒熱深專者刺大臟迫臟刺背背俞也刺之迫臟臟會腹中寒熱去而止與刺之要髮針而淺出血陽舊本訛陰今改處去聲此刺寒熱之法也靈樞官針篇五曰陽刺陽刺者正內一旁內四陽刺入一即正內一也旁四處即旁內四也此陽刺之法乃治寒熱之病若寒熱不在陽分深而且專深專者入於陰分故刺大臟申明大臟者迫臟刺背五臟之俞皆在於背是背俞也又申明刺之迫臟者以臟俞在背為臟之會夫入一旁四乃陽刺而治陽分之寒熱迫臟刺背乃陰刺而治腹中之寒熱故腹中寒熱去而止與刺之止與刺者中病即止之意下凡言止者皆止與刺也無論陽刺陰刺大要髮針之時貴淺出其血以通絡脈也治腐腫者刺腐上視癰小大深淺刺刺大者多血小者深之必端內針為故止內音納此刺腐腫之法也肉爛已腐高大曰腫治腐腫者治其內腐外腫也內腐外腫即當刺其腐上更視癰之小大以為深淺之刺刺大者刺大癰也多血多膿血也大癰多血當淺刺之小者小癰也癰小未潰毒氣在內當深刺之其深刺也必端以內針為復其故而止與刺之病在少腹有積刺皮𩩻以下至少腹而止刺挾脊兩旁四椎間刺兩髂髎季脅肋間導腹中氣熱下已𩩻腯同音突髂音駕髎音料餘篇同此刺腹積之法也腯肥厚也病在少腹有積刺其積上皮腯之處少腹有積則少腹皮腯故以下至少腹而止是其處也挾脊兩旁四椎間乃心包厥陰之俞少腹有積刺厥陰俞者脈要精微論云病名心疝少腹當有形故刺也腰骨曰髂兩髂髎兩邊腰骨之側居髎穴也季脅肋間章門穴也季脅肋乃足厥陰肝脈之經髂髎乃足少陽膽脈之經少腹有積合刺厥陰少陽者乃導腹中之氣溫熱其下則病可已下指少腹也病在少腹腹痛不得大小便病名曰疝得之寒刺少腹兩股間刺腰髁骨間刺而多之盡炅病已此刺寒疝之法也病在少腹少腹且痛並不得大小便者病名曰疝得之於寒當刺少腹兩股間衝門穴也刺腰髁骨間乃背十三椎下外旁盲門穴也刺少腹兩股間所以治疝也刺腰髁骨間所以治寒也故當刺而多之炅猶熱也俟其盡熱則病可已病在筋筋攣節痛不可以行名曰筋痹刺筋上為故刺分肉間不可中骨也病起筋炅病已止中去聲此刺筋痹之法也病在筋則筋攣而骨節痛筋攣節痛則不可以行病名曰筋痹即當刺其筋上使之不攣為復其故其刺筋上之法當刺分肉間不可中骨也刺之得宜則病起筋熱病起筋熱則病已病已則止刺也病在肌膚肌膚盡痛名曰肌痹傷於寒濕刺大分小分多髮針而深之以熱為故無傷筋骨傷筋骨癰發若變諸分盡熱病已止此刺肌痹之法也病在肌膚肌膚盡痛則名曰肌痹此因傷於寒濕而為痹也當刺肌肉之大分小分大分肉之大會小分肉之小會分肉之間三百六十五會故當多髮針而深刺之以熱氣之至為復其故雖曰深之無傷筋骨傷筋骨則癰發而若變其未變時刺得其宜使諸分肉盡熱則病已而止針病在骨骨重不可舉論髓痠痛寒氣至名曰骨痹深者刺無傷脈肉為故其道大分小分骨熱病已止酸作痠此刺骨痹之法也病在骨骨重不可舉兼骨髓痠痛寒氣至骨病名曰骨痹痹在於骨當刺其骨而刺之深者其刺當無傷其脈肉刺得其宜則骨痹去而為復其故其道骨道也無傷脈肉者其骨道之氣亦從肉之大分小分而出也在骨刺骨候其氣至骨熱則病已而止針病在諸陽脈且寒且熱諸分且寒且熱名曰狂刺之虛脈視分盡熱病已止此刺狂病之法也病在諸陽脈而且寒且熱則邪氣乘於經脈矣諸分而且寒且熱則邪氣乘於分肉矣分肉之邪經脈之邪兩相交併病名曰狂刺之虛脈使邪不乘於經脈也視分盡熱視分肉之間正氣聚而盡熱也如是則狂病已而止針病初發歲一發不治月一發不治月四五發名曰癲病刺諸分諸脈其無寒者以針調之病已止此刺癲病之法也病初發癲病初發也初發不治則歲一發歲發不治則月一發月發不治則月四五發凡此病發名曰癲病當刺諸分諸脈諸分諸分肉也諸脈諸經脈也其無寒者言無寒熱不同於狂病之且寒且熱也狂病為陽癲病為陰陽屬有餘陰屬不足故當以針調補之使病已而止針病風且寒且熱炅汗出一日數過先刺諸分理絡脈汗出且寒且熱三日一刺百日而已此刺風病之法也病風且寒且熱炅汗出一日數過者風為陽邪其性鼓動故寒熱炅汗出一日數至也先刺諸分理絡脈者先其未發之時刺分肉之腠理經外之絡脈也汗出刺出其汗也汗出而寒熱不解仍且寒且熱則當三日一刺至百日則天干十周其病可已病大風骨節重鬚眉墮名曰大風刺肌肉為故汗出百日刺骨髓汗出百日凡二百日鬚眉生而止針此刺癘風之法也大風癘風也風邪客於脈而不去皮膚瘍㿉名曰癘風故病大風內則骨節重外則鬚眉墮名曰大風當刺其肌肉使肌肉為復其故刺肌肉而汗出百日去其風邪骨節之邪猶未去也故更刺骨髓亦汗出百日凡二百日則天干二十周鬚眉生而止針此舉頭痛腐腫積疝痹病狂癲諸風刺之有節而為長刺節也皮部論第五十六篇皮部皮之十二部也手足三陽三陰十二經絡之脈皆在於皮各有分部故曰十二經絡脈者皮之部也部有左右上下復有外內淺深百病之生先於皮毛由皮毛而腠理腠理而絡脈絡脈而經脈經脈而腑臟腑臟之氣亦通於皮亦有分部其腑臟之氣不與於皮而生大病矣黃帝問曰余聞皮有分部脈有經紀筋有結絡骨有度量其所生病各異別其分部左右上下陰陽所在病之始終願聞其道量平聲別音逼皮主通體分屬經脈各有其部故皮有分部周身脈道有徑直之經橫絡之紀故脈有經紀靈樞經筋十三各有所結間有所絡故筋有結絡骨度長短不同不可以度而量之故骨有度量皮脈筋骨生病不同故生病各異凡此當別其分部左右上下陰陽所在而知病之始終故舉以問岐伯對曰欲知皮部以經脈為紀者諸經皆然皮有分部乃以經脈而分其部故欲知皮部以經脈為紀者十二經皆然諸十二也陽明之陽名曰害蜚上下同法視其部中有浮絡者皆陽明之絡也其色多青則痛多黑則痹黃赤則熱多白則寒五色皆見則寒熱也絡盛則入客於經陽主外陰主內蜚飛同經脈之氣從內達外由闔而樞樞而開故首論陽明之闔次論少陽之樞終論太陽之開陽明之陽行身之前而主闔闔則不開有害於飛故名曰害蜚蜚猶開也上下猶手足也無分手足皆為害蜚故上下同法但視其陽明部中皮內有浮絡者皆手足陽明之絡也其浮絡之色多青則痛多黑則痹黃赤則熱多白則寒若青黑黃赤白五色皆見則寒熱互呈也皮絡之邪過盛則入客於經蓋絡為陽主外經為陰主內也少陽之陽名曰樞持上下同法視其部中有浮絡者皆少陽之絡也絡盛則入客於經故在陽者主內在陰者主出以滲於內諸經皆然少陽之陽行身之側而主樞故名曰樞持持猶主也無分手足皆為樞持故上下同法但視其少陽部中皮內有浮絡者皆手足少陽之絡也皮部之邪過盛則入客於經絡為陽主外絡盛客經則陽氣內入故在陽者主內經為陰主內陽氣內入則陰氣外出故在陰者主出出而復入以滲於內此陰陽經絡外內出入不獨手足少陽為然而諸經皆然太陽之陽名曰關樞上下同法視其部中有浮絡者皆太陽之絡也絡盛則入客於經太陽之陽行身之背而主開故名曰關樞關猶系也樞轉始開開之繫於樞也無分手足皆為關樞故上下同法但視其太陽部中皮內有浮絡者皆手足太陽之絡也皮絡之邪過盛則入客於經少陰之陰名曰樞儒上下同法視其部中有浮絡者皆少陰之絡也絡盛則入客於經其入經也從陽部注於經其出者從陰內注於骨經脈之氣有陽有陰樞為之主故先論少陰之樞次論厥陰之闔終論太陰之開少陰之陰從踹膕而上注胸中而止樞轉神機區別水火故名曰樞儒儒猶區也手足少陰皆為樞儒故上下同法但視其少陰部中皮內有浮絡者皆手足少陰之絡也皮絡之邪過盛則入客於經其入經也從浮絡之陽部而注於經有入則有出其出者少陰在內從至陰之內注於骨中而始出也心主之陰名曰害肩上下同法視其部中有浮絡者皆心主之絡也絡盛則入客於經心主手厥陰心主包絡也手足無分上下同法故舉手之厥陰以明之心主之陰起於胸中而主闔闔則不能外任故名曰害肩肩猶任也手足厥陰皆為害肩故上下同法但視其心主部中皮內有浮絡者皆心主之絡是足之厥陰亦同於手之厥陰也皮絡之邪過盛則入客於經太陰之陰名曰關蟄上下同法視其部中浮絡者皆太陰之絡也絡盛則入客於經太陰之陰循足脛交出厥陰之前而主開故名曰關蟄蟄猶藏也藏而後開開之關於蟄也手足太陰皆為關蟄故上下同法但視其太陰部中皮內有浮絡者皆手足太陰之絡也皮絡之邪過盛則入客於經凡絡盛客經言從絡脈而至於經脈以明絡脈之部即經脈之部也凡十二經絡脈者皮之部也通承上文而言手足三陽三陰凡十二經絡脈者在於通體而為皮之部也此一節言手足三陽三陰十二經絡之脈皆在於皮以皮部而知經絡即以經絡而分皮部也是故百病之始生也必先於皮毛邪中之則腠理開開則入客於絡脈留而不去傳入於經留而不去傳入於腑廩於腸胃中去聲部有左右上下復有外內淺深是故百病之始生也必先於皮毛由皮毛而入於腠理故邪中之則腠理開由腠理而入於絡脈故開則入客於絡脈由絡脈而入於經脈故留而不去傳入於經由經脈而入於腑故留而不去傳入於腑腸胃為土腑萬物之所歸故廩於腸胃廩倉廩言聚藏也邪之入於皮也溯然起毫毛開腠理其入於絡也則絡脈盛色變其入客於經也則感虛乃陷下其留於筋骨之間寒多則筋攣骨痛熱多則筋施骨消閃爍䐃破毛直而敗復從上文之意而推論之又言邪之始入於皮也溯然起毫毛由毫毛而入於腠理故開腠理其從腠理而入於絡也則絡脈盛而色變其從絡脈而入客於經也則感經脈之虛而邪乃陷下其從經脈而不入於腑則傷臟氣留於筋骨之間寒多則筋攣骨痛熱多則筋施骨消甚至虛於內而絕於外閃爍䐃破腠理絕矣毛直而敗皮毛絕矣毛內筋骨臟氣主之此言從皮毛而入臟也帝曰夫子言皮之十二部其生病皆何如伯言十二經絡脈者皮之部也故問皮之十二部其生病皆何如岐伯曰皮者脈之部也邪客於皮則腠理開開則邪入客於絡脈絡脈滿則注於經脈經脈滿則入舍於腑臟也經脈絡脈之部皆在於皮故皮者脈之部也邪客於皮則腠理開腠理開則邪入客於絡脈絡脈滿則邪注於經脈經脈滿則邪入舍於腑臟也是知病之生也始於皮毛各從其部由淺入深而舍於腑臟也故皮者有分部不與而生大病也與去聲此後申明生病之意腑臟之氣通於皮中故皮者各有分部若腑臟之氣不與於皮而生大病也帝曰善部有左右上下復有外內淺深而皮部之邪入腑入臟腑臟之氣出於皮中帝故善之此一節言皮部有皮毛腠理絡脈經脈之淺深而腑臟之氣皆當於皮部也經絡論第五十七篇經絡經脈絡脈也上篇從皮腠而入於絡脈絡脈而入於經脈故此復有經絡之論論經絡之色有常有變所以承上篇五色而補其未盡之義黃帝問曰夫絡脈之見也其五色各異青黃赤白黑不同其故何也上篇言陽明部中之浮絡其色多青則痛多黑則痹黃赤則熱多白則寒未悉其旨故帝復問絡脈之見其五色各異青黃赤白黑不同所以承上篇而復問也岐伯對曰經有常色而絡無常變也經脈內連腑臟有五行之常色而絡脈則浮見於外無有經常而多變也無常變猶言變無常也帝曰經之常色何如未問浮絡之變先問經色之常岐伯曰心赤肺白肝青脾黃腎黑皆亦應其經脈之色也五臟應五色如心色赤肺色白肝色青脾色黃腎色黑此皆以五臟而亦應其經脈之色是為常也帝曰絡之陰陽亦應其經乎帝欲詳明絡色之變故問絡之陰陽亦應其經乎岐伯曰陰絡之色應其經陽絡之色變無常絡有陰陽陰絡在內內繫於經故陰絡之色應其經陽絡在外外浮於皮故陽絡之色變無常隨四時而行也寒多則凝泣凝泣則青黑熱多則淖澤淖澤則黃赤此皆常色謂之無病泣音澀所謂應其經者隨四時而行也如秋冬寒多則絡脈凝澀凝澀則色青黑春夏熱多則絡脈淖澤淖澤則色黃赤此皆隨四時之常色故謂之無病五色具見者謂之寒熱陰絡應經而隨四時則絡亦有常色所謂變無常者若五色具見者乃浮絡之色乍青乍黑乍黃乍赤變無經常則非無病故謂之寒熱寒熱者或寒或熱變無常也帝曰善絡脈經脈淺深不同而陰絡應其經陽絡變無常是絡脈之中復有陰陽帝故善之氣穴論第五十八篇氣穴者一身之氣循行三百六十五穴也孫絡溪谷亦三百六十五會皆應一歲之數帝願聞真數而藏金蘭之室署曰氣穴所在是為氣穴論也黃帝問曰余聞氣穴三百六十五以應一歲未知其所願卒聞之周天三百六十五度一歲三百六十五日人身氣穴亦三百六十五會以應一歲之數而氣穴所在願盡聞之岐伯稽首再拜對曰窘乎哉問也其非聖帝孰能窮其道焉因請溢意盡言其處處去聲下同以血肉之形身應天度之歲數惟天生聖帝能窮其道因請溢意盡言其處帝捧手逡巡而卻曰夫子之開余道也目未見其處耳未聞其數而目以明耳以聰矣逡巡退讓貌道言也開余道開示於我而言之也目未見耳未聞而目以明耳以聰是伯雖未言帝先知之此臣君一德一心闡明大道也岐伯曰此所謂聖人易語良馬易御也易去聲下同未見其處未聞其數而目明耳聰此所謂聖人易語猶良馬易御也帝曰余非聖人之易語也世言真數開人意今余所訪問者真數發蒙解惑未足以論也然余願聞夫子溢志盡言其處令解其意請藏之金匱不敢復出藏如字真數三百六十五穴之數帝不自聖故言余非聖人之易語但世恆言真數可以開人心意今余所訪問者亦真數之發蒙解惑真數之外未足以論也然此真數余願聞之上文岐伯云因請溢意盡言其處故曰夫子溢志盡言其處令余能解其意請藏之金匱而不敢復出藏之金匱中心藏之之意不敢復出不輕示人之意岐伯再拜而起曰臣請言之背與心相控而痛所治天突與大椎及上紀上紀者胃脘也下紀者關元也背胸邪系陰陽左右大椎舊本訛十椎下同今俱改邪斜同控引也天突在結喉下中央大椎乃脊骨高起第一椎胃脘有上脘中脘下脘以臍之上下為紀則此胃脘乃下脘也臍上至下脘臍下至關元分寸相等故曰上紀下紀背與心相控而痛背痛引心或心痛引背也所治在天突心胸之上也與大椎脊背之上也及上紀以臍為中紀其上也故上紀者臍上下脘之胃脘也由臍紀下則下紀者臍下小腹之關元也背心相控不但從背引胸從胸引背乃背胸斜系陰陽左右也如此其病前後痛澀胸脅痛而不得息不得臥上氣短氣偏痛如此指背胸斜系陰陽左右也斜系如此故其病當前後痛澀前後憑乎脅故胸脅痛胸脅痛則樞轉有垂而不得息不得息則不得臥不得息不得臥則上氣短氣致有偏痛之病脈滿起斜出尻脈絡胸脅支心貫膈上肩加天突斜下肩交大椎下支如字此復申明斜系陰陽左右之脈也脈滿起經脈滿盛從下而起斜出尻從左右足脛行身之背則斜出於尻也脈絡胸脅者行身之前則由脅而至胸故曰脈絡胸脅也絡胸則支心貫膈由膈而斜上於肩必由天突而上故曰加天突經脈既從下而斜上亦必從上而斜下故斜下肩斜下肩則交大椎而下也所以申明斜系陰陽左右也天突大椎合胃脘關元凡四穴臟俞五十六五臟俞穴出於井溜於榮注於俞行於經入於合肺心之穴在手肝脾腎在足一臟五俞五五二十五俞合兩手足共五十俞腑俞七十二穴六腑俞穴出於井溜於榮注於俞過於原行於經入於合膀胱膽胃之穴在足三焦小腸大腸在手一腑六俞六六三十六俞合兩手足共七十二俞熱俞五十九穴熱俞水熱穴論治熱之俞也論云頭上五行行五以越諸陽之熱大杼膺俞缺盆背俞此八者以瀉胸中之熱氣街三里巨虛上下廉此八者以瀉胃中之熱雲門骨禹骨委中髓空此八者以瀉四肢之熱五臟俞旁五此十者以瀉五臟之熱凡此五十九穴者皆熱之左右也熱俞五十九穴此之謂也水俞五十七穴水俞水熱穴論治水之俞也論云尻上五行行五伏兔上各二行行五踝上各一行行六凡五十七穴者皆臟之陰絡水之所客也水俞五十七穴此之謂也頭上五行行五五五二十五穴行音杭熱俞五十九穴內有頭上五行行五於此復言者頭有前後從頭上前行行五後行亦五行重舉之則前後之穴畢備矣中𦛗兩旁各五凡十穴𦛗膂同餘篇仿此熱俞五十九穴內有五臟俞旁五乃臟俞兩旁之穴此中膂兩旁各五乃五臟之俞穴也大椎上兩旁各一凡二穴大椎脊骨高起第一椎也上兩旁肩項相交肩中俞也兩旁各一凡二穴目瞳子浮白二穴目瞳子乃目稍瞳子髎穴也浮白穴在耳骨髮際間瞳子浮白各二穴凡四穴兩髀厭分中二穴膽足少陽之脈循胸過季脅下合髀厭中兩髀厭分中兩腿硯子骨分界之處環跳穴也左右二穴犢鼻二穴膝蓋下兩旁中央形如牛鼻左右二穴耳中多所聞二穴耳內聽宮左右二穴眉本二穴本根也眉根攢竹左右二穴完骨二穴耳後髮際浮白上即完骨左右二穴項中央一穴項後中央風府穴也枕骨二穴腦後左右玉枕穴即枕骨也上關二穴聽宮之上為上關一名客主人穴大迎二穴頰車之下頷前一寸二分為大迎穴下關二穴聽宮下頰車上即下關穴天柱二穴項後風府兩旁即天柱穴巨虛上下廉四穴三里下三寸為巨虛上廉上廉復下三寸為巨虛下廉在脛骨間左右凡四穴曲牙二穴曲牙即頰車又名牙車當牙骨盡處開口陷中天突一穴結喉下中央為天突天府二穴臂臑內為天府天牖二穴耳後完骨下為天牖抉突二穴膺胸上缺盆下為扶突天窗二穴天牖下名天容天容下即天窗後髮際盡處兩旁肩解二穴肩上陷中即肩井穴關元一穴臍下三寸為關元穴委陽二穴腿後廉之中兩筋之間為委陽肩貞二穴肩臂上兩板骨上側為肩貞喑門一穴項後風府下為喑門即啞門也齊一穴齊臍通當臍之中神厥穴也胸俞十二穴頷下兩旁巨骨之下俞府或中神藏靈墟神封步郎左右凡十二穴背俞二穴背俞七椎兩旁膈俞穴也膺俞十二穴膺中俞府之外左右氣戶庫房屋翳膺窗乳中乳根凡十二穴分肉二穴臍上水分穴兩旁滑肉門為分肉踝上橫二穴踝上橫紋之解谿穴陰陽蹺四穴陰蹺起於足內踝之照海左右二穴陽蹺起於足外踝之申脈左右二穴凡四穴水俞在諸分熱俞在氣穴寒熱俞在兩骸厭中二穴水氣不行則皮膚脹滿故水俞在諸分諸分周身肌腠之分理也熱氣有餘則經脈消爍故熱俞在氣穴氣穴陽氣循行之穴孔也寒熱陰陽皆病也左右乃陰陽之道路故寒熱俞在兩骸兩骸形身左右也環跳二穴當身左右厭中即上文髀厭分中環跳穴也大禁二十五在天府下五寸大禁二十五乃五臟之井榮俞經合五五二十五俞之禁也在天府下五寸乃天府之下相去五寸左右五里穴也本俞論云尺動脈在五里五俞之禁者是也凡三百六十五穴針之所由行也承上文而總結之凡三百六十五穴以應一歲之數為針之所由行皆氣穴之所在也自天突至天府下五寸共三百六十六穴一歲三百六十五日而有奇周天三百六十五度四分度之一則三百六十六數相吻合也按頭上五行行五及天突關元厭中巨虛上下廉穴有重複而一歲之數毫無錯也此一節言氣穴三百六十五以應歲數皆針之所由行也帝曰余已知氣穴之處遊針之居願聞孫絡溪谷亦有應乎孫絡溪谷亦應一歲之數故承上文而復問之岐伯曰孫絡三百六十五穴會亦以應一歲以溢奇邪以通榮衛榮衛稽留衛散營溢氣竭血著外為發熱內為少氣疾瀉無怠以通榮衛見而瀉之無問所會經脈之外是為絡脈絡脈之外是為孫絡孫絡三百六十五穴會言周身孫絡與三百六十五穴相會合也孫絡與穴會合故亦以應一歲之歲奇邪者繆刺論云邪入舍於孫絡不得入於經流溢於大絡而生奇病奇邪猶奇病也奇邪在絡故孫絡以溢奇邪溢泛溢猶外出也孫絡之所以溢奇邪者以孫絡合大絡而通榮衛也如孫絡不通榮衛則榮衛稽留稽留則衛散榮溢衛散則氣外竭榮溢則血內著血著則外為發熱氣竭則內為少氣如是之證當疾瀉無怠以通榮衛疾瀉者見其稽留而即瀉之無問孫絡與氣穴之所會也帝曰善願聞溪谷之會也孫絡會氣穴而通榮衛帝故善之溪谷亦會三百六十五穴故又問之岐伯曰肉之大會為谷肉之小會為溪肉分之間溪谷之會以行榮衛以會大氣邪溢氣壅脈熱肉敗榮衛不行必將為膿肉消骨髓外破大膕留於節湊必將為敗積寒留舍榮衛不居卷肉縮筋肋肘不得伸內為骨痹外為不仁命曰不足大寒留於溪谷也溪谷三百六十五會穴亦應一歲其小痹淫溢循脈往來微針所及與法相同會合也肉之大合處即為谷肉之小合處即為溪會之所在即分之所在分之所在即會之所在故肉分之間即為溪谷之會溪谷之會內外相通內通經脈以行榮衛外通皮毛以會大氣大氣宗氣也積於胸中以司呼吸而合於皮毛者也如溪谷不通於內外則邪泛溢而氣壅滯血脈熱而肌肉敗夫邪溢氣壅則榮衛不行必將為膿脈熱肉敗則內消骨髓外破大膕留於節湊必將為敗為膿為敗皆積寒留舍於溪谷致榮衛血氣不居於溪谷之間而卷肉縮筋夫卷肉縮筋則肋肘不得舒伸從筋至骨則內為骨痹從肉至皮則外為不仁邪盛正虛命曰不足此皆積寒留舍之所致乃大寒留於溪谷也周身三百六十五溪谷與三百六十五氣穴相會亦以應一歲之數故寒留溪谷而內為骨痹外為不仁若其小痹淫溢則循孫絡之脈往來於身治之之法但當微針所及與見而瀉之無問所會之法相同不若大寒之留於溪谷也帝乃闢左右而起再拜曰今日發蒙解惑藏之金匱不敢復出乃藏之金蘭之室署曰氣穴所在闢作擗藏如字三百六十五穴與孫絡溪谷相會伯明其旨誠為發蒙解惑帝尊奉而珍寶之藏之金蘭之室署曰氣穴所在而問答之言即為氣穴論也岐伯曰孫絡之脈別徑者其血盛而當瀉者亦三百六十五脈並注於絡傳注十四絡脈非獨十二絡脈也四舊本訛二二舊本訛四今改此言孫絡之脈與經脈相別與大絡相通所謂奇邪之脈則繆刺之以補孫絡未盡之義繆刺論云邪客於皮毛入舍於孫絡留而不去閉塞不通不得入於經流溢於大絡而生奇病又云視其皮部有血絡者盡取之此繆刺之數也夫孫絡受邪不得入於經故曰孫絡之脈別經者視其皮部有血絡者盡取之故曰其血盛而當瀉者亦三百六十五脈流注於大絡而生奇病故曰並注於絡絡大絡也靈樞經脈論有手太陰少陰心主太陽陽明少陽之別足太陽陽明少陽太陰少陰厥陰之別並任脈之別督脈之別為十四大絡故曰傳注十四絡脈非獨手足三陽三陰之十二絡脈也又脾之大絡為十四絡脈之主經脈論云皆取脾之大絡脈也此雖不及脾絡而脾絡已在其中內解瀉於中者十脈解音蟹解散也瀉行也十四絡脈外合孫絡則有三百六十五會內合五臟則有左右五俞之十脈故曰內解瀉於中者十脈所以承十四絡脈而申明內通五臟之俞脈以補上文孫絡之未盡者又如此此一節言孫絡溪谷亦三百六十五會以應一歲之數通榮衛而會大氣合大絡而行臟俞也氣府篇第五十九篇伯承上篇氣穴論而復言氣府也手足三陽之脈六腑主之故脈氣所發之穴即為氣府手足三陽合督任衝脈凡三百六十五穴亦應一歲之數所以承氣穴而補其未盡之義足太陽脈氣所發者七十六穴六舊本訛八今改足太陽脈氣所發之穴計七十六穴足太陽膀胱水府也脈氣所發者從足太陽經脈之氣而發於穴也兩眉頭各一入發至頂三寸半旁五相去三寸其浮氣在皮中者凡五行行五五五二十五頂舊本訛項今改行音杭頂前頂穴也兩眉頭各一攢竹穴也自攢竹入髮際至前頂其中有神庭上星囟會故長三寸半前頂有中行次兩行外兩行故旁五言自中及旁有五行也五行之內左右相去三寸申明旁五者其太陽之浮氣在皮中者凡五行一行五穴五五則二十五穴也二十五者中行有前頂百會後頂強間腦戶五穴次兩行有五處承光通天絡卻玉枕左右十穴又次兩行有正營承靈腦空竅陰完骨左右十穴共二十五穴合兩攢竹神庭上星囟會五穴凡三十穴項中大筋兩旁各一風池二穴風府兩旁各一天柱二穴以明上文外兩旁在項中大筋兩旁名為風池者各一內兩旁在風府穴兩旁名為天柱者各一穴俠脊以下至尻尾二十一節十五間各一五臟之俞各五六腑之俞各六自風府兩旁俠脊以下從大椎至尻尾計二十一節二十一節之中凡十五節間各一謂肺俞厥陰俞心俞膈俞肝俞膽俞脾俞胃俞三焦俞腎俞大腸俞小腸俞膀胱俞中膂內俞白環俞左右各一凡三十穴十五節間內有肺心肝脾腎五臟之俞左右各五膽胃三焦大腸小腸膀胱之俞左右各六臟俞各五腑俞各六總在十五間而十五間覆在二十一節內也委中以下至足小趾旁各六俞委中腿灣委中穴也至足小趾旁有崑崙京骨束骨通谷至陰合委中左右各六俞凡十二穴此足太陽脈氣所發共七十六穴足太陽之脈起於目內眥上額交巔絡腦下項俠脊抵腰循髀膕至足小趾外側故脈氣所發如此足少陽脈氣所發者六十二穴足少陽為膽府脈氣所發之穴計六十二穴兩角上各二角頭角也從耳之曲鬢至天衝兩角上左右各二凡四穴直目上髮際內各五直中正也直目上髮際內從目中正間上於髮際之內有臨泣目窗正營承靈腦空左右各五凡十穴耳前角上各一頷厭二穴耳前角下各一懸釐二穴銳發下各一銳發即鬢髮下各一和髎二穴也客主人各一一名上關在耳前之上耳後陷中各一翳風二穴下關各一在耳前之下故名下關耳下牙車之後各一車音叉耳下頰車之後天容二穴缺盆各一項側兩開鎖骨缺陷如盆左右二穴腋下三寸脅下至胠八間各一腋下三寸淵液穴也腋下為脅脅下為胠脅下至胠有輒筋大包日月京門帶脈五樞維道居髎八穴之間左右各一行計十六穴合左右淵液凡十八穴髀樞中旁各一髀樞即髀厭環跳穴也在居髎穴下髀樞中旁即髀厭分中之義兩旁各一凡二穴膝以下至足小趾次指各六俞陽陵泉陽輔坵墟臨泣俠谿竅陰左右各六俞凡十二穴此足少陽脈氣所發共六十二穴足少陽之脈起於目銳眥上抵頭角入耳前後從腋下脅行身之側下膝至足故脈氣所發如此足陽明脈氣所發者六十八穴足陽明為胃腑脈氣所發之穴計六十八穴額顱髮際旁各三從額顱入髮際有本神頭維懸顱兩旁各三凡六穴面鼽骨空各一空孔同余仿此面鼽骨空四白穴也面上鼻氣旁通之處故曰面鼽穴居骨內故曰骨空左右凡二穴大迎之骨空各一大迎在頰車下承漿旁穴在骨間故曰大迎之骨空左右凡二穴人迎各一在結喉兩旁動脈間缺盆外骨空各一缺盆在頷下兩旁陷中缺盆外骨空肩缺盆之天髎穴也膺中骨間各一膺膺窗也中乳中也膺中骨間謂膺窗乳中胸骨之間即上文十五間八間之義膺窗之上有屋翳庫房氣戶乳中之下有乳根其穴俱在胸骨間左右各一行凡十二穴俠鳩尾之外當乳下三寸俠胃脘各五俠並也俠鳩尾之外並鳩尾之外兩旁也當乳下三寸外旁不容之穴與鳩尾相併當在乳下則相去三寸也俠胃脘謂不容之下即有承滿梁門關門太乙與胃上脘中脘下脘相併也合鳩尾外旁胃脘外旁左右各五凡十穴俠臍廣二寸各三齊臍通下同二寸舊本訛三寸今改俠臍與臍相併也廣開廣也俠臍廣二寸天樞穴也各三乃天樞外陵大巨左右各三凡六穴下齊三寸俠之各三三寸舊本訛二寸今改下臍三寸關元穴也下臍三寸俠之乃外兩旁之水道歸來氣衝左右各三凡六穴氣街動脈各一骨空論云衝脈者起於氣街衛氣論云胸氣有街腹氣有街頭氣有街脛氣有街此氣街動脈乃腹氣之街左右盲俞二穴伏兔上各一伏兔上髀關穴也左右各一三里以下至足中指各八俞分之所在穴空膝犢鼻下外廉相去三指是為三里膝三里以下至足中指其中有三里上廉下廉解谿衝陽陷谷內庭厲兌左右各八俞凡十六穴六腑皆六俞獨足陽明有八俞蓋大腸屬上廉小腸屬下廉其大小腸分屬所在穴孔為陽明之所主也本俞論云大腸屬上小腸屬下大腸小腸皆屬於胃是足陽明者此也此足陽陰脈氣所發共六十八穴足陽明之脈起於鼻交頞中旁約太陽之脈循髮際至額顱從大迎下人迎入膺胸行身之前下腹從脛抵足厲兌故脈氣所發如此手太陽脈氣所發者三十六穴手太陽為小腸腑脈氣所發之穴計三十六穴目內眥各一兩睛明穴目外各一目外謂目外眥兩瞳子髎穴鼽骨下各一即上文面鼽骨空之下兩巨髎穴耳郭上各一郭匡郭也耳郭上兩角孫穴耳中各一耳中珠子兩聽宮穴巨骨穴各一肩上又骨尖端罅間兩巨骨穴曲掖上骨穴各一肩端尖骨從後下陷是為曲掖曲掖上骨兩臑俞穴舉臂取之柱骨上陷者各一柱骨項骨也柱骨上陷者兩肩井穴也上天窗四寸各一天窗項側髮際盡處也上天窗四寸浮白穴也天窗浮白左右各一凡四穴肩解各一肩外解分之處兩秉風穴肩解下三寸各一肩解下三寸兩天宗穴相去秉風三寸肘以下至手小指本各六俞指本指頭也肘以下至手小指本謂肘骨之下從側而下至小指之頭有少海陽谷腕骨後谿前谷少澤左右各六俞凡十二穴此手太陽脈氣所發共三十六穴手太陽之脈起於手小指之端從肘至臂繞肩循頷上頰入耳中至目內眥故脈氣所發如此手陽明脈氣所發者二十二穴手陽明為大腸腑脈氣所發之穴計二十二穴鼻空外廉項上各二鼻孔外廉迎香穴也項上扶突穴也左右各二凡四穴大迎骨空各一頰車之下承漿之旁兩大迎穴骨空解見前柱骨之會各一柱骨項骨也柱骨之會謂項肩相會之處兩天鼎穴髃骨之會各一髃音魚餘篇同髃骨兩肩髃穴之骨髃骨之會謂肩髃乃肩臂相會之處肘以下至手大指次指本各六俞從肘以下至六指次指頭有曲池陽谿合骨三間二間商陽左右各六俞凡十二穴此手陽明脈氣所發共二十二穴手陽明之脈起於大指次指之端從肘上臂至肩出於柱骨上頸貫頰挾鼻孔故脈氣所發如此手少陽脈氣所發者三十二穴手少陽為三焦府脈氣所發之穴計三十二穴鼽骨下各一鼽骨下兩巨髎穴也見手太陽脈氣內眉後各一眉後陷中兩絲竹空穴角上各一頭角之上兩天衝穴也足少陽脈氣云兩角上各二此則云各一下完骨後各一下完骨後謂完骨之下完骨之後兩天牖穴項中足太陽之前各一足太陽之脈下項行身之背今在足太陽項中之前乃人迎之下氣舍二穴俠扶突各一承上文氣舍而言故曰俠扶突謂氣舍扶突穴相併也肩貞各一肩臂板骨縫中即兩肩貞穴肩貞下三寸分間各一肩貞下三寸消濼穴也分間即肩貞分肉之間天宗臑會穴也消濼天宗臑會左右各一凡六穴肘以下至手小指次指本各六俞肘骨以下至手小指次指頭有天井支溝陽池中渚液門關衝左右各六俞凡十二穴此手少陽脈氣所發共三十二穴手少陽之脈起於小指次指之端循肘上臂交肩出缺盆至耳上角俠頰抵䪼故脈氣所發如此此一節言手足三陽之脈是為六腑其脈氣所過之穴即為氣府也督脈氣所發者二十八穴督脈循身之背從下而上氣府之統於形身者更有督脈其脈氣所發者計二十八穴項中央二風府啞門二穴髮際後中八髮際之後從中至頂下額則有腦戶強間後頂百會前頂囟會上星神廷八穴面中三面之中央從鼻至唇有素髎水溝兌端三穴大椎以下至尻尾及旁十五穴至骶下凡二十一節脊椎法也從大椎以下至尻尾之長強計十三穴及長強兩旁之會陽共十五穴大椎陶道身柱神道靈臺至陽筋縮脊中懸樞命門陽關腰俞長強左右會陽凡十五穴自大椎至骶骨下凡二十一節此督脈督於後而為脊椎之法所以補氣府未盡之義任脈之氣所發者二十八穴任脈行身之前氣府之統於形身者更有任脈其脈氣所發者亦二十八穴喉中央二廉泉在喉中央之上天突在喉中央之下凡二穴膺中骨陷中各一膺中胸之中行也骨陷中有璇璣華蓋紫宮玉堂膻中中廷各一凡六穴鳩尾下三寸胃脘五寸胃脘以下至橫骨六寸半一腹脈法也鳩尾下三寸自鳩尾之下有巨闕上脘中脘三穴當三寸也胃脘五寸自上脘至臍中有中脘建里下脘水分臍中五穴當五寸也胃脘以下指臍中也自胃脘以下之臍中由中極至兩旁橫骨有陰交氣海石門關元中極五穴五寸中極至橫骨約寸半余當六寸半一分也自鳩尾至兩橫骨凡十五穴此任脈任於前而為中行腹脈之法亦所以補氣府未盡之義下陰別一下陰下於陰前會陰穴也別一上文橫骨不通會陰別從曲骨至會陰之一穴目下各一兩承泣穴下唇一承漿一穴齦交一齒縫任脈之交故曰齦交以上任脈所發凡二十八穴衝脈氣所發者二十二穴衝脈任脈皆起於胞中氣府之統於形身者更有衝脈其脈氣所發者計二十二穴俠鳩尾外各半寸至臍寸一俠臍下旁各五分至橫骨寸一腹脈法也寸一一寸也五分猶半寸也並鳩尾外兩旁各開半寸至臍兩旁有幽門通谷陰都石關商曲盲俞其穴相去之寸約一寸也盲俞之穴正在臍旁並臍下兩旁各開五分下至橫骨有中注四滿氣穴大赫橫骨其穴相去之寸亦一寸也並鳩尾兩旁下至橫骨左右凡二十二穴此衝脈與任脈相併為中二行之腹脈法也足少陰舌下厥陰毛中急脈各一此舉足少陰厥陰之脈以明足少陰合任脈足厥陰合督脈而任督相交也足少陰舌下廉泉穴也厥陰毛中曲骨穴也足少陰合任脈而交於督脈從廉泉入齦交交督脈足厥陰合督脈而交於任脈從長強至曲骨交任脈上下相交脈氣往來不容稍緩故曰急脈舌下廉泉毛中曲骨各一凡二穴手少陰各一陰陽蹺各一此舉手之少陰足之蹺脈以明手足陰陽之脈皆為氣府而手脈之穴出於手足脈之穴起於足也手少陰心脈也心脈起於心中循手小指少衝出其端左右少衝各一凡二穴陰蹺起於足內踝之照海陽蹺起於足外踝之申脈照海申脈左右各一凡四穴手足諸魚際脈氣所發者凡三百六十五穴也此舉手足魚際之脈以明手魚際屬手太陰足魚際屬足太陰而三百六十五穴之脈皆主於手足之太陰也手大指後白肉隆起如魚腹為魚際穴手足諸魚際謂足大趾後亦有白肉隆起皆可謂之魚際手足魚際凡四穴手之脈氣手太陰魚際主之足之脈氣足太陰魚際主之故手足諸魚際脈氣所發者凡三百六十五穴以明手足三陽三陰周身脈氣而為手足太陰之所主也此一節舉督脈任脈衝脈及手足陰陽之脈合三百六十五穴而統於形身之氣府也按本篇脈氣所發之穴手足三陽計二百九十六穴督脈至魚際計九十穴共三百八十六穴除督脈髮際後至腦戶強間後頂百會前頂囟會上星神廷八穴重於太陽足少陽直目上髮際內各五其正營承靈腦空左右六穴亦重於太陽又手足陽明重大迎骨空二穴手少陽手太陽重鼽骨下巨髎二穴衝脈任脈重橫骨二穴足少陰舌下與喉中央重廉泉一穴除所重二十一穴乃三百六十五穴亦以應一歲之數上篇合重複之穴成三百六十六穴此篇除重複之穴成三百六十五穴所以承上篇而補其未盡之義者如此骨空論第六十篇空作孔篇內俱同骨空周身骨節之穴孔也少陰屬腎主骨與太陽為表裡太陽主皮膚少陰主骨髓任沖督脈皆起於少陰合於太陽任脈起於中極之下衝脈起於氣街並少陰之經督脈起於少腹以下骨中央凡此皆起於少陰也任沖之血澹滲皮膚督脈之經行於脊背凡此皆合於太陽也故上節論風傷太陽及於任沖督脈也少陰主骨骨屬屈伸不利則機關廢弛機關廢弛則水氣不行故次節論膝痛不和及於水俞五十七穴也少陰屬腎精髓滲灌骨空榮於經脈精髓不榮於骨空則水毒乘於經脈故末節論髓空而及於鼠瘻之寒熱併為灸刺之法也黃帝問曰余聞風者百病之始也以針治之奈何六淫之邪風居其首故風者百病之始始傷太陽勿令傳變以針治之奈何岐伯對曰風從外入令人振寒汗出頭痛身重惡寒治在風府調其陰陽不足則補有餘則瀉惡去聲風從外入傷太陽通體之皮膚故令人振寒從皮膚而入於肌腠故汗出隨太陽經脈上行故頭痛周身肌表不和故身重太陽之上寒氣主之故惡寒太陽之脈從頭下項故治在風府治在風府所以調其陰陽經脈不足則用灸法以補之經脈有餘則用刺法以瀉之大風頸項痛刺風府風府在上椎所謂有餘則瀉者如大風傷其經脈致頸項痛即當刺風府以瀉之申明風府在項之上椎蓋項上高起第一椎為大椎項上平坦第一椎為上椎大椎至尾骶共二十一節大椎之上另有二節也大風汗出灸譩譆譩譆在背下俠脊旁三寸所厭之令病者呼譩譆譩譆應手厭作壓所謂不足則補者如大風入於肌腠則汗出汗出表虛故當灸譩譆申明譩譆在背下俠脊兩旁共開三寸所以手壓之令病者呼譩譆而譩譆之脈則應於手者是也從風憎風刺眉頭從迎也憎惡也迎風惡風乃面額經脈不和當刺眉頭以瀉之失枕在肩上橫骨間折使榆臂齊肘正灸脊中折音舌下同榆作搖齊平也夜臥失枕患在肩上橫骨間伸舒不能故如折也折則臂不能舉當使搖臂平肘以和之搖臂平肘則背中有窩當正灸脊中毋他求也䏚絡季脅引少腹而痛脹刺譩譆肋稍曰䏚䏚絡肋稍之絡也季脅脅之盡處也䏚絡季脅經脈不和樞轉不利致引少腹而痛脹少腹者太陽膀胱之部也故當刺太陽之譩譆通其經脈焉腰痛不可以轉搖急引陰卵刺八髎與痛上八髎在腰尻分間太陽經脈挾背抵腰主筋所生病腰痛不可以轉搖腰脊皆病也急引陰卵筋病也八髎上髎次髎中髎下髎左右凡八髎也與痛上及與腰之痛上皆當刺也申明八髎在腰尻兩分肉間鼠瘻寒熱還刺寒府寒府在附膝外解榮取膝上外者使之拜取足心者使之跪解骨解也榮榮俞也拜揖也鼠瘻寒熱乃腎臟水毒循脈而上頸項如瘻是為鼠瘻身發寒熱是為鼠瘻寒熱太陽膀胱寒水為腎之腑故還刺寒府寒府太陽經脈也申明寒府在附膝外解榮附膝外膝外側也解骨解膝外側之骨縫也榮榮俞足小趾本節之通谷穴也如刺骨解之穴取膝上外側者使之揖揖則膝挺骨豎而骨解可取矣如刺榮俞之穴取足心者使之脆跪則足心宛宛而榮俞通谷可取矣任脈者起於中極之下以上毛際循腹裡上關元至咽喉上頤循面入目任沖督脈皆起於少陰合於太陽中極之下乃少陰屬腎絡膀胱之處故任脈者起於中極之下從中極而上則過毛際循腹裡上關元至咽喉更上頤循面入於目循面入目則合太陽矣衝脈者起於氣街並少陰之經俠齊上行至胸中而散齊臍通下同氣街乃腹氣之街臍左右動脈之處故衝脈者起於氣街衝脈任脈皆起於少陰故並少陰之經俠臍上行至胸中而散散於皮膚則合太陽矣任脈為病男子內結七疝女子帶下瘕聚衝脈為病逆氣裡急督脈為病脊強反折強去聲此論任脈衝脈之病而並及於督脈也任脈起於中極之下上毛際循腹裡故任脈為病男子則內結七疝七疝狐疝頹疝及五臟之疝也女子則帶下瘕聚帶下濕濁下淫也瘕聚血液內瘀也衝脈俠臍上行至胸中而散病則不能上行外散故衝脈為病逆氣裡急逆氣者氣不循經裡急者氣不輸布任脈衝脈行身之前督脈行身之背故督脈為病失其循行則脊強反折夫胸腹為陰脊背為陽逆氣裡急陰病不能仰也脊強反折陽病不能俯也督脈者起於少腹以下骨中央女子入系廷孔其孔溺孔之端也其絡循陰器合篡間繞篡後別繞臀至少陰與巨陽中絡者合少陰上股內後廉貫脊屬腎與太陽起於目內眥上額交巔上入絡腦還出別下項循肩髆內挾背抵腰中入循膂絡腎其男子循莖下至篡與女子等溺鳥去聲下同督脈亦起於少陰故督脈者起於少腹以下乃曲骨中央女子則入系廷孔申明其孔乃溺孔之端其絡脈由陰而陽從下而上故其絡循陰器合前後二陰之篡間復繞篡後又別繞臀至少陰與巨陽中絡者相合夫少陰巨陽中絡乃少陰上股內之後廉貫脊屬腎者是也督脈由少陰而上合於太陽故與太陽之起於目內眥上額交巔上入絡腦還出別下項循肩髆內挾脊抵腰中入循膂絡腎者相合而偕行也女子入系廷孔之溺孔其男子則循莖下至篡與女子之廷孔溺孔相等所以申明任沖督三脈皆起於少陰而合於太陽也其少腹直上者貫齊中央上貫心入喉上頤環唇上系兩目之下中央此生病從少腹上衝心而痛不得前後為沖疝其女子不孕癃痔遺溺嗌乾此復申明任脈之為病也其少腹直上者即任脈上毛際循腹裡直上也貫臍中央上貫心入喉即任脈循腹裡上至咽喉也上頤環唇上系兩目之下中央即任脈上頤循面入目也任脈從少腹上貫心故此生病從少腹上衝心而痛上文任脈為病男子內結七疝女子帶下瘕聚故男子不得前後為沖疝謂不但疝病於內而且不得前後不但疝結於內而且上衝也其女子不孕謂女子帶淫於下瘕聚於內不能孕也又曰癃痔遺溺者申明不得前後乃癃痔之病癃與遺溺不得前矣痔則不得後矣任脈上至咽喉故嗌乾所以復舉任脈而申明任脈之病者如此督脈生病治督脈治在骨上甚者在齊下營此復申明督脈之為病也上文督脈為病脊強反折脊骨者督脈之所循故督脈生病即治督脈治督脈治其脊骨也故曰治在骨上若病甚者在臍下營臍下營乃少腹以下骨中央督脈所起之部也所以復舉督脈生病而為治法者如此其上氣有音者治其喉中央在缺盆中者其病上衝喉者治其漸漸者上俠頤也此復申明衝脈之為病也上文衝脈為病逆氣裡急故此言其上氣有音者不能從胸而上故當治其喉中央喉中央者缺盆之中故曰在缺盆中者此逆氣裡急不能從胸而上出於喉也治其漸者使從喉上面故曰漸者上俠頤也靈樞五音五味篇云衝脈任脈皆起於胞中其浮而外者會於咽喉別而絡唇口是衝脈不但至胸中而散亦上頤循面故復舉衝脈之病以明之此一節言太陽寒府之氣合於少陰任沖督三脈皆起於少陰而合於太陽也蹇膝伸不屈治其楗蹇難也蹇膝膝難進也膝蹇故伸不能屈楗猶樞也下文云輔骨上橫骨下為楗治其楗而膝能伸屈矣坐而膝痛治其機機機關也坐而膝痛則機關不和下文云俠髖為機治其機而膝痛可愈矣立而暑解治其骸關暑熱也解膝骨縫也立而暑解立則骨縫如暑熱也骸關即膝解也下文云膝解為骸關治其骸關而暑解可愈矣膝病痛及拇指治其膕拇指足大趾也膝痛痛及拇指經脈相應也膕腿曲處也下文云骸下為輔輔上為膕治其膕而拇指膝痛可愈矣坐而膝痛如物隱者治其關隱猶藏也膝痛如物隱者痛而高腫如物內藏也關關節也下文云膕上為關治其關而痛如物隱可愈矣膝痛不可屈伸治其背內膝痛而筋不柔和故脊背不可屈伸太陽主筋所生病故當其背內而屈伸自如矣連䯒若折治陽明中俞髎折音舌䯒足骨也髎骨穴也膝痛連䯒其痛若折當治陽明之中俞髎中俞足陽明俞穴也五俞之穴前有井榮後有經合俞居中故曰中俞髎足中指間陷谷穴也治陽明中俞髎而連䯒若折可愈矣若別治巨陽少陰榮承上文而言膝痛連䯒若別別離也若䯒膝之不相屬也當治巨陽少陰之榮穴巨陽之榮足小指後通谷穴也少陰之榮足心後然谷穴也治其榮而連䯒若別可愈矣淫濼脛痠不能久立治少陽之維在外上五寸濼音洛淫極也濼寒也維絡也淫濼脛痠極寒而脛骨痠削也脛痠則不能久立少陽主骨所生病故治少陽之維在外踝上五寸經脈論云少陽之別名曰光明去踝五寸坐不能起取之所別者此也輔骨上橫骨下為楗上文云蹇膝伸不屈治其楗所謂楗者輔骨上橫骨下為楗股脛皆有輔骨乃大骨之旁骨此輔骨股內旁骨也橫骨臍下少腹兩旁之骨也俠髖為機上文云坐而膝痛治其機所謂機者俠髖為機俠並也髖臀上兩旁側骨也膝解為骸關俠膝之骨為連骸上文云立而暑解治其骸關所謂骸關者膝後分解之處為骸關夫膝解為骸關則俠膝之前骨為連骸所以申明膝後解處為關而膝骨則為骸也骸骨下為輔輔上為膕上文云膝痛痛及拇指治其膕所謂膕者骸下為輔輔上為膕骸下即骸關之下輔上脛輔骨之上也膕上為關上文云膝痛如物隱者治其關所謂關者膕上為關腿曲處之上也頭橫骨為枕上文云膝痛不可屈伸治其背內脊背上通枕骨故不釋背內而釋頭橫骨為枕知頭橫骨為枕則知脊直骨為背矣水俞五十七穴者尻上五行行五伏兔上兩行行五左右各二行行五踝上各一行行六穴行音杭舊本訛左右各一行今改二行此舉水俞五十七穴以明水俞之本於腎也水熱穴論云尻上五行行五者此腎俞也伏兔上各二行行五者此腎之街也踝上各一行行六者此腎脈之下行也夫尻上五行行五則五五二十五俞其俞在背伏兔上兩行行五乃左右各二行行五則四五二十俞其俞在膕踝上各一行行六穴則左右十二俞其俞在足是水俞五十七穴而本於腎也此一節言膝骨乃機關之會機關不利而痛則水氣不行故水俞五十七穴皆附於骨空也髓空在腦後三分在顱際銳骨之下一在齦基下一在項後中復骨下一在脊骨上空在風府上脊骨下空在尻骨下空此言髓空有在頭上下者有在脊上下者髓藏骨空故曰髓空腦為髓海故髓空在腦後三分申明腦後三分在懸顱穴之際懸顱在頭兩旁銳骨之下銳骨尖骨也從頭而下一在齦基下齦基齒根也齒根之下骨空處也此髓空在頭上下也從齦基而下一在項後中復骨下脊椎之骨名曰復骨復骨在項後之中從上而下故曰復骨下也從大椎之骨而計其上一在脊骨上空申明脊骨上空在風府上者是也有脊骨上空者是也此髓空在脊上下也數髓空在面俠鼻面之左右鼻之上下髓空不一故曰數髓空在面而俠於鼻也或骨空在口下當兩肩從面鼻而下於口從口而下於肩皆有骨空故曰或骨空在口下當兩肩也兩髆骨空在髆中之陽從肩至兩髆之骨空則在兩髆中之陽陽外側也臂骨空在臂陽去踝四寸兩骨空之間髆骨空在髆中之陽則臂骨空亦在臂陽申明臂陽去手踝四寸穴名三陽絡在兩骨空縫之間者是也股骨上空在股陽出上膝四寸從臂反股則股骨上空亦在股陽申明股陽出外上膝四寸穴名伏兔者是也䯒骨空在輔骨之上端從股至䯒則䯒骨空在輔骨之上端輔骨小腿大骨之旁骨也上端近膝處也股際骨空在毛中動下股際陰股交會之際股際骨空在毛中動下乃動脈之下跨縫間也尻骨空在髀骨之後相去四寸尻骨尾骨也髀骨臀側骨也髀骨之後相去四寸正當尻骨空之處扁骨有滲理湊無髓孔易髓無空扁骨胸脊相交之肋骨也滲澹滲也理紋理也湊會合也易交易也扁骨有澹滲之紋理湊會於胸脊其內則無髓孔申明滲理湊者髓之交易也無髓孔者兩頭無空也灸寒熱之法先灸項大椎以年為壯數次灸橛骨以年為壯數髓藏於骨骨歸於腎骨髓內虛則腎臟水毒從經脈而上承發為鼠瘻寒熱之病上文云鼠瘻寒熱還刺寒府夫有餘則刺不足則灸故又言灸寒熱之法先灸項大椎項大椎為脊骨之始以年為壯數計其結核初起之年以年數之多少而為灸之壯數其次則灸橛骨橛骨為脊骨之終亦以年為壯數視背俞陷者灸之舉臂肩上陷者灸之五臟六腑之俞皆在於背故視背俞其俞內陷者則於左右以灸之視之之法須舉其臂肩舉臂肩而背上陷者即灸之兩季脅之間灸之從肩背而及於脅則兩季脅之間左右灸之外踝上絕骨之端灸之足小趾次指間灸之經脈論云膽足少陽之脈下抵絕骨之端出外踝之前循足跗上入小指次指之間故外踝絕骨小指次指間各當灸之腨下陷脈灸之外踝後灸之經脈論云膀胱足太陽之脈下貫腨內出外踝之後故腨下陷脈及外踝後各當灸之缺盆骨上切之堅痛如筋者灸之缺盆骨上與頸項之鼠瘻相近故切之堅痛如筋者即于堅痛上灸之膺中陷骨間灸之膺中陷骨間乃胸之上喉之下當膺之中天突一穴掌束骨下灸之束骨橫骨也掌束骨下猶言掌下束骨謂橫骨縫中大陵二穴齊下關元三寸灸之臍下三寸關元穴也故曰臍下關元三寸毛際動脈灸之毛際兩旁氣衝之動脈膝下三寸分間灸之膝下三寸分肉之間三里二穴足陽明跗上動脈灸之跗上動脈足陽明衝陽二穴巔上一灸之巔上百會穴也犬所齧之處灸之三壯即以犬傷病法治之齧音業此假犬齧以明當灸之穴謂鼠瘻㿉爛形同犬傷也犬所齧之處腿上伏兔二穴也狗之齧人從後而齧其腿下犬之齧人從前而齧其腿上當於伏兔二穴灸之三壯上文以年為壯數此亦以年為壯數年數雖少肌肉深厚灸之亦須三壯即以犬傷病治法灸之謂鼠瘻傷其肌肉犬齧亦傷肌肉其病等也凡當灸二十九處傷蝕灸之不已者必視其經之過於陽者數刺其俞而藥之蝕舊本訛食今改數音朔承上文而總結之申明陽氣下陷則灸過於陽熱更當刺而藥之也二十九處謂大椎一橛骨一背俞二季脅二絕骨二小指次指二腨下陷脈二外踝二缺盆二膺中一掌骨二關元一毛際動脈二膝下三寸二跗上二巔上一犬齧處二凡當灸二十九處乃傷爛如蝕陽氣下陷則當灸之若灸之而其病不已者乃過於陽熱非關下陷故必視其經之過於陽者數刺其陽熱之俞而用藥以調之斯為治鼠瘻寒熱之全法也此一節言精髓藏於骨空精髓內虛發為鼠瘻寒熱而有灸刺之法也水熱穴論第六十一篇水熱穴者水俞五十七穴熱俞五十九穴也少陰屬腎主水陽氣內虛則水聚為腫而有水俞之五十七穴人傷於寒寒盛則熱熱氣內逆而有熱俞之五十九穴水為陰寒亦為陰寒盛則熱是水俞熱俞皆主於少陰各有當刺之穴也黃帝問曰少陰何以主腎腎何以主水帝欲詳明水病之原故為此問岐伯對曰腎者至陰也至陰者盛水也肺者太陰也少陰者冬脈也故其本在腎其末在肺皆積水也盛音成少陰所以主腎者以腎者至陰也腎所以主水者以至陰者盛水也至陰之水上通於肺肺者太陰也水王於冬少陰者冬脈也腎位居下肺位居上故其本在腎其末在肺腎臟之水合膀胱水府外出於皮毛皮毛者肺之合循行失職肺腎不交皆積水也帝曰腎何以能聚水而生病聚猶積也腎本肺末上下相通水何以能聚故為此問岐伯曰腎者胃之關也關門不利故聚水而從其類也上下溢於皮膚故為胕腫胕腫者聚水而生病也腎所以聚水生病者腎絡膀胱主於下焦為胃腑水注之關也關門不利水道不行則胃腑所化之水不能下出故聚水而從其類也水道不行則泛溢於外故上下溢於皮膚故為胕腫胕腫者皮肌脹滿水氣不行故聚水而生病也帝曰諸水皆生於腎乎水水病也水病不一水之輸布又各不同故問諸水病皆生於腎乎岐伯曰腎者牝臟也地氣上者屬於腎而生水液也故曰至陰少陰主腎牝為陰畜故腎者牝臟也脾為陰中之至陰今腎亦為至陰則地氣之上升者屬於腎而生地中之水液也液主於腎故曰至陰蓋藏於骨者為精而濡於肉者則為液也此言水附於地液為水源腎為水液之主故曰至陰諸水之所以皆生於腎也勇而勞甚則腎汗出腎汗出逢於風內不得入於臟腑外不得越於皮膚客於玄府行於皮里傳為胕腫本之於腎名曰風水所謂玄府者汗空也空孔同經脈別論云持重遠行汗出於腎故勇而勞甚則腎汗出腎汗既出復逢於風逢風之汗內不得入於臟腑外不得越於皮膚致風水客於玄府行於皮里傳為皮里肉外之胕腫勞甚汗出是病之本於腎汗出逢風故名曰風水不但水液之生本腎而胕腫之水亦本於腎諸水皆生於腎又何疑焉復申明所謂玄府者乃皮毛之汗孔也帝曰水俞五十七處者是何主也處去聲下同諸水皆生於腎則水俞亦主於腎故問水俞五十七處是何主也岐伯曰腎俞五十七穴積陰之所聚也水所從出入也陰陽應象大論云積陽為天積陰為地水俞五十七處乃腎俞五十七穴其穴從尻至足在身半以下地氣所主故曰積陰之所聚也積陰所聚水氣從之故水之所從以出入也水從出入乃水在地中之義是知水俞五十七穴而主於腎也尻上五行行五者此腎俞故水病下為胕腫大腹上為喘呼不得臥者標本俱病故肺為喘呼腎為水腫肺為逆不得臥分為相輸俱受者水氣之所留也行音杭下仿此尻上尻尾上也五行行五中行有懸樞命門陽關腰俞長強五穴次兩行有大腸俞小腸俞膀胱俞中膂內俞白環俞左右十穴外兩行有胃倉肓門志室胞肓秩邊左右十穴凡二十五穴在腎俞之左右上下故曰此腎俞也腎俞即水俞故水病於下則為胕腫大腹水病於上則為喘呼不得臥所以然者腎為本肺為標標本俱病病標故肺為喘呼病本故腎為水腫肺喘呼為逆故不得臥也分為相輸謂腎氣上升肺氣下降上下分行相為輸布今俱受病者乃水氣之所留聚也水氣留聚則不輸布致有水腫喘逆之病矣伏兔上各二行行五者此腎之街也三陰交之所結於腳也三陰交舊本訛三陰之所交今改正伏兔上兩腿伏兔穴也各二行行五並伏兔之穴在內旁兩行其一有血海陰陵泉地機築賓交信五穴其一有陰包曲泉膝關中都蠡溝五穴左右凡四行計二十穴其穴在脛之氣街腎脈從脛而上故曰此腎之街也兩行並行三陰交總結於下上連於脛下貫於腳故曰三陰交之所結於腳也踝上各一行行六者此腎脈之下行也名曰太衝下行之行如字踝上足踝處也足踝上各一行行六謂三陰交漏谷商丘公孫太白大都六穴左右十二穴腎脈從足而上亦可從脛而下故曰此腎脈之下行也腎脈下行則名曰太衝陰陽離合論曰太衝之地名曰少陰者此也凡五十七穴者皆臟之陰絡水之所客也承上文而言凡此五十七穴者尻上之穴為腎俞伏兔之穴為腎街踝上之穴為腎脈是皆腎臟之陰絡而為水之所客也所以水俞五十七穴皆主於腎也帝曰春取絡脈分肉何也承上文而言水俞五十七穴皆主於腎何以春夏秋冬各有取刺之法本俞論云春取絡脈諸滎大筋分肉之間故問春取絡脈之分肉刺極淺者何也岐伯曰春者木始治肝氣始生肝氣急其風疾經脈常深其氣少不能深入故取絡脈分肉間天之四時地之五行人之五臟氣相輸應故時之春者五行之木氣始治五臟之肝氣始生肝始生則肝氣急肝氣急一如其風之疾人之經脈常深其急疾之肝氣始生故其氣少不能深入於經脈故春時取絡脈間之分肉而淺刺也帝曰夏取盛徑分腠何也靈樞四時氣論云夏取盛徑孫絡取分間絕皮膚故問夏取盛經分腠刺稍深者何也岐伯曰夏者火始治心氣始長脈瘦氣弱陽氣圖溢熱熏分腠內至於經故取盛經分腠絕膚而病去者邪居淺也所謂盛經者陽脈也長上聲時之夏者五行之火氣始治五臟之心氣始長心主脈心氣始長故脈瘦氣弱火為陽火始治故陽氣留溢留溢留滿於中也熱熏分腠充達於外也分腠乃盛經之分腠故熱熏分腠則內至於經熱熏分腠內至於經故取盛經分腠刺之稍深所以答帝夏取盛經分腠之間然夏時亦有絕皮膚取孫絡之病故又言絕膚而病去者邪居淺也今所謂取盛經者乃盛陽之經脈不在皮膚也帝曰秋取經俞何也四時氣論云秋取經俞邪在府取之合故問秋取經俞刺之深者何也岐伯曰秋者金始治肺將收殺金將勝火陽氣在合陰氣初勝濕氣及體陰氣未盛未能深入故取俞以瀉陰邪取合以虛陽邪陽氣始衰故取於合時之秋者五行之金氣始治五臟之肺氣將收殺收收斂殺肅殺也夏火氣消故金將勝火陽氣內收故陽氣在合時方清肅故陰氣初勝白露乃下故濕氣及體陰氣初勝則陰氣未盛濕氣及體則未能深入故取俞以瀉陰濕之邪俞經俞也所以答帝秋取經俞之問然秋時亦有陽邪內入之病若果陽氣在合則取合以虛陽邪所以然者秋時陽氣始衰故當更取於合不但取於經俞也帝曰冬取井滎何也四時氣論云冬取井滎必深以留之故問冬取井滎刺亦深者何也岐伯曰冬者水始治腎方閉陽氣衰少陰氣堅盛巨陽伏沉陽脈乃去故取井以下陰逆取滎以實陽氣故曰冬取井滎春不鼽衄此之謂也時之冬者五行之水氣始治五臟之腎氣方閉斯時陽氣衰少而陰氣堅盛巨陽寒水之氣伏沉於內巨陽伏沉則陽脈乃去陽而入陰陽氣衰少陰氣堅盛故當取井以下陰逆巨陽伏沉陽脈乃去故當取滎以實陽氣冬取井滎使其藏也故嘗言曰冬取井滎春不鼽衄即此取井以下陰逆取滎以實陽氣之謂也金匱真言論云冬不按蹺春不鼽衄不按蹺者使之藏取井滎者亦使之藏故不曰冬不按蹺而曰冬取井滎其義一也帝曰夫子言治熱病五十九俞餘論其意未能領別其處願聞其處因聞其意別音逼春夏秋冬各有取刺之法則陽中有陰陰中有陽水病皆主於腎而腎不止於寒故復舉熱病以為問本經刺熱篇言少陽熱病少陰熱病病甚者皆為五十九刺故問夫子言治熱病五十九俞與余曾論其意余未能領別其處今願聞其處使之得聞其意岐伯曰頭上五行行五者以越諸陽之熱逆也頭者諸陽之會頭上五行行五者中行有上星囟會前頂百會後頂五穴次兩行有五處承光通天絡卻玉枕左右十穴外兩行有臨泣目窗正營承靈腦空左右十穴此二十五穴者刺之以越諸陽之熱逆也大杼膺俞缺盆背俞此八者以瀉胸中之熱也大杼項後第一椎兩旁大杼穴也膺俞膺中第一俞兩旁俞府穴也缺盆頷下兩旁橫骨陷中缺盆穴也背俞背中第一的兩旁肺俞穴也此八俞者在膺背之上刺之所以瀉胸中之熱也氣街三里巨虛上下廉此八者以瀉胃中之熱也氣街一名氣衝少腹兩旁橫骨外氣衝二穴也三里膝下三寸兩三里穴也三里下三寸兩巨虛上廉穴也上廉下三寸兩巨虛下廉穴也此八俞者足陽明經脈之循行刺之所以瀉胃中之熱也雲門髃骨委中髓空此八者以瀉四肢之熱也雲門在缺盆下左右二穴髃骨肩外兩旁肩髃二穴委中膝後屈中二穴骨空論云髓空在腦後三分銳骨之下懸顱二穴此八俞者從肩至背行於上下所以瀉四肢之熱也五臟俞旁五此十者以瀉五臟之熱也肺俞旁魄戶心俞旁神堂肝俞旁魂門脾俞旁意舍腎俞旁志室此左右十俞者居五臟之旁刺之所以瀉五臟之熱也凡此五十九穴者皆熱之左右也自頭上至俞旁凡此五十九穴者病熱則左右皆刺故皆熱之左右而為熱俞也帝曰人傷於寒而傳為熱何也熱者病之標寒者病之本故問人傷於寒而傳變為熱何也岐伯曰夫寒盛則生熱也寒盛生熱自然之理非關傳變也夫在地為水在天為寒寒盛則熱是水俞熱俞皆本少陰之氣化而為少陰之所主也調經論第六十二篇經經脈也十二經脈內通五臟六腑外絡三百六十五節相併為實相失為虛寒熱陰陽血氣虛實隨其病之所在而調之是為調經論也黃帝問曰余聞刺法言有餘瀉之不足補之何謂有餘何謂不足舉刺法之瀉有餘補不足以為問蓋欲調和其經脈也岐伯對曰有餘有五不足亦有五帝欲何問帝曰願盡聞之岐伯曰神有餘有不足氣有餘有不足血有餘有不足形有餘有不足志有餘有不足凡此十者其氣不等也神氣血形志各有有餘各有不足凡此有餘不足之氣不相同等故於下文詳論之帝曰人有精氣津液四肢九竅五臟十六部三百六十五節乃生百病百病之生皆有虛實今夫子乃言有餘有五不足亦有五何以生之乎百病之眾有餘不足不止於五故言人身有內臟之精運行之氣腠理之津骨屬之液手足之四肢上下之九竅肝心脾肺腎之五臟形體之十六部謂兩肘兩臂兩膕兩股身之前後左右頭之前後左右也大谷小溪之三百六十五節合之乃生百病是百病之生皆有虛實今夫子乃言有餘止有五不足亦止有五凡此百病之眾果何以生之乎岐伯曰皆生於五臟也夫心藏神肺藏氣肝藏血脾藏肉腎藏志而此成形下五臟如字百病之生不外五臟故皆生於五臟也臟者藏也夫心藏神則神有餘不足心所主也肺藏氣則氣有餘不足肺所主也肝藏血則血有餘不足肝所主也脾藏身形之肉則形有餘不足脾所主也腎藏志則志有餘不足腎所主也合神氣血肉志而此成形猶言此形乃成也志意通內連骨髓而成身形五臟五臟二字衍文疑下有五臟誤重於此腎藏志復藏精脾藏意復藏肉志意通則內連腎精之骨髓而成脾肉之身形以明志通則髓通意通則形通推之於心神通則脈通推之於肺氣通則魄通推之於肝血通則魂通詞雖未及而意已該貴學者之能善悟也五臟之道皆出於經隧以行血氣血氣不和百病乃變化而生是故守經隧焉道猶路也五臟循行之路皆從出於經脈之隧道以行血氣於周身血氣不和則百病乃變化而生是故調經者當守其經隧焉帝曰神有餘不足何如伯言神有餘有不足氣有餘有不足血有餘有不足形有餘有不足志有餘有不足帝則一一以問岐伯曰神有餘則笑不休神不足則悲血氣未並五臟安定邪客於形灑淅起於毫毛未入於經絡也故命曰神之微神藏於心在志為喜神有餘則笑不休心氣有餘也神不足則悲心氣不足也靈樞本神論云心氣虛則悲實則笑不休夫血氣相併內動五臟為病則甚若血氣未並五臟安定之時雖邪客於形身灑淅起於毫毛是為微邪未入於經絡也故命曰神之微猶言心主之神外受微邪也帝曰補瀉奈何不足則補有餘則瀉故論神氣血形志之有餘不足皆問補瀉奈何岐伯曰神有餘則瀉其小絡之血出血勿之深斥無中其大經神氣乃平神不足者視其虛絡按而致之刺而利之無出其血無泄其氣以通其經神氣乃平中去聲下同小絡孫絡也神有餘則瀉其孫絡之血然雖出血勿之深斥斥開拓也下斥仿此無中其大經即勿之深斥之義刺得其義則神氣乃平此瀉有餘之法也若神不足者視其不足之虛絡先按而致之然後刺而利之無出其血無泄其氣以通其經刺得其宜則神氣乃平此補不足之法也帝曰刺微奈何邪客於形未入於經絡命曰神之微故問刺微奈何岐伯曰按摩勿釋著針勿斥移氣於不足神氣乃得復刺微之法當按摩勿釋使聚其氣著針勿斥微泄其邪移氣於不足之處而補之則神氣乃得復此微瀉兼補之法也帝曰善氣有餘不足奈何岐伯曰氣有餘則喘咳上氣不足則息利少氣血氣未並五臟安定皮膚微病命曰白氣微泄喘咳上氣者肺氣內逆而有餘息利少氣者肺氣內虛而不足息利鼻氣出入也本神論云肺氣虛則鼻塞不利少氣實則喘喝胸盈仰息當血氣未並五臟安定之時若皮膚微病命曰白氣微泄白氣肺氣也肺主皮膚故曰白氣微泄猶言微虛也帝曰補瀉奈何岐伯曰氣有餘則瀉其經隧無傷其經無出其血無泄其氣不足則補其經隧無出其氣肺氣有餘則氣機內逆故當瀉其經隧瀉經隧者通經脈之隧道故必無傷其經無出其血無泄其氣而肺氣乃平此瀉有餘之法也若肺氣不足則當補其經隧更當無出其氣此補不足之法也帝曰刺微奈何皮膚微病命曰白氣微泄故問刺微奈何岐伯曰按摩勿釋出針視之曰我將深之適人必革精氣自伏邪氣散亂無所休息氣泄腠理真氣乃相得按摩勿釋使聚其氣也刺之極淺故出針視之其意若曰皮膚微病刺不可深我將深之適人必革適及也革變也謂深刺及人血氣虛微必內變也精氣自伏者精氣退伏不濡空竅也邪氣散亂者散亂於經邪無從出也無所休息者正虛邪盛病無已時也惟刺之極淺使邪氣泄於腠理泄腠理者從腠理而外泄也經脈無傷故真氣乃相得其意中之言若此此微瀉兼補之法也帝曰善血有餘不足奈何岐伯曰血有餘則怒不足則恐血氣未並五臟安定孫絡水溢則經有留血血有餘而肝氣盛則怒血不足而肝氣虛則恐本神論云肝氣虛則恐實則怒當血氣未並五臟安定之時若外有微邪而孫絡水溢則經有留血夫肝主衝任之血熱肉充膚澹滲皮毛今外有微邪而水溢孫絡致經脈有留積之血矣帝曰補瀉奈何岐伯曰血有餘則瀉其盛經出其血不足則視其虛經內針其脈中久留而視脈大疾出其針無令血泄內作納下同中如字肝血有餘則瀉其有餘之盛經而出其血此瀉有餘之法也肝血不足則視其不足之虛經內針於其脈中久留而視脈大疾然後出其針久留出針所以候氣更當無令血泄此補不足之法也帝曰刺留血奈何孫絡水溢則經有留血故問刺留血奈何岐伯曰視其血絡刺出其血無令惡血得入於經以成其疾刺留血者當視其在外之血絡而刺出其血無令惡血得入於經以成其留血之疾此微瀉兼補之法也帝曰善形有餘不足奈何岐伯曰形有餘則腹脹涇溲不利不足則四肢不用血氣未並五臟安定肌肉蠕動命曰微風形肉有餘則土氣壅滯故腹脹而涇溲不利形肉不足則土氣不達故四肢不用本神論云脾氣虛則四肢不用實則腹脹涇溲不利當血氣未並五臟安定之時風邪入於肌肉則肌肉蠕動命曰微風言微風在肌肉也帝曰補瀉奈何岐伯曰形有餘則瀉其陽經不足則補其陽絡陽經陽明經也陽絡陽明絡也形肉有餘則土氣實故瀉陽明之經瀉經者從內而出於外此瀉有餘之法也形肉不足則土氣虛故補陽明之絡補絡者從外而入於內此補不足之法也帝曰刺微奈何肌肉蠕動命曰微風故問刺微奈何岐伯曰取分肉間無中其經無傷其絡衛氣得復邪氣乃索肌肉蠕動當取刺於分肉間分肉在經之外絡之內故刺之內無中其經外無傷其絡刺得其宜使衛氣得復衛氣者所以溫分肉充皮膚肥腠理司開闔者也衛氣得復則邪氣乃索索消索也此微瀉兼補之法也帝曰善志有餘不足奈何岐伯曰志有餘則腹脹飧泄不足則厥血氣未並五臟安定骨節有動腎志有餘則水氣盛故腹脹飧泄腎志不足則生陽內虛故厥厥手足逆冷也本神論云腎氣虛則厥實則脹當血氣未並五臟安定之時微邪傷腎則骨節有動有動不安之意帝曰補瀉奈何岐伯曰志有餘則瀉然筋血者不足則補其復溜然筋即然谷在足心斜上內側兩筋間故曰然筋腎志有餘則瀉然筋出其血者此瀉有餘之法也腎志不足則補腎經之復溜復溜在內踝後上二寸此補不足之法也帝曰刺未並奈何血氣未並五臟安定骨節有動故問刺未奈何岐伯曰即取之無中其經邪所乃能立虛血氣未並骨節有動之時當即取之使病無中其經庶受邪之所乃能立虛立虛者使邪即去毋容緩也此微瀉兼補之法也帝曰善余已聞虛實之形不知其何以生虛不足也實有餘也神氣血形志各有有餘不足之形帝已聞之而有餘不足之形從何以生故復問之岐伯曰氣血以並陰陽相傾氣亂於衛血逆於經血氣離居一實一虛並交併也傾欹也不平也氣血交併虛實乃生故氣血以並則陰陽相傾陰陽相傾不得其平有氣亂於衛而為氣實者有血逆於經而為血實者有血氣離居而為血虛氣虛者亂衛逆經實也離居虛也故曰一實一虛此血氣虛實之大概也血並於陰氣並於陽故為驚狂血並於陽氣並於陰乃為炅中中如字此即上文而申明之血並於陰是血逆於經也氣並於陽是氣亂於衛也並陰並陽血氣不平故為驚狂並陰則驚並陽則狂也血並於陽是血離其居也氣並於陰是氣離其居也並陽並陰血氣離居乃為炅中炅熱也血氣離居中生熱也血並於上氣並於下心煩惋善怒血並於下氣並於上亂而善忘此即並陽並陰驚狂炅中而申明之血並於上是血並於陽也氣並於下是氣並於陰也不但炅中必有心煩惋善怒之病血並於下是血並於陰也氣並於上是氣並於陽也不但驚狂必有亂而喜忘之病帝曰血並於陰氣並於陽如血氣離居是何者為實何者為虛舊本如是二字相連今改血並氣並有實有虛血氣離居有實有虛故舉血並於陰氣並於陽如血氣離居而問是何者為實何者為虛交併為實亦有虛離居為虛亦有實故復問之岐伯曰血氣者喜溫而惡寒寒則泣不能流溫則消而去之是故氣之所併為血虛血之所併為氣虛惡去聲泣作澀下同承何實何虛之問言實之所在皆虛之所在但有虛而無實也如人身血氣者喜溫暖而惡寒冷以寒冷則血氣凝澀不能流行惟溫暖則消而去之消不凝也去流也夫寒為虛溫為實澀不能流似乎實矣然寒則為虛不寒而溫似乎實矣然消去為虛是故氣之所並氣實也而為血虛血之所並血實也而為氣虛此實之所在即虛之所在但有虛而無實也帝曰人之所有者血與氣耳今夫子乃言血併為虛氣併為虛是無實乎帝謂有虛必有實如岐伯血併為氣虛氣併為血虛之言豈但有虛而無實乎岐伯曰有者為實無者為虛故氣並則無血血並則無氣今血與氣相失故為虛焉絡之與孫脈俱輸於經血與氣並則為實焉血之與氣並走於上則為大厥厥則暴死氣復反則生不反則死虛者血氣相失實者大厥暴死是虛者固虛而實者尤虛也凡虛實之道有者為實無者為虛故氣並則陰陽皆在於氣而無血血並則陰陽皆在於血而無氣今無血無氣是血與氣相失相失故為虛焉人身血氣內外循行各有其部孫脈居外絡脈居中經脈居內絡脈與孫脈之血氣俱輸於經是血與氣並謂血與氣並於經也皆並於經則為實焉既並於經則血之與氣從經而並走於上上而不下則為大厥厥則陰陽不相順接故一時暴死若氣復反於下則生不反於下則上厥下脫而死是知血氣相失虛者固虛而大厥暴死則實者尤虛也帝曰實者何道從來虛者何道從去虛實之要願聞其故承上文之意謂血氣並走於上而為實者從何道來血氣相失而為虛者從何道去去來虛實之要願聞其故岐伯曰夫陰與陽皆有俞會陽注於陰陰滿之外陰陽勻平以充其形九候若一命曰平人俞會者五五二十五俞六六三十六俞與周身陰陽血氣相會合也夫陰與陽皆有俞會從陽而陰則陽注於陰從陰而陽則陰滿之外陽注陰滿斯為陰陽勻平陰陽勻平則血氣調和以充其形既充其形則形身之三部九候上下若一命曰平人平人血氣調和之人也是知陰陽來去由於俞會不由俞會而血氣相併則有陰陽之虛實也夫邪之生也或生於陰或生於陽其生於陽者得之風雨寒暑其生於陰者得之飲食居處陰陽喜怒上文血氣交併陰陽虛實乃經脈不得其平非六淫外感七情內傷故承上文而復論外感內傷陰陽寒熱之病夫邪氣之生病也或有生於陰者或有生於陽者其生於陽者得之風雨寒暑之外感其生於陰者得之飲食居處陰陽喜怒之內傷言風雨寒暑而六氣可該言喜怒而七情可該隨舉即是不必悉具故或言風雨寒暑或言風雨寒濕或言喜怒或言喜悲有如下文之問答也帝曰風雨之傷人奈何帝承岐伯之言更欲闡明其義故屢問而詳悉之岐伯曰風雨之傷人也先客於皮膚傳入於孫脈孫脈滿則傳入於絡脈絡脈滿則輸於大經脈血氣與邪並客於分腠之間其脈堅大故曰實實者外堅充滿不可按之按之則痛凡風雨之傷人也由淺入深故先客於皮膚從皮膚而傳入於孫脈孫脈滿則傳入於絡脈絡脈滿則輸於大經脈由外入內則血氣與邪並客於分腠之間故其脈堅大脈者孫脈絡脈經脈也其脈堅大故曰實實即滿也因言所謂實者其外堅大充滿故不可按之按之則痛者是也帝曰寒濕之傷人奈何岐伯曰寒濕之中人也皮膚不收肌肉堅緊榮血泣衛氣去故曰虛虛者聶闢氣不足按之則氣足以溫之故快然而不痛其寒濕之中人也在於皮膚肌肉之間故皮膚不收肌肉堅緊不收汗出而不閉密也堅緊澀滯而不柔和也故肌肉堅緊則榮血澀澀凝澀也皮膚不收則衛氣去去失守也血澀氣去故曰虛虛者血氣皆虛故聶闢謂肌肉皮膚聶聶然而闢動也氣不足者氣不足以內溫其血也上文充滿而實不可按之按之則痛此血氣不足故按之則氣足以溫之言氣足以內溫其血故快然而不痛上文云生於陽者得之風雨寒暑故舉風雨寒濕以明外感之病生於陽而有實有虛也帝曰善陰之生實奈何生於陽者得之風雨寒暑生於陰者得之飲食居處陰陽喜怒生於陽者上文已詳論之此舉陰之生實生虛以明喜怒飲食之義岐伯曰喜怒不節則陰氣上逆上逆則下虛下虛則陽氣走之故曰實矣喜怒人之情也喜怒不節則內傷其陰而陰氣上逆陰氣上逆則下虛下虛則陽氣走之而並於陰故曰實矣此言陰之生實也帝曰陰之生虛奈何岐伯曰喜則氣下悲則氣消消則脈虛空因寒飲食寒氣熏滿則血泣氣去故曰虛矣喜而怒則氣上喜而悲則氣下故喜則氣下悲則氣消消則經脈虛空復因於寒冷之飲食寒氣熏滿則營血澀衛氣去故曰虛矣此言陰之生虛也上文云生於陰者得之飲食居處陰陽喜怒故舉喜怒悲寒飲食以明內傷之病生於陰而有實有虛也帝曰經言陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒余已聞之矣不知其所由然也岐伯云邪之生也或生於陰或生於陽夫陽主外陰主內陽虛陰虛有外內之寒熱陽盛陰盛有外內之寒熱故引經言而探其所由然也岐伯曰陽受氣於上焦以溫皮膚分肉之間今寒氣在外則上焦不通上焦不通則寒氣獨留於外故寒慄所謂陽虛則外寒者以陽受氣於上焦上焦開發以溫皮膚分肉之間今寒氣在外則上焦不通上焦不通則寒氣獨留於外故寒慄而外寒也帝曰陰虛生內熱奈何岐伯曰有所勞倦形氣衰少穀氣不盈上焦不行下脘不通胃氣熱熱氣熏胸中故內熱中去聲下同所謂陰虛生內熱者有所勞倦致形氣衰少胃中谷氣不盈谷入少則上焦不能宣五穀味故上焦不行下脘不能化谷之精故下脘不通中土虛而胃氣熱熱氣熏於胸中故陰虛則內熱也帝曰陽盛外熱奈何岐伯曰上焦不通利則皮膚緻密腠理閉塞玄府不通衛氣不得泄越故外熱所謂陽盛生外熱者陽主上主外上焦不通利則在外之皮膚緻密內則因之腠理閉塞玄府不通腠理者肌腠之文理玄府者毛竅之汗孔玄府皮膚腠理不相通貫則衛氣壅滯不得泄越故陽盛則外熱也帝曰陰盛生內寒奈何岐伯曰厥氣上逆寒氣積於胸中而不瀉不瀉則溫氣去寒獨留則血凝泣凝則脈不通其脈盛大以澀故中寒中如字所謂陰盛生內寒者陰主下主內厥氣上逆寒厥之氣從下而逆於上也陰在內故寒氣積於胸中而不瀉寒氣不瀉則溫氣去寒獨留留則血凝澀凝則脈不通脈不通者其脈盛大以澀故陰盛則內寒中猶內也帝曰陰與陽並血氣以並病形以成刺之奈何復承上文陰陽血氣病形問補瀉虛實之刺以為調經之法也岐伯曰刺此者取之經隧取血於榮取氣於衛用形哉因四時多少高下上文云五臟之道皆出於經隧以行血氣故刺此者當取之經隧取血於榮取氣於衛者以行其血氣也夫榮衛血氣周於人身合於四時今取之經隧雖曰用形哉必因天之四時以為針之多少高下耳繆刺論云以月生死為數即多少之謂也金匱真言論云春俞在頸項夏俞在胸脅秋俞在肩背冬俞在腰股即高下之謂也帝曰血氣以並病形以成陰陽相傾補瀉奈何血氣並病形成陰陽相傾自有補瀉不必因於四時故復問之岐伯曰瀉實者氣盛乃內針針與氣俱內以開其門如利其戶針與氣俱出精氣不傷邪氣乃下外門不閉以出其疾搖大其道如利其路是謂大瀉必切而出大氣乃屈相併為實相失為虛瀉實者瀉其血氣之並故氣盛乃內針氣盛內針所以瀉實也針與氣俱內針道相併之氣而深之也以開其門瀉之也如利其戶大瀉也既開既利則針與氣俱出謂針出而相併之氣亦出也瀉其外邪不傷正氣故精氣不傷而邪氣乃下所謂開其門者外門不閉以出其疾也所謂利其戶者搖大其道如利其路也夫開門出疾是謂瀉之如利其路是謂大瀉切按也必切而出謂右手持針左手必切其穴而使之外出然後大氣乃屈大氣即相併之盛氣也帝曰補虛奈何岐伯曰持針勿置以定其意候呼內針氣出針入針空四塞精無從去方實而疾出針氣入針出熱不得還閉塞其門邪氣布散精氣乃得存動氣候時近氣不失遠氣乃來是謂追之空作孔補者補其血氣相失故當持針勿置以定其補之之意吸則氣入呼則氣出候呼內針乃氣出而針入也內針則當針孔四塞使精無從去其出針也候氣聚方實則當疾出其針使氣入而針則出針出則熱不得還氣入則閉塞其門熱不得還則邪氣布散閉塞其門則精氣乃得存夫持針勿置以定其意者乃動氣候時謂穴俞動氣必候其時候時則近氣不失遠氣乃來是謂追之追之所以補之此補虛之法為然也帝曰夫子言虛實者有十生於五臟五臟五脈耳夫十二經脈皆生其病今夫子獨言五臟夫十二經脈者皆絡三百六十五節節有病必被經脈經脈之病皆有虛實何以合之上文岐伯云有餘有五不足亦有五皆生於五臟帝謂五臟止五脈五脈虛實何以合十二經脈及三百六十五節故舉而復問之岐伯曰五臟者故得六腑與為表裡經絡支節各生虛實其病所居隨而調之人身五臟屬於五行五行合六氣故五臟得六腑與為表裡五臟六腑十二經絡也十二經絡周身肢節也故經絡肢節各生虛實之病隨其病之所居而調治之病在脈調之血病在血調之絡病在氣調之衛病在肉調之分肉病在筋調之筋病在骨調之骨五行之中有二火以合六氣故舉包絡所主之脈心主之血肺主之氣脾主之肉肝主之筋腎主之骨以明五臟六腑為十二經脈也包絡主脈心主血血脈無分故病在脈調之血病在血調之絡絡猶脈也肺主氣而衛外故病在氣調之衛其餘則隨其病之所在而調之燔針劫刺其下及與急者病在骨淬針藥熨病不知所痛兩蹺為上身形有痛九候莫病則繆刺之痛在於左而右脈病者巨刺之必謹察其九候針道備矣此舉經脈肢節之痹痛在於形身上下左右合三部九候以為調經之法也燔針劫刺其下者治痹證也靈樞經筋篇有十二筋痹證皆治以燔針劫刺痹發於陰故刺其下也及與急者謂筋痹也經筋篇云腹筋急引缺盆及頰卒口僻頰筋有寒則急引頰移口以馬膏膏白酒和桂以塗病在骨者骨痹也痹在骨則淬針病在筋則藥熨也痹病在五臟之外合者必痛若痹病不知所痛則從奇經之脈而上故曰兩蹺為上兩蹺足之陽蹺陰蹺也為上從蹺脈而上行也陽蹺脈病陰緩陽急陰蹺脈病陽緩陰急故雖病而不知所痛若痹病在於肌肉則身形有痛無關經脈故九候莫病則為繆刺之法以治之繆刺論云凡痹在分肉間痛而刺之左刺右右刺左者是也若痛在左而右脈病者邪客經脈也則為巨刺之法以治之巨刺者長針深刺所以取深邪遠痹也凡此痹痛之證在於形身上下左右故必謹察其九候九候者上中下三部一部三候三部九候合於經脈候其形神謹察於此針道備矣繆刺論第六十三篇繆平聲篇內同左右交刺謂之繆刺病在經脈則經刺之刺其俞穴也病在絡脈則繆刺之刺其皮絡也邪客於手足三陽三陰之絡有經刺繆次之法邪客於五臟之絡亦有經刺繆刺之法知經脈絡脈孫絡脈之淺深而繆刺之理明矣黃帝問曰余聞繆刺未得其意何謂繆刺繆刺左右交刺刺極淺也篇名繆刺帝直舉以問也岐伯對曰夫邪之客於形也必先舍於皮毛留而不去入舍於孫絡留而不去入舍於絡脈留而不去入舍於經脈內連五臟散於腸胃陰陽俱感五臟乃傷此邪之從皮毛而入極於五臟之次也如此則治其經焉人身形體外而皮毛內而五臟由淺入深陰陽相應故夫邪之客於形身也必先舍於皮毛留而不去則入舍於孫脈留而不去則入舍於絡脈留而不去則入舍於經脈皮毛孫脈絡脈經脈皆內連五臟六經為川腸胃為海故散於腸胃三陽三陰表裡相應若陰陽俱感則五臟乃傷此邪始從皮毛之表陽而入極於五臟之次也如此則治其經焉言當刺其經俞不繆刺也今邪客於皮毛入舍於孫絡留而不去閉塞不通不得入於經流溢於大絡而生奇病也承上文之意而言今邪客於皮毛入舍於孫絡留於孫絡而不去致孫絡閉塞不通不得入於經但流溢於大絡而生左右相注之奇病也流溢傳注也氣穴論云孫絡之脈別經者並注於絡傳注十四絡脈者是也夫邪客大絡者左注右右注左上下左右與經相干而布於四末其氣無常處不入於經俞命曰繆刺處去聲下同承流溢於大絡之意而言夫邪客大絡者但傳注於左右故左注右左注右身半以上身半以下皆有傳注故上下左右與經相干經經隧也經隧者五臟六腑之大絡也故與經相干而輸布於手足之四末其氣左右流行無有常處經隧相干故不入於經俞不入經俞刺其絡脈故命曰繆刺帝曰願聞繆刺以左取右以右取左奈何其與巨刺何以別之別音通靈樞官針篇八曰巨刺左取右右取左繆刺亦左取右右取左故問繆刺巨刺何以別之岐伯曰邪客於經左盛則右病右盛則左病亦有移易者左痛未已而右脈先病如此者必巨刺之必中其經非絡脈也故絡病者其痛與經脈繆處故命曰繆刺中去聲上繆作謬下繆平聲此言邪客於經左右移易則當巨刺邪客於絡左右紕繆則當繆刺也邪客於經客於經脈也經脈流行貴得其平若左之經脈有餘而盛則右病右之經脈有餘而盛則左病夫左盛右病右盛左病不相移易者也亦有移易者如左痛未已而右脈先病左移於右則右亦可移於左如此邪客於經而移易者必巨刺之申言巨刺必中其經非中絡脈也靈樞脈度論云經脈為里支而橫者為絡故絡病者其痛與經脈繆處繆處異處也謂經脈之痛深而在裡絡脈之痛支而橫居病在於絡左右紕繆故命曰繆刺帝曰願聞繆刺奈何取之何如繆刺之法無有常處故問取之何如岐伯曰邪客於足少陰之絡令人卒心痛暴脹胸脅支滿無積者刺然谷之前出血如食頃而已不已左取右右取左病新發者取五日已卒音促下同谷舊本訛骨今改下二然谷之谷仿此凡邪客於絡內並於經則正刺之邪客於絡不並於經則繆刺之經脈論云足少陰之別並經上走於心包下故邪客於足少陰之絡令人卒心痛又云其病氣逆則煩悶故暴脹胸脅支滿脹滿有積當刺其胸脅若無積者病少陰之絡上走心包故當刺足少陰然谷之前而出其血本俞論云然谷然骨之下者也今曰然谷之前即然骨也刺如食頃而痛脹支滿可已如不已則病在絡脈不並於經故當左取右右取左而為繆刺以治之病新發者邪氣方盛取刺五日其病始已邪客於手少陽之絡令人喉痹舌卷口乾心煩臂外廉痛手不及頭刺手中指次指爪甲上去端如韭葉各一痏壯者立已老者有頃已左取右右取左此新病數日已經脈論云三焦手少陽之脈病則嗌腫喉痹故邪客於手少陽之絡令人喉痹又云手少陽之別注胸中合心主外繞臂實則肘攣虛則不收故舌卷口乾心煩臂外廉痛手不及頭此病少陽之絡而合於經故當刺中指之次指中指次指即小指次指也爪甲上去端如韭葉手少陽關衝井穴也痏針瘢也刺其左右各一痏壯者血氣盛故病立已老者血氣虛故有頃已若不合於經但在絡脈則當左取右右取左而為繆刺以治之此新病而邪氣方盛故繆刺數日其病始已邪客於足厥陰之絡令人卒疝暴痛刺足大趾爪甲上與肉交者各一痏男子立已女子有頃已左取右右取左經脈論云足厥陰之別其病氣逆則睪腫卒疝故邪客於足厥陰之絡令人卒疝暴痛當刺足大趾爪甲上與肉交者足厥陰大敦井穴也刺其左右各一痏男子血盛故立已女子不足於血故有頃已邪客厥陰之絡更當左取右右取左而為繆刺以治之邪客於足太陽之絡令人頭項肩痛刺足小趾爪甲上與肉交者各一痏立已不已刺外踝下三痏左取右右取左如食頃已經脈論云膀胱足太陽之脈從巔下項循肩膊內又云足太陽之別實則頭背痛故邪客於足太陽之絡令人頭項項痛當刺足小趾爪甲上與肉交者足太陽至陰穴也刺其左右各一痏其痛立已如不已更刺外踝下滎俞原三痏三痏者通谷為滎束骨為俞京骨為原也但客太陽之絡不病其經則當左取右右取左而為繆刺以治之如食之頃其病即已邪客於手陽明之絡令人氣滿胸中喘息而支胠胸中熱刺手大指次指爪甲上去端如韭葉各一痏左取右右取左如食頃已經脈論云手陽明之別別入太陰太陰者肺也故邪客手陽明之絡令人氣滿氣滿肺氣滿也胸中喘息喘息肺病也而支胠胸中熱者肺脈從胸胠而行於手肢也當刺手大指之次指爪甲上去端如韭葉手陽明商陽穴也刺其左右各一痏邪客陽明之絡更當左取右右取左而為繆刺以治之如食之頃其病即已邪客於臂掌之間不可得屈刺其踝後先以指按之痛乃刺之以月死生為數月生一日一痏二日二痏十五日十五痏十六日十四痏經脈論云心主手厥陰心包絡之脈下臂入掌中病則臂肘攣急掌中熱故邪客於臂掌之間不可得屈當刺其手踝之後先以指按之按之而痛乃刺之刺之痏數當以月死生為數月生一日一痏二日二痏十五日十五痏乃由微而盛如月之生故漸多之十六日十四痏乃由盛而微如月之衰故漸減之至廾十九日則一痏月郭空則無治也但言痏數不言俞穴按之而痛即俞穴也人身十五大絡故以月死生為痏數厥陰心包主血脈故刺法又如是也邪客於足陽蹺之脈令人目痛從內眥始刺外踝之下半寸所各二痏左刺右右刺左如行十里頃而已脈度論云蹺脈從足至目屬目內眥故邪客於足陽蹺之脈令人目痛從內眥始當刺足外踝之下外踝之下僕參穴也半寸所相去僕參半寸申脈穴也刺其左右各二痏陽蹺之脈合太陽故其刺如是但客陽蹺之脈不合太陽之經則左刺右右刺左而為繆刺以治之蹺脈屬奇經其行最疾故如人行十里之頃而痛病可已人有所墮墜惡血留內腹中滿脹不得前後先飲利藥此上傷厥陰之脈下傷少陰之絡刺足內踝之下然谷之前血脈出血刺足跗上動脈不已刺三毛上各一痏見血立已左刺右左刺右善悲驚不樂刺如右方上文皆言邪客此言墮墜以明墮墜猶之邪客也人有所墮墜亂其經氣則惡血留內以致腹中滿脹而不得前後先飲利藥通其前後墮墜則傷肝主之筋腎主之骨此上傷厥陰之脈肝脈也下傷少陰之絡腎絡也肝屬木其性上行故曰上腎屬水其性下行故曰下此因墮墜傷其脈絡故刺足內踝之下然谷之前谷後之前解見上文刺之所以從血脈而出其血也又刺足跗上動脈以通少陰之絡刺之而病不已更刺足大趾三毛上大敦左右各一痏以通厥陰之脈見血則其病立已此傷厥陰之脈少陰之絡更當左刺右右刺左而為繆刺以治之若因墮墜而善悲驚則手厥陰心包之氣不和不樂則手少陰心臟之氣內逆取刺之法亦如右方謂如然谷之前跗上動脈及三毛諸刺之法也邪客於手陽明之絡令人耳聾時不聞音刺手大指次指爪甲上去端如韭葉各一痏立聞不已刺中指爪甲上與肉交者立聞其不時聞者不可刺也耳中生風者亦刺之如此數左刺右右刺左經脈論云手陽明之別入耳合於宗脈故邪客於手陽明之絡令人耳聾時不聞音當刺手大指之次指爪甲上去端如韭葉手陽明商陽穴也刺其左右各一痏當耳聰立聞若耳聾不已更刺手中指爪甲上與肉交者心主包絡之中衝井穴也包絡主脈刺之所以通其宗脈也通其宗脈當耳聰立聞其不時聞者正氣不充不可刺也若耳中有聲如生風者乃邪客陽明之絡亦刺之如大指次指爪甲上各一痏之數更當為左刺右右刺左而為繆刺以通其絡耳聾刺手陽陰不已刺其通脈出耳前者舊本在則繆刺之之下今改正於此此復申明上文之意上文耳聾刺手陽明之商陽刺之病不已更刺中指之中衝中指中衝主通脈出於耳前故曰耳聾刺手陽明不已刺其通脈出耳前者蓋於陽明之脈上頸貫頰在於耳前通脈出耳前通心主包絡之脈而出於耳前之手陽明也凡痹往來行無常處者在分肉間痛而刺之以月死生為數用針者隨氣盛衰以為痏數針過其日數則脫氣不及日數則氣不瀉左刺右右刺左病已止不已復刺之如法月生一日一痏二日二痏漸多之十五日十五痏十六日十四痏漸少之此言往來行痹不涉經脈但當繆刺其絡脈不必刺其俞穴也凡痹往來謂之行痹其行無常處者邪在分肉之間不涉經脈也凡痹必痛痛而刺之當以月死生為數蓋月方生則氣盛月將死則氣衰用針者隨人氣之盛衰以為痏數氣襄則針宜少針過其日數則虛脫其氣氣盛則針宜多針不及其日數則邪氣不瀉此病在分肉合於絡脈故當左刺右右刺左而為繆刺以治之刺之病已則止針不已復刺之仍如前法所謂如法者月生一日痏二日二痏漸多之至十五日十五痏而為多之極十六日十四痏而為漸少之法也上文手厥陰心包主血脈故以月死生為痏數此言痹痛則衝任之血不能熱肉充膚澹滲皮毛故亦以月死生為痏數篇中繆刺無痏數皆以月死生為痏數也邪客於足陽明之經令人鼽衄上齒寒刺足中指次指爪甲上與肉交者各一痏左刺右右刺左經脈論云胃足陽明之脈起於鼻交頞中下循鼻外上入齒中病則鼽衄邪客於足陽陰之經故令人鼽衄上齒寒當刺足中指之次指中指次指即大指次指也爪甲上與肉交者足陽明厲兌井穴也刺其左右各一痏若病陽明之絡而鼽衄寒則當左刺右右刺左而為繆刺以治之齒齲刺手陽明不已刺其脈入齒中立已舊本在邪客於五臟之間上今改正於此齲音矩齒齲齒腐痛也承上文齒寒之意而言齒齲腐痛則刺手陽明之俞穴刺之而齒齲不已更刺其脈入齒中者則齒齲立已脈入齒中乃足陽明上入齒中之脈也繆傳引上齒齒唇寒痛視其手背脈血者去之足陽明中指爪甲上各一痏手大指次指爪甲上各一痏立已左取右右取左舊本在五刺已之下今改正於此舊本無名字今臆補承上文而言刺其入齒中之脈其病不已復繆傳引上齒甚至齒唇寒痛當視其手背之脈有血絡者刺去其血更刺足陽明中指爪甲上乃中指次指足陽明之厲兌井穴也左右各一痏及手大指次指爪甲上商陽井穴左右各一痏齒唇寒痛當立已繆傳引上齒故當左刺右右刺左而為痹刺以治之也邪客於足少陽之絡令人脅痛不得息咳而汗出刺足小趾次指爪甲上與肉交者各一痏不得息立已汗出立止咳者溫衣飲食一日已左刺右右刺左病立已不已復刺如法經脈論云膽足少陽之脈合缺盆以下胸中循脅裡邪客於足少陽之絡循脅裡故令人脅痛合缺盆以下胸中故不得息不得息則咳不得息而咳故咳則汗出當刺足小趾之次指爪甲上與肉交者足少陽竅陰井穴也刺其左右各一痏不得息當立已汗出當立止咳不能已故云咳者當溫其衣溫其飲食勿使形寒飲冷則一日氣機環轉其咳可已其脅痛未愈當繆刺以治之左刺右右刺左其痛病當立已不能立已復為繆刺亦如左刺右右刺左之法邪客於足少陰之絡令人嗌痛不可內食無故善怒氣上走賁上刺足下中央之脈各三痏凡六刺立已左刺右右刺左嗌中腫不能內唾時不能出唾者刺然谷之前出血立已左刺右右刺左內音納賁音奔前左刺右右刺左六字衍文經脈論云腎足少陰之脈從腎上貫肝膈入肺中病則飢不能食氣上嗌乾及痛邪客於足少陰之絡令人嗌痛即嗌乾及痛也不可內食即飢不欲食也無故善怒即上貫肝膈也氣上走即入肺中也賁上即氣上也如是之病當刺足下中央之脈腎足少陰湧泉井穴也中央及中央之前中央之後左右各三痏凡六刺其病立已若嗌痛不已致嗌中腫腫則不能內唾內猶咽也其時亦不能唾者當刺足少陰然谷之前然谷之前然骨穴也刺出其血其病立邪客少陰之絡故當左刺右右刺左而為繆刺以治之邪客於足太陰之絡令人腰痛引少腹控䏚不可以仰息刺腰尻之解兩胂之上是腰俞以月死生為痏數髮針立已左刺右右刺左經脈論云脾之大絡名曰大包出淵液布胸脅實則身盡痛虛則百節盡皆縱邪客於足太陰之絡令人腰痛引少腹身盡痛之意也控䏚不可以仰息布胸脅百節盡皆縱之意也此絡脈虛實之病當刺腰尻之解以及兩胂之上解骨縫也胂上髁胂之上即髀股也申明腰尻之解兩胂之上腰俞是也蓋腰尻之解屬於腰俞兩胂之上即腰俞兩旁之下也刺法當以月死生為痏數髮針立已邪客於絡故當左刺右右刺左而為繆刺以治之邪客於足太陽之絡令人拘攣背急引脅而痛刺之從項始數脊椎俠脊疾按之應手如痛刺之旁三痏立已數上聲上文邪客於足太陽之絡令人頭項肩痛此不但頭項肩痛且背拘攣而急引脅而痛上文刺足外踝而刺其下此刺從項始數脊椎俠脊而刺其上上文刺足小趾井穴此隨痛應手而刺之上文刺外踝下三痏而繆刺此刺旁脊椎三痏而不繆刺所以不同於上文舉一以例其餘也邪客於足少陽之絡令人留於樞中痛髀不可舉刺樞中以毫針寒則久留針以月死生為數立已上文邪客於足少陽之絡刺足少陽之井穴此邪客於足少陽之絡則隨其痛之所在而刺之亦舉一以例其餘也少陽主樞行身之側其脈循季脅下合髀厭中邪客於足少陽之絡令人留於樞中痛髀不可舉者少陽經脈不和樞轉不利也即刺其樞中樞中髀樞中也以毫針刺其絡也寒則久留針及於經也少陽主初生之氣故以月死生為痏數痛當立已治諸經刺之所過者不病則繆刺之此結上文刺法之意治諸經刺之謂治諸經之病則正刺其經也所過者不病謂諸經所過之道不為邪客而不病也不病則但在於絡故繆刺之所以申明上文刺穴俞與左右交刺不同者以此故也邪客於五臟之間其病也脈引而痛時來時止視其病繆刺之於手足爪甲上視其脈出其血間日一刺一刺不已五刺已下間去聲承上文邪客經絡之意而言周身經絡不外五臟故舉五臟五絡以終繆刺之義五臟之脈行於周身邪客於五臟之間其病也經脈絡脈相引而痛有時來出於絡脈有時但止於經脈故時來時止視其病在絡脈則繆刺之更於手足爪甲上視其孫絡之脈而出其血若邪客五臟之經脈須間日一刺一刺不已至五刺而五臟始周故五刺已邪客於手足少陰太陰足陽明之絡此五絡皆會於耳中上絡左角五絡竭竭令人身脈皆動而形無知也其狀若屍或曰屍厥刺其足大趾內側爪甲上去端如韭葉後刺足中指爪甲上各一痏後刺手大指內側去端如韭葉後刺手心主少陰銳骨之端各一痏立已不已以竹管吹其兩耳鬄其左角之發方一寸燔治飲以美酒一杯不能飲者灌之立已鬄髳同俗作剃承上文邪客五臟之意而言五絡會於耳中合衛氣而行於皮膚也手足少陰心腎水火之絡也手足太陰肺脾天地之絡也足陽明胃中土之絡也心腎開竅於耳猶天地水火會於中土之義故凡此五絡皆會於耳中從耳而上則上絡左角若五絡俱竭不相交會則令人身脈皆動而形無知也動而無知其狀如屍或曰屍厥者是也刺其足大趾內側爪甲上去端如韭葉脾足太陰隱白井穴也後刺足心腎足少陰湧泉穴也後刺足中指爪甲上各一痏足陽明厲兌井穴也後刺手大指內側去端如韭葉肺手太陰少商井穴也後刺手心主少陰銳骨之端各一痏心手少陰掌後高骨大陵俞穴也心者君主之宮故曰心主刺其五絡病當立已如不已則以竹管吹其兩耳以通五絡之會於耳中者更剃其左角之發方一寸燔治使耳中之絡上絡於左角也更飲以美酒一杯不能飲者灌之使絡脈與衛氣相通周於一身出於皮膚則其病立已凡刺之數先視其經脈切而從之審其虛實而調之不調者經刺之有痛而經不病者繆刺之因視其皮部有血絡者盡取之此繆刺之數也此舉刺數以結繆刺之義經脈在裡絡脈在中孫絡脈在外故凡刺之數先當視其在裡之經脈切而從之審其虛實而調之不調者刺其經脈故曰經刺之有痛在於絡脈而經不痛者則繆刺之如病在孫絡因視其周身皮部有血絡者盡取刺之而出其血此所以為繆刺之數也四時刺逆從論第六十四篇四時刺逆從者春刺經脈夏刺孫絡長夏刺肌肉秋刺皮膚冬刺骨髓四時各有所刺刺之從也刺不知四時之經正氣內亂中傷五臟死之有期刺之逆也四時合五行六氣亦合五行故論四時刺逆從先論六氣有餘不足滑澀之病也厥陰有餘病陰痹不足病生熱痹滑則病狐疝風澀則病少腹積氣四時合五行六氣亦合五行故岐伯論四時之刺先論六氣之有餘不足也厥陰木也木四時之春也厥陰有餘則陽氣不足故病陰痹厥陰不足則陽氣有餘故病生熱痹痹閉也不和也氣病為疝血病為積滑主氣盛澀主少血故厥陰脈滑則病狐疝又曰風者氣動風生風主氣也下文肺風脾風心風腎風肝風皆氣動風生之義厥陰脈澀則病少腹當有積氣少陰有餘病皮痹隱軫不足痛肺痹滑則病肺風疝澀則病積溲血軫𤺋同少陰火也火四時之夏也少陰有餘則火氣外炎故病皮痹隱軫少陰不足則火氣內虛故病肺痹氣病為疝故少陰脈滑則病肺風疝血病為積故少陰脈澀則病積溲血太陰有餘病肉痹寒中不足病脾痹滑則病脾風疝澀則病積心腹時滿太陰土也土四時之長夏也太陰有餘則土氣壅滯故病肉痹寒中太陰不足則上氣不運故病脾痹氣病為疝故太陰脈滑則病脾風疝血病為積故太陰脈澀則病積心腹時滿陽明有餘病脈痹身時熱不足病心痹滑則病心風疝澀則病積時善驚陽明金也金時之秋也陽明有餘則氣燥而熱故病脈痹身時熱陽明不足則胃絡不通於心包故病心痹氣病為疝故陽明脈滑則病心風疝血病為積故陽明脈澀則病積時善驚太陽有餘病骨痹身重不足病腎痹滑則病腎風疝澀則病積善時巔疾太陽水也水時之冬也太陽有餘則水寒氣盛故病骨痹身重太陽不足則水氣虛竭故病腎痹氣病為疝故太陽脈滑則病腎風疝血病為積故太陽脈澀則病積善時巔疾少陽有餘病筋痹脅滿不足病肝痹滑則病肝風疝澀則病積時筋急目痛少陽火也亦時之春也六氣之中有二火所以合於五行也少陽厥陰相為表裡少陽有餘則肝木之氣亦有餘故病筋痹脅滿少陽不足則肝木之氣亦不足故病肝痹氣病為疝故少陽脈滑則病肝風疝血病為積故少陽脈澀則病積時筋急目痛是故春氣在經脈夏氣在孫絡長夏氣在肌肉秋氣在皮膚冬氣在骨髓中四時之氣合於人身春氣發生行於周身是故春時之氣在經脈夏氣開張浮泛於外故夏時之氣在孫絡土氣敦厚居時之中故長夏之氣在肌肉秋氣肅殺化暑為涼故秋時之氣在皮膚冬氣閉藏深伏於內故冬時之氣在骨髓中帝曰余願聞其故願聞春夏秋冬所以在經脈絡脈肌肉皮膚骨髓之故岐伯曰春者天氣始開地氣始泄凍解冰釋水行經通故人氣在脈春氣之所以在經脈者蓋以春者因冬之藏其時天氣始開地氣始泄凍始解凍始釋水行而經通故人氣在經脈夏者經滿氣溢入孫絡受血皮膚充實夏氣之所以在孫絡者蓋以夏者盛大於外經滿氣溢外入孫絡而受血皮膚充實故夏氣在孫絡長夏者經絡皆盛內溢肌中長夏之所以在肌肉者蓋以長夏者夏時經絡皆盛長夏則內溢肌中故長夏之氣在肌肉秋者天氣始收腠理閉塞皮膚引急秋氣之所以在皮膚者蓋以秋者天時之氣始收人之腠理閉塞皮膚內引而急故秋氣在皮膚冬者蓋藏血氣在中內著骨髓通於五臟上藏如字冬氣之所以在骨髓者蓋以冬者氣機蓋藏血氣在中內著骨髓通於五臟臟者藏也惟冬主藏故通五臟而冬氣在骨髓是故邪氣者常隨四時之氣血而入客也至其變化不可為度然必從其經氣闢除其邪除其邪則亂氣不生人身經絡肌肉皮膚骨髓各主其時是故邪氣者常隨四時所主之氣血內虛而入客也四時主氣各有常度至其邪氣變化不可為度然必從其經脈之正氣經氣充足闢除其邪除其邪則亂氣不生而合於常度也帝曰逆四時而生亂氣奈何上文云從其經氣則亂氣不生從則亂氣不生逆則生亂故問逆四時而生亂氣奈何岐伯曰春刺絡脈血氣外溢令人少氣春刺肌肉血氣環逆令人上氣春刺筋骨血氣內著令人腹脹人身絡脈經脈肌肉筋骨本於血氣合於四時刺失其宜則血氣內逆而生亂也春氣在經脈宜刺其經脈若春刺絡脈肌肉筋骨刺失其宜則血氣外溢血氣環逆血氣內著而令人生病也筋連於骨故曰筋骨刺絡脈經脈肌肉筋骨必由皮膚而入故不言皮膚但舉四時故不言長夏也夏刺經脈血氣乃竭令人解㑊夏刺肌肉血氣內卻令人善恐夏刺筋骨血氣上逆令人善怒夏氣在孫絡宜刺其孫絡若夏刺經脈肌肉筋骨則血氣乃竭血氣內卻血氣上逆而令人生病也秋刺經脈血氣上逆令人善忘秋刺絡脈氣不外行令人臥不欲動秋刺筋骨血氣內散令人寒慄秋氣在皮膚宜刺其皮膚若秋刺經脈絡脈筋骨則血氣上逆氣不外行血氣內散而令人生病也四時刺逆不及皮膚但舉四時不及長夏故上文不言皮膚此宜刺皮膚則不言長夏之肌肉也冬刺經脈血氣皆脫令人目不明冬刺絡脈內氣外泄留為大痹冬刺肌肉陽氣竭絕令人善忘冬氣在骨髓宜刺其骨髓若冬刺經脈絡脈肌肉則血氣皆脫內氣外泄陽氣竭絕而令人生病也凡此四時刺者大逆之病不可不從也反之則生亂氣相淫病焉總承上文而言凡四時之刺者刺失其從若大逆之病不可不從也大逆之病而反刺之則生亂氣亂氣生則相淫而為病焉故刺不知四時之經病之所生以從為逆正氣內亂與精相薄四時之刺各有其經故刺不知四時之經及病之所生若以從為逆必致以逆為從正氣內亂邪氣乃生而與精相薄矣必審九候正氣不亂精氣不轉欲知四時經病之生從逆之道必審九候人身上中下三部各有天地人三候而為九候也審九候所謂正氣內亂者而正氣不亂矣所謂與精相薄者而精氣不轉矣不轉內存也帝曰善刺五臟中心一日死其動為噫中肝三日死其動為語中肺五日死其動為咳中腎六日死其動為嚏欠中脾十日死其動為吞刺傷人五臟必死其動則依其臟之所變候知其死也中俱去聲三日五日今改正刺失其宜是為刺逆知其逆則知其從帝故善之復舉刺禁論岐伯之言以明刺傷五臟各有死期各有動病其死者刺失其宜傷人五臟必死其動者則依其臟之所變病以候其動候其動而知其死也刺法論第六十五篇篇中大旨論六氣升降不前不遷正不退位及化運剛柔失守民病疫疫帝謀諸岐伯欲預救生靈詳其刺治之法以除民病故曰刺法論黃帝問曰升降不前氣交有變即成暴郁余已知之何如預救生靈可得卻乎六氣以次主歲有升有降若升降不前則氣交有變變則暴鬱而為民病帝欲詳明刺治以救生靈故問岐伯稽首再拜對曰昭乎哉問巨聞夫子言即明天元須窮刺法可以折郁扶運補弱全真瀉盛蠲余令除斯苦天元天元紀大論也夫子鬼臾區也天元紀大論帝曰願夫子推而次之令有條理而鬼臾區詳悉言之故曰聞夫子言既明天元而預救生靈須窮刺法可除斯苦也帝曰願卒聞之願聞刺法岐伯曰升之不前即有甚凶也木欲升而天柱窒抑之木欲發郁亦須待時當刺足厥陰之井六氣以次相併若升之不前即有甚凶如辰戌之歲太陽司天則厥陰木氣為司天左間木欲升而逢天柱之金星窒抑之則木鬱矣鬱而欲發亦須待時待時待居位時也欲扶運折郁以卻其病當刺足厥陰所出之井火欲升而天逢窒抑之火欲發郁亦須待時君火相火同刺包絡之滎巳亥之歲厥陰司天則少陰火氣為司天左間丑未之歲太陰司天則少陽火氣為司天左間火欲升而逢天蓬之水星窒抑之則火鬱矣鬱而欲發亦須待時待居位時也欲扶運折郁以卻其病則少陰君火少陽相火當同刺包絡所淄之發土欲升而天衝窒抑之土欲發郁亦須待時當刺足太陰之俞俞音輸下同子午之歲少陰司天則太陰土氣為司天左間土欲升而天衝木星窒抑之則土鬱矣鬱而欲發亦須待土氣居位時若扶運折郁以卻其病當刺足太陰所注之俞金欲升而天英窒抑之金故發郁亦須待時當刺手太陰之經寅申之歲少陽司天陽明金氣為司天左間金欲升而天英火星窒抑之則金鬱矣鬱而欲發亦須待金氣居位時若扶運折郁以卻其病當刺手太陰所行之經水欲升而天芮窒抑之水欲發郁亦須待時當刺足少陰之合卯酉之歲陽明司天則太陽水氣為司天左間水欲升而天芮土星窒抑之則水鬱矣鬱而欲發亦須待水星居位時若扶運折郁以卻其病當刺足少陰所入之合帝曰升之不前可以預備願聞其降可以先防升之不前則先郁後發各有取刺可以預備願聞其降可先防乎岐伯曰既明其升必達其降也升降之道皆可先治也木欲降而地晶窒抑之降而不入抑之郁發散而可得位降而鬱發暴如天間之待時也降而不下郁可速矣降可折其所勝也當刺手太陰之所出刺手陽明之所入間去聲余及下篇同惟左位升之不前則右位降之不下故皆可先治也如丑未之歲太陽在泉厥陰木氣降為地之左間木欲降而地晶金司窒抑之則降而不入降而不入則木抑矣抑之而鬱發必金氣散而可得位抑之郁發散可得位是降而鬱發也上文欲發其鬱亦須待時此降而鬱發其氣之暴亦如上文天間之時也如當降而終不降是降而不下矣降而終不下則不能待時郁可速發矣其發雖速不可折之必待降時可折其所勝也治之之法當刺手太陰肺金所出之井肺為臟手陽明大腸為之腑故更刺手陽明所入之合火欲降而地玄窒抑之降而不入抑之郁發散而可矣當折其所勝可散其鬱當刺足少陰之所出刺足太陽之所入寅申之歲厥陰在泉少陰火氣降為地之左間火欲降而地玄水司窒抑之則降而不入矣火抑之而鬱發必水氣散而可矣斯時當折其所勝之水可散其所郁之火當刺足少陰腎水所出之井腎為臟足太陽膀胱為之腑故更刺足太陽所入之合土欲降而地蒼窒抑之降而不下抑之郁發散而可入當折其勝可散其鬱當刺足厥陰之所出刺足少陽之所入卯酉之歲少陰在泉太陰土氣降為地之左間土欲降而地蒼木司窒抑之降而不下則土抑矣抑之郁發必木氣散而土可入斯時當折其所勝之木可散其所郁之土當刺足厥陰肝木所出之井肝之臟膽為腑故更刺足少陽所入之合金欲降而地彤窒抑之降而不下抑之郁發散而可入當折其勝可散其鬱當刺心包絡所出刺手少陽所入也巳亥之歲少陽在泉陽明金氣降為地之左間金欲降而地彤火司窒抑之則降而不下矣火抑之而金鬱發必火氣散而金可入斯時當折其所勝之火散其所郁之金當刺心包絡火氣所出之井包絡三焦相為表裡故更刺手少陽所入之合也水欲降而地阜窒抑之降而不下抑之郁發散而可入當折其土可散其鬱當刺足太陰之所出刺足陽明之所入子午之歲陽明在泉太陽水氣降為地之左間水欲降而地阜土司窒抑之則降而不下矣土抑之而水鬱發必土氣散而水可入斯時當折其所勝之土散其所郁之水當刺足太陰脾土所出之井脾為臟胃為腑故更刺足陽明所入之合上文升之不前皆取本氣之鬱而刺治之此降之不下皆取所勝之氣而刺治之是皆立教之法以明刺治之不可執也帝曰五運之至有前後與升降往來有所承抑之可得聞乎刺法上文木火土金水論上下左右升降不前故曰五運之至有前後與上下升降左右往來有所承製而抑鬱之因各有刺可得聞乎刺法之義乎岐伯曰當取其化源也是故太過取之不及資之太過取之次抑其鬱取其運之化源令折鬱氣不及扶資以扶運氣以避虛邪也資取之法令出密語六元正紀大論云折其鬱氣資其化源化源生化之源故曰當取化源也是故太過則取之不及則資之太過取之者乃以次而抑其鬱取其五運之化源令折其鬱氣也不及資之者乃不及扶資以扶運氣以避虛邪也下本病論岐伯有注玄珠密語之云故曰資取之法會出密語以上論上下左右間氣升降不前各有刺法也黃帝問曰升降之刺以知其要願聞司天未得遷正使司化之失其常政即萬化之或其皆妄然與民為病可得先除欲濟群生願聞其說上文論升降不前各有所刺故曰升降之刺以知其要每歲司天當其時而未得遷正使司化失其五常之政即萬化之或其皆妄時既不正然必與民為病欲濟群生故復問之岐伯稽首再拜曰悉乎哉問言其至理聖念慈憫欲濟群生臣乃盡陳斯道可申洞微帝念慈憫群生探其至理伯因讚美而申陳之太陽布覆即厥陰不遷正不遷正氣塞於上當瀉足厥陰之所流巳亥厥陰司天上年司天則辰戌太陽也一歲既終太陽有餘復布即厥陰不遷正矣不遷正則木氣塞於上厥陰之氣鬱而不伸故當瀉足厥陰之所流人身經氣出於井淄於滎注於俞行於經入於合流謂滎俞經也下流仿此厥陰復布少陰不遷正不持正即氣留於上當刺心包絡脈之所流子午少陰司天上年司天則巳亥厥陰也一歲既終厥陰有餘復布則少陰不遷正矣不遷正即火氣留於上少陰之氣鬱而不伸故當刺心包絡脈之所流少陰復布太陰不遷正不遷正即氣留於上當刺足太陰之所流丑未太陰司天上年子午少陰有餘復布則太陰不遷正矣不遷正則土氣留於上太陰之氣鬱而不伸故當刺足太陰之所流太陰復布少陽不遷正不遷正則氣塞未通當刺手少陽之所流寅申少陽司天上年丑未太陰有餘復布則少陽不遷正矣不遷正則火氣塞而未通鬱而不伸故當刺手少陽之所流少陽復布則陽明不遷正不遷正則氣未通上當刺手太陽之所流卯酉陽明司天上年寅申少陽有餘復布則陽明不遷正矣不遷正則陽明金氣未能通上鬱而不伸故當刺手太陰之所流手太陰金也陽明覆布太陽不遷正不遷正則復塞其氣當刺足少陰之所流辰戌太陽司天上年卯酉陽明有餘復布則太陽不遷正矣不遷正則上年終氣之太陽與本年司天之太陽復塞其氣復重複也太陽重郁故當刺足少陰之所流足少陰水也帝曰遷正不前已通其要願聞不退欲折其餘無令過失可得明乎上文論遷正不前帝更欲詳明不退之義岐伯曰氣過有餘復作布正是名不退位也使地氣不得後化新司天未可遷正故復布化令如故也不退位者乃氣過於有餘下年復作布政是名不退位也天氣不退使地氣不得後化以遷正地氣不得後化故新司天未可遷正故復布化令如其故也是知不退位乃所以不遷正不遷正乃所以不退位也巳亥之歲天數有餘故厥陰不退位也風行於上木化布天當刺足厥陰之所入如巳亥之歲天數有餘故厥陰不退位也不退位則子午云歲猶尚治天風行於上木化布天厥陰之氣有餘也當刺足厥陰所入之合穴以瀉之子午之歲天數有餘故少陰不退位也熱行於上火余化布天當刺手厥陰之所入凡本年司天之氣有餘不退則下年司天未得遷正下義俱仿此手厥陰心包絡也刺之所以瀉火熱之有餘丑未之歲天數有餘故太陰不退位也濕行於上雨化布天當刺足太陰之所入寅申之歲天數有餘故少陽不退位也熱行於上火化布天當刺手少陽之所入氣同少陰上文君火相火同刺包絡至此則異穴雖不同理則一也卯酉之歲天數有餘故陽明不退位也金行於上燥化布天當刺手太陰之所入辰戌之歲天數有餘故太陽不退位也寒行於上凜水化布天當刺足少陰之所入故天地氣逆化成民病以法刺之預可平痾總結上文言六氣不遷正不退位故天地氣逆化成民病以法刺之痾可平也以上論上下在中正位遷退失時各有刺法也黃帝問曰剛柔二干失守其位使天運之氣皆虛乎與民為病可得平乎上文升降遷退乃司天之六氣也帝又問天干之氣有剛柔以化五運如剛柔二干失守使司天五運之氣皆虛乎真而為病可得平乎岐伯曰深乎哉問明其奧旨天地疊移三年化疫是謂根之可見必有逃門五運六氣乃天地疊移也與民為病是三年化疫也三年化疫是謂根之可見也必有逃門可得而平也假令甲子剛柔矢守剛未正柔孤而有虧時序不令即音律非從如此三年變大疫也詳其微甚察其淺深欲至而可刺刺之當先補腎俞次三日可刺足太陰之所注又有下位己卯不至而甲子孤立者次三年作土癘其法補瀉一如甲子同法也其刺以畢又不須夜行及遠行令七日潔清淨齋戒所有自來腎有久病者可以寅時面向南淨神不亂思閉氣不息七遍以引頸嚥氣順之如咽甚硬物如此七遍後餌舌下津令無數甲丙戊庚壬為剛乾乙丁己辛癸為柔干子寅辰午申戌為剛支醜卯巳末酉亥為柔支此以下論剛柔二干以甲丙庚壬戊五干為在天上位剛也甲與己合丙與辛合庚與乙合壬與丁合戊與癸合以己辛乙丁癸為在地在位柔也其六氣則以子寅辰午申合五剛乾子司天則卯在泉寅司天剛巳在泉辰司天則未在泉午司天則酉在泉申司天則亥在泉既以子寅辰午申為司天上位合卯己未酉亥在地下位六氣合五運醜戌不與焉時序不令天時失守則三年化疫也地時失守則三年作癘各有補瀉之治法干支首立甲子假令甲子司天則甲為土運甲與己合甲為剛己為柔也子午少陰司天則卯酉陽明在泉如甲己子卯剛柔失守剛未正則柔孤立有虧致時序不令即五音之太少六律之陰陽不與歲運相合故曰非從歲運如此則甲乙丙三年當變大疫而為民病也詳其鬱之微甚察其病之淺深病欲至而可刺刺之當先補腎俞次三日可刺足太陰之所注所以然者丙為水運故補腎俞甲為土運故補足太陰也甲與己合皆為土運子午司天則卯酉在泉故兼論下位之己卯下位在泉之位也剛柔失守者又有下位己卯不至而甲子孤立者次三年則作土癘天氣病則為疫地氣病則為癘疫病氣而癘病形也其補瀉刺治之法一如甲子先補腎俞後刺足太陰所謂同法也刺畢又不須夜行及遠行以養身令七日潔清淨齋戒以養心夫疫癘之病皆乘虛入故曰所有自來也若其人腎有久病者又有導引吐納之法以補刺法之所不及也假令丙寅剛柔失守上剛乾失守下柔不可獨主之中水運非太過不可執法而定之布天有餘而失守上正天地不合即律呂音異如此即天運失序後三年變疫詳其微甚差有大小徐至即後三年至甚即首三年當先補心俞次五日可刺腎之所入又有下位地甲子辛巳柔不附剛亦名失守即地運皆虛後三年變水癘即刺法皆如此矣其刺如畢慎其大喜欲情於中如不意即其氣復散也令靜七日心欲實令少思丙剛於也寅剛之也假令丙寅丙為水運與辛相合寅申少陽司天則巳亥厥陰在泉如剛柔失守夫上剛於既失守則下柔幹不可獨主之而亦失守矣丙為陽水之運理應太過今上剛失守則中水運非太過矣夫丙為剛乾而水運非太過是不可執法而定之也布天司天也寅年司天則布天有餘而失守上正如是則天地之氣不相和合即陽律陰呂之音亦乘異矣司天五運如此即天運失序則其後丙丁戊三年民變疫病詳其病之微甚大則甚小則微而病瘥有大小其病徐至即後三年至戊也甚而即至則首三年丙也戊為火運故當補心俞丙為水運故次五日可刺腎之所入也下位司地之位也寅申司天則巳亥在泉丙與辛皆為水運故又有下位地甲子辛巳柔不附剛亦名失守所謂上剛乾失守下柔不可獨主之者是也如此則司地與代運皆虛後三年民病變為水癘即刺法與丙寅同故曰皆如此矣其刺如畢當慎其大喜並慎欲情於中如不意雖補心俞即其氣復散也亦必令靜七日如心氣欲實當令少思思傷心也假令庚辰剛柔失守上位失守下位無合乙庚全運故非相召布天未退中運勝來上下相錯謂之失守姑洗林鐘商音不應也如此則天運化易三年變疫詳其大數瘥有微甚微即微三年至甚即其三年至當先補肝俞次三日可刺肺之所行刺畢可靜神七日慎勿大怒怒必真氣卻散之又或在下地甲子乙未失守者即天運孤主之三年變癘名曰金癘其至待時也詳其地數之等差亦推其微其微甚可知遲速爾諸位乙庚失守刺法同肝欲平即勿怒假令庚辰干支皆剛而庚與乙合庚為剛乙為柔剛柔失守謂上位剛乾失守則下位柔干亦無合是乙庚金運而故非相招也上年布天未退則中運勝來蓋布天未退而上年己卯司天之氣未退也己為土運在中而中運又勝辰年太陽之水到上下相錯而失守姑洗陽律也林鐘陰律也庚為金運其音商上下相錯是以陽律陰律而商音不應也如此即天運化易言司天歲運變化易常也庚辛壬三年變大疫矣詳其天數瘥有微甚之不同天氣微者民病即微氣病雖微三年必至天氣甚者民病即甚氣病雖甚亦三年至壬年運木故當先補肝俞庚年運金故次三日可刺肺之所行行經穴也刺畢可靜神七日慎勿大怒怒必真氣卻散之矣又或在下地甲子乙未失守者乃庚與乙合辰水太陽司天則未土太陰在泉也庚為剛於即乙為柔干剛柔失守即上庚獨治之而乙干之柔亦名失守者即在地之未與乙之代運孤主之矣至三年民變癘名曰金癘三年至故其至待時也詳其地數之等差亦可推其病之微甚微則病遲甚則病速故可知遲速耳諸在地之位若乙庚失守其刺法同於上所謂慎勿大怒者三年交壬壬為木運肝氣主之肝欲平即勿怒也假令壬午剛柔失守上壬未遷正下丁獨然即雖陽年虧及不同上下失守相招其有期瘥之微甚各有其數也律呂二角失而不和同音有日微甚如見三年大疫當刺脾之俞次三日可刺肝之所出出也刺畢靜神七日勿醉歌樂其氣復散又勿飽食勿食生物欲令脾實氣無滯飽無久坐食無太酸無食一切生物宜食甘淡又或地下甲子丁酉失守其位未得中司即氣不當位下不與壬奉合者亦名失守非名合德故柔不附剛即地運不合三年變癘其刺法一如木疫之法當去聲假令壬午干支皆剛而壬與丁合壬為剛丁為柔剛柔失守剛失守則上壬未遷正柔失守則下丁亦獨然之夫剛乾合陽支是為有餘柔干合陰支是為不及即雖陽年與虧及不同而上下既失守則病之相招其有期也相差之微甚亦各有其數也陽律陰呂皆應角木今律呂二角失而不和雖同音有日而此時失守之微甚則如見焉三年之內當大疫矣三年壬癸甲也甲為土運故當刺脾之俞以平土次三日可刺肝之所出以平木也刺畢須靜神七日勿大醉歌樂致其氣復散又勿飽食勿食生食欲令脾實須氣無滯飽也久坐而食則四肢不運故無久坐食酸為木味大酸則木盛土虛故無大酸生物傷脾故無食一切生物宜甘宜淡以養之又或地下甲子丁酉失守其位木運有虧未得中司即上天氣不當位而下地不與壬運奉合者亦名失守不失守則上下合德失守則非名合德矣非名合德故柔不附剛即下地中運不合三年變癘其刺法一如壬干木疫之法也假令戊申剛柔失守戊癸雖火運陽年不太過也上失其剛柔地獨主其氣不正故有邪干疊移其位差有淺深欲至將合音律先同如此天運失時三年之中火疫至矣當刺肺之俞刺畢靜神七日勿大悲傷也悲傷則肺動而真氣復散也人慾實肺者要在息氣也又或地下甲子癸亥失守者即柔失守位也即上失其剛也即亦名戊癸不相合德者也即運與地虛後三年變癘即名火癘假令戊申干支皆剛戊與癸合戊為剛癸為柔剛柔失守戊癸火運申為陽年今既失守不太過也上司天之陽即失其剛則在地之柔獨主之矣上失剛地獨主則其氣不止其氣不正故有邪干且疊移其位邪干移位差有淺深矣凡上下之氣欲至將合音律先同今也不然如此則司天中運失時三年之中大疫至矣三年戊己庚也庚為金運故當刺肺金之俞刺畢靜神七日勿大悲傷也申明悲傷即肺動肺動而其氣復散也由是而知人慾實肺者要在息氣也息猶止也又或地下甲子癸亥失守者癸為柔干亥為柔之即柔失守位也柔失守位亦即上失其剛之義也戊癸相合今失守失剛即亦名戊癸不相合德者也不相合德即中運與在地皆虛矣後三年民病變癘戊癸運火即名火癘是故立地五年以明失守以窮法刺於是疫之與癘即是上下剛柔之名也窮歸一體也即刺疫法只有五法是總其諸位失守故只歸五行而統之也總結上文言六氣在天地支主之五行在地天干主之是故立地五年以明剛柔之失守也以窮治法之所刺也於是知疫之與癘即是上下剛柔之名也雖有疫癘剛柔之名窮究其極總歸一體也所謂一體者即刺疫之法只有五法而刺癘之法同於疫也以上失守俱曰假令是六十年中總其諸位之失守故此只歸五行而統之也黃帝曰余聞五疫之至皆相染易無問大小病狀相似不施救療如何可得不相移易者時疫之病傳染移易如何救療可得不相移易者岐伯曰不相染者正氣存內邪不可干避其毒氣天牝從來復得其往氣出於腦即不邪干氣出於腦即室先想心如日欲將入於疫室先想青氣自肝而出左行於東化作林木次想白氣自肺而出右行於西化作戈甲次想赤氣自心而出南行於上化作焰明次想黑氣自腎而出北行於下化作水次想黃氣自脾而出存於中央化作土五氣護身之畢以想頭上如北斗之煌煌然後可入於疫室天牝即玄牝人身真元之氣也天牝從來從鼻息而下丹田得其從來復得其往合五臟元真之氣上出頭腦然後可入疫室蓋邪之所至其氣必虛真氣內存發見於外則邪不能入疫可卻矣又一法於春分之日日未出而吐之所以清其胃脘也又一法於雨水日後三浴以藥泄汗所以通其肌表也又一法小金丹方辰砂二兩水磨雄黃一兩葉子雌黃一兩紫金半兩同入閤中外固了地一尺築地賓不用爐不須藥制用火二十斤煅之也七日終候冷七日取次日出合子埋藥地中七日取出順日研之三日煉白沙蜜為丸如梧桐子大每日望東吸日華氣一口冰水下一丸和氣咽之服十粒無疫干也紫金紫色金也合盒也固以泥封固之也了地入地也地賓地穴也順日就日猶向日也冰水冷水也小金丹所以鎮腑臟而和三焦也以上言三年化疫癘亦隨之與民為病各有逃門是以刺法之外更有卻疫之方也黃帝問曰人虛即神遊失守位使鬼神外干是致夭亡何以全真願聞刺法承上下失守之意問人虛則神遊失守何以全真不致夭亡岐伯稽首再拜曰昭乎哉問謂神遊失守雖在其體然不致死或有邪干故令夭壽神遊失守雖本體內虛然不致死復有邪干則夭壽矣如下文三虛相搏各有刺法只如厥陰失守天以虛人氣肝虛感天重虛即魂遊於上邪干厥大氣身溫猶可刺之刺其足少陽之所過復刺肝之俞厥陰司天之氣也如厥陰失守則天以虛人氣肝虛而感天之虛是謂重虛肝藏魂即魂遊於上重虛而外邪干之是為三虛邪干即病厥厥厥逆也大氣肝氣上逆也身溫熱氣外浮也邪干致病猶可刺之刺其足少陽之所過以治身溫復刺肝之俞以治厥氣少陽所過刺其原也六腑有原九針論云所過為原下過義俱仿此人病心虛又遇君相二火司天失守感而三虛遇火不及黑屍鬼犯之令人暴亡可刺手少陽之所過復刺心俞人病心虛心臟虛也又遇少陰君火少陽相火司天失守天氣虛也重虛感邪而三虛火氣不及水制其火故有黑屍水鬼犯之令人暴亡而有取刺之法也人脾病又遇太陰司天失守感而三虛又遇土不及青屍鬼邪犯之於人令人暴亡可刺足陰明之所過復刺脾之俞人虛天虛而感邪是為三虛木剋土故青屍鬼邪犯之病之所在即取刺之下肝腎二段其義一也人肺病遇陽明司天失守感而三虛又遇金不及有赤屍鬼於人令人暴亡可刺手陽明之所過復刺肺俞火剋金故犯赤屍鬼人腎病又遇太陽司天失守感而三虛又遭水運不及之年有黃屍鬼干犯人正氣吸人神魂致暴亡可刺足太陽之所過復刺腎俞黃屍鬼土剋水也所謂三虛相搏為暴疾此之謂也黃帝問曰十二歲之相使神失位使神彩之不園恐邪於犯治之可刺願聞其要十二經脈臟腑主之腑能藏物皆謂之藏神遊旋轉則神彩周園否則恐邪於犯刺治何如岐伯稽首再拜曰悉乎哉問至理道真宗此非聖帝焉究斯源是謂氣神合道契符上天帝屢問詳悉皆至理至道之真宗人身氣神合於天道故曰契符上天心者君主之官神明出焉可刺手少陰之源合下十二官解見靈蘭秘典論心為君主出神明故刺手少陰之源手少陰心也上文升降之刺有刺其流者合溜注行而總攝之則曰流此則刺其源蓋出者入之基入者出之本合出入而總攝之則曰源下源俱仿此肺者相傅之官治節出焉可刺手太陰之源肝者將軍之官謀慮出焉可刺足厥陰之源膽者中正之官決斷出焉可刺足少陽之源膻中者臣使之官喜樂出焉可刺心包絡之所流手少陰心既刺其源故心包絡刺其所流脾為諫議之官智周出焉可刺脾之源靈蘭秘典合脾胃而總言之故曰脾胃者倉廩之官五味出焉此則分言之故如此云云磨運輸散猶諫議也藏意藏智智之周也又土灌四旁也胃為倉廩之官五味出焉可刺胃之源大腸者傳道之官變化出焉可刺大腸之源小腸者受盛之官化物出焉可刺小腸之源腎者作強之官伎巧出焉刺其腎之源三焦者決瀆之官水道出焉刺三焦之源膀胱者州都之官津液藏焉氣化則能出焉刺膀脫之源凡此十二官者不得相失也十二官各有所司相為傳使故不得相失解見靈蘭秘典是故刺法有全神養真之旨亦法有修真之道非治疾也故要修養和神也道貴常存補神固根精氣不散神守不分然即神守而雖不去亦能全真人神不守非達至真至真之要在乎天玄神守天息復入本元命曰歸宗刺法所以全神養真也是故刺法有全神養真之旨焉亦其法有修真之道焉非但治疾也非治疾故要修養和神也道貴常存常存則補神固根能如是也則精氣不散而神守不分然即神守而疾雖不去亦全真矣所以然者重內守之神非治疾也苟人神不守非能達乎至真以至真之要在乎天玄不在形身也神守而天息依復入本元命曰歸宗刺法有修真之道有全神養真之旨其洵然乎本病論第六十六篇此復申明上篇之義上篇論升降遷正退位及剛柔干支失守民病疫癘三虛暴亡十二官相失各有刺法帝更欲宣暢其旨故又探諸岐伯以明之名本病論者蓋本上篇刺法之病以為論也黃帝問曰天元九窒余已知之願聞氣交何名失守上篇論升降不前乃九星窒抑帝承上篇之義故曰天元九窒余已知之更欲詳明氣交失守之義岐伯曰謂其上下升降遷正退位各有經論上下各有不前故名失守也是故氣交失易位氣交乃變變易非常即四時失序萬化不安變民病也帝雲天元九窒余已知之者謂其上下升降遷正退位之理各有經以論之也問氣交何名失守者亦上下各有不前故名失守也氣交則易位是故氣交失易位則氣交乃變變易非常即時序乃失致萬化不安變民病也帝曰升降不前願聞其故氣交有變何以明之氣交即升降之義故合升降以問氣交岐伯曰昭乎問哉明乎道矣氣交有變是謂天地機但欲降而不得降者地窒刑之又有五運太過而先天而至者即交不前但欲升而不得其升中運抑之但欲降而不得其降中運抑之於是有升之不前降之不下者有降之不下升而至天者有升降俱不前作如此之分別即氣交之變變之有異常各各不同災有微甚者也氣交有變是謂天地之機天地機旋轉者也今但欲降而不得降者乃地司窒刑之有如前篇所云也又有五運之氣太過先天而至者夫五運太過則上下受制即氣交亦不前矣有但欲升而不得其升乃中運制抑之有但欲降而不得其降亦中運制抑之於是有升之不前降之不下者矣有降之不下升而至天者矣由此推之有升之不前降而至地者矣不言者省文也又有升降俱不前者矣作如此之分別即氣交之變變之有異常各各不同而災因有微甚者也帝曰願聞氣交遇會勝抑之由變成民病輕重何如承五運太過中運抑之及災有微甚之言而復問也岐伯曰勝相會抑伏使然是有故辰戌之歲木氣升之主逢天柱勝而不前又遇庚戌金運先天中運勝之忽然不前木運昇天金乃抑之升而不前即清生風少肅殺於春露霜復降草本乃萎民病瘟疫早發咽嗌乃干四肢滿肢節皆痛久而化郁即大風摧拉折隕鳴紊民病卒中偏痹手足不仁支肢同卒音促下俱同中去聲始焉受制既乃復也故勝相會乃抑伏使然是故辰戌之歲太陽司天厥陰木氣升為左間主逢天柱則金星勝而木不前又遇庚戌庚為金運故金運先天化運在中故中運升之有所制勝則忽然不前夫木運欲昇天金氣乃抑之則升而不前蓋金為清肅之氣木為風動之氣故即清氣生而風氣少肅殺之氣行於春則露霜復降草木乃萎民病瘟疫早發咽嗌乃干燥金勝也四肢滿肢節皆痛風木病也久而化郁木先鬱而後發也木鬱而發即大風摧拉折隕鳴紊民病卒中偏痹手足不仁風病也是故巳亥之歲君火昇天至窒天蓬勝之不前又厥陰木遷正則少陰未得昇天水運以至其中者君火欲升而中水運抑之升之不前即清寒復作冷生旦暮民病伏陽而內生煩熱心神驚悸寒熱間作日久成郁即暴熱乃至赤風瞳翳化疫溫癘暖作赤氣瘴而化火疫皆煩而燥渴渴甚治之以泄之可止巳亥厥陰司天則少陰君火升為左間主窒天蓬則水星勝而火不前又厥陰司天未遷正則少陰未得昇天矣若水運以至其中者君火欲升而中水運抑之也升之不前即清寒復作冷生旦暮水氣勝也民病伏陽而內生煩熱火氣鬱也心神驚悸火氣虛也寒熱間作水火相爭也日久成郁鬱而乃發即暴熱乃至矣赤風火風也赤風瞳翳火風交熾目不明也化疫溫癘先病疫後病癘也癘為溫癘則疫為火疫故又曰暖作赤氣瘴而化火疫溫癘火疫均為熱病故皆煩而燥渴渴甚治之以泄之可止謂泄其火也是故子午之歲太陰昇天主窒天衝勝之不前又或遇壬子木運先天而至者中木運抑之也昇天不前即風埃四起時舉埃昏雨濕不化民病風厥涎潮偏痹不隨脹滿久而伏郁即黃埃化疫也民病夭亡臉肢腑黃疸滿閉濕令弗布雨化乃微子午之歲少陰司天則太陰土氣升為左間主窒天衝則木星勝而土不前又或遇壬子壬為木運木運先天而至者則中木運抑之也太陰昇天不前即風埃四起時舉埃昏風氣勝也雨濕不化土氣虛也民病風厥延潮風濕病也偏痹不隨脹滿亦風濕病也久而伏郁郁乃發即黃埃化疫也民病夭亡臉肢腑黃疸滿閉濕令弗布雨化乃微土疫病也是故丑未之年少陽昇天主窒天蓬勝之不前又或遇太陰未遷正者即太陰未昇天也水運以至者昇天不前即寒霧反布凜冽如冬水復涸冰再結喧暖更作冷復布之寒喧不時民病伏陽在內煩熱生中心神驚駭寒熱間爭以久成郁即暴熱乃生赤風氣瞳翳化成疫癘乃化作伏熱內煩痹而生厥甚則血溢丑未之年太陰司天少陽相火升為左間主窒天蓬水星勝之火氣不前又或遇太陰未遷正者即少陰未昇天也辛為水運水運以至者則火氣昇天不前即寒零反布凜冽如冬水涸而冰再結水氣勝也喧暖乍作冷復布之寒勝熱也乍喧乍寒故寒喧不時民病伏陽在內至伏熱內煩與巳亥之歲同寒制其熱水勝火虛故痹而生厥甚則血溢火鬱發也是故寅申之年陽明昇天主窒天英勝之不前又或遇戊申戊寅火運先天而至金欲昇天火運抑之升之不前即時雨不降西風數舉鹹鹵燥生民病上熱喘嗽血溢久而化郁即白埃翳霧清生殺氣民病脅滿悲傷寒鼽嚏嗌乾手摺皮膚燥數音朔寅申之年少陽司天陽明金氣升為左間主窒天英火星勝之金氣不前又或遇戊申戊寅火運先天而至金欲昇天火運抑之則升之不前矣即時雨不降火氣勝也西風數舉鹹鹵燥生金氣鬱也民病上熱喘嗽血溢火病也久而化郁郁久而發病也即白埃翳霧清生殺氣秋金之氣也民病脅滿悲傷寒鼽嚏嗌乾手摺皮膚燥金刑之病也是故卯酉之年太陽昇天主窒天芮勝之不前又遇陽明未遷正者即太陽未昇天也土運以至水欲昇天土運抑之升之不前即濕雨熱蒸寒生雨間民病注下食不及化久而成郁冷來客熱冰雹卒至民病厥逆而噦熱生於內氣痹於外足脛痠疼反生心悸懊熱暴煩而復厥間如字卯酉之年陽明司天太陽水氣升為左間主窒天芮土星勝之水氣不前又遇陽明司天未遷正者即太陽左間未昇天也土運以至太陽水氣欲昇天而土運抑之則升之不前矣即濕雨熱蒸濕兼熱也寒生雨間濕兼寒也民病注下食不化土濕病也久而成郁郁久而水病發也冷來客熱冰雹卒至水氣之寒也民病厥逆而噦水寒病也熱生於內氣痹於外氣痹於外故足脛痠疼熱生於內故反生心悸熱生於內氣痹於外故鬱熱暴煩而復厥黃帝曰升之不前余已盡知其旨願聞降之不下可得明乎問意與前篇同岐伯曰悉乎哉問也是謂天地微旨可以盡陳斯道所謂升已必降也至天三年次歲必降降而入也始為左間也如此升降往來命之六紀者矣至天三年如少陰為司天左間則次年少陰司天三年則為右間三年之後降而入地始為地之左間如此升降往來無有己時命之六十年之六紀者矣是故丑未之歲厥陰降地主窒地晶勝而不前又或遇少陰未退位即厥陰未降下金運以至中金運承之降之未下抑之變郁木鬱降下金承之降而不下埃埃遠見白氣承之風舉埃昏清燥行殺霜露覆下肅殺布令久而不降抑之化郁即作風燥相伏喧而反清草木萌動殺霜乃蟄未見懼清傷臟見音現余同丑未太陰司天則辰戌太陽在泉厥明降地為地之左間主窒地晶金勝木也勝之而厥陰不前又或遇上年司天少陰未退位即厥陰未降下矣厥陰木也金運以至其中則金運承之承乃制也承製之則降之未下抑之則變郁矣夫木欲降下金承之降而不下則巷埃遠見而金之白氣承之風舉埃昏風氣盛也清燥行殺霜露覆下肅殺布令金氣勝也郁久而木不降則抑之化郁即風燥相伏喧而反清時惟春也草木萌動而殺以霜蟄蟲乃蟄而時未見懼清氣之傷臟也是故寅申之歲少陰降地主窒地玄勝之不入又或遇丙申丙寅水運太過先天而至君火欲降水運承之降而不下即彤雲才見黑氣反生喧暖如舒塞常布雪凜冽復作天云慘淒久而不降伏之化郁寒勝復熱赤風化疫民病面赤心煩頭痛目眩也赤氣彰而溫病欲作也寅申少陽司天則巳亥厥陰在泉少陰降地為地之左間主窒地玄水勝火也勝之而火不前又或遇丙申丙寅丙為水運太過先天而至君火欲降水運承製之降而不下即火氣之彤雲才見而黑氣反坐喧暖之陽氣如舒而寒常布雪水氣本寒故凜冽復作天云慘淒久而不降則抑伏之而化郁矣鬱極而復則始焉寒勝者今乃復熱矣復熱故赤風化為溫疫民病面赤心煩頭痛目眩皆火鬱乃發之病是以火氣彰而溫病欲作也是故卯酉之歲太陰降地主窒地蒼勝之不入又或少陽未退位者即太陽未得降也或木運以至木運承之降而不下即黃云見而青霞彰鬱蒸作而大風霧翳埃勝折隕乃作久而不降也伏之化郁天埃黃氣地布濕蒸民病四肢不舉昏眩肢節痛腹滿填臆卯酉之歲陽明司天則子午少陰在泉太陰降地為地之左間主窒地蒼木勝土也木勝之而土不入又或上年少陽司天未退位者即太陰未得降也或丁酉丁卯木運以至木運承製之則太陰降而不下矣如是即土色之黃云見而木之青霞彰土之鬱蒸作而木起大風土濕之霧翳埃勝而風木之折隕乃作且久而不降也久伏之而化郁郁乃發故天埃黃氣地布濕蒸民病四肢不舉昏眩肢節痛腹滿填臆皆土鬱乃發之病也是故辰戌之歲少陽降地主窒地玄勝之不入又或遇水運太過先天而至也水運承之降而不下即彤雲才見黑氣反生喧暖欲生冷氣卒至甚即冰雹也久而不降伏之化郁冷氣復熱赤風化疫民病面赤心煩頭痛目眩也赤氣彰而熱病欲作也辰戌太陽司天則丑未太陰在泉少陽降地為地之左間主窒地玄水勝火也水勝之而火不前又或遇丙戌丙辰水運太過先天而至也水運承之火氣降而不下矣彤雲才見以下大意與少陰同是故巳亥之歲陽明降地主窒地彤勝而不入又或遇太陰未退位即陽明未得降即火運以至之火運承之不下即天清而肅赤氣乃彰喧熱反作民皆昏倦夜臥不安咽乾引飲燠熱內煩大清朝暮喧還復作久而不降伏之化郁天清薄寒遠生白氣民病掉眩手足直而不仁兩脅作痛滿目忙忙巳亥厥陰司天則寅申少陽在泉陽明降為地之左間主窒地彤火氣勝之火勝之而金不入又或遇上年太陰未退位即陽明未得降也歲當戊申戊寅即火運以至之火運承製之而金不下即天清而肅則赤氣乃彰喧熱反作火勝金也民病昏倦夜臥不安不清寧也咽乾引飲懊熱內煩熱氣勝也故雖大清朝暮而火氣之喧還復作也若抑久而終不降則伏之而化郁金鬱而發則天清薄寒遠生白氣金勝木虛故民病掉眩手足直而不仁且兩脅作痛滿目忙忙是皆肝虛之病也是故子午之年太陽降地主窒地阜勝之降而不入又或遇土運太過先天而至土運承之降而不入即天彰黑氣瞑暗悽慘才施黃埃而布濕寒化令氣蒸濕復令久而不降伏之化郁民病大厥四肢重怠陰痿少力天布沉陰蒸濕間作子午少陰司天則卯酉陽明在泉太陽降為地之左間主窒地阜土勝水也勝之則水降而不入又或遇甲午甲子土運太過先天而至土運承製之水氣降而不入即天彰黑色而水欲舒即暝暗悽慘才施黃埃而土布濕矣水欲動而寒化令其氣隨蒸濕而土復令矣久而不降則伏抑之而化郁謂鬱而復發也民病大厥四肢重怠陰痿少力水發之病也天布沉陰蒸濕間作水鬱之氣也帝曰升降不前晰知其宗願聞遷正所得明乎升降論左右之間位遷正論上下之中位故復問之岐伯曰正司中位是全遷正位司天不得其遷正者即前司天已遇交司之日即遇司天太過有餘日也即仍舊治天數新司天未得遷正也遷正者正司中位是全遷正位以司天也不得其遷正者即前司天已遇交司之日即遇上年司天太過而有餘日即仍舊以致天數以致新司天未得遷正也厥陰不遷正即風喧不時花卉萎瘁民病淋溲目系轉轉筋喜怒小便赤風欲令而寒猶不去溫喧不正春正失時巳亥之歲厥陰不遷正則風木失時故即風喧不時而花卉萎瘁也民病諸證皆屋肝虛不遷正而失時序故風欲令而寒猶不去溫喧不正春正失時也少陰不遷正即冷氣不退春冷後寒喧暖不時民病寒熱四肢煩痛腰脊強直木氣雖有餘位不過於君火也強去聲過平聲下過同子午之歲少陰不遷正則熱火失時故即冷氣不退春時光冷後寒以致溫暖不時也民病諸證皆少陰心腎內虛少陰之不遷正必厥陰之不退位然厥陰木氣雖有餘而位不過於二氣之君火也太陰不遷正即雲雨失令萬物枯焦當生不發民病乎足肢節腫滿大腹水腫填臆不食飧泄脅滿四肢不舉雨化欲會熱猷治之溫煦於氣亢而不澤丑未之歲太陰不遷正則土濕不濡故即雲雨失令而萬物枯焦當生不發矣民病諸證皆屋脾虛太陰之不遷正必少陰之不退位也故雨化欲令而熱猶治之溫煦於氣致亢而不澤也少陽不遷正即炎灼弗令苗莠不榮酷暑於秋肅殺晚至霜露不時民病痎瘧骨熱心悸驚駭甚時血溢寅申之歲少陽不遷正則火熱愆期故即炎灼弗令苗莠不榮物不長也酷署於秋熱氣後也當秋而署以致肅殺晚至而霜露不時民病諸證皆少陽火鬱之所致也陽明不遷正則暑化於前肅於後草木反榮民病寒熱鼽嚏皮毛折爪甲枯焦甚則喘嗽息高悲傷不樂熱化乃布燥化未令即清勁先行肺金復病卯酉之歲陽明不遷正者乃少陽不退位也不退位則暑化於前金肅於後熱多清少故草木反榮民病諸證皆金虛肺病熱化乃布火氣余也燥化未令金氣虛也金氣虛即清勁未行若清勁行而肺金復病太陽不遷正即冬清反寒易令於春殺霜在前寒冰於後陽光復治凜冽不作霧云待時民病溫癘至喉閉嗌乾煩燥而渴喘息而有音也寒化待燥猶治天氣過失序與民作災辰戌之歲太陽不遷正太陽主寒水之氣太陽不遷正乃陽明不退位陽明不退即冬時清肅反寒之氣易令於太陽主歲之春殺霜在前金氣勝也寒冰於後水愆期也水氣虛故陽光復治而凜冽不作霧云待時也民病諸證皆水虛火病太陽未遷正故寒化時陽明不退位故燥猶治天其氣過時失序則與民為災帝曰遷正早晚以命其旨願聞退位可得明哉遷正義明願聞退位岐伯所謂不退者即天數未終即天數有餘名曰復布正故名曰再治天也即天令如故而不退位也至春不得溫和之氣一如舊歲之冬為不退位也厥陰不退位即大風早舉時雨不降濕令不化民病溫疫疵發風生皆肢節痛頭目痛伏熱內煩咽喉干引飲巳亥厥陰不退位則子午少陰未遷正當子午之年即大風早舉木氣勝也時雨不降濕會不化木製地也民病溫疫疵發風生風熱病也皆肢節痛頭目痛伏熱內煩咽喉干引飲亦皆厥陰風熱之病也少陰不退位即溫生春冬蟄蟲早至草木發生民病膈熱咽乾血溢驚駭小便赤澀丹瘤𤺋瘡瘍留毒子午少陰不退位則丑未太陰未遷正當丑未之年即溫生春冬蟄蟲早至草木發生火氣勝也民病膈熱諸證亦皆少陰火熱之病也太陰不退位而且寒暑不時埃昏布作濕令不去民病四肢少力食飲不下泄注淋滿足脛寒陰痿閉塞失溺小便數丑未太陰不退位則寅申少陽未遷正當寅申之年而且寒暑不時埃昏布作濕令不去土氣勝也民病諸證皆為太陰土濕之病也少陽不退位即熱生於春暑乃後化冬溫不凍流水不冰蟄蟲出見民病少氣寒熱更作便血上熱小腹堅滿小便赤沃甚則血溢寅申少陽不退數則卯酉陽明未遷正當卯酉之年即熱生於春暑乃後化冬溫不凍流水不冰蟄蟲出見皆火熱之氣有餘也民病諸證亦皆少陽火熱之病也陽明不退位即春生清冷草木晚榮寒熱間作民病嘔吐暴注食飲不下大便乾燥四肢不舉目瞑掉眩卯酉陽明不退位則辰戌太陽未遷正當辰戌之年值寒水之氣即春生清冷而草木晚榮清氣惟寒燥氣則熱故寒熱間作民病諸證亦皆陽明清寒燥熱之病也言此五氣不及太陽可類推矣帝曰天歲早晚余已知之願聞地數可得聞乎司天者謂之天歲司地者謂之地數岐伯曰地下遷正升及退位不前之法即地土產化萬物失時之化也下遷從天而遷於地也正升從地而升於天也退位成功者退也不前司令者當升不升也中有所失即地土產化皆為萬物失時之化也此一節中明下篇升降遷正退位之義帝曰余聞天地二甲子十干十二支上下經緯天地數有疊移失守其位可得昭乎上篇岐伯有下地甲子之說故問天地二甲子疊移失位即上篇剛柔失守之意岐伯曰失之疊位者謂雖得歲正未得正位之司即四時不節即生大疫注玄珠密語云陽年三十年除六年大刑計有太過二十四年除此六年皆作太過之用令不然之旨今言疊支選位皆可作其不及也失之猶言失守疊位更移其位也失守疊位謂雖得歲正未得正位之司即四時不節即生大疫矣玄珠密語書名也以甲丙戊寅壬陽干配子寅辰午申戌陽支計有三十年除甲辰甲戌丙子戊午庚申壬寅歲會六年為天刑尚計有二十四年主陽年為太過除此天刑六年皆作太過之用今也若令有不然之旨所謂不然之旨者今言疊支疊位雖太過有餘皆可作其不及也蓋言當位不位雖有餘亦不及也假令甲子陽年土運太窒如癸亥天數有餘者年雖交得甲子厥陰猶尚治天地已遷正陽明在泉去歲少陽以作右間即厥陰之地陽明故不相和奉者也癸己相會土運太虛反受木勝故非太過也況黃鐘不應太宮木既勝而金復還金既復而少陽如至即木勝如火而金復微如此則甲己失守後三年化成土疫晚至丁卯早至丙寅土疫至也大小善惡推其天地詳乎太一又只如甲子年如甲至子而合應交司而治天即下己卯未遷正而戊寅少陽未退位者亦甲己下有合也即土運非太過而木乃乘虛而勝土也金次又行復勝之即反邪化也陰陽天地殊異爾故其大小善惡一如天地之旨也窒有餘而不通也甲子皆陽甲己化土甲為有餘己為不及假令甲子陽年土運太過而窒今年甲子上年癸亥如癸亥天數有餘者今年雖交得甲子上年厥陰猶尚治天此司天之失守也子午少陰司天則陽明在泉若司天失守而地己遷正則陽明在泉矣去歲當少陽在泉者今歲已作陽明之右間夫地己遷正而厥陰猶尚治天即為厥陰之地陽明陽明金氣上制其木故不相和奉者也上年癸亥猶未退位甲己運土則癸己相會己為陰土故土運太虛虛則反受厥陰木勝夫癸主化火火能生土土應太過己運不及故非太過也此因甲而兼論乎己也甲主土運是為太宮今司天失守即黃鐘不應太宮土虛而木既勝始焉木勝既而金還復金既復而少陰如至至遷正也少陰火也始則木勝終則火勝故曰木勝如火猶言火之勝一如木勝也火勝而金復微矣勝復如此則皆甲己土運之失守也後三年化成土疫晚至丁卯三年後也早至丙寅正三年也土疫至也病之大小善惡推其天地之陰陽詳乎太一之出入可以知之又只如甲子之年如甲至子而合陽合陽也合則甲與子應交司而治天即在下之己卯未遷正而在地上年之戊寅少陽未退位者亦甲與己下有合也謂從上合下也即土運雖非太過而木乃乘虛勝土也金次又行復勝其木即反致邪化而病疫也此皆陰陽天地之殊異爾故其病之大小善惡一如天地之法旨以推乎天數詳乎太一也假令丙寅陽年太過如乙丑天數有餘者雖交得丙寅太陰尚治天也地己遷正厥陰司地去歲太陽以作右間即天太陰而地厥陰故地不奉天化也乙辛相會水運太虛反受土勝故非太過即太簇之管太羽不應土勝而雨化水復即風此者丙辛失守其會後三年化成水疫晚至己巳早至戊辰甚即速微即徐水疫至也大小善惡推其天地數乃太乙遊宮又只如丙寅年丙至寅且合應交司而治天即辛巳未得遷正而庚辰太陽未退位者亦丙辛不合德也即水運亦小虛而小勝或有復後三年化癘名曰水癘其狀如水疫治法如前寅申干支皆陽假令丙寅陽年太過如上年乙丑天數有餘者雖然得丙寅上年太陰尚治天也寅年少陽司天則厥陰在地如地己遷正則厥陰司地去歲太陽在泉者今已作地之右間地己遷正而太陽尚治天即天太陽陰而地厥陰厥陰木氣上制其土故地不奉天化也上年乙丑猶未退位丙辛運水則乙辛相會辛為陰故水運太虛反受太陽土勝故非太過此因丙兼論乎辛也丙主水運是為太羽司天失守即太簇之管太羽不應土氣勝而雨濕化雨水也水生木故水復即風風木也此論丙辛水運失守其會也至後三年化成水疫晚至三年後之己巳早至三年之戊辰甚即速微即綜水疫至也病之大小善惡推其天地之數乃在太一遊宮可以知之又只如丙寅年丙與寅且合應交司而治天然丙與辛合又少陽寅在上則厥陰已在下即辛巳未得遷正而上年庚辰太陽未退位者干雖在丙亦丙辛之不合德也即水運之虛亦小虛而小勝小勝或有復也後三年病地氣而化癘者名曰水癘其狀即如水疫治法如前篇刺法論假令庚辰陽年太過如巳卯天數有餘者雖交得庚辰年也陽明猶尚治天地己遷正太陰司地去歲少陰以作右間即天陽明而地太陰也故地下奉天也乙己相會金運太虛反受火勝故非太過也即姑洗之管太商不應火勝熱化水復寒刑此乙庚失守其後三年化成金疫也速至壬午徐至癸未金疫至也大小善惡推本年天數及太一也又只如庚辰如庚至辰且應交司而治天即下乙未未得遷正者即地甲午少陰未遇位者且乙庚不合德也即下乙未干失剛亦金運小虛也有小勝或無復後三年化癘名曰金癘其狀如金疫也治法如前庚與辰為陽年太過如上年己卯天數有餘者本年雖交得庚辰年也而上年陽明猶尚治天此司天之失守也辰年太陽司天則太陽在地如地己遷正則太陰司地矣去歲少陰在泉者今歲以作地之右間即天乃上年之陽明而地乃今歲之太陰也太陰在泉土也陽明在天金也泉在地之下土生其金故地下而上奉於天也上年己卯猶未退位乙庚同運則乙己相會乙為陰故金運太虛反受少陰火勝夫乙為金運陽明司天則金氣太過以受少陰火勝故非太過也此因庚而兼論乎乙也庚主金運謂之太商司天失守即姑洗之管太商不應金失守而不及則火勝而熱化金氣正位則金生其水而水復寒刑以勝其火凡此皆論乙庚金運失守其後三年化成金疫也速至壬午三年也徐至癸未三年後也金疫至也大小善惡推本年天數及乎太一可以知之又只如庚辰之年庚與辰且應交司而治天乙與庚合皆為金運太陽辰在上則太陽未在下引而伸之即下乙來未得遷正者本年乙未則上年甲午即上年地甲午少陰未退位者夫在上則庚失守在下則乙失守且乙庚不合德也即下乙未未得遷正是柔干失剛亦金運小虛也有小虛則有小勝小勝或無復也後三年化癘名曰金癘其狀如金疫治法如前篇假令壬午陽年太過如辛巳天數有餘者雖交後壬午年也厥陰猶尚治天地己遷正陽明在泉去歲丙申少陽以作右間即天厥陰而地陽明故地不奉天者也丁辛相合會木運太虛反受金勝故非太過也即蕤賓之管太角不應金行燥勝火化熱復甚即連微即徐疫至大小善惡推疫至之年天數及太一又只如壬至午且應交司而治之即下丁酉未得遷正者即地下丙中少陽未得退位者見丁壬不合德也即丁柔干失剛亦木運小虛也有小勝小復後三年化癘名曰木癘其狀如風疫治法如前壬午之歲陽氣太過如上年辛巳天數有餘者雖交後壬午年也上年辛巳厥陰猶尚治天此司天之失守也午年少陰司天當陽明在地如地己遷正則陽明在泉奚去歲丙寅少陽在泉者今歲以作右聞天即上年之厥陰而地乃今歲之陽明陽明金氣上刑其木故地不奉天者也上年辛巳猶未退位丁壬運木則丁辛相會合丁為陰故木運太虛虛則反受金勝木虛金勝故非太過也此因壬而兼論乎丁也壬主木運謂之太角司天失守即蕤賓之管太角不應木失守而不及則金行燥勝木氣正位則木生火而火化熱復以勝其金勝之甚者病即速勝之微者病即徐速與徐則疫至也大小善惡推疫至之年天數及太一可以知之又只如壬午年如壬至午且應交司而治之壬與丁合皆為木運少陰午在上則陽明酉在下引而伸之即下丁酉未遷正者即地下上年丙申少陽未退位者在上則壬不遷正在下則丁不遷正見丁壬不合德也即丁柔干亦失其剛失剛謂不遷正也此亦木運之小虛也虛而有小勝則有小復後三年化癘名曰木癘其狀如風疫治法如前篇假令戊申陽年太過如丁未天數太過者雖交得戊申年也太陰猶尚治天地己遷正厥陰在泉去歲壬戌太陽以退位作右間即天丁未地癸亥故地不奉天化也丁癸相會火運太虛反受水勝故非太過也即夷則之管上太微不應此戊癸失守其會後三年化疫也速至庚戌大小善惡推疫至之年天數及太一又只如戊申如戊至申且應交司而治天即下癸亥來得遷正者即地下壬戌太陽未退位者見戊癸未合德也即下癸柔干失剛見火運小虛也有小勝或無復也後三年化癘名曰火癘也治法如前治之法可塞之泄之戊申之歲陽年太過如上年丁未天數太過者雖交得戊申年也上年丁未太陰猶尚治天此司天之失守也申年少陽司天當厥陰在地如地己遷正則厥陰在泉矣去歲壬戌太陽在泉者今歲以退位而作地之右間天即上年丁未之太陰而地乃癸亥之厥陰也厥陰木氣上勝其土故地不奉天化也戊癸皆火運而上年丁未退位是為丁癸相會癸之火運太虛則反受水勝火虛水勝故非太過也此因戊而兼論乎癸也戊主火運謂之太微司天失守即夷則之管上太微不應此戊癸失守其會也至後三年當化疫也連至庚戌戊申己酉庚戌交三年也疫之大小善惡惟疫至之年並天數及太一可以知之又只如戊申戊火運在中也申少陽司天也如戊至申且應交司而治天戊與癸合少陽中在上則厥陰亥在下即下厥陰未得遷正者即地下上年壬戌太陽未退位者在上則戊不遷正在下則癸不遷正見戊癸未合德也即下癸柔干失剛而不遷正亦見火運小虛也小虛有小勝或無復也後三年化癘名曰火癘也治法如前篇又曰治之法可寒之泄之者以明寒泄之法可治火癘也推而及之則土金水木亦可仿此義以治之不但如前篇治法也此一節申明上篇剛柔二干失守及三年變疫癘之義黃帝曰人氣不足天氣如虛人神失守神光不聚邪鬼幹人致有暴亡可得聞乎帝承上篇三虛之意以問岐伯曰人之五臟一臟不足又會天虛感邪之至也臟不足一虛也天虛二虛也感邪三虛也有如下文所云也人憂愁思慮即傷心又或遇少陰司天天數不及太陰作接間至即謂天虛也此即人氣天氣同虛也又遇驚而奪精汗出於心因而三虛神明失守心為君主之官神明出焉神失守位即神遊上丹田在帝太一帝君泥丸宮下神既失守神光不聚卻遇火不及之歲有黑屍鬼見之令人暴亡子午之後丑未繼之故子午少陰天數不及而丑未太陰作接間至下少陽少陰作接間至同人氣天氣虛又遇驚而奪精汗出於心是為三虛心為火臟黑屍鬼見之水剋火也此三虛相搏令人暴亡也人飲食勞倦即傷脾又或遇太陰司天天數不及即少陽作接間至即謂之虛也此即人氣虛而天氣虛也又遇飲食飽甚汗出於胃醉飽行房汗出於脾因而三虛脾神失守脾為諫議之官智周出焉神既失守神光失位而不聚也卻遇土不及之年或己年或甲年失守或太陰天虛青屍鬼見之令人卒亡脾與胃以膜相連故論脾而兼言胃也人久坐濕地強力入水即傷腎腎為作強之官伎巧出焉因而三虛腎神失守神志失位神光不聚卻遇水不及之年或辛不會符或丙年失守或太陽司天虛有黃屍鬼主見之令人暴亡符猶合也不會符猶言不會合也亦失守意人或恚怒氣上逆而不下即傷肝也又遇厥陰司天天數不及即少陰作接間至是謂天虛也此謂天虛人虛也又遇疾走恐懼汗出於肝肝為將軍之官謀慮出焉神位失守神光不聚又遇木不及年或丁年不符或壬年失守或厥陰司天虛也有白屍鬼見之令人暴亡也言心脾胃肝不及肺者可類推也以上五失守者天虛而人虛也神遊失守其位即有五屍鬼干人令人暴亡也謂之曰屍厥人犯五神易位即神光不園也非但屍鬼即一切邪犯者皆是神失守位故也此謂得守者生失守者死得神者昌失神者亡此一節申明上篇三虛暴亡十二藏不得相失之義標本病傳論第六十七篇標本陰陽先後之氣也先病為本後病為標人身正氣調和外感風熱濕火燥寒之氣謂之客氣則以外感客氣為本三陽三陰正氣為標若正氣先病因病而生風熱濕火燥寒之氣謂之同氣則以三陽三陰正氣為本所生同氣為標故治有從本者有從標者有先治其本而後治其標者有先治其標而後治其本者間者並行甚者獨行此標本之大法也病傳者心病傳肺肺病傳肝肝傳脾脾傳腎相剋而傳皆有死期若間一臟則相生而傳病當自止不止而至三四臟者乃可刺此病傳之大法也靈樞有病本篇論標本病傳論論病傳分而為二此則合為一也黃帝問曰病有標本刺有逆從奈何帝承上篇四時刺逆從之意謂欲知刺之逆從必知病之標本不知病之標本猶未知刺之逆從故問病有標本刺有逆從奈何岐伯對曰凡刺之方必別陰陽前後相應逆從得施標本相移別音逼應平聲刺得其宜標本始得故凡刺之方必別四時六氣之陰陽在表在裡淺刺深刺前後相應何者為逆何者為從逆從得施則因標治本因本治標而標本可以相移是刺得其宜而標本始得也故曰有其在標而求之於標有其在本而求之於本有其在本而求之於標有其在標而求之於本故治有取標而得者有取本而得者有逆取而得者有從取而得者故知逆與從正行無問知標本者萬舉萬當不知標本是謂妄行當去聲至真要大論曰百病之起有生於本者有生於標者有取本而得者有取標而得者有逆取而得者有從取而得者故曰有其在標而求之於標此病生於標取標而得也有其在本而求之於本此病生於本取本而得也二者乃從取之法也有其在本而求之於標有其在標而求之於本二者乃逆取之法也故申明治有取標而得者即在標而求之於標也有取本而得者即在本而求之於本也有逆取而得者即在本求標在標求本也有從取而得者即在標求標在本求本也故知逆取與從取之法則正行而無可問正行無問可以萬舉萬當無有妄行故又曰知標本者萬舉萬當不知標本是謂妄行夫陰陽逆從標本之為道也小而大言一而知百病之害少而多淺而博可以言一而知百也以淺而知深察近而知遠言標與本易而弗及治反為逆治得為從易去聲此復舉陰陽逆從標本至大深遠而治之宜審也上文論陰陽逆從標本故曰夫陰陽逆從標本之為道也小而至大言一標本逆從而知百病之害夫小而大者乃少而能多淺而能博故可以言一而知百病之害也淺而博是以淺而知深少而多是察近而知遠故言標與本言易而知之弗及不知標本治之相反則為逆識其標本治之得宜始為從此陰陽標本逆從而為治之宜審也先病而後逆之治其本先逆而後病者治其本先寒而後生病者治其本先病而後生寒者治其本先熱而後生病者治其本此下論標本先後之治與靈樞病本論辭意相同凡病皆當治本惟中滿而大小不利當治其標更當察其間甚為並行獨行之治也先病而後逆者先病為本後逆為標當治其先病之本先逆而後病者先逆為本後病為標當治其先逆之本先寒而後生病者先寒為本後病為標當治其先寒之本先病而後生寒者先病為本後寒為標當治其先病之本先熱而後生病者先熱為本後病為標當治其先熱之本凡此皆治本之法也先熱而後生中滿者治其標病本篇無此句此承上文而言先熱後生中滿則不治先熱之本而治中滿之標中滿則上下不交人以中土為本故治其標先病而後泄者治其本先泄而後生他病者治其本必且調之乃治其他病先病而後生中滿者治其標先中滿而後煩心者治其本先病而後泄者治其先病之本先泄而後生他病者治其先泄之本先泄則中土先虛既治其本必且調之乃治其他病所以重其中土也先病而後生中滿者則治中滿之標先中滿而後煩心者則治中滿之本雖有標本中滿當先治也人有客氣有同氣承上文而言所謂先病先逆先寒先熱先泄先中滿者人有客氣有同氣也客氣者風熱濕火燥寒之氣侵入人身而為病也同氣者人身厥陰之氣同於風少陰之氣同於熱太陰之氣同於濕少陽之氣同於火陽明之氣同於燥太陽之氣同於寒病三陰三陽之正氣固有風熱濕火燥寒之同氣而為病也小大不利治其標小大利治其本上文中滿治標更當審其小大二便所以補上文未盡之意後生中滿而治後病之標者以中滿則小大二便不利故治其後病之標若中滿而小大利亦當先治其本所以申明中滿治標而補其未盡之意也病發而有餘本而標之先治其本後治其標病發而不足標而本之先治其標後治其本有餘者邪氣有餘不足者正氣不足病發而邪氣有餘則本而標之申明本而標之者先治其邪氣之本後治其正氣之標此治有餘之法也病發而正氣不足則標而本之申明標而本之者先治其正氣之標後治其邪氣之本此治不足之法也天元紀大論云厥陰之上風氣主之少陰之上熱氣主之太陰之上濕氣主之少陽之上火氣主之陽明之上燥氣主之太陽之上寒氣主之所謂本也是以風熱濕火燥寒淫氣為本人身三陽三陰正氣為標謹察間甚以意調之間者並行甚者獨行先小大不利而後生病者治其本間去聲下同間相兼也甚獨盛也治本治標其中復有間甚故當謹察間甚以意調之如邪正之有餘不足疊勝而相間者則並行其治並行者補瀉兼施寒熱互用也如但邪氣有餘但正氣不足而偏甚者則獨行其治獨行者專補專瀉專寒專熱也若先小大二便不利後生標本之病者無論間甚但治其本以行其便是察間甚之中而小大不利當先治也此一節論標本先後治法之不同夫病傳者心病先心痛一日而咳三日脅支痛五日閉塞不通身痛體重三日不已死冬夜半夏日中此下皆論病傳其傳也相剋而傳故病皆死與靈樞病傳論大旨相同辭稍異也病傳論云病先發於心一日而之肺三日而之肝五日而之脾三日不已死冬夜半夏日中夫病傳者心病先心痛是病先發於心也一日而咳一日始傳之肺也三日脅支痛又三日而傳之肝也五日閉塞不通身痛體重又五日而傳之脾也心肺肝脾相傳則火刑金金刑木木刑土又三日而病不已則死冬夜半水刑火也夏日中亢極自焚也日月運行一寒一暑言冬可以該秋言夏可以該春肺病喘咳三日而脅支滿痛一日身重體痛五日而脹十日不已死冬日入夏日出病傳論云病先發於肺三日而之肝一日而之脾五日而之胃十日不已死冬日入夏日出肺病喘咳病先發於肺也三日而脅支滿痛三日始傳之肝也一日身重體痛又一日而傳之脾也五日而脹又五日而傳之胃也肺肝脾胃相傳則金刑木木刑土又十日而病不已則死冬日入氣不內歸也夏日出氣不外達也肝病頭目眩脅支滿三日體重身痛五日而脹三日腰脊少腹痛脛痠三日不已死冬日入夏早食病傳論云病先發於肝三日而之脾五日而之胃三日而之腎三日不已死冬日入夏早食肝病頭目眩脅支滿病先發於肝也三日體重身痛三日始傳之脾也五日而脹又五日而傳之胃也三日腰脊少腹痛脛痠又三日而傳之腎也肝脾胃腎相傳則木刑土土刑水又三日而病不已則死冬日入申酉屬金金剋木也夏早食寅卯屬木不能生旺也脾病身痛體重一日而脹二日少腹腰脊痛脛痠三日背𦛗筋痛小便閉十日不已死冬人定夏晏食病傳論云病先發於脾一日而之胃二日而之腎三日而之膂膀胱十日不已死冬人定夏晏食脾病身痛體重病先發於脾也一日而脹一日始傳之胃也二日少腹腰脊痛脛痠又二日而傳之腎也三日皆𦛗筋痛小便閉又三日而傳之膀胱也脾胃腎膀胱相傳則土刑其水臟腑皆病又十日而病不已則死冬之人定在戌夏之晏食亦在戌皆土不生旺而死也腎病少腹腰脊痛䯒痠三日背𦛗筋痛小便閉三日腹脹三日兩脅支痛三日不已死冬大晨夏晏晡病傳論云病先發於腎三日而之膂膀胱三日而上之心三日而之小腸三日不已死冬大晨夏晏晡腎病少腹腰脊痛䯒痠病先發於腎也三日皆𦛗筋痛小便閉三日始傳之膀胱也三日腹脹又三日傳之胃而不傳之心也病傳論三日而上之心三日而之小腸乃傳其所勝水剋火也此下三段皆不傳心與小腸而傳脾與胃乃傳所不勝土剋水也我剋剋我皆為逆傳其義一也三日兩脅支痛又三日而傳之肝也腎膀胱胃肝相傳則水受土刑土受木刑又三日而病不已則死冬大晨冬之大晨在辰夏晏晡夏之晏晡在戌晡與餔同皆土製其水而死也胃病脹滿五日少腹腰脊痛䯒痠三日背𦛗筋病小便閉五日身體重六日不已死冬夜半後夏日昳病傳論胃病在脾病下膀胱在腎病下乃臟腑相連此則先臟後腑故胃與膀胱總列於後也病傳論云病先發於胃五日而之腎三日而之膂膀胱五日而上之心二日不已死冬夜半夏日昳昳䖳也胃病脹滿病先發於胃也五日少腹腰脊痛䯒痠五日傳之腎也三日背𦛗筋痛小便閉又三日而傳之膀胱也五日身體重又五日傳之脾而不傳之心也胃腎膀胱與脾相傳皆土刑其水又六日而病不已則死冬夜半後其時在醜夏日映其時在未皆土不生旺而死也病傳論二日死此則六日死蓋偶一為二偶三為六其理一也病傳論夜半死此則夜半後死夫夜半之子一陽初生陽氣不生雖夜半不死而夜半後亦死理亦一也膀胱小便閉五日少腹脹腰脊痛䯒痠一日腹脹一日身體痛二日不已死冬雞鳴夏下晡病傳論云病先發於膀胱五日而之腎一日而之小腸一日而之心二日不已死冬雞鳴夏下晡膀胱病小便閉病先發於膀胱也五日少腹脹腰脊痛䯒痠五日始傳之腎也一日腹脹一日身體痛又一日傳胃又一日傳脾而不傳小腸與心也膀胱與腎胃與脾相傳則腑臟皆病水病土刑又二日而病不已則死冬之雞鳴在醜膀胱腎病土剋水也夏之下晡在申脾胃皆病土不生金也諸病以次是相傳如是者皆有死期不可刺間一臟止及至三四臟者乃可刺也玉機真臟論云五臟相通移皆有次次者木火土金水相生而傳故諸病以次是相傳之正如是者謂如上文之相剋而傳則皆有死期雖治無功故不可刺若間一臟相傳其病當止如肺欲傳肝而腎間之則金生水水生木腎欲傳心而肝間之則水生木木生火肝欲傳脾而心間之則木生火火生土心欲傳肺而脾間之則火生土土生金脾欲傳腎而肺間之則土生金金生水是以其病當止若不止及至三四臟者是以次相傳乃可刺也此一節論病傳相剋之死期必相生而傳始可刺治也
