body:
  text: 卷之三三部九候論第二十篇原名決死生王冰改為三部九候今從之三部者頭面為上部胸膈為中部脅腹為下部也九候者一部之中各有三候三三而為九候也通體形氣太陽主之故兩舉太陽經脈明其死生皆必指而導之乃以為真此三部九候之大法也黃帝問曰余聞九針於夫子衆多博大不可勝數余願聞要道以屬子孫傳之後世著之骨髓藏之肝肺歃血而受不敢妄泄令合天道必有終始上應天光星辰曆紀下副四時五行貴賤更互冬陰夏陽以人應之奈何願聞其方勝平聲數上聲藏如字更平聲此篇論三部九候故帝問余聞九針於夫子而九針之數衆多博大不可勝數今余願聞九候之要道以屬我子孫而使傳之後世其理至微故當著之骨髓藏之肝肺其道至遵故當歃血而受不敢妄泄令合天道者令人身而合於天道也必有終始者自始至終終而復始也合天道則上應天光而星辰可以曆紀有終始則下副四時五行貴賤更互寒往暑來暑往寒來而冬陰夏陽凡此皆天地陰陽之要道以人應之奈何而願聞其方方猶法也岐伯對曰妙乎哉問也此天地之至數伯贊其問言九候要道此天地之至數帝曰願聞天地之至數合於人形血氣通決死生為之奈何願聞天地之至數而合於人形血氣通決死生即上文以人應之之意岐伯曰天地之至數始於一終於九焉一者天二者地三者人因而三之三三者九以應九野故人有三部部有三候以決死生以處百病以調虛實而除邪疾一者數之始九者數之終故始於一終於九焉一者奇也陽也故一者天二者偶也陰也故二者地三者參也參於天地之間故三者人因而三之則天有天地人地有天地人人有天地人故三三者九以至數而合於天地故以應九野九野地裡之合於天度也以至數而合於人身故人有三部一部各有三候可以決死生處百病調虛實而除邪疾此天地之至數合於人形血氣而通決死生也帝曰何謂三部三部何在岐伯曰有下部有中部有上部部各有三候三候者有天有地有人也必指而導之乃以為真陰陽之理從陰而陽自下而上故曰有下部有中部有上部而一部之中各有三候三候者各有天有地有人也必以指循切而按導之乃為部候之真有如後文所云也上部天兩額之動脈上部地兩頰之動脈上部人耳前之動脈是頭面之候有三而為上部也詳見下文中部天手太陰也中部地手陽明也中部人手少陰也是手陰陽之候有三而為中部也詳見下文下部天足厥陰也下部地足少陰也下部人足太陰也故下部之天以候肝地以候腎人以候脾胃之氣是足三陰之候有三而為下部也足厥陰肝也故下部之天以候肝足少陰腎也故下部之地以候腎足太陰脾也故下部之人以候脾而合於胃之氣帝曰中部之候奈何下部既明中部之候奈何岐伯曰亦有天亦有地亦有人天以候肺地以候胸中之氣人以候心手太陰肺也故天以候肺手陽明大腸肺之府也故地以候胸中之氣手少陰心也故人以候心帝曰上部何以候之下部中部既明上部何以候之岐伯曰亦有天亦有地亦有人天以候頭角之氣地以候口齒之氣人以候耳目之氣上部天兩額之動脈故天以候頭角之氣上部地兩頰之動脈故地以候口齒之氣上部人耳前之動脈故人以候耳目之氣由此觀之則頭面為上部胸膈為中部脅腹為下部也三部者各有天各有地各有人三而成天三而成地三而成人三而三之合則為九九分為九野九野為九藏故神藏五形藏四合為九藏五臟已敗其色必夭夭必死矣上文三部者各有天各有地各有人乃三而成天三而成地三而成人一部三候三而三之合則為九以至數而合於天地則九分為九野以天地而合於人形則九野為九藏九藏者肝肺心脾腎藏魂魄神意志故神藏五大腸小腸胃與膀胱藏水穀糟粕故形藏四合神藏形藏而為九藏若五臟之神氣已敗不榮於外則其色必夭夭必死矣此一節論人身三部九候合於天地之至數也帝曰以候奈何上節論三部九候此下但論九候之法故問以候奈何岐伯曰必先度其形之肥瘦以調其氣之虛實實則瀉之虛則補之必先去其血脈而後調之無問其病以平為期度入聲九候主周身之形氣故必先度其形之肥瘦以候其外調其氣之虛實以候其內如實則瀉之如虛則補之必先去其血脈之凝滯而後調補其血脈之不足無問其病之外內要以血脈之平為期此候之之法也帝曰決死生奈何九候何以決死生岐伯曰形盛脈細少氣不足以息者危形瘦脈大胸中多氣者死形氣相得者生三五不調者病三部九候皆相失者死形與脈氣貴相合也如形盛脈細而少氣不足以息者是形體有餘脈氣反衰故危如形瘦脈大而胸中多氣者是形體不足脈氣反強故死是必形氣相得者生若形氣相為參伍而不調者病若三部九候皆相失者死上下左右之脈相應如參舂者病甚上下左右相失不可數者死數上聲夫參伍不調而上下左右之脈相應於指如參舂者則病甚參舂者此上彼下彼上此下不相合地三部九候皆相失而上下左右相失不可數者死不可數者脈體錯亂不可數其至數也中部之候雖獨調與衆臟相失者死中部之候相減者死目內陷者死夫上下左右相應如參舂上下左右相失不可數設中部之候雖獨調究與上下左右之衆臟相失是上下左右不歸於中土故死若上下左右之候有餘而中部之候相減是中土不達於上下左右故亦死夫上下左右歸於中部而五臟之精皆注於目今目內陷則五臟俱絶故死此九候以決死生之法也帝曰何以知病之所在欲決死生必識病因帝故問之岐伯曰察九候獨小者病獨大者病獨疾者病獨遲者病獨熱者病獨寒者病獨陷下者病欲知病之所在須察九候而診視之如察九候其脈有獨小者病有獨大者病其脈有獨疾者病有獨遲者病脈中有獨熱者病有獨寒者病有生陽之氣不能上升獨陷下者病是察九候而有七診之病也以左手足上上去踝五寸按之庶右手足當踝而彈之其應過五寸以上蠕蠕然者不病其應疾中手渾渾然者病中手徐徐然者病其應上不能至五寸彈之不應者死踝蛙去聲彈平聲蠕音蟬踝蠕餘篇同中去聲上文小大疾遲寒熱為病其病猶輕若陷下則生陽之氣不升其病必危故當以兩手而按其足踝其法以左手於病者足上上去踝五寸按之夫足外踝上七寸乃承山之穴屬足太陽今去踝五寸則在承山之下庶右手於病者足上當踝而彈之蓋左手按脈右手導引其脈氣之應過五寸以上而至於承山蠕蠕然動者氣之和也故為不病其脈應手疾而中手渾渾然者乃氣盛太過故病若中手徐徐然者乃氣虛不足故亦病若其應上不能至五寸右手彈之而不應者乃生陽之氣絶滅於下故死是以脫肉身不去者死中部乍疏乍數者死數音朔下同上文言生陽絶滅者死此言生陽之氣不能外達不能上下者皆死是以脫肉乃生陽之氣不能外達身有病而不去者死中部人其氣上通於天下交於地中部之脈乍疏乍數乃生陽之氣不能上下故亦死其脈代而鉤者病在絡脈代者乍疏之象也代而鉤者乍數之象也承上文乍疏乍數而言若其脈代而鉤者乃經絡內外不通故病在絡脈不死也九候之相應也上下若一不得相失一候後則病二候後則病甚三候後則病危所謂後者應不俱也總承上文而言九候之相應也陰陽上下其動若一不得獨小獨大獨疾獨遲而相失也脈有浮中沉三候一候後者浮以候之脈不應指不應則病矣二候後者中以候之脈不應指不應則病甚三候後者沉以候之脈不應指不應則病危申明所謂後者應不俱也謂浮中沉之脈不俱應於指下也凡此皆指而導之之法也察其腑臟以知死生之期九候以決死生以知病之所在故察其腑臟以知死生之期病在腑則生病在臟則死也必先知經脈然後知病脈真臟脈見者勝死見音現夫察腑知病必先知經脈然後知病脈察臟知死須知真臟脈見者至勝克之日而死足太陽氣絶者其足不可屈伸死必戴眼九候主周身形氣而太陽經脈之氣運行於通體故足太陽之氣絶者其足不可屈伸死必戴眼其足不可屈伸者經絶也死必戴眼脈絶也太陽經脈之氣行於通體故論九候而舉太陽經脈以明之此一節論九候以決死生以知病之所在必指而導之乃以為真也帝曰冬陰夏陽奈何帝願聞要道有冬陰夏陽以人應之之語故復問之岐伯曰九候之脈皆沉細懸絶者為陰主冬故以夜半死盛躁喘數者為陽主夏故以日中死冬陰夏陽乃一歲之陰陽夜半日中乃一日之陰陽九候之脈皆沉細懸絶者為陰脈陰主冬故以夜半死若九候之脈皆盛躁喘數者為陽脈陽主夏故以日中死是故寒熱病者以平旦死熱中及熱病者以日中死病風者以日夕死病水者以夜半死其脈乍疏乍數乍遲乍疾者日乘四季死一日之內亦有四時是故寒熱病者肝血內虛為寒為熱也平旦乃寅卯之時肝木主氣肝臟病故以平旦死熱中及熱病者心火燔灼內外皆熱也日中乃巳午之時心火主氣心臟病故以日中死病風者秋金肅殺之氣病於肺也日夕乃申酉之時肺金主氣肺臟病故以日夕死病水者冬令寒水之氣病於腎也夜半乃亥子之時腎水主氣腎臟病故以夜半死脾臟屬土土灌四旁若其脈乍疏乍數乍遲乍疾乃中土內虛不能四布故以一日所乘之四季死辰戌丑未寄王於平旦日中日夕夜半也形肉已脫九候雖調猶死立形定氣命之曰人若形肉已脫坤土內敗諸臟無以資生九候之脈雖調猶之死也七診雖見九候皆從者不死見音現小大疾遲寒熱陷下七診之脈雖見非同土敗故九候皆從者不死所言不死者風氣之病及經月之病似七診之病而非也故言不死若有七診之病其脈候亦敗者死矣必發噦噫小大疾遲寒熱為病猶輕陷下則病非輕故申明所以言不死者或病氣機而為風氣之病或病經脈而為經月之病生陽之氣猶能上升似七診之病而不陷下故曰非也此所以言不死也若有七診之病而正氣陷下其脈候亦敗者死矣生陽不升故必發噦噫甚則為噦土氣敗也微則為噫土氣虛也是知七診之病不陷下者不死陷下則死也必審問其所始病與今之所方病而後各切循其脈視其經絡浮沉以上下逆從循之其脈疾者不病其脈遲者病脈不往來者死皮膚著者死病有新故善診者必審問其所始病與今之所方病然後以證合脈以脈合證而各切循其脈並視其經絡之浮沉以上下逆從而循之其脈疾者經絡有餘故不病其脈遲者經絡內虛故病脈不往來則氣血內絶故死皮膚著者久病肉脫皮膚著者故死帝曰其可治者奈何脈不往來者死皮膚著者死其可治者奈何岐伯曰經病者治其經孫絡病者治其孫絡血其可治者仍當視其經絡之浮沉以上下逆從而循之乃為治法也經居絡內故經病者治其經孫絡居絡外故孫絡病者治其孫絡見血而愈血病身有痛者治其經絡經絡皆主血若經絡之血病而身有痛者治其經絡其病者在奇邪奇邪之脈則繆刺之奇邪者邪不入於經流溢於大絡而生奇病也若其病者在奇邪夫奇邪之脈則當繆刺以治之繆刺者左病刺右右病刺左也留瘦不移節而刺之始為奇邪之病治之不愈邪留日深病在於骨肌肉瘦而邪不移故當取其骨節而刺之上實下虛切而從之索其結絡脈刺出其血以見通之靈樞刺節真邪論曰六經調者謂之不病一經上實下虛而不通者此必有橫絡盛加於大經令之不通視而瀉之此所謂解結也此上實下虛者有橫絡加於經外外為上內為下故上實下虛切而從之者切其經之所組而從治之索其結絡脈者索其絡脈之結也刺出其血以見通之者血出結去見其絡脈之通病可愈也凡此皆視其經絡浮沉以上下逆從而循之之法也瞳子高者太陽不足戴眼者太陽已絶此決死生之要不可不察也手指及手外踝上五指留針經脈血氣本於先天水火之所生故舉太陽以終經脈之義瞳子高者乃太陽水火之精不足於上戴眼者乃太陽生陽之氣已絶於下此以先天水火之精決死生之要以九候而決死生者不可不察也夫病在陰者補陽以治之病在足者補手以治之此陰陽上下相為表裡之義手指及手外踝上五指留針者言足太陽經脈不足當補手太陽以治之手太陽之脈起於小指之端循手外側出踝中故太陽不足當取手指及手指外踝之上乃第五指者留針以補之使手太陽之經脈充溢而交於足太陽乃為治之之法也此一節言九候七診經絡浮沉以決死生以知病之所在亦必指而導之乃以為真也經脈別論第二十一篇經脈始於肺終於肝環轉運行度數有常若驚恐恚勞喘汗生病臟氣獨至失其常度是謂經脈之別知其正則知其別故論飲食輸散之常知其別欲知其正故論陰陽藏象之體而反復明之黃帝問曰人之居處動靜勇怯脈亦為之變乎脈經脈也人之經脈行有常度如居處之動靜用力之勇怯經脈亦為之變乎帝問脈變所以為經脈之別也岐伯對曰凡人之驚恐恚勞動靜皆為變也不但居處之動靜用力之勇怯凡人之驚恐恚勞動靜經脈失常皆為變也是以夜行則喘出於腎淫氣病肺有所墮恐喘出於肝淫氣害脾有所驚恐喘出於肺淫氣傷心度水跌僕喘出於腎與骨平人之氣和於經脈勞動喘急則經脈失常是以夜行勞動氣不閉藏則喘出於腎腎為本肺為末故淫氣病肺失其常矣有所墮恐因墮而內恐也墮傷筋肝主筋故喘出於肝肝木侮脾故淫氣害脾失其常矣有所驚恐因驚內恐也驚恐則氣機內亂肺主氣故喘出於肺肺為心之蓋故淫氣傷心失其常矣度水跌僕則既墮且驚甚於夜行故喘出於腎與骨不能上合於肺淫氣害骨故曰與骨更失其常矣此五臟病喘經脈失常而為經脈之變也當是之時勇者氣行則已怯者則著而為病也故曰診脈之道觀人勇怯骨肉皮膚能知其情以為診法也承上文而言當夜行墮恐驚跌僕之時勇者經脈有餘不能為病故氣行則已怯者經脈受傷則著而為病有如上文所云也夫勇者則已怯者為病故曰診脈之道觀人勇怯骨肉皮膚知其內外淺深之情可以為診法也故飲食飽甚汗出於胃驚而奪精汗出於心持重遠行汗出於腎疾走恐懼汗出於肝搖體勞苦汗出於脾故春秋冬夏四時陰陽生病起於過用此為常也氣機不和則喘經脈不和則汗故舉汗出以明之飲食飽甚則胃絡不和故汗出於胃驚而奪精則心脈不和故汗出於心持重遠行則傷腎主之骨故汗出於腎疾走恐懼則傷肝主之筋故汗出於肝搖體勞苦則傷脾主之肌肉故汗出於脾不言肺者以汗皆出於肺主之皮膚也五臟之氣合於四時故春秋冬夏四時其陰陽不合而生病皆起於過用過用即飽甚奪精遠行恐懼勞苦也此為常也言以此過用為常也過用為常則失經脈之正矣食氣入胃散精於肝淫氣於筋食氣入胃濁氣歸心淫精於脈脈氣流經經氣歸於肺肺朝百脈輸精於皮毛毛脈合精行氣於腑腑精神明留於四臟氣歸於權衡權衡以平氣口成寸以決死生胃者五臟之本六腑之大源也故食氣入胃助東方木氣上達而散精於肝肝則淫氣於筋淫浸灌也食氣入胃助君火神氣運行而濁氣歸心心則淫精於脈肝受精則淫氣心受氣則淫精是食之精即食之氣食之氣即食之精也脈氣留經者無形之脈氣流入於經而合有形也經氣歸於肺者經液之氣肺居其首故歸於肺也肺朝百脈者肺受百脈之朝也輸精於皮毛者皮毛受肺精之輸布也毛脈合精行氣於腑者皮毛百脈合肺輸之精而行氣於六腑也腑精神明留於四臟者六腑之精合心臟之神明留於肺肝脾腎四臟也皮毛百脈六腑五臟之氣外內相應太過不及皆能為病故氣歸於權衡權衡稱物而得其平也故權衡以平則氣口成寸氣口即左右手之脈口寸部是也脈之大會在於寸口故診寸口之脈可以決其死生此食氣入胃行散轉輸而為經脈之正也飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也度入聲上文言食此則言飲飲入於胃與食不同遊溢胃腑之精氣而上輸於脾脾氣散胃腑之精而上歸於肺肺天也脾地也脾氣散精則地氣上升而通調水道矣上歸於肺則天氣下降而下輸膀胱矣夫水道通調則水精四布下輸膀胱則五經並行四布則合天之四時五經則合人之五臟故合於四時五臟四時之陰陽即五臟之陰陽五臟之陰陽即四時之陰陽故陰陽揆度天人合一以為人身經脈之常也此飲入於胃行散轉輸而為經脈之正也此一節論喘汗失常以明經脈之別飲食輸散以明經脈之正知其別必知其正知其正則知其別也太陽臟獨至厥喘虛氣逆是陰不足陽有餘也表裡當俱瀉取之下俞十二經脈合手足之三陽三陰故復論三陽三陰之常變以明之三陽主六腑腑能藏物亦謂之臟太陽臟獨至者陽氣不和於陰太陽臟氣獨至也厥喘者下厥冷上喘急也虛氣逆者言厥而喘為虛氣之上逆也厥喘氣逆是真陰不足太陽臟獨至為陽熱有餘也太陽之氣起於水府通於皮毛故表裡當俱瀉太陽之脈起於足小趾之至陰故當取之下俞俞俞穴也陽明臟獨至是陽氣重並也當瀉陽補陰取之下俞重平聲重並者太陽少陽之氣皆並於陽明也故當瀉陽之有餘補陰之不足陽明之脈起於足大次趾之厲兌故亦當取之下俞少陽臟獨至是厥氣也蹺前卒大取之下俞卒音促少陽者初陽也生於厥陰少陽獨至陽氣未盛是陰厥之氣也初陽不升故蹺前卒大少陽經脈在陽蹺之前也少陽起於足小次趾之竅陰故亦當取之下俞少陽獨至者一陽之過也太陽為三陽陽明為二陽少陽為一陽故申明少陽獨至者乃一陽之過也過猶失也由少陽而推論之則陽明獨至者二陽之過也太陽獨至者三陽之過也太陰臟搏者用心省真五脈氣少胃氣不平三陰也宜治其下俞補陽瀉陰太陰藏搏者足太陰脾臟手太陰肺臟兩臟之氣相搏也用心省真者或病足或病手當用心省察其真肺朝百脈五脈氣少手太陰也脾胃相連胃氣不平足太陰也此氣少不平雖分手足皆屬太陰故曰三陰也病在三陰宜治其下俞陰氣相搏則陽氣不足故當補陽瀉陰一陽獨嘯少陽厥也陽並於上四脈爭張氣歸於腎宜治其經絡瀉陽補陰一陽少陽也少陽三焦也靈樞本輸論云少陽屬腎此論一陽所以言腎也一陽獨嘯上焦之氣獨發於上也上焦獨發則下焦之氣厥逆於下故曰少陽厥也一陽獨嘯則陽並於上少陽厥也則四脈爭張四脈肝脾心肺也爭張不和也四脈爭張由於腎氣之不達故氣歸於腎言脈之爭張歸過於腎也經絡內通五臟故宜治其經絡當瀉上焦之獨嘯補下焦之腎厥故瀉陽補陰一陰至厥陰之治也真虛悁心厥氣留薄發為白汗調食和藥治在下俞一陰厥陰也不曰一陰獨至曰一陰至則陰中有陽故為厥陰之治也真虛猶言真假悁憂也言厥陰治之真假當憂心以審之即太陰之用心省真也厥陰為經脈之終復注於肺厥氣留薄者厥陰之氣留於肝而薄於肺也薄於肺則發為白汗此厥陰之治非厥陰之病但當調食和藥以治其汗治在下俞以固其陰帝曰太陽臟何象承上文臟氣不和而詳明其本然之脈象岐伯曰象三陽而浮也其本然之脈象象三陽而外浮帝曰少陽臟何象岐伯曰象一陽也一陽臟者滑而不實也其本然之脈象象一陽初生滑而不實滑者緊之浮也滑而不實則生陽漸升矣帝曰陽明臟何象岐伯曰象大浮也兩陽合明謂之陽明故其本然之脈象象大而且浮太陰臟搏言伏鼓也帝問三陽之臟象而伯復告以三陰太陰臟搏之脈象乃天地脾肺之氣相為搏激言伏鼓也伏鼓者從下而上從地而天之義也二陰搏至腎沉不浮也二陰搏者心腎相搏也心腎相搏之脈象搏至腎而沉沉不浮也沉不浮者從上而下從心而腎即少陽厥而氣歸於腎之義不言厥陰搏者以厥陰之治也此與上節同義臟氣獨至以明經脈之別臟象本體以明經脈之正知其別必知其正知其正益知其別也藏氣法時論第二十二篇臟氣五臟之氣也法時法天之四時也天行四時地生百物人備五臟皆合五行天有一歲之五行有十干之五行有一日之五行地有五穀五果五畜五菜百藥各具五味各有五行人之五臟五行合於天地合天則有五色六氣之上承合地則有五苦五欲之下應故曰臟氣法時也黃帝問曰合人形以法四時五行而治何如而從何如而逆得失之意願聞其事合人形通體經脈外而皮毛內而腑臟以法天地之四時五行而診治之何如則法天地而從何如則不法天地而逆反逆為從則得反從為逆則失願聞從逆得失之事而探諸岐伯也岐伯對曰五行者金木水火土也更貴更賤以知死生以決成敗而定五臟之氣間甚之時死生之期也更平聲間去聲下間甚同四時之氣不外五行五行者金木水火土也貴者水旺於春火旺於夏賤者水敗於秋火滅於冬更貴更賤者生化疊乘寒暑往來也以更貴更賤之理以知病之死生以決治之成敗而五臟之旺氣可定病之間甚死生之期皆可定也帝曰願卒聞之卒猶盡也岐伯曰肝主春足厥陰少陽主治其日甲乙肝苦急急食甘以緩之肝心脾肺腎人之五臟也於臟為肝於時為春故肝主春足厥陰乙木也足少陽甲木也故春時而足厥陰少陽主治其日甲乙肝主春木有生陽漸長之機若急而不和肝所苦也治之之法當急食甘味以緩之心主夏手少陰太陽主治其日丙丁心苦緩急食酸以收之手少陰丁火也手太陽丙火也故夏時而手少陰太陽主治其日丙丁心主夏火有炎上迅速之機若緩而不速心所苦也治之之法當急食酸味以收之酸收者助心氣而使之上炎也脾主長夏足太陰陽明主治其日戊己脾苦濕急食苦以燥之足太陰己土也足陽明戊土也故長夏而足太陰陽明主治其日戊己脾屬陰土籍陽明燥氣以相資若濕而不燥脾所苦也治之之法當急食苦味以燥之苦為火味故能燥也肺主秋手太陰陽明主治其日庚辛肺苦氣上逆急食苦以泄之手太陰辛金也手陽明庚金也故秋時而手太陰陽明主治其日庚辛肺主秋金有收斂清肅之機若氣上逆肺所苦也治之之法當急食苦味以泄之苦寒注下故能泄也上文言苦燥此言苦泄蓋稟君火之氣而味苦則燥稟寒水之氣而味苦則泄於物性之運氣推之則得矣腎主冬足少陰太陽主治其日壬癸腎苦燥急食辛以潤之開腠理致津液通氣也足少陰癸水也足太陽壬水也故冬時而足少陰太陽主治其日壬癸水王於冬腎氣主之燥而不潤腎所苦也治之之法當急食辛味以潤之夫辛主發散何以能潤以辛能開腠理致在內之津液而通氣於外在下之津液而通氣於上故能潤也病在肝愈於夏夏不愈甚於秋秋不死持於冬起於春禁當風肝木也夏火也火為木之子故病在肝愈於夏子氣王而病不愈至秋則金剋木而病甚矣秋不死持於冬水生木也至春則木氣復王故起於春風氣通於肝故禁當風此藏氣法一歲之四時也肝病者愈在丙丁丙丁不愈加於庚辛庚辛不死持於壬癸起於甲乙肝病愈在丙丁即上文病在肝愈於夏也丙丁不愈加於庚辛即上文夏不愈甚於秋也庚辛不死持於壬癸即上文秋不死持於冬也起於甲乙即上文起於春也此藏氣法十干之四時也肝病者平旦慧下晡甚夜半靜慧爽慧也靜安靜也平旦乃木王之時平旦慧即上文起於春起於甲乙之意也下晡乃金王之時金剋木故下晡甚即上文甚於秋加於庚辛之意也夜半乃水王之時水生木故夜半靜即上文持於冬持於壬癸之意也此藏氣法一日之四時也肝欲散急食辛以散之用辛補之酸瀉之肝病則木鬱故肝欲散治之之法當急食辛味以散之辛主散也肝氣鬱而欲散散之即所以補之故用辛補之夫辛散為補則酸收為瀉故酸瀉之此藏氣法地之五味也病在心愈在長夏長夏不愈甚於冬冬不死持於春起於夏禁溫食熱衣心火也長夏土也土為火之子故病在心愈在長夏子氣王而病不愈至冬則水剋火而病甚矣冬不死持於春木生火也至夏則火氣復王故起於夏火氣通於心故禁溫食熱衣此藏氣法一歲之四時也心病者愈在戊己戊己不愈加於壬癸壬癸不死持於甲乙起於丙丁心病愈在戊己即病在心愈在長夏也戊己不愈加於壬癸即長夏不愈甚於冬也壬癸不死持於甲乙即冬不死持於春也起於丙丁即起於夏也此藏氣法十干之四時也心病者日中慧夜半甚平旦靜日中乃火王之時故日中慧即起於夏起於丙丁也夜半乃水王之時水剋火故夜半甚即甚於冬加於壬癸也平旦乃木王之時木生火故平旦靜即持於春持於甲乙也此臟氣法一日之四時也心欲軟急食鹹以耎之用鹹補之甘瀉之心病則火炎故心欲耎治之之法當急食鹹味以耎之咸能耎堅也心氣炎而欲耎耎之即所以補之故用鹹補之咸耎為補則甘緩為瀉故甘瀉之此藏氣法地之五味也病在脾愈在秋秋不愈甚於春春不死持於夏起於長夏禁濕食飽食濕地濡衣濕食舊本誤溫食今改濕食水濕也濡衣濡潤之衣也脾土也秋金也金為土之子故病在脾愈在秋子氣王而病不愈至春則木剋土而病甚矣春不死持於夏火生土也至長夏則土氣復王故起於長夏濕氣通於脾故禁濕食飽食濕地濡衣此藏氣法一歲之四時也脾病者愈在庚辛庚辛不愈加於甲乙甲乙不死持於丙丁起於戊己脾病愈在庚辛即病在脾愈在秋也庚辛不愈加於甲乙即春不死持於夏也起於戊己即起於長夏也此藏氣法十干之四時也脾病者日昳慧日出甚下晡靜昳音迪昳昃也日昳乃午後未分土王之時故曰昳慧即起於長夏起於戊己也日出乃木王之時木剋土故日出甚即甚於春加於甲乙下晡乃申酉金王之時土生金故下晡靜以肝心為例當日中火王而靜今下晡靜者以明子母氣王皆能靜也此藏氣法一日之四時也脾欲緩急食甘以緩之用苦瀉之甘補之脾病則土不柔和故脾欲緩治之之法當急食甘味以緩之甘能緩中也脾氣欲緩苦泄則瀉故用苦瀉之苦泄為瀉則甘緩為補故甘補之此藏氣法地之五味也病在肺愈在冬冬不愈甚於夏夏不死持於長夏起於秋禁寒飲食寒衣肺金也冬水也水為金之子故病在肺愈在冬子氣王而病不愈至夏則火剋金而病甚矣夏不死持於長夏土生金也至秋而金氣復王故起於秋飲冷形寒則傷肺故禁寒飲食寒衣此藏氣法一歲之四時也肺病者愈在壬癸壬癸不愈加於丙丁丙丁不死持於戊己起於庚辛肺病愈在壬癸即病在肺愈在冬也壬癸不愈加於丙丁即冬不愈甚於夏也丙丁不死持於戊己即不死持於長夏也起於庚辛即起於秋也此藏氣法十干之四時也肺病者下晡慧日中甚夜半靜下晡乃金王之時故下晡慧即起於秋起於庚辛也日中乃火王之時火剋金故日中甚即甚於夏加於丙丁也夜半乃水王之時金生水故夜半靜亦子氣王而安靜也此藏氣法一日之四時也肺欲收急食酸以收之用酸補之辛瀉之肺病則氣散故肺欲收治之之法當急食酸味以收之酸主收也肺氣散而欲收收之即所以補之故用酸補之酸收為補則辛散為瀉故辛瀉之此藏氣法地之五味也病在腎愈在春春不愈甚於長夏長夏之死持於秋起於冬禁犯淬㶼熱食溫炙衣淬音翠餘篇同㶼音衰淬㶼熱食火燔之食也溫炙衣火焙之衣也腎水也春木也木為水之子故病在腎愈在春子氣王而病不愈至長夏則土剋水而病甚矣長夏不死持於秋金生水也至冬則水氣乘王故起於冬腎為水臟燥而不潤腎所苦也故禁犯焠㶼熱食溫炙衣此藏氣法一歲之四時也腎病者愈在甲乙甲乙不愈加於戊己戊己不死持於庚辛起於壬癸腎病愈在甲乙即病在腎愈在春也甲乙不愈加於戊己即春不愈甚於長夏也戊己不死持於庚辛即長夏不死持於秋也起於壬癸即起於冬也此藏氣法十干之四時也腎病者夜半慧四季甚下晡靜夜半乃水王之時故夜半慧即起於冬起於壬癸也四季乃辰戌丑未土王之時土剋水故四季甚即甚於長夏加於戊己也下晡乃金王之時金生水故下晡靜即持於秋持於庚辛也此藏氣法一日之四時也腎欲堅急食苦以堅之用苦補之咸瀉之腎病則水汛故腎欲堅治之之法當急食苦味以堅之苦為火味故能堅也腎濡欲堅堅之即所以補之故用苦補之苦堅為補則咸耎為瀉故咸瀉之此藏氣法地之五味也夫邪氣之客於身也以勝相加至其所生而愈至其所不勝而甚至於所生而持自得其位而起必先定五臟之脈乃可言間甚之時死生之期也總結上文之義上文病肝心脾肺腎皆邪氣之客於身故曰夫邪氣之客於身也乃以勝相加如燥金傷肝寒水凌心風木乘脾火熱爍肺濡濕侵腎是也上文病五臟而能愈皆至其所生而愈也病五臟而致甚皆至其所不勝而甚也五臟病甚而能持皆至於所生而持也持而能起皆自得其位而起也決其間甚死生必診脈而知之故必先定五臟之脈乃可言其間甚之時以及死生之期有如上文之所云爾此一節言五臟之氣法天之四時地之五味也肝病者兩脅下痛引少腹令人善怒虛則目䀮䀮無所見耳無所聞善恐如人將捕之取其經厥陰與少陽氣逆則頭痛耳聾不聰頰腫取血者䀮音荒餘篇同厥陰肝脈布脅肋抵小腹故肝病者兩脅下痛引少腹怒者肝之情肝病故令人善怒若肝氣內虛不能上升則目䀮䀮無所見耳無所聞生氣不達則善恐如人將捕之而有驚駭之狀取其厥陰與少陽之經而治之蓋少陽者厥陰中見之氣也若肝氣上逆則頭痛頰腫耳聾不聰當取厥陰少陽之經而出其血者心病者胸中痛膺背肩甲間痛兩臂內痛虛則胸腹大脅下與腰相引而痛取其經少陰太陽舌下血者其變病刺郤中血者甲胛同此論心病而言心包之經脈以明心不受病也靈樞經脈論云心主包絡之脈起於胸中循胸出脅故心病者胸中痛脅支滿脅下痛又云循臑內行太陰少陰之間太陰肺也少陰心也故膺背痛而病心肩胛痛而病肺又云入肘中下臂故兩臂內痛心火內虛土無所生則腹大連胸故虛則胸腹大經脈不能循胸出脅循脅出背故脅下與腰相引而痛取其少陰太陽之經而治之少陰者心也心氣和則心包亦和太陽者心為陽中之太陽也舌下血者取心之開竅而刺出其血也其變病者言始病心包之經脈今變病太陽之孫絡當刺郤中而取其血者郤中足太陽之委中乃膕中央之合穴也脾病者身重善肌肉痿足不收行善瘈腳下痛虛則腹滿腸鳴飧泄食不化取其經太陰陽明少陰血者周身肌肉脾土主之故脾病者身重善肌肉痿痿猶痹也脾足太陰之經脈起於足大趾循經上膝脾病故足不收行善瘈腳下痛脾土內虛不能四布則腹滿土氣虛寒則腸鳴飧泄食不化取其經脈而治之則在太陰陽明兼及少陰者火土相生之火血者通其經脈也肺病者喘咳逆氣肩背痛汗出尻陰股膝髀腨䯒足皆痛虛則少氣不能報息耳聾嗌乾取其經太陰足太陽之外厥陰內血者尻考平聲餘篇仿此肺氣不利則喘咳逆氣肺之經脈不和則肩背痛汗出太陽合肺行於皮毛太陽經脈從腰脊貫臀入膕至端抵足今太陽之氣不和於肺故尻陰股膝髀腨䯒足皆痛厥陰之脈貫膈注肺今肝氣內虛不能貫膈注肺故少氣不能報息息呼吸也從厥陰而出於肺故曰報也肝木之氣不能上升則耳聾嗌乾取其經脈而治之則在太陰太陰者肺也又曰足太陽之外厥陰內者言尻陰股膝髀腨䯒足皆痛乃病足太陽之經脈於外少氣不能報息耳聾嗌乾乃病足厥陰之經脈於內在外者治其外在內者治其內血者通其經脈也腎病者腹大脛腫喘咳身重寢汗出憎風虛則胸中痛大腹小腹痛清厥意不樂取其經少陰太陽血者腎為水臟水逆於下故腹大脛腫腎為生氣之原奔氣上迫故喘咳生陽之氣不周於身故身重寢則陽氣歸陰陰虛故汗出汗出故憎風腎氣虛微心腎不交則胸中痛胸者心之宮城也大腹屬坤土小腹主生陽生陽氣虛不溫其土故大腹小腹皆痛陰寒盛陽氣虛故清厥清厥微冷厥逆也心有所憶謂之意心腎不和故意不樂取其經脈而治之則在少陰太陽少陰者腎也太陽者心為陽中之太陽也血者通其經脈也此一節言五臟病氣在於經脈當取三陰三陽之經脈而治之肝色青宜食甘粳米牛肉棗葵皆甘此舉五穀五畜五果五菜以明上文五苦之意肝主春其色青肝苦急急食甘以緩之故宜食甘稽其谷畜果菜而合於甘之味則粳米牛肉棗葵皆甘心色赤宜食酸小豆犬肉李韭皆酸心主夏其色赤心苦緩急食酸以收之故宜食酸稽其谷畜果菜而合於酸之味則小豆犬肉李韭皆酸肺色白宜食苦麥羊肉杏薤皆苦肺主秋其色白肺苦氣上逆急食苦以瀉之故宜食苦稽其谷畜果菜而合於苦之味則麥羊肉杏薤皆苦脾色黃宜食鹹大豆豕肉栗藿皆咸脾主長夏其色黃脾苦濕急食苦以燥之夫脾苦濕亦苦燥若脾苦燥則宜食鹹稽其谷畜果菜而合於咸之味則大豆豕肉栗藿皆咸諸臟皆合上文脾臟不合者以上文兩言苦味一言苦以燥之一言苦以泄之蓋苦味主泄未必能燥故此則曰宜食鹹咸以泄之也宜食鹹必脾臟之苦燥矣脾臟屬土貴得其平既苦濕亦苦燥故彼此更易其辭聖人立教之旨貴學者之能悟也腎色黑宜食辛黃黍雞肉桃蔥皆辛腎主冬其色黑腎苦燥急食辛以潤之故宜食辛稽其谷畜果菜而合於辛之味則黃黍雞肉桃蔥皆辛辛散酸收甘緩苦堅咸耎毒藥攻邪此舉藥之辛散酸收甘緩苦堅咸耎以明上文五欲之意肝欲散急食辛以散之故辛散肺欲收急食酸以收之故酸收脾欲緩急食甘以緩之故甘緩腎欲堅急食苦以堅之故苦堅心欲耎急食鹹以耎之故咸耎夫谷畜果菜皆有辛酸甘苦鹹之味而散收緩堅耎莫若毒藥其力乃倍以明上文諸急食者急以毒藥攻邪得其平也五穀為養五果為助五畜為益五菜為充氣味合而服之以補精益氣五穀所以養五臟者也故五穀為養五果所以助五臟者也故五果為助五畜所以益五臟者也故五畜為益五菜所以充五臟者也故五菜為充谷果畜菜有氣有味味入口氣歸鼻氣味合而服之可以補有形之精益無形之氣而不同於毒藥也此五者有辛酸甘苦鹹各有所利或散或收或緩或急或堅或耎四時五臟病隨五味所宜也此谷果畜菜藥五者皆有辛酸甘苦鹹之味五味合五臟故各有所利利猶宜也或肝欲散或肺欲收或脾欲緩或肝苦急或腎欲堅或心欲耎此散收緩堅耎五臟之所欲也五臟各有所欲各有所苦或急者肝苦急也兼言或急則心或苦緩脾或苦濕腎或苦燥肺或苦氣上逆皆在其中天行四時人具五臟地生五味四時五臟之病隨五味所宜以為臟氣法時也此一節言谷畜果菜藥各有五味之五行以明藏氣法天之四時更法地之五味也宣明五氣篇第二十三篇上篇論五臟之氣上法天時此岐伯承上篇之義宣明五氣蓋天地之數不外於五人身形藏總屬於氣故舉五味所入五氣所病五精所並五臟所惡五臟化液五味所禁五病所發五邪所亂五邪所見五臟所藏五臟所主五勞所傷五脈應象而宣明五氣也五味所入酸入肝辛入肺苦入心鹹入腎甘入脾是謂五入地之五味養人五臟五味入五臟是謂五入五氣所病心為噫肺為咳肝為語脾為吞腎為欠為嚏胃為氣逆為噦為恐大腸小腸為泄下焦溢為水膀胱不利為癃不約為遺溺膽為怒是謂五病溺鳥去聲五氣所病者五臟本氣為病也病氣在心則為噫噫微噯也病氣在肺則為咳咳氣上逆也病氣在肺則為語語多言也病氣在脾則為吞吞舌本不和也病氣在腎則為欠為嚏欠者陰陽相引嚏者陰出於陽也此五臟本氣不和而為病也五臟不和則六腑不利故胃病則為氣逆不能上出於肺則為噦噦厄也不能下交於腎則為恐恐戊癸不合也大腸小腸病則為泄泄水穀下注也下焦病不能決瀆則汛溢而為水膀胱病氣滯不利則為癃氣虛不約則為遺溺膽病鬱而不舒則為怒此五氣為病及於六腑凡此是謂五病五精所並精氣並於心則喜並於肺則悲並於肝則憂並於脾則畏並於腎則恐是謂五並虛而相併者也五精所並者臟虛而精氣並之也精者陰精氣者陽氣精氣並於心則心受所並而為喜喜心之情也並於肺則肺受所並而為悲悲肺之情也並於肝則肝受所並而為憂肝主怒今曰憂者上文膽為怒故此肝為憂怒為有餘憂為不足也並於脾則脾受所並而為畏思慮者脾之情今曰畏者慮之至也並於腎則腎受所並而為恐恐腎之情也凡此是謂五並申明此之五並乃虛而相併者也是知精氣並乃精氣之不足矣五臟所惡心惡熱肺惡寒肝惡風脾惡濕腎惡燥是謂五惡惡去聲熱氣傷心故心惡熱寒氣傷肺故肺惡寒風氣傷肝故肝惡風濕氣傷脾故脾惡濕燥氣傷腎故腎惡燥凡此是謂五惡五臟化液心為汗肺為涕肝為淚脾為涎腎為唾是謂五液化液者水穀入口津液各走其道五臟受水穀之精淖注於竅化而為液也汗乃血液心所主也故心為汗涕出於鼻肺所主也故肺為涕淚出於目肝所主也故肝為淚涎出於口脾所主也故脾為涎唾屬水精腎所主也故腎為唾凡此是謂五液靈樞根結論云少陰根於湧泉結於廉泉廉泉舌下竅也是腎為水臟從下而上液雖有五腎實主之是以五液皆咸咸水味也五味所禁辛走氣氣病無多食辛咸走血血病無多食鹹苦走骨骨病無多食苦甘走肉肉病無多食甘酸走筋筋病無多食酸是謂五禁無令多食五味各有偏勝故禁多食味之辛者則走氣氣病肺虛無多食也味之咸者則走血血病心虛無多食也味之苦者則走骨骨病腎虛無多食也味之甘者則走肉肉病脾虛無多食也味之酸者則走筋筋病肝虛無多食也凡此是謂五禁申明禁者非禁絶之謂乃無令多食也五病所發陰病發於骨陽病發於血陰病發於肉陽病發於冬陰病發於夏是謂五發五臟陰陽之病各有所發金匱真言論云陰中之陰腎也陽中之陽心也陰中之至陰脾也陰中之陽肝也陽中之陰肺也腎為陰其主在骨故腎陰之病發於骨心為陽其主在血故心陽之病發於血脾為陰其主在肉故脾陰之病發於肉肝為陽於時為春冬失其藏春無以生故肝陽之病發於冬肺為陰於時為秋夏失其長秋無以收故肺陰之病發於夏凡此陰病陽病各有所發是謂五發五邪所亂邪入於陽則狂邪入於陰則痹搏陽則為癲疾搏陰則為喑陽入之陰則靜陰出之陽則怒是謂五亂喑音因餘篇同此舉五邪所亂以足上文之義上文陽病發於血心也陽病發於冬肝也故正為邪亂而入於心肝之陽分則狂上文陰病發於骨腎也陰病發於肉脾也陰病發於夏肺也故以邪亂正而入於腎脾肺之陰分則痹痹者邪留皮肉與骨而為痹痛也搏陽則為癲疾所以足陽狂之意言邪入於陽則狂亦有邪搏於陽而為癲疾者矣搏陰則為喑所以足陰痹之意言邪入於陰則痹亦有邪搏於陰而為喑啞者矣夫搏者陰陽相搏也搏陰為喑乃陽入之陰則靜而為喑也搏陽為癲疾乃出之陽則怒而為癲疾也凡此皆五臟陰陽為邪所亂是謂五亂以明五病所發乃亂而始發或發而更亂也五邪所見春得秋脈夏得冬脈長夏得春脈秋得夏脈冬得長夏脈名曰陰出之陽病善怒不治是謂五邪皆同命死不治見音現五邪所見者五臟受邪見於脈也春得秋脈金剋木也夏得冬脈水剋火也長夏得春脈木剋土也秋得夏脈火剋金也冬得長夏脈土剋水也名曰陰出之陽言邪病五臟之陰出於經脈之陽也病善怒言春得秋脈肝木受刑故善怒也當亟治之若不治則邪干五臟是謂五邪皆同言五臟受邪同於木受金刑之義命死不治言五臟受刑其人雖存其命已死是不治也五臟所藏心藏神肺藏魄肝藏魂脾藏意腎藏志是謂五臟所藏除五臟余藏如字言心肺肝脾腎藏神魄魂意志是謂五臟而各有所藏也五臟所主心主脈肺主皮肝主筋脾主肉腎主骨是謂五主言心肺肝脾腎主脈皮筋骨肉是五臟外合而謂之五主也五勞所傷久視傷血久臥傷氣久坐傷肉久立傷骨久行傷筋是謂五勞所傷言久視久臥久坐久立久行為五勞勞則五臟因之以傷心主血久視則傷之肺主氣久臥則傷之脾主肉久坐則傷之腎主骨久立則傷之肝主筋久行則傷之凡此是謂五勞所傷五脈應象肝脈弦心脈鉤脾脈代肺脈毛腎脈石是謂五臟之脈言肝心脾肺腎五臟之脈應弦鉤代毛石四時五行之脈象也天地之道不外五行人身形藏不離乎氣承臟氣法時而宣明五氣者如此血氣形志篇第二十四篇人之有身不離血氣人之應物不離形志形者血氣之立乎外者也志者血氣之存乎內者也血氣有多少形志有苦樂天人有常數灸刺有所宜此岐伯繼上篇宣明五氣而更為血氣形志之説也夫人之常數太陽常多血少氣少陽常少血多氣陽明常多氣多血人之常數後天之數也後天之數從太而少由三而一太陽三陽也少陽一陽也陽明太少兩陽相合而成也太陽常多血少氣者陽至於太陽氣已極陽極則陰生血陰也陰生故常多血氣陽也陽極故常少氣少陽常少血多氣者陽始於少陽氣方生陰氣未盛故常少血陽氣方生莫可限量故常多氣陽明常多氣多血者有少陽之多氣有太陽之多血以徵太少相合成陽明也此言人之常數也少陰常少血多氣厥陰常多血少氣太陰常多氣少血此天之常數先天之數自少而太由一而三也言少陰自少而太也次言厥陰終言太陰由一而三先少陰陰未盛故常少血少陰為生氣之源故常多氣厥陰肝脈下合衝任故常多血厥陰為一陰而生微陽故常少氣太陰為三陰陰極則陽生故常多氣陰極當衰故常少血夫由一而三自少而太此天之常數也人之常數而論三陽陽豫之正也天之常數而論三陰陰為之主也知天人陰陽之常數則知人之血氣矣足太陽與少陰為表裡少陽與厥陰為表裡陽明與太陰為表裡是為足陰陽也手太陽與少陰為表裡少陽與心主為表裡陽明與太陰為表裡是為手之陰陽也三陽三陰陰陽之六氣也以陰陽之六氣合人身十二經脈則有足之三陽三陰手之三陽三陰陽主表陰主裡知表陽之所在即知里陰之所在故足太陽與少陰為表裡少陽與厥陰為表裡陽明與太陰為表裡是為足陰陽之六氣也手太陽與少陰為表裡少陽與心主為表裡陽明與太陰為表裡是為手陰陽之六氣也此手足三陰三陽合人身十二經脈之血氣則知血氣之陰陽矣今知手足陰陽所苦凡治病必先去其血乃去其所苦伺之所欲然後瀉有餘補不足苦猶病也承上文手足陰陽表裡之義而言今知手足陰陽之所病血有形屬陰氣無形屬陽有形陰血必先去無形陽氣勿先傷故凡治病必先去其血去其血乃去其所苦之病也伺之所欲窺伺其欲散欲軟欲緩欲收欲堅之意也如是則知某經有餘某經不足然後瀉有餘補不足瀉有餘補不足即九候已備後乃存針之意欲知背俞先度其兩乳間中折之更以他草度去半巳即以兩隅相拄也乃舉以度其背令其一隅居上齊脊大椎兩隅在下當其下隅者肺之俞也復下一度心之俞也復下一度左角肝之俞也右角脾之俞也復下一度腎之俞也是謂五臟之俞灸刺之度也前三度音鐸後四度如字五臟之俞皆在於背欲知背俞先以草度其兩乳間而對中折之更以他草亦度兩乳間而去半已即以其草左右兩隅相拄也兩隅猶言兩邊拄之乃舉以度其背背背俞也其法令其一隅橫居於上齊脊大椎兩隅相拄則兩隅在下當其下隅乃左右肺之俞也復下一度左右心之俞也復下一度左角則肝之俞也右角則脾之俞也復下一度左右腎之俞也此肺心肝脾腎是謂五臟之俞而為灸刺之度也形樂志苦病生於脈治之以灸刺上文論陰陽血氣而有灸刺之度此下言形志苦樂而有灸刺之度也形見乎外志存乎內形樂則身體安和志苦則內擾經脈故病生於脈脈者心之所主也治之以灸刺者或灸以補之或刺以通之形樂志樂病生於肉治之以針石形樂志樂則過於安逸無有動作故病生於肉肉者脾之所主也治之以針石者或針以刺之或石以砭之形苦志樂病生於筋治之以尉引形苦志樂則情逸身勞故病生於筋筋者肝之所主也治之以尉引使血脈榮養於筋也形苦志苦病生於咽嗌治之以甘藥咽主地氣屬陰嗌主天氣屬陽形志皆苦則陰陽並竭故病生於咽嗌咽納水穀胃所主也嗌司呼吸肺所主也咽嗌皆病肺胃咸虛故當治以甘藥靈樞終始節云陰陽俱不足補陽則陰竭瀉陰則陽脫如是者可將以甘藥不可飲以至劑如是者勿灸即此義也形數驚恐經絡不通病生於不仁治之以按摩醪藥數音朔驚恐因驚致恐志之苦也經絡不通勞其經絡形之苦也形數驚恐經絡不通即上文形苦志苦也病生於不仁者恐傷骨腎主骨骨屬屈伸不利故不仁也治之按摩以通其經絡醪藥以資其腎精是謂五形志也總結上文而言形志苦樂病生於脈病生於肉病生於筋病生於咽嗌病生於不仁是謂五臟苦樂之形志也刺陽明出血氣刺太陽出血惡氣刺少陽出氣惡血刺太陽出氣惡血刺少陰出氣惡血刺厥陰出血惡氣也惡去聲此因三陰三陽血氣多少而為刺法也陽明常多血多氣故刺陽明出血氣太陽常多血少氣故刺太陽出血惡氣少陽常少血多氣故刺少陽出氣惡血太陰常多氣少血故刺太陰出氣惡血少陰常少血多氣故刺少陰出氣惡血厥陰常多血少氣故刺厥陰出血惡氣也此血氣有多少形志有苦樂天人有常數灸刺有常度而申明上篇未盡之義者如此寶命全形論第二十五篇寶命全形者寶天命以全人形也形之疾病則命失其寶形不能全若欲全形必先治神治神所以寶命寶命則能全形矣黃帝問曰天覆地載萬物悉備莫貴於人人以天地之氣生四時之法成君王衆蔗盡欲全形形之疾病莫知其情留淫日深著於骨髓心思慮之余欲針除其疾病為之奈何為去聲萬物皆在天地覆在之中惟人超乎萬物之上參天兩地故莫貴焉然推人之所以生本於天地之氣生人之所以成同於四時之法成今君王之貴衆庶之賤盡欲全形卒不能者以形之疾病莫知其情不知其情則病留淫於肌肉經脈之內日益深重而且著於骨髓病益深則處治益難故心思慮之欲以針刺之法除其疾病疾病除則形可全命可寶為之奈何探其治也岐伯對曰夫鹽之味鹹者其氣令器津泄弦絶者其音嘶敗木敷者其葉發病深者其聲噦嘶音西形之疾病則形不能全凡物皆然不但於人故夫鹽之味鹹者鹽質多潤如以鹽著物則其氣令物器之津而外泄矣絃音安和若弦將絶者則音聲不和而嘶敗矣木體堅貞若木敷散者則枝葉不固而發落矣此物病而形不全何況於人若人病深者則三焦不和土氣不達故其聲噦噦厄也厄者氣機內逆土將敗也人有此三者是謂壞府毒藥無治短針無取此皆絶皮傷肉血氣爭黑承上文而言若人有此津泄音嘶葉發三者之病是謂破腑腑壞則毒藥無治短針無取雖欲針除其疾病為不可得故曰此皆絶皮傷肉血氣爭黑蓋木之滋灌只在於皮木敷葉發是絶皮矣弦之鏗鳴純本乎肉弦絶音嘶是傷肉矣鹽之味鹹其色主黑器津外泄是血氣爭黑矣人之壞腑猶之絶皮傷肉血氣爭黑故曰皆也此一節言物壞而形不全不能寶命全形雖欲治之不能治也帝曰余念其痛心為之亂惑反甚其病不可更代百姓聞之以為殘賊為之奈何三為俱去聲更平聲下同帝聞岐伯之言有痛於心故曰余念其痛心為之亂惑反甚病而能治可以更代今毒藥無治短針無取是其病不可更代百姓聞之以為殘忍賊害然余必欲治之為之奈何岐伯曰夫人生於地懸命於天天地合氣命之曰人天施地生故夫人生於地懸命於天人稟天地陰陽交合之氣而生成故天地合氣命之曰人人能應四時者天地為之父母知萬物者謂之天子天地之氣徵於四時人能應四時春夏秋冬之氣者則天地為人之父母四時之氣徵於萬物能知萬物生長收藏之理者則人謂之天之子天有陰陽人有十二節天有寒暑人有虛實天有陰陽人有十二節者人身手足十二骨節之氣開闔運行一如天晝開夜闔之陰陽也天有寒暑人有虛實者人身十二節氣有有餘不足之虛實一如天之寒冷為虛暑熱為實也能經天地陰陽之化者不失四時知十二節之理者聖智不能欺也能存八動之變五勝更立能達虛實之數者獨出獨入胠吟至微秋毫在目日月運行一寒一暑能經理天地陰陽之氣化者則不失四時之氣化人有十二節時有十二節能知十二節之理者則天人合一雖聖智不能欺也能存心於八方風動之變則春勝長夏長夏勝冬冬勝夏夏勝秋秋勝春五勝更立之變亦能知之五勝更立虛實存焉能達虛實之數者則衆人不知我獨知之故獨出獨入而遊行於天地之間呿吟之下得其至微秋毫纖悉備在於目能如是也可以寶命全形矣帝曰人生有形不離陰陽天地合氣別為九野分為四時月有大小日有短長萬物並至不可勝量虛實呿吟敢問其方別音逼勝平聲下同量平聲承岐伯之言而復問也伯云天有陰陽而人生有形不離陰陽又云天地合氣命之曰人而天地合氣各有分別在地則別為九野在天則分為四時由四時而計其月則月有大小由月而計其日則日有短長又云知萬物者謂之天子今萬物並至不可勝量又云達虛實之數者呿吟至微今虛實呿吟敢問其方岐伯曰木得金而伐火得水而滅土得木而達金得火而缺水得土而絶萬物盡然不可勝竭陰陽萬物不外五行制化之道金能制木故木得金而伐水能制火故火得水而滅木能制土始焉木王既則木之子火亦王火王生土故土得木而達火能制金故金得火而缺土能制水故水得土而絶萬物皆有制克之道故萬物盡然制而復生無有窮盡故不可勝竭不可勝竭所以申明土得木達之義故針有懸布天下者五黔首共餘食莫知之也一曰治神二曰知養身三曰知毒藥為真四曰制砭石小大五曰知腑臟血氣之診五法俱立各有所先共供同上古之世以針治病故針有懸布天下者其法有五黔首黑髮之民於力田納稅之外僅供餘食於家而莫知之也一曰治神以我之神合彼之神得神者昌故治神為先二曰知養身一身血氣得其所養則運行不息故以養身為次三曰知毒藥為真毒藥攻邪知之不真則用之不當故必知毒藥為真四曰制砭石小大上古之世冶鑄未興砭石為針則小大之制宜審也五曰知腑臟血氣之診人之有形不外腑臟血氣不明其診無以行針故必知腑臟血氣之診凡此五法俱布立於天下各有所宜者而先施之此用針可以全形全形可以寶命也今末世之制也虛者實之滿者泄之此皆衆工所其知也若夫法天則地隨應而動和之者若響隨之者若影道無鬼神獨來獨往和去聲制制針之小大也今末世之制但知治形故虛者實之滿者泄之此衆土所共知也若夫治神則上法天下則地可以隨應而動隨應而動則和之者若響隨之者若影此治神之道無有鬼神介紹於其間而獨來獨往此舉針刺之神以明萬物虛實之數呿吟至微之方也帝曰願聞其道願聞治神之道岐伯曰凡刺之真必先治神五臟已定九候已備後乃存針一曰治神故凡刺之真必先治神五臟已定九候已備所以斂神也後乃存針神先針後也衆脈不見衆凶弗聞外內相得無以形先神先針後通其經脈而衆脈若不見神先針後除其凶疾而衆凶若弗聞合外以為內合內以為外故外內相得必先治神後乃存針故無以形先可玩往來乃施於人人有虛實五虛弗近五實弗遠往來者氣機出入也得神則可玩往來施於人者刺其病也得神乃可施刺於人人有虛實謂人之虛實不同也五虛五臟正氣虛也虛則不可針故曰弗近五實五臟邪氣實也實則宜針故曰遠至其當發間不容瞚瞚瞬同發舉也瞚轉目也至其舉針之際其間不容於轉目爾手動若務針耀而勻務專一也勻園活也手動若務者以手按穴似專一而不移針耀而勻者行針之時復光耀而園活也靜意視義觀適之變適自得也清靜其意以視行針之義可以觀其自得之變變通變也言不執著之是謂冥冥莫知其形冥冥靜之至也莫知其形變之至也夫靜意視義觀適之變者是謂冥冥而莫知其形也見其烏烏見其稷稷從見其飛不知其誰烏烏烏之疊至也稷稷稷之疊聚也從見其飛見其針之飛耀也不知其誰針園活而難按也夫手動若務針耀而勻者一如見其烏烏之至見其稷稷之聚從見其針之飛耀園活而不知其誰也伏如橫弩起如發機伏如橫弩針之未舉也起如發機針之已施也夫至其當發間不容瞚者言未針如橫弩之伏至其當發如機之速其間不容轉瞚也此皆治神之道也帝曰何如而虛何如而實五虛弗近五實弗遠是但刺其實不刺其虛帝欲合虛實而咸刺之故問何如而治其虛何如而治其實岐伯曰刺虛者須其實刺實者須其虛刺虛須實者刺虛人須內其氣而實之也刺實須虛者刺實人須泄其氣而虛之也經氣已至慎守勿失深淺在志遠近若一如臨深淵手如握虎神無營於衆物經脈之氣已至於針孔則當專心致志而慎守勿失也夫針之深淺皆慎守勿失故曰深淺在志而氣之遠近亦皆慎守勿失故曰遠近若一其慎守也則始臨深淵其勿失也則手如握虎其深淺在志而遠近若一也則神無營於衆物此一節言知天人合一之理針刺神明之道可以寶命可以全形也八正神明論第二十六篇八正天地八方之正位也天之八正日月星辰也地之八正四方四隅也合人形於天地四時陰陽虛實以為用針之法神乎神獨悟獨見獨明故曰八正神明也黃帝問曰用針之服必有法則焉今何法何則服事也上篇云凡刺之真必先治神然雖治神必有法則以為用針之事帝故問之岐伯對曰法天則地合以天光天光日月星辰也用針之道上法天時下則地理更合天之日月星辰以為法則也帝曰願卒聞之法天則地合以天光願盡聞之岐伯曰凡刺之法必候日月星辰四時八正之氣氣定乃刺之合以天光者凡刺之法必候日月星辰也法天者候四時之氣也則地者候八正之氣也定安靜也人氣安靜乃行針以刺之此為用針之事也是故天溫日明則人血淖液而衛氣浮故血易瀉氣易行天寒日陰則人血凝泣而衛氣沉易去聲泣作澀人身血氣上應於天是故天氣溫和日色光明則人血淖液而衛氣浮淖液滋灌也浮外行也血淖液故血易瀉衛氣浮故氣易行若天不溫和而寒日不光明而陰則人血凝澀而衛氣沉凝澀不淖液也沉不浮也月始生則血氣始精衛氣始行月郭滿則血氣實肌肉堅月郭空則肌肉減經絡虛衛氣去形獨居是以因天時而調血氣也人身血氣不但應天日且應天月也月始生月朔也月生之日衛氣大會於風府則血氣始精衛氣始行月郭滿月望也月望則血氣充盛故血氣實而肌肉堅月郭空月晦也月晦則血氣虛微故肌肉凝經絡虛衛氣去形獨居傷寒論云血弱氣盡腠理開者是也是以人當因天時而調血氣也是以天寒無刺天溫無凝月生無瀉月滿無補月郭空無治是謂得時而調之因天時而調血氣是以天寒無刺寒則堅凝故無刺也天溫無凝溫則流通故無凝也月生無瀉不伐其生氣也月滿無補不益其有餘也月郭空無治正氣虛邪不能去也凡此是謂得時而調之因天之序盛虛之時移光定位正立而待之得時而調乃因天序之盛虛故曰因天之序盛虛之時也移光去形晦而光明也定位日月中天而位定也正立而待整肅其體待天人氣盛然後行針以刺也凡此皆得時而調也故曰月生而瀉是謂臟虛月滿而補血氣揚溢絡有留血命曰重實月郭空而治是謂亂經陰陽相錯真邪不別沉以留止外虛內亂淫邪乃起重平聲別音逼月生無瀉故曰月生而瀉是謂臟虛月滿無補月滿而補則血氣揚溢於外則絡有留血命曰重實月郭空無治月郭空而治是謂亂經亂經則陰陽相錯陰陽相錯則真邪不別真邪不別則邪氣內沉沉以留止真氣不充則外虛邪氣相薄則內亂外虛內亂則淫邪乃起凡此皆不能得時而調也帝曰星辰八正何候星辰躔度八正定位何以候之岐伯曰星辰者所以制日月之行也八正者所以候八風之虛邪以時至者也四時者所以分春秋冬夏之氣所在以時調之也八正之邪虛而避之勿犯也日月之行星辰為之衛是星辰者所以制日月之行也制日月之行則星辰可候矣八風之邪八正為之位是八正者所以候八風之虛邪以時至者也知八風之邪則八正可候矣天有四時四時者所以分春秋冬夏之氣所在人候其氣以時調之也春秋之氣溫和冬夏之氣寒暑以時調之則八正之虛邪而避之勿犯也以身之虛而逢天之虛兩虛相感其氣至骨入則傷五臟工候救之弗能傷也人之受邪身之虛也天之有邪天之虛也以身之虛而逢天之虛兩虛相感其氣內至於骨內至於骨則入傷五臟其兩虛相感之時而工候救之弗能入傷五臟也故曰天忌不可不知也靈樞九針論云大禁太一所在之日及諸戊己凡此九者善候八正所在之處所主左右上下身體有癰腫者欲治之無以其所直之日漬治之是謂天忌日也故曰天忌不可不知也凡此皆星辰八正之候也此一節言法日月星辰四時八正之氣以為刺法也帝曰善其法星辰者余聞之矣願聞法往古者上古之世以針治病故承上文法星辰之義而願聞法往古者岐伯曰法往古者先知針經也黃帝法往古而著針經針經靈樞經也靈樞首篇黃帝有先立針經之語故欲法往古者先知針經也驗於來今者先知日之寒溫月之虛盛以候氣之浮沉而調之於身觀其立有驗也法往古而知針經必有驗於來今夫驗於來今者先知日之寒溫月之虛盛如冬日寒而夏日溫晦朔虛而弦望盛也即以十月而候四氣之浮沉如春夏日月則氣浮秋冬日月則氣沉也以四氣浮沉而調之於身可觀其氣之立有驗於身也觀其冥冥者言形氣榮衛之不形於外而工獨知之以日之寒溫月之虛盛四時氣之浮沉參伍相合而調之工常先見之然而不形於外故曰觀於冥冥焉法往古而知針經可以觀其冥冥夫觀其冥冥者言形氣榮衛之不行於外冥冥然也而工獨之有可觀矣工之所以獨之者亦以日之寒溫月之虛盛並四時氣之浮沉與人參伍相合而調之日月四時之理明則人身之理亦明故工常先見之然理微而不形於外故曰觀於冥冥焉爾通於無窮者可以傳於後世也是故工之所以異也然而不形見於外故俱不能見也視之無形嘗之無味故謂冥冥若神倣佛形見之見去聲法往古而知針經可以通於無窮夫通於無窮者可以傳於後世也可傳後世是故工之所以異也然而不形見於外故俱不能見也而工獨知之惟不形見於外故視之無形嘗之無味視無形嘗無味故謂冥冥而若神倣佛也虛邪者八正之虛邪氣也正邪者身形若用力汗出腠理開逢虛風其中人也微故莫知其情莫見其形中去聲下同邪之中人有虛邪有正邪虛邪者乃八正之虛鄉邪氣而中於人身也正邪者身形若用力用力則汗出汗出則腠理開腠理開而逢虛風不同於八正之邪故中人也微微則莫知其情莫見其形也上工救其萌芽必先見三部九候之氣盡調不敗而救之故曰上工萌芽病之微也上工治病救其萌芽必先見三部九候之氣盡調乘其正氣不敗而救之故曰上工下工救其已成救其已敗救其已成者言不知三部九候之相失因病而敗之也若邪病已成正氣已敗而救之斯為下工救其已成者言不知三部九候之相失而病已成也救其已敗者因病而敗之也知其所在者知診三部九候之病脈處而治之故曰守其門戶焉莫知其情而見邪形也處去聲虛邪正邪深淺不同知其所在者知診三部九候之病脈處而調治之使經脈無傷正氣內存故曰守其門戶焉能如是也是雖莫知其情而能見邪形也上文云莫知其情莫見其形今莫知其情者而能知其情莫見其形者而能見邪形也帝曰余聞補瀉未得其意補正瀉邪各有其法帝故問之岐伯曰瀉必用方方者以氣方盛也以月方滿也以日方溫也以身方定也以息方吸而內針乃復候其方吸而轉針乃復候其方呼而徐引針故曰瀉必用方其氣而行焉內音納刺欲瀉之則大指退後食指進前其孔似方故瀉必用方就方義而申解之則方者以天人之氣方盛也天氣盛以月方滿也以日方溫也人氣盛以身方定也以息方吸也息方吸氣始入故方吸而內針復候其方吸而轉針復候其方呼氣出之始而徐引針引猶出也故瀉必用方候其氣盛而行焉爾補必用員員者行也行者移也刺必中其榮復以吸排針也故員與方非針也員圓通刺欲補之則大指進前食指退後其孔似員故補必用員就員義而申解之則員者員活其氣行於周身故員者行也行者移其有餘補其不足故行者移也深入為補故刺必中其榮排轉也復從吸排針候吸入而轉針也吸入而轉所以補之故員與方乃之員活氣之方盛非但針之方員也故養神者必知形之肥瘦榮衛血氣之盛衰血氣者人之神不可不謹養瀉之補之貴得其神故養神者必知形之肥瘦榮衛血氣之盛衰知形之肥瘦則知用針之淺深矣知榮衛血氣盛衰則知方員之補瀉矣由此觀之則血氣者乃人之神而不可不謹養也帝曰妙乎哉論也合人形於陰陽四時虛實之應冥冥之期其非夫子孰能通之然夫子數言形與神何謂形何為神願卒聞之數音朔承知形養神之論而贊其妙因舉形神而復問之岐伯曰請言形形乎形目冥冥問其所病索之於經慧然在前按之不得不知其情故曰形未言神先言形形乎形是有形之可形也目冥冥是無形之可形也有形可形當問其所病而索之於經無形可形則慧然在前而按之不得此有形無形之間而不知其情故曰形情猶實也若泥迹求形則非形矣帝曰何謂神岐伯曰請言神神乎神耳不聞目明心開而志先慧然獨悟口弗能言俱視獨見適若昏昭然獨明若風吹雲故曰神神乎神是至神而莫若神也耳不聞是無聲也雖曰無聲覺目明心開而志先慧覺然獨悟矣口弗能言是無臭也雖曰無臭覺與衆俱視而我獨見矣適若昏是無象也雖曰無象覺昭然獨明若風吹雲而見蒼天矣夫無聲無臭無象而獨悟獨見獨明故曰神三部九候為之原九針之論不必存也診三部九候之法而以形神為之原則靈樞九針之論所言天忌者可不必存於胸中也此一節言用針之道貴得其神得其神而形可不存也離合真邪論第二十七篇離合真邪者真氣邪氣彼此相離勿使合也邪入經脈則真邪相合從而察之必使真氣弗失邪氣弗入蓋邪之新客來也未有定處推之則前引之則止逢而瀉之其病立已瀉之立已則合者使離故曰離合真邪也黃帝問曰余聞九針九篇夫子乃因而九之九九八十一篇余盡通其意矣承上篇先知針經之意而言九針之道備載針經八十一篇余已盡通其意經言氣之盛衰左右傾移以上調下以左調右有餘不足補瀉於榮輸余知之矣針經大意如此余已知之此皆榮衛之傾移虛實之所生非邪氣從外入於經也余願聞邪氣之在經也其病人何如取之奈何針經多論正氣之虛實未詳邪氣入經故以為問岐伯對曰夫聖人之起度數必應於天地故天有宿度地有經水人有經脈起猶立也聖人立人身脈度循行之數必上應天下應地故天有二十八宿之度人有十二經脈以應於天地有十二經水人有十二經脈以應於地天地溫和則經水安靜天寒地凍則經水凝泣天暑地熱則經水沸溢卒風暴起則經水波湧而隴起泣作澀卒音促俱下同地之經水氣通於天故天地溫和則經水安靜如天寒地凍則經水凝澀凝澀不行也天暑地熱則經水沸溢沸溢汛濫也若陰陽不和卒風暴起風行水渙則經水波湧而隴起夫邪之入於脈也寒則血凝泣暑則氣淖澤虛邪因而入客亦如經水之得風也經之動脈其至也亦時隴起其行於脈中循循然人之經脈合於經水氣通於天若夫邪氣之入於脈也天寒則人血凝澀猶之天寒地凍經水凝澀也天暑則人氣淖澤猶之天暑地熱經水沸溢也虛鄉之邪因人經脈虛而入客猶之卒風暴起故亦如經水之得風也經之動脈猶言風入於經而動其脈也其至也亦時隴起猶之經水遇風波湧而隴起也其不因於邪則血氣之行於脈中循循然循循次序貌猶之天地溫和而經水安靜也此人之度數所以應於天地也其至寸口中手也時大時小大則邪至小則平其行無常處在陰與陽不可為度從而察之三部九候卒然逢之早遏其路中去聲處去聲下處同脈之大會在於寸口其至寸口而中手也則時大時小大則脈氣有餘故邪至小則脈氣凝實故平邪氣之至其行無常處或在血分之陰或在氣分之陽而不可為度從其在陰在陽而察之審其三部九候之中邪之所在卒然逢之勿使真邪相合是當早遏其路下文云逢而瀉之其病立已同一義也吸則內針無令氣忤靜以久留無令邪布吸則轉針以得氣為故候呼引針呼盡乃去大氣皆出故命曰瀉內音納下內針之內同忤逆也大氣針下所聚之氣也方吸則內針其氣始行無令逆也寧靜其心久留其針以針引邪無令邪之四布也方吸則轉針欲以得氣為復其故候呼則引針呼盡針乃去使針下所聚之氣皆出此瀉邪之法故命曰瀉此一節言人身經脈應於天地邪氣卒至當急瀉之勿使真邪相合也帝曰不足者補之奈何邪氣卒至當急瀉之真氣不足則當補之故為此問岐伯曰必先捫而循之切而散之推而按之彈而怒之抓而下之通而取之外引其門以閉其神呼盡內針靜以久留以氣至為故如待所貴不知日暮其氣以至適而自護候吸引針氣不得出各在其處推闔其門令神氣存大氣留止故命曰補推退平聲下同彈平聲以至之以已通下以合之以同抓猶引也補不足者當知其經脈之不足故必先以手捫而循之得其穴道之真次則切而散之推而按之分掰其穴不使傾移然後彈而怒之以進其針引而下之以深其針通而取之以調其經外引其門使氣脈流通以閉其神使真氣內存針刺留呼其數不同留呼數盡更當內針而靜以久留久留者欲以氣至為復其故候氣之法如待所貴不知日暮其氣已至仍當調適而自護上文候呼引針大氣皆出此候吸引針使氣不得出各在其針刺之處推闔其門令神氣存針下所聚之大氣留止於內此補正之法故命曰補帝曰候氣奈何如待所貴不知日暮其氣已至適而自護此候氣之法帝復問之岐伯曰夫邪去絡入於經也舍於血脈之中其寒溫未相得如湧波之起也時來時去故不常在故曰方其來也必按而止之止而取之無逢其沖而瀉之真氣者經氣也經氣大虛故曰其來不可逢此之謂也邪之中人由絡而經由經而脈故邪去絡入於經也則舍於血脈之中邪氣始入未為寒病未為溫病其寒溫未相得時如湧波之初起也起如湧波則時來時去時來時去故不常在邪不常在治之常早故曰方其來也必按而止之止而取之邪氣衝突宜避其鋭無逢其沖而瀉之逢沖而瀉傷其經氣則真氣亦傷夫真氣者經氣也瀉之則經氣大虛故九針十二原論曰其來不可逢即此無逢其沖而瀉之之謂也故曰候邪不審大氣已過瀉之則真氣脫脫則不復邪氣復至而病益蓄故曰其往不可追此之謂也上文言大盛的可瀉此言已過亦不可瀉故曰候邪不審針下所聚之大氣已過而復瀉之則真氣外脫脫則不復矣由是則邪氣復至而病益蓄故九針十二原論曰其往不可追即此大氣已過不可瀉之之謂也不可挂以發者待邪之至時而髮針瀉矣若先若後者血氣已盡其病不可下故曰知其可取如發機不知其取如扣椎故曰知機道者不可挂以發不知機者扣之不發此之謂也針道至微先後之間不差毫髮不可挂以發者待邪氣之至時而髮針以瀉矣髮針不得其時若先若後者傷其血氣則血氣已盡其病留中而不可下下猶退也取刺之道貴得其時故曰知其可取而取之則如發機之神速不知其可取而取之則如扣椎之鈍朴故九針十二原論曰知機道者不可挂以發不知機者扣之不發即其知其可取如發機不知其可取如扣椎之謂也帝曰補瀉奈何帝先問補不足未問瀉有餘故為是問岐伯曰此攻邪也不足者補之帝先問之矣此復為補瀉之問則所問專在於瀉故曰此攻邪也猶言此攻邪之問也疾出以去盛血而復其真氣此邪新客溶溶未有定處也推之則前引之則止逆而刺之溫血也刺出其血其病立已溶溶流動貌逆迎也溫通調也攻邪之法當疾出其針以去盛血而復其真氣所以然者此邪新客於身流動而未有定處也未有定處故推之則可前引之則可止若迎而刺之所以通調其血也通調而刺出其血其病立已此攻邪之法為然不使真邪相合也的帝曰善然真邪以合波隴不起候之奈何伯言經之動脈其至也亦時隴起又言寒溫未相得如湧波之起然有真邪相合而波隴不起則候之奈何岐伯曰審捫循三部九候之盛虛而調之察其左右上下相失及相減者審其病臟以期之不知三部者陰陽不別天地不分地以候地天以候天人以候人調之中府以定三部故曰刺不知三部九候病脈之處雖有大過且至工不能禁也別音逼邪入而波隴不起則直氣內虛邪氣內陷候之之法當以心審之以手捫之循其三部九候之盛虛而調之察其左右上下之相失及相減者審其病臟以期之三部九候論云上下左右相失者死中部之候相減者死期者計其死生之時日也不知三部者不能循三部之盛虛而調之也陰陽不別不能察其左右天地不分不能察其上下矣地以候地天以候天人以候人不能察其相失及相減矣能循三部之盛虛而調之必調之中府以定三部三部之中胃氣為本中府胃腑也三部之中又有九候故曰刺不知三部九候病脈之處則不能審其病臟以期之雖有死期之大過且至而工不能禁也大過死期也工不能禁不能預料也誅罰無過命曰大惑反亂大經真不可復用實為虛以邪為真用針無義反為氣賊奪人正氣無過誅罰則攻邪不當故命曰大惑大經反亂則正氣受傷故真不可復用實為虛則虛實不明以邪為真則真邪不別如是以治則用針無義反為氣賊而奪人正氣矣以從為逆榮工散亂真氣已失邪獨內著絶人長命豫人夭殃不知三部九候故不能久長豫與同用針無義必至以從為逆而榮衛散亂反為氣賊必至真氣已失而邪獨內著奪人正氣必至絶人長命而豫人夭殃因此不知三部九候之理故不能使人久長於人世也因不知合之四時五行因加相勝釋邪攻正絶人長命不知人之三部九候因不知合之天之四時地之五行不知人之三部九候因不知天之六氣因加地之五運相勝邪反釋之正反攻之而絶人長命矣此一節申明候氣補瀉當知三部九候以為補正瀉邪之法也邪之新客來也未有定處推之則前引之則止逢而瀉之其病立已上文已言者而復言之以明邪氣新客當急治之勿使真邪相合也通評虛實論第二十八篇通評虛實猶言統論虛實也大義邪氣盛則實精氣奪則虛二語盡之然有氣熱脈滿而為重實者有脈虛氣虛而為重虛者有寒滿熱喘腸澼癲疾消疸癰疽腹滿霍亂五臟癇驚內外上下陰陽臟腑諸病而或死或生或實或虛者故曰通評虛實也黃帝問曰何謂虛實人身經脈貴得其平故為虛實之問岐伯對曰邪氣盛則實精氣奪則虛虛實者非但經脈血氣之虛實乃邪氣盛於人身則實精氣奪於內臟則虛是邪實而正虛也帝曰虛實何如既虛既實人之臟腑血氣當何如岐伯曰氣虛者肺虛也氣逆者足寒也非其時則生當其時則死餘臟皆如此氣主於肺行於內外故氣虛者乃肺虛也氣機運行從下而上故氣逆者乃足寒也邪逆正虛傷其內臟故非其剋制之時則生當其剋制之時則死不特肺受火克諸臟皆有所克故餘臟皆如此帝曰何謂重實重平聲余同因上文虛實而問重實岐伯曰所謂重實者言大熱病氣熱脈滿謂是重實重實者言人身大熱之病氣盛而熱脈盛而滿陰陽血氣皆實是謂重實帝曰經絡俱實何如何以治之氣熱脈滿則經絡俱實故為此問而探其治岐伯曰經絡皆實是寸脈急而尺緩也皆當治之經絡皆實氣血盛於陽分是寸脈當急而尺則緩也經實者治其經絡實者治其絡經絡皆實皆當治之故曰滑則從澀則逆也經絡內通血脈外通皮膚經絡盛則皮膚滑澤經絡衰則皮膚澀滯故曰滑則從澀則逆也夫虛實者皆從其物類始故五臟骨肉滑利可以長久也物猶形也類猶合也物類者五臟在內皮肉筋脈骨有形在外而合於五臟者也始先見也皮澀而虛則肺臟亦虛皮滑而實則肺臟亦實故夫虛實者皆從其有形之外合以先見也皮和肺肉合脾脈合心筋合肝骨合腎故五臟調合於內骨肉滑利於外可以長久而永天命也帝曰絡氣不足經氣有餘何如承上文經絡皆實言更有絡滿經虛經滿絡虛之不同故有絡氣不足經氣有餘並下經虛絡滿之間岐伯曰絡氣不足經氣有餘者脈口熱而尺寒也秋冬為逆春夏為從治主病者脈口寸口也經氣有餘則脈口膚熱絡氣不足而尺膚寒也榮衛生會論云榮出於中焦衛出於下焦故以寸膚候經榮為經也尺膚候絡衛為絡也秋冬之氣降而沉故寸熱尺寒為逆春夏之氣升而浮故寸熱尺寒為從經絡外通皮肉內通筋骨膚之寒熱其病有皮肉脈筋骨淺深不同貴得其主病之所在而治之故曰治主病者帝曰經虛絡滿何如經虛則經氣不足絡滿則絡氣有餘岐伯曰經虛絡滿者尺熱滿脈口寒澀也此春夏死秋冬生也虛不足也滿有餘也上文以尺候絡故絡滿者尺膚熱而滿以寸候經故經虛者脈口寒而澀也寸為陽主春夏脈口寒澀故春夏死尺為陰主秋冬尺熱滿故秋冬生承上文從逆而言故曰此也帝曰治此者奈何上文言治主病者此不言治帝故問之岐伯曰絡滿經虛灸陰刺陽經滿絡虛刺陰灸陽此絡滿經虛當灸陰刺陽灸陰所以補經虛刺陽所以瀉絡滿上文經滿絡虛當刺陰灸陽刺陰所以瀉經滿灸陽所以補絡虛此以灸刺通於上文則上文治主病者亦當通如此矣帝曰何謂重虛因上文重實而問重虛岐伯曰脈氣上虛尺虛是為重虛人身陰陽不外脈氣故提脈氣二字上虛者脈氣虛於上之寸部尺虛者脈氣虛於下之尺部脈主陰血氣主陽氣脈虛氣虛則陰陽血氣皆虛是謂重虛帝曰何以治之岐伯曰所謂氣虛者言無常也尺虛者行步恇然脈虛者不象陰也如此者滑則生澀則死也知其氣脈死生則知施治之法故復言氣脈不言治也所謂氣虛者虛於寸部之陽則言語無常而心主之神明不聰也虛於尺部之陰而為尺虛者則足骨屈伸不利故行步恇然恇然虛怯貌此言氣之虛也脈之大體有陰有陽若脈虛者浮泛於上有陽無陰不能效象於陰也此言脈之虛也如此者指氣虛脈虛也氣虛脈虛診得皮膚滑澤則生澀滯則死也蓋氣脈既虛於內皮膚不可榮於外明氣脈之虛而知其死生則知治之法矣帝曰寒氣暴上脈滿而實何如承上文氣熱脈滿之意言氣熱脈滿是謂重實有寒氣暴止脈滿而實何如暴卒暴也岐伯曰實而滑則生實而逆則死上文云滑則從澀則逆下文云從則生逆則死故曰實而滑則生實而逆則死是知逆者因澀而逆也帝曰脈實滿手足寒頭熱何如脈實滿手足寒是實而逆則死今寒不盡寒而頭復熱如何岐伯曰春秋則生冬夏則死脈浮而澀澀而身有熱者死手足寒而頭熱乃寒中有熱熱中有寒春時則寒中有熱秋時則熱中有寒故春秋則生冬氣全寒夏氣全熱今寒中有熱熱中有寒不合天時故冬夏則死若脈浮而澀乃越於外而虛於內澀而身有熱乃虛於內而越於外此根氣不足故皆死帝曰其形盡滿如何承經絡皆實之意而言經脈絡脈統於周身不但經絡皆實而其形且盡滿何如形形身也滿猶實也岐伯曰其形盡滿者脈急大堅尺澀而不應也其形盡滿者陽氣浮越於外故脈急大堅而余於外尺澀不應而虛於內也如是者故從則生逆則死帝曰何謂從則生逆則死岐伯曰所謂從者手足溫也所謂逆者手足寒也上文云滑則從澀則逆今脈急大堅尺澀不應如是者故滑從則生澀逆則死帝復問之而所謂從者手足溫和溫和則滑也所謂逆者手足寒冷寒冷則澀也反復辨論仍明滑則從澀則逆也帝曰乳子而病熱脈懸小者何如承上文寒氣暴上脈滿而實之意復問乳子病熱脈懸小者何如岐伯曰手足溫則生寒則死乳子秉質未充借後天乳食以生故胃氣行於四肢而手足溫則生胃氣不行於四肢而手足寒則死帝曰乳子中風熱喘鳴肩息者脈何如中去聲下同上文乳子病熱而脈懸小此言乳子中風熱而脈實大但舉喘鳴肩息借岐伯以申明之岐伯曰喘鳴肩息者脈實大也緩則生急則死乳子既中風熱復喘鳴肩息其脈當實大也脈實大而緩脈有胃氣則生脈實大而急脈無胃氣則死帝曰腸澼便血何如因上文喘鳴病肺而問大腸之腸澼也腸澼者寒熱之邪傷其陰絡泄瀉下利也熱氣盛而血溢腸外則便血寒氣盛而津溢腸外則下白沫寒熱相持血與白沫相兼而下則下膿血帝故各舉以問岐伯曰身熱則死寒則生腸澼便血則陰虛於內身熱則陽虛於外陰陽別論云陰陽虛腸澼死故身熱則死寒者身不熱也不熱則陰虛而陽不虛故生帝曰腸澼下白沫何如岐伯曰脈沉則生脈浮則死腸澼下白沫乃寒汁下泄脈沉則血氣內守故生脈浮則血氣外馳故死帝曰腸澼下膿血何如岐伯曰脈懸絶則死滑大則生腸澼下膿血乃血與白沫相兼而下其脈懸絶則津血內脫生陽不生故死脈滑大則陰陽和合血氣充盛故生帝曰腸澼之屬身不熱脈不懸絶何如岐伯曰滑大者曰生懸澀者曰死以臟期之泄瀉下利屬於腸澼非便血白沫膿血之腸澼故曰腸澼之屬上文言身熱則死又言脈懸絶則死帝承上文之意而言身不熱脈不懸絶何如帝承上文之意以問伯亦承上文之意以對夫滑大者既曰生則懸澀者曰死懸澀懸絶之漸也須知腸澼之脈不宜懸澀矣懸澀將絶當以五臟之死日期之陰陽別論云肝至懸絶十八日死心至懸絶九日死肺至懸絶十二日死腎至懸絶七日死脾至懸絶四日死帝曰癲疾何如承上文肺病之喘鳴大腸之腸澼而問心病之癲疾消疸心者君主之官神明出焉癲疾則心不神明病當何如岐伯曰脈搏大滑久自已脈小堅急死不治心不受邪脈搏大滑則正氣內持邪不幹臟故病久當自已脈小堅急乃正氣不足邪必干臟故死不治帝曰癲疾之脈虛實何如心不受邪則癲疾之脈宜虛乎抑宜實乎岐伯曰虛則可治實則死心不受邪其脈宜虛故虛則可治實則邪氣內入故實則死帝曰消疸虛實何如癲疾則心氣寒消疸則心氣熱故問消疸之脈虛實當何如岐伯曰脈實大病久可治脈懸小堅病久不可治火熱而渴消疸病也其脈實大脈病皆為有餘雖久可治脈懸小堅則病有餘脈不足久則正氣益虛故不可治帝曰形度骨度脈度筋度何以知其度也皮與肉為形度骨度者腎之合脈度者心之合筋度者肝之合承上文諸病而問形骨脈筋之度必知內外相合之度始知致病之由故復問之岐伯曰春亟治經絡夏亟治經俞秋亟治六腑冬則閉塞閉塞者用藥而少針石也岐伯二字舊本訛帝今改正度有淺深合於四時故春亟治經絡經絡無病筋度和矣夏亟治經俞經俞無病脈度和矣秋亟治六腑六腑無病通體之形度和矣冬則閉塞閉塞者宜用藥調之而少針石也閉塞內藏骨度和矣所謂少針石者非癰疽之謂也癰疽不得頃時回申明所謂少針石者乃骨度無病勿針石以泄之非癰疽發於骨度之謂也若癰疽發於骨度乃少陰神機所主當亟刺以泄其毒不得頃時之緩而使神機之回也此言癰疽發於骨度也癰不知所按之不應手乍來乍已刺手太陰旁三痏與纓脈各二痏音季餘篇同骨度為陰故言癰疽形度脈度筋度為陽故言癰不言疽癰發於通體之形度或上或下或左或右故不知其所將成未成故按之不應手時腫時消故乍來乍已肺主周身之氣故刺手太陰旁三痏手太陰旁膺胸之旁也痏針眼如小瘡也三痏針瘡凡三也纓脈結纓兩旁之脈也各二左右各刺其二也此言癰發於形度也腋癰大熱刺足少陽五刺而熱不止刺手心主三刺手太陰經絡者大骨之會各三脅上曰腋少陽行身之側部合於腋故腋癰大熱當刺足少陽五以泄其熱刺之而熱不止則刺手心主三心主包絡之脈上抵腋下也更刺手太陰經絡者大骨之會各三大骨之會臂骨與手交會之處也此言癰發於脈度也暴癰筋緛隨分而痛魄汗不盡胞氣不足治在經俞暴凶暴也毒氣深入內傷其筋則為暴癰筋緛隨大筋之分理而痛謂不掀痛於外而隱痛於內也皮毛之魄汗不盡出於外由胞中血海之氣不足於內也筋緛胞虛不可以刺故治在經俞治調治也使胞中血氣由內達外則緛者強雍者通此言癰發於筋度也腹暴滿按之不下取手太陽經絡者胃之募也少陰俞去脊椎三寸旁五用員利針腹中卒暴而滿太陰脾土病也按之不下既滿且硬不應指而下也取手太陽經絡者以小腸居胃下化物而出乃胃之募也取而刺之以瀉腹滿又取少陰俞所以行泄其水也少陰俞即腎俞也兩旁去脊椎各開三寸各刺其五用員利針者九針十二原論曰針大如釐且員且鋭中身微大以取暴氣蓋腎俞兩旁不可深刺故用釐針泄腎臟之水氣以治腹滿上文形度骨度脈度筋度未及於脾此舉脾病以足形度之義霍亂刺俞旁五足陽明及上旁三霍亂胃病也霍亂之病脾胃不和故亦刺少陰俞旁五病在陽明故刺足陽明及上旁三陽明胃俞在腎俞之上故曰及上旁三者兩旁各三刺也本經論五臟必兼言胃故舉胃病以足五臟之義刺癇驚脈五針手太陰各五刺足太陽五刺手少陰經絡旁者一足陽明一上踝五寸刺三針足太陽舊本訛經太陽今改癇癲癇也驚震驚也癇驚之病病在於脈故刺癇驚脈有五其一針手太陰各五肺手太陰之脈起於中焦出腋上循臑內各五者左右各為五刺刺之所以和金氣也其一刺足太陽五膀胱足太陽之脈起於目內眥上額交巔循足太陽之脈而五刺之所以和水氣也其一刺手少陰經絡旁者一心手少陰之脈起於心中出屬心系心系不可刺故刺經絡之傍刺之所以和火氣也其一刺足陽明一胃足陽明之脈起於鼻之交頞中下循鼻外上入齒中刺之所以和土氣也其一取足上踝五寸上踝五寸膽足少陽光明穴也刺三針光明之上下也刺之所以和木氣也癇驚之病陰陽不交水火不齊故為臟腑五行之刺以足臟腑五行之義凡治消疸僕擊偏枯痿厥氣滿發逆肥貴人則高梁之疾也隔塞閉絶上下不通則暴憂之病也暴厥而聾偏塞閉不通內氣暴薄也不從內外中風之病故瘦留著也跖跛寒風濕之病也暴卒也跖踐履也跛不正也治病之法各有內外上下之因當從其因而察之凡治消疸病起於內僕擊病起於外邪在上則偏枯邪在下則痿厥邪在中則氣滿發逆此消疸僕擊偏枯痿厥氣滿發逆之病有虛有實若肥貴人則膏梁之疾而為有餘也氣機隔塞而閉絶以致上下不通推其致病之由則卒憂之病也卒然厥逆不通於上則暴厥而聾不通於下則二便不調偏塞閉不通此暴憂內因之病故曰內氣暴薄也不從內暴憂外中風之病則秉質故瘦留著而不去之病也若足踐履而行不正非故瘦之疾乃寒風濕外因之病也凡此諸病虛實不同當察其因而治之黃帝曰黃疸暴痛癲疾厥狂久逆之所生也五臟不平六腑閉塞之所生也頭痛耳鳴九竅不利腸胃之所生也帝因岐伯之言申明臟腑受病各有所生知其所生則知虛實之因而治之不難矣黃疸暴痛癲疾厥狂病雖發於一時乃久逆之所生也五臟之氣貴得其平五臟不平由六腑不和故六腑閉塞之所生也頭痛耳鳴致上下九竅不利由穀氣少入穀神內虛乃腸胃之所生也太陰陽明論第二十九篇太陰脾土也陽明胃土也胃納水穀借脾氣運行充於腑臟而經脈以和四肢以榮土者生萬物而法天地故為太陰陽明論黃帝問曰太陰陽明為表裡脾胃脈也生病而異者何也陽明為表太陰為里太陰主脾陽明主胃脾胃表裡皆屬乎土何以生病而異岐伯對曰陰陽異位更虛更實更逆更從或從內或從外所從不同故病異名也更平聲太陰陰也陰在內陽明陽也陽在外是陰陽異位也春夏為陽則陽實陰虛秋冬為陰則陰實陽虛是更虛更實也春夏為陽而陰盛則逆秋冬則從秋冬為陰而陽盛則逆春夏則從是更逆更從也陰在內為陽之守陽在外為陰之使秋冬從陰春夏從陽陰陽互從是或從內或從外也一歲之中所從不同故發而為病亦有陰陽之異名也帝曰願聞其異狀也有異名必有異狀狀名之實也岐伯曰陽者天氣也主外陰者地氣也主內故陽道實陰道虛故犯賊風虛邪者陽受之食飲不節起居不時者陰受之陽受之則入六腑陰受之則入五臟入六腑則身熱不時臥上為喘呼入五臟則䐜滿閉塞下為飧泄久為腸澼天為陽故陽者天氣也主外地為陰故陰者地氣也主內陽剛有餘陰柔不足故陽道實陰道虛陽主外故犯賊風虛邪者陽受之陰主內故食飲不節起居不時者陰受之腑為陽故陽受之則入六腑臟為陰故陰受之則入五臟入六腑則陽氣外浮不歸於陰故身熱不能時臥而上為喘呼入五臟則陰寒內盛不和於陽故䐜滿閉塞下為飧泄而久為腸澼此陰陽不同而腑臟外內之病所以異也故喉主天氣咽主地氣故陽受風氣陰受濕氣故陰氣從足上行至頭而下行循臂至指端陽氣從手上行至頭而下行至足故曰陽病者上行極而下陰病者下行極而上故傷於風者上先受之傷於濕者下先受之喉司呼吸肺氣所出故喉主天氣咽納水穀下通於胃故咽主地氣風為陽邪故陽受風氣濕為陰邪故陰受濕氣陰氣從下而上上而外故陰氣從足上行至頭而下行循臂至手指之端陽氣從外而上上而下故陽氣從手上行至頭而下行至足陽氣在上極則乃下陰氣在下極則始上故曰陽病者上行極而下陰病者下行極而上故傷於風者上先受之極乃下也傷於濕者下先受之極乃上也此陰陽不同而風濕上下之病所以異也此一節論腑臟外內風濕上下而太陰陽明之病所以異也帝曰脾病而四肢不用何也上文言腑臟外內風濕上下受病之異未明其狀故有脾病而四肢不用之問四肢不用其狀異矣岐伯曰四肢皆稟氣於胃而不得至經必因於脾乃得稟也今脾病不能為胃行其津四肢不得稟水穀氣氣日以衰脈道不利筋骨肌肉皆無氣以生故不用焉為去聲下同稟猶受也四肢皆受氣於胃而陽明胃氣不得至於四肢之經必因於脾乃得至經而受氣於胃也今脾病不能為胃行其津液則四肢不得受胃中水穀之氣而水穀之氣外行四肢內資五臟氣日以衰肺主氣也脈道不利心主脈也而肝主之筋腎主之骨脾主之肌肉皆無水穀之氣以生故四肢不用焉所以脾病而四肢不用也帝曰脾不主時何也肝心肺腎主春夏秋冬四時脾不主時故舉以問岐伯曰脾者土也治中央常以四時長四臟各十八日寄治不得獨主於時也長上聲脾不主時者以脾臟屬土位治中央常以春夏秋冬四時為肝心肺腎四臟之長一時各十八日寄治一臟之中共主七十二日所以不得獨主於時脾臟者常著胃土之精也土者生萬物而法天地故上下至頭足不得主時也著昭著也胃土水穀之精昭著於外由脾臟之氣運行故脾臟者常著胃土之精也萬物皆生於土故土者生萬物而法天地經脈上下資生於土故上至頭下至足無處不周雖欲主時不可得也帝曰脾與胃以膜相連耳而能為之行其津液何也上文云脾病不能為胃行其津液故問脾胃皆屬土以膜相連何以能為胃行其津液岐伯曰足太陰者三陰也其脈貫胃屬脾絡嗌故太陰為之行氣於三陰陽明者表也五臟六腑之海也亦為之行氣於三陽厥陰為一陰少陰為二陰太陰為三陰故足太陰者三陰也足太陰主脾其脈中貫胃下屬脾上絡嗌而脾土之氣通於五臟之陰故太陰為之行氣於三陰三陰主五臟也陰主裡陽主表故陽明者表也胃納水穀為五臟之腑之海也稟太陰之運動而亦為之行氣於三陽三陽主六腑也臟腑各因其經而受氣於陽明故為胃行其津液四肢不得稟水穀氣日以益衰陰道不利筋骨肌肉無氣以生故不用焉太陰行氣於三陰陽明稟太陰之氣而行氣於三陽是五臟六腑各因其經而受氣於陽明受氣於陽明實受氣於太陰故脾臟為胃行其津液所以以膜相連而能為之行其津液也若脾臟不為胃行其津液則四肢不得稟陽明水穀之氣氣日益衰肺氣虛也陰道不利即脈道不利心氣虛也而肝主之筋腎主之骨脾主之肌肉皆無陽明水穀之氣以生故四肢不用焉此一節言太陰脾臟為胃行其津液而充於腑臟達於四肢所以脾病而四肢不用也陽明脈解論第三十篇承上篇太陰陽明論而更為陽明脈解也陽明屬土故惡木陽明熱甚故惡火陽明厥逆故惡人四肢實則登高熱盛則棄衣不欲食則妄走皆陽明經脈之病有生死虛實之殊故以為解黃帝問曰足陽明之脈病惡人與火聞木音則惕然而驚鐘鼓不為動聞木音而驚何也願聞其故惡去聲下同靈樞經脈論云胃足陽明之脈病則惡人與火聞木音則惕然而驚帝引此以問岐伯對曰陽明者胃脈也胃者土也故聞木音而驚者土惡木也聞木音而驚者陽明胃脈屬土土惡木克之義帝曰善其惡火何也岐伯曰陽明主肉其脈血氣盛邪客之則熱熱甚則惡火其惡火者陽明主肉其脈血氣皆盛邪客之則熱甚而惡火也帝曰其惡人何也岐伯曰陽明厥則喘而惋惋則惡人厥厥逆也惋驚顧也陽明惡人者胃絡之脈不能上行外達則厥逆厥逆則喘急而驚顧驚顧則惡人也帝曰或喘而死者或喘而生者何也喘惋之證有死有生故復問之岐伯曰厥逆連臟則死連經則生胃絡上合心包旁通支腋今胃氣厥逆病連少陰之心臟則死病連心包之經脈則生帝曰善病甚則棄衣而走登高而歌或至不食數日逾垣上屋所上之處皆非其素所能也病反能者何也陽明病甚則發狂故舉以問岐伯曰四肢者諸陽之本也陽盛則四肢實實則能登高也手之三陽從手走頭足之三陽從頭走足故四肢者諸陽之本也今陽氣有餘而盛則充溢四肢而實實則能登高也帝曰其棄衣而走者何也岐伯曰熱盛於身故棄衣而走也其棄衣而走者陽明火熱盛於周身故棄衣而走也帝曰其妄言罵詈不避親疏而歌者何也詈音利下同登高棄衣外狂也妄言罵詈不避親疏而歌內狂也故復問之岐伯曰陽盛則使人妄言罵詈不避親疏陽氣火氣也心之所主也陽氣亢盛則心主血脈不和故使人妄言罵詈不避親疏而歌也而不欲食不欲食故妄走也上文有不食數日逾垣上屋之問故言而不欲食惟不欲食故逾垣上屋而妄走也不欲食而妄走是四肢稟氣於胃胃以飲食為本之義熱論第三十一篇此論經脈之熱病也厥陰之上風氣主之少陰之上熱氣主之太陰之上濕氣主之少陽之上火氣主之陽明之上燥氣主之太陽之上寒氣主之風熱濕火燥寒六氣之本也厥陰少陰太陰少陽陽明太陽六氣之標也凡人之生主氣之次始於厥陰終於太陽從陰而陽循環無已所謂神轉不回若病傷寒則始於太陽終於厥陰從陽而陰所謂回則不轉乃失其機此云巨陽陽明少陽等乃人身三陽三陰之經脈也巨陽受之陽明受之少陽受之等乃三陽三陰各受寒邪而病熱也一日巨陽二日陽明三日少陽等乃以六日而明六經也三陽三陰各受為病一日受者七日愈二日受者八日愈三日受者九日愈四日受者十日愈五日受者十一日愈六日受者十二日愈究而言之皆一日受而七日愈期雖有次非一定也兩感於寒則陰陽俱病腑臟皆傷不免於死氣化無形經脈有形故下即有刺熱之篇復有評熱之論此篇只論人身經脈受病不論標本氣化後仲景傷寒論論標本氣化者與此熱論不同也黃帝問曰今夫熱病者皆傷寒之類也或愈或死其死皆以六七日之間其愈皆以十日以上者何也不知其解願聞其故人身經脈調和則無寒無熱經脈不和則或寒或熱故熱病者皆傷寒之類其病或愈或死期日不同故以為問岐伯對曰巨陽者諸陽之屬也其脈連於風府故為諸陽主氣也巨陽太陽也陽熱之氣病於通體故曰巨陽諸陽之氣皆巨陽通體所主故巨陽者諸陽之屬也若論其脈則上連督脈之風府督脈督於陽故為諸陽主氣也人之傷於寒也則為病熱熱雖甚不死其兩感於寒而病者必不免於死熱病者傷寒之類故人之傷於寒也則為病熱熱者人身陽熱之氣陽常有餘故熱雖甚不死其兩感於寒而病者陽脈受寒陰脈亦受寒陰陽皆受腑臟俱傷故必不免於死所以或愈或死也帝曰願聞其狀病經脈之有形則有諸脈受病之狀故願聞之岐伯曰傷寒一日巨陽受之故頭項痛腰脊強強去聲試以六經受病言之如傷寒一日通體之巨陽受之上文云其脈連於風府風府項也從項而上故頭項痛從項而下故腰脊強此巨陽之脈受病為然今以一日受之而明其狀二日陽明受之陽明主肉其脈挾鼻絡於目故身熱目疼而鼻乾不得臥也陽明之脈則以二日受之而明其狀陽明者土也故陽明主肉其脈起於鼻交頞中旁約太陽之脈故挾鼻絡於目主肉故身熱絡於目故目疼挾鼻故鼻乾陽明胃不和故不得臥也三日少陽受之少陽主膽其脈循脅絡於耳故胸脅痛而耳聾少陽之脈則以三日受之而明其狀少陽者木也故少陽主膽其脈下胸中循脅裡其支從耳後入耳中出走耳前故循脅絡於耳循脅故胸脅痛絡耳故耳聾三陽經絡皆受其病而未入於臟者故可汗而已結上文三陽受病非比一日太陽二日陽明三日少陽故三陽經絡一日皆受其病三陽主六腑而未入於三陰之五臟故可汗而已此熱雖甚不死也四日太陰受之太陰脈布胃中絡於嗌故腹滿而嗌乾太陰之脈則以四日受之而明其狀其脈屬脾絡胃挾咽連舌本故太陰脈布胃中絡於嗌布胃中故腹滿絡於嗌故嗌乾五日少陰受之少陰脈貫腎絡於肺系舌本故口燥舌乾而渴少陰之脈則以五日受之而明其狀其脈從腎上貫肝膈入肺中循喉嚨挾舌本故少陰脈貫腎絡於肺系舌本少陰水火不相交濟故口燥舌乾而渴六日厥陰受之厥陰脈循陰器而絡於肝故煩滿而囊縮厥陰之脈則以六日受之而明其狀厥陰肝脈過陰器抵小腹故厥陰脈循陰器而絡於肝厥陰木氣逆火氣盛故煩滿循陰器故囊縮三陰三陽五臟六腑皆受病榮衛不行五臟不通則死矣則猶即也結上文三陰受病非必四日太陰五日少陰六日厥陰故內之三陰外之三陽內之五臟外之六腑一日皆受其病致榮衛不行五臟不通即死矣較之兩感於寒不免於死者更甚也其不兩感於寒者七日巨陽病衰頭痛少愈八日陽明病衰身熱少愈九日少陽病衰耳聾微聞十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止不滿舌乾已而嚏十二日厥陰病衰囊縱少腹微下大氣皆去病日已矣其不兩感於寒屬經脈之熱病皆以七日環復病衰而愈由此觀之則上文所云一日受二日受者乃循次言之非一定不移之期日也會悟聖經當勿以辭害意帝曰治之奈何治得其宜不必七日始愈故以為問岐伯曰治之各通其臟脈病日衰已矣臟脈者如上文太陰脾臟之脈少陰腎臟之脈厥陰肝臟之脈也治之而各通其臟脈則病日漸衰而可已如是則免於死矣其未滿三日者可汗而已其滿三日者可泄而已若病在三陽其未滿三日而在外者可汗而已其滿三日而在內者可泄而已如是不必七日環復而始愈矣帝曰熱病已愈時有所遺者何也承汗已泄已之意而問時有所遺未全愈者何也岐伯曰諸遺者熱甚而強食之故有所遺也若此者皆病已衰而熱有所藏因其穀氣相薄兩熱相合故有所遺也強上聲食音飼藏如字諸遺者乃熱甚之時而強食之故有所遺也又言若此者皆外熱之病已衰而內熱有所藏因其穀氣與所藏之熱相薄相薄則陽明胃熱與所藏之熱兩熱相合故有所遺也帝曰善治遺奈何病遺未愈何以治之岐伯曰視其虛實調其逆從可使必已矣視其經脈之虛實調其陰陽之逆從如是以治可使病之必已而無遺矣帝曰病熱當何禁之病有所遺而復治之不若當其病時而禁忌之故問病熱何禁岐伯曰病熱少愈食肉則復多食則遺此其禁也病熱少愈未全愈時毋食肉毋多食食肉則重濁難消熱病當復多食則穀氣相薄病有所遺食肉多食此其禁也帝曰其病兩感於寒者其脈應與其病形何如應平聲形猶狀也諸脈受病之狀上文詳言之此復問兩感於寒之脈狀岐伯曰兩感於寒者病一日則巨陽與少陰俱病則頭痛口乾而煩滿二日則陽明與太陰俱病則腹滿身熱不欲食譫言三日則少陽與厥陰俱病則耳聾囊縮而厥水漿不入不知人六日死所謂兩感於寒者巨陽與少陰陽明與太陰少陽與厥陰皆表裡雌雄相應故病一日則巨陽與少陰俱病病巨陽之脈狀則頭痛病少陰之脈狀則口乾而煩滿二日則陽明與太陰俱病病太陰之脈狀則腹滿身熱病陽明之脈狀則不欲食譫言三日則少陽與厥陰俱病病少陽之脈狀則耳聾病厥陰之脈狀則囊縮而厥夫三陽以胃氣為本三陰以神氣為先水漿不入胃氣絶矣不知人神氣亡矣至六日則不能環復而死言巨陽少陰陽明太陰少陽厥陰皆以六日為期而死則一日二日三日有次序而非一定亦當意會者也帝曰五臟已傷六腑不通榮衛不行如是之後三日乃死何也承上文三陰三陽五臟六腑皆受病榮衛不行五臟不通則死之意而問三日乃死非即死矣岐伯曰陽明者十二經脈之長也其血氣盛故不知人三日其氣乃盡故死矣長上聲五臟六腑神氣運行皆稟氣於胃故陽明者乃十二經脈之長也陽明多氣多血故其血氣盛不知人則神氣已絶而陽明之氣未絶故不知人三日其陽明之氣乃盡故死矣雖不即死猶之死也凡病傷寒而成溫者先夏至日者為病溫後夏至日者為病暑暑當與汗皆出勿止冬傷於寒春必病溫故凡病傷寒而成溫者先夏至日而發者為病溫後夏至日而發者為病暑溫猶熱也暑熱之極也暑熱之病汗出而散溫熱之病亦當汗出故暑當與汗而皆出勿止汗雖多不可止之也上文熱病隨感隨發與寒氣留連伏匿而發者不同故舉溫暑以別上文熱病之意刺熱篇第三十二篇岐伯承上篇熱論而立刺熱之篇以明熱病之在經脈也經脈內連五臟故上篇言經脈之熱此言五臟之熱而五臟之熱有在於脈者有見於色者在脈在色證有先兆知其先兆而刺治之則得矣肝熱病者小便先黃腹痛多臥身熱熱爭則狂言及驚脅滿痛手足躁不得安臥庚辛甚甲乙大汗氣逆則庚辛死刺足厥陰少陽其逆則頭痛員員脈引沖頭也腹小腹也員員周轉也肝主疏泄故肝熱病者小便先黃肝脈過陰器抵小腹故腹痛木氣不達故多臥火氣有餘故身熱邪正相持則為熱爭熱爭則狂言熱傷血分也及驚東方肝木其病發驚駭也脅滿痛肝脈布脅肋邪客之而滿痛也手足躁風淫末疾肝病風生躁擾也不得安臥臥則血歸於肝肝病而血不歸也庚辛甚金剋木也甲乙大汗自得其位而起也氣逆肝氣自逆也始焉熱爭繼則氣逆不但庚辛甚而庚辛且死治之之法當取陰陽臟腑之相為表裡者而均刺之故刺足厥陰少陽申明氣逆者其經脈之氣自逆也肝與督脈會於巔故其逆則頭痛員員而周轉所以致頭痛員員者以肝脈與督脈相引而上衝於頭也心熱病者先不樂數日乃熱熱爭則卒心痛煩悶善嘔頭痛面赤無汗壬癸甚丙丁大汗氣逆則壬癸死刺手少陰太陽卒音促樂喜樂也心氣舒緩則樂故心熱病者先不樂數日然後乃熱邪正相持而熱爭則卒心痛而煩悶也善嘔火熱上炎也頭痛陽氣上逆也面赤心熱也無汗不得陰液以相滋也壬癸甚水剋火也丙丁大汗自得其位而起也氣逆心氣自逆也始焉熱爭繼則氣逆故氣逆則壬癸死當急刺手少陰太陽以救其逆脾熱病者先頭重頰痛煩心顏青欲嘔身熱熱爭則腰痛不可用俯仰腹滿泄兩頷痛甲乙甚戊己大汗氣逆則甲乙死刺足太陰陽明頭重土虛疲倦之象故脾熱病者先頭重頭重下視則頰痛脾絡注心中故煩心土虛木刑故顏青脾病善噫故欲嘔脾熱病故身熱邪正相持而熱爭致身半以下身半以上氣機不和則腰痛而不可用俯仰也腹滿泄脾熱下行也兩頷痛脾熱上行也甲乙甚水剋土也戊己大汗自得其位而起也始焉熱爭繼則氣逆逆則甲乙死當刺足太陰陽明以救其逆肺熱病者先淅然厥起毫毛惡風寒舌上黃身熱熱爭則喘咳痛走胸膺背不得太息頭痛不堪汗出而寒丙丁甚庚辛大汗氣逆則丙丁死刺手太陰陽明惡去聲淅然如水灑身之意厥寒厥也肺主皮毛故肺熱病者先淅然寒厥從毫毛而起厥起毫毛故惡風寒舌上黃內熱也身熱外熱也邪正相持而熱爭則喘咳肺主膺胸其俞在背故痛走胸膺背既喘既咳則不得太息氣上不下則頭痛不堪皮毛開發肌表不和故汗出而寒丙丁甚火剋金也庚辛大汗自得其位而起也肺氣自逆則丙丁死當急刺手太陰陽明以救其逆腎熱病者先腰痛䯒酸苦渴數飲身熱熱爭則項痛而強䯒寒且酸足下熱不欲言其逆則項痛員員淡淡然戊己甚壬癸大汗氣逆則戊己死刺足少陰太陽數音朔強去聲腰乃腎腑故腎熱病者先腰痛腎主骨故䯒酸腎為水臟不能上濟其火故苦渴數飲水腎虛病熱故身熱邪正相持而熱爭爭於上則項痛而強爭於下則骨行寒且酸足下熱爭於中則不欲言其腎氣自逆精髓不能循脊注項故項痛員員申明員員者乃精氣不充而淡淡然非若頭痛員員之周轉也戊己甚土剋水也壬癸大汗自得其位而起也腎氣逆則戊己死當急刺足少陰太陽以救其逆出血如大豆立已此七字舊本在刺手太陰陽明下今改正於此承上文諸刺而言若出針之時出血如大豆則邪熱去而經脈和其病當立己諸汗者至其所勝日汗出也此衍文也下文云諸當汗者至其所勝日汗大出也誤重於此肝熱病者左頰先赤心熱病者顏先赤脾熱病者鼻先赤肺熱病者右頰先赤腎熱病者頤先赤病雖未發見赤色者刺之名曰治未病上文五臟熱病在於經脈此言五臟熱病見於氣色也熱火病也赤火色也肝木居左故肝熱病者左頰先赤心火居上故心熱病者顏先赤五色論云庭者顏也庭猶額也脾土居中故脾熱病者鼻先赤肺金居右故肺熱病者右頰先赤腎水居下故腎熱病者頤先赤頤腮間口角也五臟病雖未發先見赤色於面部者當即刺之勿使其病此名曰治未病也熱病從部所起者至期而已其刺之反者三周而已重逆則死諸當汗者至其所勝日汗大出也諸治熱病以飲之寒水乃刺之必寒衣之居止寒處身寒而止也重平聲總結上文之義而言寒可治熱也熱病從部所起者如肝熱病小便先黃心熱病先不樂脾熱病先頭重肺熱病先淅然腎熱病先腰痛又如肝熱病左頰先赤心熱病顏先赤脾熱病鼻先赤肺熱病右頰先赤腎熱病頤先赤者是也至期而已者如肝病期甲乙心病期丙丁脾病期戊己肺病期庚辛腎病期壬癸至本位日期而病已也其刺之反者如肝病刺足厥陰少陽心病刺手少陰太陽脾病刺足太陰陽明肺病刺手太陰陽明腎病刺足少陰太陽皆刺之而反逆為從至三周而病已三周三日也重逆則死者如肝病氣逆庚辛死心病氣逆壬癸死脾病氣逆甲乙死肺病氣逆丙丁死腎病氣逆戊己死氣逆而治之覆逆是謂重逆重逆則死不待庚辛壬癸等日也諸當汗者至其所勝日汗大出如甲乙大汗丙丁大汗等乃本氣勝王之日而大汗也諸熱病者如五臟經脈熱病五臟氣色熱病也治之之法以飲之寒水乃刺之以治其熱裡熱既愈外熱未除必寒衣之居止寒處至身寒無熱而止也總結上文而言熱以寒治也熱病先胸脅痛手足躁刺足少陽補足太陰病甚者為五十九刺足少陽之脈循胸過脅故熱病先胸脅痛胸脅痛則手足躁當刺足少陽以通其經少陽病不己應傳太陰故補足太陰以禁其傳刺之不愈而病甚者當為五十九刺水熱穴論云頭上五行行五者以越諸陽之熱也大杼膺俞缺盆背俞此八者以瀉胸中之熱也氣街三里巨虛上下廉此八者以瀉胃中之熱也雲門骨禹骨委中髓空此八者以瀉四肢之熱也五臟俞旁五此十者以瀉五臟之熱也凡此五十九穴者皆熱之左右也熱病始手臂痛者刺手陽明太陰而汗出止始猶先也手陽明之脈起於手指循臂而上故熱病始手臂痛者當刺手陽明太陰而汗出止手太陰之脈亦循手臂故兼言之熱病始於頭首者刺項太陽而汗出止足太陽之脈上額交巔絡腦下項故熱病始於頭首者當刺項太陽而汗出止項太陽猶言足太陽也熱病始終足脛者刺足陽明而汗出止足陽明之脈循脛下足故熱病始於足脛者當刺足陽明而汗出止熱病先身重骨痛耳聾好瞑刺足少陰病甚為五十九刺好去聲熱病先身重者少陰樞轉不利也少陰主骨故骨痛腎氣不注於耳故耳聾腎精不充於目故好瞑當刺足少陰以通其經刺之不愈而病甚者亦為五十九刺熱病先眩冒而熱胸脅滿刺足少陰少陽眩冒而熱乃少陰腎精不升熱病之起於少陰也胸脅滿乃少陽經脈不和熱病之起於少陽也少陰為陰樞少陽為陽樞樞轉有乖而病熱故合少陰少陽而並刺之太陽之脈色榮顴骨熱病也榮未交曰今且得汗待時而已與厥陰脈爭見者死期不過三日其熱病內連腎少陽之脈色也見音現下同脈經脈也色赤色也顴骨屬腎少陰之所主也上文熱病有在脈者有在色者此合脈色而並論之故言太陽之脈而赤色榮於顴骨是太陽脈色之熱病也其病但在於脈未榮顴骨之時則榮未交醫工必曰今且得汗待其王時而病可已若王時無汗病不能已復與厥陰經脈相爭而見赤色者虛陽外浮死期不過三日蓋六氣運行三日三陽三日三陰陰病不能出陽陽病不能合陰則死申明色榮顴骨是其熱病內連於腎本俞論云少陽屬腎故曰少陽之脈色也少陽之脈色榮頰前熱病也榮未交曰今且得汗待時而已與少陰脈爭見者死期不過三日面旁曰頰頰前亦顴骨也夫少陽雖屬腎而少陽為陽少陰為陰故少陽熱病之脈色亦與少陰爭見大義與上文同熱病氣穴三椎下間主胸中熱四椎下間主膈中熱五椎下間主肝熱六椎下間主脾熱七椎下間主腎熱榮在骶也項上三椎陷者中也熱病氣穴猶言熱病刺法當取氣穴而刺之也三椎下間主刺胸中之肺熱四椎下間主刺膈中之心熱五椎下間主刺肝熱六椎下間主刺脾熱七椎下間主刺腎熱此五臟氣分之熱病而取氣穴以刺之蓋氣為陽主上榮為陰主下若榮血之熱病其穴在脊骨盡處故曰榮在骶也申明三椎者從項上數之而為三椎也下間者椎下椎上陷者中也蓋大椎乃脊骨之第一椎從項上數之則大椎為三椎如是椎之諸椎皆得矣頰下逆顴為大瘕下牙車為腹滿顴後為脅痛頰上者膈上也觀面色所見之部而知內臟所主之病頰下赤色上逆於顴則為大瘕而主腎病其色下逆於牙車則為腹滿而主脾病其色逆於顴後則為腰痛而主肝病其色在由頰上者則病在膈上而為心肺之病也此復舉面部上下所見之色以徵五臟熱病之義評熱病論第三十三篇熱論論熱病之在脈刺熱論熱病之先見評熱論熱病之變證風厥勞風腎風風水皆熱病之變舉而評之故曰評熱病論黃帝問曰有病溫者汗出輒復熱而脈躁疾不為汗衰狂言不能食病名為何溫猶熱也溫熱之病汗出當愈今汗出輒復熱而脈更躁疾不為汗衰且神志不守而狂言胃氣不和而不能食此熱病變證病名為何岐伯對曰病名陰陽交交者死也汗乃陰液外出於陽陽熱不從汗解復入之陰名曰陰陽交交者正不勝邪邪復傷正故死也帝曰願聞其説願聞陰陽交而致死之説岐伯曰人所以汗出者皆在於谷穀生於精今邪氣交爭於骨肉而得汗者是邪卻而精勝也精勝則當能食而不復熱復熱者邪氣也汗者精氣也今汗出而輒復熱者是邪勝也不能食者精無俾也病而留者其壽可立而傾也且夫熱論曰汗出而脈尚躁盛者死今脈不與汗相應此不勝其病也其死明矣狂言者是失志失志者死今見三死不見一生雖愈必死也胃腑水穀之精出而為汗故人所以汗出者皆生於穀之精今邪氣交爭於骨肉而得汗者是邪卻而穀精勝也精勝則當能食而不復熱復熱者邪氣也汗者穀精之氣也今汗出而輒復熱者是邪勝也能食則谷之精專補益經隧今不能食者精無俾也俾補益也不能食精無俾致熱病留而不去者其壽可立而傾也且夫靈樞熱病論曰汗出而脈尚躁盛者死今脈躁疾不與汗相應此正氣不勝其病也其死明矣狂言者是失腎臟之志神志相依失志則失神故失志者死夫不能食一死也汗出而脈躁疾二死也狂言失志三死也今見三死不見一生始之病溫雖愈亦必死也所以詳明陰陽交而致死之説也帝曰有病身熱汗出煩滿煩滿不為汗解此為何病承上文汗出復熱之死證復舉汗出煩滿之病以問之岐伯曰汗出而身熱者風也汗出而煩滿不解者厥也病名曰風厥風為陽邪性主開發凡汗出而身發熱者風也汗乃陰液外出於陽今汗出而心煩胸滿不解者乃陰竭陽虛不相交濟是為厥也此因風致汗因汗致厥病名曰風厥帝曰願卒聞之願盡聞風厥之義岐伯曰巨陽主氣故先受邪少陰與其為表裡也得熱則上從之從之則厥也通體之氣巨陽主之故先受邪巨陽主表少陰主裡故少陰與其為表裡也巨陽少陰相為表裡故巨陽得表熱之病則少陰里陰之氣上從之從之而加於陽則厥也帝曰治之奈何岐伯曰表裡刺之飲之服湯厥則外陽內陰不調和矣治之之法當表裡刺之和其外內飲之服湯調其陰陽此詳明熱病汗出煩滿而為風厥之變證也帝曰勞風為病何如勞煩勞也勞風煩勞內虛生風病也承上文風厥而問勞風亦熱病之變證也岐伯曰勞風法在肺下其為病也使人強上冥視唾出若涕惡風而振寒此為勞風之病強惡俱去聲肺下心也煩勞則傷心故勞風之病法在肺下心脈從心系上挾咽系目系病則不能挾咽系目故其為病也使人強上冥視火氣內炎故唾出若涕風淫經脈故惡風而振寒凡此皆為勞風之病帝曰治之奈何岐伯曰以救俯仰巨陽引精者三日中年者五日不精者七日咳出青黃涕其狀如膿大如彈丸從口中若鼻中出不出則傷肺傷肺則死也治之之法當調和經脈以救俯仰經脈調和則俯仰自如強上可愈巨陽之脈起於目內眥上額交巔從巔絡腦救其俯仰不使強上斯時巨陽能引精上行者三日而冥視愈中年精氣稍虛者五日而冥視愈老年不足於精者七日而冥視愈始則唾出若涕至此復咳出青黃涕其狀如膿大如彈丸從口中若鼻中出則病當愈若不能出則火熱傷肺傷肺則死此言勞風為病火氣盛而肺全傷則死也帝曰有病腎風者面胕龐然壅害於言可刺不龐音芒餘篇同不否同皮里肉外曰胕龐然腫貌氣道不利則壅害於言此腎風之病可刺治否心腎皆屬少陰承上文心病之勞風而復問腎風也岐伯曰虛不當刺不當刺而刺後五日其氣必至面胕腫而難言腎氣虛也虛不當刺不當刺而刺後五日其腎臟之氣必至而為病一日一臟五日之後復至其臟而發病也帝曰其至何如其氣至之病何如岐伯曰至必少氣時熱時熱從胸背上至頭汗出手熱口乾苦渴小便黃目下腫腹中鳴身重難以行月事不來煩而不能食不能正偃正偃則咳病名曰風水論在刺法中偃猶臥也腎為生氣之原氣至而病必少氣少氣則時熱其時熱也從胸背上至於頭經脈虛故汗出手熱津液虛故口乾苦渴氣不化故小便黃水道不利故目下腫腸胃虛寒故腹中鳴足膝不力故身重難以行任脈虛故月事不來土氣虛故煩不能食肺腎不交故不能正偃正偃則咳此腎風之病腎受風邪風行水渙故病名曰風水論在刺法中者水熱穴論云腎汗出逢於風傳為跗腫本之於腎名曰風水帝曰願聞其説帝欲詳明其義故下文岐伯一一以明之岐伯曰邪之所湊其氣必虛陰虛者陽必湊之故少氣時熱而汗出也申明少氣時熱汗出者凡邪之所湊其氣必虛如陰氣虛者陽必湊之故少氣時熱而汗出也小便黃者少腹中有熱也申明小便黃者膀胱之氣不合太陽而外出是少腹中有熱也不能正偃者胃中不和也正偃則咳甚上迫肺也申明不能正偃者乃胃中土氣不和也正偃則咳甚者腎邪上迫於肺也諸有水氣者微腫先見於目下也申明目下腫者凡諸有水氣者微腫先見於目下也帝曰何以言申明未盡故復探之岐伯曰水者陰也目下亦陰也腹者至明之所居故水在腹者必使目下腫也水者陰類也目下亦陰也脾為陰中之至陰而主腹是腹者至陰之所居故水在腹者必使目下腫也此復申明水氣之目下腫也真氣上逆故口苦舌乾口乾苦渴者口苦舌乾也津液內竭真臟之氣上逆故口苦舌乾此申明口乾苦渴之義也臥不得正偃正偃則咳出青水也諸水病者故不得臥臥則驚驚則咳甚也臥不能正偃者乃臥不得正偃正偃則咳者乃正偃則咳出青水也凡諸水病者水氣上逆故不得臥不但胃中不和也臥則驚驚則咳甚不但上迫肺也此復申明不能偃乃水氣上逆正偃則咳甚乃水氣凌心不但胃不和上迫肺也腹中鳴者病本於胃也腸胃居於腹中虛寒則鳴故腹中鳴者病本於胃也此申明腹中鳴之義也薄脾則煩不能食食不下者胃脘隔也脾脈從胃上膈注心中邪薄於脾則煩而不能食夫胃主納脾主運食不下者由於胃脘之阻隔也此申明煩不能食之義也身重難以行者胃脈在足也胃脈循脛下足身重難以行者由胃脈在足而胃之經脈虛也此申明身重難行之義也月事不來者胞脈閉也胞脈者屬心而絡於胞中今氣上迫肺心氣不得下通故月事不來也胞脈主衝任之血月事不來者乃胞脈閉也中焦取汁奉心化赤血歸胞中故胞脈者屬心而絡於胞中今水氣上迫肺心氣不得下通故月事不來也此申明月事不來之義也帝曰善衝脈任脈皆起於胞中循背裡散胸中會咽喉絡唇口淡滲皮膚行於周身月事不來由於胞脈之閉則熱從胸背上至頭手熱亦由胞脈之熱帝故善之不復問也逆調論第三十四篇調調和也逆調逆其寒熱水火榮衛之氣不調和也寒熱逆調則為煩為痹水火逆調則為肉爍為攣節榮衛逆調則為肉苛臟氣逆調則為息喘也黃帝問曰人身非常溫也非常熱也為之熱而煩滿者何也此承上篇之意而復問也上篇云有病溫者汗出輒復熱故問人身非常溫也非常熱也又云有病身熱汗出煩滿故問為之熱而煩滿者何也岐伯對曰陰氣少而陽氣勝故熱而煩滿也溫病熱病熱而煩滿皆由陰氣少而陽氣勝陰氣少故熱陽氣勝故熱而煩滿也溫熱無異故總答之帝曰人身非衣寒也中非有寒氣也寒從中生者何寒者熱之對故因熱而問寒人身非衣寒表無寒也中非有寒氣里無寒也寒從中生者寒氣從內而外出也岐伯曰是人多痹氣也陽氣少陰氣多故身寒如從水中出陽主熱陰主寒病在陰者名曰痹寒從中生是人多痹氣也多痹氣由於陽氣少陰氣多陽氣少故身寒陰氣多故身寒如從水中出此言寒熱逆調而為煩為痹也帝曰人有四肢熱逢風寒如炙如火者何也人身之熱逢風之寒則減人有四肢熱逢風之寒更如炙如火其熱不減其故何也岐伯曰是人者陰氣虛陽氣盛四肢者陽也兩陽相得而陰氣虛少少水不能滅盛火而陽獨治獨治者不能生長也獨勝而止耳逢風而如炙如火者是人當肉爍也長上聲下同熱者陽氣也是人有熱者乃陰氣虛陽氣盛身在內四肢在外故四肢者陽也以氣盛之陽合四肢之陽兩陽相得而陰氣虛少陽者火也陰者水也陰氣虛少則少水不能滅兩陽相得之盛火而陽獨治獨陽不生故獨治者不能生長也惟此獨勝而止耳獨勝而止肌肉如焚故逢風而如炙如火者是人當閃爍也帝曰人有身寒湯火不能熱厚衣不能溫然不凍栗是為何病人身之寒溫熱可愈有身寒而湯火不能熱厚衣不能溫寒之極矣然不凍栗是為何病亦因上文極熱而問極寒也岐伯曰是人者素腎氣勝以水為事太陽氣衰腎脂枯不長一水不能勝兩火腎者水也而生於骨腎不生則髓不滿故寒甚至骨也一水不能勝兩火七字在下誤重於此衍文也寒者陰氣也是人有寒者平素腎氣勝腎氣勝則以水為事以水為事故太陽陽氣衰太陽氣衰則為孤陰孤陰不長故腎脂枯不長夫腎者水也而精水生於骨腎脂枯不長則腎不生腎不生則骨髓不能滿故寒甚至於骨所以湯火不能熱厚衣不能溫也所以不能凍栗者肝一陽也心二陽也腎孤臟也一水不能勝二火故不能凍栗病名曰骨痹是人當攣節也寒甚至骨宜凍栗矣所以不能凍栗者腎水生肝木肝為陰中之陽故肝一陽也少陰合心火心為陽中之陽故心二陽也腎為陰中之陰故腎孤臟也一陽二陽火也孤髒水也今一水不能勝二火故雖寒甚至骨而不能冰栗也寒在於骨病名曰骨痹骨痹者骨節拘攣是人當攣節也此言水火逆調而獨陽不生則為閃爍孤陰不長則為攣節也帝曰人之肉苛者雖近衣絮猶尚苛也是謂何疾苛猶瘧也承上文寒熱之義言人有不因寒熱而肌肉如虐雖近衣絮尚不能和是謂何疾岐伯曰榮氣虛衛氣實也榮氣虛則不仁衛氣虛則不用榮衛俱虛則不仁且不用肉如故也人身與志不相有曰死榮衛之氣相將而行若榮氣虛則衛氣實也申明榮氣虛則不仁不仁不知痛癢也衛氣虛則不用不用不能轉舒也榮衛俱虛則不仁且不用而肉苛如故也人身榮衛與五臟之神志相依若人身與志不相有則形志相離故死此言榮衛逆調則為肉苛也帝曰人有逆氣不得臥而息有音者有不得臥而息無音者有起居如故而息有音者有得臥行而喘者有不得臥不能行而喘者有不得臥臥而喘者皆何臟使然願聞其故同是逆氣不得臥而息有音息無音則異同是息有音而起居如故與不得臥則異喘病相同有得臥行而喘有不得臥行而喘則異此臟氣逆調而息喘故問何臟使然岐伯曰不得臥而息有音者是陽明之逆也是三陽者下行今逆而上故息有音也陽明者胃脈也胃者六腑之海其氣亦下行陽明逆不得從其道故不得臥也本經曰胃不和則臥不安此之謂也本訛下今改不得臥而息有音者足陽明經脈之逆也足三陽之脈皆從頭走足故足三陽者下行今逆而上行故息有音也蓋陽明者胃脈也胃者六腑之海其氣亦下行今陽明氣逆不得從其下行之道故不得臥也評熱論云不能正偃者胃中不和也正偃安臥也舉本經之言而言胃不和則臥不安即此陽明逆不得從其道之謂也此申明不得臥而息有音也夫起居如故而息有音者此肺之絡脈逆也絡脈不得隨經上下故留經而不行絡脈之病人也微故起居如故而息有音也夫起居如故而息有音者此肺臟之絡脈逆也絡脈在外內通於經今絡脈不得隨經上下故肺氣留經而不行於絡絡脈在外病人也微病微故起居如故留經不行故息有音也此申明起居如故而息有音也夫不得臥臥則喘者是水氣之客也夫水者循津液而流也腎者水臟主津液主臥與喘也夫不得臥臥則喘者是水寒之氣客於肺也夫水者循腸胃之津液而流行也腎為水臟津液之主今水氣之客故主不得臥與喘也此申明不得臥臥而喘也帝曰善不得臥而息有音由於胃氣之逆則不得臥而息無音亦由胃氣之逆起居如故而息有音由於肺絡之逆則得臥行而喘亦由肺絡之逆不得臥臥而喘由於水氣之客則不得臥不能行而喘亦由水氣之客帝故默會其義而善之此言臟氣逆調則為息喘也
