body:
  text: 卷之一素問為黃帝內經本太素渾元之理闡天人合一之道謀諸岐伯開示諸臣雖岐伯之言居多而黃帝之問實啓之故後世以黃帝內經九卷稱為素問漢班固藝文志曰黃帝內經十八卷素問即其經之九卷也兼靈樞九卷乃其數焉上古天真論第一篇上古者黃帝之時追溯混沌初開鴻濛始闢也天真者天性自然之真毫無人欲之雜也帝欲壽天下之民故言上古之人春秋皆度百歲而今時之人不能也更欲昌天下之後故言人壽雖年老有子而今時之人又不能也終舉上古真人乃上古天真之人也中古至人能同於上古之真人者也其次有聖人其次有賢人能學中古之至人無愧於上古之真人故名上古天真論昔在黃帝生而神靈弱而能言幼而徇齊長而敦敏成而登天徇循同長上聲下仿此史臣敘黃帝素問而先為紀述之黃帝姓公孫有熊國君少典之子繼神農而有天下生於軒轅之丘故名軒轅以土德王天下故號黃帝在察也史臣追述而稽察之故曰昔在生而神靈度越凡流天授之聖人也弱而能言生而知之弱年即能立言也循順也齊正也幼而循齊年雖幼能順其正也敦誠信也敏通達也長而敦敏長則誠信通達垂拱致治教化大行也成而登天帝鑄鼎於鼎湖之山鼎成升仙群臣攀龍髯而莫及也乃問於天師曰余聞上古之人春秋皆度百歲而動作不衰今時之人年半百而動作皆衰者時世異耶人將失之耶岐伯為帝師故史臣稱為天師帝欲天下之人壽同上古故問上古之人春秋皆度百歲度越也年越百歲而動作且不衰今時之人年僅半百而動作皆衰者豈古今時世之異耶抑不得其道而人將失之耶岐伯對曰上古之人其知道者法於陰陽和於術數食飲有節起居有常不妄作勞故能形與神俱而盡終其天年度百歲乃去言非時世之異乃人自失其道也上古之人其知養生之道者能取法於天地之陰陽調和於五行之術數知陰陽術數之道則食飲有節起居有常以養其形不妄作勞以安其神故能形與神俱而盡終其天年此所以春秋皆度百歲乃去也今時之人不然也以酒為漿以妄為常醉以入房以欲竭其精以耗散其真不知持滿不時御神務快其心逆於生樂起居無節故半百而衰也樂音落下同餘篇仿此今時之人不知養生之道而且戕賊其生酒能亂性若以酒為漿則心不由理而以妄為常矣以酒為漿則身不由心而醉以入房矣醉以入房是以欲竭其精也以妄為常是以耗散其真也竭精耗真則不知持滿之道以養身不知隨時御神之法以養心但務快其心而其身則逆於生樂致起居無節不能形與神俱故年半百而動作皆衰也夫上古聖人之教下也皆謂之虛邪賊風避之有時恬惔虛無真氣從之精神內守病安從來惔憺同上古聖人恐人為外邪所侵故教下也凡四時不正之氣皆謂之虛邪賊風教其避之有時其心則恬憺虛無而本元之真氣從之不竭其精時御其神則精神內守外知所避內得其守病安從來是以志間而少欲心安而不懼形勞而不倦氣從以順各從其欲皆得所願故美其食任其服樂其俗高下不相慕其民故曰朴是以嗜欲不能勞其目淫邪不能惑其心愚智賢不肖不懼於物故合於道所以能年皆度百歲而動作不衰者以其德全不危也內得其守外知所避是以內則志間而少欲心安而不懼外則形勞而不倦內外安和故氣從以順各從其欲而皆得所願也故外則美其食任其服內則樂其俗高下不相慕上古之民不同於今日之民其民故曰朴夫美其食任其服是以嗜欲不能勞其目樂其俗是以淫邪不能惑其心高下不相慕是以愚智賢不肖不懼於物其民曰朴故合於養生自然之道所以上古之人能年皆度百歲而動作不衰者以其道合則德全而不致傾危也由是則非時世之異而人自失其道也此一節言形與神俱則內外安和道合德全而能壽也帝曰人年老而無子者材力盡耶將天數然也帝既欲壽天下之民更欲昌天下之後故問人年老而無子者自身之材力盡耶抑將天數拘限而然也岐伯曰女子七歲腎氣盛齒更髮長更平聲下同人之生子天數固有常期材力亦有定數天施地生在人則男施女生故先論女子女子起於七歲者偶得奇數陰中有陽也故女子七歲腎氣始盛五臟生成篇云腎之合骨也其榮發也齒者骨之餘腎氣盛故齒更髮長二七而天癸至任脈通太衝脈盛月事以時下故有子任脈之任平聲餘篇仿此天癸者男精女血天一所生之癸水也二七而天癸至則任脈通任脈通則太衝脈盛骨空論云任脈起於中極之下上關元是任脈合少陰也陰陽離合論云太衝之地名曰少陰是太衝亦合少陰也故任脈通太衝脈盛則少陰癸水之月事以時下月事時下腎氣勻調故有子言有子自二七始也三七腎氣平均故真牙生而長極平均平滿均調無太過無不及也腎氣平均故真牙生而長極齒根尖深者名牙牙之最後生者名真牙言七歲腎氣始盛至三七而充足也四七筋骨堅髮長極身體盛壯筋骨肝腎之所主也堅固足也肝腎固足故髮長極身體盛壯也言四七內堅固外充滿無以復加也五七陽明脈衰面始焦發始墜陽明之脈行於面衰則面始焦陽明多血多氣衰則血氣不充溢於毛竅故發始墜言四七血氣盛極至五七而始衰也六七三陽脈衰於上面皆焦發始白三陽太陽陽明少陽也三陽之脈皆起於面故脈衰於上始則面始焦者至此則皆焦矣始則發始墜者至此則始白矣言五七陽明脈衰至六七而三陽皆衰也七七任脈虛太衝脈衰少天癸竭地道不通故形壞而無子也二七而天癸至則任脈通太衝脈盛至七七而任脈虛太衝脈衰少是以天癸竭天癸之水行於地中水竭則地道不通不通故有形之經脈敗壞而無子也此女子天數有常期而材力有定數者如此丈夫八歲腎氣實髮長齒更男子起於八歲者奇得偶數陽中有陰也腎氣實者言八歲以前腎氣尚虛至此始實也腎合骨其榮發故髮長齒更二八腎氣盛天癸至精氣溢瀉陰陽和故能有子寫瀉同餘篇仿此二八腎氣盛者言八歲方實至二八而始盛也腎氣盛故天癸至天癸至則精氣滿溢而外瀉男女媾精故陰陽和而有子言男子二八始能有子也三八腎氣平均筋骨徑強故真牙生而長極腎氣平滿均調則精氣運行故筋骨徑強筋骨徑強故真牙生而長極言男子三八而腎氣衝和也四八筋骨隆盛肌肉滿壯三八筋骨徑強至四八則有餘而隆盛矣筋骨隆盛於內則肌肉亦滿壯於外男子腎氣至四八而內外有餘也五八腎氣衰發墜齒稿腎氣八歲始實四八盛極至五八而始衰腎氣實則髮長齒更腎氣衰則發墜齒稿自然之理也六八陽氣衰竭於上面焦髮鬢斑白五八衰在下之腎氣至六八則在上之陽氣亦衰竭矣蓋陽氣盛則其顏光毛髮長今陽氣衰竭於上故面焦髮鬢斑白七八肝氣衰筋不能動天癸竭精少腎臟衰形體皆竭藏作臟餘篇凡作臟者俱不釋如字則釋之肝氣衰者腎水不生肝木也肝衰則血不榮筋故筋不能動肝衰則天癸已竭男子之天癸精也天癸竭則精少精少則腎臟衰腎臟衰不但衰無形之氣有形之形體亦皆竭矣八八則齒髮去五八腎氣始衰則發墜齒稿至八八則齒髮離形體而去矣此男子天數有常期而材力有定數者如此腎者主水受五臟六腑之精而藏之故五臟盛乃能瀉今五臟皆衰筋骨解墜天癸盡矣故髮鬢白身體重行步不正而無子耳五藏臟同六府腑同餘篇臟腑俱仿此而臟之藏如字解墜同懈惰先天癸水籍後天水穀以生故腎者主水水癸水也受五臟六腑水穀所化之精而藏之於腎夫六腑之精歸於五臟五臟之精復歸於腎故必五臟盛精乃能瀉今五臟皆衰筋骨懈惰而天癸亦盡矣天癸盡於內故髮鬢白身體重行步不正見於外此其所以無子耳帝曰有其年已老而有子者何也上文論男女天癸之常以明今時不同於上古帝欲今時之人同於上古故問有其年已老而猶然有子者何也岐伯曰此其天壽過度氣脈常通而腎氣有餘也此雖有子男不過盡八八女不過盡七七而天地之精氣皆竭矣年老有子此其天壽過度七七八八不能限也其人必氣脈常通而腎氣有餘故老而有子也此雖有子非其常數若以常數論之男子天癸不過盡於八八女子天癸不過盡於七七而上天之氣下地之精皆竭矣帝曰夫道者年皆百數能有子乎道者百數有子女子不在其中上文年老有子亦但問男子岐伯兼論男女故帝復問也岐伯曰夫道者能卻老而全形身年雖壽能生子也形有盡道無窮夫道者自能卻老而全形天之常數不得限之故身年雖壽能生子也此一節言生子有常數惟道者能卻老全形雖壽而有子也黃帝曰余聞上古有真人者提挈天地把握陰陽呼吸精氣獨立守神肌肉若一故能壽敝天地無有終時此其道生道者百數有子惟古為然故曰余聞上古有真人者乃稟道之人也道居天地之上大道無形生育天地故其人能提挈天地大道無情運行日月故其人能把握陰陽呼吸而天地之精氣合故呼吸精氣獨立而天地之元神守故獨立守神真人肌肉之體與天地清寧之體無二故肌肉若一如是故能壽敝天地敝盡也壽盡天地則無有終時凡此皆其道之所生上古真人之稟道者如此中古之時有至人者淳德全道和於陰陽調於四時去世離俗積精全神遊行天地之間視聽八達之外此蓋益其壽命而強者也亦歸於真人至極也中古之時有至人者極盡人道以歸於真也淳德全道者淳其天性之德全其固有之道也和於陰陽調於四時者和調於天地陰陽之四時也去世離俗者身居世俗之內心超世俗之外也積精全神者精積而神全也能如是也故形體遊行於天地之間聰明視聽於八達之外此至人全道蓋益其壽命而自強者也其體亦歸於真人此中古至人歸真以合道者如此其次有聖人者處天地之和從八風之理適嗜欲於世俗之間無恚嗔之心行不欲離於世被服章舉不欲觀於俗外不勞形於事內無思想之患以恬愈為務以自得為功形體不敝精神不散亦可以百數恚音惠餘篇仿此聖人者先知先覺之人也真人居天地之上至人去世俗之間聖人則處天地之和從八風之理其居世俗之內也則適嗜欲於世俗之間而無恚嗔之心其行已也不欲自離於世亦被服而章服衣也章冠也其舉動也不欲觀於習俗故外不勞形於事內無思想之患內無思想則以恬愈為務外不勞形則以自得為功不勞形而自得則形體不敝敝壞也無思想而恬愈則精神不散散失也如此則壽亦可以百數是同於至人之益其壽命而強者矣此言聖人之同於至人者如此其次有賢人者法則天地象似日月辨列星辰逆從陰陽分別四時將從上古合同於道亦可使益壽而有極時別音逼賢人者則古稱先闡幽發微之人也法則天地者上法天下則地也日月星辰繫於天故象似日月辨列星辰象似者效像擬似辨列者分辨條列也陰陽四時徵於地故逆從陰陽分別四時逆迎也陰陽之變迎而從之四時之常分而別之如此則將從上古而合同於道能如是也亦可使益壽猶言亦可如至人而使益其壽命也而有極時者真人壽敝天地無有終時賢人則有極時此賢人學道亦可如聖人而幾於至人者如此此一節承上文道者年壽有子之意言上古真人能全道中古至人能全真聖人賢人全真以合道也四氣調神篇第二篇舊本誤傳大論今改正四氣調神者隨春夏秋冬四時之氣調肝心脾肺腎五臟之神志也君臣問答互相發明則曰論無君臣之問答則曰篇余皆仿此此篇乃黃帝繼上文而言之欲人四氣調神以全其天真也春三月此為發陳天地俱生萬物以榮為去聲下此為之為俱同春氣從陰而陽開發冬時閉藏之氣故此為發陳四時之氣天地主之至春則天地俱生盈天地之間者惟萬物天地俱生則萬物以榮夜臥早起廣步於庭被髮緩形以使志生生而勿殺豫而勿奪賞而勿罰此春氣之應養生之道也逆之則傷肝夏為寒變奉長者少豫輿同長上聲下同人體春時之氣而調神當夜臥早起以使其生廣步於庭以運其身步庭之時更當被髮緩形以使肝志內生志者神之所依也肝志內生故但生之而勿殺但豫之而勿奪但賞之而勿罰凡此皆所以逐其春生之氣故曰此春氣之應在人為養生之道也若逆之而不養其生則傷肝肝傷則春無以生故至夏有寒病之變而奉夏長者少是知調春生之氣乃為夏長之基夏三月此為蕃秀天地氣交萬物華實蕃蕃衍秀榮秀也夏時從生而長則蕃衍矣既長而盛則榮秀矣天地氣交者天氣盡施於地地氣盡騰於天萬物華實者華美成實也夜臥早起無厭於日使志無怒使華英成秀使氣得泄若所愛在外此夏氣之應養長之道也逆之則傷心秋為痎瘧奉收者少冬至重病痎音皆餘篇仿此人體夏時之氣而調神當夜臥早起以遂其長無厭於日以厲其心夏日最長而無厭則心氣清明故使心志無怒無怒平和也心志平和則凡華英者皆使之成秀矣華英成秀則氣機充溢故使氣得以疏泄若所愛在外者然凡此皆所以遂其夏長之氣故曰此夏氣之應在人為養長之道也若逆之而不養其長則傷心心傷則夏無以長故至秋有陰寒之痎瘧而奉收者少秋無以收冬何以藏故冬至重病是知養夏長之氣不但為秋收之基且為冬藏之本秋三月此為榮平天氣以急地氣以明夏時盛極秋氣舒緩其時則從容而平定也天氣以急肅殺將至也地氣以明草木將凋也早臥早起與雞俱興使志安寧以緩秋刑收斂神氣使秋氣平無外其志使肺氣清此秋氣之應養收之道也逆之則傷肺冬為飧泄奉藏者少飧音孫餘篇同藏如字下同人體秋時之氣而調神當早臥以寧早起以清與雞俱興者雞臥則臥雞起則起也早臥早起所以使肺志安寧以緩秋時之刑殺也收斂神氣使秋氣平者言使志安寧所以收斂神氣也以緩秋刑所以使秋氣平也是五臟之志即五臟之神矣無外其志使肺氣清者言收斂神氣乃無外其志也使秋氣平實使肺氣清也是五臟之神即五臟之志矣凡此皆所以遂其秋收之氣故曰此秋氣之應在人為養收之道也若逆之而不養其收則傷肺肺傷則秋無以收故冬為飧泄之病奉冬藏者少是知調秋收之氣乃為冬藏之基冬三月此為閉藏水冰地坼無擾乎陽坼音拆餘篇同閉閉塞藏伏藏也水冰水性至動凍而冰也地坼地體至厚裂而坼也無擾乎陽地氣固藏不騰於天也早臥晚起必待日光使志若伏若匿若有私意若己有得去寒就溫無泄皮膚使氣亟奪此冬氣之應養藏之道也逆之則傷腎春為痿厥奉生者少人體冬時之氣而調神當早臥晚起以避其寒必待日光以就其溫使腎志若伏若匿而退藏於密若有私意而不出諸口若己有得而不告諸人者然去寒就溫去戶外之寒以就深室之溫也無泄皮膚使氣亟奪無以寒風泄其皮膚使陽氣亟奪也凡此皆所以遂其冬藏之氣故曰此冬氣之應在人為養臟之道也若逆之而不養其臟則傷腎腎傷則冬無以藏故至春為痿厥之病而奉春生者少是知調冬藏之氣乃為春生之基此一節言隨四時之氣調五臟之神為生長收藏之先基也天氣清淨光明者也藏德不止故不下也四時之氣天氣主之天氣清淨言天純粹無為也光明者也言天覆照無私也天之內而清淨外而光明由於藏德不止藏德不止即天之所以調神故位極其高體隆於上而不下也天明則日月不明邪害空竅天德惟藏大明不明故有日焉為之明於晝有月焉為之明於夜使天自用其明則日月不明日月不明則四時不成邪害天地之空竅陽氣者閉塞地氣者冒明邪害天之空竅則所謂陽氣者閉塞於上而不下降矣邪害地之空竅則所謂地氣者昏冒其明而不上承矣雲霧不精則上應白露不下交通不表萬物命故不施不施則名木多死應平聲地氣上升則為雲霧天氣清明則有白露若地氣不升而云霧不精則上應白露不下矣精猶極也表四布也上下交通而四布則萬物秉命以施生若交通不表萬物命故不施而名木多死矣惡氣不發風雨不節白露不下則菀藁不榮菀音郁義通餘篇仿此惡氣不正之氣也發散發也惡氣不發則四時之風雨不節而清潔之白露不下凡草木皆菀藁不榮菀郁也藁枯也凡此皆閉塞冒明之所致也賊風數至暴雨數起天地四時不相保與道相失則未央絶滅數音朔夫名木多死菀藁不榮由於賊風數至暴雨數起致天地四時之氣失其常度故不相保而與道相失如是則天地之氣亦未央而絶滅矣央久也此天地失道而四時不成皆邪害空竅之所致也惟聖人從之故身無奇病萬物不失生氣不竭從之者處天地之和順四時之氣也惟聖人從之故養身則身無奇病治人則萬物不失生氣流行而不竭也逆春氣則少陽不生肝氣內變逆夏氣則太陽不長心氣內洞逆秋氣則太陰不收肺氣焦滿逆冬氣則少陰不藏腎氣獨沉凡少陽少陰之少去聲餘篇同從之則順反之則逆少陽主春生之氣逆春氣則少陽不生肝木王於春逆則肝氣內變太陽主夏長之氣逆夏氣則太陽不長心火王於夏逆則心氣內洞太陰主秋收之氣逆秋氣則太陰不收肺金王於秋逆則肺氣焦滿少陰主冬藏之氣逆冬氣則少陰不藏腎水王於冬逆則腎氣獨沉夫四時陰陽者萬物之根本也所以聖人春夏養陽秋冬養陰以從其根故與萬物浮沉於生長之門逆其根則伐其本壞其真矣夫四時之太少陰陽者乃萬物之根本也所以聖人春夏養陽使少陽之氣生太陽之氣長秋冬養陰使太陰之氣收少陰之氣藏養陽養陰以從其根故與萬物浮沉於生長不息之門若不能養而逆其根則伐其本且壞其真矣逆根伐本壞真不能浮沉於生長不息之門故陰陽四時者萬物之終始也死生之本也逆之則災害生從之則苛疾不起是謂得道四時之氣不外陰陽陰陽之氣徵於四時故陰陽四時者乃萬物之終而復始也終矣而始是死而復生之本也若逆之則災害生從之則苛疾不起從而不逆是謂得道之聖人道者聖人行之愚者佩之從陰陽則生逆之則死從之則治逆之則亂反順為逆是謂內格承上文得道而言道者聖人行之於先愚者佩之於後佩之而從陰陽則生不能佩而逆之則死從之則治所以生也逆之則亂所以死也從順也反順為逆則陰不交陽陽不交陰上下表里不通是謂內格是故聖人不治已病治未病不治已亂治未亂此之謂也夫病已成而後藥之亂已成而後治之譬猶渴而穿井鬥而鑄錐不亦晚乎聖人不治已病之候而治未病之先不治已亂之日而治未亂之時即此從之而不逆之之謂也若已病而後藥已亂而後治取而譬之不亦晚乎此一節言天藏德而四時成聖人從之所以調神而全真也生氣通天論第三篇生氣通天者人身陰陽五行之氣生生不已上通於天也氣為陽主生故帝論陽氣內藏則承上衛外可以上通於天伯謂陽主外陰主內陽外而復祕密陰內而能起亟則精固於內氣立於外可以上通於天長有天命故名生氣通天論黃帝曰夫自古通天昔生之本本於陰陽天地之間六合之內其氣九州九竅五臟十二節皆通乎天氣帝論人之生氣上通於天追溯孕含未剖太虛寥廓之時故曰自古通天者乃有生之本本於人身之陰陽凡天地之間六合之內其地氣之九州人氣之九竅五臟十二節皆通乎天氣此生氣之所以通天也六合四方上下也九州冀兗青徐梁荊雍豫楊也九竅兩目兩耳兩鼻口前後陰也五臟肝心脾肺腎也十二節兩手兩肘兩臂兩足兩膕兩髀皆神氣之遊行出入也其生五其氣三數犯此者則邪氣傷人此壽命之本也數音朔凡人之生各具五行故其生五五行之理通貫三才故其氣三人之一身三才具備以人身三才之氣數犯此五行者則木有風邪火有熱邪土有濕邪金有燥邪水有寒邪故邪氣傷人邪氣傷人壽命不保此生五氣三乃人身壽命之本也蒼天之氣清淨則志意治順之則陽氣固雖有賊邪弗能害也此因時之序故聖人傳精神服天氣而通神明失之則內閉九竅外壅肌肉衛氣散解此謂自傷氣之削也散上聲解作懈下同清淨者蒼天之氣也天氣清淨則人之志意亦治是天氣之通於人也順之者順此清淨之氣也故順之則陽氣外固雖有賊邪弗能害也所謂順之者此因時之序言因四時之次序而清淨也惟聖人能順之故聖人傳精神所謂傳精神者乃服天清淨之氣而通吾身之神明若人不能順而失之則陽氣不從內以達外故內閉九竅外雍肌肉不從肌肉而充皮膚故衛氣散解此人不服天氣謂之自傷陽氣不固故曰氣之削也陽氣者若天與日失其所則折壽而不彰人身陽氣如天如日蓋運行通體之陽氣若天旋轉經脈之陽氣若日也通體之氣經脈之氣各有其所若失其所則運行者不周於通體施轉者不循於經脈故短折其壽而不彰著於人世矣故天運當以日光明是故陽因而上衛外者也天氣清淨明德惟藏故天之默運於上也當以日光明是故人身之陽氣因之而上陽因而上其體如天衛外者也其體如日此陽氣之若天與日也因於寒欲如運樞起居如驚神氣乃浮清淨之氣天人之正氣也寒暑燥火濕風之氣天人之淫氣也若因於寒則欲如運樞運樞者寒邪卒至則起居如驚神氣乃外浮以應之也由是而知因於寒乃陽因而上也欲如運樞衛外者也因於暑汗煩則喘喝靜則多言體若燔炭汗出而散若因於暑夏月皮毛開發故汗煩則喘喝暑邪傷陽也靜則多言暑邪傷陰也若傷暑無汗則病燥火之氣故體若燔炭燔炭燥火也故必汗出而散言陰液出於皮毛則暑邪燥火始散由是而知因於暑乃陽因而上也汗出而散衛外者也因於濕首如裹濕熱不攘大筋緛短小筋弛長緛短為拘弛長為痿緛軟同全篇仿此若因於濕濕氣重著故首如裹陽熱之氣逢濕則滯故濕熱不攘不攘者不外拒於皮毛不如因寒之乃浮不如因暑之汗出也濕傷肌肉不從肌肉而外出則內入於筋骨之間故大筋緛弱而短小筋弛縱而長大筋連於骨內緛短則屈而不伸故緛短為拘拘攣也小筋絡於骨外弛長則伸而不屈故弛長為痿痿痿痹也此陽因而上濕熱不攘不能衛外者也因於氣為腫四維相代陽氣乃竭氣猶風也陰陽應象大論云陽之氣以天地之疾風名之故不言風而言氣因於氣為腫者風淫末疾四肢腫也四維相代者四肢行動不能彼此借力而相代也四肢者諸陽之本今四維相代則陽氣乃竭此陽因而上陽氣竭而不能衛外者也陽氣者煩勞則張精絶闢積於夏使人煎厥目盲不可以視耳閉不可以聽潰潰乎若壞都汩汩乎不可止汩音骨餘篇同陽氣者由內而外根於陰精如煩勞則陽氣外張陰精內絶陰不交陽故精絶闢積重復也闢積於夏者冬時受病病不能愈重復時日至於夏也夏月火盛內亡其精故使人煎厥煎厥如火之焚而熱極也精氣不注於目故目盲不可以視精氣不充於耳故耳閉不可以聽潰潰亂貌潰潰乎若壞都言耳目昏亂神失其守若國都之敗壞也汩汩流貌汩汩乎不可止言神氣散馳流而不返不可挽回而止之也此煩勞傷精而神氣內亂也陽氣者大怒則形氣絶而血菀於上使人薄厥有傷筋縱其若不容陽氣者自下而上本於陰血如大怒則逆氣上形形者悻悻然見於其面也氣絶者怒則氣上不接於下也血隨氣行氣逆則血鬱於上氣血皆逆則使人薄厥薄厥虛極而厥逆也血不養筋則有傷於筋筋傷則縱所謂縱者轉動不能其若不容者然此大怒氣逆而血不榮筋也汗出偏沮使人偏枯汗出見濕乃生痤痱高梁之變足生大疔受如持虛勞汗當風寒薄為皶郁乃痤痤坐平聲高梁即膏梁餘篇同皶音渣沮猶濕也陽氣內通精血復從中土而外出於皮膚故假汗出膏梁以明之汗者水穀之精從內出外若汗出偏沮則氣血不周於身故使人偏枯若夏日汗出而見水濕之氣則皮膚濕熱生癤如痤生疹如痱若膏梁厚味傷其中土因膏梁而變病則足生大疔受如持虛言疔從內以出外如持虛器而受毒也若勞碌汗出而當風風寒氣也故寒薄為皶郁乃痤言寒薄於皮膚而上行則為皶皶赤鼻也寒鬱於皮膚而外泄則為痤痤小癤也此言陽氣加陰乃為汗從中土而外出於皮膚也陽氣者精則養神柔則養筋精精粹也柔柔和也上文煩勞精絶至目盲耳閉而神氣散亂故曰陽氣者精則養神所以申明上文陽氣不精而神無所養也上文大怒氣絶至血菀而傷筋故曰陽氣者柔則養筋所以申明上文陽氣不柔而筋無所養也開闔不得寒氣從之乃生大僂陷脈為瘻留連肉腠俞氣化薄傳為善畏及為驚駭榮氣不從逆於肉理乃生癰腫魄汗未盡形弱而氣爍穴俞以閉發為風瘧俞音輸餘篇同上文假汗出膏梁以明陽氣從中土而出於皮膚此假開闔以明陽氣由闔而開由開而闔不但從內以出外也開闔者外內之樞機開則外出闔則內入今開闔不得則太陽之寒氣從之背為陽主開腹為陰主闔開闔不得寒氣從之則背突胸窩乃生大僂僂傴僂也此言陽氣之不能開闔也陷脈為瘻留連肉腠言寒邪陷於脈則肉腠或空或突而如嶁留連肉腠而難愈也俞氣化薄言寒邪入於穴俞則俞氣變化而內薄薄泊也傳為善畏及為驚駭言薄心氣則善畏薄肝氣則驚駭也榮氣不從逆於肉理乃生癰腫言寒邪入於肉則榮血之氣不從肌肉以外出但逆於肉理而生癰腫也此陽氣不能由闔而開也魄汗未盡陽氣外虛也形弱而氣爍形體虛弱而熱氣外爍也穴俞以閉不能內入也身汗而熱內外不和故發為風瘧此陽氣不能由開而闔也上文言陽氣外出於皮膚此言陽氣更從內以出外從外以入內所以承上文而補其未盡之義也故風者百病之始也清靜則肉腠閉拒雖有大風苛毒弗之能害此因時之序也故病久則傳化上下不並良醫弗為承上文風瘧之意言風為百病之始宜順天時而避之也六淫之氣風居其首故風者百病之始也身心清靜則肉腠閉拒雖有大風苛毒弗之能害此因四時之序也若不因時序受大風苛毒而為病必至從表入里由淺入深故病久則傳化傳化傳經變化也病久傳化則上下陰陽不相交併雖有良醫弗能為也故陽蓄積病死而陽氣當隔隔者當瀉不亟正治粗乃敗之病久傳化其所由來者漸矣故陽蓄積病死言亢陽蓄積至病久弗為而死也而陽氣當隔言亢陽之氣當與腑臟相隔也申明當隔者若既病則當瀉苟不亟瀉而正治之猶粗工之敗乃事不得云良醫弗為也故陽氣者一日而主外平旦人氣生日中而陽氣隆日西而陽氣已虛氣門乃收是故暮而閉拒無擾筋骨無見霧露反此三時形乃困薄舊本收訛閉閉訛收今改正治於既病之後不若順於未病之先故陽氣者一日而主外一日三時人身陽氣之所主也平旦人氣生寅卯辰平旦之時主人身春生之氣也日中陽氣隆己午末日中之時主人身夏長之氣也日西陽氣已虛氣門乃收申酉戌日西之時主人身秋收之氣也是故暮而閉拒亥子醜暮夜之時主人身冬藏之氣也暮夜閉拒當無擾筋骨無見霧露安靜以養微陽若不安靜反如平旦日中日西三時之動作則形乃困頓虛薄而為病所以教人因時序而養陽氣者如此此一節論陽氣之內外出入以明生陽之氣上通於天也岐伯曰陰者藏精而起亟也陽者衛外而為固也藏如字亟去聲陽生於陰由靜而動故岐伯曰陰者藏精而起亟也精藏於陰而起亟陰中有陽矣陽者衛外而為固也陽衛外為陰之固陽中有陰矣陰不勝其陽則脈流薄疾並乃狂薄虛疾急也陰不勝其陽陽熱盛也陽熱盛則經脈流行虛薄急疾經脈薄疾陽熱相併則並乃狂陽不勝其陰則五臟氣爭九竅不通陽不勝其陰陰寒盛也陰寒盛則五臟氣爭爭彼此不和也五臟氣爭則九竅不通蓋兩目者肝之竅兩耳者心之竅兩鼻者肺之竅口者脾之竅前後陰者腎之竅也是以聖人陳陰陽筋脈和同骨髓堅固氣血皆從如是則內外調和邪不能害耳目聰明氣立如故陳敷布也上文陰陽不和而為病是以聖人敷布陰陽使周身之筋脈合同通體之骨髓堅固陽主之氣陰主之血皆順而從之能如是也則內外調和而邪不能害邪不能害則耳目聰明而氣立如故五常政大論云根於外者命曰氣立氣立如故可以防禦其外邪矣風客淫氣精乃亡邪傷肝也因而飽食筋脈橫解腸澼為痔因而大飲則氣逆因而強力腎氣乃傷高骨乃壞強腔上聲氣立不如故不能防禦其邪則風客淫氣言風邪客於人身而為淫亂之氣也風為陽邪風客淫氣則陰精消爍故精乃亡風木之邪內通於肝故邪傷肝也因而飽食者風邪未去而飽食也筋脈橫解者肝主之筋心主之脈不循經上下而橫散懈弛也經脈別論云食氣入於胃散精於肝淫氣於筋食氣入胃濁氣歸心淫精於脈故飽食而筋脈橫懈也腸澼為痔者水穀之精不榮筋脈大腸積澼濕熱下注而為痔也因而大飲風邪未去而過飲也酒氣先行肺主之皮毛不由脾氣之散精脾肺不交則氣逆也因而強力風邪未去而強用其力也過勞傷精故腎氣乃傷腎主骨故高骨乃壞腰高之骨不能動搖而敗壞也此風木之邪始傷肝氣因飽食大飲強力而病及五臟也凡陰陽之要陽密乃固上文云陽者衛外而為固故復言凡陰陽之要陽密乃固言陽雖衛外復當藏密乃能為陰之固也兩者不和若春無秋若冬無夏上文言陰不勝其陽又言陽不勝其陰故復言兩者不和如陰不勝其陽而陽氣勝若春無秋矣陽不勝其陰而陰氣勝若冬無夏矣因而和之是謂聖度上文云聖人陳陰陽內外調和故復言因而和之是謂聖度故陽強不能密陰氣乃絶上文云陰者藏精而起亟故復言若陽強不能密則陰亦不能藏精起亟而陰氣乃絶陰平陽祕精神乃治陰陽離決精氣乃絶是必陰平和陽祕密則精神乃治若陰不平和陽不祕密而陰陽離決則精氣乃絶既言陰氣乃絶又言精氣乃絶者所以申明陰不藏精而皆絶也因於露風乃生寒熱上文云風客淫氣故復言因於露風乃生寒熱寒熱淫氣也是以春傷於風邪氣留連乃為洞泄夏傷於暑秋為痎瘧秋傷於濕上逆而咳發為痿厥冬傷於寒春必溫病四時之氣更傷五臟上文風邪傷肝而病五臟此復言春傷於風邪氣留連至夏乃為洞泄夏傷於暑至秋乃為痎瘧秋傷於濕病肺則上逆而咳病脾則發為痿厥痿痿躄厥厥逆也冬傷於寒至春必為溫病春夏秋冬五臟之所主也故四時之氣更傷五臟不必飽食大飲強力始傷五臟之氣所以申明上文之意者如此陰之所生本在五味陰之五宮傷在五味承四時傷五臟之意言五味亦傷五臟也五臟為陰借五味以資生故陰之所生本在五味五臟為陰五味各走其道太過則病故陰之五宮傷在五味如水能浮舟亦能覆舟也是故味過於酸肝氣以津脾氣乃絶酸者肝之味過酸則肝氣以津肝氣以津肝木盛也肝木盛則脾土受制故脾氣乃絶是酸味生肝太過則傷脾矣味過於咸大骨氣勞短肌心氣抑咸者腎之味腎主骨過咸則大骨氣勞大骨腰高之骨腎之府也氣勞骨氣強盛能任其勞也短肌心氣抑者腎水盛則心火受制心氣不能從骨節而出於肌表故短肌心氣抑是鹹味生腎太過則傷心矣味過於甘心氣喘滿色黑腎氣不衡甘者土之味脾胃之所主也過甘則土氣盛而水受制水虛不能制火故心氣喘滿水受土製故色黑腎氣不衡衡平也是甘味生脾太過則傷腎矣味過於苦脾氣不濡胃氣乃厚苦者心之味過苦則火克肺金肺者天也脾者地也天氣不降則地氣不升故脾氣不濡濡灌溉也脾為濕土胃為燥土兩土相濟今脾氣不濡則胃氣過燥故胃氣乃厚厚燥實也是苦味生心太過則肺金受制不與地氣相交矣味過於辛筋脈沮弛精神乃央沮作阻央作殃辛者肺之味過辛則肝木受制不生心火故筋脈阻弛筋者肝所主脈者心所主也筋脈阻弛則陰精不濡於筋神氣不充於脈故精神乃殃是辛味生肺太過則傷肝矣是故謹和五味骨正筋柔氣血以流腠理以密如是則骨氣以精謹道如法長有天命五味貴得其平不可太過是故謹和五味得其平矣五味合五臟五味和則腎主之骨以正肝主之筋以柔肺主之氣心主之血以流脾主之腠理以密誠如是也則有形之骨無形之氣皆以精粹可謂謹道如法生氣通天而長有天命矣此一節言生陽之氣本於陰精互相資益以明陰陽之氣皆為生氣可以上通於天也金匱真言論第四篇金匱藏書之器也真言至真不易之言也天之陰陽四時合人之陰陽臟腑人之五臟五行合天地之五方五色五穀五味五星五音五畜五臭各有收受三才合一至真不易然此真言者非其人勿教非其真勿授藏之心意不可輕泄猶以此言藏之金匱者然故曰金匱真言也黃帝問曰天有八風經有五風何謂天有八風四方四隅之風也經有五風人身經俞五臟之風也帝欲詳明天人相應之理故有是問岐伯對曰八風發邪以為經風觸五臟邪氣發病八風發邪天之八風發為邪氣也以為經風觸五臟八風之邪以為人身經俞之風更觸人之五臟也邪氣發病邪風之氣傷人則發而為病也所謂得四時之勝者春勝長夏長夏勝冬冬勝夏夏勝秋秋勝春所謂四時之勝也邪氣發病是以勝相加所謂得四時之勝者春勝長夏木勝土也長夏勝冬土勝水也冬勝夏水勝火也夏勝秋火勝金也秋勝春金勝木也所謂四時之勝而發病也是知邪氣發病乃以勝相加矣東風生於春病在肝俞在頸項所謂八風發邪以為經風觸五臟而有四時之勝者如東風生於春即八風發邪而有四時之勝也病在肝觸五臟也俞在頸項以為經風也南風生於夏病在心俞在胸脅南風生於夏八風發邪而有四時之勝也病在心觸五臟也俞在胸脅以為經風也西風生於秋病在肺俞在肩背西風生於秋八風發邪而有四時之勝也病在肺觸五臟也俞在肩背以為經風也北風生於冬病在腎俞在腰股北風生於冬八風發邪而有四時之勝也病在腎觸五臟也俞在腰股以為經風也中央為土病在脾俞在脊中央為土以應四隅亦八風發邪而有四時之勝也病在脾觸五臟也俞在脊以為經風也此言八風發邪則有四時之勝觸五臟而為經風者如此故春氣者病在頭所謂俞者乃人身之經俞非五臟之穴俞上文云春俞在頸項故春氣者病在頭頭連頸項也夏氣者病在臟夏俞在胸脅故夏氣者病在臟臟者藏也藏於胸脅之內也秋氣者病在肩背秋俞在肩背故秋氣者病在肩背冬氣者病在四肢支肢同餘篇仿此冬俞在腰股故冬氣者病在四肢腰連於股股屬四肢也故春善病鼽衄鼽音求衄音忸今訛衄非餘篇仿此春病在頭俞在頸項故春善病鼽衄鼽鼻清水也衄鼻血也仲夏善病胸脅夏病在臟俞在胸脅故仲夏善病胸脅言仲夏所以別長夏也長夏善病洞泄寒中長夏屬土病在脾俞在脊故長夏善病洞泄寒中洞泄脾虛也寒中脊虛也秋善病風瘧秋病肩背俞在肩背故秋善病風瘧風瘧者寒栗而肩背振動也冬善病痹厥冬病四肢俞在腰股故冬善病痹厥痹厥者四肢腰股行動不能痿痹厥逆也此舉四時之病而在於經俞也故冬不按蹺春不鼽衄四時之氣春生冬藏故冬不按蹺則冬藏而經俞不虛是以春不病鼽衄春不鼽衄冬藏之力也春不病頸項仲夏不病胸脅長夏不病洞泄寒中秋不病風瘧冬不病痹厥飧泄而汗出也春不病頸項則春生而經俞不虛故仲夏不病胸脅長夏不病洞泄寒中秋不病風瘧冬不病痹厥並不飧泄而汗出也夫冬令屬水不但不病痹厥且不飧泄而汗出所以申明水王於冬其時無病更宜藏也夫精者身之本也故藏於精者春不病溫藏如字下藏精末藏之俱同精者水之類承上文不飧泄汗出之意而言精者身之本也故冬藏於精者春不病溫所以申明四時之氣而重其冬也夏暑汗不出者秋成風瘧上文言春不病頸項則夏秋冬皆無病此復言若夏暑納涼而汗不出者至秋亦成風瘧所以承上文而補其未盡之義此平人脈法也此冬藏春生四時無病乃平人脈法也故曰陰中有陰陽中有陽平人脈法不離陰陽陰陽之理無有窮盡故曰陰中有陰陽中有陽平旦至日中天之陽陽中之陽也日中至黃昏天之陽陽中之陰也合夜至雞鳴天之陰陰中之陰也雞鳴至平旦天之陰陰中之陽也所謂陽中有陽者平旦至日中天之陽陽中之陽也陽極而陰生故日中至黃昏亦天之陽乃陽中之陰也所謂陰中有陰者合夜至雞鳴天之陰陰中之陰也陰極而陽生故雞鳴至平旦亦天之陰乃陰中之陽也故人亦應之天之陰陽即人之陰陽天之四時即人之四時故人亦應之夫言人之陰陽則外為陽內為陰言人身之陰陽則背為陽腹為陰言人身之臟腑中陰陽則臟者為陰腑者為陽肝心脾肺腎五臟皆為陰膽胃大腸小腸膀胱三焦六腑皆為陽人應之則可言人之陰陽矣夫言人之陰陽則外為陽內為陰言人身之陰陽則背為陽腹為陰言人身之臟腑中陰陽則臟者為陰腑者為陽臟者為陰五臟是也故肝心脾肺腎皆為陰腑者為陽六腑是也故膽胃大腸小腸膀胱三焦皆為陽所以欲知陰中之陰陽中之陽者何也上文言人身之陰陽未言陰中之陰陽中之陽故復明之為冬病在陰夏病在陽為去聲冬病在陰腎也下文云陰中之陰腎也夏病在陽心也下文雲陽中之陽心也知冬病在陰夏病在陽則知陰中之陰陽中之陽矣春病在陰秋病在陽春病在陰肝也下文云陰中之陽肝也秋病在陽肺也下文雲陽中之陰肺也肝為陰中之陽但曰在陰所以明陰中之陽也肺為陽中之陰但曰在陽所以明陽中之陰也知春病在陰秋病在陽則知陰中之陽陽中之陰矣皆視其所在為施針石也凡此冬病夏病春病秋病皆當視其陰陽之所在為施針石之治也故背為陽陽中之陽心也背為陽陽中之陰肺也人身背陽腹陰故背為陽而陽中之陽心也背為陽而陽中之陰肺也心肺位居膈上皆屬乎陽而有分別也腹為陰陰中之陰腎也腹為陰陰中之陽肝也腹為陰陰中之至陰脾也腹為陰而陰中之陰腎也腹為陰而陰中之陽肝也腹為陰而陰中之至陰脾也腎肝脾位居膈下皆屬乎陰而有分別也此皆陰陽表裡內外雌雄相輸應也五臟合六腑故曰此皆陰陽表裡內外雌雄相輸應也故以應天之陰陽也天之陰陽人亦應之此言人之陰陽故以應天之陰陽也帝曰五臟應四時各有收受乎承上文天人相應之意問人之五臟應天之四時各有收受之理乎岐伯曰有東方青色入通於肝開竅於目藏精於肝其病發驚駭其味酸其類草木其畜雞其穀麥其應四時上為歲星是以春氣在頭也其音角其數八是以知病之在筋也其臭臊東方青色入通於肝是五方五色收受於人之五臟矣故肝開竅於目而目復藏精於肝其病發驚駭春時陽氣上升也其味酸曲直作酸東方木味也其類草木與地之草木同類也其畜雞巽為雞東方木畜也其穀麥麥生於春五穀之長肝之谷也其應四時上為歲星木之精氣上為歲星也是以春氣在頭而居上也其音角木音也其數八木之成數也肝主筋是以知病之在筋也其臭臊氣因木變則為臊也此天地之五方五色五味五畜五穀五星五音五臭而收受於人之肝臟也南方赤色入通於心開竅於耳藏精於心故病在五臟其味苦其類火其畜羊其谷黍其應四時上為熒惑星是以知病之在脈也其音徵其數七其臭焦徵音止餘篇同南方赤色入通於心心屬火受南方之赤色也開竅於耳藏精於心心開竅於耳而耳復藏精於心也心為君主神通五臟故病在五臟其味苦炎上作苦火之味也其類火與有形之火同類也其畜羊羊性內剛火之畜也其谷黍黍色赤性溫心之谷也其應四時上為熒惑星火之精氣上為熒惑星也心主脈是以知病之在脈也其音徵火音也其數七火之成數也其臭焦氣因火變則為焦也此天地之五方五色五味五畜五穀五星五音五臭而收受於人之心臟也中央黃色入通於脾開竅於口藏精於脾故病在舌本其味甘其類土其畜牛其谷稷其應四時上為鎮星是以知病之在肉也其音宮其數五其臭香中央黃色入通於脾脾屬土受中央之黃色也開竅於口藏精於脾脾開竅於口而口復藏精於脾也脾脈連舌本靈樞經脈論云脾是動則病舌本強故病在舌本其味甘土之味也其類土與有形之土同類也其畜牛坤為牛土之畜也其谷稷稷色黃味甘脾之谷也其應四時上為鎮星土之精氣上為鎮星也脾主肉是以知病之在肉也其音宮土音也其數五土之生數也其臭香氣因土變則為香也此天地之五方五色五味五畜五穀五星五音五臭而收受於人之脾臟也西方白色入通於肺開竅於鼻藏精於肺故病在背其味辛其類金其畜馬其谷稻其應四時上為太白星是以知病之在皮毛也其音商其數九其臭腥西方白色入通於肺肺屬金受西方之白色也開竅於鼻藏精於肺肺開竅於鼻而鼻復藏精於肺也肺主氣氣為陽背亦為陽靈樞經脈論云氣盛有餘則肩背痛故病在背其味辛從革作辛金之味也其類金與有形之金同類也其畜馬乾為馬金之畜也其谷稻稻色白而秋成肺之谷也其應四時上為太白星金之精氣上為太白星也肺主皮毛是以知病之在皮毛也其音商金音也其數九金之成數也其臭腥氣因金變則為腥也此天地之五方五色五味五畜五穀五星五音五臭而收受於人之肺臟也北方黑色入通於腎開竅於二陰藏精於腎故病在溪其味鹹其類水其畜彘其谷豆其應四時上為辰星是以知病之在骨也其音羽其數六其臭腐北方黑色入通於腎腎屬水受北方之黑色也開竅於二陰藏精於腎腎開竅於前後二陰前後二陰復藏精於腎也腎主骨骨連溪溪者肉之小會而近於骨故病在溪其味鹹潤下作咸水之味也其類水與有形之水同類也其畜彘彘黑色而支亥水之畜也其谷豆豆性沉形象腎腎之谷也其應四時上為辰星水之精氣上為辰星也腎主骨是以知病之在骨也其音羽水音也其數六水之成數也其臭腐氣因水變則為腐也此天地之五方五色五味五畜五穀五星五音五臭而收受於人之腎臟也此五臟應四時各有收受也故善為脈者謹察五臟六腑一逆一從陰陽表裡雌雄之紀藏之心意合心於精非其人勿教非其真勿授是謂得道經脈之道內通臟腑故善為脈者謹察五臟六腑臟腑之氣俱見於脈一逆一從診脈法也由舉而按是為逆從按而舉是為從逆從而謹察之則臟腑陰陽表裡雌雄相應之紀衆人不知己獨知之可以藏之心意而合心於精藏之心意謂其理至微難以語人也合心於精謂藏之心意合心而歸於精密也非其人勿教人難得也非其真勿授真難遇也得人得真自古難之勿教勿授自古祕之金匱真言此之謂也陰陽應象大論第五篇陰陽者太極初開始為一晝之所分也應象者天地之陰陽人身之陰陽皆有形象之可應也天地之陰陽應象於人身人身之陰陽應象於天地五運五行應象無方此篇為五運行大論之提綱故曰陰陽應象大論黃帝曰陰陽者天地之道也陰陽者有名無形本於太極乃上天下地之道也萬物之綱紀天地之大萬物生焉故陰陽者乃萬物之綱紀綱大綱紀散紀也變化之父母萬物之多變化出焉物極謂之變物生謂之化變者化之漸化者變之成變化之道本於陰陽故陰陽者變化之父母生殺之本始變化之父母即生殺之本始殺猶死也化則生變則死本始父母之謂也神明之府也陰陽主萬物變化生殺是神明之府也陰陽不測之謂神陰陽昭著之謂明府者神明之所居也治病必求於本神明所居乃陰陽之本故治病必求於本如陰陽反作病之逆從必求於本之所在而治之故積陽為天積陰為地陰陽者天地之道也故積陽為天積陰為地陰靜陽躁陰陽者萬物之綱紀故陰靜陽躁靜而有常則為綱躁而散殊則為紀陽生陰長陽殺陰藏長上聲下同藏如字下收藏同陰陽者生殺之本始故陽生而陰長陽殺而陰藏陽化氣陰成形陰陽者變化之父母故陽化氣陰成形言陽化而為氣陰變而成形寒極生熱熱極生寒寒氣生濁熱氣生清清氣在下則生飧泄濁氣在上則生䐜脹此陰陽反作病之逆從也䐜音真餘篇仿此治病必求於本故寒極生熱是熱之本於寒也熱極生寒是寒之本於熱也寒氣為陰故生濁熱氣為陽故生清清氣在下則生飧泄言輕清之氣不從於上而逆於下則生飧泄之病矣濁氣在上則生䐜脹言重濁之氣不從於下而逆於上則生䐜脹之病矣是陰陽相反從逆失宜故曰此陰陽反作病之逆從也知反作逆從而為病則治病必求於本矣故清陽為天濁陰為地地氣上為云天氣下為雨雨出地氣云出天氣故清陽出上竅濁陰出下竅清陽發腠理濁陰走五臟清陽實四肢濁陰歸六腑陰陽相通上下相感是神明之府也故清陽為天光明者也濁陰為地神變者也地氣上為云陰通於陽也天氣下為雨陽通於陰也天氣下為雨而曰雨出地氣從下而上然後從上而下也地氣上為云而曰云出天氣自上而下然後自下而上也陰陽上下既神且明故清陽出上竅濁陰出下竅是九竅神明之府也清陽發腠理濁陰走五臟是外內神明之府也清陽實四肢濁陰歸六腑是表裡神明之府也下文云清陽上天濁陰歸地天地之動靜神明為之綱紀此之謂也此寒熱清濁之陰陽而應象於人身之上下者如此水為陰火為陽陽為氣陰為味在天為寒在地為水故水為陰在天為熱在地為火故火為陽陽主輕清故陽為氣陰主重濁故陰為味味歸形形歸氣氣歸精精歸化味歸形五味歸於形藏也形歸氣形藏歸於陽氣也氣歸精陽氣歸於陰精也精歸化陰精歸於變化也精食氣形食味化生精氣生形申明氣歸精乃精食氣也味歸形乃形食味也精歸化者化生精也形歸氣者氣生形也味傷形氣傷精精化為氣氣傷於味又申明形雖食味而味亦傷形精雖食氣而氣亦傷精雖氣化生精而精化亦為氣雖氣生此形而氣亦受傷於形形者味也不言形而言味者以味歸形形食味也陰味出下竅陽氣出上竅味為陰而重濁故出下竅氣為陽而輕清故出上竅味厚者為陰薄為陰之陽氣厚者為陽薄為陽之陰味為陰而陰中有陽故味厚者為陰若味薄則為陰中之陽氣為陽而陽中有陰故氣厚者為陽若氣薄則為陽中之陰味厚則泄薄則通氣薄則發泄厚則發熱申明味厚為陰者味厚則下泄也薄為陰之陽者味薄則宣通也氣薄陽之陰者氣薄則發泄言雖發散仍下泄也氣厚為陽者厚則發熱言既發散且溫熱也壯火之氣衰少火之氣壯壯火食氣氣食少火壯火散氣少火生氣少去聲陰陽氣味貴得其平壯火亢盛之火即相火也少火和緩之火即君火也亢盛之壯火宜衰和緩之少火宜壯夫壯火何以宜衰以壯火食氣故也少火何以宜壯以氣食少火故也所謂壯火食氣實壯火散氣也所謂氣食少火實少火生氣也氣味辛甘發散為陽酸苦湧泄為陰陰勝則陽病陽勝則陰病陽勝則熱陰勝則寒重寒則熱重熱則寒重平聲分而言之氣為陽味為陰合而言之氣不離味味不離氣故氣味辛甘從中達外主能發散故為陽氣味酸苦從中上下主能湧泄故為陰陰勝則陽病者酸苦之味太過則陰勝而陽斯病矣陽勝則陰病者辛甘之味太過則陽勝而陰斯病矣夫陽勝則過熱陰勝則過寒今陰勝則陽病乃重寒則熱之義也陽勝則陰病乃重熱則寒之義也寒傷形熱傷氣氣傷痛形傷腫故先痛而後腫者氣傷形也先腫而後痛者形傷氣也寒為陰邪故寒傷形熱為陽邪故熱傷氣氣傷則痛痛周身無形之氣也形傷則腫腫周身有形之形也故先痛而後腫者先傷氣而後傷形也先腫而後痛者先傷形而後傷氣也此水火氣味之陰陽而應象於人身之形氣者如此風勝則動熱勝則腫燥勝則乾寒勝則浮濕勝則濡瀉乾音干下同餘篇仿此五行之氣應於經脈木氣為風故風勝則經脈為之振動矣火氣為熱熱勝則經脈為之癰腫矣癰腫為熱與上文周身之寒腫不同也金氣為燥燥勝則經脈為之乾枯矣水氣為寒寒勝則經脈如運樞之外浮矣土氣為濕濕勝則經脈為之濡潤而下瀉矣天有四時五行以生長收藏以生寒暑燥濕風人有五臟化五氣以生喜怒悲憂恐天之四時五行應人之五臟五氣四時則春生夏長秋收冬藏五行則水為寒火為暑金為燥土為濕木為風故天有四時五行以生長收藏以生寒暑燥濕風其在於人有五臟化五氣心氣主喜肝氣主怒脾氣主悲肺氣主憂腎氣主恐以生喜怒悲憂恐故喜怒傷氣寒暑傷形暴怒傷陰暴喜傷陽厥氣上行滿脈去形喜怒不節寒暑過度生乃不固故重陰必陽重陽必陰故曰冬傷於寒春必病溫春傷於風夏生飧泄夏傷於暑秋必痎瘧秋傷於濕冬生咳嗽重平聲人之志意起於內故喜怒傷氣天之邪氣起於外故寒暑傷形舉喜怒而悲憂恐在其中舉寒暑而燥濕風在其中在天則寒為陰暑為陽在人則怒為陰喜為陽故卒暴而怒則傷吾身之陰氣卒暴而喜則傷吾身之陽氣厥氣上行者真氣有傷則厥逆之氣上行也滿脈去形者厥逆之氣滿於經脈則神離形體而去也此喜怒不節寒暑過度則陰陽不和生乃不固夫喜怒不節乃暴怒傷陰暴喜傷陽寒暑過度未有明言故又曰重陰必陽重陽必陰如天寒而受寒邪是謂重陰重陰必有陽熱之病天暑而受熱邪是謂重陽重陽必有陰寒之病此亢害自然之理故舉生氣通天論之言以足上文之意秋傷濕而冬咳嗽冬傷寒而春病溫即重陰必陽之意也春傷風而夏飧瀉夏傷暑而秋痎瘧即重陽必陰之意也此四時五行之陰陽而應象於人身之五臟五氣者如此此一節言天地之寒熱清濁水火氣味四時五行而應象於人身也帝曰余聞上古聖人論理人形列別臟腑端絡經脈會通六合各從其經氣穴所發各有處名溪谷屬骨皆有所起分部逆從各有條理四時陰陽盡有經紀外內之應皆有表裡其信然乎別音逼下俱同處去聲帝即以寒熱清濁水火氣味四時五行申明陰陽應象之理義有未盡謂上古聖人能體天地之陰陽而應象於人身必能以人身之陰陽而應象於天地故問於岐伯曰余聞上古聖人論理人形於人形之中而列別臟腑本臟腑而端絡十二經脈端直絡橫也於十二經脈之中而會通手足三陽三陰之六合其於臟腑經脈六合各從其經氣穴所發各有處有名小會之溪大會之谷連屬於骨皆有所起六氣分部或逆或從各有條理四時陰陽盡有經常之綱紀外內之應皆有淺深之表裡其信然乎岐伯對曰東方生風風生木木生酸酸生肝肝生筋筋生心肝主目岐伯舉五運五行三才相合之理以對曰東方生風謂風乃東方春生之天氣也風生木木生酸謂五行五味之歸於地也酸生肝肝生筋肝者人之臟筋者人之體謂五臟五體之屬於人也人有五體而五體復有所生故筋生心人有五臟而五臟各有所主故肝主目其在天為玄在人為道在地為化人之臟體本於地地之行味本於天是天氣之所在即地氣人氣之所在故就天之至微者而推論之其在天為玄玄者於穆而深微也在天為玄則在人為道道者平坦而共由也在天為玄則在地為化化者變化易生物也化生五味道生智玄生神所謂在地為化者化生五味所謂在人為道者道生智所謂在天為玄者玄生神神在天為風在地為木在體為筋在臟為肝在色為蒼在音為角在聲為呼在變動為握在竅為目在味為酸在志為怒在天為玄玄生神是神者天之主也神為天之主則無在非神試就神之所在而推論之神在天為風則東方生風神之所在也在地為木則風生木神之所在也在體為筋在臟為肝則肝生筋酸生肝亦神之所在也至於在色在音在聲在變動在竅在味在志亦無非神之所在也各隨天之五氣地之五行人之五臟而應象者也故為蒼為角為呼為握為目為酸為怒惟東方風木之肝臟為然耳怒傷肝悲勝怒風傷筋燥勝風酸傷筋辛勝酸怒者肝之情故怒傷肝悲類乎憂悲為脾情亦為肺情故悲勝怒傷於情者情相勝也風傷筋燥勝風傷於氣者氣相勝也酸傷筋辛勝酸傷於味者味相勝也以明天地之氣味而歸於人也南方生熱熱生火火生苦苦生心心生血血生脾心主舌南方生熱謂熱乃南方夏火之天氣也熱生火火生苦火乃地之五行苦乃物之五味謂五行五味之歸於地也苦生心心生血心為人之臟血為人之體謂五臟五體之屬於人也五體復有所生故血生脾五臟各有所主故心主舌其在天為熱在地為火在體為脈在臟為心在色為赤在音為徵在聲為笑在變動為憂在竅為舌在味為苦在志為喜神者天之主也其神在天為熱則南方生熱神之所在也在地為火則熱生火神之所在也在體為脈脈者血也在臟為心則心生血苦生心亦神之所在也至於在色為赤在音為徵在聲為笑在變動為憂在竅為舌在味為苦在志為喜惟南方火熱之心臟為然耳喜傷心恐勝喜熱傷氣寒勝熱苦傷氣咸勝苦喜者心之情故喜傷心恐者腎之情故恐勝喜傷於情者情相勝也心臟五臟之神而屬於陽故不言脈而言氣熱傷氣寒勝熱傷於氣者氣相勝也苦傷氣咸勝苦傷於味者味相勝也中央生濕濕生土土生甘甘生脾脾生肉肉生肺脾主口中央生濕天也濕生土土生甘地也甘生脾脾生肉人也肉體復有所生故肉生肺脾臟復有所主故脾主口其在天為濕在地為土在體為肉在臟為脾在色為黃在音為宮在聲為歌在變動為噦在竅為口在味為甘在志為思噦音誨餘篇同神者天之主也其神在天為濕則中央生濕神之所在也在地為土則濕生土神之所在也在體為肉在臟為脾則脾生肉甘生脾亦神之所在也至於在色為黃在音為宮在聲為歌在變動為噦在竅為口在味為甘在志為思惟中央濕土之脾臟為然耳思傷脾怒勝思濕傷肉風勝濕甘傷肉酸勝甘思者脾之情故思傷脾而怒勝思傷於情者情相勝也濕傷肉風勝濕傷於氣者氣相勝也甘傷肉酸勝甘傷於味味相勝也西方生燥燥生金金生辛辛生肺肺生皮毛皮毛生腎肺主鼻西方生燥天也燥生金金生辛地也辛生肺肺生皮毛人也皮毛復有所生故皮毛生腎肺臟復有所主故肺主鼻其在天為燥在地為金在體為皮毛在臟為肺在色為白在音為商在聲為哭在變動為咳在竅為鼻在味為辛在志為憂神者天之主也其神在天為燥則西方生燥神之所在也在地為金則燥生金神之所在也在體為皮毛在臟為肺則肺生皮毛辛生肺亦神之所在也至於在色為白在音為商在聲為哭在變動為咳在竅為鼻在味為辛在志為憂惟西方燥金之肺臟為然耳憂傷肺喜勝憂熱傷皮毛寒勝熱辛傷皮毛苦勝辛憂傷肺喜勝憂傷於情者情相勝也熱傷皮毛寒勝熱傷於氣者氣相勝也辛傷皮毛苦勝辛傷於味者味相勝也傷於氣者皆本氣自傷此熱傷皮毛則金受火刑以明自傷受傷皆可傷也熱傷皮毛則寒勝其熱乃自然之理也北方生寒寒生水水生咸咸生腎腎生骨髓髓生肝腎主耳北方生寒天也寒生水水生咸地也咸生腎腎生骨髓人也骨髓復有所生故髓生肝腎臟復有所主故腎主耳其在天為寒在地為水在體為骨在臟為腎在色為黑在音為羽在聲為呻在變動為栗在竅為耳在味為咸在志為恐神者天之主也其神在天為寒則北方生寒神之所在也在地為水則寒生水神之所在也在體為骨在臟為腎則腎生骨髓咸生腎亦神之所在也至於在色為黑在音為羽在聲為呻在變動為栗在竅為耳在味為咸在志為恐惟北方腎臟之寒水為然耳恐傷腎思勝恐寒傷血燥勝寒咸傷血甘勝咸恐傷腎思勝恐傷於情者情相勝也腎臟五臟之精而屬於陰故不言骨而言血寒傷血燥勝寒傷於氣者氣相勝也咸傷血甘勝咸傷於味者味相勝也土能勝水當云濕勝寒今云燥勝以明寒濕同類燥土之氣以勝水氣之寒也此天之五方五氣地之五行五味人之五臟五體而有陰陽之應象者如此故曰天地者萬物之上下也陰陽者血氣之男女也左右者陰陽之道路也水火者陰陽之徵兆也此舉天元紀大論之言以明天地陰陽水火之義上天下地萬物在其中故天地者萬物之上下也血陰氣陽男女籍以生故陰陽者血氣之男女也陰陽左右旋轉為血氣循行之道故左右者陰陽之道路也天一生水地二生火為天地陰陽之應驗故水火者陰陽之徵兆也陰陽者萬物之能始也天地之陰陽血氣之陰陽左右之陰陽水火之陰陽凡此陰陽者乃萬物之能始也易曰坤以簡能乾知大始此之謂也故曰陰在內陽之守也陽在外陰之使也生氣通天論岐伯曰陰者藏精而起亟即陰在內而為陽之守也陽者衛外而為固即陽在外而為陰之使也岐伯舉此以明陰陽為萬物之能始故內外相應如是也帝曰法陰陽奈何承岐伯陰陽應象之論欲人取法陰陽而調治之以合聖人論理人形之道故問法陰陽奈何岐伯曰陽勝則身熱腠理開喘粗為之俯仰汗不出而熱齒乾以煩冤腹滿死能冬不能夏俯猶俯也冤屈抑也法陰陽者陰陽不可偏勝如陽勝則火熱有餘而身熱熱氣在表則腠理開熱氣在裡則喘粗表裡皆病則為之俯仰汗不出而內外皆熱也齒乾津液竭也以煩冤腹滿死者津液既竭又心煩而屈抑不舒腹滿而土氣內絶故死雖不即死也能冬不能夏冬時寒冷陽勝可容夏時炎暑不堪煎厥矣陰勝則身寒汗出身常清數栗而寒寒則厥厥則腹滿死能夏不能冬數音朔陰勝則水寒有餘而身寒寒氣在表則汗出身常清寒氣在裡則數栗而寒表裡不相接故寒則四肢厥四肢厥者生陽不達於外厥則腹滿死者土氣復絶於內故死雖不即死亦能夏不能冬夏時炎暑陰勝可容冬時寒冷不堪凜冽矣此陰陽更勝之變病之形能也寒病而至於冬則陰氣更勝熱病而至於夏則陽氣更勝故曰此陰陽更勝之變或能冬而不能夏或能夏而不能冬故曰病之形能也是陰陽不可偏勝偏勝則病也帝曰調此二者奈何承陰陽偏勝之意復問調此二者奈何岐伯曰能知七損八益則二者可調不知用此則早衰之節也陰陽二氣本於天真能知天真之七損八益則陰陽二者可調七損者女子以七為紀月事貴乎時下故曰損八益者男子以八為紀精氣貴乎充滿故曰益知七損八益則陰平陽祕故二者可調不知用此損益之法而調治之則早衰之節也節猶候也年四十而陰氣自半也起居衰矣年五十體重耳目不聰明矣年六十陰痿氣大衰九竅不利下虛上實涕泣俱出矣故曰知之則強不知則老試舉早衰之節而略言之年四十而陰精之氣自失其半也故起居衰矣年五十體重則耳目不聰明矣年六十陰痿則氣大衰九竅不利下虛上實涕泣俱出矣故曰知之則強能知七損八益則身強不知則老不知七損八益則身老也故同出而名異耳同出於斯世之中而強老之名則異耳智者察同愚者察異愚者不足智者有餘有餘則耳目聰明身體輕強老者復壯壯者益治察同者於同年未衰之日而省察之智者之事也察異者於強老各異之日而省察之愚者之事也愚者察異故愚者不足智者察同故智者有餘有餘則年五十體重耳目不聰明者今則耳目聰明而身體輕強年六十陰痿氣大衰者今則老者復壯年四十而陰氣自半者今則壯者益治矣是以聖人為無為之事樂恬憺之能從欲快志於虛無之守故壽命無窮與天地終此聖人之治身也聖人治世本無為而有為恬憺虛無體同於天故能論理人形列別臟腑端絡經脈會通六合而如帝之所問也此言陰陽秉在天之神而應象無方惟聖人能取法而調治之天不足西北故西北方陰也而人右耳目不如左明也地不滿東南故東南方陽也而人左手足不如右強也聖人壽命與天地終則人之形體即天地之形體也天為陽人身耳目為陽天不足於西北是陽體不足於陰方故西北方陰也人身右為西北而人右耳目不如左耳目之明也地為陰人身手足為陰地不滿東南是陰體而不足於陽方故東南方陽也人身左為東南而人左手足不如右手足之強也帝曰何以然何以在左則耳目明而手足不強在右則手足強而耳目不明岐伯曰東方陽也陽者其精並於上並於上則上明而下虛故使耳目聰明而手足不便也西方陰也陰者其精並於下並於下則下盛而上虛故其耳目不聰明而手足便也便平聲人身南面而立左東右西左者乃東方陽也陽者其精並於上並於上則上明而下虛故使左耳目聰明而左手足不便也右者乃西方陰也陰者其精並於下並於下則下盛而上虛故其右耳目不聰明而右手足強便也故俱感於邪其在上則右甚在下則左甚此天地陰陽所不能全也故邪居之一身形氣俱感於邪其病在上則上為陽而右虛故右甚右甚即陽體而不足於陰方之義其病在下則下為陰而左虛故左甚左甚即陰體而不足於陽方之義此天地陰陽之所不能全而人身有左右陰陽之不足也故邪居之故天有精地有形天有八紀地有五里故能為萬物之父母清陽上天濁陰歸地是故天地之動靜神明為之綱紀故能以生長收藏終而復始里理通人身應天地者以天地為萬物之父母而神明之所主也精精華也故天有精形形體也故地有形八紀春夏秋冬二分二至八節之大紀也故天有八紀五里東南西北中五方之道理也故地有五里既有精有形復有紀有里故能為萬物之父母清陽上天天有精也濁陰歸地地有形也動者天之紀靜者地之理是故天地之動靜皆神明之綱紀故能以生長收藏終而復始所以能為萬物之父母也惟賢人上配天以養頭下象地以養足中傍人事以養五臟聖人為無為之事樂恬憺之能以欲快志於虛無之守惟賢人則上配天以養頭下象地以養足中傍人事以養五臟蓋聖人無為以合天地賢人則有為以合天地也天氣通於肺人身配天象地而天地之氣亦通於人肺位居高主周身之氣而天氣與之相通地氣通於嗌嗌咽嗌也嗌受水穀下接胃口而地氣與之相通風氣通於肝肝屬木其氣風故風動之氣與之相通雷氣通於心心屬火火炎上故雷氣與之相通穀氣通於脾脾土之氣灌於四旁故四旁空谷之氣與之相通雨氣通於腎雨氣即水氣腎寒主水故雨水之氣與之相通六經為川三陰之經主五臟三陽之經主六腑六經為川者三陰三陽之六經如川之流而脈絡貫通也腸胃為海人籍後天水穀以生腸胃受盛水穀如海之大而衆流所歸也九竅為水注之氣清陽出上竅濁陰出下竅耳目鼻口前後陰皆有水津以貫注故九竅為水注之氣以天地為之陰陽陽之汗以天地之雨名之陽之氣以天地之疾風名之暴氣象雷逆氣象陽五臟六經腸胃九竅上合天地有陰有陽皆以天地為之陰陽故人身陽氣宣發之汗可以天地之雨名之人身陽熱運行之氣可以天地之疾風名之其一時忿怒之暴氣可以象雷鳴之鼓擊其暴氣未平之逆氣可以象陽火之亢熱故治不法天之紀不用地之理則災害至矣天地之陰陽即人身之陰陽也人身之陰陽即天地之陰陽也故治身而不法天之八紀不用地之五里則災害至矣故邪風之至疾如風雨災害之至將於瞬息故邪風之至於人身而發病則疾如風雨故善治者治皮毛邪之中人始傷皮毛故善治者治皮毛其次治肌膚留而不去則入於肌膚故其次治肌膚其次治筋脈留而不去則入於筋脈故其次治筋脈其次治六腑留而不去則入於腑故其次治六腑其次治五臟治五臟者半死半生也留而不去則入於臟故其次治五臟治及五臟則半死半生可不慎歟故天之邪氣感則害人五臟水穀之寒熱感則害於六腑地之濕氣感則害皮肉筋脈上文皮肌筋脈腑臟之病有因於天者有因於地者有因於人者故天之邪氣感於人身則害人五臟邪氣風寒暑濕燥火也人之水穀之寒熱感於人身則害六腑水穀寒熱飲食失宜或寒或熱也地之濕氣感於人身則害皮肉筋脈因於濕者下先受之故曰地之濕氣故善用針者從陰引陽從陽引陰以右治左以左治右以我知彼以表知里以觀過與不及之理見微得過用之不殆承上文感害之意而言故善用針以治之者知陽病必行於陰也當從陰以引之而出於陽知陰病必行於陽也當從陽以引之而離於陰以右治左以左治右繆刺之法也以我知彼以我之神會彼之神也以表知里視其表陽知其里陰也以觀過與不及之理言以我知彼以表知里所以觀其太過與不及之理而為用針之法也故必見微得過過失也病始於微萌而得其過失之所在然後用針以治之而不至於危殆也善診者察色按脈先別陰陽審清濁而知部分視喘息聽音聲而知所苦觀權衡規矩而知病所主按尺寸觀浮沉滑澀而知病所生以治無過以診則不失矣分去聲未針之先必以脈診故善診者察色脈別陰陽審色之清濁而知面王之部分視氣之喘息聽言之音聲而知臟腑之所苦觀權衡規矩脈應四時而知病之所主按下尺上寸以觀三部之浮沉滑澀而知病之所生能如是也以之施治則無過愆以之為診則不失矣故曰病之始起也可刺而已其盛可待衰而已故因其輕而揚之因其重而減之因其衰而彰之言病之始起也可刺之而已其病方其盛也可待其自衰乃刺之而已其病故因其病輕之時而發揚之乃始起刺已之意也因其盛重之時而衰減之乃其盛待衰之意也因其衰減而彰明之乃衰而刺已之意也此善診而為刺之之法也形不足者溫之以氣精不足者補之以味不行刺法但以氣味之藥治之凡形體不足而羸瘦者當以陽分之氣藥溫之陽氣為能外達也陰精不足而虛弱者當以陰分之味藥補之陰味為能內滋也其高者因而越之可吐而已其下者引而竭之可下而已中滿者瀉之於內可消而已其有邪者漬形以為汗其在皮者汗而發之其有邪者邪從汗解故當漬形以為汗申明漬形為汗乃其邪病之在皮者是可汗而發之也其慓悍者按而收之病氣慓悍是當按收恐正氣之並脫也其實者散而瀉之病氣內實是宜散瀉恐邪氣之過實也審其陰陽以別柔剛陽病治陰陰病治陽定其血氣各守其鄉血實宜決之氣虛宜掣引之掣作掣導也凡此施治之法當審其陰陽以別柔剛陰陽者天地之道也柔剛者乾剛坤柔亦天地之道也陽盛則陰虛故陽病當治其陰陰盛則陽虛故陰病當治其陽定其血氣定其病之在血在氣也各守其鄉血病勿使傷氣氣病勿使傷血也血實宜決之勿使傷氣矣氣虛宜掣引之勿使傷血矣此一節言人身之陰陽形體而應象於天地是當法天地之陰陽以為診治之善也陰陽離合論第六篇此承上篇陰陽應象而復論陰陽之離合也應象者陰陽之徵乎外也離合者陰陽之本乎內也陰陽之理本於太極由陰而陽故曰陰陽離則有三合則為一從三而十百千萬皆離也三陽歸於一陽三陰歸於一陰皆合也開闔樞者開則為陽闔則為陰舍合則不能為開舍開則不能為闔是陰陽互見開闔並呈也其曰陰之絶陽是純陰無陽而歸於太極也又曰陰之絶陰是純陰無陰而歸於無極也陰陽之理從無極而太極太極而陰陽所以申明陰陽之離合者如此黃帝問曰余聞天為陽地為陰日為陽月為陰大小月三百六十日成一歲人亦應之今三陰三陽不應陰陽其故何也帝承上篇陰陽應象之意問天地日月陰陽運行以成一歲人之陰陽亦與相應今人身三陰三陽有不應天地日月陰陽之處其故何也帝承陰陽應象之意而探陰陽之根本也岐伯對曰陰陽者數之可十推之可百數之可千推之可萬萬之大不可勝數然其要一也數上聲下可數同勝平聲自陰陽之應乎外者言之則數之可十推之可百數之可千推之可萬至於萬之大尤不可勝數然探其本原則有要道其要歸於一也天覆地載萬物方生未出地者命曰陰處名曰陰中之陰則出地者命曰陰中之陽試以天地萬物言之天覆於上地載於下而萬物方生其萬物之未出地者命曰陰處名曰陰中之陰夫未出地而名為陰中之陰則出地者當命曰陰中之陽陽豫之正陰為之主故生因春長因夏收因秋藏因冬失常則天地四塞豫與同長上聲藏如字萬物出乎陽其體各正是其正也乃陽豫之萬物主乎陰其性始成是其主也乃陰為之陽正於外陰主於內四時行焉百物生焉故生因春長因夏收因秋藏因冬此天地陰陽收藏之常若失常則天地四塞天地四塞則覆載無從而萬物不生陰陽之變其在人者亦數之可數天地萬物之陰陽其變無窮人身之陰陽其變無窮故陰陽之變其在人者亦不啻十百千萬數之可數所以申明陰陽之至大而為離者如此帝曰願聞三陰三陽之離合也三陰三陽有離則有合願聞三陰三陽之離合仍欲詳明不應陰陽之義岐伯曰聖人南面而立前曰廣明後曰太衝太衝之地名曰少陰少陰之上名曰太陽太陽根起於至陰結於命門名曰陰中之陽陽根於陰三陽根於三陰聖人南面而立前曰廣明陽也後曰太衝陰也故太衝之地名曰少陰少陰之上名曰太陽是太陽之根於少陰也故人身太陽之根起於足小趾外側之至陰結於目中央之命門是雖太陽而名曰陰中之陽此太陽之根於少陰者如此中身而上名曰廣明廣明之下名曰太陰太陰之前名曰陽明陽明根起於厲兌名曰陰中之陽身半以上為陽身半以下為陰故中身而上亦名曰廣明陽也廣明之下名曰太陰陰也太陰之前名曰陽明是陽明之根於太陰也故人身陽明之根起於足大趾次趾之厲兌是雖陽明而名曰陰中之陽此陽明之根於太陰者如此厥陰之表名曰少陽少陽根起於竅陰名曰陰中之少陽少陽根於厥陰故厥陰之表名曰少陽人身少陽之根起於足小趾次趾之竅陰是雖少陽而名曰陰中之少陽夫太陽根於少陰則曰少陰之上陽明根於太陰則曰太陰之前少陽根於厥陰則曰厥陰之表以明上下前後表裡其義一也是故三陽之離合也太陽為開陽明為闔少陽為樞三經者不得相失也摶而弗浮名曰一陽摶音團餘篇同論三陽之離合自其離者而言之太陽為開陽明為闔少陽為樞自其離而復合者言之舍闔則不能開舍開則不能為闔舍開闔則不能為樞是三經者不得相失也若不開不闔不樞摶聚凝一而弗浮但命曰一陽所以申明三陽之至微而為合者如此帝曰願聞三陰承上文三陽之意而復願聞三陰岐伯曰外者為陽內者為陰知陽者知陰知陰者知陽外者為陽如南面而立前曰廣明中身而上名曰廣明者是也內者為陰如後曰太衝廣明之下名曰太陰者是也然則中為陰其衝在下名曰太陰太陰根起於隱白名曰陰中之陰由外陽內陰之義而推論之然則中為陰中亦內也太陰坤土在內而居中也沖太衝也其衝在下者太衝屬少陰在太陰之下而其中則名曰太陰故人身太陰經穴之根起於足大趾之隱白名曰陰中之陰所以申明三陰之太陰也太陰之後名曰少陰少陰根起於湧泉名曰陰中之少陰其衝在下故太陰之後名曰少陰人身少陰經穴之根起於足心之湧泉名曰陰中之少陰所以申明三陰之少陰也少陰之前名曰厥陰厥陰根起於大敦陰之絶陽名曰陰之絶陰太陰主開厥陰主闔少陰主樞有開闔而始有樞是先厥陰而後少陰故少陰之前名曰厥陰人身厥陰經穴之根起於足大趾三毛之大敦厥陰為陰之盡而曰陰之絶陽言純陰而絶無陽也名曰陰之絶陰言純陰而絶無陰也絶陽絶陰是太極而歸於無極所以申明三陰之厥陰也是故三陰之離合也太陰為開厥陰為闔少陰為樞三經者不得相失也摶而弗沉命曰一陰若夫三陰之離合也離則太陰為開厥陰的闔少陰為樞離而復合是三經者開闔相資樞轉相濟不得相失也若不開不闔不樞摶聚凝一而弗沉命曰一陰所以申明三陰之至微而為合者如此陰陽山彳黑攴山彳黑攴積傳為一周氣里形表而為相成也山彳黑攴沖同合上文三陽三陰而並論之人身陰陽沖沖沖沖往來不絶也積傳為一周謂一周十二時漏水下百刻二刻一小周積傳至百刻則為日夜之一周也氣里形表謂陰陽之氣行於里陰陽之形立於表表裡形氣互相資益而為陰陽離合之相成也陰陽別論第七篇此承上篇陰陽應象陰陽離合而復論陰陽之別也陰中有陽陽中有陰陰陽之常也無胃脘之陽見真藏之陰則為別陰無柔和之陰見結搏之陽則為別陽別陰別陽非陰陽之常乃陰陽之別常則和別則病常則順別則死所以別陽別陰陽結陰結陽搏陰搏皆言病而言死也黃帝問曰人有四經十二從何謂四經十二從者人身有四時之大經十二脈之相從也經常也從順也帝問四經十二從以明陰陽有經常從順之道也岐伯對曰四經應四時十二從應十二月十二月應十二脈四經應春夏秋冬之四時十二從應一歲之十二月十二月復應人身之十二脈脈經脈也經脈歌云肺寅大卯胃辰宮脾已心午小未中申胱酉腎心包戌亥三子膽醜肝通脈有陰陽知陽者知陰知陰者知陽經脈臟腑相合雌雄相應故脈有陰陽知陽者可以知陰知陰者可以知陽此陰陽之相通也凡陽有五五五二十五陽所謂陰者真藏也見則為敗敗必死也所謂陽者胃脘之陽也別於陽者知病處也別於陰者知死生之期陰陽互見彼此相資若以陽脈論之凡陽有五肝心脾肺腎皆有和平之陽脈也五五二十五陽者肝脈應春心脈應夏脾脈應長夏肺脈應秋腎脈應冬春時而肝心脾肺腎之脈皆有微弦之胃脈夏時而肝心脾肺腎之脈皆有微鉤之胃脈長夏而肝心脾肺腎之脈皆有微緩之胃脈秋時而肝心脾肺腎之脈皆有微毛之胃脈冬時而肝心脾肺腎之脈皆有微石之胃脈是五五二十五陽蓋五臟三陰之脈皆有陽和之胃脈若無陽和之胃脈則所謂陰者乃三陰之真藏也見則為敗敗必死也又申明所謂陽者乃中焦胃脘之陽而五臟籍以資生者也若無胃脘之陽而別於陽者知病所發之處也見真藏之陰別於陰者則知死生之期三陽在頭三陰在手所謂一也別於陽者知病忌時別於陰者知死生之期三陽在頭謂手太陽之脈終於目內眥足太陽之脈起於目內眥上額交巔手陽明之脈終於兩鼻孔足陽明之脈起於鼻頞中循髮際至額顱手少陽之脈終於目鋭眥足少陽之脈起於目鋭眥上抵頭角也三陰在手謂足厥陰之脈注肺而終交手太陰出於手大指次指之內廉足太陰之脈注心中而終交手少陰循手小指之內而出足少陰之脈絡心注胸中而終交手厥陰循手小指次指而出也夫三陽在頭三陰在手一氣運行皆有胃脘之陽故曰所謂一也若無胃脘之陽而別於陽者不但知病處也且知病死忌之時無胃脘之陽見真藏之陰而別於陰者知死生之期謹熟陰陽無與衆謀所謂陰陽者去者為陰至者為陽靜者為陰動者為陽遲者為陰數者為陽凡持真脈之臟脈者肝至懸絶急十八日死心至懸絶九日死肺至懸絶十二日死腎至懸絶七日死脾至懸絶四日死數音朔知病知忌知死知生衆人不知醫獨知之故當謹熟陰陽無與衆謀夫不與衆謀乃診脈而得其微故所謂陰陽者即脈之去者為陰脈之至者為陽脈之靜者為陰脈之動者為陽脈之遲者為陰脈之數者為陽此平人脈法也凡持真脈之藏脈而知死生之期者如肝至懸絶急十八日死懸絶真藏弧懸與胃脘之陽相絶也急徑急也十八日者木之生數三三而三之則為九再九而十八也心至懸絶九日死者火之生數二成數七九日火之生成數也肺至懸絶十二日死者金之生數四三四而為十二也腎至懸絶七日死者水之生數一成數六七日水之生成數也脾至懸絶四日死者土位中央灌溉四旁上火下水左木右金土氣不能四應故四日死此診真藏之脈而知死生之期者如此曰二陽之病發心脾有不得隱曲女子不月其傳為風消其傳為息賁者死不治皆為岐伯之言史臣復加三日者承上文別陽知病之離而復言二陽三陽一陽之病也二陽陽明胃土也土借火生胃由脾運今病心脾是火不能生土脾不能運胃也二陽為水穀之海精血之所資生有不得隱曲者男子精虛不得為房幃之隱曲也女子不月者女子血虛月事不以時下也其傳為風消血虛風勝而肌肉消枯也其傳為息賁精虛氣逆而喘息奔迫也有一於此皆死不治所以申明二陽病處且知忌時也曰三陽為病發寒熱下為癰腫及為痿厥腨悁其傳為索澤其傳為頽疝腨音善悁音淵餘篇皆同三陽者太陽膀胱寒水也太陽本寒標熱故發寒熱太陽經脈從頭下項挾脊貫臀下抵腨足故下為癰腫下臀下髀膕也癰腫經脈血氣逆於肉理也及為痿厥腿足痿痹而厥逆筋虛則痿氣虛則厥也腨悁小腿痠疼也其傳為索澤膀胱水澤枯索也其傳為頽疝陰器睪丸連膀胱而腫脹也所以申明三陽病處也曰一陽發病少氣善咳善泄其傳為心掣其傳為膈膈隔同下仿此一陽者少陽初生膽木也病則初陽不升故下氣真氣少則客氣上逆故善咳陽氣虛則土寒故善泄其傳為心掣木不生火心氣虛寒而掣痛也其傳為膈火虛土寒胸膈不利也所以申明一陽病處也二陽一陰發病主驚駭背痛善噫善欠名曰風厥夫病在陽而發於陰病在陰而合於陽故又舉二陽一陰二陰一陽三陽三陰之發病也二陽陽明也一陰厥陰也陽明厥陰主闔如二陽一陰發病則二陽不能為陽之闔一陰不能為陰之闔不能闔而乍闔則主驚駭背為陽主開不能轉開為闔故背痛陰氣上衝而復下則善噫噫噯也陽氣下行而復上則善欠欠呵欠也此一陰發病為肝虛風勝二陽發病土受木克故曰風厥語風氣盛而中土厥逆也二陰一陽發病善脹心滿善氣二陰少陰也一陽少陽也少陰少陽主樞二陰一陽發病則二陰不能樞轉於內一陽不能樞轉於外故善脹申明善脹者非腫脹之謂乃心滿善氣蓋陰樞不轉則心滿陽樞不轉則善氣也三陽三陰發病為偏枯痿易四肢不舉三陽太陽也三陰太陰也太陽太陰主開三陽三陰發病則三陽不能開於陽三陰不能開於陰故為偏枯痿易偏枯半身不遂痿易痿痹易常是太陽不能為開也四肢太陰脾土之所主不舉太陽不能為開也所以申明別於陽而知病處者如此鼓一陽曰弦鼓一陰曰毛鼓陽勝急曰鉤鼓陽至而絶曰石陰陽相過曰淄舊本弦訛鉤鉤訛弦今改正脈體內應五臟外合四時皆有胃氣故鼓一陽曰弦鼓動一陽初升之氣則脈微弦內應肝臟外合春生之木氣也鼓一陰曰毛鼓動一陰初升之氣則脈微毛內應肺臟外合秋收之金氣也鼓陽勝急曰鉤鼓動陽氣既勝既急則脈微鉤內應心臟外合夏長之火氣也鼓陽至而絶曰石鼓動陽氣至而復絶脈沉如石內應腎臟外合冬藏之水氣也春夏為陽秋冬為陰陰陽相過其脈則滑曰淄內應脾臟外合四時之土氣也陰爭於內陽擾於外魄汗未藏四逆而起起則熏肺使人喘鳴藏如字陰陽內外彼此相濟如陰中無陽則陰爭於內陽中無陰則陽擾於外陽擾於外則皮毛之魄汗未藏魄汗未藏外而不內也陰勝於內則四逆而起起則熏肺使人喘鳴逆起熏肺喘鳴內而不外也陰之所生和本曰和是故剛與剛陽氣破散陰氣乃消亡淖則剛柔不和經氣乃絶淖音鬧獨陽不生獨陰不長陰之所生和本曰和言陰之所以能生萬物者以陰和而復本於陽和也由此言之則陰中有陽陽中有陰是故剛與剛則為獨陽必陽氣破散陽氣破散於外則陰氣乃消亡於內矣此剛與剛則為獨陽而陰陽不和也若柔與柔則為獨陰淖者柔與柔相合也故淖則剛柔不和經氣借陽和以運行今惟陰無陽則經氣乃絶此柔與柔則為獨陰而陰陽不和也死陰之屬不過三日而死生陽之屬不過四日而死夫柔與柔則為死陰剛與剛則為生陽死陰生陽皆非正也故死陰之屬不過三日而死陽奇之數從一而三三日死為其無陽也生陽之屬不過四日而死陰偶之數由二而四四日死為其無陰也所謂生陽死陰者肝之心謂之生陽心之肺謂之死陰肺之腎謂之重陰腎之脾謂之闢陰死不治重平聲闢僻同之移也所謂生陽死陰者肝移熱於心謂之生陽肝木生火臟熱相移故曰生陽是即剛與剛也氣厥論云肝移熱於心則死所以然者火熱自焚心氣厥逆也心移寒於肺謂之死陰肺金如天心火如日火日衰微若天無日故曰死陰是即柔與柔也氣厥論云心移寒於肺肺消飲一溲二死不治所以然者天日虛寒水精不布也不但此也若肺之腎謂之重陰腎為陰寒之臟肺寒而復移於腎故曰重陰腎之脾謂之僻陰脾為陰中之至陰腎寒而復移於脾是陰寒入於幽僻故曰僻陰此生陽死陰重陰僻陰有一於此皆死不治此申明別陽知病忌別陰知死期者如此結陽者腫四肢承上文別陽別陰而復論陽結陰結結陽者陽氣自結不和於陰也四肢為諸陽之本故結陽者腫四肢此陽氣為病而徵乎外也結陰者便血一升再結二升三結三升結陰者陰氣自結不和於陽也血乃陰屬故結陰者便血一升瘀血去而陽氣和若陽氣不和仍為陰結之病而便血一升是再結二升也瘀血去而陽氣不和仍為陰結之病而便血一升是三結三升也此陰血為病而徵乎內也陰陽結斜多陰少陽曰石水少腹腫斜作邪少腹之少去聲餘篇少同陰陽結邪陰陽並結而為邪病也人身陽常有餘陰常不足今陰陽並結致多陰少陽是陰寒盛陽氣虛故曰石水石水腎水也少陰主腎位居少腹故少腹腫此言陰陽結邪致陰盛陽虛而病二陰之石水也二陽結謂之消二陽陽明也陽明之上燥氣主之結則燥氣獨盛故飲水過多而謂之消三陽結謂之膈三陽太陽也太陽為諸陽主氣常從胸膈而入於中土從中土而出於膚表結則不能出入故謂之膈膈猶隔也三陰結謂之水三陰太陰也太陰之上濕氣主之結則濕氣獨盛故謂之水與少陰之石水不同也一陰一陽結謂之喉痹一陰厥陰也一陽少陽也厥陰之上風氣主之少陽之上火氣主之陰陽皆結風火熾而肺金傷故謂之喉痹喉為天氣肺實主之痹者閉也此言陽結陰結則病是非陰陽之常而為陰陽之別也陰搏陽別謂之有子陰陽虛腸澼死搏音博餘篇同陽結陰結則病陽搏陰搏則死故復論陰陽之搏陰搏陽別謂之有子言陰氣過盛搏擊於內不與陽和似乎別出陰盛蓄陽故在婦人謂之有子若陰搏陽別而屬陰陽正氣之虛證見腸澼而下泄者死即在婦人亦非有子所以申明陰搏有屬有子有屬病死也陽加於陰謂之汗陰虛陽搏謂之崩陽加於陰謂之汗言陽氣有餘內加於陰陰得陽而外出故謂之汗若陽加於陰陰氣內虛不與陽和陽氣搏擊陽搏於內則陰虛陽盛故謂之崩崩血下墮也所以申明陽搏有屬陰陽和而汗出有屬陰陽不和而血崩也三陰俱搏二十日夜半死夫陰搏則陰盛陽搏則陽盛有屬無病者有屬有病者有屬病死者若經脈不和手足陰陽俱搏者死故舉三陰三陽而復論之三陰俱搏者手足太陰脾肺之氣俱搏擊於內也二十日夜半死者土之成數十金之成數九夜半者半夜子初乃十九日之終交二十日之子陽而即死也二陰俱搏十三日夕時死二陰俱搏者手足少陰心腎之氣俱搏擊於內也十三日夕時死者水之成數六火之成數七終水火之成數而死也又曰夕時者乃十三日之終至戌亥方死所以別上文二十日夜半之子陽也一陰俱搏十日死一陰俱搏者手足厥陰肝與心包之氣俱搏擊於內也十日死者木之成數八火之生數二也十日者終木之成數火之生數而死也此三陰五臟相搏與之死期者如此三陽俱搏且鼓三日死三陽俱搏者手足太陽膀胱小腸之氣俱搏擊於內也且鼓者三陽既搏且鼓動手足之一陽也手之一陽少陽三焦也足之一陽少陽膽經也膀胱水也小腸三焦火也膽木也三日死者水之生數一火之生數二合而為三又三者木之生數盡水火之生數而死於木也三陰三陽俱搏心腹滿發盡不得隱曲五日死三陰三陽俱搏者手足太陰合手足太陽之氣而相搏擊也手太陰肺金天也足太陰脾土地也手太陽小腸火也足太陽膀胱水也太陰天地之氣太陽水火之氣不和故心腹滿三陰三陽俱搏則肺之天氣脾之地氣膀胱之水氣小腸之火氣發泄已盡不得有所隱曲也隱幽隱曲曲匿與上文病發心脾之不得隱曲不同也五日死者土之生數五天地水火不交會於中土而死也二陽俱搏其病溫死不治不過十日死二陽俱搏者手足陽明胃與大腸之氣相搏擊也溫熱也其病溫以陽明之陽而見溫熱之病陽亢津竭故死不治又曰不過十日死者言上文不交會於中土則五日死此陽明土氣亢熱亦不過十日死五十居中皆土數也此言陽搏陰搏則死是非陰陽之常而為陰陽之別也帝問四經十二從乃探陰陽之理而求其常岐伯不論陰陽之常而論陰陽之別意謂欲知陰陽之常必知陰陽之別不知陰陽之別則陰陽之理猶為未盡云爾靈蘭祕典論第八篇靈蘭藏書之室謂神靈相接其氣如蘭祕典帝以岐伯之言藏靈蘭之室為祕密之典章蓋心為君主主明則下安不明則危是君道之所繫者大帝聞岐伯之言而悟為君之道故尊奉其言齋戒擇吉以藏靈蘭之室故曰靈蘭祕典黃帝問曰願聞十二臟之相使貴賤何如使去聲下同人身十二經脈內合有形皆謂之臟藏者臟也十二臟中相為傳使有貴有賤不可不知故以為問岐伯對曰悉乎哉問也請遂言之十二臟相使探其貴賤故贊其所問之悉而請直遂言之心者君主之官也神明出焉至貴者莫如君君者人之主也若以十二臟論之則心者君主之官也虛靈萬應故神明出焉首舉心為君主而鄭重言之所以示貴也肺者相傅之官治節出焉相去聲位高近君猶之相傅之官受朝百脈故治節由之出焉肝者將軍之官謀慮出焉氣勇善怒猶之將軍之官運籌揆度故謀慮由之出焉膽者中正之官決斷出焉斷去聲生陽上升無所偏倚猶中正之官識量惟膽故決斷由之出焉膻中者臣使之官喜樂出焉膻中即心包絡心包代君行令猶之臣使之官宣通絡脈故喜樂由之出焉脾胃者倉廩之官五味出焉胃主納脾主運皆受水穀之精猶之倉廩之官主入主出五味各走其道故五味由之出焉脾與胃以膜相連故合言之大腸者傳道之官變化出焉糟粕所出猶之傳道之官食化而變糞故變化由之出焉小腸者受盛之官化物出焉盛音成受胃之濁水穀未分猶之受盛之官腐化食物先化後變故化物由之出焉腎者作強之官伎巧出焉腎藏精男女媾精鼓氣鼓力故腎者猶之作強之官造化生人伎巧由之出焉三焦者決瀆之官水道出焉上焦如霧中焦如漚下焦如瀆故三焦者猶之決瀆之官閣中上而歸於下水道由之出焉膀胱者州都之官津液藏焉氣化則能出矣藏如字下同位居胞中故膀胱者猶之州都之官濟泌別汁循下焦而滲入故津液藏焉得陽熱之氣而津液始達於皮膚故氣化則能出矣此心為君主而諸官各守其職者如此凡此十二官者不得相失也故主明則下安以此養生則壽歿世不殆以為天下則大昌承上文而總結之凡此十二官者貴賤相使不得相失也主明心主神明也下安諸官各安其職也以此心主之神明而養生則壽也歿世不殆壽及子孫也以為天下則大昌壽及萬民也主不明則十二官危使道閉塞而不通形乃大傷以此養生則殃以為天下者其宗大危戒之戒之十二官以君為主不明則危貴賤混淆也閉塞不通十二官不相使也形乃大傷經脈之有形傷敗也以此養生則殃言不但不能養生而災殃且至也以為天下其宗大危言不但自身危困而宗祧且大危也君主之尊神明之貴乃如是也故當戒之戒之此申明十二臟之貴賤相使而首重君主之神明者如此至道在微變化無窮孰知其原窘乎哉消者瞿瞿孰知其要閔閔之當孰者為良當去聲承上文大危之意而言至道在微上文大危乃人心惟危之義此至道在微乃道心惟微之義道惟微也故變化無窮既微且變則人孰知其原不知其原故窘乎哉消者瞿瞿瞿瞿驚顧貌猶言探其消息仍瞿瞿然驚顧而孰知其至要之所在也閔憂也閔閔憂之深也當切當也深憂道之切當而仍不知孰者之為良也所以嘆道之至微而難明也恍惚之數生於毫釐毫釐之數起於度量千之萬之可以益大推之大之其形乃制承上文至道難明之意而言恍惚難明之數生於毫釐之至微然雖至微亦有可明故又言毫釐之數起於度量可以度而知其長短可以量而知其多少也既可度量則千之萬之而微者可以益大微者可大則推之大之而道之形體乃制制正也所以承道之至微而又嘆道之至大也黃帝曰善哉余聞精光之道大聖之業而宣明大道非齋戒擇吉日不敢受也帝乃擇吉日良兆而藏靈蘭之室以傳保焉帝聞岐伯之言知神明之重君主之貴至道之微至道之大君臣契合一德一心故贊之曰善哉余今聞精光之道大聖之業而宣明大道謂心主神明猶之精光之道也主明下安猶之大聖之業也以心主神明主明下安之意而論至道之微至道之大猶之以精光之道大聖之業而宣明大道也故非齋戒擇吉日不敢受也史臣復記黃帝果擇吉日良兆書岐伯所授之言藏諸靈蘭之室以傳後世而保守弗失焉
