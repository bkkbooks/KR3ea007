body:
  text: 卷之六合下三卷計論七篇皆名大論論五運六氣司天在泉天時民病寒熱勝復之理天地之陰陽四時備於人身人身之寒熱虛實同於天地首紀天元而五運五行六氣微旨歸於人氣以交變更有五常之政六元之紀道極其大理悉其微至真至要皆大論也天元紀大論第六十八篇此篇引天元玉册之言以明五運六氣上下相召五六相合三十歲為一紀六十歲為一周周而復始無有終時著之玉版藏之金匱署曰天元紀故曰天元紀大論太始天元玉册運氣微旨篇曰太虛寥廓肇其化元虛皇轉運變易淵玄萬物資始五運終天布氣真靈總統坤元十二流精五氣橫天曰陰曰陽曰柔曰剛寒暑燥濕風火天之陰陽天以三陰三陽上奉之木火土金水地之陰陽地以生長化收藏下應之天以陽生陰長地以陽殺陰藏天有陰陽地亦有陰陽五運之德氣建於寅又曰子午之歲上見少陰丑未之歲上見太陰寅申之歲上見少陽卯酉之歲上見陽明辰戌之歲上見太陽己亥之歲上見厥陰少陰所謂標也厥陰所謂終也厥陰之上風氣主之少陰之上熱氣主之太陰之上濕氣主之少陽之上相火主之陽明之上燥氣主之太陽之上寒氣主之所謂本也是謂六元黃帝問曰天有五行御五位以生寒暑燥濕風人有五臟化五氣以生喜怒思憂恐論言五運相襲而皆治之終期之日周而復始余已知之矣願聞其與三陰三陽之候奈何合之天有五行之理以御天度之五位而五位之中以生寒暑燥濕風之五氣數相合也其在於人則有五臟化生五臟之氣五氣之中以生喜怒思憂恐之五志其數亦相合也六節臟象大論言五運相襲而皆治之終期之日周而復始謂五運遞相承襲而一歲之中皆主治之至三百六十五終期之日則周而復始其運惟五余已知之矣願聞其與三陰三陽六氣之候奈何合之帝欲詳明五運六氣相合之道而問也鬼臾區稽首再拜對曰昭乎哉問也夫五運陰陽者天地之道也萬物之綱紀變化之父母生殺之本始神明之府也可不通乎五運合於三陰三陽蓋欲昭明天地交會之道故曰昭乎哉問也夫五運三陰三陽者乃上天下地之道也萬物之多皆以五運陰陽為之綱紀物極之變物生之化皆以五運陰陽為之父母物之始生物之肅殺皆以五運陰陽為之本始是此五運陰陽乃神明之府也可不通乎故物生謂之化物極謂之變六微旨大論曰物之生從乎化物之極由乎變故物生謂之化物極謂之變此萬物所以有變化生殺也陰陽不測謂之神神用無方謂之聖陰陽者天地之道至精至微故陰陽不測謂之神神用無方謂之聖此天地神明之府所當通其神用也夫變化之為用也在天為玄在人為道在地為化即上文變化神用而推論之夫變化之為用也至神無方故在天為玄玄純粹幽深也在人為道道大中至正也在地為化化孕育生成也化生五味道生智玄生神申明在地為化化生五行之五味也在人為道道生觀察之智慧也在天為玄玄生靈明之神變也神在天為風在地為木在天為熱在地為火在天為濕在地為土在天為燥在地為金在天為寒在地為水故在天為氣在地成形形氣相感而化生萬物矣即在天為玄玄生神而推論之則無在非神故神在天為風者在地即為木神在天為熱者在地即為火神在天為濕者在地即為土神在天為燥者在地即為金神在天為寒者在地即為水風熱濕燥寒無形之氣也故在天為氣木火土金水有象之形也故在地成形在地之形與在天之氣相感而化生萬物矣然天地者萬物之上下也左右者陰陽之道路也水火者陰陽之徵兆也金木者生成之終始也氣有多少形有盛衰上下相召而損益彰矣在天之氣通於在地之形而化生萬物然則天地者乃萬物之上下也天地左右旋轉者乃陰陽之道路也天地之一水二火者乃陰陽之徵驗而兆端也天地之秋金春木者乃萬物生成之終始也在天為風熱濕燥寒之氣而氣各有多少在地為木火土金水之形而形各有盛衰形氣相感是上下相召多少盛衰而損益彰矣此言形氣相感所以對帝五運五行與三陰三陽六氣相合之問也帝曰願聞五運之主時也何如木火土金水謂之五運一歲之中有五運故願聞五運之主時鬼臾區曰五氣運行各終期日非獨主時也五氣運行言五行之氣同於五運次第循行各終一歲之期日非獨主於四時也帝曰請聞其所謂也五運主歲主時之義必有所本故請聞其所謂鬼臾區曰臣積考太始天元册文曰太虛寥廓肇基化元萬物資始五運終天布氣真靈總統坤元九星懸朗七曜周旋曰陰曰陽曰柔曰剛幽顯既位寒暑弛張生生化化品物咸章臣斯十世此之謂也基本其作基亦通此引太始天元玉册之言以明運氣之本於元始也太虛寥廓言天之清淨而廣大也肇基化元言始基造化之真元也故萬物皆資之以為始而五運循環以終天此五運之所以主歲也真靈之氣布於四時故曰布氣真靈至哉坤元萬物資生故曰總統坤元此五運之所以主時也九星天蓬天芮天衝天輔天禽天心天柱天任天英也九星懸朗於上下應九州七曜金木水火土星日月也七曜周旋於左右以應五行曰陰曰陽立天之道也曰柔曰剛立地之道也陰幽陽顯曰陰曰陽則幽顯既位既位猶云定位也寒柔暑剛曰柔曰剛則寒暑弛張弛張猶云往來也夫幽顯既位寒暑弛張則生生化化而品物咸章咸章萬物由生而化從化而生彰明昭著也此五運生歲五運主時而萬物化生也此天元册文之言傳自往古至臣斯時已經十世帝欲聞其所謂則此之謂也帝曰善何謂氣有多少形有盛衰天元册文之言以明五運主歲主時之本帝故善之復舉鬼臾區氣有多少形有盛衰之言以問鬼臾區曰陰陽之氣各有多少故曰三陰三陽也形有盛衰謂五行之治各有太過不及也陰陽之氣有大有少其氣不同各有多少陰非一陰陽非一陽故曰三陰三陽此氣所以有多少也五運之形有盛有衰謂五行之治盛則太過衰則不及各有太過不及此形所以有盛衰也故其始也有餘而往不足隨之不足而往有餘從之知迎知隨氣可與期天干始於甲地支始於子甲丙戊庚壬為陽主有餘乙丁己辛癸為陰主不足子寅辰午申戌為陽主有餘醜卯巳未酉亥為陰主不足干支以次相紀是陽年有餘而往則陰年不足隨之陰年不足而往則陽年有餘從之迎猶從也知從知隨則陰陽干支之氣可與相期而有定矣應天為天符承歲為歲直三合為治承上文有餘不足之意而言六十歲之中有天符歲直三合之年則為平氣無有餘無不足也天符者如甲己土運之歲歲當己丑己未蓋己為土運而丑未為太陰濕土乙庚金運之歲歲當乙卯乙酉乙為金運而卯酉為陽明燥金丙辛水運之歲歲當丙辰丙戌丙為水運而辰戌為太陽寒水丁壬木運之歲歲當丁巳丁亥丁為木運而巳亥為厥陰風木戊癸火運之歲歲當戊子戊午戊寅戊申戊為火運而子午為少陰君火寅申為少陽相火五運之氣與司天之氣相應故曰應天為天符歲直者如甲己土運歲當甲辰甲戌己丑己未蓋甲己運土而辰戌丑未屬土也乙庚金運歲當乙酉庚申乙庚運金而申酉屬金也丙辛水運歲當丙子辛亥丙辛運水而亥子屬水也丁壬木運歲當丁卯壬寅丁壬運木而寅卯屬木也戊癸火運歲當戌午癸巳戊癸運火而巳午屬火也五運之氣承襲歲支故曰承歲為歲直直猶會也三合者五運之氣司天之氣歲支之氣三者皆同如戊午之歲戊為火運午為少陰君火而午支亦屬乎火己丑己未之歲己為土運丑未為太陰濕土而丑未之支亦屬乎土乙酉之歲乙為金運酉為陽明燥金而酉支亦屬乎金故曰三合三合又名太乙天符為治者言天符歲直三合無有餘無不足也帝曰上下相召奈何上文云氣有多少形有盛衰上下相召而損益彰故問上下相召奈何鬼臾區曰寒暑燥濕風火天之陰陽也三陰三陽上奉之木火土金水地之陰陽也生長化收藏下應之天以陽生陰長地以陽殺陰藏天有陰陽地亦有陰陽長去聲藏如字下俱同此引天元册文之言言天地氣交以明上下相召之意寒暑燥濕風火乃天之六氣而為天之陰陽也太陽主寒少陰主熱暑猶熱也陽明主燥太陰主濕厥陰主風少陽主火故三陰三陽上奉之木火土金水乃地之五行而為地之陰陽也春木主生夏火主長長夏土主化秋金主收冬水主藏故生長化收藏下應之春生夏長而歲半之前天氣主之故天以陽生陰長秋殺冬藏而歲半之後地氣主之故地以陽殺陰藏夫陽生陰長是天有陰陽陽殺陰藏是地亦有陰陽此天元册文之言引之以明上下相召之意木火土金水地之陰陽也生長化收藏故陽中有陰陰中有陽申明地亦有陰陽者即上文所言木火土金水地之陰陽也而主生長化收藏但言地而不言天者地秉天氣以化生也秉天氣以化生故天為陽而陽中有陰地為陰而陰中有陽是天地者主生化不但天主生長地主殺藏也所以欲知天地之陰陽者應天之氣動而不息故五歲而右遷應地之氣靜而守位故六期而環會天地陰陽上下相召所以欲知天地之陰陽者天動地靜地以五運應天之氣則動而不息五運本於天干始於甲之土運次則乙之金運次則丙之水運次則丁之木運次則戊之火運土金水木火五歲以終至六歲右遷於己復起土運此地之五運而上召於天也天以六氣應地之氣則靜而守位六氣本於地支始以少陰君火之子次則太陰濕土之醜次則少陽相火之寅次則陽明燥金之卯次則太陽寒水之辰次則厥陰風木之巳三陰三陽以君相二火而合五行至六期則六氣以終七歲臨午復環會於少陰君火此天之六氣而下召於地也動靜相召上下相臨陰陽相錯而變由生也天動地靜天上地下天陽地陰如上文動靜相召上下相臨陰陽相錯則損益在其中而變所由生也此承帝問所以申明上下相召而損益彰者如此帝曰上下周紀其有數乎五歲左遷六期環會上下相召為周為紀其有定數乎鬼臾區曰天以六為節地以五為制周天氣者六期為一備終地紀者五歲為一周君火以明相火以位上下周紀之數乃天之六氣地之五運相合而成天以六為節六氣之三陰三陽也地以五為制五運之五行也周天氣者子屬少陰君火司天醜屬太陰濕土司天寅屬少陽相火司天卯屬陽明燥金司天辰屬太陽寒水司天巳屬厥陰風木司天是六期為六氣之一備終地紀者甲主土運乙主金運丙主水運丁主木運戊主火運是五歲為五運之一周五運者五行也六氣者亦五行也六氣之中有二火則君火以明相火以位君主神明故曰以明相主輔佐故曰以位五六相合而七百二十氣為一紀凡三十歲千四百四十氣凡六十歲而為一周不及太過斯皆見矣五六相合者五運之十干六氣之十二支相合成歲始於甲子終於癸亥一歲凡二十四氣而七百二十氣為三十歲之一紀又七百二十氣則一千四百四十氣為六十歲之一周其中五運六氣之不及太過斯皆見矣此申明上下周紀之數者如此帝曰夫子之言上終天氣下畢地紀可謂悉矣余願聞而藏之上以治民下以治身使百姓昭著上下和親德澤下流子孫無憂傳之後世無有終時可得聞乎上天下地其理難悉鬼臾區言之上終天氣下畢地紀可謂悉矣而帝欲藏之金匱使百姓子孫知天地陰陽之數更欲傳之後世無有終時謂陰陽之理至重至貴不可不知之意鬼臾區曰至數之機迫迮以微其來可見其往可追敬之者昌慢之者亡無道行私必得天殃謹奉天道請言真要迮窄同迫迮以微細而深也可見可追復彰著矣敬畏而研求之則災眚可避故昌慢忽而舍置之則災害及身故亡若無天地陰陽之道而行家技方術之私必得天殃天殃而曰必得謂不得之於身必得之於後世也天道至真各有其要故必謹奉天道而請言真要耳帝曰善言始者必會不終善言近者必知其遠是則至數極而道不惑所謂明矣願夫子推而次之令有條理簡而不匱久而不絶易用難忘為之綱紀至數之要願盡聞之易去聲陰陽之道自始至終由近及遠簡而明易而難有條有理有綱有紀帝願盡間以傳後世鬼臾區曰昭乎哉問明乎哉道如鼓之應桴響之應聲也道言也帝問既昭臣言必明君臣問對一德一心如鼓之應桴響之應聲相合而無間也臣聞之甲己之歲土運統之乙庚之歲金運統之丙辛之歲水運統之丁壬之歲木運統之戊癸之歲火運統之聞之者聞之上古也甲己化土故甲己之歲土運統之乙庚化金故乙庚之歲金運統之丙辛化水故丙辛之歲水運統之丁壬化木故丁壬之歲木運統之戊癸化火故戊癸之歲火運統之或問甲己何以化土云云愚曰太始天元玉册云十二流精五氣橫天五運之德氣建於寅者是也謂十二地支配合天干流行一周復得地支之首而精氣化生即以正月建寅之義推之尤本於五氣之橫天而得其真也支幹配合始於甲子流行一周則為丙子丙屬火而生土故甲己化土又行一周則當戊子戊屬土而生金故乙庚化金此即正月建寅而甲己之歲月建丙寅乙庚之歲月建戊寅之義以次推之是十二流精而氣建於寅也五氣橫天者黅天之氣經於心尾己分心尾甲度也己分己度也黅土氣也故甲己化土素天之氣經於亢氐昂畢亢氐乙度也昂畢庚度也素金氣也故乙庚化金玄天之氣經於張翼婁胃張翼丙度也婁胃辛度也玄水氣也故丙辛化水蒼天之氣經於危室柳鬼危室壬度也柳鬼丁度也蒼木氣也故丁壬化木丹天之氣經於女牛戊分女牛癸度也戊分戊度也丹火氣也故戊癸化火此五氣橫天候之所始道之所生也帝曰其於三陰三陽合之奈何三陰三陽合十二地支故問其於三陰三陽合之奈何鬼臾區曰子午之歲上見少陰丑未之歲上見太陰寅申之歲上見少陽卯酉之歲上見陽明辰戌之歲上見太陽巳亥之歲上見厥陰少陰所謂標也厥陰所謂終也厥陰之上風氣主之少陰之上熱氣主之太陰之上濕氣主之少陽之上相火主之陽明之上燥氣主之太陽之上寒氣主之所謂本也是謂六元此引天元册文之言以明三陰三陽合十二地支復承六氣於上也子午之歲少陰司天故上見少陰丑未之歲太陰司天故上見太陰寅申之歲少陽司天故上見少陽卯酉之歲陽明司天故上見陽明辰戌之歲太陽司天故上見太陽巳亥之歲厥陰司天故上見厥陰標猶始也少陰子午也厥陰巳亥也立歲始於甲子終於癸巳此三十歲為一紀其次始於甲午終於癸亥此六十歲為一周故少陰子午所謂始也厥陰巳亥所謂終也厥陰合風故厥陰之上風氣主之風氣在上而厥陰在下也少陰合熱故少陰之上熱氣主之熱氣在上而少陰在下也太陰合濕故太陰之上濕氣主之濕氣在上而太陰在下也少陽合火故少陽之上相火主之相火在上而少陽在下也陽明合燥故陽明之上燥氣主之燥氣在上而陽明在下也太陽合寒故太陽之上寒氣主之寒氣在上而太陽在下也風熱濕火燥寒在上所謂本也在上為本為六氣之元故曰是謂六元此引天元册文之言以明三陰三陽上合六氣之義帝曰光乎哉道明乎哉論請著之玉版藏之金匱署曰天元紀道言也論亦言也鬼臾區之言至光至明著之玉版示貴重也藏之金匱垂不朽也署曰天元紀因天元册文之言而命名也五運行大論第六十九篇五運行者木火土金水五運五行之氣也始則五氣橫天而化五運五行既則天地之大人物之衆皆本運行以化生本經第五篇陰陽應象大論為五運行之大綱此則原其所始而反復申明之黃帝坐明堂始正天綱臨觀八極考建五常明堂君臣一堂嚮明而治也天綱天文之大綱也始正天綱天道立矣八極皇極之八方也臨觀八極地道立矣五常五倫之常理也考建五常人道立矣史臣將述黃帝岐伯論天地陰陽氣運之理而先記敘之請天師而問之曰論言天地之動靜神明為之紀陰陽之升降寒暑彰其兆余聞五運之數於夫子夫子之所言正五氣之各主歲爾首甲定運余因論之鬼臾區曰土主甲己金主乙虞水主丙辛木主丁壬火主戊癸子午之上少陰主之丑未之上太陰主之寅申之上少陽主之卯酉之上陽明主之辰戌之上太陽主之巳亥之上厥陰主之不合陰陽其故何也帝引氣交變大論之言並六節臟象大論之言及上篇鬼臾區之言而探陰陽相合之原也氣交變大論云天地之動靜神明為之紀陰陽之往復寒暑彰其兆帝引以問蓋欲詳陰天地動靜之神明陰陽升降之寒暑也聞五運之數於夫子五氣各主歲也六節臟象岐伯云五運相襲而皆治之終期之日周而復始也首甲定運者天有十日日六竟而周甲甲六復而終歲也余因論之者天元紀大論帝舉五運相襲之言與鬼臾區論五六相合之道鬼臾區有甲己之歲土運主之云云有子午之歲上見少陰雲云此帝復舉鬼臾區之言而言不合陰陽謂五六之不相合其故何也蓋欲探其相合之原也岐伯曰是明道也此天地之陰陽也夫數之可數者人中之陰陽也然所合數之可得者也夫陰陽者數之可十推之可百數之可於推之可萬天地陰陽者不以數推以象之謂也可數及數之可十數之可千俱上聲余皆如字天地之陰陽不同於人中之陰陽天地之陰陽道也人中之陰陽數也五氣主歲首甲定運陰陽相合者也是明道也此天地之陰陽也若夫五行之數可數者此人中之陰陽也然以人中陰陽之數而合於天則天人一理所合數之可得者也夫人中之陰陽者數之可十推之可百數之可千推之可萬其數無窮若天地之陰陽者不以數推而淡漠之初仰觀其象但以象之謂也帝曰願聞其所始也天地陰陽不以數而以象故願聞其所始岐伯曰昭乎哉問也臣覽太始天元册文丹天之氣經於牛女戊分黅天之氣經於心尾己分蒼天之氣經於危室柳鬼素天之氣經於亢氐昴畢玄天之氣經於張翼婁胃所謂戊己分者奎壁角軫則天地之門戶也夫候之所始道之所生不可不通也分俱去聲黅音今餘篇同陰陽之始本於太虛故舉太始天元册文而言其始也輕清之氣上凝為天輕清之中復有丹黅蒼素玄之氣氣色殊而應化不同故丹天之氣經於牛女戊分牛女癸度也戊分奎壁之干度也丹天之氣始經於此此戊癸所以化火而少陽相火應丹天之左右也黅天之氣經於心尾己分心尾甲度也己分角軫之巽度也黅天之氣始經於此此甲己所以化土而太陰濕土應黅天之左右也蒼天之氣經於危室柳鬼危室壬度也柳鬼丁度也蒼天之氣始經於此此丁壬所以化木而厥陰風木應蒼天君之左右也素天之氣經於亢氐昴畢亢氐乙度也昴畢庚度也素天之氣始經於此此乙庚所以化金而陽明燥金應素天之左右也玄天之氣經於張翼婁胃張翼丙度也婁胃辛度也玄天之氣始經於此此丙辛所以化水而太陽寒水應玄天之左右也少陰君火位極其尊不司氣化故不應也所謂丹天戊分黅天己分者戊為天門猶干之奎壁己為地戶猶翼之角軫故奎壁角軫則天地之門戶也夫此氣候之所始而為道之所生本於淡漠生化無窮不可不通也帝曰善論言天地者萬物之上下左右者陰陽之道路未知其所謂也陰陽之始既明帝故善之復舉天元紀大論鬼臾區之言而復問也岐伯曰所謂上下者歲上下見陰陽之所在也所謂上下者司天在上在泉在下如少陰在上則陽明在下陽明在上則少陰在下太陰在上則太陽在下太陽在上則太陰在下少陽在上則厥陰在下厥陰在上則少陽在下一歲之中上下可見即陰陽之所在也天地者萬物之上下此之謂也左右者諸上見厥陰左少陰右太陽見少陰左太陰右厥陰見太陰左少陽右少陰見少陽左陽明右太陰見陽明左太陽右少陽見太陽左厥陰右陽明所謂面北而命其位言其見也此言在上之左右也諸猶凡也所謂左右者凡見厥陰在上則少陰在左太陽在右見少陰在上則太陰在左厥陰在右見太陰在上則少陽在左少陰在右見少陽在上則陽明在左太陰在右見陽明在上則太陽在左少陽在右見太陽在上則厥陰在左陽明在右天體面南人見而定其位所謂面北而命其左右之位面北而言其在上之見也帝曰何謂下因上而探其下岐伯曰厥陰在上則少陽在下左陽明右太陰少陰在上則陽明在下左太陽右少陽太陰在上則太陽在下左厥陰右陽明少陽在上則厥陰在下左少陰右太陽陽明在上則少陰在下左太陰右厥陰太陽在上則太陰在下左少陽右少陰所謂面南而命其位言其見也此言在下之左右也如厥陰司天在上則少陽在下少陽之左陽明也少陽之右太陰也少陰司天在上則陽明在下陽明之左太陽也陽明之右少陽也太陰司天在上則太陽在下太陽之左厥陰也太陽之右陽明也少陽司天在上則厥陰在下厥陰之左少陰也厥陰之右太陽也陽明司天在上則少陰在下少陰之左太陰也少陰之右厥陰也太陽司天在上則太陰在下太陰之左少陽也太陰之右少陰也地體面北人定其位所謂面南而命其左右之位面南而言其在下之見也左右者陰陽之道路此之謂也上下相遘寒暑相臨氣相得則和不相得則病上下相遘天地之氣相交也寒暑相臨陰陽之氣相加也氣相得則和加臨之氣與主時之氣相為生旺則和不相得則病加臨之氣與主時之氣相為克賊則病如子午少陰司天陽明在泉此主歲之氣也初之氣厥陰風木二之氣少陰君火三之氣太陰濕土四之氣少陽相火五之氣陽明燥金終之氣太陽寒水此主時之氣也如陽明在泉則陽明之左太陽也凡加臨之客氣起於在泉之左氣則太陽寒水加於初之氣厥陰風木加於二之氣少陰君火加於三之氣以次相加其中與主時之氣生旺而相得克賊而不相得可意會矣帝曰氣相得而病者何也六氣加臨亦有相得而病者故舉以問岐伯曰以下臨上不當位也當去聲後同六氣之中有二火君火以明而在上相火以位而在下如卯酉陽明司天則少陰在泉少陰之左太陰也太陰濕土加於初之氣厥陰風木則少陽相火加於二氣之少陰君火以火加火其氣相得雖曰相得以在下之火加臨於上不當位也六微旨大論曰君位臣則順臣位君則逆此之謂也帝曰動靜何如承上文以下臨上之意而問動靜何如謂天動地靜其加臨何如也岐伯曰上者右行下者左行左右周天余而復會也地體常靜承天氣而運行子午少陰司天者從右行而交於丑未之太陰則卯酉陽明在下者從左行而交於辰戌之太陽是上者右行下者左行始於子而終於巳六期環會則左右周天其後復始於午而終於亥則余而復會也帝曰余聞鬼臾區曰應地者靜今夫子乃言下者左行不知其所謂也願聞何以生之乎生猶動也天元紀大論鬼臾區曰應地之氣靜而守位帝引之以證岐伯下者左行之語而願聞地之所以動也岐伯曰天地動靜五行遷復雖鬼臾區其上候而已猶不能遍明天地動靜猶言天動地靜也地雖靜而地之五行亦遷移環轉余而復會故曰五行遷復前篇鬼臾區曰臣斯十世雖鬼臾區其十世以上止占候其氣而已猶不能遍明其變化流行之理夫變化之用天垂象地成形七曜緯虛五行麗地地者所以載生成之形類也虛者所以列應天之精氣也形精之動猶根本之與枝葉也仰觀其象雖遠可知也易曰乾道變化變者化之漸化者變之成易系曰在天成象在地成形象者日月星辰之屬形者山川動植之屬故夫變化之用天垂象地成形天垂象此七曜所以緯虛言日月五星經緯於太虛也地成行此五行所以麗地言天布五行下麗於地而生長化收藏也五行麗地故地者所以載生成之形類也七曜緯虛故虛者所以列應天之精氣也形類精氣之動而形本乎精是精為根而形為葉猶根本之與枝葉也但仰觀其天象天雖高遠理可知也知天則知地矣帝曰地之為下否乎否批上聲否閉塞也地氣不升天氣不降則閉塞不通故問地之為下否乎岐伯曰地為人之下太虛之中者也人戴天履地故地為人之下天覆於上環繞地下地在太虛之中者也帝曰馮乎馮作憑憑依也地為太虛之中其有依乎岐伯曰大氣舉之也天清於上地宣於下大氣舉之則所憑者氣也燥以干之暑以蒸之風以動之濕以潤之寒以堅之火以溫之故風寒在下燥熱在上濕氣在中火遊行其間寒暑六入故令虛而化生也統言之則曰大氣析言之則有燥暑風濕寒火六氣遊行出入於地中而化生萬物也燥暑風濕寒火在天無形之氣也干蒸動潤堅溫在地有形之徵也故風寒之氣在於地下燥熱之氣在於地上濕土之氣在於地中火熱之氣遊行其間一歲之中日月運行一寒一暑今風濕類乎寒燥火類乎暑是寒暑六氣入於地中故令地在太虛之中而化生萬物也由此而推之於人肝腎在下即風寒在下也肺心在上即燥熱在上也脾位中央即濕氣在中也三焦之氣遊行於上中下即火遊行其間也人居天地之中而與天地相參也故燥勝則地干暑勝則地熱風勝則地動濕勝則地泥寒勝則地裂火勝則地固矣此承上文之義而復言之上文云燥以干之故燥勝則地干暑以蒸之故暑勝則地熱惟蒸也故熱風以動之故風勝則地動濕以潤之故濕勝則地泥惟潤也故泥寒以堅之故寒勝則地裂裂堅之極也火以溫之故火勝則地固固牢實也潤則泥溫則固理當然也帝曰天地之氣何以候之天地之氣何以候之於人岐伯曰天地之氣勝復之作不形於診也脈法曰天地之變無以脈診此之謂也天地之氣五運六氣也勝復之作淫勝郁復也運氣之變發為民病非診候之可知也故診脈之法曰天地之變無以脈診即此天地之氣勝復之作不形於診之謂也帝曰間氣何如間去聲岐伯曰隨氣所在期於左右司天左右之氣在泉左右之氣謂之間氣如少陰司天則左太陰右厥陰謂之間氣而居乎上陽明在泉則左太陽右少陽謂之間氣而居乎下是隨司天在泉之氣而期於左右也帝曰期之奈何期於左右何以驗之故問期之奈何岐伯曰從其氣則和違其氣則病從同也違逆也從其氣者歲中主時之氣與加臨之間氣相同如初之氣厥陰風木而丑未之歲厥陰風木加於初氣是從其氣也從則陰陽相合故和違其氣者主時之氣與加臨之氣相逆如初之氣厥陰風木而卯酉之歲太陰濕土加於初氣木刑其土是違其氣也違則加臨受制故病不當其位者病不當其位即上文云以下臨上不當位也如卯酉之歲太陰濕土加於初氣之厥陰風木則少陽相火加於二氣之少陰君火以下臨上不當其位故病迭移其位者病迭代也間氣加臨其主時正位之氣代為移易間氣乘主非其時而有其氣故病失守其位者危失守其位者非其主氣之時而乘侮之虛其本位而失守也如初氣厥陰風木燥金之氣乘所不勝而侮之則金失守其位至陽明燥金主氣之時不能自旺故危危無以自立也尺寸反者死少陰君火不司氣化五運南北之政則司天在泉尺寸當不應而反應者失其常也故死陰陽交者死評熱病論云有病溫者汗出輒復熱而脈躁疾不為汗衰狂言不能食病名陰陽交交者死也先立其年以知其氣左右應見然後乃可以言死生之逆順應平聲結上文左右間氣加臨必先立其主氣之年以知其間氣之左右應見然後乃可以言死生之逆順帝曰寒暑燥濕風火在人合之奈何其於萬物何以化生天地人萬物皆有寒暑燥濕風火之六氣故舉六氣之合於人而化生萬物以問岐伯曰東方生風風生木木生酸酸生肝肝生筋筋生心其在天為玄在人為道在地為化化生五味道生智玄生神化生氣神在天為風在地為木在體為筋在氣為柔在臟為肝此下皆申明六氣合於人身而化生萬物之意文同陰陽應象大論解在本篇此則曰化生氣化生五味之氣也在氣為柔風木之氣柔和也其性為喧其德為和其用為動日暖曰喧春時天日始暖故其性為喧陽和始布故其德為和性喧德和氣機旋轉故其用為動其色為蒼其化為榮其蟲毛彼蒼者天色之青也其化為榮物始生也其蟲毛森森之象也其政為散其令宣發其變摧拉其眚為隕散敷布也其政敷布則其令宣發摧拉解散也隕崩墜也眚災害也其變摧拉則其眚為隕其味為酸其志為怒怒傷肝悲勝怒風傷肝燥勝風酸傷筋辛勝酸曲直作酸故其味為酸肝志善怒故其志為怒而怒則傷肝悲者憂之類肺之情金能平木故悲勝怒風氣傷肝而燥勝風酸味傷筋而辛勝酸皆金能平木之意南方生熱熱生火火生苦苦生心心生血血生脾其在天為熱在地為火在體為脈在氣為息在臟為心解見陰陽應象大論此則曰在氣為息呼吸之息乃陽熱之氣也其性為暑其德為顯其用為躁炎夏曰暑南方火熱故其性為暑火氣彰明故其德為顯性暑德顯氣機迅疾故其用為躁其色為赤其化為茂其蟲羽丹天之氣色之赤也其他為茂物之盛也其蟲羽飛動之象也其政為明其令鬱蒸其變炎爍其眚燔焫明猶顯也鬱蒸盛熱也其政為明則其令盛熱炎爍火熱也燔焫火熱之極也其變炎爍則其眚燔焫其味為苦其志為喜喜傷心恐勝喜熱傷氣寒勝熱苦傷氣咸勝苦炎上作苦故其味為苦心志善喜故其志為喜而喜則傷心恐者腎之情水能制火故恐勝喜熱傷心氣而寒勝熱苦傷心氣而咸勝苦皆水能制火之意中央生濕濕生土土生甘甘生脾脾生肉肉生肺其在天為濕在地為土在體為肉在氣為充在臟為脾解見陰陽應象大論此則曰在氣為充土氣充於四旁也其性靜兼其德為濡其用為化土位中央而四布位中央則靜四布則兼故其性靜兼萬物資生故其德為濡靜兼而濡生變無窮故其用為化其色為黃其化為盈其蟲倮黅天之氣色之黃也其化為盈物之充也其蟲倮肉體之象也其政為謐其令雲雨其動變注其眚淫潰謐音密餘篇同謐安靜也地體安靜故其政為謐濕氣上升為云為雨故其令雲雨雲行雨施故其變動注動注不已則其眚淫潰其味為甘其志為思思傷脾怒勝思濕傷肉風勝濕甘傷脾酸勝甘稼穡作甘故其味甘脾志善思故其志為思而思則傷脾怒者肝之情木能刑土故怒勝思濕氣傷肉而風勝濕甘味傷脾而酸勝甘皆木能刑土之意西方生燥燥生金金生辛辛生肺肺生皮毛皮毛生腎其在天為燥在地為金在體為皮毛在氣為成在臟為肺解見陰陽應象大論在氣為成者感秋氣而萬物成就也其性為涼其德為清其用為固秋氣容平故其性為涼氣機收斂故其德為清萬物成實故其用為固其色為白其化為斂其蟲介素天之氣色之白也其化為斂物之收也其蟲介金甲之象也其政為徑其令霧露其變肅殺其眚蒼落徑堅鋭也金質堅鋭故具政為徑白露降故其令霧露夏盛極而秋始衰故其變肅殺萬物凋謝故其眚蒼落其味為辛其志為憂憂傷肺喜勝憂熱傷皮毛寒勝熱辛傷皮毛苦勝辛從革作辛故其味為辛肺志善憂故其志為憂而憂則傷肺喜者心之情火能剋金故喜勝憂熱氣傷皮毛而寒勝熱辛味傷皮毛而苦勝辛皆火能剋金之意按春曰風傷肝夏曰熱傷氣長夏曰濕傷肉冬曰寒傷血皆四時本氣自傷此秋則曰熱傷皮毛乃所勝之氣傷之以見五臟有受傷於四時之本氣者有受傷於所勝之客氣者舉一臟之不同而可類推於五臟矣北方生寒寒生水水生咸咸生腎腎生骨髓髓生肝其在天為寒在地為水在體為骨在氣為堅在臟為腎解見陰陽應象大論在氣為堅者感冬氣而萬物堅凝也其性為凜其德為寒其用為操操原本闕今補凜嚴厲也冬氣嚴厲而寒故其性為凜其性為凜則其德為寒性凜德寒則其用為操操貞固也其色為黑其化為肅其蟲鱗玄天之氣色之黑也其化為肅物之藏也其蟲鱗水中之生物也其政為靜其令嚴貞其變凝冽其眚冰雹嚴貞原本闕文今補雹音薄餘篇同冬氣安定故其政為靜嚴寒貞固故其令嚴貞凝冽冷之極也冰雹水之堅也也變凝例則其青冰雹其味為咸其志為恐恐傷腎思勝恐寒傷血燥勝寒咸傷血甘勝咸潤下作咸故其味為咸腎志善恐故其志為恐而恐則傷腎思者脾之情土勝其水故思勝恐寒水傷陰血而土燥則勝寒鹹味傷陰血而甘味則勝咸皆土能勝水之意五氣更立各有所先非其位則邪當其位則正更平聲總結上文而言五方之氣更立四時春風夏熱秋燥冬寒各有所先非其主位而有是氣則為邪當其主位而有是氣則為正也帝曰病之生變何如非其位則邪故問病之生變何如岐伯曰氣相得則微不相得則甚四時之氣皆能為病氣相得而病則病之生變也微氣不相得而病則病之生變也甚帝曰主歲何如氣相得則微不相得則甚則四時之氣皆能為病故問主歲之太過不及何如岐伯曰氣有餘則制己所勝而侮所不勝其不及則己所不勝侮而乘之己所勝輕而侮之五氣更立主時之氣也五運在中主歲之氣也如甲己土運主歲土氣有餘則制己所勝之水氣而侮所不勝之木氣土氣不及則己所不勝之木氣侮而乘之己所勝之水氣亦輕而侮之有餘不及皆為病也五氣皆然侮反受邪侮而受邪寡於畏也歲氣貴得其平不可有餘不可不及始則乘而侮之繼則侮反受邪如歲土有餘制其水氣土虛本位至長夏土氣主時不能自旺水之子木反制其土是侮反受邪申言侮而受邪其始不安其位寡於畏忌之所致也五氣皆然帝曰善氣有餘而乘侮則侮反受邪若氣不足而受侮則鬱久當復帝故善之六微旨大論第七十篇承上篇五運行而論天道六六之節地理應六節上下有位左右有紀歲數始終萬物生化之道本經第九篇六節藏象大論為六氣之大綱此則闡明其旨以悉其微故曰六微旨大論黃帝問曰嗚呼遠哉天之道也如迎浮雲若視深淵視深淵尚可測迎浮雲莫知其極夫子數言謹奉天道余聞而藏之心私異之不知其所謂也願夫子溢志盡言其事令終不滅久而不絶天之道可得聞乎數音朔藏如字嗚呼嘆詞遠大也帝嘆天道遠大莫知其極願聞天道於岐伯令終不滅久不絶而傳之後世也岐伯稽首再拜對曰明乎哉問天之道也此因天之序盛衰之時也帝問天道故贊其明天道者因天四時之序而有盛衰之時也盛衰者春夏為盛秋冬為衰帝曰願聞天道六六之節盛衰何也承上文盛衰之時而問天道六六之節亦有盛衰何也六六之節者天以六為節六六三百六十日以成一歲也岐伯曰上下有位左右有紀六六之節而有盛衰者一歲之中有上下陰陽之氣有左右陰陽之氣也上下者司天在上在泉在下司天在泉有一定之位左右者司天左右之氣在泉左右之氣左右陰陽有不易之紀詳見下文故少陽之右陽明治之陽明之右太陽治之太陽之右厥陰治之厥陰之右少陰治之少陰之右太陰治之太陰之右少陽治之此所謂氣之標蓋南面而待也故曰因天之序盛衰之時移光定位正立而待此之謂也所謂左右有紀者在泉左氣為間氣加臨之首六氣始於厥陰厥陰司天則少陽在泉故少陽之右陽明治之為間氣加臨之首少陰司天則陽明在泉故陽明之右太陽治之為間氣加臨之首太陰司天則太陽在泉故太陽之右厥陰治之為間氣加臨之首少陽司天則厥陰在泉故厥陰之右少陰治之為間氣加臨之首陽明司天則少陰在泉故少陰之右太陰治之為間氣加臨之首太陽司天則太陰在泉故太陰之右少陽治之為間氣加臨之首在上為本在下為標今舉在泉之氣故曰此所謂氣之標位本在左今曰右者在泉面北蓋人則面南而待之也故八正神明論曰因天之序盛衰之時移光定位正立而待即此面南而待之之謂也少陽之上火氣治之中見厥陰陽明之上燥氣治之中見太陰太陽之上寒氣治之中見少陰厥陰之上風氣治之中見少陽少陰之上熱氣治之中見太陽太陰之上濕氣治之中見陽明所謂本也本之下中之見也見之下氣之標也所謂上下有位者六氣有上中下之位也承上文所舉之次而言少陽之上火氣治之是火氣在上而少陽在下也少陽厥陰相為表裡故中見厥陰陽明之上燥氣治之是燥氣在上而陽明在下也陽明太陰相為表裡故中見太陰太陽之上寒氣治之是寒氣在上而太陽在下也太陽少陰相為表裡故中見少陰厥陰之上風氣治之是風氣在上而厥陰在下也厥陰少陽相為表裡故中見少陽少陰之上熱氣治之是熱氣在上而少陰在下也少陰太陽相為表裡故中見太陽太陰之上濕氣治之是濕氣在上而太陰在下也太陰陽明相為表裡故中見陽明此火燥寒風熱濕六氣在上所謂本也厥陰少陰太陰少陽陽明太陽六氣在中是本之下而有中之見也少陽陽明太陽厥陰少陰太陰六氣在下是中之下而有氣之標也本標不同氣應異象本在上標在下故本標不同氣有從本者有從本從標者有不從標本從乎中者六氣應病不同故氣應異象象病形也帝曰其有至而至有至而不至有至而太過何也上文言六氣之上下左右未言盛衰故舉歲氣之不及太過以問岐伯曰至而至者和至而不至來氣不及也未至而至來氣有餘也至而至者得其平也故曰和至而不至乃時至而氣不至是謂不及故曰來氣不及也未至而至乃時未至而氣先至是至而太過故曰來氣有餘也有餘不及即盛衰也帝曰至而不至未至而至何如至而不至未至而至何以驕之岐伯曰應則順否則逆逆則變生變生則病應者時至物生不先不後有常序也故應則順否則物不應期或後或先失其常序故否則逆逆則變生變生則為民病矣帝曰善請言其應時物相應則順帝故善之復探其應岐伯曰物生其應也氣脈其應也以天時之氣而徵於地則物應四時故物生其應也物生其應以明應則順否則逆也以天時之氣而徵於人則脈應四時故氣脈其應也氣脈其應以明逆則變生變生則病也帝曰善願聞地理之應六節氣位何如天時之氣不但徵諸物生且驗諸氣脈帝故善之而天道六六之節應於地理故問地理之應六節氣位何如岐伯曰顯明之右君火之位也君火之右退行一步相火治之復行一步土氣治之復行一步金氣治之復行一步水氣治之復行一步木氣治之復行一步君火治之地理地之五方五行也六節時之六氣六位也以地理之五而應六節之六當分南北四隅以定其位而應之顯明者東方日出厥陰木王之氣也厥陰位於東北從東北而轉於東南則厥陰顯明之右少陰君火之位也從東南而轉於正南則君火之右退行一步少陽相火治之從正南而轉於西南則復行一步太陰土氣治之從西南而轉於西北則復行一步陽明金氣治之從西北而轉於正北則復行一步太陽水氣治之從正北而轉於東北則復行一步厥陰木氣治之從東北而轉於東南則復行一步少陰君火治之猶之顯明之右君火之位之謂也此地理之南北四隅以應天時之六氣六位者如此余注五運六氣司天在泉皆以辭達意闡明經旨並不繪圖茲地理應六節氣位並非六氣主時之位故繪此圖以曉之至六氣主時但以六氣主歲六氣加臨之次比類例觀總屬一理毋須余言之喋喋也愚按地理應六節論南北四隅方位非六氣主時之位也六氣主時以正月朔日平旦為始一氣主六十日初之氣厥陰風木二之氣少陰君火三之氣太陰濕土四之氣少陽相火五之氣陽明燥金終之氣太陽寒水六元正紀大論云六氣者常以正月朔日平旦視之睹其位而知其所在也其氣當以立春為始大寒為終此三陰三陽之氣從陰而陽由一而三環轉運行天氣如是人氣亦如是前人圖式訛以地理相應之位為六氣主時之位又扯大寒之氣為六氣之首未免節氣有乖三氣少陽四氣太陰不無陰陽倒置且於五常政至真要大論諸篇次序不合前人因訛傳訛亟當改正相火之下水氣承之水位之下土氣承之土位之下風氣承之風位之下金氣承之金位之下火氣承之君火之下陰精承之少陽相火位乎南太陽寒水位乎北是相火之下水氣承之也太陽寒水位乎正北太陰濕土位乎西南是水位之下土氣承之也太陰濕土位乎西南厥陰風木位乎東北是土位之下風氣承之也厥陰風木位乎東北陽明燥金位乎西北是風位之下金氣承之也陽明燥金位乎西北少陰君火位乎東南是金位之下火氣承之也少陰君火位乎東南太陽寒水位乎正北是君火之下陰精承之也此四隅上下氣有承製猶之春時木王越夏與長夏而秋金之氣承之夏時火王越長夏與秋而冬水之氣承之秋時金王越冬春而夏火之氣承之冬時水王越春夏而長夏之土氣承之其義一也帝曰何也帝問下承何義岐伯曰亢則害承乃制制則生化外列盛衰害則敗亂生化大病張隱菴曰古文制生則化今文改為制則生化亢盛極也五行之氣盛極則害下承乃所以制之惟其制之則生化無窮而外列盛衰制則生化者如水制其火而水之子木又生火也外列盛衰者盛已而衰衰已而盛四時之氣可徵也若亢極而害則敗亂內生致生化大病帝曰盛衰何如上文云外列盛衰故問盛衰何如岐伯曰非其位則邪當其位則正邪則變甚正則微當去聲盛衰者有餘不及之謂非其主氣之位而或盛或衰則為邪當其所主之位宜盛而盛宜衰而衰則為正邪氣為病則變異必甚正氣為病雖病則微帝曰何謂當位上文云當其位則正故問何謂當位岐伯曰木運臨卯火運臨午土運臨四季金運臨酉水運臨子所謂歲會氣之平也當位者天干化運地支主歲五行相合各當其位也如丁卯之歲木運臨於卯木戊午之歲火運臨於午火甲辰甲戌己丑己未之歲土運臨於辰戌丑未乙酉之歲金運臨於酉金丙子之歲水運臨於子水干支運氣相合所謂歲會氣之平也平氣之歲雖有盛衰是為正氣其病則微帝曰非位何如上文云非其位則邪故問非位何如岐伯曰歲不與會也歲不與會者非歲會之年非歲會之年而氣有盛衰則為邪氣邪則變甚帝曰土運之歲上見太陰火運之歲上見少陽少陰金運之歲上見陽明木運之歲上見厥陰水運之歲上見太陽奈何上文五運下合主歲之地支是為歲會此帝復舉五運上合司天之氣以問土運之歲上見太陰如己丑己未之歲也火運之歲上見少陽如戊寅戊申之歲也上見少陰如戊子戊午之歲也金運之歲上見陽明如乙卯乙酉之歲也木運之歲上見厥陰如丁己丁亥之歲也水運之歲上見太陽如丙辰丙戌之歲也岐伯曰天之與會也故天元册曰天符帝之所問乃司天之氣與五運相合故曰天之與會也天元紀大論云應天為天符故天元册曰天符非太始天元册文也帝曰天符歲會何如天符與歲會相合何如岐伯曰太乙天符之會也天符歲會相合是名太乙天符故曰太乙天符之會也天元紀大論云應天為天符承歲為歲直三合為治太乙天符之會即三合也謂五運之氣司天之氣歲支之氣三者皆同解見天元紀三合為治注內帝曰其貴賤何如至尊無二謂之太乙伯云太乙天符故問貴賤何如岐伯曰天符為執法歲會為行令太乙天符為貴人應司天之氣是為天符天無言而化育猶之執法於上也應主歲之氣是為歲會地承天而生殺猶之行令於下也五運之氣司天之氣歲支之氣三者皆同是為太乙天符太乙者無上至尊猶之衆職環會而為貴人也帝曰邪之中也奈何中去聲下同執法行令貴人是有貴而無賤也若中於邪則非貴矣故問邪之中也奈何岐伯曰中執法者其病速而危中行令者其病徐而持中貴人者其病暴而死天氣運行強健不息中執法者失其旋轉之機故其病速而危主歲之氣下合於地中行令者傷其有形之體故其病徐而持貴人者天地氣交上下環會中貴人者一時不相交會則霄壤判故其病暴而死中邪而病病而且死則為賤矣帝曰位之易也何如天符歲會太乙天符皆主一歲之氣其四時之氣則有六位更易位之易也其病何如岐伯曰君位臣則順臣位君則逆逆則其病近其害速順則其病遠其害微所謂二火也六氣之中有二火君火加於相火之位是君位臣乃以上臨下則順相火加於君火之位是臣位君乃以下侵上則逆逆則其病近其害速順則其病遠其害微君臣者所謂二火也此一節言天道六六之節地理之應六節而各有盛衰也帝曰善願聞其步何如步猶位也上文南北四隅地理之步也願聞六氣之步何如岐伯曰所謂步者六十度而有奇故二十四步積盈百刻而成日也奇音箕下同六十度猶六十日也奇猶零也所謂步者六十日而有零則為一步六十日為一步則一歲六步故二十四步則當四歲有奇者周天三百六十五度四分度之一四分度之一則一歲餘二十五刻四歲則積盈百刻而成有奇之一日也蓋積有奇之刻而成日積有奇之日而成月所以合三百六十五度四分度之一也帝曰六氣應五行之變何如一歲六氣氣應五行有常有變帝故問之岐伯曰位有終始氣有初中上下不同求之亦異也位者主時之定位厥陰為始太陽為終終而復始故曰位有終始位有終始位之常也氣者加臨之間氣在泉左間之氣為加臨之初氣而主歲半以上司天左間之氣為加臨之四氣而主歲半以下四氣居中故曰氣有初中初中者隨司天在泉之上下而更變故上下不同上下不同則求之亦異不同而異氣之變也帝曰求之奈何伯云求之亦異故問求之奈何岐伯曰天氣始於甲地氣始於子子甲相合名曰歲立謹候其時氣可與期天干之氣始於甲地支之氣始於子子甲相合以成其歲故命曰歲立其歲既立則謹候其四時而六氣可與之相期謹候其時所以求之也帝曰願聞其歲六氣始終早晏何如雖曰謹候其時氣可與期而一歲之中六氣相繼有時未至而氣先至有時己至而氣未至是六氣始終有早晏之不同故復問之岐伯曰明乎哉問也甲子之歲初之氣天數始於水下一刻終於八十七刻半六氣始終求其早晏問之明也溯其所始甲子之歲初之氣天數始於水下一刻終於八十七刻半蓋一日十二時一時八刻子午二時各十刻一日計百刻六十日為一氣一氣計六千刻一歲六氣六六計三萬六千刻以歲時而合天度則周天三百六十五度四分度之一一度為一日一日計百刻四分度之一謂一度四分計二十五刻也三百六十日僅合三百六十度以五百二十五刻而六分之則一氣當餘八十七刻半六十日計六千零八十七刻半此申明始終相繼之早晏故但舉其零也二之氣始於八十七刻六分終於七十五刻初之氣終於八十七刻半故二之氣始於八十七刻六分每氣六千零八十七刻半計二氣之終共一萬二千一百七十五刻終於七十五刻者舉其零也三之氣始於七十六刻終於六十二刻半二之氣終於七十五刻故三之氣始於七十六刻三氣之終共一萬八千二百六十二刻半四之氣始於六十二刻六分終於五十刻三之氣終於六十二刻半故四之氣始於六十二刻六分四氣之終共二萬四千三百五十刻五之氣始於五十一刻終於三十七刻半四之氣終於五十刻故五之氣始於五十一刻五氣之終共三萬零四百三十七刻半六之氣始於三十七刻六分終於二十五刻所謂初六天之數也五之氣終於三十七刻半故六之氣始於三十七刻六分六氣之終共三萬六千五百二十五刻以成三百六十五日二十五刻所謂初六此以六氣而合天度之數也乙丑歲初之氣天數始於二十六刻終於一十二刻半甲子之六氣終於二十五刻故乙丑歲初之氣天數始於二十六刻終於四萬二千六百一十二刻半二之氣始於一十二刻六分終於水下百刻二之氣加六千零八十七刻半共四萬八千七百刻舉其零數則百刻也三之氣始於一刻終於八十七刻半上文終於百刻故此復始於一刻紀其零數復加甲子之初氣四之氣始於八十七刻六分終於七十五刻紀其零數復如甲子之二氣五之氣始於七十六刻終於六十二刻半紀其零數復如甲子之三氣六之氣始於六十二刻六分終於五十刻所謂六二天之數也紀其零數復如甲子之四氣此六氣二周所謂六二以六氣而合天度之數也丙寅歲初之氣天數始於五十一刻終於三十七刻半二之氣始於三十七刻六分終於二十五刻三之氣始於二十六刻終於一十二刻半四之氣始於一十二刻六分終於水下百刻五之氣始於一刻終於八十七刻半六之氣始於八十七刻六分終於七十五刻所謂六三天之數也此皆舉其零數六氣三周以六氣而合天度之數也丁卯歲初之氣天數始於七十六刻終於六十二刻半二之氣始於六十二刻六分終於五十刻三之氣始於五十一刻終於三十七刻半四之氣始於三十六刻六分終於二十五刻五之氣始於二十六刻終於一十二刻半六之氣始於一十二刻六分終於水下百刻所謂六四天之數也次戊辰歲初之氣復始於一刻常如是無已周而復始此亦舉其零數以明六氣始終相繼之早晏也四歲則二十四步次戊辰歲初之氣復始於一刻亦如上文始於甲子初氣之一刻終於丁卯六氣之百刻常如是無已四歲一小周周而復始哉曰願聞其歲候何如歲候者一歲一候六十歲則六十候也岐伯曰悉乎哉問也日行一周天氣始於一刻日行再周天氣始於二十六刻日行三周天氣始於五十一刻日行四周天氣始於七十六刻日行五周天氣復始於一刻所謂一紀也是故寅午戌歲氣會同卯未亥歲氣會同辰申子歲氣會同巳酉醜歲氣會同終而復始欲悉歲候可以一紀而會同之如上文甲子之歲日行一周天氣始於一刻一歲既終乙丑之歲日行再周天氣始於二十六刻一歲既終丙寅之歲日行三周天氣始於五十一刻一歲既終丁卯之歲日行四周天氣始於七十六刻四歲已周日行五周天其氣復如甲子之始於一刻凡此四歲所謂一紀也是故四歲會同則寅午戌卯未亥辰申子巳酉醜四歲一會度數相同是為歲氣會同歲氣會同則終而復始此一節言六十度有奇為一氣四歲為一紀三合會同終而復始之義帝曰願聞其用也帝欲以天地陰陽之理合於人身故願聞其用用者變化動靜升降出入也岐伯曰言天者求之本言地者求之位言人者求之氣交天有天之用地有地之用人有人之用故言天之用者當求之本本太初也言地之用者當求之位位八方也言人之用者當求之氣交氣交合天地之氣而交於人也帝曰何謂氣交帝欲聞人之用故問何謂氣交岐伯曰上下之位氣交之半人之居也故曰天樞之上天氣主之天樞之下地氣主之氣交之分人氣從之萬物由之此之謂也分去聲上下之位上天下地之位也氣交之中天氣之下地氣之上是氣交之中而為人之居也六元正紀大論云歲半之前天氣主之歲半之後地氣主之上下交互氣交主之樞者上下之半如樞楗之開闔也故曰天樞之上天氣主之而春夏歲半之氣主乎開也天樞之下地氣主之而秋冬歲半之氣主乎閉也上下交互氣交之分人氣從之而生長壯老已萬物由之而生長化收藏即此氣交之中人居之謂也帝曰何謂初中天樞當歲半之中然必由初而中故問何謂初中岐伯曰初凡三十度而有奇中氣同法六十度零八十七刻半為一氣故凡三十度而有奇初三十四度便為中故曰中氣同法此言一氣之初中也帝曰初中何也帝復問一歲之初中岐伯曰所以分天地也歲半之前天氣主之歲半之後地氣主之一歲初中所以分天地也帝曰願卒聞之願卒聞所以分天地之義岐伯曰初者地氣也中者天氣也在泉左氣為初氣加臨之首故初者在泉之地氣也司天右氣為四氣加臨之首故中者司天之天氣也此一歲之初中所以分天地也帝曰其升降何如地氣主升天氣主降故問升降何如岐伯曰氣之升降天地之更用也更平聲升者降之基降者升之本故氣之升降乃天地之更用也帝曰願聞其用何如其更用何如岐伯曰升已而降降者謂天降已而升升者謂地天氣下降氣流於地地氣上升氣騰於天故高下相召升降相因而變作矣所謂更用者升已而降降者謂天是天之降實基於地之升降已而升升者謂地是地之升實本於天之降夫天氣下降而下降之氣流於地地氣上升而上升之氣騰於天故高下相召而通感升降相因而互遷由是而變作矣變者物生之謂也帝曰善寒濕相遘熱燥相臨風火相值其有間乎間去聲熱燥舊本系燥熱今改升降之理既明帝故善之復舉司天在泉加臨主時之氣以問寒濕相遘者司天在泉之氣也如太陽寒水司天則太陰濕土在泉熱燥相臨者加臨之氣也如太陽司天太陰在泉則少陽火熱加臨初之氣陽明燥金加臨二之氣風火相值者主時之氣也如厥陰風木主初之氣少陰君火主二之氣此司天在泉加臨主時之氣同屬一氣其有間乎間不同也岐伯曰氣有勝復勝復之作有德有化有用有變變則邪氣居之始則有餘而勝既則不足而受復是一氣之中有勝復之不同而勝復之作中有生物之德有柔和之化有操守之用有災眚之變德化用氣之正也變則邪氣居之以明六氣之有間也帝曰何謂邪乎變則邪氣居之故問何謂邪乎岐伯曰夫物之生從於化物之極由乎變變化之相薄成敗之所由也故氣有往復用有遲速四者之有而化而變風之來也萬物由化而生故物之生從於化萬物至變則已極故物之極由乎變變者物之已敗化者物之將成是變化之相薄乃成敗之所由也故天地變化之氣有往有復而往復之用有遲有速經復遲速四者之有則萬物從之而化從之而變變則邪氣居之此風之所由來也以明風氣之為邪帝曰遲速往復風所由生而化而變故因盛衰之變耳成敗倚伏遊乎中何也承岐伯之言而復問也謂遲者氣之衰速者氣之盛往者氣之衰復者氣之盛變者氣之已衰化者氣之將盛如遲速往復則風所由生而化而變其故乃因盛衰之變耳又云成敗之所由則成敗之所以倚伏而遊行乎中者何也岐伯曰成敗倚伏生乎動動而不已則變作矣動者生之機動而不已則變之兆故成敗之所以倚伏者生乎氣機之動動而不已則變作矣中庸云動則變此之謂也帝曰有期乎伯云動而不已帝問其動有止息之期乎岐伯曰不生不化靜之期也動者無息之謂有生有化動無止期惟不生不化則止息之期也靜止也息也帝曰不生化乎萬物資始資生可以不生化乎岐伯曰出入廢則神機化滅升降息則氣立弧危故非出入則無以生長壯老已非升降則無以生長化收藏是以升降出入無器不有故器者生化之宇器散則分之生化息矣故無不出入無不升降化有小大期有近遠四者之有而貴常守反常則災害至矣故曰無形無患此之謂也長上聲藏如字五常政大論云根於中者命曰神機神去則機息根於外者命曰氣立氣止則化絶不生化者猶之出入廢則神機化滅升降息則氣立孤危而天地或幾乎崩墜矣出入者往來無窮之義故非出入則天下之動物無以生長壯老已升降者上下無方之義故非升降則天下之植物無以生長化收藏凡有形者謂之器人與萬物生於天地之中皆屬有形均謂之器是以升降出入無器不有故器者生化之宇宇猶居也聚則成器器散則分之分之者陽歸於天陰歸於地分之則生化息矣故萬物無不有此出入無不有此升降但其中生化有小大死期有遠近如朝菌晦朔螻蛄春秋此化之小期之近者也蓂靈大椿千百歲為春千百歲為秋此化之大期之遠者也小大近遠四者之有而貴常守常守則生反常失守則災害至而不能生矣凡屬有形必患其敗故曰無形無患即此不生化之謂也故曰成語未詳其處帝曰善有不生不化乎生化之理既明帝故善之蒼天無形無患有不生不化者乎岐伯曰悉乎哉問也與道合同惟真人也不生不化與道合同惟真人其能之首篇云上古有真人者提挈天地把握陰陽壽敝天地無有終時此其道生其斯之謂歟帝曰善真人與道合同是無形無患帝故善之此一節言人在天地之中有變化之用真人體同天地無庸變化也氣交變大論第七十一篇上篇云氣交之分人氣從之此承上篇氣交之意而為氣交變大論以明氣運之太過不及四時之德化政令星象之吉凶善惡有常有變徵應於人藏之靈室命曰氣交變大論黃帝問曰五運更治上應天期陰陽往復寒暑迎隨真邪相薄內外分離六經波蕩五氣傾移太過不及專勝兼併願言其始而有常名可得聞乎更平聲五運五行也期一歲也一歲之中五行各主其時故曰五運更治上應天期春夏為陽秋冬為陰日月運行一寒一暑故曰陰陽往復寒暑迎隨若真邪相薄則內外分離相薄分離則六經波蕩五氣傾移波蕩傾移其中有太過不及之氣太過則專勝不及則兼併欲究其終必言其始欲明其變必悉其常此帝舉以為問岐伯稽首再拜對曰昭乎哉問也是明道也此上帝所貴先師傳之臣雖不敏往聞其旨五運上應天期以及陰陽寒暑始終常變是明道也道者上帝所貴先師傳之故往昔曾聞其旨帝曰余聞得其人不教是謂失道傳非其人慢泄天寶余誠菲德未足以受至道然而衆子哀其不終願夫子保於無窮流於無極余司其事則而行之奈何欲岐伯盡言傳於後世無有窮極也岐伯曰請遂言之也上經曰夫道者上知天文下知地理中知人事可以長久此之謂也上經著至教論也著至教論帝語雷公曰而道上知天文下知地理中知人事可以長久岐伯引之以明往聞其旨此之謂也帝曰何謂也天文地理人事帝欲詳明其旨故復問之岐伯曰本氣位也位天者天文也位地者地理也通於人氣之變化者人事也故太過者先天不及者後天所謂治化而人應之也氣位六氣主歲之位六氣位天六氣位地人居氣位之中故曰本氣位也三陽三陰位乎天者即天文也三陽三陰位乎地者即地理也以六氣之位通於人氣之變化者即人事也未當位而氣先至是氣之太過故太過者先天已當位而氣未至是氣之不及故不及者後天先天后天所謂主治之氣化而人應之以為氣之變化也帝曰五運之化太過何如上文太過者先天不及者後天帝先問五運氣化之太過岐伯曰歲木太過風氣流行脾土受邪民病飧泄食減體重煩冤腸鳴腹支滿上應歲星甚則忽忽善怒眩冒巔疾化氣不政生氣獨治雲物飛動草木不寧甚而搖落反脅痛而吐甚衝陽絶者死不治上應太白星在地為木在天為風故歲木太過則風氣流行其在於人則脾土受邪木剋土也民病飧泄土氣虛於下也食減土氣虛於上也體重則土氣不和於外煩冤則土氣不和於內脾氣不通於胃則腸鳴脾氣不行於四肢則腹支滿腹支滿腹滿而下連於足也下文脅支滿脅滿而上連於手也歲木太過故上應歲星歲星木星也甚則風木太過自致其病忽忽善怒風淫於內厥陰肝臟病也弦冒巔疾風薄於上厥陰經脈病也化氣土氣也木盛土衰故化氣不政政治也生氣木氣也木氣有餘故生氣獨治風氣在天則雲物飛動風氣在地則草木不寧甚而搖落風氣在人則反脅痛而吐甚衝陽胃脈也始則化氣不政若木盛土衰至衝陽脈絶者死不治侮反受邪故上應太白星太白金星也應太白金刑木也此歲木太過而有氣交之變也歲火太過炎暑流行肺金受邪民病瘧少氣咳喘血溢血泄注下嗌燥耳聾中熱肩背熱上應熒惑星甚則胸中痛脅支滿脅痛膺背肩胛間痛兩臂內痛身熱骨痛而為浸淫收氣不行長氣獨明雨水霜寒上應辰星上臨少陰少陽火燔焫水泉涸物焦稿病反譫妄狂越咳喘息鳴下甚血溢泄不已太淵絶者死不治上應熒惑星肺金舊本訛金肺今改長上聲余長仿此在地為火在天為暑故歲火太過則炎暑流行其在於人則肺金受邪火剋金也民病瘧毫毛伸欠乃作寒熱也少氣咳喘肺氣虛也血溢血泄氣虛不能攝血也水不上升則注下注下則津液不濡故嗌燥耳聾火不下降則中熱中熱則肩背熱歲火太過故上應熒惑星熒惑火星也火炎過甚自致其病則胸中痛脅支滿脅痛膺背肩胛間痛兩臂內痛皆心主包絡之病也蓋心主包絡之脈起於胸中循胸出脅入肘下臂故也身熱火氣外浮也骨痛火浮於外不溫於內也而為浸淫言身熱久則留注皮絡而成浸淫瘡也收氣金氣也火盛金衰故收氣不行長氣火氣也火氣有餘故長氣獨明有餘而往不足隨之侮反受邪則雨水霜寒而上應辰星辰星水星也應辰星水刑火也少陰君火也少陽相火也歲火太過故上臨少陰少陽火氣在天則火燔焫火氣在地則水泉涸物焦稿火氣在人則病反譫妄狂越咳喘息鳴火氣下甚則血溢泄不已太淵肺俞之穴也始則收氣不行若火盛金衰至太淵絶者死不治火氣亢極上應熒惑星此歲火太過而有氣交之變也歲土太過雨濕流行腎水受邪民病腹痛清厥意不樂體重煩冤上應鎮星甚則肌肉萎足痿不收行善瘛腳下痛飲發中滿食減四肢不舉變生得位臟氣伏化氣獨治之泉湧河衍涸澤生魚風雨大至土崩潰鱗見於陸病腹滿溏泄腸鳴反下甚而太溪絶者死不治上應歲星藏如字見音現下見同在地為土在天為濕故歲土太過則雨濕流行其在於人則腎水受邪土剋水也民病腹痛清厥陰寒水氣之病也意不樂則脾志不舒體重則土氣不和煩寬則心腎不交歲土太過故上應鎮星鎮星土星也土濕過甚自致其病則肌肉痿肌肉痿則足痿不收足痿不收則行善瘛行善瘛則腳下痛此土氣壅滯致生痿痹之證也飲發者水氣不行發為飲病故飲發則中滿中滿則食減食減則四肢不舉此土氣壅滯致有停飲之證也變生得位者變而生病當土王之時也臟氣水氣也土盛水衰故臟氣伏化氣土氣也土氣有餘故化氣獨治之濕淫於地則泉湧河衍涸澤生魚濕淫於天則風雨大至夫泉湧河衍則土崩潰涸澤生魚則鱗見於陸濕淫於人則病腹滿溏泄腸鳴反下甚太溪腎脈也始則臟氣伏若土盛水衰至太溪脈絶者死不治侮反受邪故上應歲星應歲星木刑土也此歲土太過而有氣交之變也歲金太過燥金流行肝木受邪民病兩脅下少腹痛目赤痛眥瘍耳無所聞肅殺而甚則體重煩冤胸痛引背兩脅滿且痛引少腹上應太白星甚則喘咳逆氣肩背痛尻陰股髀腨䯒足皆病上應螢惑星收氣峻生氣下草木斂蒼干凋隕病反暴痛胠脅不可反側咳逆甚而血溢太衝絶者死不治上應太白星在地為金在天為燥故歲金太過則燥氣流行其在於人則肝木受邪金剋木也民病兩脅下少腹痛肝病也目赤痛眥瘍肝開竅於目也耳無所聞陰中之初陽不升也金氣太過肅殺而甚則體重煩冤上文脾病心病皆體重煩冤此則申明煩冤者乃胸痛引背陰陽血氣不和體重者乃兩脅滿左右樞機不利又言不但胸痛引背且痛引少腹歲金太過故上應太白星金燥過甚自致其病則喘咳逆氣肩背痛經脈論云肺所生病咳上氣喘渴肩背痛也肝主周身之氣為十二經脈之首肝病則周身經脈不和故尻陰股膝髀腨䯒足皆病金亢則害侮反受邪故上應螢惑星應螢惑火刑金也收氣金氣也金氣有餘故收氣峻生氣木氣也金盛木衰故生氣下金主肅殺故草木斂而蒼干凋隕天氣收斂當無病矣病反暴痛胠脅不可反側者肝木受刑致少陽樞轉不利也肺氣不能開浮於外則咳逆過甚咳逆而血溢者氣虛不能攝血也太衝肝經穴也始則生氣下若金盛木衰致太脈絶者死不治金氣盛故上應太白星此歲金太過而有氣交之變也歲水太過寒氣流行邪害心火民病身熱煩心躁悸陰厥上下中寒譫妄心痛寒氣早至上應辰星甚則腹大脛腫喘咳寢汗出憎風大雨至埃霧朦郁上應鎮星上臨太陽雨冰雪霜不時降濕氣變物病反腹滿腸鳴溏泄食不化渴而妄冒神門絶者不治上應螢惑辰星在地為水在天為寒故歲水太過則寒氣流行其在於人則邪害心火水剋火也民病身熱煩心火氣盛也火氣盛而水制之則煩心不已轉為躁悸身熱不已轉為陰厥躁悸陰厥則三焦內虛故上下中皆寒上下中寒則神氣內虛故譫妄心痛水盛火衰故寒氣早至上應辰星水寒過甚自致其病水氣下行則腹大脛腫水氣上逆則喘咳水氣外浮則寢汗出憎風始則有餘而侮既則侮反受邪大雨至者地氣升而為云為雨也埃霧朦郁者土濕如霧朦昧鬱結也上應鎮星土刑水也太陽寒水也歲水太過故上臨太陽水氣在天則雨冰雪霜不時降冰冰雹也水氣在地則濕氣變物水氣在人則病反腹滿腸鳴溏泄火氣不行則食不化火氣內鬱則渴而妄冒神門心脈也始則身熱煩心若水盛火衰至神門脈絶者死不治水火者陰陽也陰陽往復故上應螢惑辰星此歲水太過而有氣交之變也帝曰善其不及何如運氣太過之理既明帝故善之復問五運氣化之不及岐伯曰悉乎哉問也歲木不及燥乃大行生氣失應草木晚榮肅殺而甚則剛木闢著柔萎蒼干上應太白星民病中清胠脅病少腹痛腸鳴溏泄涼雨時至上應太白星其谷蒼上臨陽明生氣失政草木再榮化氣乃急上應太白鎮星其主蒼早復則炎暑流火濕性燥柔脆草木焦稿下體再生華實齊化病寒熱瘡瘍痱疹癰痤上應熒惑太白其谷白堅白露早降收殺氣行寒雨害物蟲食甘黃脾土受邪赤氣後化心氣晚治上勝肺金白氣乃屈其谷不成咳而鼽上應熒惑太白星歲木不及則燥金之氣乘而侮之故燥乃大行生氣木氣也生氣失應則百物愆期故草木晚榮金氣肅殺而甚則剛木受刑闢刑也著受也其柔草則蒼干萎猶草也木受金刑故上太白星金氣清肅故民病中清肝虛故胠肋痛少腹痛清氣在中故腸鳴溏泄金氣清涼故涼雨時至而上應太白星蒼木色也木雖不及始屈終復其谷成熟則色蒼陽明燥金之氣也金刑其木故上臨陽明陽明上臨則生氣失政草木凋而再榮再榮則化氣乃急謂金盛剋木則草木凋謝而金之子水又生其木故得再榮此制則生化之義故曰化氣乃急言化氣急而得再榮也陽明屬秋金又主中土故上應太白鎮星草木再榮而成實速於常期故其主蒼早復母郁子復也如金盛木鬱而木之子火又克其金故復則炎暑流火火氣盛矣濕性燥燥萬物者莫熯乎火矣柔脆金不堅矣草木焦稿將自焚矣下體再生華實齊化言下體得以再生華實齊歸制化之義如火盛金衰而火之子土又生其金亦制則生化也病寒熱瘡瘍痱疹癰痤火氣鬱於皮毛也火盛而制化生今故上應熒惑太白星制化生金故其谷白堅金氣勝故白露早降收殺氣行而寒雨害物寒雨害物則生蟲故蟲食甘黃蟲食甘黃則脾土受邪此金刑其木寒雨生蟲而害物也炎暑流火乃母郁子復其氣後至故赤氣後化心氣晚治子復母仇故上勝肺金火盛金衰故白氣乃屈而其谷不成其在於人則肺咳而鼻鼽赤氣後化了火也白露早降金也故上應熒惑太白星此歲木不及而有歲交之變也歲火不及寒乃大行長政不用物榮而下凝慘而甚則陽氣不化乃折榮美上應辰星民病胸中痛脅支滿兩脅痛膺背肩胛間及兩臂內痛鬱冒矇昧心痛暴喑胸腹大脅下與腰背相引而痛甚則屈不能伸髖髀如別上應熒惑辰星其谷丹復則埃郁大雨且至黑氣乃辱病鶩溏腹滿食飲不下寒中腸鳴泄注腹痛暴攣痿痹足不任身上應鎮星辰星玄谷不成歲火不及則寒水之氣乘而侮之故寒乃大行長政火政也長政不用火氣衰也物榮不下業不長也凝慘而甚陰寒極也水盛火衰則陽氣不化乃折榮美折猶抑也水氣勝故上應展星民病胸中痛肋支滿兩肋痛膺背肩胛間及兩臂內痛皆心主色絡之病也上文歲火太過此歲火不及其病相同鬱冒膝矇昧水制其火濕熱病也心痛暴喑心氣寒而不舒也胸腹大火氣虛而水逆也脅下與膺背相引而痛甚則屈不能伸髖髀如別乃骨之大會不得君火之遊行也水火皆病陰陽互陳故上應熒惑辰星丹火色也火雖不及始屈終復故谷之成熟其色則丹復如水盛火鬱而火之子土又剋水也故復則埃郁埃土也郁蒸也土氣鬱蒸則地氣上升故大雨且至黑氣水氣也辱下也土製其水故黑氣乃下病鶩溏腹滿食飲不下寒中腸鳴泄注腹痛是土製其水水氣不行病在內也暴攣痿痹足不任身是土製其水病在外也土覆水平故上應鎮星辰星侮反受邪故玄谷不成此歲火不及而有氣交之變也歲土不及風乃大行化氣不令草木茂榮飄揚而甚秀而不實上應歲星民病飧泄霍亂體重腹痛筋骨繇復肌肉瞤酸善怒臟氣舉事蟄蟲早附咸病寒中上應歲星鎮星其谷黔復則收政嚴峻各木蒼凋胸肋暴病下引少腹善太息蟲食甘黃氣客於脾黔谷乃減民食少失味蒼谷乃損上應太白歲星上臨厥陰流水不冰蟄蟲來見臟氣不用白乃不復上應歲星民乃康末藏如字歲土不及則風木之氣乘而侮之故風乃大行化氣土氣也化氣不令土氣衰也草木茂榮飄揚而甚木氣盛也秀而不實土氣虛也木氣有餘故上應歲星民病飧泄霍亂體重腹痛土氣病也筋骨繇復肌肉眶酸風氣勝也善怒臟氣舉事言善怒乃肝臟之氣舉而用事也蟄藏也蟄蟲早附乃木氣有餘藏蟲早附而出也凡此民病皆木製其土土濕內逆故咸病寒中土木皆病故上應歲星鎮星土雖不及始屈終復故谷之成熟其色則黔復如木盛土鬱而土之子金又剋木也故復則收政嚴峻金氣盛矣名木蒼凋木氣衰矣其在於人病胸肋暴痛下引少腹肝木病也善太息膽氣逆也風木氣鬱則生蟲故蟲食甘黃而氣客於脾蟲食甘黃則黔谷乃減氣客於脾則民食少失味始焉木盛既則金復故蒼谷乃損上應太白歲星厥陰風木也歲土不及風乃大行故上臨厥陰厥陰上臨則風木生動故流水不冰蟄蟲來見生而不藏故臟氣不用此上臨厥陰金氣不復故白乃不復木氣有餘故上應歲星勝而不復故民乃康此歲土不及而有歲交之變也歲金不及炎火乃行生氣乃用長氣專勝庶物以茂燥爍以行上應熒惑星民病肩背瞀重鼽嚏血便注下收氣乃後上應太白星其谷堅芒復則寒雨暴至乃零冰雹霜雪殺物陰厥且格陽反上行頭腦戶痛延及囟頂發熱上應辰星丹谷不成民病口瘡甚則心痛歲金不及則火熱之氣乘而侮之故炎火乃行生氣木氣也金不平木故生氣乃用長氣火氣也火氣有餘故長氣專勝長氣專勝則蔗物以茂而燥爍以行燥爍火熱之氣也火氣盛故上應熒惑星民病肩背瞀重鼽嚏皆肺病也血便注下火熱盛也收氣乃後金不及也金雖不及乃為歲主故上應太白星其谷成熟則堅芒復如火盛金鬱而金之子水又剋火也故復則寒雨暴至乃零水氣盛也冰雹霜雪殺物水寒之變也水寒屬陰陰寒之極故陰厥且格格拒也陰極而拒陽也陰極拒陽陽無所容故陽反上行致頭之腦戶痛而延及腦頂身且發熱水氣盛故上應辰星水盛火衰故丹谷不成迫火行外故民病口瘡甚則心痛此歲金不及而有歲氣之變也歲水不及濕乃大行長氣反用其化乃速暑雨數至上應鎮星民病腹滿身重濡泄塞瘍流水腰股痛發膕腨股膝不便煩寬足痿清厥腳下痛甚則跗腫臟氣不政腎氣不衡上應辰星其谷秬上臨太陰則大寒數舉蟄蟲早藏地積堅冰陽光不治民病寒疾於下甚則腹滿浮腫上應鎮星其呈黅谷復則大風暴發草偃木零生長不鮮面色時變筋骨並闢肉瞤瘛目視䀮䀮物疏璺肌肉疹發氣並膈中痛於心腹黃氣乃損其吞不登上應歲星數音朔便平聲藏如字璺音問歲火不及則土濕之氣乘而侮之故濕乃大行長氣火氣也水不平火故長氣反用化氣土氣也土氣有餘故其化乃速濕氣上升則雨長氣反用化氣乃速故暑雨數至土氣盛故上應鎮星民病腹滿身重土濕太過水不行也濡泄寒瘍流水土濕太過水下泄也腰股痛發膕腨股膝不便土濕太過關節不利也煩冤土濕太過火氣鬱也足痿清厥腳下痛寒濕之氣下凝也甚則跗腫凝而不散也臟氣不政腎氣不衡冬令水陰之氣失職也水雖不及乃為歲主故上應辰星而秬谷成熟秬黑黍也太陰濕土也歲木不及濕乃大行故上臨太陰太陰上臨則土濕陰寒故大寒數舉寒性凝斂故蟄蟲早藏寒濕過甚故地積堅冰而陽光不治民病寒疾於下濕在下也甚則腹滿濕在中也浮腫濕在上也太陰上臨故上應鎮星谷之成熟其色則黅故其主黅谷復如土盛水鬱而水之子木又剋土也故復則大風暴發草偃木零風氣勝也生長不鮮面色時變土氣虛也闢刑也筋骨並闢內瞤瘛言水木氣復而木主之筋水主之骨其氣相併而剋土則土受刑而肉瞤瘛瞤瘛動躍不寧也撓萬物者莫疾乎鳳風氣勝故目視䀮䀮而氣血不和物疏璺而形體不固疏璺猶破裂也肌肉疹發土虛風勝也氣並膈中痛於心腹乃風木之氣並逆於胸膈之中不從上出反下逆而痛於心腹之間土受木刑故黃氣乃損黃氣土氣也其主黅谷者至此則其谷不登水鬱木復故上應歲星此歲水不及而有氣交之變也帝曰善願聞其時也運氣不及之理既明帝故善之一歲四時亦有太過不及故願聞其時岐伯曰悉乎哉問也木不及春有鳴條律暢之化則秋有霧露清涼之政春有慘淒殘賊之勝則夏有炎暑燔爍之復其眚東其藏肝其病內舍胠脅外在關節五運之氣而論其時可謂悉矣四時之氣貴得其平有勝則有復試以木之不及言之木氣主春春有鳴條律暢之化則秋有霧落清涼之政此木氣自和無勝則無復也若春有慘淒殘賊之勝金勝木矣則夏有炎暑燔爍之復木之子火復勝而剋金也春木位於東故其眚東東方屬肝故其藏肝胠脅者肝之部故其病內舍胠脅關節者筋之屬故外在關節火不及夏有炳明光顯之化則冬有嚴肅霜寒之政夏有慘淒凝冽之勝則不時有埃昏大雨之復其眚南其藏心其病內含膺脅外在經絡試以火之不及言之夏有炳明光顯之化則冬有嚴肅霜寒之政無勝則無復也夏有慘淒凝冽之勝水勝火矣土王四季不拘其時則不時有埃昏大雨之復火之子土復勝而剋水也夏火位於南故其眚南南方屬心故其藏心膺脅者心色之部故其病內舍膺脅經絡者心色之主故外在經絡土不及四維有埃云潤澤之化則春有鳴條鼓拆之政四維發振拉飄騰之變則秋有肅殺霖霾之復其眚四維其藏脾其病內舍心腹外在肌肉四肢試以上之不及言之土位中央氣灌四旁故曰四維四維有埃云潤澤之化則春有鳴條鼓拆之政無勝則無復也四維發振拉飄騰之變木勝土矣則秋有肅殺霖霪之復土之子金復勝而剋木也土灌四旁故其眚四維中央屬脾故其藏脾腹者脾之部心腹者心之下皆腹也故其病內舍心腹肌肉四肢脾所主也故外在肌肉四肢金不及夏有光顯鬱蒸之令則冬有嚴凝整肅之應夏有炎爍燔燎之變則秋有冰雹霜雪之夏其眚西其藏肺其病內含膺脅肩背外在皮毛試以金之不及言之夏有光顯鬱蒸之令則冬有嚴凝整肅之應無勝則無復也夏有炎爍燔燎之變火勝金矣則秋有冰雹霜雪之復金之子水復勝而剋火也秋金位於西故其眚西西方屬肺故其藏肺肺脈起於中焦上膈屬肺出腋至臂氣盛有餘則肩背痛故其病內舍膺脅肩背皮毛者肺之合故外在皮毛水不及四維有湍潤埃云之化則不時有和風生髮之應四維發埃昏驟注之變則不時有飄蕩振拉之復其眚北其藏腎其病內舍腰脊骨髓外在溪谷踹膝試以水之不及言之四維有湍潤埃云之化則不時有和風生髮之應無勝則無復矣四維發埃昏驟注之變土勝水也則不時有飄蕩振拉之復水之子木復勝而剋土也冬水位於北故其眚北北方屬腎故其藏腎腎主骨髓腰脊者腎之府故其病內舍腰脊骨髓陰陽應象大論云溪谷屬腎又腎脈從踹至膝故外在溪谷踹膝至真要大論云初氣終三氣勝之常也四氣盡終氣復之常也故上文木言春火言夏土言四維至金則不言秋而言夏水不言冬而言四維是歲半以上主勝氣歲半以下主復氣所以申明主時之氣勝復在一歲之內而不同主歲之氣也夫五運之政猶權衡也高者抑之下者舉之化者應之變者復之此生長化成收藏之理氣之常也失常則天地四塞矣藏如字末藏之靈室藏字同主歲之氣有太過不及主時之氣有太過有不及上文言太過而不及在其中故夫五運之政貴得其平猶權衡也高者抑之無太過矣下者舉之無不及矣德化之常必有應故化者應之非時之變必有復故變者復之此生長化成收藏四時五行之理乃運氣之常也如失常則天地四塞而不順序矣所以申明不可太過不可不及也故曰天地之動靜神明為之紀陰陽之往復寒暑彰其兆此之謂也五運行大論帝引陰陽應象大論之言謂天地之動靜神明為之紀陰陽之升降寒暑彰其兆茲岐伯引之以明四時之應即天地之動靜而神明為之紀五氣之變即陰陽之往復而寒暑彰其兆故曰此之謂也此一節言五運之政四時之氣貴得其平太過不及而有氣交之變也帝曰夫子之言五氣之變四時之應可謂悉矣夫氣之動亂觸遇而作發無常會卒然災合何以期之卒音促下俱同上文言五氣之變應於四時帝承上文之意謂氣之變也卒然而至人居天地之中何以期之岐伯曰夫氣之動變固不常在而德化政令災變不同其候也動變猶動亂承帝問而言夫氣之動亂觸遇而作發無常會固不常在而德化政令之氣則有常與動亂之災變而不同其候也帝曰何謂也何以德化政令災變不同其候岐伯曰東方生風風生本其德散和其化生榮其政舒啓其令風其變振發其災散落德化政令災變皆有常候知常則知變矣五運行大論云東方生風風生木其德敷和即知其德為和也其化生榮即其化為榮也其政舒啓即其政為散也其令風即其令宣發也其變振發即其變振拉也其災散落即其眚為損也辭意與五運行大論相同下四方亦然南方生熱熱生火其德彰顯五運行大論云其德為顯其化蕃茂即其化為茂其政明曜即其政為明其令熱即其令鬱蒸其變銷爍五運行同其災燔爇其眚燔爇中央生濕濕生土其德溽蒸即其德為濡其化豐備即其化為盈其政安靜即其政為謐其令濕即其雲雨其變驟注即其變動注其災霖潰即其眚淫漬西方生燥燥生金其德清潔即其德為清其化緊斂即其化為斂其政徑切即其政為徑其令燥西方生燥故也其變肅殺五運行同其災蒼隕即其眚蒼落北方生寒寒生水其德淒滄即其德為寒其化清謐即其化為肅其政凝肅即其政靜其令寒即其令嚴貞其變溧冽即其變凝冽其災冰雪霜雹五運行但言其眚冰雹是以察其動也有德有化有政有令有變有災而物由之而人應之也德化政令災變乃四時氣機之動不可不察是以察其動也則有德有化有政有令有有災而物由之以生長化收藏而人應之以生長壯老已察其氣機之動則卒然災合可以期之矣帝曰夫子之言歲候其太過不及而上應五星今夫德化政令災眚變易非常而有也卒然而動其亦為之變乎上文言歲候之太過不及皆上應五星則德化政令災眚變易亦上應五星若災變卒然而動五星亦卒然而變乎此帝舉以為問岐伯曰承天而行之故無妄動無不應也卒然而動者氣之交變也其不應焉故曰應常不應卒此之謂也木火土金水五運上承天氣而行之氣有常數故無妄動動則無不應於五星也若卒然而動者乃四時涇氣之交變也涇氣交變其不上應於五星焉故經曰應常不應卒即此卒然而動不應之謂也故曰未詳其處帝曰其應奈何其應常奈何岐伯曰各從其氣化也在天為氣在地為化風熱濕燥寒天之氣也木火土金水地之化也各從其氣化者歲星從風木熒惑從熱火鎮星從濕土太白從燥金辰星從寒水此五星各從天地之氣化也帝曰其行之綜疾逆順何如五星旋轉有徐行疾行逆行順行其義何如岐伯曰以道留久逆守而小是謂省下以道留久路稽留延久也逆守而小逆而不進自守其度不放光芒也此行之徐是謂省下之義蓋省察其分野之下君民之有過有德也以道而去去而速來曲而過之是謂省遺過也以道而去不久留也去而速來不逆守也曲而過之即有阻滯亦屈曲而過也此行之疾是謂有遺過之義蓋分野之下省察有未合復省察其所遺之過失也久留而環或離或附是謂議災與其德也久留守其位而不去也環遇其途而逆行也環則離留則附故或離或附附則順離則逆此行之或逆或順是謂議災與其德之義蓋議其分野之下常見其災與其改過為德而免之也應近則小應遠則大芒而大倍常之一其化甚大常之二其眚即發小常之一其化減小常之二是謂臨視省下之過與其德也德者福之過者伐之五星所過之度有遠近禍福之應過度應近則不放光芒而小過度應遠則放光芒而大所謂大者光芒而大倍常之一則涇勝郁復之氣化甚於常時光芒而大倍常之二是為太過其眚即至也所謂小者光芒小於常時一倍其涇勝郁復之氣化亦減少焉若小於常時二倍是謂臨視以上臨下而視其有過與其有德也有德者則降祥以福之有過者則降災以伐之是以象之見也高而遠則小下而近則大故大則喜怒邇小則禍福遠歲運太過則運星北越運氣相得則各行以道故歲運太過畏星失色而兼其母不及則色兼其所不勝五星之行有徐疾逆順所行之度有高下遠近是以星象之見也位高則遠則星象小位下而近則星象大大則星象之喜怒下應者邇小則星象之禍福下降者遠五星有高下遠近歲運有太過不及和平如歲運太過則運星北越北者星居北極越者出於衆星之上高且遠也如運氣相得者而和平則各行其道不相越矣故歲運太過則侮所不勝致畏星失色而兼其母如木運太過土為畏星而失色火為土之母則火星亦失其色而兼其母五運仿此而類推歲運不及則無畏星無畏則星不失色而增色矣如木運不及則金星乘侮而增色所不勝之土星亦相兼而增色也五運仿此類推消者瞿瞿莫知其妙閔閔之當孰者為良妄行無微示畏候王當去聲歲運太過不及星象高下遠近其理至微其道至深故探其消息則瞿瞿然而驚顧仍莫知其妙閔閔憂之深也深憂理道之切當仍不知孰者為良苟不深求而研察之則妄行其治必無徵驗妄言災禍徒示畏以候王此不學妄行不知妄言自欺欺人必受夭殃帝曰其災應何如天人相應理道至微帝復問災眚之下應岐伯曰亦各從其化也故時至有盛衰凌犯有逆順留守有多少形見有善惡宿屬有勝負徵應有吉凶矣上文帝問其應如何伯云各從其氣化化猶氣化故四時星象之至有太過而盛不及而衰凌犯猶言過度也五星過度有相違而逆相得而順留守其位有期久而多期速而小彰形下見有和靄而善閃爍而惡五行宿屬有已克而勝受克而負盛衰逆順多少善惡勝負徵應於下則有吉凶矣帝曰其善惡何謂也時至盛衰凌犯逆順留守多少宿屬勝負理固宜然同是星也何以形有善惡此帝獨舉以問岐伯曰有喜有怒有憂有喪有澤有燥此象之常也必謹察之喪去聲安靜者善之象躁亂者惡之形天之星象有喜有怒喜則安靜而善怒則躁亂而惡復有澤有燥澤則安靜而善燥則躁亂而惡此喜怒憂喪澤燥乃善惡所繫星象之常也必謹察之則吉凶徵應可知矣帝曰六者高下異乎異分別也喜怒憂喪澤燥六者其象或高或下其有分別乎上文云高而遠則小小則禍福遠下而近則大大則喜怒邇故帝復有此問岐伯曰象見高下其應一也故人亦應之上文位高形小而應遠位下形大而應邇固有異也若喜怒憂喪澤燥之象見於高下其應一也無遠邇之分也故星象應於人而人亦應之謂人之喜怒即星之喜怒也人之憂喪即星之憂喪也人之澤燥即星之澤燥也此天人之相應也帝曰善其德化政令之動靜損益皆何如五星德化政令災變之理既明帝故善之復問德化政令其中有動靜損益皆當何如岐伯曰夫德化政令災變不能相加也勝復盛衰不能相多也經來小大不能相過也用之升降不能相無也各從其動而復之耳動靜損益在德化政令之中非德化政令之外復有動靜損益也故夫德化政令雖四時之災變不能相加也災變之勝復盛衰不能相多也五星之往來小大不能相過也災變勝復盛衰五星往來小大皆用德化政令為之升降是德化政令不能相無也雖用之升降仍各從其動而復之耳帝曰其病生何如上文云災變不能相加故問病生何如岐伯曰德化者氣之祥政令者氣之章變易者復之紀災眚者傷之始氣相勝者和不相勝者病重感於邪則甚也重平聲有德有化者氣之和祥也有政有令者氣之彰著也若夫變易者報復之紀始焉受制既則復也災眚者受傷之始始受其傷未發病也故變易災眚之至而氣相勝者和謂四時主氣能勝客氣則和不相勝者病謂主時之氣不勝客氣則病不勝而病若重感於邪則病甚也是變易災眚雖生民病不能相加於德化政令也帝曰善所謂精光之論大聖之業宣明大道通於無窮窮於無極也余聞之善言天者必應於人善言古者必驗於今善言氣者必彰於物善言應者同天地之化善言化言變者通神明之理非夫子孰能言至道歟乃擇良兆而藏之靈室每旦讀之命曰氣交變非齋戒不敢發慎傳也歟平聲極言之而贊其深尊奉之而慎其傳所以為氣交變大論者如此此一節言四時之德化政令災變星象之遠近善惡吉凶徵應於人以為氣交之變也
